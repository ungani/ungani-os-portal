<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Admin Sections</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin-shared.js"></script>

  <style>
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 24px var(--ungani-shadow);
    }

    .metric-card h3 {
      margin: 0 0 8px;
      color: var(--ungani-muted);
      font-size: 14px;
    }

    .metric-card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
      color: var(--ungani-text);
    }

    .metric-card .note {
      margin-top: 8px;
      color: var(--ungani-muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .metric-card.green { border-left-color: var(--ungani-green); }
    .metric-card.red { border-left-color: var(--ungani-red); }
    .metric-card.orange { border-left-color: var(--ungani-orange); }
    .metric-card.blue { border-left-color: var(--ungani-blue); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 8px 0 6px;
      font-size: 14px;
      color: var(--ungani-text);
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--ungani-border);
      border-radius: 12px;
      background: var(--ungani-card);
      color: var(--ungani-text);
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
      background: var(--ungani-gold);
      color: var(--ungani-navy);
      text-decoration: none;
      display: inline-block;
    }

    .btn.dark {
      background: var(--ungani-card);
      color: var(--ungani-text);
      border: 1px solid var(--ungani-border);
    }

    .btn.green { background: var(--ungani-green); color: #FFFFFF; }
    .btn.red { background: var(--ungani-red); color: #FFFFFF; }
    .btn.orange { background: var(--ungani-orange); color: #FFFFFF; }
    .btn.blue { background: var(--ungani-blue); color: #FFFFFF; }

    .two-col {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
    }

    .section-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-title-row h2 {
      margin: 0;
    }

    .row-card {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .row-card.enabled-card { border-left-color: var(--ungani-green); }
    .row-card.disabled-card { border-left-color: var(--ungani-red); }
    .row-card.warning-card { border-left-color: var(--ungani-orange); }
    .row-card.info-card { border-left-color: var(--ungani-blue); }

    .row-title {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 6px;
      color: var(--ungani-text);
    }

    .row-detail {
      color: var(--ungani-muted);
      margin: 5px 0;
      line-height: 1.45;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      background: var(--ungani-navy);
      color: #FFFFFF;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      text-transform: capitalize;
    }

    .badge.green { background: var(--ungani-green); }
    .badge.red { background: var(--ungani-red); }
    .badge.orange { background: var(--ungani-orange); }
    .badge.blue { background: var(--ungani-blue); }
    .badge.gold { background: var(--ungani-gold); color: var(--ungani-navy); }

    .empty {
      text-align: center;
      padding: 28px;
      background: var(--ungani-card);
      border: 1px dashed var(--ungani-border);
      border-radius: 18px;
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--ungani-text);
    }

    .empty p {
      margin: 0;
      color: var(--ungani-muted);
    }

    .small-text {
      color: var(--ungani-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 950px) {
      .two-col {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="adminRoot"></div>

  <script>
    let supabaseClient = null;
    let currentAdmin = null;

    let tenants = [];
    let businessSections = [];
    let tenantSections = [];
    let selectedClientId = null;

    const pageMainHtml = `
      <section class="ungani-card ungani-hero-card">
        <div style="position: relative; z-index: 1;">
          <h2>Admin Sections Center</h2>
          <p>
            Manage which UNGANI OS sections are enabled for each client, including money, records, documents, tasks, items, calendar, support, reports, and chat.
          </p>
          <div style="margin-top: 16px;">
            <a class="btn" href="admin-home.html">Admin Home</a>
            <a class="btn green" href="admin.html">Main Admin</a>
            <a class="btn blue" href="users.html">Users</a>
            <a class="btn dark" href="admin-settings.html">Admin Settings</a>
          </div>
        </div>
      </section>

      <section class="page-grid" id="metricsGrid">
        <div class="metric-card"><h3>Loading</h3><p>...</p><div class="note">Please wait</div></div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>Section Filters</h2>
          <button class="btn green" onclick="loadPageData()">Refresh</button>
        </div>

        <div class="form-grid">
          <div>
            <label for="clientFilter">Client</label>
            <select id="clientFilter" onchange="renderSectionsPage()">
              <option value="">All Clients</option>
            </select>
          </div>

          <div>
            <label for="sectionFilter">Section</label>
            <select id="sectionFilter" onchange="renderSectionsPage()">
              <option value="">All Sections</option>
            </select>
          </div>

          <div>
            <label for="statusFilter">Access Status</label>
            <select id="statusFilter" onchange="renderSectionsPage()">
              <option value="">All</option>
              <option value="enabled">Enabled</option>
              <option value="disabled">Disabled / Not Added</option>
            </select>
          </div>

          <div>
            <label for="searchBox">Search</label>
            <input id="searchBox" placeholder="Search clients or sections..." oninput="renderSectionsPage()" />
          </div>
        </div>

        <div class="button-row">
          <button class="btn dark" onclick="resetFilters()">Reset Filters</button>
        </div>
      </section>

      <section class="two-col">
        <div class="ungani-card">
          <div class="section-title-row">
            <h2>Client Section Summary</h2>
          </div>
          <div id="clientSummaryBox">
            <div class="empty">
              <h3>Loading client summary...</h3>
              <p>Please wait.</p>
            </div>
          </div>
        </div>

        <div class="ungani-card">
          <div class="section-title-row">
            <h2 id="selectedClientTitle">Selected Client Sections</h2>
          </div>

          <div id="selectedClientBox">
            <div class="empty">
              <h3>No client selected</h3>
              <p>Select a client below to manage section access.</p>
            </div>
          </div>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>All Client Section Access</h2>
          <p class="small-text" id="sectionsCountText">Loading...</p>
        </div>

        <div id="sectionsListBox">
          <div class="empty">
            <h3>Loading sections...</h3>
            <p>Please wait.</p>
          </div>
        </div>
      </section>
    `;

    window.addEventListener("load", function () {
      UnganiAdminShared.renderShell("adminRoot", {
        activeKey: "sections",
        pageTitle: "Sections",
        pageSubtitle: "Manage client access to UNGANI OS sections and modules.",
        footerTitle: "Sections",
        footerVersion: "Sections Version: Step 294 Shared Session Added",
        mainHtml: pageMainHtml
      });

      UnganiAdminShared.requireAdmin({
        onNoSession: function () {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiLoginShell").classList.remove("hidden");
        },
        onBlocked: function (reason) {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiBlockedShell").classList.remove("hidden");
          document.getElementById("unganiBlockedReason").innerText = reason;
        },
        onReady: async function (admin, client) {
          currentAdmin = admin;
          supabaseClient = client;

          UnganiAdminShared.renderSidebar("adminSidebar", {
            activeKey: "sections",
            adminName: admin.full_name || "Admin Workspace",
            footerTitle: "Sections",
            footerVersion: "Sections Version: Step 294 Shared Session Added"
          });

          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiAppShell").classList.remove("hidden");

          await loadPageData();
        }
      });
    });

    function safe(value) {
      return UnganiAdminShared.safe(value);
    }

    function cleanText(value) {
      return UnganiAdminShared.cleanText(value);
    }

    function getField(row, names, fallback = "") {
      for (const name of names) {
        if (row && row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return fallback;
    }

    function getTenantName(row) {
      return getField(row, ["business_name", "company_name", "tenant_name"], "Client Business");
    }

    function getTenantStatus(row) {
      return String(getField(row, ["account_status", "status"], "trial")).toLowerCase();
    }

    function getTenantNameById(tenantId) {
      const tenant = tenants.find(row => String(row.id) === String(tenantId));
      return tenant ? getTenantName(tenant) : "Unknown Client";
    }

    function getSectionName(row) {
      return getField(row, ["section_name", "name", "title", "label"], "Business Section");
    }

    function getSectionKey(row) {
      return String(getField(row, ["section_key", "key", "slug", "code"], getSectionName(row))).toLowerCase();
    }

    function getSectionDescription(row) {
      return getField(row, ["description", "notes"], "");
    }

    function getSectionOrder(row) {
      const raw = getField(row, ["display_order", "sort_order", "order_number"], 999);
      const num = Number(raw);
      return isNaN(num) ? 999 : num;
    }

    function isSectionActive(row) {
      const value = getField(row, ["is_active", "active", "enabled"], true);
      return value === true || value === "true" || value === 1 || value === "1";
    }

    function isTenantSectionEnabled(row) {
      if (!row) return false;

      const value = getField(row, ["is_enabled", "enabled", "is_active", "active"], false);
      return value === true || value === "true" || value === 1 || value === "1";
    }

    function getTenantSectionRow(tenantId, sectionId) {
      return tenantSections.find(row =>
        String(row.tenant_id) === String(tenantId) &&
        String(row.section_id) === String(sectionId)
      );
    }

    function getCreatedDate(row) {
      return getField(row, ["created_at", "updated_at"], "");
    }

    function formatDateTime(value) {
      if (!value) return "N/A";

      const dateObj = new Date(value);

      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function statusBadge(enabled) {
      if (enabled) {
        return `<span class="badge green">Enabled</span>`;
      }

      return `<span class="badge red">Disabled</span>`;
    }

    function tenantStatusBadge(status) {
      const clean = String(status || "trial").toLowerCase();

      if (clean === "active") return `<span class="badge green">Active Client</span>`;
      if (clean === "trial") return `<span class="badge gold">Trial Client</span>`;
      if (clean === "suspended") return `<span class="badge orange">Suspended</span>`;
      if (clean === "cancelled" || clean === "inactive") return `<span class="badge red">${safe(cleanText(clean))}</span>`;

      return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
    }

    async function safeSelect(tableName) {
      try {
        const { data, error } = await supabaseClient
          .from(tableName)
          .select("*")
          .limit(10000);

        if (error) {
          console.log(tableName, error.message);
          return [];
        }

        return data || [];
      } catch (error) {
        console.log(tableName, error.message);
        return [];
      }
    }

    async function loadPageData() {
      UnganiAdminShared.showToast("Loading sections...");

      const [tenantRows, sectionRows, tenantSectionRows] = await Promise.all([
        safeSelect("tenants"),
        safeSelect("business_sections"),
        safeSelect("tenant_sections")
      ]);

      tenants = tenantRows;
      businessSections = sectionRows
        .filter(isSectionActive)
        .sort((a, b) => getSectionOrder(a) - getSectionOrder(b) || getSectionName(a).localeCompare(getSectionName(b)));
      tenantSections = tenantSectionRows;

      fillFilters();
      renderSectionsPage();

      if (selectedClientId) {
        renderSelectedClient(selectedClientId);
      }

      UnganiAdminShared.showToast("Sections updated ✓");
    }

    function fillFilters() {
      const selectedClient = document.getElementById("clientFilter").value;
      const selectedSection = document.getElementById("sectionFilter").value;

      const clientOptions = tenants
        .map(row => `<option value="${safe(row.id)}">${safe(getTenantName(row))}</option>`)
        .join("");

      const sectionOptions = businessSections
        .map(row => `<option value="${safe(row.id)}">${safe(getSectionName(row))}</option>`)
        .join("");

      document.getElementById("clientFilter").innerHTML = `<option value="">All Clients</option>${clientOptions}`;
      document.getElementById("sectionFilter").innerHTML = `<option value="">All Sections</option>${sectionOptions}`;

      if (selectedClient) document.getElementById("clientFilter").value = selectedClient;
      if (selectedSection) document.getElementById("sectionFilter").value = selectedSection;
    }

    function buildAccessRows() {
      const rows = [];

      tenants.forEach(tenant => {
        businessSections.forEach(section => {
          const access = getTenantSectionRow(tenant.id, section.id);
          const enabled = isTenantSectionEnabled(access);

          rows.push({
            tenant,
            section,
            access,
            enabled
          });
        });
      });

      return rows;
    }

    function filteredAccessRows() {
      const clientFilter = document.getElementById("clientFilter").value;
      const sectionFilter = document.getElementById("sectionFilter").value;
      const statusFilter = document.getElementById("statusFilter").value;
      const query = document.getElementById("searchBox").value.toLowerCase().trim();

      let rows = buildAccessRows();

      if (clientFilter) {
        rows = rows.filter(item => String(item.tenant.id) === String(clientFilter));
      }

      if (sectionFilter) {
        rows = rows.filter(item => String(item.section.id) === String(sectionFilter));
      }

      if (statusFilter === "enabled") {
        rows = rows.filter(item => item.enabled);
      }

      if (statusFilter === "disabled") {
        rows = rows.filter(item => !item.enabled);
      }

      if (query) {
        rows = rows.filter(item => {
          const haystack = [
            getTenantName(item.tenant),
            getTenantStatus(item.tenant),
            getSectionName(item.section),
            getSectionKey(item.section),
            getSectionDescription(item.section),
            JSON.stringify(item.tenant),
            JSON.stringify(item.section),
            JSON.stringify(item.access || {})
          ].join(" ").toLowerCase();

          return haystack.includes(query);
        });
      }

      return rows;
    }

    function renderSectionsPage() {
      renderMetrics();
      renderClientSummary();
      renderSectionsList();
    }

    function renderMetrics() {
      const rows = filteredAccessRows();

      const enabled = rows.filter(item => item.enabled).length;
      const disabled = rows.filter(item => !item.enabled).length;
      const uniqueClients = new Set(rows.map(item => item.tenant.id)).size;
      const uniqueSections = new Set(rows.map(item => item.section.id)).size;
      const clientsWithSections = tenants.filter(tenant =>
        businessSections.some(section => isTenantSectionEnabled(getTenantSectionRow(tenant.id, section.id)))
      ).length;
      const clientsWithoutSections = Math.max(tenants.length - clientsWithSections, 0);

      const metrics = [
        { title: "Clients", value: tenants.length, note: "Total client accounts", cls: "blue" },
        { title: "Business Sections", value: businessSections.length, note: "Available system sections", cls: "gold" },
        { title: "Enabled Access", value: enabled, note: "Enabled section assignments in current view", cls: "green" },
        { title: "Disabled / Missing", value: disabled, note: "Disabled or not assigned in current view", cls: disabled > 0 ? "orange" : "green" },
        { title: "Clients With Sections", value: clientsWithSections, note: "Clients with at least one section enabled", cls: "green" },
        { title: "Clients Without Sections", value: clientsWithoutSections, note: "Clients with no sections enabled", cls: clientsWithoutSections > 0 ? "red" : "green" },
        { title: "Filtered Clients", value: uniqueClients, note: "Clients in current filter", cls: "blue" },
        { title: "Filtered Sections", value: uniqueSections, note: "Sections in current filter", cls: "blue" }
      ];

      document.getElementById("metricsGrid").innerHTML = metrics.map(item => `
        <div class="metric-card ${safe(item.cls)}">
          <h3>${safe(item.title)}</h3>
          <p>${safe(item.value)}</p>
          <div class="note">${safe(item.note)}</div>
        </div>
      `).join("");
    }

    function renderClientSummary() {
      const rows = filteredAccessRows();
      const clientMap = {};

      tenants.forEach(tenant => {
        clientMap[tenant.id] = {
          id: tenant.id,
          name: getTenantName(tenant),
          status: getTenantStatus(tenant),
          total: 0,
          enabled: 0,
          disabled: 0
        };
      });

      rows.forEach(item => {
        const tenantId = item.tenant.id;

        if (!clientMap[tenantId]) return;

        clientMap[tenantId].total += 1;

        if (item.enabled) {
          clientMap[tenantId].enabled += 1;
        } else {
          clientMap[tenantId].disabled += 1;
        }
      });

      const summaryRows = Object.values(clientMap)
        .filter(row => row.total > 0)
        .sort((a, b) => a.enabled - b.enabled || b.disabled - a.disabled || a.name.localeCompare(b.name))
        .slice(0, 12);

      if (summaryRows.length === 0) {
        document.getElementById("clientSummaryBox").innerHTML = `
          <div class="empty">
            <h3>No client summary</h3>
            <p>No client sections match the current filters.</p>
          </div>
        `;
        return;
      }

      document.getElementById("clientSummaryBox").innerHTML = summaryRows.map(row => `
        <div class="row-card ${row.enabled > 0 ? "enabled-card" : "warning-card"}">
          <div class="row-title">${safe(row.name)}</div>
          <p class="row-detail"><strong>Client Status:</strong> ${safe(cleanText(row.status))}</p>
          <p class="row-detail"><strong>Enabled Sections:</strong> ${safe(row.enabled)}</p>
          <p class="row-detail"><strong>Disabled / Missing:</strong> ${safe(row.disabled)}</p>
          <p class="row-detail"><strong>Total Sections Checked:</strong> ${safe(row.total)}</p>
          ${tenantStatusBadge(row.status)}
          ${row.enabled > 0 ? `<span class="badge green">Has access</span>` : `<span class="badge orange">No access assigned</span>`}
          <div class="button-row">
            <button class="btn" onclick="renderSelectedClient('${safe(row.id)}')">Manage Client Sections</button>
          </div>
        </div>
      `).join("");
    }

    function renderSectionsList() {
      const rows = filteredAccessRows();

      document.getElementById("sectionsCountText").innerText = `${rows.length} section access record(s) shown`;

      if (rows.length === 0) {
        document.getElementById("sectionsListBox").innerHTML = `
          <div class="empty">
            <h3>No section access records found</h3>
            <p>Try changing the filters.</p>
          </div>
        `;
        return;
      }

      document.getElementById("sectionsListBox").innerHTML = rows.map(item => `
        <div class="row-card ${item.enabled ? "enabled-card" : "disabled-card"}">
          <div class="row-title">${safe(getSectionName(item.section))}</div>
          <p class="row-detail"><strong>Client:</strong> ${safe(getTenantName(item.tenant))}</p>
          <p class="row-detail"><strong>Section Key:</strong> ${safe(getSectionKey(item.section))}</p>
          <p class="row-detail"><strong>Description:</strong> ${safe(getSectionDescription(item.section) || "N/A")}</p>
          <p class="row-detail"><strong>Client Status:</strong> ${safe(cleanText(getTenantStatus(item.tenant)))}</p>
          <p class="row-detail"><strong>Access Record:</strong> ${item.access ? "Saved" : "Not saved yet"}</p>
          ${statusBadge(item.enabled)}
          ${tenantStatusBadge(getTenantStatus(item.tenant))}

          <div class="button-row">
            <button class="btn" onclick="renderSelectedClient('${safe(item.tenant.id)}')">Manage Client</button>
            <button class="btn green" onclick="setSectionAccess('${safe(item.tenant.id)}','${safe(item.section.id)}', true)">Enable</button>
            <button class="btn red" onclick="setSectionAccess('${safe(item.tenant.id)}','${safe(item.section.id)}', false)">Disable</button>
          </div>
        </div>
      `).join("");
    }

    function renderSelectedClient(tenantId) {
      const tenant = tenants.find(row => String(row.id) === String(tenantId));

      if (!tenant) {
        selectedClientId = null;
        document.getElementById("selectedClientTitle").innerText = "Selected Client Sections";
        document.getElementById("selectedClientBox").innerHTML = `
          <div class="empty">
            <h3>Client not found</h3>
            <p>Please refresh and try again.</p>
          </div>
        `;
        return;
      }

      selectedClientId = tenant.id;

      const rows = businessSections.map(section => {
        const access = getTenantSectionRow(tenant.id, section.id);
        const enabled = isTenantSectionEnabled(access);

        return {
          section,
          access,
          enabled
        };
      });

      const enabledCount = rows.filter(row => row.enabled).length;

      document.getElementById("selectedClientTitle").innerText = getTenantName(tenant);

      document.getElementById("selectedClientBox").innerHTML = `
        <div class="row-card ${enabledCount > 0 ? "enabled-card" : "warning-card"}">
          <div class="row-title">${safe(getTenantName(tenant))}</div>
          <p class="row-detail"><strong>Client Status:</strong> ${safe(cleanText(getTenantStatus(tenant)))}</p>
          <p class="row-detail"><strong>Enabled Sections:</strong> ${safe(enabledCount)} / ${safe(businessSections.length)}</p>
          ${tenantStatusBadge(getTenantStatus(tenant))}
          ${enabledCount > 0 ? `<span class="badge green">Access assigned</span>` : `<span class="badge orange">No sections enabled</span>`}
        </div>

        <div class="button-row">
          <button class="btn green" onclick="enableAllForSelectedClient()">Enable All Sections</button>
          <button class="btn red" onclick="disableAllForSelectedClient()">Disable All Sections</button>
        </div>

        <div style="margin-top: 16px;">
          ${rows.length === 0 ? `
            <div class="empty">
              <h3>No business sections found</h3>
              <p>Add sections in the database before assigning access.</p>
            </div>
          ` : rows.map(item => `
            <div class="row-card ${item.enabled ? "enabled-card" : "disabled-card"}">
              <div class="row-title">${safe(getSectionName(item.section))}</div>
              <p class="row-detail"><strong>Key:</strong> ${safe(getSectionKey(item.section))}</p>
              <p class="row-detail"><strong>Description:</strong> ${safe(getSectionDescription(item.section) || "N/A")}</p>
              ${statusBadge(item.enabled)}
              <div class="button-row">
                <button class="btn green" onclick="setSectionAccess('${safe(tenant.id)}','${safe(item.section.id)}', true)">Enable</button>
                <button class="btn red" onclick="setSectionAccess('${safe(tenant.id)}','${safe(item.section.id)}', false)">Disable</button>
              </div>
            </div>
          `).join("")}
        </div>
      `;

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function setSectionAccess(tenantId, sectionId, enabled) {
      const existing = getTenantSectionRow(tenantId, sectionId);
      const now = new Date().toISOString();

      if (existing) {
        const { error } = await supabaseClient
          .from("tenant_sections")
          .update({
            is_enabled: enabled,
            updated_at: now
          })
          .eq("id", existing.id);

        if (error) {
          alert(error.message);
          return false;
        }
      } else {
        const { error } = await supabaseClient
          .from("tenant_sections")
          .insert({
            tenant_id: tenantId,
            section_id: sectionId,
            is_enabled: enabled,
            created_at: now,
            updated_at: now
          });

        if (error) {
          alert(error.message);
          return false;
        }
      }

      UnganiAdminShared.showToast(enabled ? "Section enabled ✓" : "Section disabled ✓");

      await loadPageData();

      if (selectedClientId) {
        renderSelectedClient(selectedClientId);
      }

      return true;
    }

    async function enableAllForSelectedClient() {
      if (!selectedClientId) {
        alert("No client selected.");
        return;
      }

      for (const section of businessSections) {
        const ok = await setSectionAccess(selectedClientId, section.id, true);
        if (!ok) return;
      }

      UnganiAdminShared.showToast("All sections enabled ✓");
    }

    async function disableAllForSelectedClient() {
      if (!selectedClientId) {
        alert("No client selected.");
        return;
      }

      for (const section of businessSections) {
        const ok = await setSectionAccess(selectedClientId, section.id, false);
        if (!ok) return;
      }

      UnganiAdminShared.showToast("All sections disabled ✓");
    }

    function resetFilters() {
      document.getElementById("clientFilter").value = "";
      document.getElementById("sectionFilter").value = "";
      document.getElementById("statusFilter").value = "";
      document.getElementById("searchBox").value = "";

      renderSectionsPage();

      UnganiAdminShared.showToast("Section filters reset ✓");
    }
  </script>
</body>
</html>
