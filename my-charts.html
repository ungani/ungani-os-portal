<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Property Analytics</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-shared.js"></script>
</head>

<body>
  <script>
    let currentContext = null;
    let isRealEstate = false;

    let chartData = {
      transactions: [],
      items: [],
      people: [],
      records: [],
      tasks: [],
      documents: [],
      events: [],
      support: []
    };

    const CATEGORY_COLORS = {
      "agent commission": "#D4A63A",
      "marketing / advertising": "#2563EB",
      "marketing": "#2563EB",
      "advertising": "#2563EB",
      "legal / documentation fees": "#7C3AED",
      "legal fees": "#7C3AED",
      "documentation": "#7C3AED",
      "property maintenance": "#0891B2",
      "maintenance": "#0891B2",
      "staff wages": "#0F766E",
      "site visit / transport cost": "#EA580C",
      "transport": "#EA580C",
      "project material cost": "#A16207",
      "other real estate cost": "#64748B",
      "other expense": "#64748B"
    };

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "charts",
        pageTitle: "Property Analytics",
        pageSubtitle: "Visual charts for income, expenses, property status, project progress, agents, leads, tasks, documents, and support.",
        onReady: startChartsPage
      });
    });

    async function startChartsPage(context) {
      currentContext = context;

      const businessType = String(UnganiClientShared.getValue(context.tenant, ["business_type", "business_type_key"], "")).toLowerCase();
      const businessTypeKey = String(UnganiClientShared.getValue(context.tenant, ["business_type_key"], "")).toLowerCase();

      isRealEstate = businessType.includes("real estate") || businessTypeKey.includes("real_estate");

      const titleEl = document.querySelector(".ungani-topbar h2");
      const subEl = document.querySelector(".ungani-topbar p");

      if (titleEl) {
        titleEl.innerText = isRealEstate ? "Property Analytics" : "Business Analytics";
      }

      if (subEl) {
        subEl.innerText = isRealEstate
          ? "Visual charts for money movement, expense categories, property status, project progress, agents, leads, and tasks."
          : "Visual charts for money movement, items, people, tasks, documents, records, and support.";
      }

      await loadChartData();
    }

    async function loadChartData() {
      currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading analytics...");

      const responses = await Promise.all([
        safeSelect("transactions"),
        safeSelect("business_items"),
        safeSelect("client_people"),
        safeSelect("business_records"),
        safeSelect("tasks"),
        safeSelect("documents"),
        safeSelect("business_events"),
        safeSelect("support_issues")
      ]);

      chartData.transactions = responses[0];
      chartData.items = responses[1];
      chartData.people = responses[2];
      chartData.records = responses[3];
      chartData.tasks = responses[4];
      chartData.documents = responses[5];
      chartData.events = responses[6];
      chartData.support = responses[7];

      renderChartsPage();
    }

    async function safeSelect(tableName) {
      try {
        const response = await currentContext.supabaseClient
          .from(tableName)
          .select("*")
          .eq("tenant_id", currentContext.tenantId)
          .order("created_at", { ascending: false });

        if (response.error) {
          console.warn(tableName, response.error.message);
          return [];
        }

        return response.data || [];
      } catch (error) {
        console.warn(tableName, error.message);
        return [];
      }
    }

    function renderChartsPage() {
      const filtered = getFilteredData();

      const money = calculateMoney(filtered.transactions);
      const trend = calculateIncomeExpenseTrend(filtered.transactions);
      const expenses = calculateExpenseBreakdown(filtered.transactions);
      const propertyStatus = calculatePropertyStatus(filtered.items);
      const projects = calculateProjects(filtered.items);
      const agents = calculateAgentPerformance(filtered.people);
      const leads = calculateLeadPipeline(filtered.people, filtered.records);
      const tasks = calculateTaskStatus(filtered.tasks);
      const documents = calculateDocumentStatus(filtered.documents);
      const support = calculateSupportStatus(filtered.support);

      UnganiClientShared.setContent(`
        <style>
          .analytics-hero-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.25fr) minmax(260px, 0.75fr);
            gap: 18px;
            align-items: stretch;
          }

          .analytics-note {
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.09);
            border-radius: 24px;
            padding: 18px;
          }

          .analytics-note h3 {
            margin-top: 0;
            color: white;
          }

          .analytics-note p {
            color: rgba(255,255,255,0.72);
          }

          .analytics-filter-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
          }

          .chart-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
            align-items: start;
          }

          .chart-card {
            min-height: 360px;
          }

          .chart-title-row {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            align-items: flex-start;
            margin-bottom: 16px;
          }

          .chart-title-row h3 {
            margin: 0;
          }

          .money-summary-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 18px;
          }

          .money-box {
            border: 1px solid var(--ungani-border);
            border-radius: 20px;
            padding: 15px;
            background: var(--ungani-soft);
          }

          .money-box span {
            display: block;
            color: var(--ungani-muted);
            font-size: 12px;
            font-weight: 850;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 7px;
          }

          .money-box strong {
            display: block;

            letter-spacing: -0.04em;
            overflow-wrap: anywhere;
          }

          .trend-wrap {
            overflow-x: auto;
            padding-bottom: 6px;
          }

          .trend-chart {
            min-width: 520px;
            height: 260px;
            display: flex;
            align-items: flex-end;

          html[data-ungani-theme="dark"] .progress-track {

          }

          .mini-bar-head {

          .mini-bar-head strong {

              <p>
                ${isRealEstate

              <div class="ungani-button-row">

              </div>
            </div>

            <div class="analytics-note">

            </div>

        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>Filters</h3>

    function getFilteredData() {
      const from = document.getElementById("filterFrom") ? UnganiClientShared.value("filterFrom") : "";
      const to = document.getElementById("filterTo") ? UnganiClientShared.value("filterTo") : "";
      const query = document.getElementById("searchBox") ? UnganiClientShared.value("searchBox").toLowerCase() : "";

      return {
        transactions: filterRows(chartData.transactions, from, to, query, ["transaction_date", "created_at"]),
        items: filterRows(chartData.items, from, to, query, ["date_listed", "created_at"]),
        people: filterRows(chartData.people, from, to, query, ["last_follow_up_date", "created_at"]),
        records: filterRows(chartData.records, from, to, query, ["record_date", "viewing_date", "created_at"]),
        tasks: filterRows(chartData.tasks, from, to, query, ["due_date", "created_at"]),
        documents: filterRows(chartData.documents, from, to, query, ["created_at", "updated_at"]),
        events: filterRows(chartData.events, from, to, query, ["event_date", "created_at"]),
        support: filterRows(chartData.support, from, to, query, ["created_at", "updated_at"])
      };
    }

    function filterRows(rows, from, to, query, dateFields) {
      return rows.filter(function (row) {
        const date = getFirstDate(row, dateFields);
        const haystack = JSON.stringify(row || {}).toLowerCase();

        if (from && date && date < from) return false;
        if (to && date && date > to) return false;
        if (query && !haystack.includes(query)) return false;

        return true;
      });
    }

    function getFirstDate(row, fields) {
      for (let i = 0; i < fields.length; i++) {
        const value = UnganiClientShared.getValue(row, [fields[i]], "");

        if (value) {
          return String(value).slice(0, 10);
        }
      }

      return "";
    }

    function calculateMoney(rows) {
      let income = 0;
      let expenses = 0;
      let pending = 0;

      rows.forEach(function (row) {
        const amount = Number(UnganiClientShared.getValue(row, ["amount"], 0) || 0);
        const type = String(UnganiClientShared.getValue(row, ["transaction_type", "type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "completed")).toLowerCase();

        if (type.includes("income") || type.includes("sale") || type.includes("rental")) {
          income += amount;
        } else if (type.includes("expense") || type.includes("petty")) {
          expenses += amount;
        }

        if (status.includes("pending")) {
          pending += amount;
        }
      });

      return {
        income,
        expenses,
        pending,
        balance: income - expenses
      };
    }

    function calculateIncomeExpenseTrend(rows) {
      const map = {};

      rows.forEach(function (row) {
        const amount = Number(UnganiClientShared.getValue(row, ["amount"], 0) || 0);
        const type = String(UnganiClientShared.getValue(row, ["transaction_type", "type"], "")).toLowerCase();
        const rawDate = UnganiClientShared.getValue(row, ["transaction_date", "created_at"], "");

        if (!rawDate) return;

        const date = new Date(rawDate);
        if (isNaN(date.getTime())) return;

        const key = date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0");
        const label = date.toLocaleDateString("en-KE", { month: "short", year: "numeric" });

        if (!map[key]) {
          map[key] = {
            key,
            label,
            income: 0,
            expenses: 0
          };
        }

        if (type.includes("income") || type.includes("sale") || type.includes("rental")) {
          map[key].income += amount;
        } else if (type.includes("expense") || type.includes("petty")) {
          map[key].expenses += amount;
        }
      });

      return Object.keys(map)
        .sort()
        .map(function (key) {
          return map[key];
        });
    }

    function calculateExpenseBreakdown(rows) {
      const map = {};

      rows.forEach(function (row) {
        const amount = Number(UnganiClientShared.getValue(row, ["amount"], 0) || 0);
        const type = String(UnganiClientShared.getValue(row, ["transaction_type", "type"], "")).toLowerCase();

        if (!type.includes("expense") && !type.includes("petty")) return;

        const category = normalizeExpenseCategory(UnganiClientShared.getValue(row, ["category_name", "category", "category_key"], "Other Expense"));
        map[category] = (map[category] || 0) + amount;
      });

      return Object.keys(map).map(function (key) {
        return {
          label: key,
          value: Number(map[key] || 0),
          color: getExpenseCategoryColor(key)
        };
      }).sort(function (a, b) {
        return b.value - a.value;
      });
    }

    function normalizeExpenseCategory(category) {
      const lower = String(category || "Other Expense").toLowerCase();

      if (lower.includes("agent") && lower.includes("commission")) return "Agent Commission";
      if (lower.includes("marketing") || lower.includes("advertising")) return "Marketing / Advertising";
      if (lower.includes("legal") || lower.includes("documentation")) return "Legal / Documentation Fees";
      if (lower.includes("maintenance") || lower.includes("repair")) return "Property Maintenance";
      if (lower.includes("staff") || lower.includes("wage")) return "Staff Wages";
      if (lower.includes("transport") || lower.includes("site visit")) return "Site Visit / Transport Cost";
      if (lower.includes("material") || lower.includes("project")) return "Project Material Cost";

      return category || "Other Expense";
    }

    function getExpenseCategoryColor(category) {
      const lower = String(category || "").toLowerCase();

      if (CATEGORY_COLORS[lower]) {
        return CATEGORY_COLORS[lower];
      }

      if (lower.includes("agent")) return CATEGORY_COLORS["agent commission"];
      if (lower.includes("marketing") || lower.includes("advertising")) return CATEGORY_COLORS["marketing / advertising"];
      if (lower.includes("legal") || lower.includes("documentation")) return CATEGORY_COLORS["legal / documentation fees"];
      if (lower.includes("maintenance") || lower.includes("repair")) return CATEGORY_COLORS["property maintenance"];
      if (lower.includes("staff") || lower.includes("wage")) return CATEGORY_COLORS["staff wages"];
      if (lower.includes("transport") || lower.includes("site visit")) return CATEGORY_COLORS["site visit / transport cost"];
      if (lower.includes("material") || lower.includes("project")) return CATEGORY_COLORS["project material cost"];

      return "#64748B";
    }

    function calculatePropertyStatus(rows) {
      const map = {};

      rows.forEach(function (row) {
        const status = UnganiClientShared.getValue(row, ["property_status", "item_status", "status"], "Unknown");
        map[status] = (map[status] || 0) + 1;
      });

      return mapToRows(map);
    }

    function calculateProjects(rows) {
      const map = {};

      rows.forEach(function (row) {
        const project = UnganiClientShared.getValue(row, ["project_name"], "");

        if (!project) return;

        if (!map[project]) {
          map[project] = {
            name: project,
            count: 0,
            totalUnits: 0,
            unitsSold: 0,
            unitsAvailable: 0,
            progressTotal: 0,
            progressCount: 0,
            value: 0
          };
        }

        const item = map[project];

        item.count += 1;
        item.totalUnits += Number(UnganiClientShared.getValue(row, ["total_units"], 0) || 0);
        item.unitsSold += Number(UnganiClientShared.getValue(row, ["units_sold"], 0) || 0);
        item.unitsAvailable += Number(UnganiClientShared.getValue(row, ["units_available"], 0) || 0);
        item.value += Number(UnganiClientShared.getValue(row, ["property_price", "selling_price", "cost_price"], 0) || 0);

        const progress = Number(UnganiClientShared.getValue(row, ["project_progress_percent"], 0) || 0);

        if (progress > 0) {
          item.progressTotal += progress;
          item.progressCount += 1;
        }
      });

      return Object.keys(map).map(function (key) {
        const item = map[key];

        if (item.progressCount > 0) {
          item.progress = Math.round(item.progressTotal / item.progressCount);
        } else if (item.totalUnits > 0) {
          item.progress = Math.round((item.unitsSold / item.totalUnits) * 100);
        } else {
          item.progress = 0;
        }

        item.progress = Math.max(0, Math.min(100, item.progress));

        return item;
      }).sort(function (a, b) {
        return b.value - a.value;
      });
    }

    function calculateAgentPerformance(rows) {
      const agents = rows.filter(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["person_type"], "")).toLowerCase();

        if (isRealEstate) {
          return type === "agent";
        }

        return type === "staff" || type === "manager" || type === "agent" || type === "sales";
      });

      agents.sort(function (a, b) {
        const aDeals = Number(UnganiClientShared.getValue(a, ["deals_closed"], 0) || 0);
        const bDeals = Number(UnganiClientShared.getValue(b, ["deals_closed"], 0) || 0);
        const aCommission = Number(UnganiClientShared.getValue(a, ["commission_earned_month"], 0) || 0);
        const bCommission = Number(UnganiClientShared.getValue(b, ["commission_earned_month"], 0) || 0);

        return (bDeals * 1000000 + bCommission) - (aDeals * 1000000 + aCommission);
      });

      return agents.slice(0, 6);
    }

    function calculateLeadPipeline(peopleRows, recordRows) {
      const map = {};

      peopleRows.forEach(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["person_type"], "")).toLowerCase();

        if (isRealEstate && type !== "lead" && type !== "buyer" && type !== "renter" && type !== "tenant") return;

        let stage = UnganiClientShared.getValue(row, ["lead_status", "relationship_status", "status"], "");

        if (!stage) {
          stage = type || "Contact";
        }

        map[stage] = (map[stage] || 0) + 1;
      });

      recordRows.forEach(function (row) {
        const recordType = String(UnganiClientShared.getValue(row, ["record_type"], "")).toLowerCase();

        if (isRealEstate && !recordType.includes("lead") && !recordType.includes("viewing") && !recordType.includes("inquiry")) return;

        const stage = UnganiClientShared.getValue(row, ["lead_status", "deal_status", "status"], "Record");
        map[stage] = (map[stage] || 0) + 1;
      });

      return mapToRows(map);
    }

    function calculateTaskStatus(rows) {
      const today = new Date().toISOString().slice(0, 10);
      const map = {
        pending: 0,
        "in progress": 0,
        completed: 0,
        overdue: 0
      };

      rows.forEach(function (row) {
        const status = String(UnganiClientShared.getValue(row, ["status"], "pending")).toLowerCase();
        const due = String(UnganiClientShared.getValue(row, ["due_date"], "")).slice(0, 10);

        if (due && due < today && !status.includes("completed") && !status.includes("cancelled")) {
          map.overdue += 1;
        }

        if (status.includes("completed")) {
          map.completed += 1;
        } else if (status.includes("progress")) {
          map["in progress"] += 1;
        } else if (!status.includes("cancelled")) {
          map.pending += 1;
        }
      });

      return mapToRows(map);
    }

    function calculateDocumentStatus(rows) {
      const map = {};

      rows.forEach(function (row) {
        const type = UnganiClientShared.getValue(row, ["document_type", "category", "status"], "Document");
        map[type] = (map[type] || 0) + 1;
      });

      return mapToRows(map);
    }

    function calculateSupportStatus(rows) {
      const map = {};

      rows.forEach(function (row) {
        const status = UnganiClientShared.getValue(row, ["status"], "Open");
        map[status] = (map[status] || 0) + 1;
      });

      return mapToRows(map);
    }

    function mapToRows(map) {
      return Object.keys(map).map(function (key) {
        return {
          label: key,
          value: Number(map[key] || 0)
        };
      }).sort(function (a, b) {
        return b.value - a.value;
      });
    }

    function renderIncomeExpenseTrend(rows) {
      const cleanRows = (rows || []).filter(function (row) {
        return Number(row.income || 0) !== 0 || Number(row.expenses || 0) !== 0;
      });

      if (cleanRows.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No trend data yet</h3>
            <p>Add dated income and expense records to see income vs expenses over time.</p>
          </div>
        `;
      }

      const maxValue = Math.max.apply(null, cleanRows.map(function (row) {
        return Math.max(Number(row.income || 0), Number(row.expenses || 0));
      })) || 1;

      return `
        <div class="trend-wrap">
          <div class="trend-chart">
            ${cleanRows.map(function (row) {
              const incomeHeight = Math.max(4, Math.round((Number(row.income || 0) / maxValue) * 100));
              const expenseHeight = Math.max(4, Math.round((Number(row.expenses || 0) / maxValue) * 100));

              return `
                <div class="trend-group">
                  <div
                    class="trend-bar income"
                    style="height:${incomeHeight}%;"
                    title="Income: ${UnganiClientShared.attr(UnganiClientShared.formatKES(row.income))}"
                  ></div>
                  <div
                    class="trend-bar expense"
                    style="height:${expenseHeight}%;"
                    title="Expenses: ${UnganiClientShared.attr(UnganiClientShared.formatKES(row.expenses))}"
                  ></div>
                  <div class="trend-label">${UnganiClientShared.safe(row.label)}</div>
                </div>
              `;
            }).join("")}
          </div>
        </div>

        <div class="chart-legend">
          <span class="legend-item"><span class="legend-dot" style="background:#15803D;"></span>Income</span>
          <span class="legend-item"><span class="legend-dot" style="background:#D4A63A;"></span>Expenses</span>
        </div>
      `;
    }

    function renderExpenseDonut(rows) {
      const cleanRows = (rows || []).filter(function (row) {
        return Number(row.value || 0) > 0;
      });

      if (cleanRows.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No expense breakdown yet</h3>
            <p>Add expense records such as Agent Commission, Marketing, Legal Fees, or Property Maintenance to see a donut chart.</p>
          </div>
        `;
      }

      const total = cleanRows.reduce(function (sum, row) {
        return sum + Number(row.value || 0);
      }, 0);

      let current = 0;
      const gradientParts = cleanRows.map(function (row) {
        const start = current;
        const percent = total > 0 ? (Number(row.value || 0) / total) * 100 : 0;
        const end = current + percent;
        current = end;

        return `${row.color} ${start}% ${end}%`;
      });

      return `
        <div class="donut-layout">
          <div class="donut-chart" style="background: conic-gradient(${gradientParts.join(", ")});">
            <div class="donut-center">
              <strong>${UnganiClientShared.safe(UnganiClientShared.formatKES(total))}</strong>
              <span>Total Expenses</span>
            </div>
          </div>

          <div>
            ${cleanRows.map(function (row) {
              const percent = total > 0 ? Math.round((Number(row.value || 0) / total) * 100) : 0;

              return `
                <div class="donut-legend-row">
                  <span class="legend-dot" style="background:${UnganiClientShared.attr(row.color)};"></span>
                  <div>
                    <strong>${UnganiClientShared.safe(row.label)}</strong>
                    <span>${UnganiClientShared.safe(UnganiClientShared.formatKES(row.value))}</span>
                  </div>
                  <strong>${percent}%</strong>
                </div>
              `;
            }).join("")}
          </div>
        </div>
      `;
    }

    function renderProjectProgress(projects) {
      if (!projects || projects.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No project progress yet</h3>
            <p>${isRealEstate ? "Add project names, total units, and sold units under Properties / Listings." : "Add project or work progress details under Items / Assets."}</p>
          </div>
        `;
      }

      return projects.slice(0, 5).map(function (project) {
        const percent = Math.max(0, Math.min(100, Number(project.progress || 0)));

        return `
          <div class="progress-card">
            <div class="chart-title-row" style="margin-bottom:8px;">
              <div>
                <h3 style="font-size:16px;">${UnganiClientShared.safe(project.name)}</h3>
                <p class="ungani-small">${project.count} listing(s) · ${project.unitsSold}/${project.totalUnits} units sold</p>
              </div>
              <span class="ungani-badge ${progressColor(percent)}">${percent}%</span>
            </div>

            <div class="progress-track">
              <div class="progress-fill" style="width:${percent}%;"></div>
            </div>

            <p class="ungani-small">
              ${project.unitsAvailable} available · ${UnganiClientShared.safe(UnganiClientShared.formatKES(project.value))} estimated value
            </p>
          </div>
        `;
      }).join("");
    }

    function renderMiniBars(rows, emptyMessage) {
      const cleanRows = (rows || []).filter(function (row) {
        return Number(row.value || 0) !== 0;
      });

      if (cleanRows.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No chart data</h3>
            <p>${UnganiClientShared.safe(emptyMessage || "No data available yet.")}</p>
          </div>
        `;
      }

      const maxValue = Math.max.apply(null, cleanRows.map(function (row) {
        return Math.abs(Number(row.value || 0));
      })) || 1;

      return cleanRows.slice(0, 8).map(function (row) {
        const value = Number(row.value || 0);
        const width = Math.max(4, Math.round((Math.abs(value) / maxValue) * 100));
        const color = getMeaningColor(row.label);

        return `
          <div class="mini-bar-row">
            <div class="mini-bar-head">
              <strong>${UnganiClientShared.safe(toTitle(row.label))}</strong>
              <span class="ungani-small">${UnganiClientShared.safe(value)}</span>
            </div>

            <div class="mini-bar-track">
              <div class="mini-bar-fill ${UnganiClientShared.attr(color)}" style="width:${width}%;"></div>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderAgentPerformance(agents) {
      if (!agents || agents.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No performance data yet</h3>
            <p>${isRealEstate ? "Add agents with deals closed or commission earned to show performance." : "Add people records with activity values to show performance."}</p>
          </div>
        `;
      }

      return agents.map(function (agent, index) {
        const name = UnganiClientShared.getValue(agent, ["full_name", "name"], "Person");
        const deals = Number(UnganiClientShared.getValue(agent, ["deals_closed"], 0) || 0);
        const commission = Number(UnganiClientShared.getValue(agent, ["commission_earned_month"], 0) || 0);
        const type = UnganiClientShared.getValue(agent, ["person_type"], "person");

        return `
          <div class="leader-row">
            <div class="leader-rank">${index + 1}</div>

            <div>
              <strong>${UnganiClientShared.safe(name)}</strong>
              <p class="ungani-small" style="margin:4px 0 0;">${UnganiClientShared.safe(toTitle(type))}</p>
            </div>

            <div style="text-align:right;">
              <strong>${deals} deal(s)</strong>
              <p class="ungani-small" style="margin:4px 0 0;">${UnganiClientShared.safe(UnganiClientShared.formatKES(commission))}</p>
            </div>
          </div>
        `;
      }).join("");
    }

    function progressColor(percent) {
      const value = Number(percent || 0);

      if (value >= 75) return "green";
      if (value >= 35) return "gold";
      return "red";
    }

    function getMeaningColor(label) {
      const lower = String(label || "").toLowerCase();

      if (
        lower.includes("income") ||
        lower.includes("available") ||
        lower.includes("completed") ||
        lower.includes("closed") ||
        lower.includes("sold") ||
        lower.includes("rented") ||
        lower.includes("resolved") ||
        lower.includes("active")
      ) {
        return "green";
      }

      if (
        lower.includes("urgent") ||
        lower.includes("overdue") ||
        lower.includes("lost") ||
        lower.includes("cancelled") ||
        lower.includes("failed")
      ) {
        return "red";
      }

      return "gold";
    }

    function restoreFilters() {
      if (document.getElementById("filterFrom")) document.getElementById("filterFrom").value = sessionStorage.getItem("ungani_charts_filter_from") || "";
      if (document.getElementById("filterTo")) document.getElementById("filterTo").value = sessionStorage.getItem("ungani_charts_filter_to") || "";
      if (document.getElementById("searchBox")) document.getElementById("searchBox").value = sessionStorage.getItem("ungani_charts_search") || "";
    }

    function saveFilters() {
      if (document.getElementById("filterFrom")) sessionStorage.setItem("ungani_charts_filter_from", UnganiClientShared.value("filterFrom"));
      if (document.getElementById("filterTo")) sessionStorage.setItem("ungani_charts_filter_to", UnganiClientShared.value("filterTo"));
      if (document.getElementById("searchBox")) sessionStorage.setItem("ungani_charts_search", UnganiClientShared.value("searchBox"));
    }

    function resetFilters() {
      sessionStorage.removeItem("ungani_charts_filter_from");
      sessionStorage.removeItem("ungani_charts_filter_to");
      sessionStorage.removeItem("ungani_charts_search");
      renderChartsPage();
      UnganiClientShared.showToast("Chart filters reset ✓");
    }

    function toTitle(value) {
      return String(value || "")
        .replace(/_/g, " ")
        .replace(/\w\S*/g, function (text) {
          return text.charAt(0).toUpperCase() + text.substr(1).toLowerCase();
        });
    }
  </script>
</body>
