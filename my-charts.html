<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Premium Analytics</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-shared.js" onerror="window.__unganiClientSharedFailed = true;"></script>
  <script>
    (function () {
      function showUnganiLoadError() {
        if (typeof UnganiClientShared !== "undefined") return;

        var banner = document.createElement("div");
        banner.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99999;background:#B91C1C;color:#fff;padding:12px 16px;font:14px/1.4 -apple-system,sans-serif;text-align:center;";
        banner.innerHTML = "Some page resources failed to load. Please check your connection. " +
          "<button style=\"margin-left:10px;padding:4px 12px;border:none;border-radius:6px;background:#fff;color:#B91C1C;font-weight:700;cursor:pointer;\" onclick=\"window.location.reload()\">Reload</button>";

        if (document.body) {
          document.body.prepend(banner);
        } else {
          document.addEventListener("DOMContentLoaded", function () {
            document.body.prepend(banner);
          });
        }
      }

      if (window.__unganiClientSharedFailed) {
        showUnganiLoadError();
      } else {
        setTimeout(function () {
          if (typeof UnganiClientShared === "undefined") showUnganiLoadError();
        }, 4000);
      }
    })();
  </script>
  <script src="ungani-business-config.js"></script>
  <script src="ungani-analytics.js"></script>
</head>

<body>
  <script>
    let currentContext = null;
    let businessProfile = null;

    let chartData = {
      transactions: [],
      items: [],
      people: [],
      records: [],
      tasks: [],
      documents: [],
      events: [],
      support: []
    };

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "charts",
        pageTitle: "Analytics",
        pageSubtitle: "Premium visual charts for business operations.",
        onReady: startChartsPage
      });
    });

    async function startChartsPage(context) {
      currentContext = context;
      businessProfile = UnganiAnalytics.getBusinessProfile(context.tenant);
      UnganiAnalytics.injectChartStyles();

      const titleEl = document.querySelector(".ungani-topbar h2");
      const subEl = document.querySelector(".ungani-topbar p");

      if (titleEl) titleEl.innerText = businessProfile.chartsTitle;
      if (subEl) subEl.innerText = "Live visual charts for " + businessProfile.itemsTitle.toLowerCase() + ", money, people, tasks, documents, and support.";

      await loadChartData();
    }

    async function loadChartData() {
      currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading premium analytics...");

      const responses = await Promise.all([
        safeSelect("transactions"),
        safeSelect("business_items"),
        safeSelect("client_people"),
        safeSelect("business_records"),
        safeSelect("tasks"),
        safeSelect("documents"),
        safeSelect("business_events"),
        safeSelect("support_issues")
      ]);

      chartData.transactions = responses[0];
      chartData.items = responses[1];
      chartData.people = responses[2];
      chartData.records = responses[3];
      chartData.tasks = responses[4];
      chartData.documents = responses[5];
      chartData.events = responses[6];
      chartData.support = responses[7];

      renderChartsPage();
    }

    async function safeSelect(tableName) {
      try {
        const response = await currentContext.supabaseClient
          .from(tableName)
          .select("*")
          .eq("tenant_id", currentContext.tenantId)
          .order("created_at", { ascending: false });

        if (response.error) {
          console.warn(tableName, response.error.message);
          return [];
        }

        return response.data || [];
      } catch (error) {
        console.warn(tableName, error.message);
        return [];
      }
    }

    function renderChartsPage() {
      const filtered = getFilteredData();

      const money = UnganiAnalytics.calculateMoney(filtered.transactions);
      const trend = UnganiAnalytics.calculateIncomeExpenseTrend(filtered.transactions);
      const expenses = UnganiAnalytics.calculateExpenseBreakdown(filtered.transactions);

      const itemSummary = UnganiAnalytics.calculatePropertySummary(filtered.items);
      const peopleSummary = UnganiAnalytics.calculatePeopleRoleSummary(filtered.people, businessProfile);
      const taskSummary = UnganiAnalytics.calculateTaskSummary(filtered.tasks);

      const itemStatus = UnganiAnalytics.calculateStatus(filtered.items, ["property_status", "item_status", "status"]);
      const projects = UnganiAnalytics.calculateProjects(filtered.items);
      const performers = UnganiAnalytics.calculateAgentPerformance(filtered.people, businessProfile);
      const performerChartRows = buildPerformerChartRows(performers);

      const pipeline = UnganiAnalytics.calculateLeadPipeline(filtered.people, filtered.records, businessProfile);
      const taskStatus = UnganiAnalytics.mapToRows({
        Pending: taskSummary.pending,
        "In Progress": taskSummary.inProgress,
        Completed: taskSummary.completed,
        Overdue: taskSummary.overdue
      });

      const calendarActivity = UnganiAnalytics.calculateStatus(filtered.events, ["event_type", "status"]);
      const documentStatus = UnganiAnalytics.calculateStatus(filtered.documents, ["document_type", "category", "status"]);
      const supportStatus = UnganiAnalytics.calculateStatus(filtered.support, ["status"]);

      UnganiClientShared.setContent(`
        <style>
          .premium-analytics-hero {
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
            gap: 18px;
            align-items: stretch;
          }

          .premium-analytics-hero h2 {
            font-size: clamp(32px, 4vw, 54px);
            line-height: 1.02;
            margin: 18px 0 12px;
            letter-spacing: -0.055em;
          }

          .premium-chart-note {
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.09);
            border-radius: 24px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
          }

          .premium-chart-note h3 {
            color: white;
            margin: 0 0 8px;
          }

          .premium-chart-note p {
            color: rgba(255,255,255,0.74);
            margin: 0;
            line-height: 1.55;
          }

          .premium-color-guide {
            display: grid;
            gap: 8px;
            margin-top: 18px;
          }

          .premium-color-guide span {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.76);
            font-size: 12px;
            font-weight: 800;
          }

          .premium-dot {
            width: 11px;
            height: 11px;
            border-radius: 999px;
          }

          .analytics-filter-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
          }

          .analytics-summary-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 18px;
          }

          .premium-stat-card {
            display: block;
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            background: var(--ungani-card);
            border: 1px solid var(--ungani-border);
            box-shadow: var(--ungani-shadow);
            padding: 20px;
            min-height: 142px;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
          }

          .premium-stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--ungani-shadow-hover);
            border-color: rgba(212,166,58,0.42);
          }

          .premium-stat-card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 18px;
            bottom: 18px;
            width: 5px;
            border-radius: 0 999px 999px 0;
            background: var(--accent);
          }

          .premium-stat-card span {
            color: var(--ungani-muted);
            font-size: 12px;
            font-weight: 950;
            text-transform: uppercase;
            letter-spacing: 0.055em;
          }

          .premium-stat-card h3 {
            margin: 17px 0 8px;
            font-size: clamp(25px, 3vw, 36px);
            line-height: 1;
            letter-spacing: -0.055em;
          }

          .premium-stat-card p {
            margin: 0;
            color: var(--ungani-muted);
            font-size: 13px;
          }

          .main-chart-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 18px;
            align-items: start;
            margin-bottom: 18px;
          }

          .small-chart-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
            align-items: start;
            margin-bottom: 18px;
          }

          .expense-breakdown-list {
            display: grid;
            gap: 10px;
            margin-top: 16px;
          }

          .expense-row {
            display: grid;
            grid-template-columns: 14px minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid var(--ungani-border);
            padding: 9px 0;
          }

          .expense-row:last-child {
            border-bottom: 0;
          }

          .expense-row strong {
            font-size: 13px;
          }

          .expense-row span {
            color: var(--ungani-muted);
            font-size: 12px;
            font-weight: 800;
          }

          @media (max-width: 1180px) {
            .premium-analytics-hero,
            .main-chart-grid,
            .small-chart-grid {
              grid-template-columns: 1fr;
            }

            .analytics-summary-grid {
              grid-template-columns: repeat(2, minmax(0, 1fr));
            }
          }

          @media (max-width: 680px) {
            .analytics-filter-grid,
            .analytics-summary-grid {
              grid-template-columns: 1fr;
            }
          }
        </style>

        <section class="ungani-card ungani-hero">
          <div class="premium-analytics-hero">
            <div>
              <span class="ungani-badge gold">${UnganiClientShared.safe(businessProfile.badge)}</span>
              <h2>${UnganiClientShared.safe(businessProfile.chartsTitle)}</h2>
              <p>${UnganiClientShared.safe(businessProfile.hero)}</p>

              <div class="ungani-button-row">
                <button class="ungani-btn gold" onclick="loadChartData()">Refresh Charts</button>
                <a class="ungani-btn green" href="client.html">Dashboard</a>
                <a class="ungani-btn light" href="reports.html">Reports</a>
              </div>
            </div>

            <div class="premium-chart-note">
              <div>
                <h3>Premium color logic</h3>
                <p>Colors are intentional. Red is reserved only for attention-needed items, not normal categories.</p>
              </div>

              <div class="premium-color-guide">
                <span><i class="premium-dot" style="background:#16A34A;"></i>Green: income, positive, completed, available</span>
                <span><i class="premium-dot" style="background:#D4A63A;"></i>Gold: neutral, informational, in progress</span>
                <span><i class="premium-dot" style="background:#2563EB;"></i>Blue/Violet/Teal: normal categories</span>
                <span><i class="premium-dot" style="background:#DC2626;"></i>Red: overdue, urgent, lost, cancelled</span>
              </div>
            </div>
          </div>
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>Filters</h3>
              <p class="ungani-small">Filter analytics by date or search term. Charts update from the same client data.</p>
            </div>
            <button class="ungani-btn dark" onclick="resetFilters()">Reset Filters</button>
          </div>

          <div class="analytics-filter-grid">
            <div>
              <label for="filterFrom">From Date</label>
              <input id="filterFrom" type="date" onchange="saveFilters(); renderChartsPage();" />
            </div>

            <div>
              <label for="filterTo">To Date</label>
              <input id="filterTo" type="date" onchange="saveFilters(); renderChartsPage();" />
            </div>

            <div>
              <label for="searchBox">Search</label>
              <input id="searchBox" placeholder="Search records..." oninput="saveFilters(); renderChartsPage();" />
            </div>
          </div>
        </section>

        <section class="analytics-summary-grid">
          ${statCard("Income", UnganiAnalytics.compactMoney(money.income), "Same source as Dashboard", "#16A34A", "my-money.html")}
          ${statCard("Expenses", UnganiAnalytics.compactMoney(money.expenses), "Same source as Dashboard", "#D4A63A", "my-money.html")}
          ${statCard("Balance", UnganiAnalytics.compactMoney(money.balance), "Income minus expenses", money.balance >= 0 ? "#16A34A" : "#DC2626", "my-money.html")}
          ${statCard(businessProfile.itemPlural, itemSummary.total, itemSummary.available + " " + businessProfile.availableText + " · " + itemSummary.closed + " " + businessProfile.closedText, "#2563EB", "my-items.html")}
        </section>

        <section class="main-chart-grid">
          <div class="ungani-card ungani-chart-card">
            <div class="ungani-chart-head">
              <div>
                <h3>Income vs Expenses Over Time</h3>
                <p class="ungani-small">Animated monthly trend with income, expenses, and balance line.</p>
              </div>
              <a class="ungani-btn green" href="my-money.html">Money</a>
            </div>

            ${trend.length ? '<div class="ungani-chart-canvas-wrap"><canvas id="chartIncomeExpense"></canvas></div>' : UnganiAnalytics.emptyChart("Add dated income and expense records to show monthly trends.")}
          </div>

          <div class="ungani-card ungani-chart-card">
            <div class="ungani-chart-head">
              <div>
                <h3>Expense Breakdown</h3>
                <p class="ungani-small">Animated donut chart with category share and percentage.</p>
              </div>
              <a class="ungani-btn green" href="my-money.html">Money</a>
            </div>

            ${expenses.length ? '<div class="ungani-chart-canvas-wrap"><canvas id="chartExpenseDonut"></canvas></div>' : UnganiAnalytics.emptyChart("Add expense records to show category breakdown.")}
            ${renderExpenseBreakdownList(expenses)}
          </div>
        </section>

        <section class="small-chart-grid">
          <div class="ungani-card ungani-chart-card">
            <div class="ungani-chart-head">
              <div>
                <h3>${UnganiClientShared.safe(businessProfile.statusTitle)}</h3>
                <p class="ungani-small">Animated status split for this business type.</p>
              </div>
              <a class="ungani-btn" href="my-items.html">Open</a>
            </div>

            ${hasValues(itemStatus) ? '<div class="ungani-chart-canvas-wrap"><canvas id="chartItemStatus"></canvas></div>' : UnganiAnalytics.emptyChart("Add records with statuses to show this chart.")}
          </div>

          <div class="ungani-card">
            <div class="ungani-chart-head">
              <div>
                <h3>${UnganiClientShared.safe(businessProfile.progressTitle)}</h3>
                <p class="ungani-small">Progress cards remain simple and consistent with the dashboard.</p>
              </div>
              <a class="ungani-btn" href="my-items.html">Open</a>
            </div>

            ${renderProjectProgress(projects)}
          </div>
        </section>

        <section class="small-chart-grid">
          <div class="ungani-card ungani-chart-card">
            <div class="ungani-chart-head">
              <div>
                <h3>${UnganiClientShared.safe(businessProfile.pipelineTitle)}</h3>
                <p class="ungani-small">Animated horizontal chart by pipeline/status stage.</p>
              </div>
              <a class="ungani-btn gold" href="my-people.html">People</a>
            </div>

            ${hasValues(pipeline) ? '<div class="ungani-chart-canvas-wrap"><canvas id="chartPipeline"></canvas></div>' : UnganiAnalytics.emptyChart("Add people or records to show the pipeline.")}
          </div>

          <div class="ungani-card ungani-chart-card">
            <div class="ungani-chart-head">
              <div>
                <h3>Task Status</h3>
                <p class="ungani-small">Pending, in progress, completed, and overdue tasks.</p>
              </div>
              <a class="ungani-btn gold" href="my-tasks.html">Tasks</a>
            </div>

            ${hasValues(taskStatus) ? '<div class="ungani-chart-canvas-wrap"><canvas id="chartTaskStatus"></canvas></div>' : UnganiAnalytics.emptyChart("Add tasks to show task status.")}
          </div>
        </section>

        <section class="small-chart-grid">
          <div class="ungani-card ungani-chart-card">
            <div class="ungani-chart-head">
              <div>
                <h3>${UnganiClientShared.safe(businessProfile.topPerformerTitle)}</h3>
                <p class="ungani-small">Animated ranking chart plus clear list.</p>
              </div>
              <a class="ungani-btn gold" href="my-people.html">People</a>
            </div>

            ${hasValues(performerChartRows) ? '<div class="ungani-chart-canvas-wrap small"><canvas id="chartPerformers"></canvas></div>' : UnganiAnalytics.emptyChart("Add deals, jobs, work, or commission data to show performance.")}
            ${renderPerformerList(performers)}
          </div>

          <div class="ungani-card ungani-chart-card">
            <div class="ungani-chart-head">
              <div>
                <h3>${UnganiClientShared.safe(businessProfile.calendarTitle)}</h3>
                <p class="ungani-small">Appointments, follow-ups, work dates, and reminders.</p>
              </div>
              <a class="ungani-btn green" href="my-calendar.html">Calendar</a>
            </div>

            ${hasValues(calendarActivity) ? '<div class="ungani-chart-canvas-wrap small"><canvas id="chartCalendarActivity"></canvas></div>' : UnganiAnalytics.emptyChart("Add calendar events to show activity.")}
          </div>
        </section>

        <section class="small-chart-grid">
          <div class="ungani-card ungani-chart-card">
            <div class="ungani-chart-head">
              <div>
                <h3>Documents</h3>
                <p class="ungani-small">Document records by type or status.</p>
              </div>
              <a class="ungani-btn" href="my-documents.html">Documents</a>
            </div>

            ${hasValues(documentStatus) ? '<div class="ungani-chart-canvas-wrap small"><canvas id="chartDocuments"></canvas></div>' : UnganiAnalytics.emptyChart("Add documents to show this chart.")}
          </div>

          <div class="ungani-card ungani-chart-card">
            <div class="ungani-chart-head">
              <div>
                <h3>Support Status</h3>
                <p class="ungani-small">Open, in progress, resolved, or closed support issues.</p>
              </div>
              <a class="ungani-btn dark" href="my-support.html">Support</a>
            </div>

            ${hasValues(supportStatus) ? '<div class="ungani-chart-canvas-wrap small"><canvas id="chartSupport"></canvas></div>' : UnganiAnalytics.emptyChart("Add support issues to show this chart.")}
          </div>
        </section>

        <p class="ungani-small">
          Charts Version: Step 309D Universal Business Analytics · ungani.com · info@ungani.com
        </p>
      `);

      restoreFilters();

      setTimeout(function () {
        renderAllCharts({
          trend,
          expenses,
          itemStatus,
          pipeline,
          taskStatus,
          performerChartRows,
          calendarActivity,
          documentStatus,
          supportStatus
        });
      }, 120);
    }

    async function renderAllCharts(data) {
      try {
        if (data.trend.length) await UnganiAnalytics.renderIncomeExpenseChart("chartIncomeExpense", data.trend);
        if (data.expenses.length) await UnganiAnalytics.renderExpenseDonutChart("chartExpenseDonut", data.expenses);
        if (hasValues(data.itemStatus)) await UnganiAnalytics.renderDoughnutStatusChart("chartItemStatus", data.itemStatus);
        if (hasValues(data.pipeline)) await UnganiAnalytics.renderHorizontalBarChart("chartPipeline", data.pipeline, "Records");
        if (hasValues(data.taskStatus)) await UnganiAnalytics.renderDoughnutStatusChart("chartTaskStatus", data.taskStatus);
        if (hasValues(data.performerChartRows)) await UnganiAnalytics.renderHorizontalBarChart("chartPerformers", data.performerChartRows, "Performance");
        if (hasValues(data.calendarActivity)) await UnganiAnalytics.renderHorizontalBarChart("chartCalendarActivity", data.calendarActivity, "Events");
        if (hasValues(data.documentStatus)) await UnganiAnalytics.renderDoughnutStatusChart("chartDocuments", data.documentStatus);
        if (hasValues(data.supportStatus)) await UnganiAnalytics.renderDoughnutStatusChart("chartSupport", data.supportStatus);
      } catch (error) {
        console.warn("Charts warning:", error.message);
      }
    }

    function getFilteredData() {
      const from = getFilterValue("filterFrom", "ungani_charts_filter_from");
      const to = getFilterValue("filterTo", "ungani_charts_filter_to");
      const query = getFilterValue("searchBox", "ungani_charts_search").toLowerCase();

      return {
        transactions: filterRows(chartData.transactions, from, to, query, ["transaction_date", "created_at"]),
        items: filterRows(chartData.items, from, to, query, ["date_listed", "created_at"]),
        people: filterRows(chartData.people, from, to, query, ["last_follow_up_date", "created_at"]),
        records: filterRows(chartData.records, from, to, query, ["record_date", "viewing_date", "created_at"]),
        tasks: filterRows(chartData.tasks, from, to, query, ["due_date", "created_at"]),
        documents: filterRows(chartData.documents, from, to, query, ["created_at", "updated_at"]),
        events: filterRows(chartData.events, from, to, query, ["event_date", "created_at"]),
        support: filterRows(chartData.support, from, to, query, ["created_at", "updated_at"])
      };
    }

    function filterRows(rows, from, to, query, dateFields) {
      return rows.filter(function (row) {
        const date = getFirstDate(row, dateFields);
        const haystack = JSON.stringify(row || {}).toLowerCase();

        if (from && date && date < from) return false;
        if (to && date && date > to) return false;
        if (query && !haystack.includes(query)) return false;

        return true;
      });
    }

    function getFirstDate(row, fields) {
      for (let i = 0; i < fields.length; i++) {
        const value = UnganiAnalytics.safeGet(row, [fields[i]], "");

        if (value) return String(value).slice(0, 10);
      }

      return "";
    }

    function buildPerformerChartRows(performers) {
      return (performers || []).map(function (person) {
        const name = UnganiAnalytics.safeGet(person, ["full_name", "name"], "Person");
        const deals = Number(UnganiAnalytics.safeGet(person, ["deals_closed"], 0) || 0);
        const commission = Number(UnganiAnalytics.safeGet(person, ["commission_earned_month"], 0) || 0);

        return {
          label: name,
          value: deals > 0 ? deals : Math.round(commission / 100000)
        };
      }).filter(function (row) {
        return Number(row.value || 0) > 0;
      });
    }

    function renderExpenseBreakdownList(expenses) {
      const rows = (expenses || []).filter(function (row) {
        return Number(row.value || 0) > 0;
      });

      if (rows.length === 0) return "";

      const total = rows.reduce(function (sum, row) {
        return sum + Number(row.value || 0);
      }, 0);

      return `
        <div class="expense-breakdown-list">
          ${rows.map(function (row) {
            const percent = total > 0 ? Math.round((Number(row.value || 0) / total) * 100) : 0;

            return `
              <div class="expense-row">
                <i class="premium-dot" style="background:${UnganiClientShared.attr(row.color)};"></i>
                <div>
                  <strong>${UnganiClientShared.safe(row.label)}</strong>
                  <span>${UnganiClientShared.safe(UnganiAnalytics.moneyFormat(row.value))}</span>
                </div>
                <strong>${percent}%</strong>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderProjectProgress(projects) {
      if (!projects || projects.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No progress data yet</h3>
            <p>Add project names, total units, sold units, or progress percentage to see progress here.</p>
          </div>
        `;
      }

      return projects.slice(0, 5).map(function (project) {
        const percent = Math.max(0, Math.min(100, Number(project.progress || 0)));

        return `
          <div class="ungani-project-progress-card">
            <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;">
              <div>
                <strong>${UnganiClientShared.safe(project.name)}</strong>
                <p class="ungani-small" style="margin:5px 0 0;">
                  ${project.count} record(s) · ${project.unitsSold}/${project.totalUnits} done · ${project.unitsAvailable} available
                </p>
              </div>
              <span class="ungani-badge ${progressColor(percent)}">${percent}%</span>
            </div>

            <div class="ungani-project-track">
              <div class="ungani-project-fill" style="width:${percent}%;"></div>
            </div>

            <p class="ungani-small">
              Estimated value: <strong>${UnganiClientShared.safe(UnganiAnalytics.moneyFormat(project.value))}</strong>
            </p>
          </div>
        `;
      }).join("");
    }

    function renderPerformerList(performers) {
      if (!performers || performers.length === 0) return "";

      return `
        <div style="margin-top:16px;">
          ${performers.slice(0, 5).map(function (person, index) {
            const name = UnganiAnalytics.safeGet(person, ["full_name", "name"], "Person");
            const deals = Number(UnganiAnalytics.safeGet(person, ["deals_closed"], 0) || 0);
            const commission = Number(UnganiAnalytics.safeGet(person, ["commission_earned_month"], 0) || 0);

            return `
              <div class="ungani-rank-row">
                <div class="ungani-rank-number">${index + 1}</div>
                <div>
                  <strong>${UnganiClientShared.safe(name)}</strong>
                  <p class="ungani-small" style="margin:4px 0 0;">${deals} recorded deal/job(s)</p>
                </div>
                <strong>${UnganiClientShared.safe(UnganiAnalytics.moneyFormat(commission))}</strong>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function statCard(title, value, subtitle, accent, href) {
      return `
        <a class="premium-stat-card" href="${UnganiClientShared.attr(href)}" style="--accent:${UnganiClientShared.attr(accent)};">
          <span>${UnganiClientShared.safe(title)}</span>
          <h3>${UnganiClientShared.safe(value)}</h3>
          <p>${UnganiClientShared.safe(subtitle)}</p>
        </a>
      `;
    }

    function hasValues(rows) {
      return (rows || []).some(function (row) {
        return Number(row.value || 0) > 0;
      });
    }

    function progressColor(percent) {
      const value = Number(percent || 0);

      if (value >= 75) return "green";
      if (value >= 35) return "gold";
      return "red";
    }

    function getFilterValue(inputId, storageKey) {
      const el = document.getElementById(inputId);

      if (el) return String(el.value || "").trim();

      return String(sessionStorage.getItem(storageKey) || "").trim();
    }

    function restoreFilters() {
      if (document.getElementById("filterFrom")) document.getElementById("filterFrom").value = sessionStorage.getItem("ungani_charts_filter_from") || "";
      if (document.getElementById("filterTo")) document.getElementById("filterTo").value = sessionStorage.getItem("ungani_charts_filter_to") || "";
      if (document.getElementById("searchBox")) document.getElementById("searchBox").value = sessionStorage.getItem("ungani_charts_search") || "";
    }

    function saveFilters() {
      if (document.getElementById("filterFrom")) sessionStorage.setItem("ungani_charts_filter_from", UnganiClientShared.value("filterFrom"));
      if (document.getElementById("filterTo")) sessionStorage.setItem("ungani_charts_filter_to", UnganiClientShared.value("filterTo"));
      if (document.getElementById("searchBox")) sessionStorage.setItem("ungani_charts_search", UnganiClientShared.value("searchBox"));
    }

    function resetFilters() {
      sessionStorage.removeItem("ungani_charts_filter_from");
      sessionStorage.removeItem("ungani_charts_filter_to");
      sessionStorage.removeItem("ungani_charts_search");
      renderChartsPage();
      UnganiClientShared.showToast("Chart filters reset ✓");
    }
  </script>
</body>
</html>
