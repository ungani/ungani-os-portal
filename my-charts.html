<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Charts</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-shared.js"></script>
</head>

<body>
  <script>
    let currentContext = null;
    let isRealEstate = false;

    let chartData = {
      transactions: [],
      items: [],
      people: [],
      records: [],
      tasks: [],
      documents: [],
      events: [],
      support: []
    };

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "charts",
        pageTitle: "Charts",
        pageSubtitle: "Simple visual summaries for money, records, tasks, people, documents, calendar, and support.",
        onReady: startChartsPage
      });
    });

    async function startChartsPage(context) {
      currentContext = context;

      const businessType = String(UnganiClientShared.getValue(context.tenant, ["business_type", "business_type_key"], "")).toLowerCase();
      const businessTypeKey = String(UnganiClientShared.getValue(context.tenant, ["business_type_key"], "")).toLowerCase();

      isRealEstate = businessType.includes("real estate") || businessTypeKey.includes("real_estate");

      const titleEl = document.querySelector(".ungani-topbar h2");
      const subEl = document.querySelector(".ungani-topbar p");

      if (titleEl) {
        titleEl.innerText = isRealEstate ? "Property Operations Charts" : "Business Charts";
      }

      if (subEl) {
        subEl.innerText = isRealEstate
          ? "Visual summaries for properties, leads, viewings, money records, tasks, documents, calendar, and support."
          : "Visual summaries for business money records, items, people, tasks, documents, calendar, and support.";
      }

      await loadChartData();
    }

    async function loadChartData() {
      currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading charts...");

      const responses = await Promise.all([
        safeSelect("transactions"),
        safeSelect("business_items"),
        safeSelect("client_people"),
        safeSelect("business_records"),
        safeSelect("tasks"),
        safeSelect("documents"),
        safeSelect("business_events"),
        safeSelect("support_issues")
      ]);

      chartData.transactions = responses[0];
      chartData.items = responses[1];
      chartData.people = responses[2];
      chartData.records = responses[3];
      chartData.tasks = responses[4];
      chartData.documents = responses[5];
      chartData.events = responses[6];
      chartData.support = responses[7];

      renderChartsPage();
    }

    async function safeSelect(tableName) {
      try {
        const response = await currentContext.supabaseClient
          .from(tableName)
          .select("*")
          .eq("tenant_id", currentContext.tenantId)
          .order("created_at", { ascending: false });

        if (response.error) {
          console.warn(tableName, response.error.message);
          return [];
        }

        return response.data || [];
      } catch (error) {
        console.warn(tableName, error.message);
        return [];
      }
    }

    function renderChartsPage() {
      const filtered = getFilteredData();

      const money = calculateMoney(filtered.transactions);
      const itemStatus = countBy(filtered.items, ["property_status", "item_status", "status"], "unknown");
      const peopleTypes = countBy(filtered.people, ["person_type"], "contact");
      const recordTypes = countBy(filtered.records, ["record_type"], "record");
      const taskStatus = countBy(filtered.tasks, ["status"], "pending");
      const taskPriority = countBy(filtered.tasks, ["priority"], "normal");
      const documentTypes = countBy(filtered.documents, ["document_type"], "document");
      const eventTypes = countBy(filtered.events, ["event_type"], "event");
      const supportStatus = countBy(filtered.support, ["status"], "open");

      UnganiClientShared.setContent(`
        <section class="ungani-card ungani-hero">
          <h2>${isRealEstate ? "Property Operations Charts" : "Business Charts"}</h2>
          <p>
            ${isRealEstate
              ? "Use these charts to quickly understand property status, leads, viewings, tasks, money records, documents, calendar activity, and support issues."
              : "Use these charts to quickly understand money records, items, people, tasks, documents, calendar activity, and support issues."
            }
          </p>

          <div class="ungani-button-row">
            <button class="ungani-btn" onclick="loadChartData()">Refresh Charts</button>
            <a class="ungani-btn green" href="my-overview.html">Overview</a>
            <a class="ungani-btn dark" href="reports.html">Reports</a>
          </div>
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <h3>Chart Filters</h3>
            <button class="ungani-btn dark" onclick="resetFilters()">Reset Filters</button>
          </div>

          <div class="ungani-form-grid">
            <div>
              <label for="filterFrom">From Date</label>
              <input id="filterFrom" type="date" onchange="saveFilters(); renderChartsPage();" />
            </div>

            <div>
              <label for="filterTo">To Date</label>
              <input id="filterTo" type="date" onchange="saveFilters(); renderChartsPage();" />
            </div>

            <div>
              <label for="searchBox">Search</label>
              <input id="searchBox" placeholder="Search property, task, client, record..." oninput="saveFilters(); renderChartsPage();" />
            </div>
          </div>
        </section>

        <section class="ungani-grid">
          ${UnganiClientShared.metricCard("Income", UnganiClientShared.formatKES(money.income), "Total income records", "green")}
          ${UnganiClientShared.metricCard("Expenses", UnganiClientShared.formatKES(money.expenses), "Total expense records", "orange")}
          ${UnganiClientShared.metricCard("Balance", UnganiClientShared.formatKES(money.balance), "Income minus expenses", money.balance >= 0 ? "green" : "red")}
          ${UnganiClientShared.metricCard(isRealEstate ? "Properties / Listings" : "Items / Assets", filtered.items.length, "Total saved records", "blue")}
          ${UnganiClientShared.metricCard("People", filtered.people.length, "Staff, contacts, agents, leads", "gold")}
          ${UnganiClientShared.metricCard("Tasks", filtered.tasks.length, "Tasks and follow-ups", "orange")}
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Money Summary</h3>
              <a class="ungani-btn green" href="my-money.html">Open Money</a>
            </div>

            ${renderMoneyChart(money)}
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>${isRealEstate ? "Property Status" : "Item / Asset Status"}</h3>
              <a class="ungani-btn" href="my-items.html">${isRealEstate ? "Open Properties" : "Open Items"}</a>
            </div>

            ${renderBarChart(itemStatus, "No property/item status data yet.")}
          </div>
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>${isRealEstate ? "Agents / Leads / People" : "People Types"}</h3>
              <a class="ungani-btn" href="my-people.html">Open People</a>
            </div>

            ${renderBarChart(peopleTypes, "No people data yet.")}
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>${isRealEstate ? "Records / Leads / Viewings" : "Record Types"}</h3>
              <a class="ungani-btn" href="my-records.html">Open Records</a>
            </div>

            ${renderBarChart(recordTypes, "No record data yet.")}
          </div>
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Task Status</h3>
              <a class="ungani-btn orange" href="my-tasks.html">Open Tasks</a>
            </div>

            ${renderBarChart(taskStatus, "No task status data yet.")}
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Task Priority</h3>
              <a class="ungani-btn orange" href="my-tasks.html">Open Tasks</a>
            </div>

            ${renderBarChart(taskPriority, "No task priority data yet.")}
          </div>
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Document Types</h3>
              <a class="ungani-btn" href="my-documents.html">Open Documents</a>
            </div>

            ${renderBarChart(documentTypes, "No document data yet.")}
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Calendar Activity</h3>
              <a class="ungani-btn green" href="my-calendar.html">Open Calendar</a>
            </div>

            ${renderBarChart(eventTypes, "No calendar data yet.")}
          </div>
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Support Status</h3>
              <a class="ungani-btn dark" href="my-support.html">Open Support</a>
            </div>

            ${renderBarChart(supportStatus, "No support data yet.")}
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Data Coverage</h3>
            </div>

            ${renderCoverageChart(filtered)}
          </div>
        </section>

        <p class="ungani-small">
          Charts Version: Step 307G Shared Layout · ungani.com · info@ungani.com
        </p>
      `);

      restoreFilters();
    }

    function getFilteredData() {
      const from = document.getElementById("filterFrom") ? UnganiClientShared.value("filterFrom") : "";
      const to = document.getElementById("filterTo") ? UnganiClientShared.value("filterTo") : "";
      const query = document.getElementById("searchBox") ? UnganiClientShared.value("searchBox").toLowerCase() : "";

      return {
        transactions: filterRows(chartData.transactions, from, to, query, ["transaction_date", "created_at"]),
        items: filterRows(chartData.items, from, to, query, ["date_listed", "created_at"]),
        people: filterRows(chartData.people, from, to, query, ["last_follow_up_date", "created_at"]),
        records: filterRows(chartData.records, from, to, query, ["record_date", "viewing_date", "created_at"]),
        tasks: filterRows(chartData.tasks, from, to, query, ["due_date", "created_at"]),
        documents: filterRows(chartData.documents, from, to, query, ["created_at", "updated_at"]),
        events: filterRows(chartData.events, from, to, query, ["event_date", "created_at"]),
        support: filterRows(chartData.support, from, to, query, ["created_at", "updated_at"])
      };
    }

    function filterRows(rows, from, to, query, dateFields) {
      return rows.filter(function (row) {
        const date = getFirstDate(row, dateFields);
        const haystack = JSON.stringify(row || {}).toLowerCase();

        if (from && date && date < from) return false;
        if (to && date && date > to) return false;
        if (query && !haystack.includes(query)) return false;

        return true;
      });
    }

    function getFirstDate(row, fields) {
      for (let i = 0; i < fields.length; i++) {
        const value = UnganiClientShared.getValue(row, [fields[i]], "");

        if (value) {
          return String(value).slice(0, 10);
        }
      }

      return "";
    }

    function calculateMoney(rows) {
      let income = 0;
      let expenses = 0;
      let pettyCash = 0;
      let pending = 0;

      rows.forEach(function (row) {
        const amount = Number(UnganiClientShared.getValue(row, ["amount"], 0) || 0);
        const type = String(UnganiClientShared.getValue(row, ["transaction_type", "type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "completed")).toLowerCase();

        if (type.includes("income") || type.includes("sale") || type.includes("rental")) {
          income += amount;
        } else if (type.includes("petty")) {
          pettyCash += amount;
          expenses += amount;
        } else if (type.includes("expense")) {
          expenses += amount;
        }

        if (status.includes("pending")) {
          pending += amount;
        }
      });

      return {
        income,
        expenses,
        pettyCash,
        pending,
        balance: income - expenses
      };
    }

    function countBy(rows, fields, fallback) {
      const counts = {};

      rows.forEach(function (row) {
        let value = UnganiClientShared.getValue(row, fields, fallback || "unknown");

        value = String(value || fallback || "unknown").trim();

        if (!value) {
          value = fallback || "unknown";
        }

        value = value.toLowerCase();

        counts[value] = (counts[value] || 0) + 1;
      });

      return counts;
    }

    function renderMoneyChart(money) {
      const values = {
        income: money.income,
        expenses: money.expenses,
        petty_cash: money.pettyCash,
        pending: money.pending,
        balance: money.balance
      };

      return renderBarChart(values, "No money data yet.", true);
    }

    function renderCoverageChart(filtered) {
      const coverage = {
        money: filtered.transactions.length,
        items: filtered.items.length,
        people: filtered.people.length,
        records: filtered.records.length,
        tasks: filtered.tasks.length,
        documents: filtered.documents.length,
        calendar: filtered.events.length,
        support: filtered.support.length
      };

      return renderBarChart(coverage, "No data coverage yet.");
    }

    function renderBarChart(counts, emptyMessage, isMoney) {
      const entries = Object.keys(counts || {}).map(function (key) {
        return {
          label: key,
          value: Number(counts[key] || 0)
        };
      });

      entries.sort(function (a, b) {
        return Math.abs(b.value) - Math.abs(a.value);
      });

      const hasData = entries.some(function (item) {
        return Number(item.value || 0) !== 0;
      });

      if (!hasData) {
        return `
          <div class="ungani-empty">
            <h3>No chart data</h3>
            <p>${UnganiClientShared.safe(emptyMessage || "No data available yet.")}</p>
          </div>
        `;
      }

      const maxValue = Math.max.apply(null, entries.map(function (item) {
        return Math.abs(Number(item.value || 0));
      })) || 1;

      return `
        <div>
          ${entries.map(function (item) {
            const value = Number(item.value || 0);
            const width = Math.max(6, Math.round((Math.abs(value) / maxValue) * 100));
            const displayValue = isMoney ? UnganiClientShared.formatKES(value) : value;
            const color = getBarColor(item.label, value);

            return `
              <div style="margin-bottom:14px;">
                <div style="display:flex;justify-content:space-between;gap:12px;margin-bottom:6px;">
                  <strong>${UnganiClientShared.safe(toTitle(item.label))}</strong>
                  <span class="ungani-small">${UnganiClientShared.safe(displayValue)}</span>
                </div>

                <div style="height:12px;background:rgba(6,28,61,0.08);border-radius:999px;overflow:hidden;">
                  <div style="height:12px;width:${width}%;background:${color};border-radius:999px;"></div>
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function getBarColor(label, value) {
      const lower = String(label || "").toLowerCase();

      if (value < 0) return "#B91C1C";
      if (lower.includes("expense") || lower.includes("pending") || lower.includes("urgent") || lower.includes("high") || lower.includes("overdue")) return "#D4A63A";
      if (lower.includes("income") || lower.includes("completed") || lower.includes("active") || lower.includes("available") || lower.includes("read") || lower.includes("sold") || lower.includes("rented")) return "#15803D";
      if (lower.includes("closed") || lower.includes("cancelled") || lower.includes("lost") || lower.includes("archived")) return "#B91C1C";

      return "#061C3D";
    }

    function toTitle(value) {
      return String(value || "")
        .replace(/_/g, " ")
        .replace(/\w\S*/g, function (text) {
          return text.charAt(0).toUpperCase() + text.substr(1).toLowerCase();
        });
    }

    function restoreFilters() {
      if (document.getElementById("filterFrom")) document.getElementById("filterFrom").value = sessionStorage.getItem("ungani_charts_filter_from") || "";
      if (document.getElementById("filterTo")) document.getElementById("filterTo").value = sessionStorage.getItem("ungani_charts_filter_to") || "";
      if (document.getElementById("searchBox")) document.getElementById("searchBox").value = sessionStorage.getItem("ungani_charts_search") || "";
    }

    function saveFilters() {
      if (document.getElementById("filterFrom")) sessionStorage.setItem("ungani_charts_filter_from", UnganiClientShared.value("filterFrom"));
      if (document.getElementById("filterTo")) sessionStorage.setItem("ungani_charts_filter_to", UnganiClientShared.value("filterTo"));
      if (document.getElementById("searchBox")) sessionStorage.setItem("ungani_charts_search", UnganiClientShared.value("searchBox"));
    }

    function resetFilters() {
      sessionStorage.removeItem("ungani_charts_filter_from");
      sessionStorage.removeItem("ungani_charts_filter_to");
      sessionStorage.removeItem("ungani_charts_search");
      renderChartsPage();
      UnganiClientShared.showToast("Chart filters reset ✓");
    }
  </script>
</body>
</html>
