<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Documents</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-shared.js"></script>
</head>

<body>
  <script>
    let currentContext = null;
    let documents = [];
    let currentEditId = null;
    let isRealEstate = false;

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "documents",
        pageTitle: "Documents",
        pageSubtitle: "Manage document records, file links, Drive folders, agreements, receipts, and business files.",
        onReady: startDocumentsPage
      });
    });

    async function startDocumentsPage(context) {
      currentContext = context;

      const businessType = String(UnganiClientShared.getValue(context.tenant, ["business_type", "business_type_key"], "")).toLowerCase();
      const businessTypeKey = String(UnganiClientShared.getValue(context.tenant, ["business_type_key"], "")).toLowerCase();

      isRealEstate = businessType.includes("real estate") || businessTypeKey.includes("real_estate");

      const titleEl = document.querySelector(".ungani-topbar h2");
      const subEl = document.querySelector(".ungani-topbar p");

      if (titleEl) {
        titleEl.innerText = isRealEstate ? "Property Documents" : "Documents";
      }

      if (subEl) {
        subEl.innerText = isRealEstate
          ? "Track lease agreements, sale agreements, title documents, booking forms, receipts, invoices, client records, project files, and Drive links."
          : "Track business documents, receipts, invoices, agreements, file links, folders, and important records.";
      }

      await loadDocuments();
    }

    async function loadDocuments() {
      currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading documents...");

      const response = await currentContext.supabaseClient
        .from("documents")
        .select("*")
        .eq("tenant_id", currentContext.tenantId)
        .order("created_at", { ascending: false });

      if (response.error) {
        currentContext.contentEl.innerHTML = UnganiClientShared.errorCard("Could not load documents", response.error.message);
        return;
      }

      documents = response.data || [];
      renderDocumentsPage();
    }

    function renderDocumentsPage() {
      const filtered = filterDocuments();
      const summary = calculateSummary();

      UnganiClientShared.setContent(`
        <section class="ungani-card ungani-hero">
          <h2>${isRealEstate ? "Property Document Center" : "Document Center"}</h2>
          <p>
            ${isRealEstate
              ? "Use this section to organize property documents, sale agreements, lease agreements, receipts, invoices, title files, booking forms, project files, and Google Drive links."
              : "Use this section to organize business documents, receipts, invoices, agreements, records, and Google Drive links."
            }
          </p>

          <div class="ungani-button-row">
            <button class="ungani-btn" onclick="scrollToForm()">${currentEditId ? "Update Document" : "Add Document"}</button>
            <a class="ungani-btn green" href="reports.html">Reports</a>
            <a class="ungani-btn dark" href="my-records.html">Records</a>
          </div>
        </section>

        <section class="ungani-grid">
          ${UnganiClientShared.metricCard("Total Documents", documents.length, "All saved document records", "blue")}
          ${UnganiClientShared.metricCard("Agreements", summary.agreements, "Lease, sale, and other agreements", "green")}
          ${UnganiClientShared.metricCard("Receipts / Invoices", summary.receiptsInvoices, "Payment and billing documents", "gold")}
          ${UnganiClientShared.metricCard("Drive Links", summary.driveLinks, "Documents or folders with links", "blue")}
          ${UnganiClientShared.metricCard("Pending", summary.pending, "Needs review or completion", summary.pending > 0 ? "orange" : "green")}
          ${UnganiClientShared.metricCard("Archived", summary.archived, "Archived document records", "orange")}
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <h3>Filters</h3>
            <button class="ungani-btn dark" onclick="resetFilters()">Reset Filters</button>
          </div>

          <div class="ungani-form-grid">
            <div>
              <label for="filterType">Document Type</label>
              <select id="filterType" onchange="saveFilters(); renderDocumentsPage();">
                <option value="">All Types</option>
                <option value="lease agreement">Lease Agreement</option>
                <option value="sale agreement">Sale Agreement</option>
                <option value="title document">Title Document</option>
                <option value="booking form">Booking Form</option>
                <option value="receipt">Receipt</option>
                <option value="invoice">Invoice</option>
                <option value="client document">Client Document</option>
                <option value="project file">Project File</option>
                <option value="property photos">Property Photos</option>
                <option value="marketing file">Marketing File</option>
                <option value="maintenance file">Maintenance File</option>
                <option value="agreement">Agreement</option>
                <option value="general">General</option>
              </select>
            </div>

            <div>
              <label for="filterStatus">Status</label>
              <select id="filterStatus" onchange="saveFilters(); renderDocumentsPage();">
                <option value="">All Statuses</option>
                <option value="active">Active</option>
                <option value="pending">Pending</option>
                <option value="review">Review</option>
                <option value="expired">Expired</option>
                <option value="archived">Archived</option>
              </select>
            </div>

            <div>
              <label for="filterProperty">Property / Project</label>
              <input id="filterProperty" placeholder="Example: Clove Garden" oninput="saveFilters(); renderDocumentsPage();" />
            </div>

            <div>
              <label for="searchBox">Search</label>
              <input id="searchBox" placeholder="Search title, client, agent, notes..." oninput="saveFilters(); renderDocumentsPage();" />
            </div>
          </div>
        </section>

        <section id="documentFormCard" class="ungani-card">
          <div class="ungani-section-title">
            <h3>${currentEditId ? "Update Document" : "Add Document"}</h3>
            ${currentEditId ? '<button class="ungani-btn dark" onclick="cancelEdit()">Cancel Edit</button>' : ""}
          </div>

          ${renderDocumentForm()}
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <div>
                <h3>${isRealEstate ? "Property Documents" : "Document Records"}</h3>
                <p class="ungani-small">${filtered.length} document(s) shown</p>
              </div>

              <button class="ungani-btn green" onclick="loadDocuments()">Refresh</button>
            </div>

            ${renderDocumentList(filtered)}
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Document Summary</h3>
            </div>

            ${renderSummaryPanel(filtered)}
          </div>
        </section>

        <p class="ungani-small">
          Documents Version: Step 305I Shared Layout · ungani.com · info@ungani.com
        </p>
      `);

      restoreFilters();
      fillEditForm();
    }

    function renderDocumentForm() {
      return `
        <form id="documentForm" onsubmit="saveDocument(event)">
          <div class="ungani-form-grid">
            <div>
              <label for="documentTitle">Document Title</label>
              <input id="documentTitle" required placeholder="Example: Clove Garden A12 Booking Receipt" />
            </div>

            <div>
              <label for="documentType">Document Type</label>
              <select id="documentType">
                <option value="lease agreement">Lease Agreement</option>
                <option value="sale agreement">Sale Agreement</option>
                <option value="title document">Title Document</option>
                <option value="booking form">Booking Form</option>
                <option value="receipt">Receipt</option>
                <option value="invoice">Invoice</option>
                <option value="client document">Client Document</option>
                <option value="project file">Project File</option>
                <option value="property photos">Property Photos</option>
                <option value="marketing file">Marketing File</option>
                <option value="maintenance file">Maintenance File</option>
                <option value="agreement">Agreement</option>
                <option value="general">General</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div>
              <label for="category">Category</label>
              <input id="category" placeholder="Example: Sales / Rentals / Projects" />
            </div>

            <div>
              <label for="status">Status</label>
              <select id="status">
                <option value="active">Active</option>
                <option value="pending">Pending</option>
                <option value="review">Review</option>
                <option value="expired">Expired</option>
                <option value="archived">Archived</option>
              </select>
            </div>

            <div>
              <label for="propertyName">Property Name</label>
              <input id="propertyName" placeholder="Example: Clove Garden A12" />
            </div>

            <div>
              <label for="projectName">Project Name</label>
              <input id="projectName" placeholder="Example: Clove Garden" />
            </div>

            <div>
              <label for="clientName">Client / Tenant / Buyer Name</label>
              <input id="clientName" placeholder="Example: Kevin Demo Buyer" />
            </div>

            <div>
              <label for="agentName">${isRealEstate ? "Agent Name" : "Related Person"}</label>
              <input id="agentName" placeholder="Example: Brian Otieno" />
            </div>

            <div>
              <label for="documentUrl">Document Link</label>
              <input id="documentUrl" type="url" placeholder="Paste document link here" />
            </div>

            <div>
              <label for="driveUrl">Google Drive File Link</label>
              <input id="driveUrl" type="url" placeholder="Paste Google Drive file link here" />
            </div>

            <div>
              <label for="folderUrl">Google Drive Folder Link</label>
              <input id="folderUrl" type="url" placeholder="Paste Google Drive folder link here" />
            </div>
          </div>

          <label for="description">Description</label>
          <textarea id="description" placeholder="${isRealEstate ? "Add details about the agreement, receipt, title file, client document, or project file..." : "Add details about this document..."}"></textarea>

          <label for="notes">Internal Notes</label>
          <textarea id="notes" placeholder="Add internal notes, document status, follow-up details, or reminders..."></textarea>

          <div class="ungani-button-row">
            <button class="ungani-btn green" type="submit">${currentEditId ? "Update Document" : "Add Document"}</button>
            ${currentEditId ? '<button class="ungani-btn dark" type="button" onclick="cancelEdit()">Cancel</button>' : ""}
          </div>
        </form>
      `;
    }

    function renderDocumentList(rows) {
      if (rows.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No documents found</h3>
            <p>Add your first agreement, receipt, invoice, Drive folder, or document record above.</p>
          </div>
        `;
      }

      return rows.map(function (row) {
        return renderDocumentCard(row);
      }).join("");
    }

    function renderDocumentCard(row) {
      const title = UnganiClientShared.getValue(row, ["document_title", "title", "file_name"], "Document");
      const type = UnganiClientShared.getValue(row, ["document_type"], "general");
      const category = UnganiClientShared.getValue(row, ["category"], "");
      const status = UnganiClientShared.getValue(row, ["status"], "active");
      const property = UnganiClientShared.getValue(row, ["property_name"], "");
      const project = UnganiClientShared.getValue(row, ["project_name"], "");
      const client = UnganiClientShared.getValue(row, ["client_name"], "");
      const agent = UnganiClientShared.getValue(row, ["agent_name"], "");
      const documentUrl = UnganiClientShared.getValue(row, ["document_url"], "");
      const driveUrl = UnganiClientShared.getValue(row, ["drive_url"], "");
      const folderUrl = UnganiClientShared.getValue(row, ["folder_url"], "");
      const description = UnganiClientShared.getValue(row, ["description"], "");
      const notes = UnganiClientShared.getValue(row, ["notes"], "");

      return `
        <div class="ungani-card" style="box-shadow:none;">
          <div class="ungani-section-title">
            <div>
              <h3>${UnganiClientShared.safe(title)}</h3>
              <p class="ungani-small">
                ${UnganiClientShared.safe(type)}
                ${category ? " · " + UnganiClientShared.safe(category) : ""}
                ${property ? " · " + UnganiClientShared.safe(property) : ""}
              </p>
            </div>

            <div>
              ${badge(type, "blue")}
              ${badge(status, statusColor(status))}
            </div>
          </div>

          <section class="ungani-grid">
            ${miniDetail("Property", property || "N/A")}
            ${miniDetail("Project", project || "N/A")}
            ${miniDetail("Client / Buyer / Tenant", client || "N/A")}
            ${miniDetail(isRealEstate ? "Agent" : "Related Person", agent || "N/A")}
            ${miniDetail("Created", UnganiClientShared.formatDate(UnganiClientShared.getValue(row, ["created_at"], "")))}
            ${miniDetail("Status", status || "N/A")}
          </section>

          <div class="ungani-button-row">
            ${documentUrl ? `<a class="ungani-btn green" href="${UnganiClientShared.attr(documentUrl)}" target="_blank" rel="noopener">Open Document</a>` : ""}
            ${driveUrl ? `<a class="ungani-btn blue" href="${UnganiClientShared.attr(driveUrl)}" target="_blank" rel="noopener">Open Drive File</a>` : ""}
            ${folderUrl ? `<a class="ungani-btn dark" href="${UnganiClientShared.attr(folderUrl)}" target="_blank" rel="noopener">Open Folder</a>` : ""}
          </div>

          ${description ? `<p class="ungani-small" style="margin-top:12px;"><strong>Description:</strong> ${UnganiClientShared.safe(description)}</p>` : ""}
          ${notes ? `<p class="ungani-small"><strong>Notes:</strong> ${UnganiClientShared.safe(notes)}</p>` : ""}

          <div class="ungani-button-row">
            <button class="ungani-btn" onclick="editDocument('${UnganiClientShared.attr(row.id)}')">Edit</button>
            <button class="ungani-btn green" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'active')">Active</button>
            <button class="ungani-btn orange" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'review')">Review</button>
            <button class="ungani-btn red" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'archived')">Archive</button>
          </div>
        </div>
      `;
    }

    function renderSummaryPanel(rows) {
      const typeSummary = {};
      const statusSummary = {};

      rows.forEach(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["document_type"], "general")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "active")).toLowerCase();

        typeSummary[type] = (typeSummary[type] || 0) + 1;
        statusSummary[status] = (statusSummary[status] || 0) + 1;
      });

      const typeKeys = Object.keys(typeSummary);
      const statusKeys = Object.keys(statusSummary);

      if (typeKeys.length === 0 && statusKeys.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No summary yet</h3>
            <p>Summary will appear when documents are added.</p>
          </div>
        `;
      }

      let html = `<h3 style="margin-top:0;color:var(--ungani-text);">By Document Type</h3>`;

      html += typeKeys.map(function (key) {
        return `
          <div class="ungani-card" style="box-shadow:none;margin-bottom:10px;">
            <strong>${UnganiClientShared.safe(toTitle(key))}</strong>
            <p class="ungani-small" style="margin:5px 0 0;">${typeSummary[key]} document(s)</p>
          </div>
        `;
      }).join("");

      html += `<h3 style="color:var(--ungani-text);">By Status</h3>`;

      html += statusKeys.map(function (key) {
        return `
          <div class="ungani-card" style="box-shadow:none;margin-bottom:10px;">
            <strong>${UnganiClientShared.safe(toTitle(key))}</strong>
            <p class="ungani-small" style="margin:5px 0 0;">${statusSummary[key]} document(s)</p>
          </div>
        `;
      }).join("");

      return html;
    }

    function calculateSummary() {
      let agreements = 0;
      let receiptsInvoices = 0;
      let driveLinks = 0;
      let pending = 0;
      let archived = 0;

      documents.forEach(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["document_type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "")).toLowerCase();

        if (type.includes("agreement") || type.includes("lease") || type.includes("sale")) agreements++;
        if (type.includes("receipt") || type.includes("invoice")) receiptsInvoices++;

        if (
          UnganiClientShared.getValue(row, ["document_url"], "") ||
          UnganiClientShared.getValue(row, ["drive_url"], "") ||
          UnganiClientShared.getValue(row, ["folder_url"], "")
        ) {
          driveLinks++;
        }

        if (status.includes("pending") || status.includes("review")) pending++;
        if (status.includes("archived")) archived++;
      });

      return {
        agreements,
        receiptsInvoices,
        driveLinks,
        pending,
        archived
      };
    }

    function filterDocuments() {
      const filterType = document.getElementById("filterType") ? UnganiClientShared.value("filterType").toLowerCase() : "";
      const filterStatus = document.getElementById("filterStatus") ? UnganiClientShared.value("filterStatus").toLowerCase() : "";
      const filterProperty = document.getElementById("filterProperty") ? UnganiClientShared.value("filterProperty").toLowerCase() : "";
      const query = document.getElementById("searchBox") ? UnganiClientShared.value("searchBox").toLowerCase() : "";

      return documents.filter(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["document_type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "")).toLowerCase();
        const propertyProject = [
          UnganiClientShared.getValue(row, ["property_name"], ""),
          UnganiClientShared.getValue(row, ["project_name"], "")
        ].join(" ").toLowerCase();

        const haystack = [
          UnganiClientShared.getValue(row, ["document_title", "title", "file_name"], ""),
          type,
          status,
          propertyProject,
          UnganiClientShared.getValue(row, ["category"], ""),
          UnganiClientShared.getValue(row, ["client_name"], ""),
          UnganiClientShared.getValue(row, ["agent_name"], ""),
          UnganiClientShared.getValue(row, ["description"], ""),
          UnganiClientShared.getValue(row, ["notes"], "")
        ].join(" ").toLowerCase();

        if (filterType && type !== filterType) return false;
        if (filterStatus && status !== filterStatus) return false;
        if (filterProperty && !propertyProject.includes(filterProperty)) return false;
        if (query && !haystack.includes(query)) return false;

        return true;
      });
    }

    async function saveDocument(event) {
      event.preventDefault();

      const title = UnganiClientShared.value("documentTitle");

      if (!title) {
        alert("Please enter a document title.");
        return;
      }

      const categoryValue = UnganiClientShared.value("category");

      const payload = {
        business_type_key: UnganiClientShared.getValue(currentContext.tenant, ["business_type_key"], null),
        section_key: "documents",
        category_key: categoryValue ? UnganiClientShared.slugify(categoryValue) : null,
        document_title: title,
        title: title,
        file_name: title,
        document_type: UnganiClientShared.value("documentType") || "general",
        category: categoryValue || null,
        status: UnganiClientShared.value("status") || "active",
        property_name: UnganiClientShared.value("propertyName") || null,
        project_name: UnganiClientShared.value("projectName") || null,
        client_name: UnganiClientShared.value("clientName") || null,
        agent_name: UnganiClientShared.value("agentName") || null,
        document_url: UnganiClientShared.value("documentUrl") || null,
        drive_url: UnganiClientShared.value("driveUrl") || null,
        folder_url: UnganiClientShared.value("folderUrl") || null,
        description: UnganiClientShared.value("description") || null,
        notes: UnganiClientShared.value("notes") || null,
        updated_at: new Date().toISOString()
      };

      let response;

      if (currentEditId) {
        response = await currentContext.supabaseClient
          .from("documents")
          .update(payload)
          .eq("id", currentEditId)
          .eq("tenant_id", currentContext.tenantId);
      } else {
        payload.tenant_id = currentContext.tenantId;
        payload.created_by = currentContext.authUser.id;
        payload.created_at = new Date().toISOString();

        response = await currentContext.supabaseClient
          .from("documents")
          .insert(payload);
      }

      if (response.error) {
        alert(response.error.message);
        return;
      }

      currentEditId = null;
      UnganiClientShared.showToast("Document saved ✓");
      await loadDocuments();
    }

    function fillEditForm() {
      if (!currentEditId) return;

      const row = documents.find(function (item) {
        return String(item.id) === String(currentEditId);
      });

      if (!row) return;

      setValue("documentTitle", UnganiClientShared.getValue(row, ["document_title", "title", "file_name"], ""));
      setValue("documentType", UnganiClientShared.getValue(row, ["document_type"], "general"));
      setValue("category", UnganiClientShared.getValue(row, ["category"], ""));
      setValue("status", UnganiClientShared.getValue(row, ["status"], "active"));
      setValue("propertyName", UnganiClientShared.getValue(row, ["property_name"], ""));
      setValue("projectName", UnganiClientShared.getValue(row, ["project_name"], ""));
      setValue("clientName", UnganiClientShared.getValue(row, ["client_name"], ""));
      setValue("agentName", UnganiClientShared.getValue(row, ["agent_name"], ""));
      setValue("documentUrl", UnganiClientShared.getValue(row, ["document_url"], ""));
      setValue("driveUrl", UnganiClientShared.getValue(row, ["drive_url"], ""));
      setValue("folderUrl", UnganiClientShared.getValue(row, ["folder_url"], ""));
      setValue("description", UnganiClientShared.getValue(row, ["description"], ""));
      setValue("notes", UnganiClientShared.getValue(row, ["notes"], ""));
    }

    function editDocument(id) {
      currentEditId = id;
      renderDocumentsPage();
      scrollToForm();
    }

    function cancelEdit() {
      currentEditId = null;
      renderDocumentsPage();
      UnganiClientShared.showToast("Edit cancelled");
    }

    async function quickStatus(id, status) {
      const response = await currentContext.supabaseClient
        .from("documents")
        .update({
          status: status,
          updated_at: new Date().toISOString()
        })
        .eq("id", id)
        .eq("tenant_id", currentContext.tenantId);

      if (response.error) {
        alert(response.error.message);
        return;
      }

      UnganiClientShared.showToast("Status updated ✓");
      await loadDocuments();
    }

    function restoreFilters() {
      if (document.getElementById("filterType")) document.getElementById("filterType").value = sessionStorage.getItem("ungani_documents_filter_type") || "";
      if (document.getElementById("filterStatus")) document.getElementById("filterStatus").value = sessionStorage.getItem("ungani_documents_filter_status") || "";
      if (document.getElementById("filterProperty")) document.getElementById("filterProperty").value = sessionStorage.getItem("ungani_documents_filter_property") || "";
      if (document.getElementById("searchBox")) document.getElementById("searchBox").value = sessionStorage.getItem("ungani_documents_search") || "";
    }

    function saveFilters() {
      if (document.getElementById("filterType")) sessionStorage.setItem("ungani_documents_filter_type", UnganiClientShared.value("filterType"));
      if (document.getElementById("filterStatus")) sessionStorage.setItem("ungani_documents_filter_status", UnganiClientShared.value("filterStatus"));
      if (document.getElementById("filterProperty")) sessionStorage.setItem("ungani_documents_filter_property", UnganiClientShared.value("filterProperty"));
      if (document.getElementById("searchBox")) sessionStorage.setItem("ungani_documents_search", UnganiClientShared.value("searchBox"));
    }

    function resetFilters() {
      sessionStorage.removeItem("ungani_documents_filter_type");
      sessionStorage.removeItem("ungani_documents_filter_status");
      sessionStorage.removeItem("ungani_documents_filter_property");
      sessionStorage.removeItem("ungani_documents_search");
      renderDocumentsPage();
      UnganiClientShared.showToast("Filters reset ✓");
    }

    function badge(text, color) {
      return `<span class="ungani-badge ${UnganiClientShared.attr(color || "blue")}">${UnganiClientShared.safe(text)}</span>`;
    }

    function statusColor(status) {
      const lower = String(status || "").toLowerCase();

      if (lower.includes("active")) return "green";
      if (lower.includes("pending") || lower.includes("review")) return "orange";
      if (lower.includes("expired") || lower.includes("archived")) return "red";

      return "blue";
    }

    function miniDetail(label, value) {
      return `
        <div class="ungani-card" style="margin-bottom:0;box-shadow:none;padding:14px;">
          <p class="ungani-small" style="margin:0 0 5px;">${UnganiClientShared.safe(label)}</p>
          <strong>${UnganiClientShared.safe(value)}</strong>
        </div>
      `;
    }

    function toTitle(value) {
      return String(value || "")
        .replace(/_/g, " ")
        .replace(/\w\S*/g, function (text) {
          return text.charAt(0).toUpperCase() + text.substr(1).toLowerCase();
        });
    }

    function setValue(id, value) {
      const element = document.getElementById(id);

      if (element) {
        element.value = value === null || value === undefined ? "" : value;
      }
    }

    function scrollToForm() {
      setTimeout(function () {
        const card = document.getElementById("documentFormCard");

        if (card) {
          card.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      }, 100);
    }
  </script>
</body>
</html>
