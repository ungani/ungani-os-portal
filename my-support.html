<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Support Issues</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-shared.js" onerror="window.__unganiClientSharedFailed = true;"></script>
  <script>
    (function () {
      function showUnganiLoadError() {
        if (typeof UnganiClientShared !== "undefined") return;

        var banner = document.createElement("div");
        banner.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99999;background:#B91C1C;color:#fff;padding:12px 16px;font:14px/1.4 -apple-system,sans-serif;text-align:center;";
        banner.innerHTML = "Some page resources failed to load. Please check your connection. " +
          "<button style=\"margin-left:10px;padding:4px 12px;border:none;border-radius:6px;background:#fff;color:#B91C1C;font-weight:700;cursor:pointer;\" onclick=\"window.location.reload()\">Reload</button>";

        if (document.body) {
          document.body.prepend(banner);
        } else {
          document.addEventListener("DOMContentLoaded", function () {
            document.body.prepend(banner);
          });
        }
      }

      if (window.__unganiClientSharedFailed) {
        showUnganiLoadError();
      } else {
        setTimeout(function () {
          if (typeof UnganiClientShared === "undefined") showUnganiLoadError();
        }, 4000);
      }
    })();
  </script>
  <script src="nia-assistant.js"></script>
</head>

<body>
  <script>
    let currentContext = null;
    let issues = [];
    let currentEditId = null;

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "support",
        pageTitle: "Support Issues",
        pageSubtitle: "Send questions, system issues, setup requests, and business support items to UNGANI.",
        onReady: startSupportPage
      });
    });

    async function startSupportPage(context) {
      currentContext = context;
      await loadIssues();
    }

    async function loadIssues() {
      currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading support issues...");

      let response;

      try {
        response = await currentContext.supabaseClient
          .from("support_issues")
          .select("*")
          .eq("tenant_id", currentContext.tenantId)
          .order("created_at", { ascending: false });
      } catch (error) {
        currentContext.contentEl.innerHTML = UnganiClientShared.errorCard("Could not load support issues", error.message || "Network error. Please check your connection.");
        return;
      }

      if (response.error) {
        currentContext.contentEl.innerHTML = UnganiClientShared.errorCard("Could not load support issues", response.error.message);
        return;
      }

      issues = response.data || [];
      renderSupportPage();
    }

    function renderSupportPage() {
      const filtered = filterIssues();
      const summary = calculateSummary();

      UnganiClientShared.setContent(`
        <section class="ungani-card ungani-hero">
          <h2>Support Center</h2>
          <p>
            Use this section to report system issues, ask setup questions, request support, or send operational questions to UNGANI.
          </p>

          <div class="ungani-button-row">
            <button class="ungani-btn" onclick="scrollToForm()">${currentEditId ? "Update Issue" : "Create Support Issue"}</button>
            <a class="ungani-btn green" href="my-chat.html">Chat with UNGANI</a>
            <a class="ungani-btn dark" href="my-notices.html">Notices</a>
          </div>
        </section>

        <section class="ungani-grid">
          ${UnganiClientShared.metricCard("Total Issues", issues.length, "All support issues", "blue")}
          ${UnganiClientShared.metricCard("Open", summary.open, "Needs attention", summary.open > 0 ? "orange" : "green")}
          ${UnganiClientShared.metricCard("In Progress", summary.inProgress, "Being handled", "gold")}
          ${UnganiClientShared.metricCard("Resolved", summary.resolved, "Completed issues", "green")}
          ${UnganiClientShared.metricCard("High / Urgent", summary.highUrgent, "Important issues", summary.highUrgent > 0 ? "red" : "green")}
          ${UnganiClientShared.metricCard("Admin Replies", summary.replied, "Issues with UNGANI response", "blue")}
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <h3>Filters</h3>
            <button class="ungani-btn dark" onclick="resetFilters()">Reset Filters</button>
          </div>

          <div class="ungani-form-grid">
            <div>
              <label for="filterType">Issue Type</label>
              <select id="filterType" onchange="saveFilters(); renderSupportPage();">
                <option value="">All Types</option>
                <option value="system_issue">System Issue</option>
                <option value="setup_request">Setup Request</option>
                <option value="question">Question</option>
                <option value="data_issue">Data Issue</option>
                <option value="billing_question">Billing Question</option>
                <option value="feature_request">Feature Request</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div>
              <label for="filterStatus">Status</label>
              <select id="filterStatus" onchange="saveFilters(); renderSupportPage();">
                <option value="">All Statuses</option>
                <option value="open">Open</option>
                <option value="in progress">In Progress</option>
                <option value="resolved">Resolved</option>
                <option value="closed">Closed</option>
              </select>
            </div>

            <div>
              <label for="filterPriority">Priority</label>
              <select id="filterPriority" onchange="saveFilters(); renderSupportPage();">
                <option value="">All Priorities</option>
                <option value="low">Low</option>
                <option value="normal">Normal</option>
                <option value="high">High</option>
                <option value="urgent">Urgent</option>
              </select>
            </div>

            <div>
              <label for="searchBox">Search</label>
              <input id="searchBox" placeholder="Search issue title, details, reply..." oninput="saveFilters(); renderSupportPage();" />
            </div>
          </div>
        </section>

        <section id="supportFormCard" class="ungani-card">
          <div class="ungani-section-title">
            <h3>${currentEditId ? "Update Support Issue" : "Create Support Issue"}</h3>
            ${currentEditId ? '<button class="ungani-btn dark" onclick="cancelEdit()">Cancel Edit</button>' : ""}
          </div>

          ${renderIssueForm()}
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <div>
                <h3>Support Issues</h3>
                <p class="ungani-small">${filtered.length} issue(s) shown</p>
              </div>

              <button class="ungani-btn green" onclick="loadIssues()">Refresh</button>
            </div>

            ${renderIssueList(filtered)}
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Support Guidance</h3>
            </div>

            <div class="ungani-card" style="box-shadow:none;margin-bottom:10px;">
              <strong>What to report here</strong>
              <p class="ungani-small">System errors, missing information, setup requests, account questions, feature requests, or business support questions.</p>
            </div>

            <div class="ungani-card" style="box-shadow:none;margin-bottom:10px;">
              <strong>For urgent matters</strong>
              <p class="ungani-small">Set priority to High or Urgent and include enough details for UNGANI to understand the issue quickly.</p>
            </div>

            <div class="ungani-card" style="box-shadow:none;">
              <strong>Need a conversation?</strong>
              <p class="ungani-small">Use Chat with UNGANI for back-and-forth communication.</p>
              <a class="ungani-btn" href="my-chat.html">Open Chat</a>
            </div>
          </div>
        </section>

        <p class="ungani-small">
          Support Version: Step 307A Shared Layout · ungani.com · info@ungani.com
        </p>
      `);

      restoreFilters();
      fillEditForm();
    }

    function renderIssueForm() {
      return `
        <form id="supportForm" onsubmit="saveIssue(event)">
          <div class="ungani-form-grid">
            <div>
              <label for="issueTitle">Issue Title</label>
              <input id="issueTitle" required placeholder="Example: I need help adding Google Drive document links" />
            </div>

            <div>
              <label for="issueType">Issue Type</label>
              <select id="issueType">
                <option value="system_issue">System Issue</option>
                <option value="setup_request">Setup Request</option>
                <option value="question">Question</option>
                <option value="data_issue">Data Issue</option>
                <option value="billing_question">Billing Question</option>
                <option value="feature_request">Feature Request</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div>
              <label for="priority">Priority</label>
              <select id="priority">
                <option value="normal">Normal</option>
                <option value="low">Low</option>
                <option value="high">High</option>
                <option value="urgent">Urgent</option>
              </select>
            </div>

            <div>
              <label for="status">Status</label>
              <select id="status">
                <option value="open">Open</option>
                <option value="in progress">In Progress</option>
                <option value="resolved">Resolved</option>
                <option value="closed">Closed</option>
              </select>
            </div>
          </div>

          <label for="description">Description</label>
          <textarea id="description" required placeholder="Explain the issue, question, or request clearly..."></textarea>

          <div class="ungani-button-row">
            <button class="ungani-btn green" type="submit">${currentEditId ? "Update Issue" : "Submit Issue"}</button>
            ${currentEditId ? '<button class="ungani-btn dark" type="button" onclick="cancelEdit()">Cancel</button>' : ""}
          </div>
        </form>
      `;
    }

    function renderIssueList(rows) {
      if (rows.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No support issues found</h3>
            <p>Create your first support issue above.</p>
          </div>
        `;
      }

      return rows.map(function (row) {
        return renderIssueCard(row);
      }).join("");
    }

    function renderIssueCard(row) {
      const title = UnganiClientShared.getValue(row, ["issue_title", "subject"], "Support Issue");
      const type = UnganiClientShared.getValue(row, ["issue_type"], "system_issue");
      const status = UnganiClientShared.getValue(row, ["status"], "open");
      const priority = UnganiClientShared.getValue(row, ["priority"], "normal");
      const description = UnganiClientShared.getValue(row, ["description"], "");
      const adminResponse = UnganiClientShared.getValue(row, ["admin_response"], "");
      const internalNotes = UnganiClientShared.getValue(row, ["internal_notes"], "");
      const created = UnganiClientShared.getValue(row, ["created_at"], "");
      const updated = UnganiClientShared.getValue(row, ["updated_at"], "");

      return `
        <div class="ungani-card" style="box-shadow:none;">
          <div class="ungani-section-title">
            <div>
              <h3>${UnganiClientShared.safe(title)}</h3>
              <p class="ungani-small">
                Created: ${UnganiClientShared.safe(UnganiClientShared.formatDate(created))}
                ${updated ? " · Updated: " + UnganiClientShared.safe(UnganiClientShared.formatDate(updated)) : ""}
              </p>
            </div>

            <div>
              ${badge(type, "blue")}
              ${badge(priority, priorityColor(priority))}
              ${badge(status, statusColor(status))}
            </div>
          </div>

          ${description ? `<p class="ungani-small"><strong>Description:</strong> ${UnganiClientShared.safe(description)}</p>` : ""}

          ${adminResponse ? `
            <div class="ungani-card" style="box-shadow:none;background:rgba(212,166,58,0.10);">
              <strong>UNGANI Response</strong>
              <p class="ungani-small">${UnganiClientShared.safe(adminResponse)}</p>
            </div>
          ` : `
            <p class="ungani-small"><strong>UNGANI Response:</strong> No response yet.</p>
          `}

          ${internalNotes ? `<p class="ungani-small"><strong>Internal Notes:</strong> ${UnganiClientShared.safe(internalNotes)}</p>` : ""}

          <div class="ungani-button-row">
            <button class="ungani-btn" onclick="editIssue('${UnganiClientShared.attr(row.id)}')">Edit</button>
            <button class="ungani-btn orange" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'in progress')">In Progress</button>
            <button class="ungani-btn green" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'resolved')">Resolved</button>
            <button class="ungani-btn dark" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'closed')">Closed</button>
            <button class="ungani-btn red" onclick="deleteIssue('${UnganiClientShared.attr(row.id)}')">Delete</button>
          </div>
        </div>
      `;
    }

    function calculateSummary() {
      let open = 0;
      let inProgress = 0;
      let resolved = 0;
      let highUrgent = 0;
      let replied = 0;

      issues.forEach(function (row) {
        const status = String(UnganiClientShared.getValue(row, ["status"], "open")).toLowerCase();
        const priority = String(UnganiClientShared.getValue(row, ["priority"], "normal")).toLowerCase();
        const adminResponse = UnganiClientShared.getValue(row, ["admin_response"], "");

        if (status === "open") open++;
        if (status.includes("progress")) inProgress++;
        if (status.includes("resolved") || status.includes("closed")) resolved++;
        if (priority === "high" || priority === "urgent") highUrgent++;
        if (adminResponse) replied++;
      });

      return { open, inProgress, resolved, highUrgent, replied };
    }

    function filterIssues() {
      const filterType = document.getElementById("filterType") ? UnganiClientShared.value("filterType").toLowerCase() : "";
      const filterStatus = document.getElementById("filterStatus") ? UnganiClientShared.value("filterStatus").toLowerCase() : "";
      const filterPriority = document.getElementById("filterPriority") ? UnganiClientShared.value("filterPriority").toLowerCase() : "";
      const query = document.getElementById("searchBox") ? UnganiClientShared.value("searchBox").toLowerCase() : "";

      return issues.filter(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["issue_type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "")).toLowerCase();
        const priority = String(UnganiClientShared.getValue(row, ["priority"], "")).toLowerCase();

        const haystack = [
          UnganiClientShared.getValue(row, ["issue_title", "subject"], ""),
          type,
          status,
          priority,
          UnganiClientShared.getValue(row, ["description"], ""),
          UnganiClientShared.getValue(row, ["admin_response"], ""),
          UnganiClientShared.getValue(row, ["internal_notes"], "")
        ].join(" ").toLowerCase();

        if (filterType && type !== filterType) return false;
        if (filterStatus && status !== filterStatus) return false;
        if (filterPriority && priority !== filterPriority) return false;
        if (query && !haystack.includes(query)) return false;

        return true;
      });
    }

    async function saveIssue(event) {
      event.preventDefault();

      const title = UnganiClientShared.value("issueTitle");

      if (!title) {
        alert("Please enter an issue title.");
        return;
      }

      const payload = {
        business_type_key: UnganiClientShared.getValue(currentContext.tenant, ["business_type_key"], null),
        section_key: "support",
        issue_title: title,
        subject: title,
        issue_type: UnganiClientShared.value("issueType") || "system_issue",
        priority: UnganiClientShared.value("priority") || "normal",
        status: UnganiClientShared.value("status") || "open",
        description: UnganiClientShared.value("description") || null,
        updated_at: new Date().toISOString(),
        last_updated_by: currentContext.authUser.id
      };

      if (payload.status === "resolved" || payload.status === "closed") {
        payload.resolved_at = new Date().toISOString();
      }

      let response;

      try {
        if (currentEditId) {
          response = await currentContext.supabaseClient
            .from("support_issues")
            .update(payload)
            .eq("id", currentEditId)
            .eq("tenant_id", currentContext.tenantId);
        } else {
          payload.tenant_id = currentContext.tenantId;
          payload.created_by = currentContext.authUser.id;
          payload.created_at = new Date().toISOString();

          response = await currentContext.supabaseClient
            .from("support_issues")
            .insert(payload);
        }
      } catch (error) {
        alert(error.message || "Could not save support issue. Please check your connection.");
        return;
      }

      if (response.error) {
        alert(response.error.message);
        return;
      }

      currentEditId = null;
      UnganiClientShared.showToast("Support issue saved ✓");
      await loadIssues();
    }

    function fillEditForm() {
      if (!currentEditId) return;

      const row = issues.find(function (item) {
        return String(item.id) === String(currentEditId);
      });

      if (!row) return;

      setValue("issueTitle", UnganiClientShared.getValue(row, ["issue_title", "subject"], ""));
      setValue("issueType", UnganiClientShared.getValue(row, ["issue_type"], "system_issue"));
      setValue("priority", UnganiClientShared.getValue(row, ["priority"], "normal"));
      setValue("status", UnganiClientShared.getValue(row, ["status"], "open"));
      setValue("description", UnganiClientShared.getValue(row, ["description"], ""));
    }

    function editIssue(id) {
      currentEditId = id;
      renderSupportPage();
      scrollToForm();
    }

    function cancelEdit() {
      currentEditId = null;
      renderSupportPage();
      UnganiClientShared.showToast("Edit cancelled");
    }

    async function quickStatus(id, status) {
      const payload = {
        status: status,
        updated_at: new Date().toISOString(),
        last_updated_by: currentContext.authUser.id
      };

      if (status === "resolved" || status === "closed") {
        payload.resolved_at = new Date().toISOString();
      }

      let response;

      try {
        response = await currentContext.supabaseClient
          .from("support_issues")
          .update(payload)
          .eq("id", id)
          .eq("tenant_id", currentContext.tenantId);
      } catch (error) {
        alert(error.message || "Could not update status. Please check your connection.");
        return;
      }

      if (response.error) {
        alert(response.error.message);
        return;
      }

      UnganiClientShared.showToast("Support status updated ✓");
      await loadIssues();
    }

    async function deleteIssue(id) {
      if (
        window.UnganiClientShared &&
        typeof UnganiClientShared.ensureCanWrite === "function" &&
        !UnganiClientShared.ensureCanWrite("delete support issue")
      ) {
        return;
      }

      const confirmed = confirm("Move this support issue to Recently Deleted? You can restore it within 30 days.");

      if (!confirmed) return;

      let response;

      try {
        response = await currentContext.supabaseClient.rpc("soft_delete_ungani_record", {
          p_table_name: "support_issues",
          p_record_id: id,
          p_delete_reason: "Deleted from Support Issues page"
        });
      } catch (error) {
        UnganiClientShared.showToast("Could not delete support issue: " + (error.message || "Network error. Please check your connection."));
        return;
      }

      if (response.error) {
        UnganiClientShared.showToast("Could not delete support issue: " + response.error.message);
        return;
      }

      if (response.data && response.data.ok === false) {
        UnganiClientShared.showToast(response.data.message || "Could not delete support issue.");
        return;
      }

      UnganiClientShared.showToast("Support issue moved to Recently Deleted ✓");

      if (currentEditId && String(currentEditId) === String(id)) {
        currentEditId = null;
      }

      await loadIssues();
    }

    function restoreFilters() {
      if (document.getElementById("filterType")) document.getElementById("filterType").value = sessionStorage.getItem("ungani_support_filter_type") || "";
      if (document.getElementById("filterStatus")) document.getElementById("filterStatus").value = sessionStorage.getItem("ungani_support_filter_status") || "";
      if (document.getElementById("filterPriority")) document.getElementById("filterPriority").value = sessionStorage.getItem("ungani_support_filter_priority") || "";
      if (document.getElementById("searchBox")) document.getElementById("searchBox").value = sessionStorage.getItem("ungani_support_search") || "";
    }

    function saveFilters() {
      if (document.getElementById("filterType")) sessionStorage.setItem("ungani_support_filter_type", UnganiClientShared.value("filterType"));
      if (document.getElementById("filterStatus")) sessionStorage.setItem("ungani_support_filter_status", UnganiClientShared.value("filterStatus"));
      if (document.getElementById("filterPriority")) sessionStorage.setItem("ungani_support_filter_priority", UnganiClientShared.value("filterPriority"));
      if (document.getElementById("searchBox")) sessionStorage.setItem("ungani_support_search", UnganiClientShared.value("searchBox"));
    }

    function resetFilters() {
      sessionStorage.removeItem("ungani_support_filter_type");
      sessionStorage.removeItem("ungani_support_filter_status");
      sessionStorage.removeItem("ungani_support_filter_priority");
      sessionStorage.removeItem("ungani_support_search");
      renderSupportPage();
      UnganiClientShared.showToast("Support filters reset ✓");
    }

    function badge(text, color) {
      return `<span class="ungani-badge ${UnganiClientShared.attr(color || "blue")}">${UnganiClientShared.safe(text)}</span>`;
    }

    function statusColor(status) {
      const lower = String(status || "").toLowerCase();

      if (lower.includes("resolved") || lower.includes("closed")) return "green";
      if (lower.includes("progress")) return "orange";
      if (lower.includes("open")) return "blue";

      return "blue";
    }

    function priorityColor(priority) {
      const lower = String(priority || "").toLowerCase();

      if (lower === "urgent" || lower === "high") return "red";
      if (lower === "normal") return "gold";
      if (lower === "low") return "blue";

      return "blue";
    }

    function setValue(id, value) {
      const element = document.getElementById(id);

      if (element) {
        element.value = value === null || value === undefined ? "" : value;
      }
    }

    function scrollToForm() {
      setTimeout(function () {
        const card = document.getElementById("supportFormCard");

        if (card) {
          card.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      }, 100);
    }
  </script>
</body>
</html>
