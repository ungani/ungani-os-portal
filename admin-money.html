<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Admin Money</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin-shared.js"></script>

  <style>
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 24px var(--ungani-shadow);
    }

    .metric-card h3 {
      margin: 0 0 8px;
      color: var(--ungani-muted);
      font-size: 14px;
    }

    .metric-card p {
      margin: 0;
      font-size: 26px;
      font-weight: bold;
      color: var(--ungani-text);
      word-break: break-word;
    }

    .metric-card .note {
      margin-top: 8px;
      color: var(--ungani-muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .metric-card.green { border-left-color: var(--ungani-green); }
    .metric-card.red { border-left-color: var(--ungani-red); }
    .metric-card.orange { border-left-color: var(--ungani-orange); }
    .metric-card.blue { border-left-color: var(--ungani-blue); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 8px 0 6px;
      font-size: 14px;
      color: var(--ungani-text);
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--ungani-border);
      border-radius: 12px;
      background: var(--ungani-card);
      color: var(--ungani-text);
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
      background: var(--ungani-gold);
      color: #061C3D;
      text-decoration: none;
      display: inline-block;
    }

    .btn.dark {
      background: #061C3D;
      color: #FFFFFF;
    }

    html[data-ungani-theme="dark"] .btn.dark {
      background: #F5F5F3;
      color: #061C3D;
    }

    .btn.green { background: var(--ungani-green); color: #FFFFFF; }
    .btn.red { background: var(--ungani-red); color: #FFFFFF; }
    .btn.orange { background: var(--ungani-orange); color: #FFFFFF; }
    .btn.blue { background: var(--ungani-blue); color: #FFFFFF; }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .section-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-title-row h2 {
      margin: 0;
    }

    .row-card {
      background: var(--ungani-bg);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .row-card.income-card { border-left-color: var(--ungani-green); }
    .row-card.expense-card { border-left-color: var(--ungani-red); }
    .row-card.petty-card { border-left-color: var(--ungani-orange); }
    .row-card.other-card { border-left-color: var(--ungani-blue); }

    .row-title {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 6px;
      color: var(--ungani-text);
    }

    .row-detail {
      color: var(--ungani-muted);
      margin: 5px 0;
      line-height: 1.45;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      background: #061C3D;
      color: #FFFFFF;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      text-transform: capitalize;
    }

    .badge.green { background: var(--ungani-green); }
    .badge.red { background: var(--ungani-red); }
    .badge.orange { background: var(--ungani-orange); }
    .badge.blue { background: var(--ungani-blue); }
    .badge.gold { background: var(--ungani-gold); color: #061C3D; }

    .empty {
      text-align: center;
      padding: 28px;
      background: var(--ungani-bg);
      border: 1px dashed var(--ungani-border);
      border-radius: 18px;
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--ungani-text);
    }

    .empty p {
      margin: 0;
      color: var(--ungani-muted);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th, td {
      border-bottom: 1px solid var(--ungani-border);
      padding: 11px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: var(--ungani-bg);
      color: var(--ungani-text);
      font-weight: bold;
    }

    td {
      color: var(--ungani-muted);
    }

    .small-text {
      color: var(--ungani-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .print-header {
      display: none;
    }

    @media print {
      body {
        background: #FFFFFF !important;
        color: #000000 !important;
      }

      .ungani-admin-sidebar,
      .ungani-topbar,
      .no-print,
      .button-row {
        display: none !important;
      }

      .ungani-admin-app {
        display: block !important;
      }

      .ungani-admin-main {
        padding: 0 !important;
      }

      .ungani-card,
      .metric-card,
      .row-card {
        box-shadow: none !important;
        border: 1px solid #DDDDDD !important;
        page-break-inside: avoid;
      }

      .print-header {
        display: block;
        margin-bottom: 18px;
        border-bottom: 2px solid #061C3D;
        padding-bottom: 12px;
      }

      .print-header h1 {
        margin: 0;
        color: #061C3D;
      }

      .print-header p {
        margin: 4px 0;
        color: #333333;
      }
    }

    @media (max-width: 950px) {
      .two-col {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="adminRoot"></div>

  <script>
    let supabaseClient = null;
    let currentAdmin = null;

    let tenants = [];
    let moneyRecords = [];

    const pageMainHtml = `
      <section class="ungani-card ungani-hero-card">
        <div style="position: relative; z-index: 1;">
          <h2>Admin Money Center</h2>
          <p>
            Review all client income, sales, expenses, petty cash, and business money records in one admin view.
          </p>
          <div style="margin-top: 16px;">
            <a class="btn" href="admin-home.html">Admin Home</a>
            <a class="btn green" href="admin.html">Main Admin</a>
            <a class="btn blue" href="admin-reports.html">Reports</a>
            <a class="btn dark" href="admin-settings.html">Admin Settings</a>
          </div>
        </div>
      </section>

      <section class="page-grid" id="metricsGrid">
        <div class="metric-card"><h3>Loading</h3><p>...</p><div class="note">Please wait</div></div>
      </section>

      <section class="ungani-card no-print">
        <div class="section-title-row">
          <h2>Money Filters</h2>
          <button class="btn green" onclick="loadPageData()">Refresh</button>
        </div>

        <div class="form-grid">
          <div>
            <label for="clientFilter">Client</label>
            <select id="clientFilter" onchange="renderMoneyPage()">
              <option value="">All Clients</option>
            </select>
          </div>

          <div>
            <label for="typeFilter">Record Type</label>
            <select id="typeFilter" onchange="renderMoneyPage()">
              <option value="">All Types</option>
              <option value="income">Income / Revenue</option>
              <option value="sales">Sales</option>
              <option value="expense">Expense / Cost</option>
              <option value="petty_cash">Petty Cash</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div>
            <label for="dateFrom">Date From</label>
            <input id="dateFrom" type="date" onchange="renderMoneyPage()" />
          </div>

          <div>
            <label for="dateTo">Date To</label>
            <input id="dateTo" type="date" onchange="renderMoneyPage()" />
          </div>

          <div>
            <label for="searchBox">Search</label>
            <input id="searchBox" placeholder="Search money records..." oninput="renderMoneyPage()" />
          </div>
        </div>

        <div class="button-row">
          <button class="btn blue" onclick="printMoneyReport()">Print / Save PDF</button>
          <button class="btn dark" onclick="resetFilters()">Reset Filters</button>
        </div>
      </section>

      <section class="two-col">
        <div class="ungani-card">
          <div class="section-title-row">
            <h2>Client Money Summary</h2>
          </div>
          <div id="clientSummaryBox">
            <div class="empty">
              <h3>Loading client summary...</h3>
              <p>Please wait.</p>
            </div>
          </div>
        </div>

        <div class="ungani-card">
          <div class="section-title-row">
            <h2>Latest Money Records</h2>
          </div>
          <div id="latestMoneyBox">
            <div class="empty">
              <h3>Loading latest records...</h3>
              <p>Please wait.</p>
            </div>
          </div>
        </div>
      </section>

      <section class="ungani-card">
        <div class="print-header">
          <h1>UNGANI OS Admin Money Report</h1>
          <p><strong>Generated:</strong> <span id="printGeneratedDate"></span></p>
          <p>ungani.com | info@ungani.com</p>
        </div>

        <div class="section-title-row">
          <h2>All Money Records</h2>
          <p class="small-text" id="recordsCountText">Loading...</p>
        </div>

        <div id="moneyRecordsBox">
          <div class="empty">
            <h3>Loading money records...</h3>
            <p>Please wait.</p>
          </div>
        </div>
      </section>
    `;

    window.addEventListener("load", function () {
      UnganiAdminShared.renderShell("adminRoot", {
        activeKey: "admin-money",
        pageTitle: "Admin Money",
        pageSubtitle: "View all client income, expenses, sales, and petty cash.",
        footerTitle: "Admin Money",
        footerVersion: "Admin Money Version: Step 286 Shared Session Added",
        mainHtml: pageMainHtml
      });

      UnganiAdminShared.requireAdmin({
        onNoSession: function () {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiLoginShell").classList.remove("hidden");
        },
        onBlocked: function (reason) {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiBlockedShell").classList.remove("hidden");
          document.getElementById("unganiBlockedReason").innerText = reason;
        },
        onReady: async function (admin, client) {
          currentAdmin = admin;
          supabaseClient = client;

          UnganiAdminShared.renderSidebar("adminSidebar", {
            activeKey: "admin-money",
            adminName: admin.full_name || "Admin Workspace",
            footerTitle: "Admin Money",
            footerVersion: "Admin Money Version: Step 286 Shared Session Added"
          });

          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiAppShell").classList.remove("hidden");

          await loadPageData();
        }
      });
    });

    function safe(value) {
      return UnganiAdminShared.safe(value);
    }

    function cleanText(value) {
      return UnganiAdminShared.cleanText(value);
    }

    function getField(row, names, fallback = "") {
      for (const name of names) {
        if (row && row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return fallback;
    }

    function getTenantName(row) {
      return getField(row, ["company_name", "business_name", "name"], "Client Business");
    }

    function getTenantNameById(tenantId) {
      const tenant = tenants.find(row => String(row.id) === String(tenantId));
      return tenant ? getTenantName(tenant) : "Unknown Client";
    }

    function getMoneyDate(row) {
      return getField(row, ["transaction_date", "record_date", "money_date", "created_at", "updated_at"], "");
    }

    function getMoneyDescription(row) {
      return getField(row, ["description", "notes", "title", "record_title", "reference", "category"], "Money record");
    }

    function getMoneyCategory(row) {
      return getField(row, ["category", "category_name", "record_category"], "N/A");
    }

    function getMoneyReference(row) {
      return getField(row, ["reference", "payment_reference", "mpesa_reference", "receipt_number", "invoice_number"], "N/A");
    }

    function amountValue(row) {
      const raw = getField(row, ["amount", "total_amount", "value", "paid_amount"], 0);
      const num = Number(raw);
      return isNaN(num) ? 0 : num;
    }

    function moneyType(row) {
      const raw = String(getField(row, ["record_type", "transaction_type", "type", "money_type"], "other")).toLowerCase();

      if (["income", "sale", "sales", "revenue", "received", "payment_received"].includes(raw)) return "income";
      if (["expense", "expenses", "cost", "paid", "payment", "purchase"].includes(raw)) return "expense";
      if (["petty_cash", "petty cash", "cash"].includes(raw)) return "petty_cash";

      return raw || "other";
    }

    function typeLabel(type) {
      if (type === "income") return "Income / Sales";
      if (type === "expense") return "Expense";
      if (type === "petty_cash") return "Petty Cash";
      return cleanText(type || "Other");
    }

    function typeBadge(type) {
      if (type === "income") return `<span class="badge green">${safe(typeLabel(type))}</span>`;
      if (type === "expense") return `<span class="badge red">${safe(typeLabel(type))}</span>`;
      if (type === "petty_cash") return `<span class="badge orange">${safe(typeLabel(type))}</span>`;
      return `<span class="badge blue">${safe(typeLabel(type))}</span>`;
    }

    function cardClassByType(type) {
      if (type === "income") return "income-card";
      if (type === "expense") return "expense-card";
      if (type === "petty_cash") return "petty-card";
      return "other-card";
    }

    function formatDateTime(value) {
      if (!value) return "N/A";
      const dateObj = new Date(value);
      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function moneyFormat(value) {
      const number = Number(value || 0);
      return "KES " + number.toLocaleString("en-KE", {
        maximumFractionDigits: 2
      });
    }

    async function safeSelect(tableName) {
      try {
        const { data, error } = await supabaseClient
          .from(tableName)
          .select("*")
          .limit(10000);

        if (error) {
          console.log(tableName, error.message);
          return [];
        }

        return data || [];
      } catch (error) {
        console.log(tableName, error.message);
        return [];
      }
    }

    async function loadPageData() {
      UnganiAdminShared.showToast("Loading money records...");

      const [tenantRows, transactionRows] = await Promise.all([
        safeSelect("tenants"),
        safeSelect("transactions")
      ]);

      tenants = tenantRows;
      moneyRecords = transactionRows.sort((a, b) => new Date(getMoneyDate(b) || 0) - new Date(getMoneyDate(a) || 0));

      fillClientFilter();
      renderMoneyPage();

      UnganiAdminShared.showToast("Money records updated ✓");
    }

    function fillClientFilter() {
      const selected = document.getElementById("clientFilter").value;

      const options = tenants
        .map(row => `<option value="${safe(row.id)}">${safe(getTenantName(row))}</option>`)
        .join("");

      document.getElementById("clientFilter").innerHTML = `<option value="">All Clients</option>${options}`;

      if (selected) {
        document.getElementById("clientFilter").value = selected;
      }
    }

    function withinDateRange(row) {
      const from = document.getElementById("dateFrom").value;
      const to = document.getElementById("dateTo").value;

      if (!from && !to) return true;

      const value = getMoneyDate(row);
      if (!value) return true;

      const recordDate = String(value).slice(0, 10);

      if (from && recordDate < from) return false;
      if (to && recordDate > to) return false;

      return true;
    }

    function filteredMoneyRecords() {
      const clientFilter = document.getElementById("clientFilter").value;
      const typeFilter = document.getElementById("typeFilter").value;
      const query = document.getElementById("searchBox").value.toLowerCase().trim();

      let rows = [...moneyRecords];

      if (clientFilter) {
        rows = rows.filter(row => String(row.tenant_id) === String(clientFilter));
      }

      if (typeFilter) {
        if (typeFilter === "sales") {
          rows = rows.filter(row => ["income", "sales", "sale", "revenue"].includes(moneyType(row)) || String(JSON.stringify(row)).toLowerCase().includes("sales"));
        } else {
          rows = rows.filter(row => moneyType(row) === typeFilter);
        }
      }

      rows = rows.filter(withinDateRange);

      if (query) {
        rows = rows.filter(row => {
          const haystack = [
            getTenantNameById(row.tenant_id),
            getMoneyDescription(row),
            getMoneyCategory(row),
            getMoneyReference(row),
            moneyType(row),
            amountValue(row),
            JSON.stringify(row)
          ].join(" ").toLowerCase();

          return haystack.includes(query);
        });
      }

      return rows;
    }

    function renderMoneyPage() {
      renderMetrics();
      renderClientSummary();
      renderLatestMoney();
      renderMoneyRecords();
    }

    function calculateSummary(rows) {
      let income = 0;
      let expenses = 0;
      let pettyCash = 0;
      let other = 0;

      rows.forEach(row => {
        const type = moneyType(row);
        const amount = amountValue(row);

        if (type === "income") income += amount;
        else if (type === "expense") expenses += amount;
        else if (type === "petty_cash") pettyCash += amount;
        else other += amount;
      });

      return {
        totalRecords: rows.length,
        income,
        expenses,
        pettyCash,
        other,
        net: income - expenses - pettyCash
      };
    }

    function renderMetrics() {
      const rows = filteredMoneyRecords();
      const summary = calculateSummary(rows);

      const metrics = [
        { title: "Total Records", value: summary.totalRecords, note: "Money records in current view", cls: "blue" },
        { title: "Income / Sales", value: moneyFormat(summary.income), note: "Recorded income and sales", cls: "green" },
        { title: "Expenses", value: moneyFormat(summary.expenses), note: "Recorded expenses and costs", cls: summary.expenses > 0 ? "red" : "green" },
        { title: "Petty Cash", value: moneyFormat(summary.pettyCash), note: "Petty cash records", cls: summary.pettyCash > 0 ? "orange" : "green" },
        { title: "Other Records", value: moneyFormat(summary.other), note: "Other money records", cls: "blue" },
        { title: "Estimated Balance", value: moneyFormat(summary.net), note: "Income minus expenses and petty cash", cls: summary.net >= 0 ? "green" : "red" }
      ];

      document.getElementById("metricsGrid").innerHTML = metrics.map(item => `
        <div class="metric-card ${safe(item.cls)}">
          <h3>${safe(item.title)}</h3>
          <p>${safe(item.value)}</p>
          <div class="note">${safe(item.note)}</div>
        </div>
      `).join("");
    }

    function renderClientSummary() {
      const rows = filteredMoneyRecords();
      const clientMap = {};

      tenants.forEach(tenant => {
        clientMap[tenant.id] = {
          id: tenant.id,
          name: getTenantName(tenant),
          records: 0,
          income: 0,
          expenses: 0,
          pettyCash: 0,
          other: 0
        };
      });

      rows.forEach(row => {
        const tenantId = row.tenant_id;

        if (!tenantId || !clientMap[tenantId]) return;

        const type = moneyType(row);
        const amount = amountValue(row);

        clientMap[tenantId].records += 1;

        if (type === "income") clientMap[tenantId].income += amount;
        else if (type === "expense") clientMap[tenantId].expenses += amount;
        else if (type === "petty_cash") clientMap[tenantId].pettyCash += amount;
        else clientMap[tenantId].other += amount;
      });

      const summaryRows = Object.values(clientMap)
        .filter(row => row.records > 0)
        .map(row => {
          row.net = row.income - row.expenses - row.pettyCash;
          return row;
        })
        .sort((a, b) => b.records - a.records)
        .slice(0, 10);

      if (summaryRows.length === 0) {
        document.getElementById("clientSummaryBox").innerHTML = `
          <div class="empty">
            <h3>No client money summary yet</h3>
            <p>Client summaries will appear after money records are added.</p>
          </div>
        `;
        return;
      }

      document.getElementById("clientSummaryBox").innerHTML = summaryRows.map(row => `
        <div class="row-card ${row.net >= 0 ? "income-card" : "expense-card"}">
          <div class="row-title">${safe(row.name)}</div>
          <p class="row-detail"><strong>Records:</strong> ${safe(row.records)}</p>
          <p class="row-detail"><strong>Income:</strong> ${safe(moneyFormat(row.income))}</p>
          <p class="row-detail"><strong>Expenses:</strong> ${safe(moneyFormat(row.expenses))}</p>
          <p class="row-detail"><strong>Petty Cash:</strong> ${safe(moneyFormat(row.pettyCash))}</p>
          <p class="row-detail"><strong>Estimated Balance:</strong> ${safe(moneyFormat(row.net))}</p>
          <span class="badge ${row.net >= 0 ? "green" : "red"}">${safe(row.net >= 0 ? "Positive" : "Negative")}</span>
        </div>
      `).join("");
    }

    function renderLatestMoney() {
      const rows = filteredMoneyRecords().slice(0, 8);

      if (rows.length === 0) {
        document.getElementById("latestMoneyBox").innerHTML = `
          <div class="empty">
            <h3>No money records found</h3>
            <p>Money records will appear here once clients add income, expenses, or petty cash.</p>
          </div>
        `;
        return;
      }

      document.getElementById("latestMoneyBox").innerHTML = rows.map(row => {
        const type = moneyType(row);

        return `
          <div class="row-card ${safe(cardClassByType(type))}">
            <div class="row-title">${safe(getMoneyDescription(row))}</div>
            <p class="row-detail"><strong>Client:</strong> ${safe(getTenantNameById(row.tenant_id))}</p>
            <p class="row-detail"><strong>Amount:</strong> ${safe(moneyFormat(amountValue(row)))}</p>
            <p class="row-detail"><strong>Date:</strong> ${safe(formatDateTime(getMoneyDate(row)))}</p>
            ${typeBadge(type)}
          </div>
        `;
      }).join("");
    }

    function renderMoneyRecords() {
      const rows = filteredMoneyRecords();

      document.getElementById("recordsCountText").innerText = `${rows.length} record(s) shown`;

      if (rows.length === 0) {
        document.getElementById("moneyRecordsBox").innerHTML = `
          <div class="empty">
            <h3>No money records found</h3>
            <p>Try changing the filters or wait for clients to add records.</p>
          </div>
        `;
        return;
      }

      document.getElementById("moneyRecordsBox").innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Client</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Category</th>
                <th>Description</th>
                <th>Reference</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(row => {
                const type = moneyType(row);

                return `
                  <tr>
                    <td>${safe(getTenantNameById(row.tenant_id))}</td>
                    <td>${safe(typeLabel(type))}</td>
                    <td>${safe(moneyFormat(amountValue(row)))}</td>
                    <td>${safe(getMoneyCategory(row))}</td>
                    <td>${safe(getMoneyDescription(row))}</td>
                    <td>${safe(getMoneyReference(row))}</td>
                    <td>${safe(formatDateTime(getMoneyDate(row)))}</td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function resetFilters() {
      document.getElementById("clientFilter").value = "";
      document.getElementById("typeFilter").value = "";
      document.getElementById("dateFrom").value = "";
      document.getElementById("dateTo").value = "";
      document.getElementById("searchBox").value = "";

      renderMoneyPage();
      UnganiAdminShared.showToast("Money filters reset ✓");
    }

    function printMoneyReport() {
      document.getElementById("printGeneratedDate").innerText = formatDateTime(new Date().toISOString());
      window.print();
    }
  </script>
</body>
</html>
