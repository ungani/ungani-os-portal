<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Admin Money</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin-shared.js"></script>

  <style>
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 24px var(--ungani-shadow);
    }

    .metric-card h3 {
      margin: 0 0 8px;
      color: var(--ungani-muted);
      font-size: 14px;
    }

    .metric-card p {
      margin: 0;
      font-size: 26px;
      font-weight: bold;
      color: var(--ungani-text);
      word-break: break-word;
    }

    .metric-card .note {
      margin-top: 8px;
      color: var(--ungani-muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .metric-card.green { border-left-color: var(--ungani-green); }
    .metric-card.red { border-left-color: var(--ungani-red); }
    .metric-card.orange { border-left-color: var(--ungani-orange); }
    .metric-card.blue { border-left-color: var(--ungani-blue); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 8px 0 6px;
      font-size: 14px;
      color: var(--ungani-text);
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--ungani-border);
      border-radius: 12px;
      background: var(--ungani-card);
      color: var(--ungani-text);
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .section-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-title-row h2 {
      margin: 0;
    }

    .row-card {
      background: var(--ungani-bg);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .row-card.income-card { border-left-color: var(--ungani-green); }
    .row-card.expense-card { border-left-color: var(--ungani-red); }
    .row-card.petty-card { border-left-color: var(--ungani-orange); }
    .row-card.other-card { border-left-color: var(--ungani-blue); }

    .row-title {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 6px;
      color: var(--ungani-text);
    }

    .row-detail {
      color: var(--ungani-muted);
      margin: 5px 0;
      line-height: 1.45;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      background: #061C3D;
      color: #FFFFFF;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      text-transform: capitalize;
    }

    .badge.green { background: var(--ungani-green); }
    .badge.red { background: var(--ungani-red); }
    .badge.orange { background: var(--ungani-orange); }
    .badge.blue { background: var(--ungani-blue); }
    .badge.gold { background: var(--ungani-gold); color: #061C3D; }

    .empty {
      text-align: center;
      padding: 28px;
      background: var(--ungani-bg);
      border: 1px dashed var(--ungani-border);
      border-radius: 18px;
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--ungani-text);
    }

    .empty p {
      margin: 0;
      color: var(--ungani-muted);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th, td {
      border-bottom: 1px solid var(--ungani-border);
      padding: 11px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: var(--ungani-bg);
      color: var(--ungani-text);
      font-weight: bold;
    }

    td {
      color: var(--ungani-muted);
    }

    .small-text {
      color: var(--ungani-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .print-header {
      display: none;
    }

    @media print {
      body {
        background: #FFFFFF !important;
        color: #000000 !important;
      }

      .ungani-admin-sidebar,
      .ungani-topbar,
      .no-print,
      .button-row {
        display: none !important;
      }

      .ungani-admin-app {
        display: block !important;
      }

      .ungani-admin-main {
        padding: 0 !important;
      }

      .ungani-card,
      .metric-card,
      .row-card {
        box-shadow: none !important;
        border: 1px solid #DDDDDD !important;
        page-break-inside: avoid;
      }

      .print-header {
        display: block;
        margin-bottom: 18px;
        border-bottom: 2px solid #061C3D;
        padding-bottom: 12px;
      }

      .print-header h1 {
        margin: 0;
        color: #061C3D;
      }

      .print-header p {
        margin: 4px 0;
        color: #333333;
      }
    }

    @media (max-width: 950px) {
      .two-col {
        grid-template-columns: 1fr;
      }
    }

    .category-tiles {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .category-tile {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 5px solid var(--tile-accent, var(--ungani-gold));
      border-radius: 18px;
      padding: 14px 16px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: 0.18s ease;
    }

    .category-tile:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px var(--ungani-shadow);
    }

    .category-tile.active {
      box-shadow: 0 0 0 2px var(--tile-accent, var(--ungani-gold));
    }

    .category-tile .tile-count {
      display: block;
      font-size: 22px;
      font-weight: 900;
      color: var(--ungani-text);
      word-break: break-word;
    }

    .category-tile .tile-label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--ungani-muted);
      margin-top: 4px;
    }

    .balance-banner {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--balance-accent, var(--ungani-green));
      border-radius: 20px;
      padding: 16px 18px;
      margin-bottom: 18px;
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
    }

    .balance-banner strong {
      font-size: 24px;
      color: var(--ungani-text);
    }

    .balance-banner span {
      color: var(--ungani-muted);
      font-size: 13px;
    }

    tbody tr {
      cursor: pointer;
      transition: background 0.15s ease;
    }

    tbody tr:hover {
      background: rgba(212, 166, 58, 0.08);
    }

    tbody tr td:first-child {
      border-left: 4px solid var(--accent, #64748B);
      font-weight: bold;
      color: var(--ungani-text);
    }

    .modal-form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
    }

    .modal-form-grid-full {
      grid-column: 1 / -1;
    }

    .modal-form-grid label {
      margin-top: 0;
    }

    .modal-form-grid p {
      margin: 0;
      color: var(--ungani-muted);
      word-break: break-word;
    }

    @media print {
      .category-tiles,
      .balance-banner,
      .ungani-modal-backdrop {
        display: none !important;
      }
    }
  </style>
</head>

<body>
  <div id="adminRoot"></div>

  <script>
    let supabaseClient = null;
    let currentAdmin = null;

    let tenants = [];
    let moneyRecords = [];

    const pageMainHtml = `
      <section class="ungani-card ungani-hero-card">
        <div style="position: relative; z-index: 1;">
          <h2>Admin Money Center</h2>
          <p>
            Review all client income, sales, expenses, petty cash, and business money records in one admin view.
          </p>
          <div style="margin-top: 16px;">
            <a class="ungani-btn" href="admin-home.html">Admin Home</a>
            <a class="ungani-btn green" href="admin.html">Main Admin</a>
            <a class="ungani-btn blue" href="admin-reports.html">Reports</a>
            <a class="ungani-btn dark" href="admin-settings.html">Admin Settings</a>
          </div>
        </div>
      </section>

      <div class="balance-banner no-print" id="balanceBanner">
        <strong>Loading...</strong>
        <span>Estimated balance (income minus expenses and petty cash)</span>
      </div>

      <section class="category-tiles no-print" id="categoryTiles">
        <div class="empty"><h3>Loading categories...</h3><p>Please wait.</p></div>
      </section>

      <section class="ungani-card no-print">
        <div class="section-title-row">
          <h2>Money Filters</h2>
          <button class="ungani-btn green" onclick="loadPageData()">Refresh</button>
        </div>

        <div class="form-grid">
          <div>
            <label for="clientFilter">Client</label>
            <select id="clientFilter" onchange="renderMoneyPage()">
              <option value="">All Clients</option>
            </select>
          </div>

          <div>
            <label for="dateFrom">Date From</label>
            <input id="dateFrom" type="date" onchange="renderMoneyPage()" />
          </div>

          <div>
            <label for="dateTo">Date To</label>
            <input id="dateTo" type="date" onchange="renderMoneyPage()" />
          </div>

          <div>
            <label for="searchBox">Search</label>
            <input id="searchBox" placeholder="Search money records (any category)..." oninput="renderMoneyPage()" />
          </div>
        </div>

        <div class="button-row">
          <button class="ungani-btn blue" onclick="printMoneyReport()">Print / Save PDF</button>
          <button class="ungani-btn dark" onclick="resetFilters()">Reset Filters</button>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>Client Money Summary</h2>
        </div>
        <div id="clientSummaryBox">
          <div class="empty">
            <h3>Loading client summary...</h3>
            <p>Please wait.</p>
          </div>
        </div>
      </section>

      <section class="ungani-card">
        <div class="print-header">
          <h1>UNGANI OS Admin Money Report</h1>
          <p><strong>Generated:</strong> <span id="printGeneratedDate"></span></p>
          <p>ungani.com | info@ungani.com</p>
        </div>

        <div class="section-title-row">
          <h2>All Money Records</h2>
          <p class="small-text" id="recordsCountText">Loading...</p>
        </div>

        <div id="moneyRecordsBox">
          <div class="empty">
            <h3>Loading money records...</h3>
            <p>Please wait.</p>
          </div>
        </div>
      </section>
    `;

    window.addEventListener("load", function () {
      UnganiAdminShared.renderShell("adminRoot", {
        activeKey: "admin-money",
        pageTitle: "Admin Money",
        pageSubtitle: "View all client income, expenses, sales, and petty cash.",
        footerTitle: "Admin Money",
        footerVersion: "Admin Money Version: Step 286 Shared Session Added",
        mainHtml: pageMainHtml
      });

      UnganiAdminShared.requireAdmin({
        onNoSession: function () {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiLoginShell").classList.remove("hidden");
        },
        onBlocked: function (reason) {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiBlockedShell").classList.remove("hidden");
          document.getElementById("unganiBlockedReason").innerText = reason;
        },
        onReady: async function (admin, client) {
          currentAdmin = admin;
          supabaseClient = client;

          UnganiAdminShared.renderSidebar("adminSidebar", {
            activeKey: "admin-money",
            adminName: admin.full_name || "Admin Workspace",
            footerTitle: "Admin Money",
            footerVersion: "Admin Money Version: Step 286 Shared Session Added"
          });

          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiAppShell").classList.remove("hidden");

          await loadPageData();
        }
      });
    });

    function safe(value) {
      return UnganiAdminShared.safe(value);
    }

    function cleanText(value) {
      return UnganiAdminShared.cleanText(value);
    }

    function getField(row, names, fallback = "") {
      for (const name of names) {
        if (row && row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return fallback;
    }

    function getTenantName(row) {
      return getField(row, ["company_name", "business_name", "name"], "Client Business");
    }

    function getTenantNameById(tenantId) {
      const tenant = tenants.find(row => String(row.id) === String(tenantId));
      return tenant ? getTenantName(tenant) : "Unknown Client";
    }

    function getMoneyDate(row) {
      return getField(row, ["transaction_date", "record_date", "money_date", "created_at", "updated_at"], "");
    }

    function getMoneyDescription(row) {
      return getField(row, ["description", "notes", "title", "record_title", "reference", "category"], "Money record");
    }

    function getMoneyCategory(row) {
      return getField(row, ["category", "category_name", "record_category"], "N/A");
    }

    function getMoneyReference(row) {
      return getField(row, ["reference", "payment_reference", "mpesa_reference", "receipt_number", "invoice_number"], "N/A");
    }

    function amountValue(row) {
      const raw = getField(row, ["amount", "total_amount", "value", "paid_amount"], 0);
      const num = Number(raw);
      return isNaN(num) ? 0 : num;
    }

    function moneyType(row) {
      const raw = String(getField(row, ["record_type", "transaction_type", "type", "money_type"], "other")).toLowerCase();

      if (["income", "sale", "sales", "revenue", "received", "payment_received"].includes(raw)) return "income";
      if (["expense", "expenses", "cost", "paid", "payment", "purchase"].includes(raw)) return "expense";
      if (["petty_cash", "petty cash", "cash"].includes(raw)) return "petty_cash";

      return raw || "other";
    }

    function typeLabel(type) {
      if (type === "income") return "Income / Sales";
      if (type === "expense") return "Expense";
      if (type === "petty_cash") return "Petty Cash";
      return cleanText(type || "Other");
    }

    function typeBadge(type) {
      if (type === "income") return `<span class="badge green">${safe(typeLabel(type))}</span>`;
      if (type === "expense") return `<span class="badge red">${safe(typeLabel(type))}</span>`;
      if (type === "petty_cash") return `<span class="badge orange">${safe(typeLabel(type))}</span>`;
      return `<span class="badge blue">${safe(typeLabel(type))}</span>`;
    }

    function formatDateTime(value) {
      if (!value) return "N/A";
      const dateObj = new Date(value);
      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function moneyFormat(value) {
      const number = Number(value || 0);
      return "KES " + number.toLocaleString("en-KE", {
        maximumFractionDigits: 2
      });
    }

    async function safeSelect(tableName) {
      try {
        const { data, error } = await supabaseClient
          .from(tableName)
          .select("*")
          .limit(10000);

        if (error) {
          console.log(tableName, error.message);
          return [];
        }

        return data || [];
      } catch (error) {
        console.log(tableName, error.message);
        return [];
      }
    }

    async function loadPageData() {
      UnganiAdminShared.showToast("Loading money records...");

      const [tenantRows, transactionRows] = await Promise.all([
        safeSelect("tenants"),
        safeSelect("transactions")
      ]);

      tenants = tenantRows;
      moneyRecords = transactionRows.sort((a, b) => new Date(getMoneyDate(b) || 0) - new Date(getMoneyDate(a) || 0));

      fillClientFilter();
      renderMoneyPage();

      UnganiAdminShared.showToast("Money records updated ✓");
    }

    function fillClientFilter() {
      const selected = document.getElementById("clientFilter").value;

      const options = tenants
        .map(row => `<option value="${safe(row.id)}">${safe(getTenantName(row))}</option>`)
        .join("");

      document.getElementById("clientFilter").innerHTML = `<option value="">All Clients</option>${options}`;

      if (selected) {
        document.getElementById("clientFilter").value = selected;
      }
    }

    function withinDateRange(row) {
      const from = document.getElementById("dateFrom").value;
      const to = document.getElementById("dateTo").value;

      if (!from && !to) return true;

      const value = getMoneyDate(row);
      if (!value) return true;

      const recordDate = String(value).slice(0, 10);

      if (from && recordDate < from) return false;
      if (to && recordDate > to) return false;

      return true;
    }

    let activeMoneyCategory = "all";

    const MONEY_CATEGORIES = [
      { key: "all", label: "All Records", accent: "#D4A63A", match: () => true },
      { key: "income", label: "Income & Sales", accent: "#15803D", match: row => moneyType(row) === "income" },
      { key: "expense", label: "Expenses", accent: "#B91C1C", match: row => moneyType(row) === "expense" },
      { key: "petty_cash", label: "Petty Cash", accent: "#C77700", match: row => moneyType(row) === "petty_cash" },
      { key: "other", label: "Other", accent: "#2563EB", match: row => !["income", "expense", "petty_cash"].includes(moneyType(row)) }
    ];

    function baseFilteredMoneyRecords() {
      const clientFilter = document.getElementById("clientFilter").value;
      const query = document.getElementById("searchBox").value.toLowerCase().trim();

      let rows = [...moneyRecords];

      if (clientFilter) {
        rows = rows.filter(row => String(row.tenant_id) === String(clientFilter));
      }

      rows = rows.filter(withinDateRange);

      if (query) {
        rows = rows.filter(row => {
          const haystack = [
            getTenantNameById(row.tenant_id),
            getMoneyDescription(row),
            getMoneyCategory(row),
            getMoneyReference(row),
            moneyType(row),
            amountValue(row),
            JSON.stringify(row)
          ].join(" ").toLowerCase();

          return haystack.includes(query);
        });
      }

      return rows;
    }

    function filteredMoneyRecords() {
      const rows = baseFilteredMoneyRecords();
      const category = MONEY_CATEGORIES.find(c => c.key === activeMoneyCategory) || MONEY_CATEGORIES[0];

      return rows.filter(category.match);
    }

    function selectMoneyCategory(key) {
      activeMoneyCategory = key;
      renderMoneyPage();
    }

    function calculateSummary(rows) {
      let income = 0;
      let expenses = 0;
      let pettyCash = 0;
      let other = 0;

      rows.forEach(row => {
        const type = moneyType(row);
        const amount = amountValue(row);

        if (type === "income") income += amount;
        else if (type === "expense") expenses += amount;
        else if (type === "petty_cash") pettyCash += amount;
        else other += amount;
      });

      return {
        totalRecords: rows.length,
        income,
        expenses,
        pettyCash,
        other,
        net: income - expenses - pettyCash
      };
    }

    function renderCategoryTiles() {
      const rows = baseFilteredMoneyRecords();

      document.getElementById("categoryTiles").innerHTML = MONEY_CATEGORIES.map(category => {
        const matchingRows = rows.filter(category.match);
        const sum = matchingRows.reduce((total, row) => total + amountValue(row), 0);
        const isActive = category.key === activeMoneyCategory;

        return `
          <button type="button" class="category-tile${isActive ? " active" : ""}" style="--tile-accent:${category.accent};" onclick="selectMoneyCategory('${category.key}')">
            <span class="tile-count">${safe(moneyFormat(sum))}</span>
            <span class="tile-label">${safe(category.label)} &bull; ${safe(matchingRows.length)}</span>
          </button>
        `;
      }).join("");
    }

    function renderBalanceBanner() {
      const rows = baseFilteredMoneyRecords();
      const summary = calculateSummary(rows);
      const banner = document.getElementById("balanceBanner");

      banner.style.setProperty("--balance-accent", summary.net >= 0 ? "var(--ungani-green)" : "var(--ungani-red)");
      banner.innerHTML = `
        <strong>${safe(moneyFormat(summary.net))}</strong>
        <span>Estimated balance across ${safe(summary.totalRecords)} record(s) - income minus expenses and petty cash</span>
      `;
    }

    function renderMoneyPage() {
      renderCategoryTiles();
      renderBalanceBanner();
      renderClientSummary();
      renderMoneyRecords();
    }


    function renderClientSummary() {
      const rows = filteredMoneyRecords();
      const clientMap = {};

      tenants.forEach(tenant => {
        clientMap[tenant.id] = {
          id: tenant.id,
          name: getTenantName(tenant),
          records: 0,
          income: 0,
          expenses: 0,
          pettyCash: 0,
          other: 0
        };
      });

      rows.forEach(row => {
        const tenantId = row.tenant_id;

        if (!tenantId || !clientMap[tenantId]) return;

        const type = moneyType(row);
        const amount = amountValue(row);

        clientMap[tenantId].records += 1;

        if (type === "income") clientMap[tenantId].income += amount;
        else if (type === "expense") clientMap[tenantId].expenses += amount;
        else if (type === "petty_cash") clientMap[tenantId].pettyCash += amount;
        else clientMap[tenantId].other += amount;
      });

      const summaryRows = Object.values(clientMap)
        .filter(row => row.records > 0)
        .map(row => {
          row.net = row.income - row.expenses - row.pettyCash;
          return row;
        })
        .sort((a, b) => b.records - a.records)
        .slice(0, 10);

      if (summaryRows.length === 0) {
        document.getElementById("clientSummaryBox").innerHTML = `
          <div class="empty">
            <h3>No client money summary yet</h3>
            <p>Client summaries will appear after money records are added.</p>
          </div>
        `;
        return;
      }

      document.getElementById("clientSummaryBox").innerHTML = summaryRows.map(row => `
        <div class="row-card ${row.net >= 0 ? "income-card" : "expense-card"}">
          <div class="row-title">${safe(row.name)}</div>
          <p class="row-detail"><strong>Records:</strong> ${safe(row.records)}</p>
          <p class="row-detail"><strong>Income:</strong> ${safe(moneyFormat(row.income))}</p>
          <p class="row-detail"><strong>Expenses:</strong> ${safe(moneyFormat(row.expenses))}</p>
          <p class="row-detail"><strong>Petty Cash:</strong> ${safe(moneyFormat(row.pettyCash))}</p>
          <p class="row-detail"><strong>Estimated Balance:</strong> ${safe(moneyFormat(row.net))}</p>
          <span class="badge ${row.net >= 0 ? "green" : "red"}">${safe(row.net >= 0 ? "Positive" : "Negative")}</span>
        </div>
      `).join("");
    }

    let lastRenderedMoneyRows = [];

    function renderMoneyRecords() {
      const rows = filteredMoneyRecords();
      lastRenderedMoneyRows = rows;

      document.getElementById("recordsCountText").innerText = `${rows.length} record(s) shown`;

      if (rows.length === 0) {
        document.getElementById("moneyRecordsBox").innerHTML = `
          <div class="empty">
            <h3>No money records found</h3>
            <p>Try changing the category, filters, or wait for clients to add records.</p>
          </div>
        `;
        return;
      }

      document.getElementById("moneyRecordsBox").innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Client</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Category</th>
                <th>Description</th>
                <th>Reference</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map((row, index) => {
                const type = moneyType(row);
                const accentMap = { income: "#15803D", expense: "#B91C1C", petty_cash: "#C77700" };
                const accent = accentMap[type] || "#2563EB";

                return `
                  <tr style="--accent:${accent};" onclick="openMoneyModal(${index})">
                    <td>${safe(getTenantNameById(row.tenant_id))}</td>
                    <td>${safe(typeLabel(type))}</td>
                    <td>${safe(moneyFormat(amountValue(row)))}</td>
                    <td>${safe(getMoneyCategory(row))}</td>
                    <td>${safe(getMoneyDescription(row))}</td>
                    <td>${safe(getMoneyReference(row))}</td>
                    <td>${safe(formatDateTime(getMoneyDate(row)))}</td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function openMoneyModal(index) {
      const row = lastRenderedMoneyRows[index];

      if (!row) {
        UnganiAdminShared.showToast("Record not found - refresh and try again.");
        return;
      }

      const type = moneyType(row);

      const bodyHtml = `
        <div class="modal-form-grid">
          <div>
            <label>Client</label>
            <p>${safe(getTenantNameById(row.tenant_id))}</p>
          </div>
          <div>
            <label>Type</label>
            <p>${typeBadge(type)}</p>
          </div>
          <div>
            <label>Amount</label>
            <p>${safe(moneyFormat(amountValue(row)))}</p>
          </div>
          <div>
            <label>Category</label>
            <p>${safe(getMoneyCategory(row))}</p>
          </div>
          <div>
            <label>Reference</label>
            <p>${safe(getMoneyReference(row))}</p>
          </div>
          <div>
            <label>Date</label>
            <p>${safe(formatDateTime(getMoneyDate(row)))}</p>
          </div>
          <div class="modal-form-grid-full">
            <label>Description</label>
            <p>${safe(getMoneyDescription(row))}</p>
          </div>
        </div>

        <div class="button-row">
          <button class="ungani-btn dark" onclick="UnganiAdminShared.closeModal()">Close</button>
        </div>

        <p class="small-text" style="margin-top: 14px;">
          This record was entered by the client and is shown here for admin review only - it can't be edited from this page.
        </p>
      `;

      UnganiAdminShared.openModal({
        title: getMoneyDescription(row),
        bodyHtml: bodyHtml
      });
    }

    function resetFilters() {
      document.getElementById("clientFilter").value = "";
      document.getElementById("dateFrom").value = "";
      document.getElementById("dateTo").value = "";
      document.getElementById("searchBox").value = "";
      activeMoneyCategory = "all";

      renderMoneyPage();
      UnganiAdminShared.showToast("Money filters reset ✓");
    }

    function printMoneyReport() {
      document.getElementById("printGeneratedDate").innerText = formatDateTime(new Date().toISOString());
      window.print();
    }
  </script>
</body>
</html>
