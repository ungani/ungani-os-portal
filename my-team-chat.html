<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Team Chat</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="pwa-register.js"></script>
  <script src="client-shared.js" onerror="window.__unganiClientSharedFailed = true;"></script>
  <script>
    (function () {
      function showUnganiLoadError() {
        if (typeof UnganiClientShared !== "undefined") return;

        var banner = document.createElement("div");
        banner.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99999;background:#B91C1C;color:#fff;padding:12px 16px;font:14px/1.4 -apple-system,sans-serif;text-align:center;";
        banner.innerHTML = "Some page resources failed to load. Please check your connection. " +
          "<button style=\"margin-left:10px;padding:4px 12px;border:none;border-radius:6px;background:#fff;color:#B91C1C;font-weight:700;cursor:pointer;\" onclick=\"window.location.reload()\">Reload</button>";

        if (document.body) {
          document.body.prepend(banner);
        } else {
          document.addEventListener("DOMContentLoaded", function () {
            document.body.prepend(banner);
          });
        }
      }

      if (window.__unganiClientSharedFailed) {
        showUnganiLoadError();
      } else {
        setTimeout(function () {
          if (typeof UnganiClientShared === "undefined") showUnganiLoadError();
        }, 4000);
      }
    })();
  </script>
  <script src="nia-assistant.js"></script>
</head>

<body>
  <script>
    let currentContext = null;
    let messages = [];
    let refreshTimer = null;

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "team-chat",
        pageTitle: "Team Chat",
        pageSubtitle: "Internal team communication for this business workspace.",
        onReady: startTeamChatPage
      });
    });

    window.addEventListener("beforeunload", function () {
      if (refreshTimer) {
        clearInterval(refreshTimer);
      }
    });

    async function startTeamChatPage(context) {
      currentContext = context;
      await loadMessages();

      refreshTimer = setInterval(function () {
        loadMessages(true);
      }, 20000);
    }

    async function loadMessages(silent) {
      if (!silent) {
        currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading team chat...");
      }

      let response;

      try {
        response = await currentContext.supabaseClient
          .from("team_chat_messages")
          .select("*")
          .eq("tenant_id", currentContext.tenantId)
          .order("created_at", { ascending: true });
      } catch (error) {
        if (!silent) {
          currentContext.contentEl.innerHTML = UnganiClientShared.errorCard("Could not load team chat", error.message || "Network error. Please check your connection.");
        }
        return;
      }

      if (response.error) {
        if (!silent) {
          currentContext.contentEl.innerHTML = UnganiClientShared.errorCard("Could not load team chat", response.error.message);
        }
        return;
      }

      messages = response.data || [];
      await markOtherMessagesRead();
      renderTeamChatPage();
    }

    async function markOtherMessagesRead() {
      try {
        await currentContext.supabaseClient
          .from("team_chat_messages")
          .update({
            is_read: true,
            updated_at: new Date().toISOString()
          })
          .eq("tenant_id", currentContext.tenantId)
          .neq("sender_user_id", currentContext.authUser.id)
          .eq("is_read", false);
      } catch (error) {
        console.warn("Could not mark team messages as read:", error.message);
      }
    }

    function renderTeamChatPage() {
      const summary = calculateSummary();
      const tenantName = UnganiClientShared.getTenantName(currentContext.tenant);

      UnganiClientShared.setContent(`
        <section class="ungani-card ungani-hero">
          <h2>Internal Team Chat</h2>
          <p>
            Use this space for internal notes, follow-ups, quick updates, and coordination inside ${UnganiClientShared.safe(tenantName)}.
          </p>

          <div class="ungani-button-row">
            <button class="ungani-btn" onclick="loadMessages()">Refresh Chat</button>
            <a class="ungani-btn green" href="my-tasks.html">Tasks</a>
            <a class="ungani-btn dark" href="my-chat.html">Chat with UNGANI</a>
          </div>
        </section>

        <section class="ungani-grid">
          ${UnganiClientShared.metricCard("Total Messages", messages.length, "All internal team messages", "blue")}
          ${UnganiClientShared.metricCard("Your Messages", summary.myMessages, "Messages sent by you", "gold")}
          ${UnganiClientShared.metricCard("Team Messages", summary.teamMessages, "Messages from other team members", "green")}
          ${UnganiClientShared.metricCard("Unread Team Messages", summary.unreadTeam, "Unread internal messages", summary.unreadTeam > 0 ? "orange" : "green")}
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <div>
                <h3>Team Conversation</h3>
                <p class="ungani-small">Messages refresh automatically every 20 seconds.</p>
              </div>

              <button class="ungani-btn green" onclick="loadMessages()">Refresh</button>
            </div>

            <div id="teamChatBox" style="max-height:620px;overflow:auto;padding-right:6px;">
              ${renderMessageList()}
            </div>
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Send Team Message</h3>
            </div>

            ${renderMessageForm()}

            <div class="ungani-card" style="box-shadow:none;margin-top:16px;">
              <strong>Use Team Chat for</strong>
              <p class="ungani-small">Internal updates, task notes, follow-up reminders, property updates, client updates, and quick coordination between team members.</p>
            </div>

            <div class="ungani-card" style="box-shadow:none;">
              <strong>Need UNGANI support?</strong>
              <p class="ungani-small">Use Chat with UNGANI or Support Issues when the message is for UNGANI, not your internal team.</p>
              <div class="ungani-button-row">
                <a class="ungani-btn" href="my-chat.html">Chat with UNGANI</a>
                <a class="ungani-btn green" href="my-support.html">Support</a>
              </div>
            </div>
          </div>
        </section>

        <p class="ungani-small">
          Team Chat Version: Step 307D Shared Layout · ungani.com · info@ungani.com
        </p>
      `);

      scrollChatToBottom();
    }

    function renderMessageForm() {
      return `
        <form id="teamChatForm" onsubmit="sendMessage(event)">
          <label for="messageType">Message Type</label>
          <select id="messageType">
            <option value="message">General Message</option>
            <option value="task_update">Task Update</option>
            <option value="follow_up">Follow-up Note</option>
            <option value="property_update">Property Update</option>
            <option value="client_update">Client Update</option>
            <option value="document_update">Document Update</option>
            <option value="money_note">Money Note</option>
            <option value="meeting_note">Meeting Note</option>
            <option value="other">Other</option>
          </select>

          <label for="messageBody">Message</label>
          <textarea id="messageBody" required placeholder="Type your internal team message here..."></textarea>

          <label for="attachmentUrl">Optional Link</label>
          <input id="attachmentUrl" type="url" placeholder="Paste a Drive link, document link, or reference link if needed" />

          <div class="ungani-button-row">
            <button class="ungani-btn green" type="submit">Send Message</button>
            <button class="ungani-btn dark" type="button" onclick="clearForm()">Clear</button>
          </div>
        </form>
      `;
    }

    function renderMessageList() {
      if (messages.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No team messages yet</h3>
            <p>Send the first internal team message using the form on the right.</p>
          </div>
        `;
      }

      return messages.map(function (row) {
        return renderMessageCard(row);
      }).join("");
    }

    function renderMessageCard(row) {
      const senderId = String(UnganiClientShared.getValue(row, ["sender_user_id"], ""));
      const isMine = senderId === String(currentContext.authUser.id);

      const senderName = UnganiClientShared.getValue(row, ["sender_name"], isMine ? "You" : "Team Member");
      const senderRole = UnganiClientShared.getValue(row, ["sender_role"], "team");
      const type = UnganiClientShared.getValue(row, ["message_type"], "message");
      const body = UnganiClientShared.getValue(row, ["message_body", "message", "body"], "");
      const attachmentUrl = UnganiClientShared.getValue(row, ["attachment_url"], "");
      const created = UnganiClientShared.getValue(row, ["created_at"], "");
      const read = UnganiClientShared.getValue(row, ["is_read"], false);

      const bg = isMine ? "rgba(6,28,61,0.05)" : "rgba(212,166,58,0.14)";
      const border = isMine ? "#061C3D" : "#D4A63A";

      return `
        <div class="ungani-card" style="box-shadow:none;border-left:5px solid ${border};background:${bg};">
          <div class="ungani-section-title">
            <div>
              <h3>${UnganiClientShared.safe(isMine ? "You" : senderName)}</h3>
              <p class="ungani-small">
                ${UnganiClientShared.safe(senderRole)}
                · ${UnganiClientShared.safe(UnganiClientShared.formatDate(created))}
              </p>
            </div>

            <div>
              ${badge(type, isMine ? "blue" : "gold")}
              ${isMine ? badge(read ? "read" : "sent", read ? "green" : "orange") : ""}
            </div>
          </div>

          <p style="white-space:pre-wrap;margin-bottom:12px;">${UnganiClientShared.safe(body)}</p>

          ${attachmentUrl ? `
            <a class="ungani-btn green" href="${UnganiClientShared.attr(attachmentUrl)}" target="_blank" rel="noopener">Open Link</a>
          ` : ""}
        </div>
      `;
    }

    function calculateSummary() {
      let myMessages = 0;
      let teamMessages = 0;
      let unreadTeam = 0;

      messages.forEach(function (row) {
        const senderId = String(UnganiClientShared.getValue(row, ["sender_user_id"], ""));
        const isMine = senderId === String(currentContext.authUser.id);
        const read = UnganiClientShared.getValue(row, ["is_read"], false);

        if (isMine) {
          myMessages++;
        } else {
          teamMessages++;

          if (!read) {
            unreadTeam++;
          }
        }
      });

      return { myMessages, teamMessages, unreadTeam };
    }

    async function sendMessage(event) {
      event.preventDefault();

      const body = UnganiClientShared.value("messageBody");

      if (!body) {
        alert("Please type a message.");
        return;
      }

      const senderName = getSenderName();

      const payload = {
        tenant_id: currentContext.tenantId,
        sender_user_id: currentContext.authUser.id,
        sender_name: senderName,
        sender_role: "team",
        message_type: UnganiClientShared.value("messageType") || "message",
        message_body: body,
        message: body,
        body: body,
        attachment_url: UnganiClientShared.value("attachmentUrl") || null,
        is_read: false,
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString()
      };

      let response;

      try {
        response = await currentContext.supabaseClient
          .from("team_chat_messages")
          .insert(payload);
      } catch (error) {
        alert(error.message || "Could not send message. Please check your connection.");
        return;
      }

      if (response.error) {
        alert(response.error.message);
        return;
      }

      clearForm();
      UnganiClientShared.showToast("Team message sent ✓");
      await loadMessages(true);
    }

    function getSenderName() {
      const profile = currentContext.userProfile || {};

      return UnganiClientShared.getValue(profile, ["full_name", "name", "email"], "") ||
        UnganiClientShared.getValue(currentContext.authUser, ["email"], "Team Member");
    }

    function clearForm() {
      const form = document.getElementById("teamChatForm");

      if (form) {
        form.reset();
      }
    }

    function scrollChatToBottom() {
      setTimeout(function () {
        const box = document.getElementById("teamChatBox");

        if (box) {
          box.scrollTop = box.scrollHeight;
        }
      }, 100);
    }

    function badge(text, color) {
      return `<span class="ungani-badge ${UnganiClientShared.attr(color || "blue")}">${UnganiClientShared.safe(text)}</span>`;
    }
  </script>
</body>
</html>
