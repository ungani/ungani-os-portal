<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Admin Billing</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin-shared.js"></script>

  <style>
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 24px var(--ungani-shadow);
    }

    .metric-card h3 {
      margin: 0 0 8px;
      color: var(--ungani-muted);
      font-size: 14px;
    }

    .metric-card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
      color: var(--ungani-text);
    }

    .metric-card .note {
      margin-top: 8px;
      color: var(--ungani-muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .metric-card.green { border-left-color: var(--ungani-green); }
    .metric-card.red { border-left-color: var(--ungani-red); }
    .metric-card.orange { border-left-color: var(--ungani-orange); }
    .metric-card.blue { border-left-color: var(--ungani-blue); }
    .metric-card.gold { border-left-color: var(--ungani-gold); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 8px 0 6px;
      font-size: 14px;
      color: var(--ungani-text);
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--ungani-border);
      border-radius: 12px;
      background: var(--ungani-card);
      color: var(--ungani-text);
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
      background: var(--ungani-gold);
      color: var(--ungani-navy);
      text-decoration: none;
      display: inline-block;
    }

    .btn.dark {
      background: var(--ungani-card);
      color: var(--ungani-text);
      border: 1px solid var(--ungani-border);
    }

    .btn.green { background: var(--ungani-green); color: #FFFFFF; }
    .btn.red { background: var(--ungani-red); color: #FFFFFF; }
    .btn.orange { background: var(--ungani-orange); color: #FFFFFF; }
    .btn.blue { background: var(--ungani-blue); color: #FFFFFF; }

    .two-col {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
    }

    .section-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-title-row h2 {
      margin: 0;
    }

    .row-card {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .row-card.paid-card { border-left-color: var(--ungani-green); }
    .row-card.pending-card { border-left-color: var(--ungani-orange); }
    .row-card.failed-card { border-left-color: var(--ungani-red); }
    .row-card.info-card { border-left-color: var(--ungani-blue); }

    .row-title {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 6px;
      color: var(--ungani-text);
    }

    .row-detail {
      color: var(--ungani-muted);
      margin: 5px 0;
      line-height: 1.45;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      background: var(--ungani-navy);
      color: #FFFFFF;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      text-transform: capitalize;
    }

    .badge.green { background: var(--ungani-green); }
    .badge.red { background: var(--ungani-red); }
    .badge.orange { background: var(--ungani-orange); }
    .badge.blue { background: var(--ungani-blue); }
    .badge.gold { background: var(--ungani-gold); color: var(--ungani-navy); }

    .empty {
      text-align: center;
      padding: 28px;
      background: var(--ungani-card);
      border: 1px dashed var(--ungani-border);
      border-radius: 18px;
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--ungani-text);
    }

    .empty p {
      margin: 0;
      color: var(--ungani-muted);
    }

    .small-text {
      color: var(--ungani-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 950px) {
      .two-col {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="adminRoot"></div>

  <script>
    let supabaseClient = null;
    let currentAdmin = null;

    let tenants = [];
    let payments = [];
    let upgradeRequests = [];
    let packagesList = [];
    let selectedClientId = null;

    const pageMainHtml = `
      <section class="ungani-card ungani-hero-card">
        <div style="position: relative; z-index: 1;">
          <h2>Admin Billing Center</h2>
          <p>
            View client payments, package requests, billing status, and subscription-related activity across UNGANI OS.
          </p>
          <div style="margin-top: 16px;">
            <a class="btn" href="admin-home.html">Admin Home</a>
            <a class="btn green" href="admin.html">Main Admin</a>
            <a class="btn blue" href="admin-reports.html">Reports</a>
            <a class="btn dark" href="admin-settings.html">Admin Settings</a>
          </div>
        </div>
      </section>

      <section class="page-grid" id="metricsGrid">
        <div class="metric-card"><h3>Loading</h3><p>...</p><div class="note">Please wait</div></div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>Billing Filters</h2>
          <button class="btn green" onclick="loadPageData()">Refresh</button>
        </div>

        <div class="form-grid">
          <div>
            <label for="clientFilter">Client</label>
            <select id="clientFilter" onchange="renderBillingPage()">
              <option value="">All Clients</option>
            </select>
          </div>

          <div>
            <label for="paymentStatusFilter">Payment Status</label>
            <select id="paymentStatusFilter" onchange="renderBillingPage()">
              <option value="">All Payment Statuses</option>
              <option value="paid">Paid</option>
              <option value="pending">Pending</option>
              <option value="failed">Failed</option>
              <option value="cancelled">Cancelled</option>
              <option value="refunded">Refunded</option>
            </select>
          </div>

          <div>
            <label for="requestStatusFilter">Upgrade Request Status</label>
            <select id="requestStatusFilter" onchange="renderBillingPage()">
              <option value="">All Request Statuses</option>
              <option value="pending">Pending</option>
              <option value="approved">Approved</option>
              <option value="rejected">Rejected</option>
              <option value="completed">Completed</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>

          <div>
            <label for="dateFrom">Date From</label>
            <input id="dateFrom" type="date" onchange="renderBillingPage()" />
          </div>

          <div>
            <label for="dateTo">Date To</label>
            <input id="dateTo" type="date" onchange="renderBillingPage()" />
          </div>

          <div>
            <label for="searchBox">Search</label>
            <input id="searchBox" placeholder="Search billing records..." oninput="renderBillingPage()" />
          </div>
        </div>

        <div class="button-row">
          <button class="btn dark" onclick="resetFilters()">Reset Filters</button>
        </div>
      </section>

      <section class="two-col">
        <div class="ungani-card">
          <div class="section-title-row">
            <h2>Client Billing Summary</h2>
          </div>

          <div id="clientSummaryBox">
            <div class="empty">
              <h3>Loading client summary...</h3>
              <p>Please wait.</p>
            </div>
          </div>
        </div>

        <div class="ungani-card">
          <div class="section-title-row">
            <h2 id="selectedClientTitle">Selected Client Billing</h2>
          </div>

          <div id="selectedClientBox">
            <div class="empty">
              <h3>No client selected</h3>
              <p>Select a client below to view billing details.</p>
            </div>
          </div>
        </div>
      </section>

      <section class="two-col">
        <div class="ungani-card">
          <div class="section-title-row">
            <h2>Recent Payments</h2>
          </div>

          <div id="paymentsListBox">
            <div class="empty">
              <h3>Loading payments...</h3>
              <p>Please wait.</p>
            </div>
          </div>
        </div>

        <div class="ungani-card">
          <div class="section-title-row">
            <h2>Upgrade / Package Requests</h2>
          </div>

          <div id="upgradeRequestsBox">
            <div class="empty">
              <h3>Loading upgrade requests...</h3>
              <p>Please wait.</p>
            </div>
          </div>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>Available Packages</h2>
          <p class="small-text" id="packagesCountText">Loading...</p>
        </div>

        <div id="packagesBox">
          <div class="empty">
            <h3>Loading packages...</h3>
            <p>Please wait.</p>
          </div>
        </div>
      </section>
    `;

    window.addEventListener("load", function () {
      UnganiAdminShared.renderShell("adminRoot", {
        activeKey: "billing",
        pageTitle: "Billing",
        pageSubtitle: "View client payments, package requests, and billing status.",
        footerTitle: "Billing",
        footerVersion: "Billing Version: Step 295 Shared Session Added",
        mainHtml: pageMainHtml
      });

      UnganiAdminShared.requireAdmin({
        onNoSession: function () {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiLoginShell").classList.remove("hidden");
        },
        onBlocked: function (reason) {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiBlockedShell").classList.remove("hidden");
          document.getElementById("unganiBlockedReason").innerText = reason;
        },
        onReady: async function (admin, client) {
          currentAdmin = admin;
          supabaseClient = client;

          UnganiAdminShared.renderSidebar("adminSidebar", {
            activeKey: "billing",
            adminName: admin.full_name || "Admin Workspace",
            footerTitle: "Billing",
            footerVersion: "Billing Version: Step 295 Shared Session Added"
          });

          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiAppShell").classList.remove("hidden");

          await loadPageData();
        }
      });
    });

    function safe(value) {
      return UnganiAdminShared.safe(value);
    }

    function cleanText(value) {
      return UnganiAdminShared.cleanText(value);
    }

    function getField(row, names, fallback = "") {
      for (const name of names) {
        if (row && row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return fallback;
    }

    function getTenantName(row) {
      return getField(row, ["business_name", "company_name", "tenant_name"], "Client Business");
    }

    function getTenantStatus(row) {
      return String(getField(row, ["account_status", "status"], "trial")).toLowerCase();
    }

    function getTenantNameById(tenantId) {
      const tenant = tenants.find(row => String(row.id) === String(tenantId));
      return tenant ? getTenantName(tenant) : "Unknown Client";
    }

    function getAmount(row) {
      const raw = getField(row, ["amount", "payment_amount", "total_amount", "paid_amount", "value"], 0);
      const num = Number(raw);
      return isNaN(num) ? 0 : num;
    }

    function getPaymentStatus(row) {
      return String(getField(row, ["status", "payment_status"], "pending")).toLowerCase();
    }

    function getPaymentMethod(row) {
      return getField(row, ["payment_method", "method", "channel"], "N/A");
    }

    function getPaymentReference(row) {
      return getField(row, ["reference", "payment_reference", "mpesa_reference", "transaction_reference", "receipt_number"], "N/A");
    }

    function getPaymentDate(row) {
      return getField(row, ["payment_date", "paid_at", "created_at", "updated_at"], "");
    }

    function getPaymentDescription(row) {
      return getField(row, ["description", "notes", "purpose", "package_name"], "");
    }

    function getRequestStatus(row) {
      return String(getField(row, ["status", "request_status"], "pending")).toLowerCase();
    }

    function getRequestTitle(row) {
      return getField(row, ["request_title", "title", "package_name", "requested_package", "request_type"], "Upgrade / Package Request");
    }

    function getRequestNotes(row) {
      return getField(row, ["notes", "description", "reason", "message"], "");
    }

    function getRequestDate(row) {
      return getField(row, ["created_at", "requested_at", "updated_at"], "");
    }

    function getPackageName(row) {
      return getField(row, ["package_name", "name", "title"], "Package");
    }

    function getPackagePrice(row) {
      const raw = getField(row, ["price", "monthly_price", "amount", "package_price"], "");
      const num = Number(raw);
      if (raw === "" || raw === null || raw === undefined) return "N/A";
      if (isNaN(num)) return raw;
      return formatMoney(num);
    }

    function getPackageDescription(row) {
      return getField(row, ["description", "notes", "features"], "");
    }

    function formatMoney(amount) {
      const num = Number(amount);
      if (isNaN(num)) return "KES 0";

      return "KES " + num.toLocaleString("en-KE", {
        maximumFractionDigits: 2
      });
    }

    function formatDateTime(value) {
      if (!value) return "N/A";

      const dateObj = new Date(value);

      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function isPaid(status) {
      return ["paid", "completed", "successful", "success"].includes(String(status || "").toLowerCase());
    }

    function isPending(status) {
      return ["pending", "processing", "unpaid"].includes(String(status || "").toLowerCase());
    }

    function isFailed(status) {
      return ["failed", "cancelled", "canceled", "refunded", "rejected"].includes(String(status || "").toLowerCase());
    }

    function paymentStatusBadge(status) {
      const clean = String(status || "pending").toLowerCase();

      if (isPaid(clean)) {
        return `<span class="badge green">${safe(cleanText(clean))}</span>`;
      }

      if (isFailed(clean)) {
        return `<span class="badge red">${safe(cleanText(clean))}</span>`;
      }

      return `<span class="badge orange">${safe(cleanText(clean))}</span>`;
    }

    function requestStatusBadge(status) {
      const clean = String(status || "pending").toLowerCase();

      if (["approved", "completed"].includes(clean)) {
        return `<span class="badge green">${safe(cleanText(clean))}</span>`;
      }

      if (["rejected", "cancelled", "canceled"].includes(clean)) {
        return `<span class="badge red">${safe(cleanText(clean))}</span>`;
      }

      return `<span class="badge orange">${safe(cleanText(clean))}</span>`;
    }

    function tenantStatusBadge(status) {
      const clean = String(status || "trial").toLowerCase();

      if (clean === "active") return `<span class="badge green">Active Client</span>`;
      if (clean === "trial") return `<span class="badge gold">Trial Client</span>`;
      if (clean === "suspended") return `<span class="badge orange">Suspended</span>`;
      if (clean === "cancelled" || clean === "inactive") return `<span class="badge red">${safe(cleanText(clean))}</span>`;

      return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
    }

    function paymentCardClass(row) {
      const status = getPaymentStatus(row);

      if (isPaid(status)) return "paid-card";
      if (isFailed(status)) return "failed-card";
      return "pending-card";
    }

    function requestCardClass(row) {
      const status = getRequestStatus(row);

      if (["approved", "completed"].includes(status)) return "paid-card";
      if (["rejected", "cancelled", "canceled"].includes(status)) return "failed-card";
      return "pending-card";
    }

    async function safeSelect(tableName) {
      try {
        const { data, error } = await supabaseClient
          .from(tableName)
          .select("*")
          .limit(10000);

        if (error) {
          console.log(tableName, error.message);
          return [];
        }

        return data || [];
      } catch (error) {
        console.log(tableName, error.message);
        return [];
      }
    }

    async function loadPageData() {
      UnganiAdminShared.showToast("Loading billing...");

      const [tenantRows, paymentRows, upgradeRows, packageRows] = await Promise.all([
        safeSelect("tenants"),
        safeSelect("payments"),
        safeSelect("upgrade_requests"),
        safeSelect("packages")
      ]);

      tenants = tenantRows;
      payments = paymentRows.sort((a, b) => new Date(getPaymentDate(b) || 0) - new Date(getPaymentDate(a) || 0));
      upgradeRequests = upgradeRows.sort((a, b) => new Date(getRequestDate(b) || 0) - new Date(getRequestDate(a) || 0));
      packagesList = packageRows;

      fillClientFilter();
      renderBillingPage();

      if (selectedClientId) {
        renderSelectedClient(selectedClientId);
      }

      UnganiAdminShared.showToast("Billing updated ✓");
    }

    function fillClientFilter() {
      const selected = document.getElementById("clientFilter").value;

      const options = tenants
        .map(row => `<option value="${safe(row.id)}">${safe(getTenantName(row))}</option>`)
        .join("");

      document.getElementById("clientFilter").innerHTML = `<option value="">All Clients</option>${options}`;

      if (selected) {
        document.getElementById("clientFilter").value = selected;
      }
    }

    function withinDateRange(value) {
      const from = document.getElementById("dateFrom").value;
      const to = document.getElementById("dateTo").value;

      if (!from && !to) return true;
      if (!value) return true;

      const cleanDate = String(value).slice(0, 10);

      if (from && cleanDate < from) return false;
      if (to && cleanDate > to) return false;

      return true;
    }

    function filteredPayments() {
      const clientFilter = document.getElementById("clientFilter").value;
      const paymentStatusFilter = document.getElementById("paymentStatusFilter").value;
      const query = document.getElementById("searchBox").value.toLowerCase().trim();

      let rows = [...payments];

      if (clientFilter) {
        rows = rows.filter(row => String(row.tenant_id) === String(clientFilter));
      }

      if (paymentStatusFilter) {
        if (paymentStatusFilter === "paid") {
          rows = rows.filter(row => isPaid(getPaymentStatus(row)));
        } else if (paymentStatusFilter === "pending") {
          rows = rows.filter(row => isPending(getPaymentStatus(row)));
        } else {
          rows = rows.filter(row => getPaymentStatus(row) === paymentStatusFilter);
        }
      }

      rows = rows.filter(row => withinDateRange(getPaymentDate(row)));

      if (query) {
        rows = rows.filter(row => {
          const haystack = [
            getTenantNameById(row.tenant_id),
            getPaymentStatus(row),
            getPaymentMethod(row),
            getPaymentReference(row),
            getPaymentDescription(row),
            formatMoney(getAmount(row)),
            JSON.stringify(row)
          ].join(" ").toLowerCase();

          return haystack.includes(query);
        });
      }

      return rows;
    }

    function filteredRequests() {
      const clientFilter = document.getElementById("clientFilter").value;
      const requestStatusFilter = document.getElementById("requestStatusFilter").value;
      const query = document.getElementById("searchBox").value.toLowerCase().trim();

      let rows = [...upgradeRequests];

      if (clientFilter) {
        rows = rows.filter(row => String(row.tenant_id) === String(clientFilter));
      }

      if (requestStatusFilter) {
        rows = rows.filter(row => getRequestStatus(row) === requestStatusFilter);
      }

      rows = rows.filter(row => withinDateRange(getRequestDate(row)));

      if (query) {
        rows = rows.filter(row => {
          const haystack = [
            getTenantNameById(row.tenant_id),
            getRequestTitle(row),
            getRequestStatus(row),
            getRequestNotes(row),
            JSON.stringify(row)
          ].join(" ").toLowerCase();

          return haystack.includes(query);
        });
      }

      return rows;
    }

    function renderBillingPage() {
      renderMetrics();
      renderClientSummary();
      renderPaymentsList();
      renderUpgradeRequests();
      renderPackages();
    }

    function renderMetrics() {
      const paymentRows = filteredPayments();
      const requestRows = filteredRequests();

      const paidPayments = paymentRows.filter(row => isPaid(getPaymentStatus(row)));
      const pendingPayments = paymentRows.filter(row => isPending(getPaymentStatus(row)));
      const failedPayments = paymentRows.filter(row => isFailed(getPaymentStatus(row)));

      const paidTotal = paidPayments.reduce((sum, row) => sum + getAmount(row), 0);
      const pendingTotal = pendingPayments.reduce((sum, row) => sum + getAmount(row), 0);

      const pendingRequests = requestRows.filter(row => getRequestStatus(row) === "pending").length;
      const approvedRequests = requestRows.filter(row => ["approved", "completed"].includes(getRequestStatus(row))).length;

      const metrics = [
        { title: "Paid Total", value: formatMoney(paidTotal), note: "Total paid amount in current view", cls: "green" },
        { title: "Pending Total", value: formatMoney(pendingTotal), note: "Pending/unpaid amount in current view", cls: pendingTotal > 0 ? "orange" : "green" },
        { title: "Payment Records", value: paymentRows.length, note: "Payment records in current view", cls: "blue" },
        { title: "Paid Payments", value: paidPayments.length, note: "Successful/paid records", cls: "green" },
        { title: "Pending Payments", value: pendingPayments.length, note: "Payments still pending", cls: pendingPayments.length > 0 ? "orange" : "green" },
        { title: "Failed / Cancelled", value: failedPayments.length, note: "Failed, cancelled, or refunded payments", cls: failedPayments.length > 0 ? "red" : "green" },
        { title: "Upgrade Requests", value: requestRows.length, note: "Package/upgrade requests", cls: "blue" },
        { title: "Pending Requests", value: pendingRequests, note: "Requests waiting for admin action", cls: pendingRequests > 0 ? "orange" : "green" }
      ];

      document.getElementById("metricsGrid").innerHTML = metrics.map(item => `
        <div class="metric-card ${safe(item.cls)}">
          <h3>${safe(item.title)}</h3>
          <p>${safe(item.value)}</p>
          <div class="note">${safe(item.note)}</div>
        </div>
      `).join("");
    }

    function renderClientSummary() {
      const paymentRows = filteredPayments();
      const requestRows = filteredRequests();

      const clientMap = {};

      tenants.forEach(tenant => {
        clientMap[tenant.id] = {
          id: tenant.id,
          name: getTenantName(tenant),
          status: getTenantStatus(tenant),
          payments: 0,
          paidTotal: 0,
          pendingTotal: 0,
          pendingPayments: 0,
          requests: 0,
          pendingRequests: 0
        };
      });

      paymentRows.forEach(row => {
        if (!row.tenant_id || !clientMap[row.tenant_id]) return;

        clientMap[row.tenant_id].payments += 1;

        if (isPaid(getPaymentStatus(row))) {
          clientMap[row.tenant_id].paidTotal += getAmount(row);
        }

        if (isPending(getPaymentStatus(row))) {
          clientMap[row.tenant_id].pendingTotal += getAmount(row);
          clientMap[row.tenant_id].pendingPayments += 1;
        }
      });

      requestRows.forEach(row => {
        if (!row.tenant_id || !clientMap[row.tenant_id]) return;

        clientMap[row.tenant_id].requests += 1;

        if (getRequestStatus(row) === "pending") {
          clientMap[row.tenant_id].pendingRequests += 1;
        }
      });

      const summaryRows = Object.values(clientMap)
        .filter(row => row.payments > 0 || row.requests > 0)
        .sort((a, b) => b.pendingRequests - a.pendingRequests || b.pendingPayments - a.pendingPayments || b.paidTotal - a.paidTotal)
        .slice(0, 12);

      if (summaryRows.length === 0) {
        document.getElementById("clientSummaryBox").innerHTML = `
          <div class="empty">
            <h3>No client billing summary yet</h3>
            <p>Payment and package request summary will appear here.</p>
          </div>
        `;
        return;
      }

      document.getElementById("clientSummaryBox").innerHTML = summaryRows.map(row => `
        <div class="row-card ${row.pendingRequests > 0 || row.pendingPayments > 0 ? "pending-card" : "paid-card"}">
          <div class="row-title">${safe(row.name)}</div>
          <p class="row-detail"><strong>Client Status:</strong> ${safe(cleanText(row.status))}</p>
          <p class="row-detail"><strong>Paid Total:</strong> ${safe(formatMoney(row.paidTotal))}</p>
          <p class="row-detail"><strong>Pending Total:</strong> ${safe(formatMoney(row.pendingTotal))}</p>
          <p class="row-detail"><strong>Payment Records:</strong> ${safe(row.payments)}</p>
          <p class="row-detail"><strong>Upgrade Requests:</strong> ${safe(row.requests)}</p>
          <p class="row-detail"><strong>Pending Requests:</strong> ${safe(row.pendingRequests)}</p>
          ${tenantStatusBadge(row.status)}
          ${row.pendingRequests > 0 || row.pendingPayments > 0 ? `<span class="badge orange">Needs billing review</span>` : `<span class="badge green">Clear</span>`}
          <div class="button-row">
            <button class="btn" onclick="renderSelectedClient('${safe(row.id)}')">Open Billing</button>
          </div>
        </div>
      `).join("");
    }

    function renderPaymentsList() {
      const rows = filteredPayments().slice(0, 30);

      if (rows.length === 0) {
        document.getElementById("paymentsListBox").innerHTML = `
          <div class="empty">
            <h3>No payments found</h3>
            <p>Payment records will appear here when added.</p>
          </div>
        `;
        return;
      }

      document.getElementById("paymentsListBox").innerHTML = rows.map(row => `
        <div class="row-card ${safe(paymentCardClass(row))}">
          <div class="row-title">${safe(formatMoney(getAmount(row)))}</div>
          <p class="row-detail"><strong>Client:</strong> ${safe(getTenantNameById(row.tenant_id))}</p>
          <p class="row-detail"><strong>Method:</strong> ${safe(getPaymentMethod(row))}</p>
          <p class="row-detail"><strong>Reference:</strong> ${safe(getPaymentReference(row))}</p>
          <p class="row-detail"><strong>Description:</strong> ${safe(getPaymentDescription(row) || "N/A")}</p>
          <p class="row-detail"><strong>Date:</strong> ${safe(formatDateTime(getPaymentDate(row)))}</p>

          ${paymentStatusBadge(getPaymentStatus(row))}

          <div class="button-row">
            <button class="btn" onclick="renderSelectedClient('${safe(row.tenant_id || "")}')">Open Client</button>
            <button class="btn green" onclick="updatePaymentStatus('${safe(row.id)}','paid')">Mark Paid</button>
            <button class="btn orange" onclick="updatePaymentStatus('${safe(row.id)}','pending')">Pending</button>
            <button class="btn red" onclick="updatePaymentStatus('${safe(row.id)}','failed')">Failed</button>
          </div>
        </div>
      `).join("");
    }

    function renderUpgradeRequests() {
      const rows = filteredRequests().slice(0, 30);

      if (rows.length === 0) {
        document.getElementById("upgradeRequestsBox").innerHTML = `
          <div class="empty">
            <h3>No upgrade requests found</h3>
            <p>Client package or upgrade requests will appear here.</p>
          </div>
        `;
        return;
      }

      document.getElementById("upgradeRequestsBox").innerHTML = rows.map(row => `
        <div class="row-card ${safe(requestCardClass(row))}">
          <div class="row-title">${safe(getRequestTitle(row))}</div>
          <p class="row-detail"><strong>Client:</strong> ${safe(getTenantNameById(row.tenant_id))}</p>
          <p class="row-detail"><strong>Notes:</strong> ${safe(getRequestNotes(row) || "N/A")}</p>
          <p class="row-detail"><strong>Date:</strong> ${safe(formatDateTime(getRequestDate(row)))}</p>

          ${requestStatusBadge(getRequestStatus(row))}

          <div class="button-row">
            <button class="btn" onclick="renderSelectedClient('${safe(row.tenant_id || "")}')">Open Client</button>
            <button class="btn green" onclick="updateUpgradeRequestStatus('${safe(row.id)}','approved')">Approve</button>
            <button class="btn blue" onclick="updateUpgradeRequestStatus('${safe(row.id)}','completed')">Completed</button>
            <button class="btn red" onclick="updateUpgradeRequestStatus('${safe(row.id)}','rejected')">Reject</button>
          </div>
        </div>
      `).join("");
    }

    function renderPackages() {
      document.getElementById("packagesCountText").innerText = `${packagesList.length} package(s) found`;

      if (packagesList.length === 0) {
        document.getElementById("packagesBox").innerHTML = `
          <div class="empty">
            <h3>No packages found</h3>
            <p>Package records can be added later in Supabase or a package management page.</p>
          </div>
        `;
        return;
      }

      document.getElementById("packagesBox").innerHTML = packagesList.map(row => `
        <div class="row-card info-card">
          <div class="row-title">${safe(getPackageName(row))}</div>
          <p class="row-detail"><strong>Price:</strong> ${safe(getPackagePrice(row))}</p>
          <p class="row-detail"><strong>Description:</strong> ${safe(getPackageDescription(row) || "N/A")}</p>
          <span class="badge blue">Package</span>
        </div>
      `).join("");
    }

    function renderSelectedClient(tenantId) {
      const tenant = tenants.find(row => String(row.id) === String(tenantId));

      if (!tenant) {
        selectedClientId = null;
        document.getElementById("selectedClientTitle").innerText = "Selected Client Billing";
        document.getElementById("selectedClientBox").innerHTML = `
          <div class="empty">
            <h3>Client not found</h3>
            <p>Please select a valid client from the billing summary.</p>
          </div>
        `;
        return;
      }

      selectedClientId = tenant.id;

      const clientPayments = payments.filter(row => String(row.tenant_id) === String(tenant.id));
      const clientRequests = upgradeRequests.filter(row => String(row.tenant_id) === String(tenant.id));

      const paidTotal = clientPayments
        .filter(row => isPaid(getPaymentStatus(row)))
        .reduce((sum, row) => sum + getAmount(row), 0);

      const pendingTotal = clientPayments
        .filter(row => isPending(getPaymentStatus(row)))
        .reduce((sum, row) => sum + getAmount(row), 0);

      document.getElementById("selectedClientTitle").innerText = getTenantName(tenant);

      document.getElementById("selectedClientBox").innerHTML = `
        <div class="row-card ${pendingTotal > 0 ? "pending-card" : "paid-card"}">
          <div class="row-title">${safe(getTenantName(tenant))}</div>
          <p class="row-detail"><strong>Client Status:</strong> ${safe(cleanText(getTenantStatus(tenant)))}</p>
          <p class="row-detail"><strong>Paid Total:</strong> ${safe(formatMoney(paidTotal))}</p>
          <p class="row-detail"><strong>Pending Total:</strong> ${safe(formatMoney(pendingTotal))}</p>
          <p class="row-detail"><strong>Payment Records:</strong> ${safe(clientPayments.length)}</p>
          <p class="row-detail"><strong>Upgrade Requests:</strong> ${safe(clientRequests.length)}</p>
          ${tenantStatusBadge(getTenantStatus(tenant))}
        </div>

        <h3>Client Payments</h3>
        ${clientPayments.length === 0 ? `
          <div class="empty">
            <h3>No payment records</h3>
            <p>This client has no payment records yet.</p>
          </div>
        ` : clientPayments.slice(0, 10).map(row => `
          <div class="row-card ${safe(paymentCardClass(row))}">
            <div class="row-title">${safe(formatMoney(getAmount(row)))}</div>
            <p class="row-detail"><strong>Method:</strong> ${safe(getPaymentMethod(row))}</p>
            <p class="row-detail"><strong>Reference:</strong> ${safe(getPaymentReference(row))}</p>
            <p class="row-detail"><strong>Date:</strong> ${safe(formatDateTime(getPaymentDate(row)))}</p>
            ${paymentStatusBadge(getPaymentStatus(row))}
            <div class="button-row">
              <button class="btn green" onclick="updatePaymentStatus('${safe(row.id)}','paid')">Mark Paid</button>
              <button class="btn orange" onclick="updatePaymentStatus('${safe(row.id)}','pending')">Pending</button>
              <button class="btn red" onclick="updatePaymentStatus('${safe(row.id)}','failed')">Failed</button>
            </div>
          </div>
        `).join("")}

        <h3>Client Upgrade Requests</h3>
        ${clientRequests.length === 0 ? `
          <div class="empty">
            <h3>No upgrade requests</h3>
            <p>This client has no package/upgrade requests yet.</p>
          </div>
        ` : clientRequests.slice(0, 10).map(row => `
          <div class="row-card ${safe(requestCardClass(row))}">
            <div class="row-title">${safe(getRequestTitle(row))}</div>
            <p class="row-detail"><strong>Notes:</strong> ${safe(getRequestNotes(row) || "N/A")}</p>
            <p class="row-detail"><strong>Date:</strong> ${safe(formatDateTime(getRequestDate(row)))}</p>
            ${requestStatusBadge(getRequestStatus(row))}
            <div class="button-row">
              <button class="btn green" onclick="updateUpgradeRequestStatus('${safe(row.id)}','approved')">Approve</button>
              <button class="btn blue" onclick="updateUpgradeRequestStatus('${safe(row.id)}','completed')">Completed</button>
              <button class="btn red" onclick="updateUpgradeRequestStatus('${safe(row.id)}','rejected')">Reject</button>
            </div>
          </div>
        `).join("")}
      `;

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function updatePaymentStatus(paymentId, status) {
      const { error } = await supabaseClient
        .from("payments")
        .update({
          status: status,
          updated_at: new Date().toISOString()
        })
        .eq("id", paymentId);

      if (error) {
        const fallback = await supabaseClient
          .from("payments")
          .update({ status: status })
          .eq("id", paymentId);

        if (fallback.error) {
          alert(fallback.error.message);
          return;
        }
      }

      UnganiAdminShared.showToast("Payment status updated ✓");
      await loadPageData();
    }

    async function updateUpgradeRequestStatus(requestId, status) {
      const { error } = await supabaseClient
        .from("upgrade_requests")
        .update({
          status: status,
          updated_at: new Date().toISOString()
        })
        .eq("id", requestId);

      if (error) {
        const fallback = await supabaseClient
          .from("upgrade_requests")
          .update({ status: status })
          .eq("id", requestId);

        if (fallback.error) {
          alert(fallback.error.message);
          return;
        }
      }

      UnganiAdminShared.showToast("Upgrade request status updated ✓");
      await loadPageData();
    }

    function resetFilters() {
      document.getElementById("clientFilter").value = "";
      document.getElementById("paymentStatusFilter").value = "";
      document.getElementById("requestStatusFilter").value = "";
      document.getElementById("dateFrom").value = "";
      document.getElementById("dateTo").value = "";
      document.getElementById("searchBox").value = "";

      renderBillingPage();

      UnganiAdminShared.showToast("Billing filters reset ✓");
    }
  </script>
</body>
</html>
