<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Admin People</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="pwa-register.js"></script>
  <script src="admin-shared.js"></script>

  <style>
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 24px var(--ungani-shadow);
    }

    .metric-card h3 {
      margin: 0 0 8px;
      color: var(--ungani-muted);
      font-size: 14px;
    }

    .metric-card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
      color: var(--ungani-text);
    }

    .metric-card .note {
      margin-top: 8px;
      color: var(--ungani-muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .metric-card.green { border-left-color: var(--ungani-green); }
    .metric-card.red { border-left-color: var(--ungani-red); }
    .metric-card.orange { border-left-color: var(--ungani-orange); }
    .metric-card.blue { border-left-color: var(--ungani-blue); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .form-grid-full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 8px 0 6px;
      font-size: 14px;
      color: var(--ungani-text);
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--ungani-border);
      border-radius: 12px;
      background: var(--ungani-card);
      color: var(--ungani-text);
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
    }

    .section-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-title-row h2 {
      margin: 0;
    }

    .row-card {
      background: var(--ungani-bg);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .row-card.active-card { border-left-color: var(--ungani-green); }
    .row-card.warning-card { border-left-color: var(--ungani-orange); }
    .row-card.bad-card { border-left-color: var(--ungani-red); }
    .row-card.info-card { border-left-color: var(--ungani-blue); }

    .row-title {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 6px;
      color: var(--ungani-text);
    }

    .row-detail {
      color: var(--ungani-muted);
      margin: 5px 0;
      line-height: 1.45;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      background: #061C3D;
      color: #FFFFFF;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      text-transform: capitalize;
    }

    .badge.green { background: var(--ungani-green); }
    .badge.red { background: var(--ungani-red); }
    .badge.orange { background: var(--ungani-orange); }
    .badge.blue { background: var(--ungani-blue); }
    .badge.gold { background: var(--ungani-gold); color: #061C3D; }

    .empty {
      text-align: center;
      padding: 28px;
      background: var(--ungani-bg);
      border: 1px dashed var(--ungani-border);
      border-radius: 18px;
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--ungani-text);
    }

    .empty p {
      margin: 0;
      color: var(--ungani-muted);
    }

    .small-text {
      color: var(--ungani-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 950px) {
      .two-col {
        grid-template-columns: 1fr;
      }
    }

    .category-tiles {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .category-tile {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 5px solid var(--tile-accent, var(--ungani-gold));
      border-radius: 18px;
      padding: 14px 16px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: 0.18s ease;
    }

    .category-tile:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px var(--ungani-shadow);
    }

    .category-tile.active {
      box-shadow: 0 0 0 2px var(--tile-accent, var(--ungani-gold));
    }

    .category-tile .tile-count {
      display: block;
      font-size: 22px;
      font-weight: 900;
      color: var(--ungani-text);
    }

    .category-tile .tile-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--ungani-muted);
      margin-top: 4px;
    }

    .ungani-table-wrap {
      overflow-x: auto;
    }

    .ungani-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 680px;
    }

    .ungani-table thead th {
      text-align: left;
      padding: 10px 12px;
      color: var(--ungani-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--ungani-border);
      white-space: nowrap;
    }

    .ungani-table tbody tr {
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .ungani-table tbody tr:hover {
      background: rgba(212, 166, 58, 0.08);
    }

    .ungani-table td {
      padding: 12px;
      border-bottom: 1px solid var(--ungani-border);
      vertical-align: middle;
    }

    .ungani-table td:first-child {
      border-left: 4px solid var(--accent, #64748B);
      font-weight: bold;
      color: var(--ungani-text);
    }

    .ungani-table .row-sub {
      display: block;
      font-weight: normal;
      color: var(--ungani-muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .modal-form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
    }

    .modal-form-grid-full {
      grid-column: 1 / -1;
    }

    .nudge-empty h3 {
      margin: 0 0 6px;
      color: var(--ungani-text);
      font-size: 15px;
    }

    .nudge-empty p {
      margin: 0 auto;
      max-width: 340px;
      font-size: 13px;
    }

    .nudge-icon {
      font-size: 32px;
      display: inline-block;
      margin-bottom: 8px;
      animation: unganiNudgeFloat 6s ease-in-out infinite;
    }

    @keyframes unganiNudgeFloat {
      0%, 12% { opacity: 0.5; transform: translateY(0); }
      22% { opacity: 1; transform: translateY(-6px); }
      32%, 100% { opacity: 0.5; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .nudge-icon {
        animation: none;
        opacity: 0.85;
      }
    }

    .summary-banner {
      display: block;
      width: 100%;
      text-align: left;
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--tile-accent, var(--ungani-green));
      border-radius: 20px;
      padding: 16px 18px;
      margin-bottom: 18px;
      cursor: pointer;
      font-family: inherit;
      transition: 0.18s ease;
    }

    .summary-banner:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px var(--ungani-shadow);
    }

    .summary-banner strong {
      font-size: 20px;
      color: var(--ungani-text);
    }

    .summary-banner .summary-sub {
      display: block;
      margin-top: 3px;
      color: var(--ungani-muted);
      font-size: 13px;
    }

    .summary-banner .summary-cta {
      display: block;
      margin-top: 4px;
      color: var(--ungani-gold);
      font-size: 12px;
      font-weight: 700;
    }

    .mini-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.25);
      overflow: hidden;
      display: flex;
      margin-top: 10px;
    }

    .mini-bar-segment {
      height: 100%;
    }
  </style>
</head>

<body>
  <div id="adminRoot"></div>

  <script>
    let supabaseClient = null;
    let currentAdmin = null;

    let tenants = [];
    let people = [];
    let selectedPersonId = null;

    const pageMainHtml = `
      <section class="ungani-card ungani-hero-card">
        <div style="position: relative; z-index: 1;">
          <h2>Admin People Center</h2>
          <p>
            View and manage client staff, contacts, representatives, drivers, suppliers, and business people records.
          </p>
          <div style="margin-top: 16px;">
            <a class="ungani-btn" href="admin-home.html">Admin Home</a>
            <a class="ungani-btn green" href="admin.html">Main Admin</a>
            <a class="ungani-btn blue" href="admin-profiles.html">Profiles</a>
            <a class="ungani-btn dark" href="admin-settings.html">Admin Settings</a>
          </div>
        </div>
      </section>

      <section class="category-tiles" id="categoryTiles"></section>

      <button type="button" class="summary-banner" id="clientSummaryBanner" onclick="openClientSummaryModal()">
        <strong>Loading client summary...</strong>
        <span class="summary-sub">Please wait.</span>
      </button>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>People Filters</h2>
          <button class="ungani-btn green" onclick="loadPageData()">Refresh</button>
        </div>

        <div class="form-grid">
          <div>
            <label for="clientFilter">Client</label>
            <select id="clientFilter" onchange="renderPeoplePage()">
              <option value="">All Clients</option>
            </select>
          </div>

          <div>
            <label for="statusFilter">Status</label>
            <select id="statusFilter" onchange="renderPeoplePage()">
              <option value="">All Statuses</option>
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
              <option value="pending">Pending</option>
              <option value="left">Left / Removed</option>
            </select>
          </div>

          <div>
            <label for="departmentFilter">Department</label>
            <input id="departmentFilter" placeholder="Example: Operations" oninput="renderPeoplePage()" />
          </div>

          <div>
            <label for="searchBox">Search</label>
            <input id="searchBox" placeholder="Search people, contacts, roles..." oninput="renderPeoplePage()" />
          </div>
        </div>

        <div class="button-row">
          <button class="ungani-btn dark" onclick="resetFilters()">Reset Filters</button>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>All Client People</h2>
          <p class="small-text" id="peopleCountText">Loading...</p>
          <button class="ungani-btn green" onclick="openPersonModal(null)">+ Add Person</button>
        </div>

        <div class="ungani-table-wrap" id="peopleListBox">
          <div class="empty">
            <h3>Loading people...</h3>
            <p>Please wait.</p>
          </div>
        </div>
        <div id="peoplePagination"></div>
      </section>
    `;

    window.addEventListener("load", function () {
      UnganiAdminShared.renderShell("adminRoot", {
        activeKey: "admin-people",
        pageTitle: "Admin People",
        pageSubtitle: "View and manage client staff, contacts, and representatives.",
        footerTitle: "Admin People",
        footerVersion: "Admin People Version: Step 292 Shared Session Added",
        mainHtml: pageMainHtml
      });

      UnganiAdminShared.requireAdmin({
        onNoSession: function () {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiLoginShell").classList.remove("hidden");
        },
        onBlocked: function (reason) {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiBlockedShell").classList.remove("hidden");
          document.getElementById("unganiBlockedReason").innerText = reason;
        },
        onReady: async function (admin, client) {
          currentAdmin = admin;
          supabaseClient = client;

          UnganiAdminShared.renderSidebar("adminSidebar", {
            activeKey: "admin-people",
            adminName: admin.full_name || "Admin Workspace",
            footerTitle: "Admin People",
            footerVersion: "Admin People Version: Step 292 Shared Session Added"
          });

          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiAppShell").classList.remove("hidden");

          await loadPageData();
        }
      });
    });

    function safe(value) {
      return UnganiAdminShared.safe(value);
    }

    function cleanText(value) {
      return UnganiAdminShared.cleanText(value);
    }

    function getField(row, names, fallback = "") {
      for (const name of names) {
        if (row && row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return fallback;
    }

    function getTenantName(row) {
      return getField(row, ["business_name", "company_name", "tenant_name"], "Client Business");
    }

    function getTenantNameById(tenantId) {
      const tenant = tenants.find(row => String(row.id) === String(tenantId));
      return tenant ? getTenantName(tenant) : "Unknown Client";
    }

    function getPersonName(row) {
      return getField(row, ["full_name", "name", "person_name"], "Person / Contact");
    }

    function getPersonType(row) {
      return String(getField(row, ["person_type", "type"], "staff")).toLowerCase();
    }

    function getPersonStatus(row) {
      return String(getField(row, ["relationship_status", "status"], "active")).toLowerCase();
    }

    function getRoleTitle(row) {
      return getField(row, ["role_title", "title", "role"], "N/A");
    }

    function getDepartment(row) {
      return getField(row, ["department", "team"], "N/A");
    }

    function getPhone(row) {
      return getField(row, ["phone", "phone_number", "mobile"], "N/A");
    }

    function getEmail(row) {
      return getField(row, ["email", "email_address"], "N/A");
    }

    function getLocation(row) {
      return getField(row, ["location", "address"], "N/A");
    }

    function getNotes(row) {
      return getField(row, ["notes", "description", "details"], "");
    }

    function getCreatedDate(row) {
      return getField(row, ["created_at", "updated_at"], "");
    }

    function formatDateTime(value) {
      if (!value) return "N/A";

      const dateObj = new Date(value);

      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function statusBadge(status) {
      const clean = String(status || "active").toLowerCase();

      if (clean === "active") {
        return `<span class="badge green">Active</span>`;
      }

      if (clean === "pending") {
        return `<span class="badge orange">Pending</span>`;
      }

      if (clean === "inactive") {
        return `<span class="badge blue">Inactive</span>`;
      }

      if (clean === "left" || clean === "removed") {
        return `<span class="badge red">Left / Removed</span>`;
      }

      return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
    }

    function typeBadge(type) {
      const clean = String(type || "staff").toLowerCase();

      if (clean === "staff") return `<span class="badge green">Staff</span>`;
      if (clean === "manager") return `<span class="badge gold">Manager</span>`;
      if (clean === "driver") return `<span class="badge blue">Driver</span>`;
      if (clean === "contact") return `<span class="badge orange">Contact</span>`;
      if (clean === "supplier") return `<span class="badge blue">Supplier</span>`;
      if (clean === "customer") return `<span class="badge green">Customer</span>`;
      if (clean === "partner") return `<span class="badge gold">Partner</span>`;

      return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
    }

    function personCardClass(row) {
      const status = getPersonStatus(row);

      if (status === "active") return "active-card";
      if (status === "pending") return "warning-card";
      if (status === "left" || status === "removed") return "bad-card";

      return "info-card";
    }

    function statusAccent(row) {
      const status = getPersonStatus(row);

      if (status === "left" || status === "removed") return "#B91C1C";
      if (status === "pending") return "#C77700";
      if (status === "active") return "#15803D";

      return "#2563EB";
    }

    const PERSON_CATEGORIES = [
      { key: "all", label: "All People", accent: "#D4A63A", match: () => true },
      { key: "staff", label: "Staff", accent: "#15803D", match: row => getPersonType(row) === "staff" },
      { key: "manager", label: "Managers", accent: "#D4A63A", match: row => getPersonType(row) === "manager" },
      { key: "driver", label: "Drivers", accent: "#2563EB", match: row => getPersonType(row) === "driver" },
      { key: "contact", label: "Contacts", accent: "#C77700", match: row => getPersonType(row) === "contact" },
      { key: "supplier", label: "Suppliers", accent: "#2563EB", match: row => getPersonType(row) === "supplier" },
      { key: "customer", label: "Customers", accent: "#15803D", match: row => getPersonType(row) === "customer" },
      { key: "partner", label: "Partners", accent: "#D4A63A", match: row => getPersonType(row) === "partner" },
      {
        key: "other",
        label: "Other",
        accent: "#64748B",
        match: row => !["staff", "manager", "driver", "contact", "supplier", "customer", "partner"].includes(getPersonType(row))
      }
    ];

    let activePersonCategory = "all";
    const PEOPLE_PAGE_SIZE = 25;
    let peopleCurrentPage = 1;

    function goToPeoplePage(page) {
      peopleCurrentPage = page;
      renderPeopleList();
    }

    async function safeSelect(tableName) {
      try {
        const { data, error } = await supabaseClient
          .from(tableName)
          .select("*")
          .limit(10000);

        if (error) {
          console.log(tableName, error.message);
          return [];
        }

        return data || [];
      } catch (error) {
        console.log(tableName, error.message);
        return [];
      }
    }

    async function loadPageData() {
      UnganiAdminShared.showToast("Loading people...");

      const [tenantRows, peopleRows] = await Promise.all([
        safeSelect("tenants"),
        safeSelect("client_people")
      ]);

      tenants = tenantRows;
      people = peopleRows.sort((a, b) => new Date(getCreatedDate(b) || 0) - new Date(getCreatedDate(a) || 0));

      fillClientSelects();
      renderPeoplePage();

      UnganiAdminShared.showToast("People updated ✓");
    }

    function fillClientSelects() {
      const selectedFilter = document.getElementById("clientFilter").value;

      const options = tenants
        .map(row => `<option value="${safe(row.id)}">${safe(getTenantName(row))}</option>`)
        .join("");

      document.getElementById("clientFilter").innerHTML = `<option value="">All Clients</option>${options}`;

      if (selectedFilter) document.getElementById("clientFilter").value = selectedFilter;
    }

    function baseFilteredPeople() {
      const clientFilter = document.getElementById("clientFilter").value;
      const statusFilter = document.getElementById("statusFilter").value;
      const departmentFilter = document.getElementById("departmentFilter").value.toLowerCase().trim();
      const query = document.getElementById("searchBox").value.toLowerCase().trim();

      let rows = [...people];

      if (clientFilter) {
        rows = rows.filter(row => String(row.tenant_id) === String(clientFilter));
      }

      if (statusFilter) {
        rows = rows.filter(row => getPersonStatus(row) === statusFilter);
      }

      if (departmentFilter) {
        rows = rows.filter(row => getDepartment(row).toLowerCase().includes(departmentFilter));
      }

      if (query) {
        rows = rows.filter(row => {
          const haystack = [
            getTenantNameById(row.tenant_id),
            getPersonName(row),
            getPersonType(row),
            getPersonStatus(row),
            getRoleTitle(row),
            getDepartment(row),
            getPhone(row),
            getEmail(row),
            getLocation(row),
            getNotes(row),
            JSON.stringify(row)
          ].join(" ").toLowerCase();

          return haystack.includes(query);
        });
      }

      return rows;
    }

    function filteredPeople() {
      const category = PERSON_CATEGORIES.find(item => item.key === activePersonCategory) || PERSON_CATEGORIES[0];
      return baseFilteredPeople().filter(category.match);
    }

    function selectPersonCategory(key) {
      activePersonCategory = key;
      renderPeoplePage();
    }

    function renderCategoryTiles() {
      const base = baseFilteredPeople();

      document.getElementById("categoryTiles").innerHTML = PERSON_CATEGORIES.map(category => {
        const count = base.filter(category.match).length;
        const active = category.key === activePersonCategory ? " active" : "";

        return `
          <button type="button" class="category-tile${active}" style="--tile-accent:${category.accent};" onclick="selectPersonCategory('${category.key}')">
            <span class="tile-count">${safe(count)}</span>
            <span class="tile-label">${safe(category.label)}</span>
          </button>
        `;
      }).join("");
    }

    function renderPeoplePage() {
      peopleCurrentPage = 1;
      renderCategoryTiles();
      renderClientSummary();
      renderPeopleList();
    }

    let lastClientSummaryRows = [];

    function computeClientSummaryRows() {
      const rows = filteredPeople();
      const clientMap = {};

      tenants.forEach(tenant => {
        clientMap[tenant.id] = {
          id: tenant.id,
          name: getTenantName(tenant),
          total: 0,
          active: 0,
          staff: 0,
          managers: 0,
          contacts: 0,
          inactive: 0
        };
      });

      rows.forEach(row => {
        const tenantId = row.tenant_id;

        if (!tenantId || !clientMap[tenantId]) return;

        clientMap[tenantId].total += 1;

        if (getPersonStatus(row) === "active") clientMap[tenantId].active += 1;
        if (getPersonType(row) === "staff") clientMap[tenantId].staff += 1;
        if (getPersonType(row) === "manager") clientMap[tenantId].managers += 1;
        if (getPersonType(row) === "contact") clientMap[tenantId].contacts += 1;
        if (["inactive", "left", "removed"].includes(getPersonStatus(row))) clientMap[tenantId].inactive += 1;
      });

      return Object.values(clientMap)
        .filter(row => row.total > 0)
        .sort((a, b) => b.inactive - a.inactive || b.total - a.total);
    }

    function renderClientSummary() {
      const summaryRows = computeClientSummaryRows();
      lastClientSummaryRows = summaryRows;

      const banner = document.getElementById("clientSummaryBanner");
      const totalClients = summaryRows.length;
      const needsAttention = summaryRows.filter(row => row.inactive > 0).length;
      const clean = totalClients - needsAttention;

      if (totalClients === 0) {
        banner.style.setProperty("--tile-accent", "#64748B");
        banner.innerHTML = `
          <strong>No client people summary yet</strong>
          <span class="summary-sub">Client people summary will appear after records are added.</span>
        `;
        return;
      }

      banner.style.setProperty("--tile-accent", needsAttention > 0 ? "#C77700" : "#15803D");
      banner.innerHTML = `
        <strong>${safe(totalClients)} client${totalClients === 1 ? "" : "s"} tracked</strong>
        <span class="summary-sub">${safe(needsAttention)} need${needsAttention === 1 ? "s" : ""} inactive/left review</span>
        <div class="mini-bar">
          ${clean > 0 ? `<div class="mini-bar-segment" style="width:${(clean / totalClients) * 100}%;background:#15803D;"></div>` : ""}
          ${needsAttention > 0 ? `<div class="mini-bar-segment" style="width:${(needsAttention / totalClients) * 100}%;background:#C77700;"></div>` : ""}
        </div>
        <span class="summary-cta">Tap for full breakdown →</span>
      `;
    }

    function openClientSummaryModal() {
      const summaryRows = lastClientSummaryRows.slice(0, 10);

      const bodyHtml = summaryRows.length === 0
        ? emptyStateNudge("👥", "No client people summary yet", "Client people summary will appear after records are added.")
        : summaryRows.map(row => `
            <div class="row-card ${row.inactive > 0 ? "warning-card" : "active-card"}">
              <div class="row-title">${safe(row.name)}</div>
              <p class="row-detail"><strong>Total People:</strong> ${safe(row.total)}</p>
              <p class="row-detail"><strong>Active:</strong> ${safe(row.active)}</p>
              <p class="row-detail"><strong>Staff:</strong> ${safe(row.staff)}</p>
              <p class="row-detail"><strong>Managers:</strong> ${safe(row.managers)}</p>
              <p class="row-detail"><strong>Contacts:</strong> ${safe(row.contacts)}</p>
              <p class="row-detail"><strong>Inactive / Left:</strong> ${safe(row.inactive)}</p>
              ${row.inactive > 0 ? `<span class="badge orange">Review inactive records</span>` : `<span class="badge green">Clear</span>`}
            </div>
          `).join("");

      UnganiAdminShared.openModal({ title: "Client People Summary", bodyHtml: bodyHtml });
    }

    function emptyStateNudge(icon, title, message) {
      return `
        <div class="nudge-empty" style="text-align:center; padding: 28px 16px;">
          <span class="nudge-icon">${safe(icon)}</span>
          <h3>${safe(title)}</h3>
          <p>${safe(message)}</p>
        </div>
      `;
    }

    let lastRenderedPeople = [];

    function renderPeopleList() {
      const rows = filteredPeople();
      lastRenderedPeople = rows;

      document.getElementById("peopleCountText").innerText = `${rows.length} people record(s) shown`;

      const wrap = document.getElementById("peopleListBox");
      const paginationBox = document.getElementById("peoplePagination");

      if (rows.length === 0) {
        wrap.innerHTML = emptyStateNudge("👥", "No people found", "Try changing the filters, or add a client person record.");
        if (paginationBox) paginationBox.innerHTML = "";
        return;
      }

      const totalPages = Math.max(1, Math.ceil(rows.length / PEOPLE_PAGE_SIZE));
      peopleCurrentPage = Math.min(Math.max(1, peopleCurrentPage), totalPages);
      const startIdx = (peopleCurrentPage - 1) * PEOPLE_PAGE_SIZE;
      const pageRows = rows.slice(startIdx, startIdx + PEOPLE_PAGE_SIZE);

      wrap.innerHTML = `
        <table class="ungani-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Client</th>
              <th>Role / Department</th>
              <th>Type</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            ${pageRows.map((row, i) => {
              const index = startIdx + i;
              return `
              <tr style="--accent:${statusAccent(row)};" onclick="openPersonModal(${index})">
                <td>
                  ${safe(getPersonName(row))}
                  <span class="row-sub">${safe(getPhone(row))} · ${safe(getEmail(row))}</span>
                </td>
                <td>${safe(getTenantNameById(row.tenant_id))}</td>
                <td>
                  ${safe(getRoleTitle(row))}
                  <span class="row-sub">${safe(getDepartment(row))}</span>
                </td>
                <td>${typeBadge(getPersonType(row))}</td>
                <td>${statusBadge(getPersonStatus(row))}</td>
              </tr>
            `;
            }).join("")}
          </tbody>
        </table>
      `;

      if (paginationBox) paginationBox.innerHTML = UnganiAdminShared.buildPaginationHtml(peopleCurrentPage, totalPages, "goToPeoplePage");
    }

    function openPersonModal(index) {
      const row = index === null || index === undefined ? null : lastRenderedPeople[index];
      openPersonModalForRow(row);
    }

    function openPersonModalForRow(row) {
      const isNew = !row;
      selectedPersonId = row ? row.id : null;

      const bodyHtml = `
        ${isNew ? "" : `
          <div class="row-card ${safe(personCardClass(row))}" style="margin-bottom: 14px;">
            <div class="row-title">${safe(getPersonName(row))}</div>
            ${typeBadge(getPersonType(row))}
            ${statusBadge(getPersonStatus(row))}
          </div>
        `}

        <div class="modal-form-grid">
          <div>
            <label for="editTenantId">Client</label>
            <select id="editTenantId">
              <option value="">Select Client</option>
              ${tenants.map(tenant => `<option value="${safe(tenant.id)}">${safe(getTenantName(tenant))}</option>`).join("")}
            </select>
          </div>

          <div>
            <label for="editPersonType">Person Type</label>
            <select id="editPersonType">
              <option value="staff">Staff</option>
              <option value="manager">Manager</option>
              <option value="driver">Driver</option>
              <option value="contact">Contact Person</option>
              <option value="supplier">Supplier</option>
              <option value="customer">Customer</option>
              <option value="partner">Partner</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div>
            <label for="editFullName">Full Name</label>
            <input id="editFullName" value="${isNew ? "" : safe(getPersonName(row))}" placeholder="Example: John Mwangi" />
          </div>

          <div>
            <label for="editRoleTitle">Role / Title</label>
            <input id="editRoleTitle" value="${isNew ? "" : safe(getRoleTitle(row) === "N/A" ? "" : getRoleTitle(row))}" placeholder="Example: Operations Manager" />
          </div>

          <div>
            <label for="editDepartment">Department</label>
            <input id="editDepartment" value="${isNew ? "" : safe(getDepartment(row) === "N/A" ? "" : getDepartment(row))}" placeholder="Example: Operations" />
          </div>

          <div>
            <label for="editRelationshipStatus">Status</label>
            <select id="editRelationshipStatus">
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
              <option value="pending">Pending</option>
              <option value="left">Left / Removed</option>
            </select>
          </div>

          <div>
            <label for="editPhone">Phone</label>
            <input id="editPhone" value="${isNew ? "" : safe(getPhone(row) === "N/A" ? "" : getPhone(row))}" placeholder="Example: +254..." />
          </div>

          <div>
            <label for="editEmail">Email</label>
            <input id="editEmail" type="email" value="${isNew ? "" : safe(getEmail(row) === "N/A" ? "" : getEmail(row))}" placeholder="Example: person@email.com" />
          </div>

          <div class="modal-form-grid-full">
            <label for="editLocation">Location</label>
            <input id="editLocation" value="${isNew ? "" : safe(getLocation(row) === "N/A" ? "" : getLocation(row))}" placeholder="Example: Mombasa / Nairobi / Client branch" />
          </div>

          <div class="modal-form-grid-full">
            <label for="editNotes">Notes</label>
            <textarea id="editNotes">${isNew ? "" : safe(getNotes(row))}</textarea>
          </div>
        </div>

        <div class="button-row" style="margin-top: 16px;">
          ${isNew
            ? `<button class="ungani-btn green" onclick="createPerson()">Add Person</button>`
            : `
              <button class="ungani-btn green" onclick="saveSelectedPerson()">Save Person</button>
              <button class="ungani-btn blue" onclick="quickUpdateStatus('${safe(row.id)}','inactive')">Set Inactive</button>
              <button class="ungani-btn green" onclick="quickUpdateStatus('${safe(row.id)}','active')">Set Active</button>
              <button class="ungani-btn red" onclick="quickUpdateStatus('${safe(row.id)}','left')">Left / Removed</button>
            `}
        </div>
      `;

      UnganiAdminShared.openModal({
        title: isNew ? "Add Person" : getPersonName(row),
        bodyHtml: bodyHtml,
        onOpen: function () {
          document.getElementById("editTenantId").value = row ? (row.tenant_id || "") : "";
          document.getElementById("editPersonType").value = row ? getPersonType(row) : "staff";
          document.getElementById("editRelationshipStatus").value = row ? getPersonStatus(row) : "active";
        }
      });
    }

    async function createPerson() {
      const tenantId = document.getElementById("editTenantId").value;
      const fullName = document.getElementById("editFullName").value.trim();
      const personType = document.getElementById("editPersonType").value;
      const roleTitle = document.getElementById("editRoleTitle").value.trim();
      const department = document.getElementById("editDepartment").value.trim();
      const status = document.getElementById("editRelationshipStatus").value;
      const phone = document.getElementById("editPhone").value.trim();
      const email = document.getElementById("editEmail").value.trim();
      const location = document.getElementById("editLocation").value.trim();
      const notes = document.getElementById("editNotes").value.trim();

      if (!tenantId) {
        alert("Please select a client.");
        return;
      }

      if (!fullName) {
        alert("Please enter the full name.");
        return;
      }

      const now = new Date().toISOString();

      const { error } = await supabaseClient
        .from("client_people")
        .insert({
          tenant_id: tenantId,
          full_name: fullName,
          person_type: personType,
          role_title: roleTitle || null,
          department: department || null,
          phone: phone || null,
          email: email || null,
          location: location || null,
          relationship_status: status,
          notes: notes || null,
          created_by: UnganiAdminShared.getCurrentAdminId(),
          created_at: now,
          updated_at: now
        });

      if (error) {
        alert(error.message);
        return;
      }

      UnganiAdminShared.closeModal();
      UnganiAdminShared.showToast("Person added ✓");
      await loadPageData();
    }

    async function updatePersonStatus(personId, status) {
      const { error } = await supabaseClient
        .from("client_people")
        .update({
          relationship_status: status,
          updated_at: new Date().toISOString()
        })
        .eq("id", personId);

      if (error) {
        alert(error.message);
        return false;
      }

      return true;
    }

    async function quickUpdateStatus(personId, status) {
      const ok = await updatePersonStatus(personId, status);

      if (!ok) return;

      UnganiAdminShared.closeModal();
      UnganiAdminShared.showToast("Person status updated ✓");
      await loadPageData();
    }

    async function saveSelectedPerson() {
      if (!selectedPersonId) {
        alert("No person selected.");
        return;
      }

      const tenantId = document.getElementById("editTenantId").value;
      const fullName = document.getElementById("editFullName").value.trim();
      const personType = document.getElementById("editPersonType").value;
      const roleTitle = document.getElementById("editRoleTitle").value.trim();
      const department = document.getElementById("editDepartment").value.trim();
      const status = document.getElementById("editRelationshipStatus").value;
      const phone = document.getElementById("editPhone").value.trim();
      const email = document.getElementById("editEmail").value.trim();
      const location = document.getElementById("editLocation").value.trim();
      const notes = document.getElementById("editNotes").value.trim();

      if (!tenantId) {
        alert("Please select a client.");
        return;
      }

      if (!fullName) {
        alert("Please enter the full name.");
        return;
      }

      const { error } = await supabaseClient
        .from("client_people")
        .update({
          tenant_id: tenantId,
          full_name: fullName,
          person_type: personType,
          role_title: roleTitle || null,
          department: department || null,
          phone: phone || null,
          email: email || null,
          location: location || null,
          relationship_status: status,
          notes: notes || null,
          updated_at: new Date().toISOString()
        })
        .eq("id", selectedPersonId);

      if (error) {
        alert(error.message);
        return;
      }

      UnganiAdminShared.closeModal();
      UnganiAdminShared.showToast("Person saved ✓");
      await loadPageData();
    }

    function resetFilters() {
      document.getElementById("clientFilter").value = "";
      document.getElementById("statusFilter").value = "";
      document.getElementById("departmentFilter").value = "";
      document.getElementById("searchBox").value = "";
      activePersonCategory = "all";

      renderPeoplePage();

      UnganiAdminShared.showToast("People filters reset ✓");
    }
  </script>
</body>
</html>
