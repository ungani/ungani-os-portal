<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Admin People</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin-shared.js"></script>

  <style>
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 24px var(--ungani-shadow);
    }

    .metric-card h3 {
      margin: 0 0 8px;
      color: var(--ungani-muted);
      font-size: 14px;
    }

    .metric-card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
      color: var(--ungani-text);
    }

    .metric-card .note {
      margin-top: 8px;
      color: var(--ungani-muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .metric-card.green { border-left-color: var(--ungani-green); }
    .metric-card.red { border-left-color: var(--ungani-red); }
    .metric-card.orange { border-left-color: var(--ungani-orange); }
    .metric-card.blue { border-left-color: var(--ungani-blue); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .form-grid-full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 8px 0 6px;
      font-size: 14px;
      color: var(--ungani-text);
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--ungani-border);
      border-radius: 12px;
      background: var(--ungani-card);
      color: var(--ungani-text);
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
      background: var(--ungani-gold);
      color: #061C3D;
      text-decoration: none;
      display: inline-block;
    }

    .btn.dark {
      background: #061C3D;
      color: #FFFFFF;
    }

    html[data-ungani-theme="dark"] .btn.dark {
      background: #F5F5F3;
      color: #061C3D;
    }

    .btn.green { background: var(--ungani-green); color: #FFFFFF; }
    .btn.red { background: var(--ungani-red); color: #FFFFFF; }
    .btn.orange { background: var(--ungani-orange); color: #FFFFFF; }
    .btn.blue { background: var(--ungani-blue); color: #FFFFFF; }

    .two-col {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
    }

    .section-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-title-row h2 {
      margin: 0;
    }

    .row-card {
      background: var(--ungani-bg);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .row-card.active-card { border-left-color: var(--ungani-green); }
    .row-card.warning-card { border-left-color: var(--ungani-orange); }
    .row-card.bad-card { border-left-color: var(--ungani-red); }
    .row-card.info-card { border-left-color: var(--ungani-blue); }

    .row-title {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 6px;
      color: var(--ungani-text);
    }

    .row-detail {
      color: var(--ungani-muted);
      margin: 5px 0;
      line-height: 1.45;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      background: #061C3D;
      color: #FFFFFF;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      text-transform: capitalize;
    }

    .badge.green { background: var(--ungani-green); }
    .badge.red { background: var(--ungani-red); }
    .badge.orange { background: var(--ungani-orange); }
    .badge.blue { background: var(--ungani-blue); }
    .badge.gold { background: var(--ungani-gold); color: #061C3D; }

    .empty {
      text-align: center;
      padding: 28px;
      background: var(--ungani-bg);
      border: 1px dashed var(--ungani-border);
      border-radius: 18px;
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--ungani-text);
    }

    .empty p {
      margin: 0;
      color: var(--ungani-muted);
    }

    .small-text {
      color: var(--ungani-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 950px) {
      .two-col {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="adminRoot"></div>

  <script>
    let supabaseClient = null;
    let currentAdmin = null;

    let tenants = [];
    let people = [];
    let selectedPersonId = null;

    const pageMainHtml = `
      <section class="ungani-card ungani-hero-card">
        <div style="position: relative; z-index: 1;">
          <h2>Admin People Center</h2>
          <p>
            View and manage client staff, contacts, representatives, drivers, suppliers, and business people records.
          </p>
          <div style="margin-top: 16px;">
            <a class="btn" href="admin-home.html">Admin Home</a>
            <a class="btn green" href="admin.html">Main Admin</a>
            <a class="btn blue" href="admin-profiles.html">Profiles</a>
            <a class="btn dark" href="admin-settings.html">Admin Settings</a>
          </div>
        </div>
      </section>

      <section class="page-grid" id="metricsGrid">
        <div class="metric-card"><h3>Loading</h3><p>...</p><div class="note">Please wait</div></div>
      </section>

      <section class="two-col">
        <div class="ungani-card">
          <div class="section-title-row">
            <h2>Add Client Person</h2>
          </div>

          <div class="form-grid">
            <div>
              <label for="newTenantId">Client</label>
              <select id="newTenantId">
                <option value="">Loading clients...</option>
              </select>
            </div>

            <div>
              <label for="newPersonType">Person Type</label>
              <select id="newPersonType">
                <option value="staff">Staff</option>
                <option value="manager">Manager</option>
                <option value="driver">Driver</option>
                <option value="contact">Contact Person</option>
                <option value="supplier">Supplier</option>
                <option value="customer">Customer</option>
                <option value="partner">Partner</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div>
              <label for="newFullName">Full Name</label>
              <input id="newFullName" placeholder="Example: John Mwangi" />
            </div>

            <div>
              <label for="newRoleTitle">Role / Title</label>
              <input id="newRoleTitle" placeholder="Example: Operations Manager" />
            </div>

            <div>
              <label for="newDepartment">Department</label>
              <input id="newDepartment" placeholder="Example: Operations" />
            </div>

            <div>
              <label for="newRelationshipStatus">Status</label>
              <select id="newRelationshipStatus">
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
                <option value="pending">Pending</option>
                <option value="left">Left / Removed</option>
              </select>
            </div>

            <div>
              <label for="newPhone">Phone</label>
              <input id="newPhone" placeholder="Example: +254..." />
            </div>

            <div>
              <label for="newEmail">Email</label>
              <input id="newEmail" type="email" placeholder="Example: person@email.com" />
            </div>

            <div class="form-grid-full">
              <label for="newLocation">Location</label>
              <input id="newLocation" placeholder="Example: Mombasa / Nairobi / Client branch" />
            </div>

            <div class="form-grid-full">
              <label for="newNotes">Notes</label>
              <textarea id="newNotes" placeholder="Add responsibilities, contact notes, or relationship details..."></textarea>
            </div>
          </div>

          <div class="button-row">
            <button class="btn green" onclick="createPerson()">Add Person</button>
            <button class="btn dark" onclick="clearNewPersonForm()">Clear Form</button>
          </div>
        </div>

        <div class="ungani-card">
          <div class="section-title-row">
            <h2 id="selectedPersonTitle">Selected Person</h2>
          </div>

          <div id="selectedPersonBox">
            <div class="empty">
              <h3>No person selected</h3>
              <p>Select a person/contact below to view or update details.</p>
            </div>
          </div>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>People Filters</h2>
          <button class="btn green" onclick="loadPageData()">Refresh</button>
        </div>

        <div class="form-grid">
          <div>
            <label for="clientFilter">Client</label>
            <select id="clientFilter" onchange="renderPeoplePage()">
              <option value="">All Clients</option>
            </select>
          </div>

          <div>
            <label for="typeFilter">Person Type</label>
            <select id="typeFilter" onchange="renderPeoplePage()">
              <option value="">All Types</option>
              <option value="staff">Staff</option>
              <option value="manager">Manager</option>
              <option value="driver">Driver</option>
              <option value="contact">Contact Person</option>
              <option value="supplier">Supplier</option>
              <option value="customer">Customer</option>
              <option value="partner">Partner</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div>
            <label for="statusFilter">Status</label>
            <select id="statusFilter" onchange="renderPeoplePage()">
              <option value="">All Statuses</option>
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
              <option value="pending">Pending</option>
              <option value="left">Left / Removed</option>
            </select>
          </div>

          <div>
            <label for="departmentFilter">Department</label>
            <input id="departmentFilter" placeholder="Example: Operations" oninput="renderPeoplePage()" />
          </div>

          <div>
            <label for="searchBox">Search</label>
            <input id="searchBox" placeholder="Search people, contacts, roles..." oninput="renderPeoplePage()" />
          </div>
        </div>

        <div class="button-row">
          <button class="btn dark" onclick="resetFilters()">Reset Filters</button>
        </div>
      </section>

      <section class="two-col">
        <div class="ungani-card">
          <div class="section-title-row">
            <h2>Client People Summary</h2>
          </div>

          <div id="clientSummaryBox">
            <div class="empty">
              <h3>Loading client summary...</h3>
              <p>Please wait.</p>
            </div>
          </div>
        </div>

        <div class="ungani-card">
          <div class="section-title-row">
            <h2>Recently Added People</h2>
          </div>

          <div id="recentPeopleBox">
            <div class="empty">
              <h3>Loading recent people...</h3>
              <p>Please wait.</p>
            </div>
          </div>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>All Client People</h2>
          <p class="small-text" id="peopleCountText">Loading...</p>
        </div>

        <div id="peopleListBox">
          <div class="empty">
            <h3>Loading people...</h3>
            <p>Please wait.</p>
          </div>
        </div>
      </section>
    `;

    window.addEventListener("load", function () {
      UnganiAdminShared.renderShell("adminRoot", {
        activeKey: "admin-people",
        pageTitle: "Admin People",
        pageSubtitle: "View and manage client staff, contacts, and representatives.",
        footerTitle: "Admin People",
        footerVersion: "Admin People Version: Step 292 Shared Session Added",
        mainHtml: pageMainHtml
      });

      UnganiAdminShared.requireAdmin({
        onNoSession: function () {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiLoginShell").classList.remove("hidden");
        },
        onBlocked: function (reason) {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiBlockedShell").classList.remove("hidden");
          document.getElementById("unganiBlockedReason").innerText = reason;
        },
        onReady: async function (admin, client) {
          currentAdmin = admin;
          supabaseClient = client;

          UnganiAdminShared.renderSidebar("adminSidebar", {
            activeKey: "admin-people",
            adminName: admin.full_name || "Admin Workspace",
            footerTitle: "Admin People",
            footerVersion: "Admin People Version: Step 292 Shared Session Added"
          });

          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiAppShell").classList.remove("hidden");

          await loadPageData();
        }
      });
    });

    function safe(value) {
      return UnganiAdminShared.safe(value);
    }

    function cleanText(value) {
      return UnganiAdminShared.cleanText(value);
    }

    function getField(row, names, fallback = "") {
      for (const name of names) {
        if (row && row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return fallback;
    }

    function getTenantName(row) {
      return getField(row, ["business_name", "company_name", "tenant_name"], "Client Business");
    }

    function getTenantNameById(tenantId) {
      const tenant = tenants.find(row => String(row.id) === String(tenantId));
      return tenant ? getTenantName(tenant) : "Unknown Client";
    }

    function getPersonName(row) {
      return getField(row, ["full_name", "name", "person_name"], "Person / Contact");
    }

    function getPersonType(row) {
      return String(getField(row, ["person_type", "type"], "staff")).toLowerCase();
    }

    function getPersonStatus(row) {
      return String(getField(row, ["relationship_status", "status"], "active")).toLowerCase();
    }

    function getRoleTitle(row) {
      return getField(row, ["role_title", "title", "role"], "N/A");
    }

    function getDepartment(row) {
      return getField(row, ["department", "team"], "N/A");
    }

    function getPhone(row) {
      return getField(row, ["phone", "phone_number", "mobile"], "N/A");
    }

    function getEmail(row) {
      return getField(row, ["email", "email_address"], "N/A");
    }

    function getLocation(row) {
      return getField(row, ["location", "address"], "N/A");
    }

    function getNotes(row) {
      return getField(row, ["notes", "description", "details"], "");
    }

    function getCreatedDate(row) {
      return getField(row, ["created_at", "updated_at"], "");
    }

    function formatDateTime(value) {
      if (!value) return "N/A";

      const dateObj = new Date(value);

      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function statusBadge(status) {
      const clean = String(status || "active").toLowerCase();

      if (clean === "active") {
        return `<span class="badge green">Active</span>`;
      }

      if (clean === "pending") {
        return `<span class="badge orange">Pending</span>`;
      }

      if (clean === "inactive") {
        return `<span class="badge blue">Inactive</span>`;
      }

      if (clean === "left" || clean === "removed") {
        return `<span class="badge red">Left / Removed</span>`;
      }

      return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
    }

    function typeBadge(type) {
      const clean = String(type || "staff").toLowerCase();

      if (clean === "staff") return `<span class="badge green">Staff</span>`;
      if (clean === "manager") return `<span class="badge gold">Manager</span>`;
      if (clean === "driver") return `<span class="badge blue">Driver</span>`;
      if (clean === "contact") return `<span class="badge orange">Contact</span>`;
      if (clean === "supplier") return `<span class="badge blue">Supplier</span>`;
      if (clean === "customer") return `<span class="badge green">Customer</span>`;
      if (clean === "partner") return `<span class="badge gold">Partner</span>`;

      return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
    }

    function personCardClass(row) {
      const status = getPersonStatus(row);

      if (status === "active") return "active-card";
      if (status === "pending") return "warning-card";
      if (status === "left" || status === "removed") return "bad-card";

      return "info-card";
    }

    async function safeSelect(tableName) {
      try {
        const { data, error } = await supabaseClient
          .from(tableName)
          .select("*")
          .limit(10000);

        if (error) {
          console.log(tableName, error.message);
          return [];
        }

        return data || [];
      } catch (error) {
        console.log(tableName, error.message);
        return [];
      }
    }

    async function loadPageData() {
      UnganiAdminShared.showToast("Loading people...");

      const [tenantRows, peopleRows] = await Promise.all([
        safeSelect("tenants"),
        safeSelect("client_people")
      ]);

      tenants = tenantRows;
      people = peopleRows.sort((a, b) => new Date(getCreatedDate(b) || 0) - new Date(getCreatedDate(a) || 0));

      fillClientSelects();
      renderPeoplePage();

      if (selectedPersonId) {
        renderSelectedPerson(selectedPersonId);
      }

      UnganiAdminShared.showToast("People updated ✓");
    }

    function fillClientSelects() {
      const selectedFilter = document.getElementById("clientFilter").value;
      const selectedNew = document.getElementById("newTenantId").value;

      const options = tenants
        .map(row => `<option value="${safe(row.id)}">${safe(getTenantName(row))}</option>`)
        .join("");

      document.getElementById("clientFilter").innerHTML = `<option value="">All Clients</option>${options}`;
      document.getElementById("newTenantId").innerHTML = `<option value="">Select Client</option>${options}`;

      if (selectedFilter) document.getElementById("clientFilter").value = selectedFilter;
      if (selectedNew) document.getElementById("newTenantId").value = selectedNew;
    }

    function filteredPeople() {
      const clientFilter = document.getElementById("clientFilter").value;
      const typeFilter = document.getElementById("typeFilter").value;
      const statusFilter = document.getElementById("statusFilter").value;
      const departmentFilter = document.getElementById("departmentFilter").value.toLowerCase().trim();
      const query = document.getElementById("searchBox").value.toLowerCase().trim();

      let rows = [...people];

      if (clientFilter) {
        rows = rows.filter(row => String(row.tenant_id) === String(clientFilter));
      }

      if (typeFilter) {
        rows = rows.filter(row => getPersonType(row) === typeFilter);
      }

      if (statusFilter) {
        rows = rows.filter(row => getPersonStatus(row) === statusFilter);
      }

      if (departmentFilter) {
        rows = rows.filter(row => getDepartment(row).toLowerCase().includes(departmentFilter));
      }

      if (query) {
        rows = rows.filter(row => {
          const haystack = [
            getTenantNameById(row.tenant_id),
            getPersonName(row),
            getPersonType(row),
            getPersonStatus(row),
            getRoleTitle(row),
            getDepartment(row),
            getPhone(row),
            getEmail(row),
            getLocation(row),
            getNotes(row),
            JSON.stringify(row)
          ].join(" ").toLowerCase();

          return haystack.includes(query);
        });
      }

      return rows;
    }

    function renderPeoplePage() {
      renderMetrics();
      renderClientSummary();
      renderRecentPeople();
      renderPeopleList();
    }

    function renderMetrics() {
      const rows = filteredPeople();

      const active = rows.filter(row => getPersonStatus(row) === "active").length;
      const pending = rows.filter(row => getPersonStatus(row) === "pending").length;
      const inactive = rows.filter(row => getPersonStatus(row) === "inactive").length;
      const left = rows.filter(row => ["left", "removed"].includes(getPersonStatus(row))).length;
      const staff = rows.filter(row => getPersonType(row) === "staff").length;
      const managers = rows.filter(row => getPersonType(row) === "manager").length;
      const contacts = rows.filter(row => getPersonType(row) === "contact").length;
      const clientsWithPeople = new Set(rows.map(row => row.tenant_id).filter(Boolean)).size;

      const metrics = [
        { title: "Total People", value: rows.length, note: "People records in current view", cls: "blue" },
        { title: "Active", value: active, note: "Currently active people/contacts", cls: "green" },
        { title: "Pending", value: pending, note: "Pending people records", cls: pending > 0 ? "orange" : "green" },
        { title: "Inactive", value: inactive, note: "Inactive records", cls: "blue" },
        { title: "Left / Removed", value: left, note: "People no longer active", cls: left > 0 ? "red" : "green" },
        { title: "Staff", value: staff, note: "Staff records", cls: "green" },
        { title: "Managers", value: managers, note: "Manager records", cls: "gold" },
        { title: "Clients With People", value: clientsWithPeople, note: "Unique clients with people records", cls: "blue" }
      ];

      document.getElementById("metricsGrid").innerHTML = metrics.map(item => `
        <div class="metric-card ${safe(item.cls)}">
          <h3>${safe(item.title)}</h3>
          <p>${safe(item.value)}</p>
          <div class="note">${safe(item.note)}</div>
        </div>
      `).join("");
    }

    function renderClientSummary() {
      const rows = filteredPeople();
      const clientMap = {};

      tenants.forEach(tenant => {
        clientMap[tenant.id] = {
          id: tenant.id,
          name: getTenantName(tenant),
          total: 0,
          active: 0,
          staff: 0,
          managers: 0,
          contacts: 0,
          inactive: 0
        };
      });

      rows.forEach(row => {
        const tenantId = row.tenant_id;

        if (!tenantId || !clientMap[tenantId]) return;

        clientMap[tenantId].total += 1;

        if (getPersonStatus(row) === "active") clientMap[tenantId].active += 1;
        if (getPersonType(row) === "staff") clientMap[tenantId].staff += 1;
        if (getPersonType(row) === "manager") clientMap[tenantId].managers += 1;
        if (getPersonType(row) === "contact") clientMap[tenantId].contacts += 1;
        if (["inactive", "left", "removed"].includes(getPersonStatus(row))) clientMap[tenantId].inactive += 1;
      });

      const summaryRows = Object.values(clientMap)
        .filter(row => row.total > 0)
        .sort((a, b) => b.total - a.total)
        .slice(0, 10);

      if (summaryRows.length === 0) {
        document.getElementById("clientSummaryBox").innerHTML = `
          <div class="empty">
            <h3>No client people summary yet</h3>
            <p>Client people summary will appear after records are added.</p>
          </div>
        `;
        return;
      }

      document.getElementById("clientSummaryBox").innerHTML = summaryRows.map(row => `
        <div class="row-card ${row.inactive > 0 ? "warning-card" : "active-card"}">
          <div class="row-title">${safe(row.name)}</div>
          <p class="row-detail"><strong>Total People:</strong> ${safe(row.total)}</p>
          <p class="row-detail"><strong>Active:</strong> ${safe(row.active)}</p>
          <p class="row-detail"><strong>Staff:</strong> ${safe(row.staff)}</p>
          <p class="row-detail"><strong>Managers:</strong> ${safe(row.managers)}</p>
          <p class="row-detail"><strong>Contacts:</strong> ${safe(row.contacts)}</p>
          <p class="row-detail"><strong>Inactive / Left:</strong> ${safe(row.inactive)}</p>
          ${row.inactive > 0 ? `<span class="badge orange">Review inactive records</span>` : `<span class="badge green">Clear</span>`}
        </div>
      `).join("");
    }

    function renderRecentPeople() {
      const rows = filteredPeople().slice(0, 8);

      if (rows.length === 0) {
        document.getElementById("recentPeopleBox").innerHTML = `
          <div class="empty">
            <h3>No recent people</h3>
            <p>No people records match the current filters.</p>
          </div>
        `;
        return;
      }

      document.getElementById("recentPeopleBox").innerHTML = rows.map(row => `
        <div class="row-card ${safe(personCardClass(row))}">
          <div class="row-title">${safe(getPersonName(row))}</div>
          <p class="row-detail"><strong>Client:</strong> ${safe(getTenantNameById(row.tenant_id))}</p>
          <p class="row-detail"><strong>Role:</strong> ${safe(getRoleTitle(row))}</p>
          <p class="row-detail"><strong>Department:</strong> ${safe(getDepartment(row))}</p>
          <p class="row-detail"><strong>Added:</strong> ${safe(formatDateTime(getCreatedDate(row)))}</p>
          ${typeBadge(getPersonType(row))}
          ${statusBadge(getPersonStatus(row))}
        </div>
      `).join("");
    }

    function renderPeopleList() {
      const rows = filteredPeople();

      document.getElementById("peopleCountText").innerText = `${rows.length} people record(s) shown`;

      if (rows.length === 0) {
        document.getElementById("peopleListBox").innerHTML = `
          <div class="empty">
            <h3>No people found</h3>
            <p>Try changing the filters or add a client person record.</p>
          </div>
        `;
        return;
      }

      document.getElementById("peopleListBox").innerHTML = rows.map(row => `
        <div class="row-card ${safe(personCardClass(row))}">
          <div class="row-title">${safe(getPersonName(row))}</div>
          <p class="row-detail"><strong>Client:</strong> ${safe(getTenantNameById(row.tenant_id))}</p>
          <p class="row-detail"><strong>Role / Title:</strong> ${safe(getRoleTitle(row))}</p>
          <p class="row-detail"><strong>Department:</strong> ${safe(getDepartment(row))}</p>
          <p class="row-detail"><strong>Phone:</strong> ${safe(getPhone(row))}</p>
          <p class="row-detail"><strong>Email:</strong> ${safe(getEmail(row))}</p>
          <p class="row-detail"><strong>Location:</strong> ${safe(getLocation(row))}</p>
          <p class="row-detail"><strong>Notes:</strong> ${safe(getNotes(row) || "N/A")}</p>
          <p class="row-detail"><strong>Created:</strong> ${safe(formatDateTime(getCreatedDate(row)))}</p>

          ${typeBadge(getPersonType(row))}
          ${statusBadge(getPersonStatus(row))}

          <div class="button-row">
            <button class="btn" onclick="renderSelectedPerson('${safe(row.id)}')">Open / Edit</button>
            <button class="btn green" onclick="quickUpdateStatus('${safe(row.id)}','active')">Active</button>
            <button class="btn blue" onclick="quickUpdateStatus('${safe(row.id)}','inactive')">Inactive</button>
            <button class="btn red" onclick="quickUpdateStatus('${safe(row.id)}','left')">Left / Removed</button>
          </div>
        </div>
      `).join("");
    }

    function renderSelectedPerson(personId) {
      const row = people.find(item => String(item.id) === String(personId));

      if (!row) {
        selectedPersonId = null;
        document.getElementById("selectedPersonTitle").innerText = "Selected Person";
        document.getElementById("selectedPersonBox").innerHTML = `
          <div class="empty">
            <h3>Person not found</h3>
            <p>Please refresh the people list.</p>
          </div>
        `;
        return;
      }

      selectedPersonId = row.id;

      document.getElementById("selectedPersonTitle").innerText = getPersonName(row);

      document.getElementById("selectedPersonBox").innerHTML = `
        <div class="row-card ${safe(personCardClass(row))}">
          <div class="row-title">${safe(getPersonName(row))}</div>
          <p class="row-detail"><strong>Client:</strong> ${safe(getTenantNameById(row.tenant_id))}</p>
          <p class="row-detail"><strong>Role / Title:</strong> ${safe(getRoleTitle(row))}</p>
          <p class="row-detail"><strong>Department:</strong> ${safe(getDepartment(row))}</p>
          <p class="row-detail"><strong>Phone:</strong> ${safe(getPhone(row))}</p>
          <p class="row-detail"><strong>Email:</strong> ${safe(getEmail(row))}</p>

          ${typeBadge(getPersonType(row))}
          ${statusBadge(getPersonStatus(row))}
        </div>

        <div class="form-grid">
          <div>
            <label for="editTenantId">Client</label>
            <select id="editTenantId">
              ${tenants.map(tenant => `<option value="${safe(tenant.id)}">${safe(getTenantName(tenant))}</option>`).join("")}
            </select>
          </div>

          <div>
            <label for="editPersonType">Person Type</label>
            <select id="editPersonType">
              <option value="staff">Staff</option>
              <option value="manager">Manager</option>
              <option value="driver">Driver</option>
              <option value="contact">Contact Person</option>
              <option value="supplier">Supplier</option>
              <option value="customer">Customer</option>
              <option value="partner">Partner</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div>
            <label for="editFullName">Full Name</label>
            <input id="editFullName" value="${safe(getPersonName(row))}" />
          </div>

          <div>
            <label for="editRoleTitle">Role / Title</label>
            <input id="editRoleTitle" value="${safe(getRoleTitle(row) === "N/A" ? "" : getRoleTitle(row))}" />
          </div>

          <div>
            <label for="editDepartment">Department</label>
            <input id="editDepartment" value="${safe(getDepartment(row) === "N/A" ? "" : getDepartment(row))}" />
          </div>

          <div>
            <label for="editRelationshipStatus">Status</label>
            <select id="editRelationshipStatus">
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
              <option value="pending">Pending</option>
              <option value="left">Left / Removed</option>
            </select>
          </div>

          <div>
            <label for="editPhone">Phone</label>
            <input id="editPhone" value="${safe(getPhone(row) === "N/A" ? "" : getPhone(row))}" />
          </div>

          <div>
            <label for="editEmail">Email</label>
            <input id="editEmail" type="email" value="${safe(getEmail(row) === "N/A" ? "" : getEmail(row))}" />
          </div>

          <div class="form-grid-full">
            <label for="editLocation">Location</label>
            <input id="editLocation" value="${safe(getLocation(row) === "N/A" ? "" : getLocation(row))}" />
          </div>

          <div class="form-grid-full">
            <label for="editNotes">Notes</label>
            <textarea id="editNotes">${safe(getNotes(row))}</textarea>
          </div>
        </div>

        <div class="button-row">
          <button class="btn green" onclick="saveSelectedPerson()">Save Person</button>
          <button class="btn blue" onclick="quickUpdateStatus('${safe(row.id)}','inactive')">Set Inactive</button>
          <button class="btn green" onclick="quickUpdateStatus('${safe(row.id)}','active')">Set Active</button>
          <button class="btn red" onclick="quickUpdateStatus('${safe(row.id)}','left')">Left / Removed</button>
        </div>
      `;

      document.getElementById("editTenantId").value = row.tenant_id || "";
      document.getElementById("editPersonType").value = getPersonType(row);
      document.getElementById("editRelationshipStatus").value = getPersonStatus(row);

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function createPerson() {
      const tenantId = document.getElementById("newTenantId").value;
      const fullName = document.getElementById("newFullName").value.trim();
      const personType = document.getElementById("newPersonType").value;
      const roleTitle = document.getElementById("newRoleTitle").value.trim();
      const department = document.getElementById("newDepartment").value.trim();
      const status = document.getElementById("newRelationshipStatus").value;
      const phone = document.getElementById("newPhone").value.trim();
      const email = document.getElementById("newEmail").value.trim();
      const location = document.getElementById("newLocation").value.trim();
      const notes = document.getElementById("newNotes").value.trim();

      if (!tenantId) {
        alert("Please select a client.");
        return;
      }

      if (!fullName) {
        alert("Please enter the full name.");
        return;
      }

      const now = new Date().toISOString();

      const { error } = await supabaseClient
        .from("client_people")
        .insert({
          tenant_id: tenantId,
          full_name: fullName,
          person_type: personType,
          role_title: roleTitle || null,
          department: department || null,
          phone: phone || null,
          email: email || null,
          location: location || null,
          relationship_status: status,
          notes: notes || null,
          created_by: UnganiAdminShared.getCurrentAdminId(),
          created_at: now,
          updated_at: now
        });

      if (error) {
        alert(error.message);
        return;
      }

      UnganiAdminShared.showToast("Person added ✓");
      clearNewPersonForm();
      await loadPageData();
    }

    function clearNewPersonForm() {
      document.getElementById("newTenantId").value = "";
      document.getElementById("newPersonType").value = "staff";
      document.getElementById("newFullName").value = "";
      document.getElementById("newRoleTitle").value = "";
      document.getElementById("newDepartment").value = "";
      document.getElementById("newRelationshipStatus").value = "active";
      document.getElementById("newPhone").value = "";
      document.getElementById("newEmail").value = "";
      document.getElementById("newLocation").value = "";
      document.getElementById("newNotes").value = "";
    }

    async function updatePersonStatus(personId, status) {
      const { error } = await supabaseClient
        .from("client_people")
        .update({
          relationship_status: status,
          updated_at: new Date().toISOString()
        })
        .eq("id", personId);

      if (error) {
        alert(error.message);
        return false;
      }

      return true;
    }

    async function quickUpdateStatus(personId, status) {
      const ok = await updatePersonStatus(personId, status);

      if (!ok) return;

      selectedPersonId = personId;

      UnganiAdminShared.showToast("Person status updated ✓");
      await loadPageData();
    }

    async function saveSelectedPerson() {
      if (!selectedPersonId) {
        alert("No person selected.");
        return;
      }

      const tenantId = document.getElementById("editTenantId").value;
      const fullName = document.getElementById("editFullName").value.trim();
      const personType = document.getElementById("editPersonType").value;
      const roleTitle = document.getElementById("editRoleTitle").value.trim();
      const department = document.getElementById("editDepartment").value.trim();
      const status = document.getElementById("editRelationshipStatus").value;
      const phone = document.getElementById("editPhone").value.trim();
      const email = document.getElementById("editEmail").value.trim();
      const location = document.getElementById("editLocation").value.trim();
      const notes = document.getElementById("editNotes").value.trim();

      if (!tenantId) {
        alert("Please select a client.");
        return;
      }

      if (!fullName) {
        alert("Please enter the full name.");
        return;
      }

      const { error } = await supabaseClient
        .from("client_people")
        .update({
          tenant_id: tenantId,
          full_name: fullName,
          person_type: personType,
          role_title: roleTitle || null,
          department: department || null,
          phone: phone || null,
          email: email || null,
          location: location || null,
          relationship_status: status,
          notes: notes || null,
          updated_at: new Date().toISOString()
        })
        .eq("id", selectedPersonId);

      if (error) {
        alert(error.message);
        return;
      }

      UnganiAdminShared.showToast("Person saved ✓");
      await loadPageData();
    }

    function resetFilters() {
      document.getElementById("clientFilter").value = "";
      document.getElementById("typeFilter").value = "";
      document.getElementById("statusFilter").value = "";
      document.getElementById("departmentFilter").value = "";
      document.getElementById("searchBox").value = "";

      renderPeoplePage();

      UnganiAdminShared.showToast("People filters reset ✓");
    }
  </script>
</body>
</html>
