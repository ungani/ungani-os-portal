<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Admin Health</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin-shared.js"></script>

  <style>
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 6px solid var(--gold);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 24px var(--shadow);
    }

    .metric-card h3 {
      margin: 0 0 8px;
      color: var(--soft-text);
      font-size: 14px;
    }

    .metric-card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
      color: var(--text);
    }

    .metric-card .note {
      margin-top: 8px;
      color: var(--soft-text);
      font-size: 12px;
    }

    .metric-card.green { border-left-color: var(--green); }
    .metric-card.red { border-left-color: var(--red); }
    .metric-card.orange { border-left-color: var(--orange); }
    .metric-card.blue { border-left-color: var(--blue); }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .section-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-title-row h2 {
      margin: 0;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
      background: var(--gold);
      color: #061C3D;
      text-decoration: none;
      display: inline-block;
    }

    .btn.dark {
      background: #061C3D;
      color: #FFFFFF;
    }

    body.dark .btn.dark {
      background: #F5F5F3;
      color: #061C3D;
    }

    .btn.green { background: var(--green); color: #FFFFFF; }
    .btn.blue { background: var(--blue); color: #FFFFFF; }
    .btn.orange { background: var(--orange); color: #FFFFFF; }
    .btn.red { background: var(--red); color: #FFFFFF; }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .health-score {
      background: linear-gradient(135deg, #061C3D, #0b2b59);
      color: #FFFFFF;
      border-radius: 22px;
      padding: 24px;
      margin-bottom: 18px;
      position: relative;
      overflow: hidden;
    }

    body.dark .health-score {
      background: linear-gradient(135deg, #0B1220, #111C33);
      border: 1px solid rgba(212,166,58,0.22);
    }

    .health-score h2 {
      margin: 0 0 8px;
    }

    .score-number {
      font-size: 56px;
      font-weight: bold;
      color: var(--gold);
      margin: 8px 0;
    }

    .check-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-left: 6px solid var(--gold);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .check-card.good { border-left-color: var(--green); }
    .check-card.warning { border-left-color: var(--orange); }
    .check-card.bad { border-left-color: var(--red); }
    .check-card.info { border-left-color: var(--blue); }

    .check-title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 6px;
      color: var(--text);
    }

    .check-detail {
      color: var(--soft-text);
      margin: 5px 0;
      line-height: 1.45;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      background: #061C3D;
      color: #FFFFFF;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      text-transform: capitalize;
    }

    .badge.green { background: var(--green); }
    .badge.red { background: var(--red); }
    .badge.orange { background: var(--orange); }
    .badge.blue { background: var(--blue); }
    .badge.gold { background: var(--gold); color: #061C3D; }

    .empty {
      text-align: center;
      padding: 28px;
      background: var(--bg);
      border: 1px dashed var(--border);
      border-radius: 18px;
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--text);
    }

    .empty p {
      margin: 0;
      color: var(--soft-text);
    }

    .small-text {
      color: var(--soft-text);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 950px) {
      .two-col {
        grid-template-columns: 1fr;
      }

      .score-number {
        font-size: 44px;
      }
    }
  </style>
</head>

<body>
  <div id="adminRoot"></div>

  <script>
    let supabaseClient = null;
    let currentAdmin = null;

    let dataStore = {
      tenants: [],
      registrations: [],
      users: [],
      documents: [],
      support: [],
      adminMessages: [],
      teamMessages: [],
      events: [],
      transactions: [],
      tasks: [],
      records: [],
      items: [],
      people: [],
      notices: [],
      payments: [],
      upgrades: []
    };

    let pageChecks = [];

    const requiredTables = [
      "tenants",
      "registrations",
      "users",
      "documents",
      "support_issues",
      "admin_client_messages",
      "team_chat_messages",
      "business_events",
      "transactions",
      "tasks",
      "business_records",
      "business_items",
      "client_people",
      "client_notices",
      "payments",
      "upgrade_requests"
    ];

    const importantPages = [
      "admin-home.html",
      "admin.html",
      "admin-settings.html",
      "admin-documents.html",
      "support.html",
      "admin-chat.html",
      "admin-reports.html",
      "admin-charts.html",
      "admin-health.html",
      "client.html",
      "my-documents.html",
      "reports.html",
      "print-report.html"
    ];

    const pageMainHtml = `
      <section class="ungani-card ungani-hero-card">
        <div style="position: relative; z-index: 1;">
          <h2>Admin Health Check</h2>
          <p>
            Check UNGANI OS health across database tables, admin pages, client records, documents, support, chat, reports, and system activity.
          </p>
          <div style="margin-top: 16px;">
            <a class="btn" href="admin-home.html">Admin Home</a>
            <a class="btn green" href="admin.html">Main Admin</a>
            <a class="btn blue" href="admin-reports.html">Reports</a>
            <a class="btn dark" href="admin-settings.html">Admin Settings</a>
          </div>
        </div>
      </section>

      <section id="healthScoreBox">
        <div class="health-score">
          <h2>Calculating System Health...</h2>
          <div class="score-number">...</div>
          <p>Please wait while UNGANI checks the system.</p>
        </div>
      </section>

      <section class="page-grid" id="metricsGrid">
        <div class="metric-card"><h3>Loading</h3><p>...</p><div class="note">Please wait</div></div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>Health Actions</h2>
          <button class="btn green" onclick="runHealthCheck()">Run Health Check</button>
        </div>

        <p class="small-text">
          This page checks the important UNGANI OS tables and pages. It also highlights items that need admin follow-up.
        </p>

        <div class="button-row">
          <a class="btn blue" href="admin-documents.html">Open Documents</a>
          <a class="btn orange" href="support.html">Open Support</a>
          <a class="btn" href="admin-chat.html">Open Chat</a>
          <a class="btn dark" href="admin-settings.html">Admin Settings</a>
        </div>
      </section>

      <section class="two-col">
        <div class="ungani-card">
          <div class="section-title-row">
            <h2>Database Checks</h2>
          </div>
          <div id="databaseChecksBox">
            <div class="empty">
              <h3>Loading database checks...</h3>
              <p>Please wait.</p>
            </div>
          </div>
        </div>

        <div class="ungani-card">
          <div class="section-title-row">
            <h2>Page Checks</h2>
          </div>
          <div id="pageChecksBox">
            <div class="empty">
              <h3>Loading page checks...</h3>
              <p>Please wait.</p>
            </div>
          </div>
        </div>
      </section>

      <section class="two-col">
        <div class="ungani-card">
          <div class="section-title-row">
            <h2>Needs Attention</h2>
          </div>
          <div id="attentionBox">
            <div class="empty">
              <h3>Checking attention items...</h3>
              <p>Please wait.</p>
            </div>
          </div>
        </div>

        <div class="ungani-card">
          <div class="section-title-row">
            <h2>Latest System Activity</h2>
          </div>
          <div id="activityBox">
            <div class="empty">
              <h3>Loading activity...</h3>
              <p>Please wait.</p>
            </div>
          </div>
        </div>
      </section>
    `;

    window.addEventListener("load", function () {
      UnganiAdminShared.renderShell("adminRoot", {
        activeKey: "admin-health",
        pageTitle: "Admin Health",
        pageSubtitle: "Check UNGANI OS database, pages, and system activity.",
        footerTitle: "Admin Health",
        footerVersion: "Admin Health Version: Step 285 Shared Session Added",
        mainHtml: pageMainHtml
      });

      UnganiAdminShared.requireAdmin({
        onNoSession: function () {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiLoginShell").classList.remove("hidden");
        },
        onBlocked: function (reason) {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiBlockedShell").classList.remove("hidden");
          document.getElementById("unganiBlockedReason").innerText = reason;
        },
        onReady: async function (admin, client) {
          currentAdmin = admin;
          supabaseClient = client;

          UnganiAdminShared.renderSidebar("adminSidebar", {
            activeKey: "admin-health",
            adminName: admin.full_name || "Admin Workspace",
            footerTitle: "Admin Health",
            footerVersion: "Admin Health Version: Step 285 Shared Session Added"
          });

          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiAppShell").classList.remove("hidden");

          await runHealthCheck();
        }
      });
    });

    function safe(value) {
      return UnganiAdminShared.safe(value);
    }

    function cleanText(value) {
      return UnganiAdminShared.cleanText(value);
    }

    function getField(row, names, fallback = "") {
      for (const name of names) {
        if (row && row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return fallback;
    }

    function getTenantName(row) {
      return getField(row, ["company_name", "business_name", "name"], "Client Business");
    }

    function getTenantNameById(tenantId) {
      const tenant = dataStore.tenants.find(row => String(row.id) === String(tenantId));
      return tenant ? getTenantName(tenant) : "Unknown Client";
    }

    function todayDate() {
      return new Date().toISOString().slice(0, 10);
    }

    function dateInDays(days) {
      const dateObj = new Date();
      dateObj.setDate(dateObj.getDate() + days);
      return dateObj.toISOString().slice(0, 10);
    }

    function formatDateTime(value) {
      if (!value) return "N/A";
      const dateObj = new Date(value);
      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function isExpiredDocument(row) {
      return row.expiry_date && String(row.expiry_date) < todayDate();
    }

    function isExpiringDocument(row) {
      return row.expiry_date &&
        String(row.expiry_date) >= todayDate() &&
        String(row.expiry_date) <= dateInDays(30);
    }

    function isOpenSupport(row) {
      const status = String(getField(row, ["status", "issue_status"], "open")).toLowerCase();
      return ["open", "new", "pending", "in_progress"].includes(status);
    }

    function isOpenTask(row) {
      const status = String(getField(row, ["status", "task_status"], "pending")).toLowerCase();
      return !["done", "completed", "closed", "cancelled"].includes(status);
    }

    async function safeSelect(tableName) {
      try {
        const { data, error } = await supabaseClient
          .from(tableName)
          .select("*")
          .limit(10000);

        if (error) {
          console.log(tableName, error.message);
          return {
            table: tableName,
            ok: false,
            rows: [],
            message: error.message
          };
        }

        return {
          table: tableName,
          ok: true,
          rows: data || [],
          message: "Table accessible"
        };
      } catch (error) {
        return {
          table: tableName,
          ok: false,
          rows: [],
          message: error.message
        };
      }
    }

    async function checkPageExists(pageUrl) {
      try {
        const response = await fetch(pageUrl, {
          method: "GET",
          cache: "no-store"
        });

        return {
          page: pageUrl,
          ok: response.ok,
          status: response.status,
          message: response.ok ? "Page accessible" : "Page returned " + response.status
        };
      } catch (error) {
        return {
          page: pageUrl,
          ok: false,
          status: "Error",
          message: error.message
        };
      }
    }

    async function runHealthCheck() {
      UnganiAdminShared.showToast("Running health check...");

      const tableResults = await Promise.all(requiredTables.map(tableName => safeSelect(tableName)));

      dataStore = {
        tenants: getRows(tableResults, "tenants"),
        registrations: getRows(tableResults, "registrations"),
        users: getRows(tableResults, "users"),
        documents: getRows(tableResults, "documents"),
        support: getRows(tableResults, "support_issues"),
        adminMessages: getRows(tableResults, "admin_client_messages").filter(row => row.is_internal !== true),
        teamMessages: getRows(tableResults, "team_chat_messages"),
        events: getRows(tableResults, "business_events"),
        transactions: getRows(tableResults, "transactions"),
        tasks: getRows(tableResults, "tasks"),
        records: getRows(tableResults, "business_records"),
        items: getRows(tableResults, "business_items"),
        people: getRows(tableResults, "client_people"),
        notices: getRows(tableResults, "client_notices"),
        payments: getRows(tableResults, "payments"),
        upgrades: getRows(tableResults, "upgrade_requests")
      };

      pageChecks = await Promise.all(importantPages.map(page => checkPageExists(page)));

      renderMetrics();
      renderHealthScore(tableResults);
      renderDatabaseChecks(tableResults);
      renderPageChecks();
      renderAttentionItems();
      renderLatestActivity();

      UnganiAdminShared.showToast("Health check completed ✓");
    }

    function getRows(results, tableName) {
      const result = results.find(item => item.table === tableName);
      return result?.rows || [];
    }

    function renderMetrics() {
      const pendingRegistrations = dataStore.registrations.filter(row => {
        const status = String(row.status || "pending").toLowerCase();
        return status === "pending" || status === "new";
      });

      const activeClients = dataStore.tenants.filter(row => {
        const status = String(row.account_status || row.status || "active").toLowerCase();
        return status === "active" || status === "trial";
      });

      const openSupport = dataStore.support.filter(isOpenSupport);
      const openTasks = dataStore.tasks.filter(isOpenTask);
      const expiringDocs = dataStore.documents.filter(isExpiringDocument);
      const expiredDocs = dataStore.documents.filter(isExpiredDocument);
      const unreadMessages = dataStore.adminMessages.filter(row => {
        return String(row.sender_role || "").toLowerCase() === "client" && !row.read_by_admin_at;
      });

      const metrics = [
        { title: "Active / Trial Clients", value: activeClients.length, note: "Clients currently allowed to use the system", cls: "green" },
        { title: "Pending Registrations", value: pendingRegistrations.length, note: "Registrations waiting for admin review", cls: pendingRegistrations.length > 0 ? "orange" : "green" },
        { title: "Open Support", value: openSupport.length, note: "Support issues still open", cls: openSupport.length > 0 ? "orange" : "green" },
        { title: "Unread Messages", value: unreadMessages.length, note: "Client messages not marked read", cls: unreadMessages.length > 0 ? "red" : "green" },
        { title: "Open Tasks", value: openTasks.length, note: "Client tasks still open", cls: openTasks.length > 0 ? "orange" : "green" },
        { title: "Documents", value: dataStore.documents.length, note: "Document and Google Drive records", cls: "blue" },
        { title: "Expiring Documents", value: expiringDocs.length, note: "Documents expiring within 30 days", cls: expiringDocs.length > 0 ? "orange" : "green" },
        { title: "Expired Documents", value: expiredDocs.length, note: "Documents past expiry date", cls: expiredDocs.length > 0 ? "red" : "green" }
      ];

      document.getElementById("metricsGrid").innerHTML = metrics.map(item => `
        <div class="metric-card ${safe(item.cls)}">
          <h3>${safe(item.title)}</h3>
          <p>${safe(item.value)}</p>
          <div class="note">${safe(item.note)}</div>
        </div>
      `).join("");
    }

    function renderHealthScore(tableResults) {
      const failedTables = tableResults.filter(item => !item.ok).length;
      const failedPages = pageChecks.filter(item => !item.ok).length;

      const pendingRegistrations = dataStore.registrations.filter(row => {
        const status = String(row.status || "pending").toLowerCase();
        return status === "pending" || status === "new";
      }).length;

      const openSupport = dataStore.support.filter(isOpenSupport).length;
      const openTasks = dataStore.tasks.filter(isOpenTask).length;
      const expiringDocs = dataStore.documents.filter(isExpiringDocument).length;
      const expiredDocs = dataStore.documents.filter(isExpiredDocument).length;
      const unreadMessages = dataStore.adminMessages.filter(row => {
        return String(row.sender_role || "").toLowerCase() === "client" && !row.read_by_admin_at;
      }).length;

      let score = 100;

      score -= Math.min(failedTables * 10, 35);
      score -= Math.min(failedPages * 5, 20);
      score -= Math.min(pendingRegistrations * 2, 10);
      score -= Math.min(openSupport * 4, 20);
      score -= Math.min(openTasks * 1, 8);
      score -= Math.min(expiringDocs * 2, 10);
      score -= Math.min(expiredDocs * 6, 20);
      score -= Math.min(unreadMessages * 3, 15);

      score = Math.max(0, score);

      let status = "Healthy";
      let message = "UNGANI OS is looking stable. Continue monitoring client activity.";
      let badgeClass = "green";

      if (score < 80) {
        status = "Needs Attention";
        message = "Some items need admin follow-up. Review the attention list below.";
        badgeClass = "orange";
      }

      if (score < 60) {
        status = "Urgent Review";
        message = "Several important system or client items need urgent review.";
        badgeClass = "red";
      }

      document.getElementById("healthScoreBox").innerHTML = `
        <div class="health-score">
          <h2>UNGANI OS Health Score</h2>
          <div class="score-number">${safe(score)}/100</div>
          <p>${safe(message)}</p>
          <span class="badge ${safe(badgeClass)}">${safe(status)}</span>
          <span class="badge gold">Last Check: ${safe(formatDateTime(new Date().toISOString()))}</span>
        </div>
      `;
    }

    function renderDatabaseChecks(tableResults) {
      document.getElementById("databaseChecksBox").innerHTML = tableResults.map(item => {
        const statusClass = item.ok ? "good" : "bad";
        const badgeClass = item.ok ? "green" : "red";
        const rowCount = item.rows?.length || 0;

        return `
          <div class="check-card ${safe(statusClass)}">
            <div class="check-title">${safe(item.table)}</div>
            <p class="check-detail">${safe(item.message)}</p>
            <p class="check-detail"><strong>Rows Loaded:</strong> ${safe(rowCount)}</p>
            <span class="badge ${safe(badgeClass)}">${safe(item.ok ? "OK" : "Issue")}</span>
          </div>
        `;
      }).join("");
    }

    function renderPageChecks() {
      document.getElementById("pageChecksBox").innerHTML = pageChecks.map(item => {
        const statusClass = item.ok ? "good" : "bad";
        const badgeClass = item.ok ? "green" : "red";

        return `
          <div class="check-card ${safe(statusClass)}">
            <div class="check-title">${safe(item.page)}</div>
            <p class="check-detail">${safe(item.message)}</p>
            <p class="check-detail"><strong>Status:</strong> ${safe(item.status)}</p>
            <span class="badge ${safe(badgeClass)}">${safe(item.ok ? "OK" : "Issue")}</span>
          </div>
        `;
      }).join("");
    }

    function renderAttentionItems() {
      const attention = [];

      dataStore.registrations
        .filter(row => ["pending", "new"].includes(String(row.status || "pending").toLowerCase()))
        .forEach(row => {
          attention.push({
            title: "Pending Registration",
            detail: getField(row, ["business_name", "company_name", "name", "email"], "Client registration waiting for review"),
            link: "admin.html",
            level: "orange"
          });
        });

      dataStore.support
        .filter(isOpenSupport)
        .forEach(row => {
          attention.push({
            title: "Open Support Issue",
            detail: `${getField(row, ["issue_title", "subject", "title"], "Support Issue")} — ${getTenantNameById(row.tenant_id)}`,
            link: "support.html",
            level: "orange"
          });
        });

      dataStore.adminMessages
        .filter(row => String(row.sender_role || "").toLowerCase() === "client" && !row.read_by_admin_at)
        .forEach(row => {
          attention.push({
            title: "Unread Client Message",
            detail: `${row.message_body || "Client message"} — ${getTenantNameById(row.tenant_id)}`,
            link: "admin-chat.html",
            level: "red"
          });
        });

      dataStore.documents
        .filter(isExpiringDocument)
        .forEach(row => {
          attention.push({
            title: "Document Expiring Soon",
            detail: `${getField(row, ["document_title", "file_name", "title"], "Document")} — ${getTenantNameById(row.tenant_id)}`,
            link: "admin-documents.html",
            level: "orange"
          });
        });

      dataStore.documents
        .filter(isExpiredDocument)
        .forEach(row => {
          attention.push({
            title: "Expired Document",
            detail: `${getField(row, ["document_title", "file_name", "title"], "Document")} — ${getTenantNameById(row.tenant_id)}`,
            link: "admin-documents.html",
            level: "red"
          });
        });

      pageChecks
        .filter(row => !row.ok)
        .forEach(row => {
          attention.push({
            title: "Page Check Issue",
            detail: `${row.page} — ${row.message}`,
            link: row.page,
            level: "red"
          });
        });

      if (attention.length === 0) {
        document.getElementById("attentionBox").innerHTML = `
          <div class="empty">
            <h3>All Clear</h3>
            <p>No urgent attention items found right now.</p>
          </div>
        `;
        return;
      }

      document.getElementById("attentionBox").innerHTML = attention.slice(0, 20).map(item => `
        <div class="check-card ${item.level === "red" ? "bad" : "warning"}">
          <div class="check-title">${safe(item.title)}</div>
          <p class="check-detail">${safe(item.detail)}</p>
          <span class="badge ${safe(item.level)}">Needs Attention</span>
          <div class="button-row">
            <a class="btn ${item.level === "red" ? "red" : "orange"}" href="${safe(item.link)}">Open</a>
          </div>
        </div>
      `).join("");
    }

    function renderLatestActivity() {
      const activity = [];

      dataStore.registrations.forEach(row => {
        activity.push({
          title: "Registration",
          detail: getField(row, ["business_name", "company_name", "name", "email"], "Client registration"),
          date: row.created_at,
          badge: cleanText(row.status || "pending"),
          link: "admin.html"
        });
      });

      dataStore.documents.forEach(row => {
        activity.push({
          title: "Document",
          detail: `${getField(row, ["document_title", "file_name", "title"], "Document")} — ${getTenantNameById(row.tenant_id)}`,
          date: row.created_at,
          badge: row.google_drive_url ? "Google Drive" : "Document",
          link: "admin-documents.html"
        });
      });

      dataStore.support.forEach(row => {
        activity.push({
          title: "Support",
          detail: `${getField(row, ["issue_title", "subject", "title"], "Support Issue")} — ${getTenantNameById(row.tenant_id)}`,
          date: row.created_at,
          badge: cleanText(getField(row, ["status", "issue_status"], "open")),
          link: "support.html"
        });
      });

      dataStore.adminMessages.forEach(row => {
        activity.push({
          title: "Admin Chat",
          detail: `${row.message_body || "Message"} — ${getTenantNameById(row.tenant_id)}`,
          date: row.created_at,
          badge: cleanText(row.sender_role || "message"),
          link: "admin-chat.html"
        });
      });

      dataStore.tasks.forEach(row => {
        activity.push({
          title: "Task",
          detail: `${getField(row, ["task_title", "title", "name"], "Task")} — ${getTenantNameById(row.tenant_id)}`,
          date: row.created_at,
          badge: cleanText(getField(row, ["status", "task_status"], "pending")),
          link: "admin-tasks.html"
        });
      });

      activity.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));

      const rows = activity.slice(0, 12);

      if (rows.length === 0) {
        document.getElementById("activityBox").innerHTML = `
          <div class="empty">
            <h3>No activity found</h3>
            <p>System activity will appear here after clients begin using UNGANI OS.</p>
          </div>
        `;
        return;
      }

      document.getElementById("activityBox").innerHTML = rows.map(row => `
        <div class="check-card info">
          <div class="check-title">${safe(row.title)}</div>
          <p class="check-detail">${safe(row.detail)}</p>
          <p class="check-detail">${safe(formatDateTime(row.date))}</p>
          <span class="badge blue">${safe(row.badge)}</span>
          <div class="button-row">
            <a class="btn blue" href="${safe(row.link)}">Open</a>
          </div>
        </div>
      `).join("");
    }
  </script>
</body>
</html>
