<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Activity Feed</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-shared.js" onerror="window.__unganiClientSharedFailed = true;"></script>
  <script>
    (function () {
      function showUnganiLoadError() {
        if (typeof UnganiClientShared !== "undefined") return;

        var banner = document.createElement("div");
        banner.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99999;background:#B91C1C;color:#fff;padding:12px 16px;font:14px/1.4 -apple-system,sans-serif;text-align:center;";
        banner.innerHTML = "Some page resources failed to load. Please check your connection. " +
          "<button style=\"margin-left:10px;padding:4px 12px;border:none;border-radius:6px;background:#fff;color:#B91C1C;font-weight:700;cursor:pointer;\" onclick=\"window.location.reload()\">Reload</button>";

        if (document.body) {
          document.body.prepend(banner);
        } else {
          document.addEventListener("DOMContentLoaded", function () {
            document.body.prepend(banner);
          });
        }
      }

      if (window.__unganiClientSharedFailed) {
        showUnganiLoadError();
      } else {
        setTimeout(function () {
          if (typeof UnganiClientShared === "undefined") showUnganiLoadError();
        }, 4000);
      }
    })();
  </script>
  <script src="nia-assistant.js"></script>
</head>

<body>
  <script>
    let currentContext = null;
    let isRealEstate = false;

    let activityData = {
      transactions: [],
      items: [],
      people: [],
      records: [],
      tasks: [],
      documents: [],
      events: [],
      support: [],
      unganiChat: [],
      teamChat: []
    };

    let allActivities = [];

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "activity",
        pageTitle: "Activity Feed",
        pageSubtitle: "Track recent business activity across money, records, tasks, documents, calendar, support, and messages.",
        onReady: startActivityPage
      });
    });

    async function startActivityPage(context) {
      currentContext = context;

      const businessType = String(UnganiClientShared.getValue(context.tenant, ["business_type", "business_type_key"], "")).toLowerCase();
      const businessTypeKey = String(UnganiClientShared.getValue(context.tenant, ["business_type_key"], "")).toLowerCase();

      isRealEstate = businessType.includes("real estate") || businessTypeKey.includes("real_estate");

      const titleEl = document.querySelector(".ungani-topbar h2");
      const subEl = document.querySelector(".ungani-topbar p");

      if (titleEl) {
        titleEl.innerText = isRealEstate ? "Property Activity Feed" : "Business Activity Feed";
      }

      if (subEl) {
        subEl.innerText = isRealEstate
          ? "See recent property activity across listings, leads, viewings, tasks, money records, documents, calendar, support, and messages."
          : "See recent activity across your business records, tasks, money records, documents, calendar, support, and messages.";
      }

      await loadActivityData();
    }

    async function loadActivityData() {
      currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading activity feed...");

      const responses = await Promise.all([
        safeSelect("transactions"),
        safeSelect("business_items"),
        safeSelect("client_people"),
        safeSelect("business_records"),
        safeSelect("tasks"),
        safeSelect("documents"),
        safeSelect("business_events"),
        safeSelect("support_issues"),
        safeSelect("admin_client_messages"),
        safeSelect("team_chat_messages")
      ]);

      activityData.transactions = responses[0];
      activityData.items = responses[1];
      activityData.people = responses[2];
      activityData.records = responses[3];
      activityData.tasks = responses[4];
      activityData.documents = responses[5];
      activityData.events = responses[6];
      activityData.support = responses[7];
      activityData.unganiChat = responses[8];
      activityData.teamChat = responses[9];

      allActivities = buildActivities();

      renderActivityPage();
    }

    async function safeSelect(tableName) {
      try {
        const response = await currentContext.supabaseClient
          .from(tableName)
          .select("*")
          .eq("tenant_id", currentContext.tenantId)
          .order("created_at", { ascending: false });

        if (response.error) {
          console.warn(tableName, response.error.message);
          return [];
        }

        return response.data || [];
      } catch (error) {
        console.warn(tableName, error.message);
        return [];
      }
    }

    function buildActivities() {
      const items = [];

      activityData.transactions.forEach(function (row) {
        const amount = Number(UnganiClientShared.getValue(row, ["amount"], 0) || 0);
        const type = UnganiClientShared.getValue(row, ["transaction_type", "type"], "money");
        const category = UnganiClientShared.getValue(row, ["category_name", "category", "category_key"], "Money Record");
        const status = UnganiClientShared.getValue(row, ["status"], "completed");
        const property = UnganiClientShared.getValue(row, ["property_name"], "");
        const date = UnganiClientShared.getValue(row, ["transaction_date", "created_at"], "");

        items.push({
          source: "money",
          label: "Money",
          title: category,
          detail: toTitle(type) + " · " + UnganiClientShared.formatKES(amount) + (property ? " · " + property : ""),
          status: status,
          date: date,
          color: typeColor(type),
          href: "my-money.html"
        });
      });

      activityData.items.forEach(function (row) {
        const title = UnganiClientShared.getValue(row, ["property_name", "item_name", "name", "title"], isRealEstate ? "Property" : "Item");
        const status = UnganiClientShared.getValue(row, ["property_status", "item_status", "status"], "active");
        const price = Number(UnganiClientShared.getValue(row, ["property_price", "selling_price", "cost_price"], 0) || 0);
        const project = UnganiClientShared.getValue(row, ["project_name"], "");
        const date = UnganiClientShared.getValue(row, ["date_listed", "created_at"], "");

        items.push({
          source: "items",
          label: isRealEstate ? "Property / Listing" : "Item / Asset",
          title: title,
          detail: status + (project ? " · " + project : "") + (price > 0 ? " · " + UnganiClientShared.formatKES(price) : ""),
          status: status,
          date: date,
          color: statusColor(status),
          href: "my-items.html"
        });
      });

      activityData.people.forEach(function (row) {
        const title = UnganiClientShared.getValue(row, ["full_name"], "Business Contact");
        const type = UnganiClientShared.getValue(row, ["person_type"], "contact");
        const status = UnganiClientShared.getValue(row, ["relationship_status", "status"], "active");
        const property = UnganiClientShared.getValue(row, ["property_of_interest", "properties_assigned"], "");
        const date = UnganiClientShared.getValue(row, ["last_follow_up_date", "created_at"], "");

        items.push({
          source: "people",
          label: "People",
          title: title,
          detail: toTitle(type) + " · " + status + (property ? " · " + property : ""),
          status: status,
          date: date,
          color: statusColor(status),
          href: "my-people.html"
        });
      });

      activityData.records.forEach(function (row) {
        const title = UnganiClientShared.getValue(row, ["record_title", "title", "name"], "Business Record");
        const type = UnganiClientShared.getValue(row, ["record_type"], "record");
        const status = UnganiClientShared.getValue(row, ["status"], "open");
        const property = UnganiClientShared.getValue(row, ["property_name", "project_name"], "");
        const date = UnganiClientShared.getValue(row, ["record_date", "viewing_date", "created_at"], "");

        items.push({
          source: "records",
          label: isRealEstate ? "Record / Viewing" : "Business Record",
          title: title,
          detail: toTitle(type) + " · " + status + (property ? " · " + property : ""),
          status: status,
          date: date,
          color: statusColor(status),
          href: "my-records.html"
        });
      });

      activityData.tasks.forEach(function (row) {
        const title = UnganiClientShared.getValue(row, ["task_title", "title", "name"], "Task");
        const type = UnganiClientShared.getValue(row, ["task_type"], "task");
        const priority = UnganiClientShared.getValue(row, ["priority"], "normal");
        const status = UnganiClientShared.getValue(row, ["status"], "pending");
        const due = UnganiClientShared.getValue(row, ["due_date"], "");
        const property = UnganiClientShared.getValue(row, ["property_name", "project_name"], "");

        items.push({
          source: "tasks",
          label: "Task / Follow-up",
          title: title,
          detail: toTitle(type) + " · " + status + " · " + priority + (property ? " · " + property : ""),
          status: status,
          date: due || UnganiClientShared.getValue(row, ["created_at"], ""),
          color: priorityColor(priority, status),
          href: "my-tasks.html"
        });
      });

      activityData.documents.forEach(function (row) {
        const title = UnganiClientShared.getValue(row, ["document_title", "title", "file_name"], "Document");
        const type = UnganiClientShared.getValue(row, ["document_type"], "document");
        const status = UnganiClientShared.getValue(row, ["status"], "active");
        const property = UnganiClientShared.getValue(row, ["property_name", "project_name"], "");
        const date = UnganiClientShared.getValue(row, ["created_at", "updated_at"], "");

        items.push({
          source: "documents",
          label: "Document",
          title: title,
          detail: toTitle(type) + " · " + status + (property ? " · " + property : ""),
          status: status,
          date: date,
          color: statusColor(status),
          href: "my-documents.html"
        });
      });

      activityData.events.forEach(function (row) {
        const title = UnganiClientShared.getValue(row, ["event_title", "title"], "Calendar Event");
        const type = UnganiClientShared.getValue(row, ["event_type"], "event");
        const status = UnganiClientShared.getValue(row, ["status"], "scheduled");
        const date = UnganiClientShared.getValue(row, ["event_date", "created_at"], "");
        const property = UnganiClientShared.getValue(row, ["property_name", "project_name"], "");

        items.push({
          source: "calendar",
          label: "Calendar",
          title: title,
          detail: toTitle(type) + " · " + status + (property ? " · " + property : ""),
          status: status,
          date: date,
          color: statusColor(status),
          href: "my-calendar.html"
        });
      });

      activityData.support.forEach(function (row) {
        const title = UnganiClientShared.getValue(row, ["issue_title", "subject"], "Support Issue");
        const type = UnganiClientShared.getValue(row, ["issue_type"], "support");
        const priority = UnganiClientShared.getValue(row, ["priority"], "normal");
        const status = UnganiClientShared.getValue(row, ["status"], "open");
        const date = UnganiClientShared.getValue(row, ["created_at", "updated_at"], "");

        items.push({
          source: "support",
          label: "Support",
          title: title,
          detail: toTitle(type) + " · " + status + " · " + priority,
          status: status,
          date: date,
          color: priorityColor(priority, status),
          href: "my-support.html"
        });
      });

      activityData.unganiChat.forEach(function (row) {
        const role = UnganiClientShared.getValue(row, ["sender_role"], "client");
        const body = UnganiClientShared.getValue(row, ["message_body", "message", "body"], "Chat message");
        const type = UnganiClientShared.getValue(row, ["message_type"], "message");
        const date = UnganiClientShared.getValue(row, ["created_at"], "");

        items.push({
          source: "chat",
          label: "Chat with UNGANI",
          title: role === "client" ? "Message sent to UNGANI" : "Reply from UNGANI",
          detail: toTitle(type) + " · " + shortText(body, 90),
          status: role === "client" ? "sent" : "reply",
          date: date,
          color: role === "client" ? "blue" : "gold",
          href: "my-chat.html"
        });
      });

      activityData.teamChat.forEach(function (row) {
        const sender = UnganiClientShared.getValue(row, ["sender_name"], "Team Member");
        const body = UnganiClientShared.getValue(row, ["message_body", "message", "body"], "Team message");
        const type = UnganiClientShared.getValue(row, ["message_type"], "message");
        const date = UnganiClientShared.getValue(row, ["created_at"], "");

        items.push({
          source: "team_chat",
          label: "Team Chat",
          title: sender,
          detail: toTitle(type) + " · " + shortText(body, 90),
          status: "team message",
          date: date,
          color: "gold",
          href: "my-team-chat.html"
        });
      });

      items.sort(function (a, b) {
        return new Date(b.date || 0) - new Date(a.date || 0);
      });

      return items;
    }

    function renderActivityPage() {
      const filtered = filterActivities();
      const summary = calculateSummary();

      UnganiClientShared.setContent(`
        <section class="ungani-card ungani-hero">
          <h2>${isRealEstate ? "Property Activity Feed" : "Business Activity Feed"}</h2>
          <p>
            ${isRealEstate
              ? "A single feed for properties, leads, viewings, tasks, money records, documents, calendar events, support, and messages."
              : "A single feed for business records, tasks, money records, documents, calendar events, support, and messages."
            }
          </p>

          <div class="ungani-button-row">
            <button class="ungani-btn" onclick="loadActivityData()">Refresh Activity</button>
            <a class="ungani-btn green" href="my-overview.html">Overview</a>
            <a class="ungani-btn dark" href="reports.html">Reports</a>
          </div>
        </section>

        <section class="ungani-grid">
          ${UnganiClientShared.metricCard("Total Activity", allActivities.length, "All recent activity records", "blue")}
          ${UnganiClientShared.metricCard("Today", summary.today, "Activity dated today", summary.today > 0 ? "orange" : "green")}
          ${UnganiClientShared.metricCard("Last 7 Days", summary.last7Days, "Recent business movement", "gold")}
          ${UnganiClientShared.metricCard("Pending / Open", summary.openPending, "Needs attention", summary.openPending > 0 ? "orange" : "green")}
          ${UnganiClientShared.metricCard("Money Activity", summary.money, "Income, expenses, petty cash", "green")}
          ${UnganiClientShared.metricCard("Messages", summary.messages, "Chat and team messages", "blue")}
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <h3>Filters</h3>
            <button class="ungani-btn dark" onclick="resetFilters()">Reset Filters</button>
          </div>

          <div class="ungani-form-grid">
            <div>
              <label for="filterSource">Activity Type</label>
              <select id="filterSource" onchange="saveFilters(); renderActivityPage();">
                <option value="">All Activity</option>
                <option value="money">Money</option>
                <option value="items">${isRealEstate ? "Properties / Listings" : "Items / Assets"}</option>
                <option value="people">People</option>
                <option value="records">Records</option>
                <option value="tasks">Tasks</option>
                <option value="documents">Documents</option>
                <option value="calendar">Calendar</option>
                <option value="support">Support</option>
                <option value="chat">Chat with UNGANI</option>
                <option value="team_chat">Team Chat</option>
              </select>
            </div>

            <div>
              <label for="filterFocus">Focus</label>
              <select id="filterFocus" onchange="saveFilters(); renderActivityPage();">
                <option value="">All Focus</option>
                <option value="open">Open / Pending</option>
                <option value="completed">Completed / Closed</option>
                <option value="money">Money-related</option>
                <option value="message">Messages</option>
              </select>
            </div>

            <div>
              <label for="filterFrom">From Date</label>
              <input id="filterFrom" type="date" onchange="saveFilters(); renderActivityPage();" />
            </div>

            <div>
              <label for="filterTo">To Date</label>
              <input id="filterTo" type="date" onchange="saveFilters(); renderActivityPage();" />
            </div>

            <div>
              <label for="searchBox">Search Activity</label>
              <input id="searchBox" placeholder="Search property, task, lead, document, message..." oninput="saveFilters(); renderActivityPage();" />
            </div>
          </div>
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <div>
                <h3>Activity Feed</h3>
                <p class="ungani-small">${filtered.length} activity item(s) shown</p>
              </div>

              <button class="ungani-btn green" onclick="loadActivityData()">Refresh</button>
            </div>

            ${renderActivityList(filtered)}
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Activity Summary</h3>
            </div>

            ${renderActivitySummary()}
          </div>
        </section>

        <p class="ungani-small">
          Activity Version: Step 307F Shared Layout · ungani.com · info@ungani.com
        </p>
      `);

      restoreFilters();
    }

    function renderActivityList(rows) {
      if (rows.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No activity found</h3>
            <p>Activity will appear here once records are added or when filters are changed.</p>
          </div>
        `;
      }

      return rows.map(function (item) {
        return `
          <div class="ungani-card" style="box-shadow:none;margin-bottom:12px;">
            <div class="ungani-section-title">
              <div>
                <span class="ungani-badge ${UnganiClientShared.attr(item.color || "blue")}">${UnganiClientShared.safe(item.label)}</span>
                <h3 style="font-size:17px;margin:10px 0 5px;">${UnganiClientShared.safe(item.title)}</h3>
                <p class="ungani-small">${UnganiClientShared.safe(item.detail)}</p>
              </div>

              <div>
                <span class="ungani-badge gold">${UnganiClientShared.safe(UnganiClientShared.formatDate(item.date))}</span>
              </div>
            </div>

            <div class="ungani-button-row">
              <a class="ungani-btn" href="${UnganiClientShared.attr(item.href)}">Open Section</a>
              ${item.status ? `<span class="ungani-badge ${UnganiClientShared.attr(statusColor(item.status))}">${UnganiClientShared.safe(item.status)}</span>` : ""}
            </div>
          </div>
        `;
      }).join("");
    }

    function renderActivitySummary() {
      const counts = {};

      allActivities.forEach(function (item) {
        counts[item.source] = (counts[item.source] || 0) + 1;
      });

      const labels = [
        ["money", "Money"],
        ["items", isRealEstate ? "Properties / Listings" : "Items / Assets"],
        ["people", "People"],
        ["records", "Records"],
        ["tasks", "Tasks"],
        ["documents", "Documents"],
        ["calendar", "Calendar"],
        ["support", "Support"],
        ["chat", "Chat with UNGANI"],
        ["team_chat", "Team Chat"]
      ];

      return labels.map(function (row) {
        return `
          <div class="ungani-card" style="box-shadow:none;margin-bottom:10px;">
            <p class="ungani-small" style="margin:0 0 5px;">${UnganiClientShared.safe(row[1])}</p>
            <strong>${counts[row[0]] || 0}</strong>
          </div>
        `;
      }).join("");
    }

    function calculateSummary() {
      const todayText = new Date().toISOString().slice(0, 10);
      const sevenDaysAgo = new Date();
      sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
      const sevenText = sevenDaysAgo.toISOString().slice(0, 10);

      let today = 0;
      let last7Days = 0;
      let openPending = 0;
      let money = 0;
      let messages = 0;

      allActivities.forEach(function (item) {
        const dateText = String(item.date || "").slice(0, 10);
        const status = String(item.status || "").toLowerCase();

        if (dateText === todayText) today++;
        if (dateText >= sevenText) last7Days++;

        if (
          status.includes("open") ||
          status.includes("pending") ||
          status.includes("progress") ||
          status.includes("scheduled") ||
          status.includes("review")
        ) {
          openPending++;
        }

        if (item.source === "money") money++;
        if (item.source === "chat" || item.source === "team_chat") messages++;
      });

      return { today, last7Days, openPending, money, messages };
    }

    function filterActivities() {
      const source = document.getElementById("filterSource") ? UnganiClientShared.value("filterSource").toLowerCase() : "";
      const focus = document.getElementById("filterFocus") ? UnganiClientShared.value("filterFocus").toLowerCase() : "";
      const from = document.getElementById("filterFrom") ? UnganiClientShared.value("filterFrom") : "";
      const to = document.getElementById("filterTo") ? UnganiClientShared.value("filterTo") : "";
      const query = document.getElementById("searchBox") ? UnganiClientShared.value("searchBox").toLowerCase() : "";

      return allActivities.filter(function (item) {
        const date = String(item.date || "").slice(0, 10);
        const status = String(item.status || "").toLowerCase();

        const haystack = [
          item.source,
          item.label,
          item.title,
          item.detail,
          item.status,
          item.date
        ].join(" ").toLowerCase();

        if (source && item.source !== source) return false;
        if (from && date && date < from) return false;
        if (to && date && date > to) return false;
        if (query && !haystack.includes(query)) return false;

        if (focus === "open") {
          if (
            !status.includes("open") &&
            !status.includes("pending") &&
            !status.includes("progress") &&
            !status.includes("scheduled") &&
            !status.includes("review")
          ) {
            return false;
          }
        }

        if (focus === "completed") {
          if (
            !status.includes("completed") &&
            !status.includes("closed") &&
            !status.includes("resolved") &&
            !status.includes("sold") &&
            !status.includes("rented")
          ) {
            return false;
          }
        }

        if (focus === "money" && item.source !== "money") return false;
        if (focus === "message" && item.source !== "chat" && item.source !== "team_chat") return false;

        return true;
      });
    }

    function restoreFilters() {
      if (document.getElementById("filterSource")) document.getElementById("filterSource").value = sessionStorage.getItem("ungani_activity_filter_source") || "";
      if (document.getElementById("filterFocus")) document.getElementById("filterFocus").value = sessionStorage.getItem("ungani_activity_filter_focus") || "";
      if (document.getElementById("filterFrom")) document.getElementById("filterFrom").value = sessionStorage.getItem("ungani_activity_filter_from") || "";
      if (document.getElementById("filterTo")) document.getElementById("filterTo").value = sessionStorage.getItem("ungani_activity_filter_to") || "";
      if (document.getElementById("searchBox")) document.getElementById("searchBox").value = sessionStorage.getItem("ungani_activity_search") || "";
    }

    function saveFilters() {
      if (document.getElementById("filterSource")) sessionStorage.setItem("ungani_activity_filter_source", UnganiClientShared.value("filterSource"));
      if (document.getElementById("filterFocus")) sessionStorage.setItem("ungani_activity_filter_focus", UnganiClientShared.value("filterFocus"));
      if (document.getElementById("filterFrom")) sessionStorage.setItem("ungani_activity_filter_from", UnganiClientShared.value("filterFrom"));
      if (document.getElementById("filterTo")) sessionStorage.setItem("ungani_activity_filter_to", UnganiClientShared.value("filterTo"));
      if (document.getElementById("searchBox")) sessionStorage.setItem("ungani_activity_search", UnganiClientShared.value("searchBox"));
    }

    function resetFilters() {
      sessionStorage.removeItem("ungani_activity_filter_source");
      sessionStorage.removeItem("ungani_activity_filter_focus");
      sessionStorage.removeItem("ungani_activity_filter_from");
      sessionStorage.removeItem("ungani_activity_filter_to");
      sessionStorage.removeItem("ungani_activity_search");
      renderActivityPage();
      UnganiClientShared.showToast("Activity filters reset ✓");
    }

    function toTitle(value) {
      return String(value || "")
        .replace(/_/g, " ")
        .replace(/\w\S*/g, function (text) {
          return text.charAt(0).toUpperCase() + text.substr(1).toLowerCase();
        });
    }

    function shortText(value, maxLength) {
      const text = String(value || "");

      if (text.length <= maxLength) {
        return text;
      }

      return text.slice(0, maxLength) + "...";
    }

    function typeColor(type) {
      const lower = String(type || "").toLowerCase();

      if (lower.includes("income") || lower.includes("sale") || lower.includes("rental")) return "green";
      if (lower.includes("expense") || lower.includes("petty")) return "orange";

      return "blue";
    }

    function statusColor(status) {
      const lower = String(status || "").toLowerCase();

      if (
        lower.includes("completed") ||
        lower.includes("closed") ||
        lower.includes("resolved") ||
        lower.includes("active") ||
        lower.includes("available") ||
        lower.includes("sold") ||
        lower.includes("rented")
      ) {
        return "green";
      }

      if (
        lower.includes("pending") ||
        lower.includes("open") ||
        lower.includes("progress") ||
        lower.includes("scheduled") ||
        lower.includes("review") ||
        lower.includes("reserved") ||
        lower.includes("negotiation")
      ) {
        return "orange";
      }

      if (
        lower.includes("urgent") ||
        lower.includes("high") ||
        lower.includes("cancelled") ||
        lower.includes("lost") ||
        lower.includes("overdue")
      ) {
        return "red";
      }

      return "blue";
    }

    function priorityColor(priority, status) {
      const lowerPriority = String(priority || "").toLowerCase();

      if (lowerPriority === "urgent" || lowerPriority === "high") return "red";
      return statusColor(status);
    }
  </script>
</body>
