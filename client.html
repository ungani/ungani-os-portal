
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Client Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-shared.js"></script>
  <script src="ungani-analytics.js"></script>
</head>

<body>
  <script>
    let currentContext = null;
    let businessProfile = null;

    let dashboardData = {
      transactions: [],
      items: [],
      people: [],
      records: [],
      tasks: [],
      documents: [],
      events: [],
      support: []
    };

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "dashboard",
        pageTitle: "Dashboard",
        pageSubtitle: "Premium business operations overview.",
        onReady: startDashboard
      });
    });

    async function startDashboard(context) {
      currentContext = context;
      businessProfile = UnganiAnalytics.getBusinessProfile(context.tenant);
      UnganiAnalytics.injectChartStyles();

      const titleEl = document.querySelector(".ungani-topbar h2");
      const subEl = document.querySelector(".ungani-topbar p");

      if (titleEl) titleEl.innerText = businessProfile.pageTitle;
      if (subEl) subEl.innerText = businessProfile.hero;

      await loadDashboardData();
    }

    async function loadDashboardData() {
      currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading premium dashboard...");

      const responses = await Promise.all([
        safeSelect("transactions"),
        safeSelect("business_items"),
        safeSelect("client_people"),
        safeSelect("business_records"),
        safeSelect("tasks"),
        safeSelect("documents"),
        safeSelect("business_events"),
        safeSelect("support_issues")
      ]);

      dashboardData.transactions = responses[0];
      dashboardData.items = responses[1];
      dashboardData.people = responses[2];
      dashboardData.records = responses[3];
      dashboardData.tasks = responses[4];
      dashboardData.documents = responses[5];
      dashboardData.events = responses[6];
      dashboardData.support = responses[7];

      renderDashboard();
    }

    async function safeSelect(tableName) {
      try {
        const response = await currentContext.supabaseClient
          .from(tableName)
          .select("*")
          .eq("tenant_id", currentContext.tenantId)
          .order("created_at", { ascending: false });

        if (response.error) {
          console.warn(tableName, response.error.message);
          return [];
        }

        return response.data || [];
      } catch (error) {
        console.warn(tableName, error.message);
        return [];
      }
    }

    function renderDashboard() {
      const tenantName = UnganiClientShared.getTenantName(currentContext.tenant);

      const money = UnganiAnalytics.calculateMoney(dashboardData.transactions);
      const trend = UnganiAnalytics.calculateIncomeExpenseTrend(dashboardData.transactions);
      const itemSummary = UnganiAnalytics.calculatePropertySummary(dashboardData.items);
      const peopleSummary = UnganiAnalytics.calculatePeopleRoleSummary(dashboardData.people, businessProfile);
      const tasks = UnganiAnalytics.calculateTaskSummary(dashboardData.tasks);
      const projects = UnganiAnalytics.calculateProjects(dashboardData.items);
      const topPerformer = UnganiAnalytics.calculateAgentPerformance(dashboardData.people, businessProfile)[0] || null;

      const itemStatus = UnganiAnalytics.calculateStatus(dashboardData.items, ["property_status", "item_status", "status"]);
      const taskStatus = UnganiAnalytics.mapToRows({
        Pending: tasks.pending,
        "In Progress": tasks.inProgress,
        Completed: tasks.completed,
        Overdue: tasks.overdue
      });
      const pipeline = UnganiAnalytics.calculateLeadPipeline(dashboardData.people, dashboardData.records, businessProfile);

      UnganiClientShared.setContent(`
        <style>
          .premium-hero {
            display: grid;
            grid-template-columns: minmax(0, 1.15fr) minmax(280px, 0.85fr);
            gap: 18px;
            align-items: stretch;
          }

          .premium-hero-main {
            min-height: 245px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
          }

          .premium-hero-title {
            font-size: clamp(32px, 4vw, 54px);
            line-height: 1.02;
            margin: 18px 0 12px;
            letter-spacing: -0.055em;
          }

          .premium-live-card {
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.09);
            border-radius: 24px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
          }

          .premium-live-card h3 {
            color: white;
            margin: 0 0 8px;
          }

          .premium-live-card p {
            color: rgba(255,255,255,0.74);
            margin: 0;
            line-height: 1.55;
          }

          .premium-mini-stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            margin-top: 18px;
          }

          .premium-mini-stat {
            border-radius: 18px;
            padding: 14px;
            background: rgba(255,255,255,0.10);
            border: 1px solid rgba(255,255,255,0.12);
          }

          .premium-mini-stat span {
            display: block;
            font-size: 11px;
            color: rgba(255,255,255,0.66);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
          }

          .premium-mini-stat strong {
            color: white;
            font-size: 23px;
            line-height: 1;
          }

          .premium-kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 18px;
          }

          .premium-kpi {
            display: block;
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            background: var(--ungani-card);
            border: 1px solid var(--ungani-border);
            box-shadow: var(--ungani-shadow);
            padding: 20px;
            min-height: 155px;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
          }

          .premium-kpi:hover {
            transform: translateY(-6px);
            box-shadow: var(--ungani-shadow-hover);
            border-color: rgba(212,166,58,0.42);
          }

          .premium-kpi::before {
            content: "";
            position: absolute;
            left: 0;
            top: 18px;
            bottom: 18px;
            width: 5px;
            border-radius: 0 999px 999px 0;
            background: var(--accent);
          }

          .premium-kpi-top {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
            margin-bottom: 18px;
          }

          .premium-kpi-label {
            color: var(--ungani-muted);
            font-size: 12px;
            font-weight: 950;
            text-transform: uppercase;
            letter-spacing: 0.055em;
          }

          .premium-kpi-icon {
            width: 42px;
            height: 42px;
            border-radius: 17px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            background: var(--accent);
            font-size: 19px;
          }

          .premium-kpi h3 {
            position: relative;
            z-index: 1;
            margin: 0 0 9px;
            font-size: clamp(27px, 3vw, 38px);
            letter-spacing: -0.055em;
            line-height: 1;
          }

          .premium-kpi p {
            position: relative;
            z-index: 1;
            margin: 0;
            color: var(--ungani-muted);
            font-size: 13px;
            line-height: 1.45;
          }

          .dashboard-chart-grid {
            display: grid;
            grid-template-columns: 1.25fr 0.75fr;
            gap: 18px;
            align-items: start;
            margin-bottom: 18px;
          }

          .dashboard-small-chart-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 18px;
            margin-bottom: 18px;
          }

          .item-preview-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
          }

          .item-preview-card {
            padding: 0;
            overflow: hidden;
          }

          .item-preview-photo {
            position: relative;
            min-height: 150px;
            background:
              radial-gradient(circle at top right, rgba(212,166,58,0.30), transparent 35%),
              linear-gradient(135deg, #061C3D, #082852);
            color: white;
            display: flex;
            align-items: flex-end;
            padding: 14px;
          }

          .item-preview-photo img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
          }

          .item-preview-photo::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 32%, rgba(6,28,61,0.78));
          }

          .item-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 58px;
            opacity: 0.82;
          }

          .item-preview-photo-content {
            position: relative;
            z-index: 2;
          }

          .item-preview-photo-content h3 {
            margin: 0 0 4px;
            font-size: 17px;
            color: white;
          }

          .item-preview-photo-content p {
            margin: 0;
            font-size: 12px;
            color: rgba(255,255,255,0.75);
          }

          .item-preview-body {
            padding: 14px;
          }

          .item-preview-price {
            margin: 0 0 8px;
            font-size: 19px;
            font-weight: 950;
            letter-spacing: -0.04em;
          }

          .action-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: flex-start;
            border-bottom: 1px solid var(--ungani-border);
            padding: 12px 0;
          }

          .action-row:last-child {
            border-bottom: 0;
          }

          @media (max-width: 1180px) {
            .premium-hero,
            .dashboard-chart-grid {
              grid-template-columns: 1fr;
            }

            .premium-kpi-grid,
            .dashboard-small-chart-grid,
            .item-preview-grid {
              grid-template-columns: repeat(2, minmax(0, 1fr));
            }
          }

          @media (max-width: 680px) {
            .premium-mini-stats,
            .premium-kpi-grid,
            .dashboard-small-chart-grid,
            .item-preview-grid {
              grid-template-columns: 1fr;
            }
          }
        </style>

        <section class="ungani-card ungani-hero">
          <div class="premium-hero">
            <div class="premium-hero-main">
              <div>
                <span class="ungani-badge gold">${UnganiClientShared.safe(businessProfile.badge)}</span>
                <h2 class="premium-hero-title">${UnganiClientShared.safe(tenantName)}</h2>
                <p>${UnganiClientShared.safe(businessProfile.hero)}</p>
              </div>

              <div class="ungani-button-row">
                <a class="ungani-btn gold" href="my-items.html">Open ${UnganiClientShared.safe(businessProfile.itemsTitle)}</a>
                <a class="ungani-btn green" href="my-charts.html">Open Analytics</a>
                <a class="ungani-btn light" href="reports.html">View Reports</a>
              </div>
            </div>

            <div class="premium-live-card">
              <div>
                <h3>Live Operations Pulse</h3>
                <p>
                  ${tasks.pending} pending task(s), ${tasks.overdue} overdue,
                  ${itemSummary.available} ${UnganiClientShared.safe(businessProfile.availableText)}, and
                  ${itemSummary.closed} ${UnganiClientShared.safe(businessProfile.closedText)}.
                </p>
              </div>

              <div class="premium-mini-stats">
                <div class="premium-mini-stat">
                  <span>Balance</span>
                  <strong>${UnganiClientShared.safe(UnganiAnalytics.compactMoney(money.balance))}</strong>
                </div>

                <div class="premium-mini-stat">
                  <span>${UnganiClientShared.safe(businessProfile.itemPlural)}</span>
                  <strong>${itemSummary.total}</strong>
                </div>

                <div class="premium-mini-stat">
                  <span>People</span>
                  <strong>${peopleSummary.total}</strong>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="premium-kpi-grid">
          ${kpiCard(businessProfile.itemsTitle, itemSummary.total, itemSummary.available + " " + businessProfile.availableText + " · " + itemSummary.closed + " " + businessProfile.closedText, "📦", "#2563EB", "my-items.html")}
          ${kpiCard("Money Balance", UnganiAnalytics.compactMoney(money.balance), "Income minus expenses", "💰", money.balance >= 0 ? "#16A34A" : "#DC2626", "my-money.html")}
          ${kpiCard(businessProfile.peopleTitle, peopleSummary.total, peopleSummary.primary + " " + peopleSummary.primaryLabel + " · " + peopleSummary.secondary + " " + peopleSummary.secondaryLabel, "👥", "#D4A63A", "my-people.html")}
          ${kpiCard("Tasks", tasks.pending, tasks.overdue + " overdue · " + tasks.completed + " done", "✅", tasks.overdue > 0 ? "#DC2626" : "#D4A63A", "my-tasks.html")}
        </section>

        <section class="dashboard-chart-grid">
          <div class="ungani-card ungani-chart-card">
            <div class="ungani-chart-head">
              <div>
                <h3>Income vs Expenses</h3>
                <p class="ungani-small">Animated monthly money movement from the same records used on Charts and Reports.</p>
              </div>
              <a class="ungani-btn green" href="my-money.html">Money</a>
            </div>

            ${trend.length ? '<div class="ungani-chart-canvas-wrap"><canvas id="dashboardMoneyTrend"></canvas></div>' : UnganiAnalytics.emptyChart("Add dated income and expense records to show this live chart.")}
          </div>

          <div class="ungani-card ungani-chart-card">
            <div class="ungani-chart-head">
              <div>
                <h3>${UnganiClientShared.safe(businessProfile.statusTitle)}</h3>
                <p class="ungani-small">Current status breakdown for this business.</p>
              </div>
              <a class="ungani-btn" href="my-items.html">Open</a>
            </div>

            ${hasValues(itemStatus) ? '<div class="ungani-chart-canvas-wrap small"><canvas id="dashboardItemStatus"></canvas></div>' : UnganiAnalytics.emptyChart("Add records with statuses to show this chart.")}
          </div>
        </section>

        <section class="dashboard-small-chart-grid">
          <div class="ungani-card ungani-chart-card">
            <div class="ungani-chart-head">
              <div>
                <h3>Task Status</h3>
                <p class="ungani-small">Pending, progress, completed, overdue.</p>
              </div>
            </div>
            ${hasValues(taskStatus) ? '<div class="ungani-chart-canvas-wrap small"><canvas id="dashboardTaskStatus"></canvas></div>' : UnganiAnalytics.emptyChart("Add tasks to show task status.")}
          </div>

          <div class="ungani-card ungani-chart-card">
            <div class="ungani-chart-head">
              <div>
                <h3>${UnganiClientShared.safe(businessProfile.pipelineTitle)}</h3>
                <p class="ungani-small">Pipeline stages by current status.</p>
              </div>
            </div>
            ${hasValues(pipeline) ? '<div class="ungani-chart-canvas-wrap small"><canvas id="dashboardPipeline"></canvas></div>' : UnganiAnalytics.emptyChart("Add people, leads, clients, or records to show pipeline.")}
          </div>

          <div class="ungani-card">
            <div class="ungani-chart-head">
              <div>
                <h3>${UnganiClientShared.safe(businessProfile.topPerformerTitle)}</h3>
                <p class="ungani-small">Based on deals, work, or commission where recorded.</p>
              </div>
              <a class="ungani-btn gold" href="my-people.html">People</a>
            </div>
            ${renderTopPerformer(topPerformer)}
          </div>
        </section>

        <section class="ungani-analytics-grid-2">
          <div class="ungani-card">
            <div class="ungani-chart-head">
              <div>
                <h3>${UnganiClientShared.safe(businessProfile.previewTitle)}</h3>
                <p class="ungani-small">Latest records with status and value.</p>
              </div>
              <a class="ungani-btn" href="my-items.html">Open Full View</a>
            </div>
            ${renderItemPreview()}
          </div>

          <div class="ungani-card">
            <div class="ungani-chart-head">
              <div>
                <h3>${UnganiClientShared.safe(businessProfile.progressTitle)}</h3>
                <p class="ungani-small">Progress remains consistent with the detailed page.</p>
              </div>
              <a class="ungani-btn" href="my-items.html">Open</a>
            </div>
            ${renderProjectProgress(projects)}
          </div>
        </section>

        <section class="ungani-analytics-grid-2">
          <div class="ungani-card">
            <div class="ungani-chart-head">
              <div>
                <h3>Action Needed</h3>
                <p class="ungani-small">Tasks and support items needing attention.</p>
              </div>
              <a class="ungani-btn green" href="my-activity.html">Activity</a>
            </div>
            ${renderActionNeeded()}
          </div>

          <div class="ungani-card">
            <div class="ungani-chart-head">
              <div>
                <h3>Recent Records</h3>
                <p class="ungani-small">Latest operational updates.</p>
              </div>
              <a class="ungani-btn" href="my-records.html">Records</a>
            </div>
            ${renderRecentRecords()}
          </div>
        </section>

        <p class="ungani-small">
          Client Dashboard Version: Step 309D Universal Business Dashboard · ungani.com · info@ungani.com
        </p>
      `);

      setTimeout(function () {
        renderDashboardCharts(trend, itemStatus, taskStatus, pipeline);
      }, 120);
    }

    async function renderDashboardCharts(trend, itemStatus, taskStatus, pipeline) {
      try {
        if (trend.length) await UnganiAnalytics.renderIncomeExpenseChart("dashboardMoneyTrend", trend);
        if (hasValues(itemStatus)) await UnganiAnalytics.renderDoughnutStatusChart("dashboardItemStatus", itemStatus);
        if (hasValues(taskStatus)) await UnganiAnalytics.renderDoughnutStatusChart("dashboardTaskStatus", taskStatus);
        if (hasValues(pipeline)) await UnganiAnalytics.renderHorizontalBarChart("dashboardPipeline", pipeline, "Records");
      } catch (error) {
        console.warn("Dashboard charts warning:", error.message);
      }
    }

    function kpiCard(title, value, subtitle, icon, accent, href) {
      return `
        <a class="premium-kpi" href="${UnganiClientShared.attr(href)}" style="--accent:${UnganiClientShared.attr(accent)};">
          <div class="premium-kpi-top">
            <span class="premium-kpi-label">${UnganiClientShared.safe(title)}</span>
            <span class="premium-kpi-icon">${UnganiClientShared.safe(icon)}</span>
          </div>
          <h3>${UnganiClientShared.safe(value)}</h3>
          <p>${UnganiClientShared.safe(subtitle)}</p>
        </a>
      `;
    }

    function renderTopPerformer(person) {
      if (!person) {
        return `
          <div class="ungani-empty">
            <h3>No performance data yet</h3>
            <p>Add people records with deals, work, or commission to show performance.</p>
          </div>
        `;
      }

      const name = UnganiAnalytics.safeGet(person, ["full_name", "name"], "Person");
      const deals = Number(UnganiAnalytics.safeGet(person, ["deals_closed"], 0) || 0);
      const commission = Number(UnganiAnalytics.safeGet(person, ["commission_earned_month"], 0) || 0);
      const assigned = UnganiAnalytics.safeGet(person, ["properties_assigned", "assigned_work", "notes"], "");

      return `
        <div>
          <div class="ungani-rank-number" style="width:58px;height:58px;font-size:20px;margin-bottom:12px;">
            ${UnganiClientShared.safe(makeInitials(name))}
          </div>
          <h2 style="margin:0 0 6px;font-size:27px;">${UnganiClientShared.safe(name)}</h2>
          ${summaryLine("Recorded Deals / Jobs", deals)}
          ${summaryLine("Commission / Value", UnganiAnalytics.moneyFormat(commission))}
          ${summaryLine("Assigned Work", assigned || "Not recorded")}
        </div>
      `;
    }

    function renderItemPreview() {
      const rows = dashboardData.items.slice(0, 3);

      if (rows.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No records yet</h3>
            <p>Add ${UnganiClientShared.safe(businessProfile.itemPlural.toLowerCase())} to see a visual preview here.</p>
            <a class="ungani-btn" href="my-items.html">Add Record</a>
          </div>
        `;
      }

      return `
        <div class="item-preview-grid">
          ${rows.map(function (row) {
            const name = UnganiAnalytics.safeGet(row, ["property_name", "item_name", "name", "title"], businessProfile.itemSingular);
            const project = UnganiAnalytics.safeGet(row, ["project_name"], "");
            const location = UnganiAnalytics.safeGet(row, ["property_location", "location"], "");
            const photo = UnganiAnalytics.safeGet(row, ["photo_url", "image_url", "thumbnail_url"], "");
            const price = Number(UnganiAnalytics.safeGet(row, ["property_price", "selling_price", "cost_price"], 0) || 0);
            const status = UnganiAnalytics.safeGet(row, ["property_status", "item_status", "status"], "available");

            return `
              <a class="ungani-card item-preview-card" href="my-items.html">
                <div class="item-preview-photo">
                  ${photo ? `<img src="${UnganiClientShared.attr(photo)}" alt="${UnganiClientShared.attr(name)}" onerror="this.style.display='none';" />` : ""}
                  <div class="item-placeholder" style="${photo ? "display:none;" : ""}">📦</div>
                  <div class="item-preview-photo-content">
                    <h3>${UnganiClientShared.safe(name)}</h3>
                    <p>${UnganiClientShared.safe(project || location || businessProfile.itemSingular)}</p>
                  </div>
                </div>

                <div class="item-preview-body">
                  <p class="item-preview-price">${price > 0 ? UnganiClientShared.safe(UnganiAnalytics.moneyFormat(price)) : "Value not set"}</p>
                  ${badge(status, colorClass(status))}
                </div>
              </a>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderProjectProgress(projects) {
      if (!projects || projects.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No progress data yet</h3>
            <p>Add project names, total units, sold units, or progress percentage to see progress here.</p>
          </div>
        `;
      }

      return projects.slice(0, 4).map(function (project) {
        const percent = Math.max(0, Math.min(100, Number(project.progress || 0)));

        return `
          <div class="ungani-project-progress-card">
            <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;">
              <div>
                <strong>${UnganiClientShared.safe(project.name)}</strong>
                <p class="ungani-small" style="margin:5px 0 0;">${project.unitsSold}/${project.totalUnits} units done · ${project.unitsAvailable} available</p>
              </div>
              <span class="ungani-badge ${progressColor(percent)}">${percent}%</span>
            </div>

            <div class="ungani-project-track">
              <div class="ungani-project-fill" style="width:${percent}%;"></div>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderActionNeeded() {
      const today = new Date().toISOString().slice(0, 10);
      const rows = [];

      dashboardData.tasks.forEach(function (row) {
        const status = String(UnganiAnalytics.safeGet(row, ["status"], "")).toLowerCase();
        const due = String(UnganiAnalytics.safeGet(row, ["due_date"], "")).slice(0, 10);

        if (due && due <= today && !status.includes("completed") && !status.includes("cancelled")) {
          rows.push({
            label: "Task",
            title: UnganiAnalytics.safeGet(row, ["task_title", "title", "name"], "Task"),
            detail: "Due " + UnganiClientShared.formatDate(due),
            href: "my-tasks.html",
            color: due < today ? "red" : "gold"
          });
        }
      });

      dashboardData.support.forEach(function (row) {
        const status = String(UnganiAnalytics.safeGet(row, ["status"], "open")).toLowerCase();

        if (!status.includes("resolved") && !status.includes("closed")) {
          rows.push({
            label: "Support",
            title: UnganiAnalytics.safeGet(row, ["issue_title", "subject"], "Support issue"),
            detail: UnganiAnalytics.safeGet(row, ["priority"], "normal") + " priority",
            href: "my-support.html",
            color: "gold"
          });
        }
      });

      if (rows.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No urgent action</h3>
            <p>Tasks and support items needing attention will appear here.</p>
          </div>
        `;
      }

      return rows.slice(0, 6).map(function (item) {
        return `
          <a class="action-row" href="${UnganiClientShared.attr(item.href)}">
            <div>
              ${badge(item.label, item.color)}
              <h3 style="font-size:16px;margin:8px 0 4px;">${UnganiClientShared.safe(item.title)}</h3>
              <p class="ungani-small" style="margin:0;">${UnganiClientShared.safe(item.detail)}</p>
            </div>
            <span class="ungani-badge blue">Open</span>
          </a>
        `;
      }).join("");
    }

    function renderRecentRecords() {
      const rows = dashboardData.records.slice(0, 5);

      if (rows.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No recent records</h3>
            <p>Operational updates will appear here.</p>
          </div>
        `;
      }

      return rows.map(function (row) {
        const title = UnganiAnalytics.safeGet(row, ["record_title", "title", "name"], "Record");
        const type = UnganiAnalytics.safeGet(row, ["record_type"], "record");
        const status = UnganiAnalytics.safeGet(row, ["status"], "open");
        const date = UnganiAnalytics.safeGet(row, ["record_date", "created_at"], "");

        return `
          <a class="action-row" href="my-records.html">
            <div>
              ${badge(type, "gold")}
              <h3 style="font-size:16px;margin:8px 0 4px;">${UnganiClientShared.safe(title)}</h3>
              <p class="ungani-small" style="margin:0;">${UnganiClientShared.safe(UnganiClientShared.formatDate(date))}</p>
            </div>
            ${badge(status, colorClass(status))}
          </a>
        `;
      }).join("");
    }

    function summaryLine(label, value) {
      return `
        <div style="display:flex;justify-content:space-between;gap:14px;border-bottom:1px solid var(--ungani-border);padding:10px 0;">
          <span class="ungani-small">${UnganiClientShared.safe(label)}</span>
          <strong>${UnganiClientShared.safe(value)}</strong>
        </div>
      `;
    }

    function badge(text, color) {
      return `<span class="ungani-badge ${UnganiClientShared.attr(color || "gold")}">${UnganiClientShared.safe(UnganiAnalytics.toTitle(text))}</span>`;
    }

    function colorClass(text) {
      const lower = String(text || "").toLowerCase();

      if (lower.includes("available") || lower.includes("in stock") || lower.includes("sold") || lower.includes("rented") || lower.includes("completed") || lower.includes("active") || lower.includes("resolved")) return "green";
      if (lower.includes("overdue") || lower.includes("urgent") || lower.includes("lost") || lower.includes("cancelled") || lower.includes("failed")) return "red";

      return "gold";
    }

    function progressColor(percent) {
      const value = Number(percent || 0);

      if (value >= 75) return "green";
      if (value >= 35) return "gold";
      return "red";
    }

    function hasValues(rows) {
      return (rows || []).some(function (row) {
        return Number(row.value || 0) > 0;
      });
    }

    function makeInitials(valueText) {
      const parts = String(valueText || "A").trim().split(/\s+/).filter(Boolean);

      if (parts.length === 0) return "A";
      if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();

      return (parts[0][0] + parts[1][0]).toUpperCase();
    }
  </script>
</body>
</html>
