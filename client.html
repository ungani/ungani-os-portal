<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Client Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-shared.js"></script>
</head>

<body>
  <script>
    let pageData = {
      transactions: [],
      items: [],
      tasks: [],
      records: [],
      documents: [],
      people: [],
      events: [],
      support: []
    };

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "dashboard",
        pageTitle: "Client Dashboard",
        pageSubtitle: "Your business workspace for operations, records, follow-ups, documents, money records, and reports.",
        onReady: loadDashboard
      });
    });

    async function loadDashboard(context) {
      const contentEl = context.contentEl;
      const tenant = context.tenant;
      const tenantId = context.tenantId;
      const supabaseClient = context.supabaseClient;

      contentEl.innerHTML = UnganiClientShared.loadingCard("Loading your dashboard data...");

      const responses = await Promise.all([
        safeSelect(supabaseClient, "transactions", tenantId),
        safeSelect(supabaseClient, "business_items", tenantId),
        safeSelect(supabaseClient, "tasks", tenantId),
        safeSelect(supabaseClient, "business_records", tenantId),
        safeSelect(supabaseClient, "documents", tenantId),
        safeSelect(supabaseClient, "client_people", tenantId),
        safeSelect(supabaseClient, "business_events", tenantId),
        safeSelect(supabaseClient, "support_issues", tenantId)
      ]);

      pageData.transactions = responses[0];
      pageData.items = responses[1];
      pageData.tasks = responses[2];
      pageData.records = responses[3];
      pageData.documents = responses[4];
      pageData.people = responses[5];
      pageData.events = responses[6];
      pageData.support = responses[7];

      renderDashboard(tenant);
    }

    async function safeSelect(supabaseClient, tableName, tenantId) {
      try {
        const response = await supabaseClient
          .from(tableName)
          .select("*")
          .eq("tenant_id", tenantId)
          .order("created_at", { ascending: false });

        if (response.error) {
          console.warn(tableName, response.error.message);
          return [];
        }

        return response.data || [];
      } catch (error) {
        console.warn(tableName, error.message);
        return [];
      }
    }

    function renderDashboard(tenant) {
      const tenantName = UnganiClientShared.getTenantName(tenant);
      const businessType = UnganiClientShared.getValue(tenant, ["business_type", "business_type_key"], "Business");
      const businessTypeKey = String(UnganiClientShared.getValue(tenant, ["business_type_key"], "")).toLowerCase();

      const isRealEstate = businessTypeKey.includes("real_estate") || String(businessType).toLowerCase().includes("real estate");

      const money = calculateMoney();
      const itemSummary = calculateItems(isRealEstate);
      const taskSummary = calculateTasks();
      const supportSummary = calculateSupport();
      const eventSummary = calculateEvents();
      const peopleSummary = calculatePeople();

      const heroTitle = isRealEstate
        ? "Property Operations Workspace"
        : "Business Operations Workspace";

      const heroText = isRealEstate
        ? "Manage properties, projects, agents, leads, viewings, documents, money records, tasks, calendar activities, and reports in one place."
        : "Manage business records, tasks, documents, people, money records, calendar activities, support, and reports in one place.";

      const content = `
        <section class="ungani-card ungani-hero">
          <h2>${UnganiClientShared.safe(heroTitle)}</h2>
          <p>
            Welcome to ${UnganiClientShared.safe(tenantName)}. ${UnganiClientShared.safe(heroText)}
          </p>

          <div class="ungani-button-row">
            <a class="ungani-btn" href="my-items.html">${isRealEstate ? "Open Properties" : "Open Items / Assets"}</a>
            <a class="ungani-btn green" href="my-money.html">Open Money Records</a>
            <a class="ungani-btn dark" href="reports.html">View Reports</a>
          </div>
        </section>

        <section class="ungani-grid">
          ${UnganiClientShared.metricCard(
            isRealEstate ? "Properties / Listings" : "Items / Assets",
            pageData.items.length,
            isRealEstate
              ? itemSummary.available + " available · " + itemSummary.sold + " sold · " + itemSummary.rented + " rented"
              : itemSummary.available + " available · " + itemSummary.maintenance + " maintenance",
            "blue"
          )}

          ${UnganiClientShared.metricCard(
            "Money Records",
            UnganiClientShared.formatKES(money.balance),
            "Income: " + UnganiClientShared.formatKES(money.income) + " · Expense: " + UnganiClientShared.formatKES(money.expense),
            money.balance >= 0 ? "green" : "red"
          )}

          ${UnganiClientShared.metricCard(
            isRealEstate ? "Agents / Leads / People" : "People",
            pageData.people.length,
            isRealEstate
              ? peopleSummary.agents + " agents · " + peopleSummary.leads + " leads"
              : peopleSummary.active + " active people",
            "gold"
          )}

          ${UnganiClientShared.metricCard(
            "Pending Tasks",
            taskSummary.pending,
            taskSummary.completed + " completed · " + taskSummary.overdue + " overdue",
            taskSummary.overdue > 0 ? "red" : "orange"
          )}

          ${UnganiClientShared.metricCard(
            "Documents",
            pageData.documents.length,
            "Business files and linked records",
            "blue"
          )}

          ${UnganiClientShared.metricCard(
            "Upcoming Calendar",
            eventSummary.upcoming,
            eventSummary.today + " today · " + eventSummary.total + " total events",
            "green"
          )}
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>${isRealEstate ? "Property Quick Actions" : "Quick Actions"}</h3>
            </div>

            <div class="ungani-grid">
              ${quickLink(isRealEstate ? "Properties / Listings" : "Items / Assets / Stock", isRealEstate ? "Add or review properties, units, apartments, assets, or stock records." : "Add or review business items, assets, stock, and equipment.", "my-items.html")}
              ${quickLink("Money Records", "Track sales, income, expenses, petty cash, payments, and business money movements.", "my-money.html")}
              ${quickLink(isRealEstate ? "Agents / Leads / People" : "People", isRealEstate ? "Track agents, leads, buyers, renters, contractors, and staff." : "Track staff, suppliers, clients, contractors, and business contacts.", "my-people.html")}
              ${quickLink("Tasks / Follow-ups", "Manage follow-ups, pending actions, reminders, and business responsibilities.", "my-tasks.html")}
              ${quickLink("Documents", "Store or link agreements, receipts, invoices, records, and business documents.", "my-documents.html")}
              ${quickLink("Reports", "Review business summaries, activity, documents, tasks, and money records.", "reports.html")}
            </div>
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Recent Activity</h3>
              <a class="ungani-btn dark" href="my-activity.html">View Activity</a>
            </div>

            ${renderRecentActivity(isRealEstate)}
          </div>
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>${isRealEstate ? "Recent Properties / Records" : "Recent Business Records"}</h3>
              <a class="ungani-btn" href="my-records.html">Open Records</a>
            </div>

            ${renderRecentRecords()}
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Support & Communication</h3>
            </div>

            <div class="ungani-grid">
              ${supportCard("Support Issues", supportSummary.open, "Open support requests", "my-support.html", supportSummary.open > 0 ? "orange" : "green")}
              ${supportCard("Notices", "Open", "View business notices from UNGANI", "my-notices.html", "blue")}
              ${supportCard("Chat", "Message", "Chat with UNGANI admin", "my-chat.html", "gold")}
              ${supportCard("Team Chat", "Team", "Internal team discussion", "my-team-chat.html", "blue")}
            </div>
          </div>
        </section>

        <p class="ungani-small">
          Client Dashboard Version: Step 305B Shared Layout · ungani.com · info@ungani.com
        </p>
      `;

      UnganiClientShared.setContent(content);
    }

    function calculateMoney() {
      let income = 0;
      let expense = 0;
      let pettyCash = 0;

      pageData.transactions.forEach(function (row) {
        const amount = Number(UnganiClientShared.getValue(row, ["amount"], 0) || 0);
        const type = String(UnganiClientShared.getValue(row, ["transaction_type", "type", "category_type"], "")).toLowerCase();

        if (type.includes("income") || type.includes("sale") || type.includes("rental")) {
          income += amount;
        } else if (type.includes("petty")) {
          pettyCash += amount;
          expense += amount;
        } else if (type.includes("expense")) {
          expense += amount;
        }
      });

      return {
        income: income,
        expense: expense,
        pettyCash: pettyCash,
        balance: income - expense
      };
    }

    function calculateItems(isRealEstate) {
      let available = 0;
      let sold = 0;
      let rented = 0;
      let maintenance = 0;

      pageData.items.forEach(function (row) {
        const status = String(UnganiClientShared.getValue(row, ["property_status", "item_status", "status"], "")).toLowerCase();

        if (status.includes("available")) available++;
        if (status.includes("sold")) sold++;
        if (status.includes("rented")) rented++;
        if (status.includes("maintenance") || status.includes("repair")) maintenance++;
      });

      return {
        available: available,
        sold: sold,
        rented: rented,
        maintenance: maintenance
      };
    }

    function calculateTasks() {
      let pending = 0;
      let completed = 0;
      let overdue = 0;

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      pageData.tasks.forEach(function (row) {
        const status = String(UnganiClientShared.getValue(row, ["status", "task_status"], "pending")).toLowerCase();
        const dueValue = UnganiClientShared.getValue(row, ["due_date", "task_due_date"], "");

        if (status.includes("complete") || status.includes("done")) {
          completed++;
        } else {
          pending++;
        }

        if (dueValue && !(status.includes("complete") || status.includes("done"))) {
          const dueDate = new Date(dueValue);
          dueDate.setHours(0, 0, 0, 0);

          if (!isNaN(dueDate.getTime()) && dueDate < today) {
            overdue++;
          }
        }
      });

      return {
        pending: pending,
        completed: completed,
        overdue: overdue
      };
    }

    function calculateSupport() {
      let open = 0;

      pageData.support.forEach(function (row) {
        const status = String(UnganiClientShared.getValue(row, ["status"], "open")).toLowerCase();

        if (!status.includes("closed") && !status.includes("resolved")) {
          open++;
        }
      });

      return { open: open };
    }

    function calculateEvents() {
      const today = new Date();
      const todayText = today.toISOString().slice(0, 10);

      let upcoming = 0;
      let todayCount = 0;

      pageData.events.forEach(function (row) {
        const value = UnganiClientShared.getValue(row, ["event_date", "date"], "");
        if (!value) return;

        const eventDateText = String(value).slice(0, 10);

        if (eventDateText === todayText) {
          todayCount++;
        }

        if (eventDateText >= todayText) {
          upcoming++;
        }
      });

      return {
        total: pageData.events.length,
        upcoming: upcoming,
        today: todayCount
      };
    }

    function calculatePeople() {
      let active = 0;
      let agents = 0;
      let leads = 0;

      pageData.people.forEach(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["person_type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["relationship_status", "status"], "active")).toLowerCase();

        if (!status.includes("inactive")) active++;
        if (type.includes("agent")) agents++;
        if (type.includes("lead") || type.includes("buyer") || type.includes("renter")) leads++;
      });

      return {
        active: active,
        agents: agents,
        leads: leads
      };
    }

    function quickLink(title, description, href) {
      return `
        <a href="${UnganiClientShared.attr(href)}" style="text-decoration:none;">
          <div class="ungani-card" style="margin-bottom:0;box-shadow:none;">
            <h3 style="margin:0 0 8px;color:var(--ungani-text);">${UnganiClientShared.safe(title)}</h3>
            <p class="ungani-small" style="margin:0;">${UnganiClientShared.safe(description)}</p>
          </div>
        </a>
      `;
    }

    function supportCard(title, value, note, href, color) {
      return `
        <a href="${UnganiClientShared.attr(href)}" style="text-decoration:none;">
          <div class="ungani-metric ${UnganiClientShared.attr(color || "")}" style="box-shadow:none;">
            <h3>${UnganiClientShared.safe(title)}</h3>
            <p style="font-size:22px;">${UnganiClientShared.safe(value)}</p>
            <div class="note">${UnganiClientShared.safe(note)}</div>
          </div>
        </a>
      `;
    }

    function renderRecentActivity(isRealEstate) {
      const activity = [];

      pageData.transactions.slice(0, 3).forEach(function (row) {
        activity.push({
          title: "Money record added",
          detail: UnganiClientShared.getValue(row, ["category_name", "category", "description"], "Money record") + " · " + UnganiClientShared.formatKES(UnganiClientShared.getValue(row, ["amount"], 0)),
          date: UnganiClientShared.getValue(row, ["transaction_date", "created_at"], "")
        });
      });

      pageData.tasks.slice(0, 3).forEach(function (row) {
        activity.push({
          title: "Task / follow-up",
          detail: UnganiClientShared.getValue(row, ["task_title", "title", "name", "description"], "Task"),
          date: UnganiClientShared.getValue(row, ["due_date", "created_at"], "")
        });
      });

      pageData.items.slice(0, 3).forEach(function (row) {
        activity.push({
          title: isRealEstate ? "Property / listing record" : "Item / asset record",
          detail: UnganiClientShared.getValue(row, ["property_name", "item_name", "name", "title"], "Record"),
          date: UnganiClientShared.getValue(row, ["date_listed", "created_at"], "")
        });
      });

      activity.sort(function (a, b) {
        return new Date(b.date || 0) - new Date(a.date || 0);
      });

      if (activity.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No activity yet</h3>
            <p>Recent records will appear here as you add data.</p>
          </div>
        `;
      }

      return activity.slice(0, 8).map(function (item) {
        return `
          <div class="ungani-card" style="box-shadow:none;margin-bottom:10px;">
            <h3 style="margin:0 0 6px;color:var(--ungani-text);">${UnganiClientShared.safe(item.title)}</h3>
            <p class="ungani-small" style="margin:0 0 6px;">${UnganiClientShared.safe(item.detail)}</p>
            <span class="ungani-badge gold">${UnganiClientShared.safe(UnganiClientShared.formatDate(item.date))}</span>
          </div>
        `;
      }).join("");
    }

    function renderRecentRecords() {
      const rows = [...pageData.records].slice(0, 6);

      if (rows.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No records yet</h3>
            <p>Business records, leads, project updates, and activity notes will appear here.</p>
          </div>
        `;
      }

      return rows.map(function (row) {
        const title = UnganiClientShared.getValue(row, ["record_title", "title", "name", "property_name", "project_name"], "Business Record");
        const description = UnganiClientShared.getValue(row, ["description", "notes", "record_notes"], "No description added.");
        const status = UnganiClientShared.getValue(row, ["status", "record_stage", "lead_status", "deal_status"], "record");

        return `
          <div class="ungani-card" style="box-shadow:none;margin-bottom:10px;">
            <h3 style="margin:0 0 6px;color:var(--ungani-text);">${UnganiClientShared.safe(title)}</h3>
            <p class="ungani-small" style="margin:0 0 6px;">${UnganiClientShared.safe(description)}</p>
            <span class="ungani-badge blue">${UnganiClientShared.safe(status)}</span>
            <span class="ungani-badge gold">${UnganiClientShared.safe(UnganiClientShared.formatDate(UnganiClientShared.getValue(row, ["created_at"], "")))}</span>
          </div>
        `;
      }).join("");
    }
  </script>
</body>
</html>
