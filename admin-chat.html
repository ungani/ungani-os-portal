<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Admin Chat</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="pwa-register.js"></script>
  <script src="admin-shared.js"></script>

  <style>
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 24px var(--ungani-shadow);
    }

    .metric-card h3 {
      margin: 0 0 8px;
      color: var(--ungani-muted);
      font-size: 14px;
    }

    .metric-card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
      color: var(--ungani-text);
    }

    .metric-card .note {
      margin-top: 8px;
      color: var(--ungani-muted);
      font-size: 12px;
    }

    .metric-card.green {
      border-left-color: var(--ungani-green);
    }

    .metric-card.red {
      border-left-color: var(--ungani-red);
    }

    .metric-card.orange {
      border-left-color: var(--ungani-orange);
    }

    .metric-card.blue {
      border-left-color: var(--ungani-blue);
    }

    .chat-layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 18px;
    }

    .conversation-list {
      max-height: 650px;
      overflow-y: auto;
    }

    .conversation-card {
      background: var(--ungani-bg);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 18px;
      padding: 15px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .conversation-card:hover,
    .conversation-card.active {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px var(--ungani-shadow);
      border-left-color: var(--ungani-blue);
    }

    .conversation-card.unread {
      border-left-color: var(--ungani-red);
    }

    .conversation-title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 5px;
      color: var(--ungani-text);
    }

    .conversation-detail {
      color: var(--ungani-muted);
      font-size: 13px;
      margin: 4px 0;
      line-height: 1.4;
      word-break: break-word;
    }

    .chat-panel {
      min-height: 650px;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      background: var(--ungani-bg);
      border: 1px solid var(--ungani-border);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .chat-header h2 {
      margin: 0 0 6px;
    }

    .messages-box {
      background: var(--ungani-bg);
      border: 1px solid var(--ungani-border);
      border-radius: 18px;
      padding: 16px;
      min-height: 390px;
      max-height: 520px;
      overflow-y: auto;
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 78%;
      padding: 12px 14px;
      border-radius: 16px;
      line-height: 1.45;
      word-break: break-word;
      border: 1px solid var(--ungani-border);
    }

    .message.admin {
      align-self: flex-end;
      background: #061C3D;
      color: #FFFFFF;
      border-color: #061C3D;
    }

    html[data-ungani-theme="dark"] .message.admin {
      background: var(--ungani-gold);
      color: #061C3D;
      border-color: var(--ungani-gold);
    }

    .message.client {
      align-self: flex-start;
      background: var(--ungani-card);
      color: var(--ungani-text);
    }

    .message-meta {
      font-size: 11px;
      opacity: 0.75;
      margin-bottom: 5px;
    }

    .message-body {
      white-space: pre-wrap;
    }

    .compose-box {
      background: var(--ungani-bg);
      border: 1px solid var(--ungani-border);
      border-radius: 18px;
      padding: 16px;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      resize: vertical;
      padding: 12px;
      border: 1px solid var(--ungani-border);
      border-radius: 12px;
      background: var(--ungani-card);
      color: var(--ungani-text);
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--ungani-border);
      border-radius: 12px;
      background: var(--ungani-card);
      color: var(--ungani-text);
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 8px 0 6px;
      font-size: 14px;
      color: var(--ungani-text);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .badge {
      display: inline-block;
      background: #061C3D;
      color: #FFFFFF;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      text-transform: capitalize;
    }

    .badge.green {
      background: var(--ungani-green);
    }

    .badge.red {
      background: var(--ungani-red);
    }

    .badge.orange {
      background: var(--ungani-orange);
    }

    .badge.blue {
      background: var(--ungani-blue);
    }

    .badge.gold {
      background: var(--ungani-gold);
      color: #061C3D;
    }

    .empty {
      text-align: center;
      padding: 28px;
      background: var(--ungani-bg);
      border: 1px dashed var(--ungani-border);
      border-radius: 18px;
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--ungani-text);
    }

    .empty p {
      margin: 0;
      color: var(--ungani-muted);
    }

    .small-text {
      color: var(--ungani-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 1050px) {
      .chat-layout {
        grid-template-columns: 1fr;
      }

      .conversation-list {
        max-height: 380px;
      }

      .chat-panel {
        min-height: auto;
      }
    }
  </style>
</head>

<body>
  <div id="adminRoot"></div>

  <script>
    let supabaseClient = null;
    let currentAdmin = null;
    let tenants = [];
    let messages = [];
    let selectedTenantId = "";
    let chatSubscription = null;

    const pageMainHtml = `
      <section class="ungani-card ungani-hero-card">
        <div style="position: relative; z-index: 1;">
          <h2>Admin Chat Center</h2>
          <p>
            Communicate with clients directly, review unread messages, and keep client support conversations visible in one place.
          </p>
          <div style="margin-top: 16px;">
            <a class="ungani-btn" href="admin-home.html">Admin Home</a>
            <a class="ungani-btn green" href="admin.html">Main Admin</a>
            <a class="ungani-btn blue" href="support.html">Support</a>
            <a class="ungani-btn dark" href="admin-settings.html">Admin Settings</a>
          </div>
        </div>
      </section>

      <section class="page-grid" id="metricsGrid">
        <div class="metric-card"><h3>Loading</h3><p>...</p><div class="note">Please wait</div></div>
      </section>

      <section class="ungani-card">
        <div class="form-grid">
          <div>
            <label for="clientSelect">Select Client</label>
            <select id="clientSelect" onchange="selectTenantFromDropdown()">
              <option value="">Loading clients...</option>
            </select>
          </div>

          <div>
            <label for="filterUnread">Filter</label>
            <select id="filterUnread" onchange="renderConversations()">
              <option value="">All Conversations</option>
              <option value="unread">Unread Client Messages</option>
              <option value="active">Clients With Messages</option>
            </select>
          </div>

          <div>
            <label for="searchBox">Search</label>
            <input id="searchBox" placeholder="Search clients or messages..." oninput="renderConversations()" />
          </div>
        </div>
      </section>

      <section class="chat-layout">
        <div class="ungani-card">
          <h2>Client Conversations</h2>
          <p class="small-text">Select a client to open their chat history.</p>
          <div id="conversationList" class="conversation-list">
            <div class="empty">
              <h3>Loading conversations...</h3>
              <p>Please wait.</p>
            </div>
          </div>
        </div>

        <div class="ungani-card chat-panel">
          <div id="chatHeader" class="chat-header">
            <h2>No client selected</h2>
            <p class="small-text">Choose a client conversation from the left side.</p>
          </div>

          <div id="messagesBox" class="messages-box">
            <div class="empty">
              <h3>No conversation selected</h3>
              <p>Select a client to view and send messages.</p>
            </div>
          </div>

          <div class="compose-box">
            <label for="messageText">Admin Reply</label>
            <textarea id="messageText" placeholder="Write your message to the client..."></textarea>

            <div class="button-row">
              <button class="ungani-btn green" onclick="sendAdminMessage()">Send Message</button>
              <button class="ungani-btn blue" onclick="markSelectedAsRead()">Mark Client Messages Read</button>
              <button class="ungani-btn dark" onclick="loadPageData()">Refresh</button>
            </div>

            <p class="small-text">
              Messages sent here appear in the client chat area for the selected business.
            </p>
          </div>
        </div>
      </section>
    `;

    window.addEventListener("load", function () {
      UnganiAdminShared.renderShell("adminRoot", {
        activeKey: "admin-chat",
        pageTitle: "Admin Chat",
        pageSubtitle: "View and reply to client messages.",
        footerTitle: "Admin Chat",
        footerVersion: "Admin Chat Version: Step 282 Shared Session Added",
        mainHtml: pageMainHtml
      });

      UnganiAdminShared.requireAdmin({
        onNoSession: function () {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiLoginShell").classList.remove("hidden");
        },
        onBlocked: function (reason) {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiBlockedShell").classList.remove("hidden");
          document.getElementById("unganiBlockedReason").innerText = reason;
        },
        onReady: async function (admin, client) {
          currentAdmin = admin;
          supabaseClient = client;

          UnganiAdminShared.renderSidebar("adminSidebar", {
            activeKey: "admin-chat",
            adminName: admin.full_name || "Admin Workspace",
            footerTitle: "Admin Chat",
            footerVersion: "Admin Chat Version: Step 282 Shared Session Added"
          });

          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiAppShell").classList.remove("hidden");

          await loadPageData();
          startRealtime();

          const deepLinkTenantId = new URLSearchParams(window.location.search || "").get("tenant");
          if (deepLinkTenantId) {
            selectTenant(deepLinkTenantId);
          }
        }
      });
    });

    function safe(value) {
      return UnganiAdminShared.safe(value);
    }

    function cleanText(value) {
      return UnganiAdminShared.cleanText(value);
    }

    function getField(row, names, fallback = "") {
      for (const name of names) {
        if (row && row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return fallback;
    }

    function getTenantName(row) {
      return getField(row, ["company_name", "business_name", "name"], "Client Business");
    }

    function getTenantNameById(tenantId) {
      const tenant = tenants.find(row => String(row.id) === String(tenantId));
      return tenant ? getTenantName(tenant) : "Unknown Client";
    }

    function formatDateTime(value) {
      if (!value) return "N/A";
      const dateObj = new Date(value);
      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    async function safeSelect(tableName) {
      try {
        const { data, error } = await supabaseClient
          .from(tableName)
          .select("*")
          .limit(10000);

        if (error) {
          console.log(tableName, error.message);
          return [];
        }

        return data || [];
      } catch (error) {
        console.log(tableName, error.message);
        return [];
      }
    }

    async function loadPageData() {
      UnganiAdminShared.showToast("Loading admin chat...");

      const [tenantRows, messageRows] = await Promise.all([
        safeSelect("tenants"),
        safeSelect("admin_client_messages")
      ]);

      tenants = tenantRows;
      messages = messageRows
        .filter(row => row.is_internal !== true)
        .sort((a, b) => new Date(a.created_at || 0) - new Date(b.created_at || 0));

      fillClientSelect();
      renderMetrics();
      renderConversations();

      if (selectedTenantId) {
        renderChat(selectedTenantId);
      }

      UnganiAdminShared.showToast("Admin chat updated ✓");
    }

    function fillClientSelect() {
      const options = tenants
        .map(row => `<option value="${safe(row.id)}">${safe(getTenantName(row))}</option>`)
        .join("");

      document.getElementById("clientSelect").innerHTML = `<option value="">Select Client</option>${options}`;

      if (selectedTenantId) {
        document.getElementById("clientSelect").value = selectedTenantId;
      }
    }

    function tenantMessages(tenantId) {
      return messages.filter(row => String(row.tenant_id) === String(tenantId));
    }

    function unreadClientMessages(tenantId) {
      return tenantMessages(tenantId).filter(row => {
        const senderRole = String(row.sender_role || "").toLowerCase();
        return senderRole === "client" && !row.read_by_admin_at;
      });
    }

    function latestMessage(tenantId) {
      const rows = tenantMessages(tenantId);
      return rows.length ? rows[rows.length - 1] : null;
    }

    function renderMetrics() {
      const totalMessages = messages.length;
      const clientMessages = messages.filter(row => String(row.sender_role || "").toLowerCase() === "client").length;
      const adminMessages = messages.filter(row => String(row.sender_role || "").toLowerCase() === "admin").length;
      const unreadMessages = messages.filter(row => String(row.sender_role || "").toLowerCase() === "client" && !row.read_by_admin_at).length;
      const activeClients = new Set(messages.map(row => row.tenant_id).filter(Boolean)).size;
      const totalClients = tenants.length;

      const metrics = [
        { title: "Total Messages", value: totalMessages, note: "All client-admin chat messages", cls: "blue" },
        { title: "Unread Client Messages", value: unreadMessages, note: "Client messages not read by admin", cls: unreadMessages > 0 ? "red" : "green" },
        { title: "Client Messages", value: clientMessages, note: "Messages sent by clients", cls: "orange" },
        { title: "Admin Replies", value: adminMessages, note: "Messages sent by admin", cls: "green" },
        { title: "Active Conversations", value: activeClients, note: "Clients with chat messages", cls: "blue" },
        { title: "Total Clients", value: totalClients, note: "Approved client records", cls: "green" }
      ];

      document.getElementById("metricsGrid").innerHTML = metrics.map(item => `
        <div class="metric-card ${safe(item.cls)}">
          <h3>${safe(item.title)}</h3>
          <p>${safe(item.value)}</p>
          <div class="note">${safe(item.note)}</div>
        </div>
      `).join("");
    }

    function renderConversations() {
      const query = document.getElementById("searchBox").value.toLowerCase().trim();
      const filter = document.getElementById("filterUnread").value;

      let rows = tenants.map(tenant => {
        const tenantId = tenant.id;
        const allMessages = tenantMessages(tenantId);
        const latest = latestMessage(tenantId);
        const unread = unreadClientMessages(tenantId);

        return {
          tenant,
          tenantId,
          name: getTenantName(tenant),
          allMessages,
          latest,
          unreadCount: unread.length
        };
      });

      if (filter === "unread") {
        rows = rows.filter(item => item.unreadCount > 0);
      }

      if (filter === "active") {
        rows = rows.filter(item => item.allMessages.length > 0);
      }

      if (query) {
        rows = rows.filter(item => {
          const messageText = item.allMessages.map(msg => msg.message_body || "").join(" ");
          const haystack = `${item.name} ${messageText}`.toLowerCase();
          return haystack.includes(query);
        });
      }

      rows.sort((a, b) => {
        const dateA = new Date(a.latest?.created_at || 0);
        const dateB = new Date(b.latest?.created_at || 0);
        return dateB - dateA;
      });

      if (rows.length === 0) {
        document.getElementById("conversationList").innerHTML = `
          <div class="empty">
            <h3>No conversations found</h3>
            <p>Try changing the filter or search text.</p>
          </div>
        `;
        return;
      }

      document.getElementById("conversationList").innerHTML = rows.map(item => {
        const latestText = item.latest?.message_body || "No messages yet.";
        const latestDate = item.latest?.created_at ? formatDateTime(item.latest.created_at) : "No message date";
        const activeClass = String(selectedTenantId) === String(item.tenantId) ? "active" : "";
        const unreadClass = item.unreadCount > 0 ? "unread" : "";

        return `
          <div class="conversation-card ${safe(activeClass)} ${safe(unreadClass)}" onclick="selectTenant('${safe(item.tenantId)}')">
            <div class="conversation-title">${safe(item.name)}</div>
            <p class="conversation-detail">${safe(latestText.slice(0, 120))}${latestText.length > 120 ? "..." : ""}</p>
            <p class="conversation-detail">${safe(latestDate)}</p>
            <span class="badge blue">${safe(item.allMessages.length)} message(s)</span>
            ${item.unreadCount > 0 ? `<span class="badge red">${safe(item.unreadCount)} unread</span>` : `<span class="badge green">read</span>`}
          </div>
        `;
      }).join("");
    }

    function selectTenantFromDropdown() {
      const tenantId = document.getElementById("clientSelect").value;
      if (!tenantId) return;
      selectTenant(tenantId);
    }

    async function selectTenant(tenantId) {
      selectedTenantId = tenantId;
      document.getElementById("clientSelect").value = tenantId;

      renderConversations();
      renderChat(tenantId);

      await markSelectedAsRead(false);
    }

    function renderChat(tenantId) {
      const tenantName = getTenantNameById(tenantId);
      const rows = tenantMessages(tenantId);

      document.getElementById("chatHeader").innerHTML = `
        <h2>${safe(tenantName)}</h2>
        <p class="small-text">
          ${safe(rows.length)} message(s) in this conversation.
        </p>
        <span class="badge blue">Client Chat</span>
        ${unreadClientMessages(tenantId).length > 0 ? `<span class="badge red">${safe(unreadClientMessages(tenantId).length)} unread</span>` : `<span class="badge green">no unread</span>`}
      `;

      if (rows.length === 0) {
        document.getElementById("messagesBox").innerHTML = `
          <div class="empty">
            <h3>No messages yet</h3>
            <p>Send the first admin message to this client.</p>
          </div>
        `;
        return;
      }

      document.getElementById("messagesBox").innerHTML = rows.map(row => {
        const role = String(row.sender_role || "").toLowerCase() === "admin" ? "admin" : "client";
        const senderName = row.sender_name || (role === "admin" ? "UNGANI Admin" : tenantName);

        return `
          <div class="message ${safe(role)}">
            <div class="message-meta">
              ${safe(senderName)} • ${safe(formatDateTime(row.created_at))}
            </div>
            <div class="message-body">${safe(row.message_body || "")}</div>
          </div>
        `;
      }).join("");

      const box = document.getElementById("messagesBox");
      box.scrollTop = box.scrollHeight;
    }

    async function sendAdminMessage() {
      const text = document.getElementById("messageText").value.trim();

      if (!selectedTenantId) {
        alert("Please select a client first.");
        return;
      }

      if (!text) {
        alert("Please write a message.");
        return;
      }

      const now = new Date().toISOString();

      const payload = {
        tenant_id: selectedTenantId,
        sender_id: UnganiAdminShared.getCurrentAdminId(),
        sender_name: currentAdmin.full_name || "UNGANI Admin",
        sender_role: "admin",
        message_body: text,
        is_internal: false,
        read_by_admin_at: now,
        created_at: now
      };

      const { error } = await supabaseClient
        .from("admin_client_messages")
        .insert(payload);

      if (error) {
        alert(error.message);
        return;
      }

      document.getElementById("messageText").value = "";

      UnganiAdminShared.showToast("Message sent ✓");
      await loadPageData();
      renderChat(selectedTenantId);
    }

    async function markSelectedAsRead(showNotice = true) {
      if (!selectedTenantId) return;

      const unread = unreadClientMessages(selectedTenantId);

      if (unread.length === 0) {
        if (showNotice) UnganiAdminShared.showToast("No unread messages");
        return;
      }

      const ids = unread.map(row => row.id);
      const now = new Date().toISOString();

      const { error } = await supabaseClient
        .from("admin_client_messages")
        .update({
          read_by_admin_at: now
        })
        .in("id", ids);

      if (error) {
        if (showNotice) alert(error.message);
        return;
      }

      if (showNotice) UnganiAdminShared.showToast("Client messages marked as read ✓");

      await loadPageData();
    }

    function startRealtime() {
      if (chatSubscription) return;

      chatSubscription = supabaseClient
        .channel("admin-chat-step-282")
        .on(
          "postgres_changes",
          {
            event: "*",
            schema: "public",
            table: "admin_client_messages"
          },
          async function () {
            await loadPageData();

            if (selectedTenantId) {
              renderChat(selectedTenantId);
            }
          }
        )
        .subscribe();
    }
  </script>
</body>
</html>
