<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Admin Charts</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="pwa-register.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="admin-shared.js"></script>

  <style>
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 24px var(--ungani-shadow);
    }

    .metric-card h3 {
      margin: 0 0 8px;
      color: var(--ungani-muted);
      font-size: 14px;
    }

    .metric-card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
      color: var(--ungani-text);
    }

    .metric-card .note {
      margin-top: 8px;
      color: var(--ungani-muted);
      font-size: 12px;
    }

    .metric-card.green { border-left-color: var(--ungani-green); }
    .metric-card.red { border-left-color: var(--ungani-red); }
    .metric-card.orange { border-left-color: var(--ungani-orange); }
    .metric-card.blue { border-left-color: var(--ungani-blue); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 8px 0 6px;
      font-size: 14px;
      color: var(--ungani-text);
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--ungani-border);
      border-radius: 12px;
      background: var(--ungani-card);
      color: var(--ungani-text);
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 18px;
    }

    .chart-card {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 10px 24px var(--ungani-shadow);
      min-height: 380px;
    }

    .chart-card h2 {
      margin: 0 0 8px;
      color: var(--ungani-text);
      font-size: 20px;
    }

    .chart-card p {
      margin: 0 0 16px;
      color: var(--ungani-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .chart-wrap {
      position: relative;
      height: 280px;
      width: 100%;
    }

    .row-card {
      background: var(--ungani-bg);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .row-title {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 6px;
      color: var(--ungani-text);
    }

    .row-detail {
      color: var(--ungani-muted);
      margin: 5px 0;
      line-height: 1.45;
      word-break: break-word;
    }

    .empty {
      text-align: center;
      padding: 28px;
      background: var(--ungani-bg);
      border: 1px dashed var(--ungani-border);
      border-radius: 18px;
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--ungani-text);
    }

    .empty p {
      margin: 0;
      color: var(--ungani-muted);
    }

    @media (max-width: 720px) {
      .charts-grid {
        grid-template-columns: 1fr;
      }

      .chart-card {
        min-height: 340px;
      }

      .chart-wrap {
        height: 240px;
      }
    }
  </style>
</head>

<body>
  <div id="adminRoot"></div>

  <script>
    let supabaseClient = null;
    let currentAdmin = null;
    let charts = {};

    let dataStore = {
      tenants: [],
      registrations: [],
      users: [],
      documents: [],
      support: [],
      adminMessages: [],
      teamMessages: [],
      events: [],
      transactions: [],
      tasks: [],
      records: [],
      items: [],
      people: []
    };

    const pageMainHtml = `
      <section class="ungani-card ungani-hero-card">
        <div style="position: relative; z-index: 1;">
          <h2>Admin Charts Center</h2>
          <p>
            View live UNGANI OS charts across clients, documents, support, money, tasks, chat, calendar, and operations.
          </p>
          <div style="margin-top: 16px;">
            <a class="ungani-btn" href="admin-home.html">Admin Home</a>
            <a class="ungani-btn green" href="admin.html">Main Admin</a>
            <a class="ungani-btn blue" href="admin-reports.html">Reports</a>
            <a class="ungani-btn dark" href="admin-settings.html">Admin Settings</a>
          </div>
        </div>
      </section>

      <section class="page-grid" id="metricsGrid">
        <div class="metric-card"><h3>Loading</h3><p>...</p><div class="note">Please wait</div></div>
      </section>

      <section class="ungani-card">
        <h2>Chart Filters</h2>

        <div class="form-grid">
          <div>
            <label for="clientFilter">Client</label>
            <select id="clientFilter" onchange="renderAllCharts()">
              <option value="">All Clients</option>
            </select>
          </div>

          <div>
            <label for="dateFrom">Date From</label>
            <input id="dateFrom" type="date" onchange="renderAllCharts()" />
          </div>

          <div>
            <label for="dateTo">Date To</label>
            <input id="dateTo" type="date" onchange="renderAllCharts()" />
          </div>

          <div>
            <label for="chartFocus">Focus</label>
            <select id="chartFocus" onchange="renderAllCharts()">
              <option value="all">All Charts</option>
              <option value="clients">Clients</option>
              <option value="documents">Documents</option>
              <option value="support">Support</option>
              <option value="money">Money</option>
              <option value="tasks">Tasks</option>
              <option value="chat">Chat</option>
              <option value="calendar">Calendar</option>
              <option value="operations">Operations</option>
            </select>
          </div>
        </div>

        <div class="button-row">
          <button class="ungani-btn green" onclick="loadPageData()">Refresh Data</button>
          <button class="ungani-btn dark" onclick="resetFilters()">Reset Filters</button>
        </div>
      </section>

      <section class="charts-grid" id="chartsGrid">
        <div class="empty">
          <h3>Loading charts...</h3>
          <p>Please wait.</p>
        </div>
      </section>

      <section class="ungani-card">
        <h2>Top Client Activity</h2>
        <div id="topClientsBox">
          <div class="empty">
            <h3>Loading client activity...</h3>
            <p>Please wait.</p>
          </div>
        </div>
      </section>
    `;

    window.addEventListener("load", function () {
      UnganiAdminShared.renderShell("adminRoot", {
        activeKey: "admin-charts",
        pageTitle: "Admin Charts",
        pageSubtitle: "Visual dashboard across all client activity.",
        footerTitle: "Admin Charts",
        footerVersion: "Admin Charts Version: Step 284B Dark Mode Chart Colors Fixed",
        mainHtml: pageMainHtml
      });

      UnganiAdminShared.requireAdmin({
        onNoSession: function () {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiLoginShell").classList.remove("hidden");
        },
        onBlocked: function (reason) {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiBlockedShell").classList.remove("hidden");
          document.getElementById("unganiBlockedReason").innerText = reason;
        },
        onReady: async function (admin, client) {
          currentAdmin = admin;
          supabaseClient = client;

          UnganiAdminShared.renderSidebar("adminSidebar", {
            activeKey: "admin-charts",
            adminName: admin.full_name || "Admin Workspace",
            footerTitle: "Admin Charts",
            footerVersion: "Admin Charts Version: Step 284B Dark Mode Chart Colors Fixed"
          });

          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiAppShell").classList.remove("hidden");

          await loadPageData();
        }
      });
    });

    function safe(value) {
      return UnganiAdminShared.safe(value);
    }

    function cleanText(value) {
      return UnganiAdminShared.cleanText(value);
    }

    function getCssVar(name) {
      return getComputedStyle(document.body).getPropertyValue(name).trim();
    }

    function isDarkMode() {
      return document.body.classList.contains("dark");
    }

    function chartTextColor() {
      return getCssVar("--text") || (isDarkMode() ? "#F5F5F3" : "#061C3D");
    }

    function chartSoftTextColor() {
      return getCssVar("--soft-text") || (isDarkMode() ? "#B8C3D6" : "#64748B");
    }

    function chartGridColor() {
      return isDarkMode() ? "rgba(245,245,243,0.10)" : "rgba(6,28,61,0.10)";
    }

    function chartColors() {
      if (isDarkMode()) {
        return [
          "#D4A63A",
          "#2563EB",
          "#15803D",
          "#B91C1C",
          "#C77700",
          "#F5F5F3",
          "#0F766E",
          "#7C3AED",
          "#B8C3D6",
          "#60A5FA"
        ];
      }

      return [
        "#D4A63A",
        "#2563EB",
        "#15803D",
        "#B91C1C",
        "#C77700",
        "#061C3D",
        "#0F766E",
        "#7C3AED",
        "#64748B",
        "#334155"
      ];
    }

    function getField(row, names, fallback = "") {
      for (const name of names) {
        if (row && row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return fallback;
    }

    function getTenantName(row) {
      return getField(row, ["company_name", "business_name", "name"], "Client Business");
    }

    function getTenantNameById(tenantId) {
      const tenant = dataStore.tenants.find(row => String(row.id) === String(tenantId));
      return tenant ? getTenantName(tenant) : "Unknown Client";
    }

    function getRecordDate(row) {
      return row.created_at || row.updated_at || row.event_date || row.due_date || row.expiry_date || "";
    }

    function todayDate() {
      return new Date().toISOString().slice(0, 10);
    }

    function dateInDays(days) {
      const dateObj = new Date();
      dateObj.setDate(dateObj.getDate() + days);
      return dateObj.toISOString().slice(0, 10);
    }

    function isExpiredDocument(row) {
      return row.expiry_date && String(row.expiry_date) < todayDate();
    }

    function isExpiringDocument(row) {
      return row.expiry_date &&
        String(row.expiry_date) >= todayDate() &&
        String(row.expiry_date) <= dateInDays(30);
    }

    function isOpenSupport(row) {
      const status = String(getField(row, ["status", "issue_status"], "open")).toLowerCase();
      return ["open", "new", "pending", "in_progress"].includes(status);
    }

    function isOpenTask(row) {
      const status = String(getField(row, ["status", "task_status"], "pending")).toLowerCase();
      return !["done", "completed", "closed", "cancelled"].includes(status);
    }

    function amountValue(row) {
      const raw = getField(row, ["amount", "total_amount", "value"], 0);
      const num = Number(raw);
      return isNaN(num) ? 0 : num;
    }

    function moneyType(row) {
      return String(getField(row, ["record_type", "transaction_type", "type"], "")).toLowerCase();
    }

    async function safeSelect(tableName) {
      try {
        const { data, error } = await supabaseClient
          .from(tableName)
          .select("*")
          .limit(10000);

        if (error) {
          console.log(tableName, error.message);
          return [];
        }

        return data || [];
      } catch (error) {
        console.log(tableName, error.message);
        return [];
      }
    }

    async function loadPageData() {
      UnganiAdminShared.showToast("Loading admin charts...");

      const [
        tenants,
        registrations,
        users,
        documents,
        support,
        adminMessages,
        teamMessages,
        events,
        transactions,
        tasks,
        records,
        items,
        people
      ] = await Promise.all([
        safeSelect("tenants"),
        safeSelect("registrations"),
        safeSelect("users"),
        safeSelect("documents"),
        safeSelect("support_issues"),
        safeSelect("admin_client_messages"),
        safeSelect("team_chat_messages"),
        safeSelect("business_events"),
        safeSelect("transactions"),
        safeSelect("tasks"),
        safeSelect("business_records"),
        safeSelect("business_items"),
        safeSelect("client_people")
      ]);

      dataStore = {
        tenants,
        registrations,
        users,
        documents,
        support,
        adminMessages: adminMessages.filter(row => row.is_internal !== true),
        teamMessages,
        events,
        transactions,
        tasks,
        records,
        items,
        people
      };

      fillClientFilter();
      renderMetrics();
      renderAllCharts();
      renderTopClients();

      UnganiAdminShared.showToast("Admin charts updated ✓");
    }

    function fillClientFilter() {
      const selected = document.getElementById("clientFilter").value;

      const options = dataStore.tenants
        .map(row => `<option value="${safe(row.id)}">${safe(getTenantName(row))}</option>`)
        .join("");

      document.getElementById("clientFilter").innerHTML = `<option value="">All Clients</option>${options}`;

      if (selected) {
        document.getElementById("clientFilter").value = selected;
      }
    }

    function withinDateRange(row) {
      const from = document.getElementById("dateFrom").value;
      const to = document.getElementById("dateTo").value;

      if (!from && !to) return true;

      const value = getRecordDate(row);
      if (!value) return true;

      const recordDate = String(value).slice(0, 10);

      if (from && recordDate < from) return false;
      if (to && recordDate > to) return false;

      return true;
    }

    function matchesClient(row) {
      const clientId = document.getElementById("clientFilter").value;
      if (!clientId) return true;
      return String(row.tenant_id || "") === String(clientId);
    }

    function filteredRows(key) {
      return (dataStore[key] || []).filter(row => {
        if (key === "tenants") {
          const clientId = document.getElementById("clientFilter").value;
          return !clientId || String(row.id) === String(clientId);
        }

        if (key === "registrations") {
          return withinDateRange(row);
        }

        return matchesClient(row) && withinDateRange(row);
      });
    }

    function renderMetrics() {
      const tenants = filteredRows("tenants");
      const documents = filteredRows("documents");
      const support = filteredRows("support");
      const tasks = filteredRows("tasks");
      const transactions = filteredRows("transactions");
      const adminMessages = filteredRows("adminMessages");
      const events = filteredRows("events");

      const income = transactions
        .filter(row => ["income", "sale", "sales", "revenue", "received"].includes(moneyType(row)))
        .reduce((sum, row) => sum + amountValue(row), 0);

      const expenses = transactions
        .filter(row => ["expense", "expenses", "cost", "paid"].includes(moneyType(row)))
        .reduce((sum, row) => sum + amountValue(row), 0);

      const metrics = [
        { title: "Clients", value: tenants.length, note: "Client businesses in view", cls: "green" },
        { title: "Documents", value: documents.length, note: "Document and Drive records", cls: "blue" },
        { title: "Open Support", value: support.filter(isOpenSupport).length, note: "Support needing attention", cls: support.filter(isOpenSupport).length > 0 ? "orange" : "green" },
        { title: "Open Tasks", value: tasks.filter(isOpenTask).length, note: "Tasks still open", cls: tasks.filter(isOpenTask).length > 0 ? "orange" : "green" },
        { title: "Income", value: income.toLocaleString(), note: "Recorded income / sales", cls: "green" },
        { title: "Expenses", value: expenses.toLocaleString(), note: "Recorded expenses", cls: "orange" },
        { title: "Chat Messages", value: adminMessages.length, note: "Client-admin messages", cls: "blue" },
        { title: "Calendar Events", value: events.length, note: "Business events", cls: "green" }
      ];

      document.getElementById("metricsGrid").innerHTML = metrics.map(item => `
        <div class="metric-card ${safe(item.cls)}">
          <h3>${safe(item.title)}</h3>
          <p>${safe(item.value)}</p>
          <div class="note">${safe(item.note)}</div>
        </div>
      `).join("");
    }

    function countBy(rows, getter) {
      const result = {};

      rows.forEach(row => {
        const key = getter(row) || "Unknown";
        result[key] = (result[key] || 0) + 1;
      });

      return result;
    }

    function sumBy(rows, getter, valueGetter) {
      const result = {};

      rows.forEach(row => {
        const key = getter(row) || "Unknown";
        result[key] = (result[key] || 0) + valueGetter(row);
      });

      return result;
    }

    function monthKey(value) {
      if (!value) return "Unknown";

      const d = new Date(value);
      if (isNaN(d.getTime())) return "Unknown";

      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, "0");
      return `${year}-${month}`;
    }

    function destroyCharts() {
      Object.values(charts).forEach(chart => {
        if (chart && typeof chart.destroy === "function") {
          chart.destroy();
        }
      });

      charts = {};
    }

    function createChart(id, type, title, dataObj) {
      const ctx = document.getElementById(id);
      if (!ctx) return;

      const labels = Object.keys(dataObj);
      const values = Object.values(dataObj);

      if (labels.length === 0) return;

      const palette = chartColors();
      const textColor = chartTextColor();
      const softColor = chartSoftTextColor();
      const gridColor = chartGridColor();

      charts[id] = new Chart(ctx, {
        type,
        data: {
          labels,
          datasets: [
            {
              label: title,
              data: values,
              backgroundColor: type === "line" ? "rgba(212,166,58,0.18)" : palette,
              borderColor: type === "line" ? getCssVar("--gold") || "#D4A63A" : palette,
              pointBackgroundColor: getCssVar("--gold") || "#D4A63A",
              pointBorderColor: textColor,
              pointHoverBackgroundColor: textColor,
              pointHoverBorderColor: getCssVar("--gold") || "#D4A63A",
              borderWidth: 2.5,
              tension: 0.35,
              fill: type === "line"
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          color: textColor,
          plugins: {
            legend: {
              display: type !== "bar" && type !== "line",
              labels: {
                color: textColor,
                boxWidth: 14,
                padding: 14,
                font: {
                  size: 12,
                  weight: "bold"
                }
              }
            },
            tooltip: {
              backgroundColor: isDarkMode() ? "#0B2346" : "#061C3D",
              titleColor: "#FFFFFF",
              bodyColor: "#FFFFFF",
              borderColor: getCssVar("--gold") || "#D4A63A",
              borderWidth: 1,
              padding: 12
            }
          },
          scales: type === "pie" || type === "doughnut" ? {} : {
            x: {
              ticks: {
                color: softColor,
                font: {
                  size: 11,
                  weight: "bold"
                }
              },
              grid: {
                color: gridColor
              }
            },
            y: {
              beginAtZero: true,
              ticks: {
                color: softColor,
                font: {
                  size: 11,
                  weight: "bold"
                }
              },
              grid: {
                color: gridColor
              }
            }
          }
        }
      });
    }

    function chartCard(id, title, description) {
      return `
        <div class="chart-card">
          <h2>${safe(title)}</h2>
          <p>${safe(description)}</p>
          <div class="chart-wrap">
            <canvas id="${safe(id)}"></canvas>
          </div>
        </div>
      `;
    }

    function renderAllCharts() {
      destroyCharts();
      renderMetrics();

      const focus = document.getElementById("chartFocus").value;
      const cards = [];

      if (focus === "all" || focus === "clients") {
        cards.push(chartCard("clientStatusChart", "Client Status", "Active, trial, suspended, and cancelled clients."));
        cards.push(chartCard("registrationStatusChart", "Registration Status", "Pending, approved, and rejected registrations."));
      }

      if (focus === "all" || focus === "documents") {
        cards.push(chartCard("documentSourceChart", "Document Sources", "Google Drive, external links, and manual document records."));
        cards.push(chartCard("documentExpiryChart", "Document Expiry Status", "Valid, expiring soon, and expired document records."));
      }

      if (focus === "all" || focus === "support") {
        cards.push(chartCard("supportStatusChart", "Support Status", "Open, in progress, resolved, and closed support issues."));
        cards.push(chartCard("supportPriorityChart", "Support Priority", "Normal, medium, high, and urgent support issues."));
      }

      if (focus === "all" || focus === "money") {
        cards.push(chartCard("moneyTypeChart", "Money Records by Type", "Income, sales, expenses, and other money records."));
        cards.push(chartCard("moneyMonthlyChart", "Monthly Money Activity", "Monthly totals from client money records."));
      }

      if (focus === "all" || focus === "tasks") {
        cards.push(chartCard("taskStatusChart", "Task Status", "Task and follow-up status across clients."));
        cards.push(chartCard("taskMonthlyChart", "Monthly Task Activity", "Tasks created per month."));
      }

      if (focus === "all" || focus === "chat") {
        cards.push(chartCard("chatRoleChart", "Chat Messages by Sender", "Client messages versus admin replies."));
        cards.push(chartCard("chatMonthlyChart", "Monthly Chat Activity", "Client-admin chat messages by month."));
      }

      if (focus === "all" || focus === "calendar") {
        cards.push(chartCard("calendarTypeChart", "Calendar Event Types", "Business calendar events by type."));
        cards.push(chartCard("calendarStatusChart", "Calendar Event Status", "Scheduled, completed, cancelled, and other statuses."));
      }

      if (focus === "all" || focus === "operations") {
        cards.push(chartCard("recordsTypeChart", "Business Records by Type", "Business records grouped by type."));
        cards.push(chartCard("itemsStatusChart", "Items / Assets Status", "Items, stock, and assets grouped by status."));
      }

      if (cards.length === 0) {
        document.getElementById("chartsGrid").innerHTML = `
          <div class="empty">
            <h3>No chart selected</h3>
            <p>Select a chart focus to continue.</p>
          </div>
        `;
        return;
      }

      document.getElementById("chartsGrid").innerHTML = cards.join("");

      setTimeout(drawCharts, 100);
      renderTopClients();
    }

    function drawCharts() {
      const focus = document.getElementById("chartFocus").value;

      const tenants = filteredRows("tenants");
      const registrations = filteredRows("registrations");
      const documents = filteredRows("documents");
      const support = filteredRows("support");
      const transactions = filteredRows("transactions");
      const tasks = filteredRows("tasks");
      const adminMessages = filteredRows("adminMessages");
      const events = filteredRows("events");
      const records = filteredRows("records");
      const items = filteredRows("items");

      if (focus === "all" || focus === "clients") {
        createChart(
          "clientStatusChart",
          "doughnut",
          "Client Status",
          countBy(tenants, row => cleanText(getField(row, ["account_status", "status"], "active")))
        );

        createChart(
          "registrationStatusChart",
          "pie",
          "Registration Status",
          countBy(registrations, row => cleanText(row.status || "pending"))
        );
      }

      if (focus === "all" || focus === "documents") {
        createChart(
          "documentSourceChart",
          "doughnut",
          "Document Sources",
          countBy(documents, row => cleanText(row.document_source || (row.google_drive_url ? "google_drive" : "manual")))
        );

        createChart(
          "documentExpiryChart",
          "bar",
          "Document Expiry",
          {
            Valid: documents.filter(row => !isExpiredDocument(row) && !isExpiringDocument(row)).length,
            "Expiring Soon": documents.filter(isExpiringDocument).length,
            Expired: documents.filter(isExpiredDocument).length
          }
        );
      }

      if (focus === "all" || focus === "support") {
        createChart(
          "supportStatusChart",
          "doughnut",
          "Support Status",
          countBy(support, row => cleanText(getField(row, ["status", "issue_status"], "open")))
        );

        createChart(
          "supportPriorityChart",
          "bar",
          "Support Priority",
          countBy(support, row => cleanText(row.priority || "normal"))
        );
      }

      if (focus === "all" || focus === "money") {
        createChart(
          "moneyTypeChart",
          "doughnut",
          "Money Records",
          countBy(transactions, row => cleanText(getField(row, ["record_type", "transaction_type", "type"], "record")))
        );

        createChart(
          "moneyMonthlyChart",
          "line",
          "Monthly Money Activity",
          sumBy(transactions, row => monthKey(row.created_at), row => amountValue(row))
        );
      }

      if (focus === "all" || focus === "tasks") {
        createChart(
          "taskStatusChart",
          "doughnut",
          "Task Status",
          countBy(tasks, row => cleanText(getField(row, ["status", "task_status"], "pending")))
        );

        createChart(
          "taskMonthlyChart",
          "line",
          "Monthly Task Activity",
          countBy(tasks, row => monthKey(row.created_at))
        );
      }

      if (focus === "all" || focus === "chat") {
        createChart(
          "chatRoleChart",
          "doughnut",
          "Chat Sender",
          countBy(adminMessages, row => cleanText(row.sender_role || "unknown"))
        );

        createChart(
          "chatMonthlyChart",
          "line",
          "Monthly Chat Activity",
          countBy(adminMessages, row => monthKey(row.created_at))
        );
      }

      if (focus === "all" || focus === "calendar") {
        createChart(
          "calendarTypeChart",
          "doughnut",
          "Calendar Types",
          countBy(events, row => cleanText(row.event_type || "event"))
        );

        createChart(
          "calendarStatusChart",
          "bar",
          "Calendar Status",
          countBy(events, row => cleanText(row.status || "scheduled"))
        );
      }

      if (focus === "all" || focus === "operations") {
        createChart(
          "recordsTypeChart",
          "doughnut",
          "Record Types",
          countBy(records, row => cleanText(getField(row, ["record_type", "type"], "record")))
        );

        createChart(
          "itemsStatusChart",
          "bar",
          "Item Status",
          countBy(items, row => cleanText(row.status || "recorded"))
        );
      }
    }

    function renderTopClients() {
      const clientMap = {};

      dataStore.tenants.forEach(tenant => {
        clientMap[tenant.id] = {
          id: tenant.id,
          name: getTenantName(tenant),
          documents: 0,
          support: 0,
          tasks: 0,
          money: 0,
          messages: 0,
          events: 0,
          total: 0
        };
      });

      dataStore.documents.forEach(row => addClientCount(clientMap, row.tenant_id, "documents"));
      dataStore.support.forEach(row => addClientCount(clientMap, row.tenant_id, "support"));
      dataStore.tasks.forEach(row => addClientCount(clientMap, row.tenant_id, "tasks"));
      dataStore.transactions.forEach(row => addClientCount(clientMap, row.tenant_id, "money"));
      dataStore.adminMessages.forEach(row => addClientCount(clientMap, row.tenant_id, "messages"));
      dataStore.events.forEach(row => addClientCount(clientMap, row.tenant_id, "events"));

      let rows = Object.values(clientMap)
        .map(row => {
          row.total = row.documents + row.support + row.tasks + row.money + row.messages + row.events;
          return row;
        })
        .sort((a, b) => b.total - a.total)
        .slice(0, 10);

      const selectedClient = document.getElementById("clientFilter").value;

      if (selectedClient) {
        rows = rows.filter(row => String(row.id) === String(selectedClient));
      }

      if (rows.length === 0) {
        document.getElementById("topClientsBox").innerHTML = `
          <div class="empty">
            <h3>No client activity found</h3>
            <p>Client activity will appear after records are added.</p>
          </div>
        `;
        return;
      }

      document.getElementById("topClientsBox").innerHTML = rows.map(row => `
        <div class="row-card">
          <div class="row-title">${safe(row.name)}</div>
          <p class="row-detail"><strong>Total Activity:</strong> ${safe(row.total)}</p>
          <p class="row-detail">
            Documents: ${safe(row.documents)} |
            Support: ${safe(row.support)} |
            Tasks: ${safe(row.tasks)} |
            Money: ${safe(row.money)} |
            Messages: ${safe(row.messages)} |
            Events: ${safe(row.events)}
          </p>
        </div>
      `).join("");
    }

    function addClientCount(clientMap, tenantId, key) {
      if (!tenantId || !clientMap[tenantId]) return;
      clientMap[tenantId][key] += 1;
    }

    function resetFilters() {
      document.getElementById("clientFilter").value = "";
      document.getElementById("dateFrom").value = "";
      document.getElementById("dateTo").value = "";
      document.getElementById("chartFocus").value = "all";

      renderAllCharts();
      renderTopClients();

      UnganiAdminShared.showToast("Chart filters reset ✓");
    }
  </script>
</body>
</html>
