<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - People</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-shared.js"></script>
</head>

<body>
  <script>
    let currentContext = null;
    let people = [];
    let currentEditId = null;
    let isRealEstate = false;

    window.addEventListener("load", function () {
      if (!window.UnganiClientShared) {
        document.body.innerHTML = "<h2 style='font-family:Arial;padding:30px;'>Client shared layout failed to load. Please check client-shared.js.</h2>";
        return;
      }

      UnganiClientShared.initPage({
        pageKey: "people",
        pageTitle: "People",
        pageSubtitle: "Manage staff, agents, leads, buyers, renters, tenants, contractors, and business contacts.",
        onReady: startPeoplePage
      });
    });

    async function startPeoplePage(context) {
      currentContext = context;

      const businessType = String(UnganiClientShared.getValue(context.tenant, ["business_type", "business_type_key"], "")).toLowerCase();
      const businessTypeKey = String(UnganiClientShared.getValue(context.tenant, ["business_type_key"], "")).toLowerCase();

      isRealEstate = businessType.includes("real estate") || businessTypeKey.includes("real_estate");

      const titleEl = document.querySelector(".ungani-topbar h2");
      const subEl = document.querySelector(".ungani-topbar p");

      if (titleEl) {
        titleEl.innerText = isRealEstate ? "Agents / Leads / People" : "People";
      }

      if (subEl) {
        subEl.innerText = isRealEstate
          ? "Track agents, leads, buyers, renters, tenants, contractors, assigned properties, commissions, and follow-ups."
          : "Track staff, clients, suppliers, contractors, and business contacts.";
      }

      await loadPeople();
    }

    async function loadPeople() {
      currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading people records...");

      const response = await currentContext.supabaseClient
        .from("client_people")
        .select("*")
        .eq("tenant_id", currentContext.tenantId)
        .order("created_at", { ascending: false });

      if (response.error) {
        currentContext.contentEl.innerHTML = UnganiClientShared.errorCard("Could not load people", response.error.message);
        return;
      }

      people = response.data || [];
      renderPeoplePage();
    }

    function renderPeoplePage() {
      const filtered = filterPeople();
      const summary = calculateSummary();

      UnganiClientShared.setContent(`
        <section class="ungani-card ungani-hero">
          <h2>${isRealEstate ? "Agents, Leads & Property Contacts" : "People Directory"}</h2>
          <p>
            ${isRealEstate
              ? "Manage sales agents, leads, buyers, renters, tenants, contractors, caretakers, commissions, and follow-up status."
              : "Manage people connected to your business, including staff, clients, suppliers, and contractors."
            }
          </p>

          <div class="ungani-button-row">
            <button class="ungani-btn" onclick="scrollToForm()">${currentEditId ? "Update Person" : "Add Person"}</button>
            <a class="ungani-btn green" href="my-tasks.html">Tasks / Follow-ups</a>
            <a class="ungani-btn dark" href="my-records.html">Records</a>
          </div>
        </section>

        <section class="ungani-grid">
          ${UnganiClientShared.metricCard("Total People", people.length, "All saved people records", "blue")}
          ${UnganiClientShared.metricCard("Agents", summary.agents, "Property sales/rental agents", "green")}
          ${UnganiClientShared.metricCard("Leads", summary.leads, "New and active inquiries", "orange")}
          ${UnganiClientShared.metricCard("Buyers / Renters", summary.buyersRenters, "Buyer, renter, and tenant contacts", "blue")}
          ${UnganiClientShared.metricCard("Commission", UnganiClientShared.formatKES(summary.commission), "Commission recorded this month", "gold")}
          ${UnganiClientShared.metricCard("Pending Follow-ups", summary.pendingFollowUps, "Leads needing follow-up", summary.pendingFollowUps > 0 ? "orange" : "green")}
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <h3>Filters</h3>
            <button class="ungani-btn dark" onclick="resetFilters()">Reset Filters</button>
          </div>

          <div class="ungani-form-grid">
            <div>
              <label for="filterType">Person Type</label>
              <select id="filterType" onchange="saveFilters(); renderPeoplePage();">
                <option value="">All Types</option>
                <option value="agent">Agent</option>
                <option value="lead">Lead</option>
                <option value="buyer">Buyer</option>
                <option value="renter">Renter</option>
                <option value="tenant">Tenant</option>
                <option value="landlord">Landlord</option>
                <option value="contractor">Contractor</option>
                <option value="caretaker">Caretaker</option>
                <option value="staff">Staff</option>
                <option value="supplier">Supplier</option>
                <option value="client">Client</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div>
              <label for="filterStatus">Status</label>
              <select id="filterStatus" onchange="saveFilters(); renderPeoplePage();">
                <option value="">All Statuses</option>
                <option value="active">Active</option>
                <option value="pending">Pending</option>
                <option value="closed">Closed</option>
                <option value="lost">Lost</option>
                <option value="inactive">Inactive</option>
              </select>
            </div>

            <div>
              <label for="filterLeadStatus">Lead Status</label>
              <select id="filterLeadStatus" onchange="saveFilters(); renderPeoplePage();">
                <option value="">All Lead Statuses</option>
                <option value="new">New</option>
                <option value="contacted">Contacted</option>
                <option value="viewing scheduled">Viewing Scheduled</option>
                <option value="follow up">Follow Up</option>
                <option value="under negotiation">Under Negotiation</option>
                <option value="closed">Closed</option>
                <option value="lost">Lost</option>
              </select>
            </div>

            <div>
              <label for="searchBox">Search</label>
              <input id="searchBox" placeholder="Search name, phone, property, agent..." oninput="saveFilters(); renderPeoplePage();" />
            </div>
          </div>
        </section>

        <section id="peopleFormCard" class="ungani-card">
          <div class="ungani-section-title">
            <h3>${currentEditId ? "Update Person" : "Add Person"}</h3>
            ${currentEditId ? '<button class="ungani-btn dark" onclick="cancelEdit()">Cancel Edit</button>' : ""}
          </div>

          ${renderPeopleForm()}
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <div>
                <h3>${isRealEstate ? "Agents / Leads / Contacts" : "People Records"}</h3>
                <p class="ungani-small">${filtered.length} record(s) shown</p>
              </div>

              <button class="ungani-btn green" onclick="loadPeople()">Refresh</button>
            </div>

            ${renderPeopleList(filtered)}
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>People Summary</h3>
            </div>

            ${renderSummaryPanel(filtered)}
          </div>
        </section>

        <p class="ungani-small">
          People Version: Step 305E-3 Stable Shared Layout · ungani.com · info@ungani.com
        </p>
      `);

      restoreFilters();
      fillEditForm();
    }

    function renderPeopleForm() {
      return `
        <form id="peopleForm" onsubmit="savePerson(event)">
          <div class="ungani-form-grid">
            <div>
              <label for="fullName">Full Name</label>
              <input id="fullName" required placeholder="Example: Brian Otieno" />
            </div>

            <div>
              <label for="personType">Person Type</label>
              <select id="personType">
                <option value="agent">Agent</option>
                <option value="lead">Lead</option>
                <option value="buyer">Buyer</option>
                <option value="renter">Renter</option>
                <option value="tenant">Tenant</option>
                <option value="landlord">Landlord</option>
                <option value="contractor">Contractor</option>
                <option value="caretaker">Caretaker</option>
                <option value="staff">Staff</option>
                <option value="supplier">Supplier</option>
                <option value="client">Client</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div>
              <label for="phone">Phone</label>
              <input id="phone" placeholder="Example: 0711111111" />
            </div>

            <div>
              <label for="email">Email</label>
              <input id="email" type="email" placeholder="name@example.com" />
            </div>

            <div>
              <label for="location">Location</label>
              <input id="location" placeholder="Example: Mombasa" />
            </div>

            <div>
              <label for="roleTitle">Role / Position</label>
              <input id="roleTitle" placeholder="Example: Sales Agent / Buyer Lead / Tenant" />
            </div>

            <div>
              <label for="relationshipStatus">Status</label>
              <select id="relationshipStatus">
                <option value="active">Active</option>
                <option value="pending">Pending</option>
                <option value="closed">Closed</option>
                <option value="lost">Lost</option>
                <option value="inactive">Inactive</option>
              </select>
            </div>

            <div>
              <label for="department">Department / Team</label>
              <input id="department" placeholder="Example: Sales / Rentals / Projects" />
            </div>

            <div>
              <label for="propertiesAssigned">Properties Assigned</label>
              <input id="propertiesAssigned" placeholder="Example: Clove Garden A12, Royal Atlantis B4" />
            </div>

            <div>
              <label for="dealsClosed">Deals Closed</label>
              <input id="dealsClosed" type="number" min="0" step="1" placeholder="Example: 3" />
            </div>

            <div>
              <label for="commissionEarnedMonth">Commission Earned This Month</label>
              <input id="commissionEarnedMonth" type="number" min="0" step="1" placeholder="Example: 75000" />
            </div>

            <div>
              <label for="propertyOfInterest">Property of Interest</label>
              <input id="propertyOfInterest" placeholder="Example: Clove Garden A12" />
            </div>

            <div>
              <label for="leadStatus">Lead Status</label>
              <select id="leadStatus">
                <option value="">Not a lead</option>
                <option value="new">New</option>
                <option value="contacted">Contacted</option>
                <option value="viewing scheduled">Viewing Scheduled</option>
                <option value="follow up">Follow Up</option>
                <option value="under negotiation">Under Negotiation</option>
                <option value="closed">Closed</option>
                <option value="lost">Lost</option>
              </select>
            </div>

            <div>
              <label for="assignedAgent">Assigned Agent</label>
              <input id="assignedAgent" placeholder="Example: Brian Otieno" />
            </div>

            <div>
              <label for="lastFollowUpDate">Last Follow-up Date</label>
              <input id="lastFollowUpDate" type="date" />
            </div>
          </div>

          <label for="notes">Notes</label>
          <textarea id="notes" placeholder="Add lead notes, viewing notes, commission notes, or follow-up details..."></textarea>

          <div class="ungani-button-row">
            <button class="ungani-btn green" type="submit">${currentEditId ? "Update Person" : "Add Person"}</button>
            ${currentEditId ? '<button class="ungani-btn dark" type="button" onclick="cancelEdit()">Cancel</button>' : ""}
          </div>
        </form>
      `;
    }

    function renderPeopleList(rows) {
      if (rows.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No people found</h3>
            <p>Add agents, leads, buyers, renters, tenants, contractors, or contacts above.</p>
          </div>
        `;
      }

      return rows.map(function (row) {
        return renderPersonCard(row);
      }).join("");
    }

    function renderPersonCard(row) {
      const fullName = UnganiClientShared.getValue(row, ["full_name"], "Unnamed Person");
      const personType = UnganiClientShared.getValue(row, ["person_type"], "contact");
      const status = UnganiClientShared.getValue(row, ["relationship_status"], "active");
      const phone = UnganiClientShared.getValue(row, ["phone"], "");
      const email = UnganiClientShared.getValue(row, ["email"], "");
      const location = UnganiClientShared.getValue(row, ["location"], "");
      const roleTitle = UnganiClientShared.getValue(row, ["role_title"], "");
      const notes = UnganiClientShared.getValue(row, ["notes"], "");

      const propertiesAssigned = UnganiClientShared.getValue(row, ["properties_assigned"], "");
      const dealsClosed = Number(UnganiClientShared.getValue(row, ["deals_closed"], 0) || 0);
      const commission = Number(UnganiClientShared.getValue(row, ["commission_earned_month"], 0) || 0);
      const propertyOfInterest = UnganiClientShared.getValue(row, ["property_of_interest"], "");
      const leadStatus = UnganiClientShared.getValue(row, ["lead_status"], "");
      const assignedAgent = UnganiClientShared.getValue(row, ["assigned_agent"], "");
      const lastFollowUp = UnganiClientShared.getValue(row, ["last_follow_up_date"], "");

      return `
        <div class="ungani-card" style="box-shadow:none;">
          <div class="ungani-section-title">
            <div>
              <h3>${UnganiClientShared.safe(fullName)}</h3>
              <p class="ungani-small">
                ${UnganiClientShared.safe(roleTitle || personType)}
                ${location ? " · " + UnganiClientShared.safe(location) : ""}
              </p>
            </div>

            <div>
              ${badge(personType, "blue")}
              ${badge(status, status === "active" ? "green" : status === "pending" ? "orange" : status === "inactive" ? "red" : "blue")}
              ${leadStatus ? badge(leadStatus, "orange") : ""}
            </div>
          </div>

          <section class="ungani-grid">
            ${miniDetail("Phone", phone || "N/A")}
            ${miniDetail("Email", email || "N/A")}
            ${miniDetail("Location", location || "N/A")}
            ${miniDetail("Properties Assigned", propertiesAssigned || "N/A")}
            ${miniDetail("Deals Closed", dealsClosed)}
            ${miniDetail("Commission This Month", UnganiClientShared.formatKES(commission))}
            ${miniDetail("Property of Interest", propertyOfInterest || "N/A")}
            ${miniDetail("Assigned Agent", assignedAgent || "N/A")}
            ${miniDetail("Last Follow-up", UnganiClientShared.formatDate(lastFollowUp))}
          </section>

          ${notes ? `<p class="ungani-small" style="margin-top:12px;">${UnganiClientShared.safe(notes)}</p>` : ""}

          <div class="ungani-button-row">
            <button class="ungani-btn" onclick="editPerson('${UnganiClientShared.attr(row.id)}')">Edit</button>
            <button class="ungani-btn green" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'active')">Active</button>
            <button class="ungani-btn orange" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'pending')">Pending</button>
            <button class="ungani-btn red" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'inactive')">Inactive</button>
          </div>
        </div>
      `;
    }

    function renderSummaryPanel(rows) {
      const typeSummary = {};

      rows.forEach(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["person_type"], "other")).toLowerCase();
        typeSummary[type] = (typeSummary[type] || 0) + 1;
      });

      const keys = Object.keys(typeSummary);

      if (keys.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No summary yet</h3>
            <p>Summary will appear when people records are added.</p>
          </div>
        `;
      }

      return keys.map(function (key) {
        return `
          <div class="ungani-card" style="box-shadow:none;margin-bottom:10px;">
            <strong>${UnganiClientShared.safe(toTitle(key))}</strong>
            <p class="ungani-small" style="margin:5px 0 0;">${typeSummary[key]} record(s)</p>
          </div>
        `;
      }).join("");
    }

    function calculateSummary() {
      let agents = 0;
      let leads = 0;
      let buyersRenters = 0;
      let commission = 0;
      let pendingFollowUps = 0;

      people.forEach(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["person_type"], "")).toLowerCase();
        const leadStatus = String(UnganiClientShared.getValue(row, ["lead_status"], "")).toLowerCase();

        if (type === "agent") agents++;
        if (type === "lead") leads++;
        if (type === "buyer" || type === "renter" || type === "tenant") buyersRenters++;

        commission += Number(UnganiClientShared.getValue(row, ["commission_earned_month"], 0) || 0);

        if (type === "lead" && !leadStatus.includes("closed") && !leadStatus.includes("lost")) {
          pendingFollowUps++;
        }
      });

      return {
        agents: agents,
        leads: leads,
        buyersRenters: buyersRenters,
        commission: commission,
        pendingFollowUps: pendingFollowUps
      };
    }

    function filterPeople() {
      const filterType = document.getElementById("filterType") ? UnganiClientShared.value("filterType").toLowerCase() : "";
      const filterStatus = document.getElementById("filterStatus") ? UnganiClientShared.value("filterStatus").toLowerCase() : "";
      const filterLeadStatus = document.getElementById("filterLeadStatus") ? UnganiClientShared.value("filterLeadStatus").toLowerCase() : "";
      const query = document.getElementById("searchBox") ? UnganiClientShared.value("searchBox").toLowerCase() : "";

      return people.filter(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["person_type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["relationship_status"], "")).toLowerCase();
        const leadStatus = String(UnganiClientShared.getValue(row, ["lead_status"], "")).toLowerCase();

        const haystack = [
          UnganiClientShared.getValue(row, ["full_name"], ""),
          type,
          status,
          leadStatus,
          UnganiClientShared.getValue(row, ["phone"], ""),
          UnganiClientShared.getValue(row, ["email"], ""),
          UnganiClientShared.getValue(row, ["location"], ""),
          UnganiClientShared.getValue(row, ["role_title"], ""),
          UnganiClientShared.getValue(row, ["properties_assigned"], ""),
          UnganiClientShared.getValue(row, ["property_of_interest"], ""),
          UnganiClientShared.getValue(row, ["assigned_agent"], ""),
          UnganiClientShared.getValue(row, ["notes"], "")
        ].join(" ").toLowerCase();

        if (filterType && type !== filterType) return false;
        if (filterStatus && status !== filterStatus) return false;
        if (filterLeadStatus && leadStatus !== filterLeadStatus) return false;
        if (query && !haystack.includes(query)) return false;

        return true;
      });
    }

    async function savePerson(event) {
      event.preventDefault();

      const payload = {
        full_name: UnganiClientShared.value("fullName"),
        person_type: UnganiClientShared.value("personType") || "agent",
        role_title: UnganiClientShared.value("roleTitle") || null,
        department: UnganiClientShared.value("department") || null,
        phone: UnganiClientShared.value("phone") || null,
        email: UnganiClientShared.value("email") || null,
        location: UnganiClientShared.value("location") || null,
        relationship_status: UnganiClientShared.value("relationshipStatus") || "active",
        properties_assigned: UnganiClientShared.value("propertiesAssigned") || null,
        deals_closed: integerValue("dealsClosed"),
        commission_earned_month: numberValue("commissionEarnedMonth"),
        property_of_interest: UnganiClientShared.value("propertyOfInterest") || null,
        lead_status: UnganiClientShared.value("leadStatus") || null,
        assigned_agent: UnganiClientShared.value("assignedAgent") || null,
        last_follow_up_date: UnganiClientShared.value("lastFollowUpDate") || null,
        notes: UnganiClientShared.value("notes") || null,
        updated_at: new Date().toISOString()
      };

      if (!payload.full_name) {
        alert("Please enter the name.");
        return;
      }

      let response;

      if (currentEditId) {
        response = await currentContext.supabaseClient
          .from("client_people")
          .update(payload)
          .eq("id", currentEditId)
          .eq("tenant_id", currentContext.tenantId);
      } else {
        payload.tenant_id = currentContext.tenantId;
        payload.created_by = currentContext.authUser.id;
        payload.created_at = new Date().toISOString();

        response = await currentContext.supabaseClient
          .from("client_people")
          .insert(payload);
      }

      if (response.error) {
        alert(response.error.message);
        return;
      }

      currentEditId = null;
      UnganiClientShared.showToast("Person saved ✓");
      await loadPeople();
    }

    function fillEditForm() {
      if (!currentEditId) return;

      const row = people.find(function (item) {
        return String(item.id) === String(currentEditId);
      });

      if (!row) return;

      setValue("fullName", UnganiClientShared.getValue(row, ["full_name"], ""));
      setValue("personType", UnganiClientShared.getValue(row, ["person_type"], "agent"));
      setValue("phone", UnganiClientShared.getValue(row, ["phone"], ""));
      setValue("email", UnganiClientShared.getValue(row, ["email"], ""));
      setValue("location", UnganiClientShared.getValue(row, ["location"], ""));
      setValue("roleTitle", UnganiClientShared.getValue(row, ["role_title"], ""));
      setValue("relationshipStatus", UnganiClientShared.getValue(row, ["relationship_status"], "active"));
      setValue("department", UnganiClientShared.getValue(row, ["department"], ""));
      setValue("propertiesAssigned", UnganiClientShared.getValue(row, ["properties_assigned"], ""));
      setValue("dealsClosed", UnganiClientShared.getValue(row, ["deals_closed"], 0));
      setValue("commissionEarnedMonth", UnganiClientShared.getValue(row, ["commission_earned_month"], 0));
      setValue("propertyOfInterest", UnganiClientShared.getValue(row, ["property_of_interest"], ""));
      setValue("leadStatus", UnganiClientShared.getValue(row, ["lead_status"], ""));
      setValue("assignedAgent", UnganiClientShared.getValue(row, ["assigned_agent"], ""));
      setValue("lastFollowUpDate", String(UnganiClientShared.getValue(row, ["last_follow_up_date"], "")).slice(0, 10));
      setValue("notes", UnganiClientShared.getValue(row, ["notes"], ""));
    }

    function editPerson(id) {
      currentEditId = id;
      renderPeoplePage();
      scrollToForm();
    }

    function cancelEdit() {
      currentEditId = null;
      renderPeoplePage();
      UnganiClientShared.showToast("Edit cancelled");
    }

    async function quickStatus(id, status) {
      const response = await currentContext.supabaseClient
        .from("client_people")
        .update({
          relationship_status: status,
          updated_at: new Date().toISOString()
        })
        .eq("id", id)
        .eq("tenant_id", currentContext.tenantId);

      if (response.error) {
        alert(response.error.message);
        return;
      }

      UnganiClientShared.showToast("Status updated ✓");
      await loadPeople();
    }

    function restoreFilters() {
      if (document.getElementById("filterType")) document.getElementById("filterType").value = sessionStorage.getItem("ungani_people_filter_type") || "";
      if (document.getElementById("filterStatus")) document.getElementById("filterStatus").value = sessionStorage.getItem("ungani_people_filter_status") || "";
      if (document.getElementById("filterLeadStatus")) document.getElementById("filterLeadStatus").value = sessionStorage.getItem("ungani_people_filter_lead_status") || "";
      if (document.getElementById("searchBox")) document.getElementById("searchBox").value = sessionStorage.getItem("ungani_people_search") || "";
    }

    function saveFilters() {
      if (document.getElementById("filterType")) sessionStorage.setItem("ungani_people_filter_type", UnganiClientShared.value("filterType"));
      if (document.getElementById("filterStatus")) sessionStorage.setItem("ungani_people_filter_status", UnganiClientShared.value("filterStatus"));
      if (document.getElementById("filterLeadStatus")) sessionStorage.setItem("ungani_people_filter_lead_status", UnganiClientShared.value("filterLeadStatus"));
      if (document.getElementById("searchBox")) sessionStorage.setItem("ungani_people_search", UnganiClientShared.value("searchBox"));
    }

    function resetFilters() {
      sessionStorage.removeItem("ungani_people_filter_type");
      sessionStorage.removeItem("ungani_people_filter_status");
      sessionStorage.removeItem("ungani_people_filter_lead_status");
      sessionStorage.removeItem("ungani_people_search");
      renderPeoplePage();
      UnganiClientShared.showToast("Filters reset ✓");
    }

    function badge(text, color) {
      return `<span class="ungani-badge ${UnganiClientShared.attr(color || "blue")}">${UnganiClientShared.safe(text)}</span>`;
    }

    function miniDetail(label, value) {
      return `
        <div class="ungani-card" style="margin-bottom:0;box-shadow:none;padding:14px;">
          <p class="ungani-small" style="margin:0 0 5px;">${UnganiClientShared.safe(label)}</p>
          <strong>${UnganiClientShared.safe(value)}</strong>
        </div>
      `;
    }

    function toTitle(value) {
      return String(value || "")
        .replace(/_/g, " ")
        .replace(/\w\S*/g, function (text) {
          return text.charAt(0).toUpperCase() + text.substr(1).toLowerCase();
        });
    }

    function setValue(id, value) {
      const element = document.getElementById(id);
      if (element) {
        element.value = value === null || value === undefined ? "" : value;
      }
    }

    function numberValue(id) {
      const value = Number(UnganiClientShared.value(id) || 0);
      return isNaN(value) ? 0 : value;
    }

    function integerValue(id) {
      const value = parseInt(UnganiClientShared.value(id) || "0", 10);
      return isNaN(value) ? 0 : value;
    }

    function scrollToForm() {
      setTimeout(function () {
        const card = document.getElementById("peopleFormCard");
        if (card) {
          card.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      }, 100);
    }
  </script>
</body>
</html>
