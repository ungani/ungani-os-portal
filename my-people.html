<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - People</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="pwa-register.js"></script>
  <script src="client-shared.js" onerror="window.__unganiClientSharedFailed = true;"></script>
  <script>
    (function () {
      function showUnganiLoadError() {
        if (typeof UnganiClientShared !== "undefined") return;

        var banner = document.createElement("div");
        banner.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99999;background:#B91C1C;color:#fff;padding:12px 16px;font:14px/1.4 -apple-system,sans-serif;text-align:center;";
        banner.innerHTML = "Some page resources failed to load. Please check your connection. " +
          "<button style=\"margin-left:10px;padding:4px 12px;border:none;border-radius:6px;background:#fff;color:#B91C1C;font-weight:700;cursor:pointer;\" onclick=\"window.location.reload()\">Reload</button>";

        if (document.body) {
          document.body.prepend(banner);
        } else {
          document.addEventListener("DOMContentLoaded", function () {
            document.body.prepend(banner);
          });
        }
      }

      if (window.__unganiClientSharedFailed) {
        showUnganiLoadError();
      } else {
        setTimeout(function () {
          if (typeof UnganiClientShared === "undefined") showUnganiLoadError();
        }, 4000);
      }
    })();
  </script>
  <script src="ungani-business-config.js"></script>
  <script src="ungani-analytics.js"></script>
  <script src="ungani-presets.js"></script>
  <script src="nia-assistant.js"></script>
</head>

<body>
  <script>
    let currentContext = null;
    let businessPreset = null;
    let peopleRows = [];
    let editingPersonId = null;
    let highlightApplied = false;
    let isRealEstate = false;
    let isHospitality = false;
    let unitOptions = [];
    let sectionOptions = [];
    let currentSectionFilter = "";
    let activePersonCategory = "all";
    let lastTypeRows = [];
    let lastStatusRows = [];
    let urlActionApplied = false;

    // See my-money.html for the full rationale.
    const PEOPLE_PAGE_SIZE = 50;
    let peopleSummaryRows = [];
    let peoplePageOffset = 0;
    let peopleIsLoadingMore = false;
    let peopleSearchDebounceTimer = null;

    const TILE_PALETTE = ["#D4A63A", "#2563EB", "#16A34A", "#DC2626", "#7C3AED", "#0EA5E9", "#EA580C", "#059669", "#DB2777"];

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "people",
        pageTitle: "People",
        pageSubtitle: "Manage staff, clients, suppliers, leads, and business contacts.",
        onReady: startPeoplePage
      });
    });

    async function startPeoplePage(context) {
      currentContext = context;

      if (window.UnganiAnalytics) {
        UnganiAnalytics.injectChartStyles();
      }

      businessPreset = UnganiPresets.getPreset(context.tenant);
      sectionOptions = businessPreset.selectedSectionLabels || [];
      currentSectionFilter = new URLSearchParams(window.location.search).get("section") || "";

      isRealEstate = detectRealEstate(context.tenant);
      isHospitality = detectHospitality(context.tenant);

      const titleEl = document.querySelector(".ungani-topbar h2");
      const subEl = document.querySelector(".ungani-topbar p");

      if (titleEl) {
        titleEl.innerText = businessPreset.peopleLabel;
      }

      if (subEl) {
        subEl.innerText = "People, contacts, staff, clients, suppliers, and leads for " + businessPreset.name + ".";
      }

      await loadPeopleRows();
    }

    const PEOPLE_SUMMARY_COLUMNS = "id, status, relationship_status, lead_status, person_type, type";

    function applyPeopleCommonFilters(query) {
      query = query.eq("tenant_id", currentContext.tenantId);

      if (currentSectionFilter) {
        query = query.eq("section_label", currentSectionFilter);
      }

      const filterStatus = getStoredOrInput("filterStatus", "ungani_people_filter_status").toLowerCase();
      if (filterStatus) {
        query = query.ilike("status", "%" + UnganiClientShared.escapePostgrestFilterValue(filterStatus) + "%");
      }

      const search = getStoredOrInput("filterSearch", "ungani_people_filter_search").trim();
      if (search) {
        query = query.or(UnganiClientShared.buildSearchOrFilter(["full_name", "phone", "email", "company"], search));
      }

      return query;
    }

    async function loadPeopleSummaryRows() {
      let response;

      try {
        response = await applyPeopleCommonFilters(
          currentContext.supabaseClient.from("client_people").select(PEOPLE_SUMMARY_COLUMNS)
        ).order("created_at", { ascending: false });
      } catch (error) {
        return { error: error.message || "Network error. Please check your connection." };
      }

      if (response.error) {
        return { error: response.error.message };
      }

      peopleSummaryRows = response.data || [];
      return { error: null };
    }

    function getPeopleCategoryFilteredIds() {
      const categories = buildPersonCategories();
      const category = categories.find(function (item) { return item.key === activePersonCategory; }) || categories[0];
      return peopleSummaryRows.filter(category.match).map(function (row) { return row.id; });
    }

    function peopleHasMoreRows() {
      return peoplePageOffset < getPeopleCategoryFilteredIds().length;
    }

    async function exportPeopleCsv() {
      await UnganiClientShared.exportRecordsToCsv({
        supabaseClient: currentContext.supabaseClient,
        table: "client_people",
        ids: getPeopleCategoryFilteredIds(),
        filenamePrefix: "people"
      });
    }

    async function loadPeoplePage(replace) {
      if (replace) {
        peoplePageOffset = 0;
      }

      const allIds = getPeopleCategoryFilteredIds();
      const pageIds = allIds.slice(peoplePageOffset, peoplePageOffset + PEOPLE_PAGE_SIZE);

      if (!pageIds.length) {
        if (replace) peopleRows = [];
        return { error: null };
      }

      let response;

      try {
        response = await currentContext.supabaseClient
          .from("client_people")
          .select("*")
          .in("id", pageIds)
          .order("created_at", { ascending: false });
      } catch (error) {
        return { error: error.message || "Network error. Please check your connection." };
      }

      if (response.error) {
        return { error: response.error.message };
      }

      const newRows = response.data || [];
      peopleRows = replace ? newRows : peopleRows.concat(newRows);
      peoplePageOffset += pageIds.length;

      return { error: null };
    }

    async function loadPeopleRows() {
      currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading people records...");

      const summaryResult = await loadPeopleSummaryRows();

      if (summaryResult.error) {
        UnganiClientShared.setContent(
          UnganiClientShared.errorCard("Could not load people records", summaryResult.error)
        );
        return;
      }

      const pageResult = await loadPeoplePage(true);

      if (pageResult.error) {
        UnganiClientShared.setContent(
          UnganiClientShared.errorCard("Could not load people records", pageResult.error)
        );
        return;
      }

      if (isRealEstate || isHospitality) {
        await loadUnitOptions();
      }

      renderPeoplePage();
    }

    async function refreshPeopleData() {
      const focusedId = document.activeElement ? document.activeElement.id : null;

      const summaryResult = await loadPeopleSummaryRows();

      if (summaryResult.error) {
        UnganiClientShared.showToast("Could not update people: " + summaryResult.error);
        return;
      }

      const pageResult = await loadPeoplePage(true);

      if (pageResult.error) {
        UnganiClientShared.showToast("Could not update people: " + pageResult.error);
        return;
      }

      renderPeoplePage();

      if (focusedId) {
        const el = document.getElementById(focusedId);
        if (el && typeof el.focus === "function") el.focus();
      }
    }

    async function loadMorePeopleRows() {
      if (peopleIsLoadingMore) return;
      peopleIsLoadingMore = true;

      const btn = document.getElementById("peopleLoadMoreBtn");
      if (btn) {
        btn.disabled = true;
        btn.innerText = "Loading...";
      }

      const result = await loadPeoplePage(false);

      peopleIsLoadingMore = false;

      if (result.error) {
        UnganiClientShared.showToast("Could not load more people: " + result.error);
        return;
      }

      renderPeoplePage();
    }

    function onPeopleSearchInput() {
      savePeopleFilters();

      if (peopleSearchDebounceTimer) clearTimeout(peopleSearchDebounceTimer);
      peopleSearchDebounceTimer = setTimeout(refreshPeopleData, 350);
    }

    function onPeopleStatusChange() {
      savePeopleFilters();
      refreshPeopleData();
    }

    async function loadUnitOptions() {
      try {
        const response = await currentContext.supabaseClient
          .from("business_items")
          .select("id, property_name, item_name, name, property_location, listing_type")
          .eq("tenant_id", currentContext.tenantId)
          .order("created_at", { ascending: false });

        unitOptions = (response && response.data) || [];
      } catch (error) {
        console.warn("Unit options skipped:", error.message);
        unitOptions = [];
      }
    }

    function renderPeoplePage() {
      const filteredRows = getFilteredRows();
      const categories = buildPersonCategories();
      const category = categories.find(function (item) { return item.key === activePersonCategory; }) || categories[0];
      const summaryScopeRows = peopleSummaryRows.filter(category.match);
      const summary = calculatePeopleSummary(summaryScopeRows);
      const typeRows = buildTypeRows(summaryScopeRows);
      const statusRows = buildStatusRows(summaryScopeRows);

      lastTypeRows = typeRows;
      lastStatusRows = statusRows;

      UnganiClientShared.setContent(`
        <style>
          .people-hero-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
            gap: 18px;
            align-items: stretch;
          }

          .people-preset-box {
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.09);
            border-radius: 24px;
            padding: 18px;
          }

          .people-preset-box h3 {
            color: white;
            margin: 0 0 8px;
          }

          .people-preset-box p {
            color: rgba(255,255,255,0.74);
            margin: 0;
            line-height: 1.55;
          }

          .people-chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
          }

          .people-chip {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 8px 11px;
            background: rgba(255,255,255,0.12);
            color: white;
            font-size: 12px;
            font-weight: 850;
          }

          .people-kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 18px;
          }

          .people-kpi-card {
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            background: var(--ungani-card);
            border: 1px solid var(--ungani-border);
            box-shadow: var(--ungani-shadow);
            padding: 20px;
            min-height: 140px;
          }

          .people-kpi-card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 18px;
            bottom: 18px;
            width: 5px;
            border-radius: 0 999px 999px 0;
            background: var(--accent);
          }

          .people-kpi-card span {
            color: var(--ungani-muted);
            font-size: 12px;
            font-weight: 950;
            text-transform: uppercase;
            letter-spacing: 0.055em;
          }

          .people-kpi-card h3 {
            margin: 17px 0 8px;
            font-size: clamp(25px, 3vw, 36px);
            line-height: 1;
            letter-spacing: -0.055em;
          }

          .people-kpi-card p {
            margin: 0;
            color: var(--ungani-muted);
            font-size: 13px;
          }

          .people-form-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
          }

          .people-form-grid .wide {
            grid-column: span 3;
          }

          .people-chart-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
            margin-bottom: 18px;
            align-items: start;
          }

          .people-type-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
          }

          .type-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
          }

          .type-pill {
            border: 1px solid var(--ungani-border);
            background: var(--ungani-soft);
            color: var(--ungani-text);
            border-radius: 999px;
            padding: 8px 11px;
            font-size: 12px;
            font-weight: 850;
            cursor: pointer;
          }

          .type-pill:hover {
            border-color: rgba(212,166,58,0.65);
          }

          .category-tiles {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 18px;
          }

          .category-tile {
            background: var(--ungani-card);
            border: 1px solid var(--ungani-border);
            border-left: 5px solid var(--tile-accent, var(--ungani-gold));
            border-radius: 18px;
            padding: 14px 16px;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            transition: 0.18s ease;
          }

          .category-tile:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px var(--ungani-shadow);
          }

          .category-tile.active {
            box-shadow: 0 0 0 2px var(--tile-accent, var(--ungani-gold));
          }

          .category-tile .tile-count {
            display: block;
            font-size: 22px;
            font-weight: 900;
            color: var(--ungani-text);
          }

          .category-tile .tile-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--ungani-muted);
            margin-top: 4px;
          }

          .people-table-wrap {
            overflow-x: auto;
          }

          .people-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 780px;
          }

          .people-table th {
            text-align: left;
            color: var(--ungani-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 13px 12px;
            border-bottom: 1px solid var(--ungani-border);
          }

          .people-table td {
            padding: 14px 12px;
            border-bottom: 1px solid var(--ungani-border);
            vertical-align: top;
          }

          .people-table td:first-child {
            border-left: 4px solid var(--accent, #64748B);
          }

          .people-table tbody tr {
            cursor: pointer;
          }

          .people-table tbody tr:hover td {
            background: var(--ungani-soft);
          }

          .insights-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            width: 100%;
            text-align: left;
            background: var(--ungani-card);
            border: 1px solid var(--ungani-border);
            border-left: 6px solid var(--ungani-gold);
            border-radius: 20px;
            padding: 16px 18px;
            margin-bottom: 18px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.18s ease;
          }

          .insights-banner:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px var(--ungani-shadow);
          }

          .insights-banner strong {
            font-size: 16px;
            color: var(--ungani-text);
          }

          .insights-banner .insights-sub {
            display: block;
            margin-top: 3px;
            color: var(--ungani-muted);
            font-size: 13px;
          }

          .insights-banner .insights-cta {
            color: var(--ungani-gold);
            font-weight: 800;
            font-size: 13px;
            white-space: nowrap;
          }

          .people-table .row-sub {
            display: block;
            color: var(--ungani-muted);
            font-size: 12px;
            margin-top: 2px;
          }

          @media (max-width: 1180px) {
            .people-hero-grid,
            .people-chart-grid {
              grid-template-columns: 1fr;
            }

            .people-kpi-grid {
              grid-template-columns: repeat(2, minmax(0, 1fr));
            }
          }

          @media (max-width: 720px) {
            .people-kpi-grid,
            .people-form-grid {
              grid-template-columns: 1fr;
            }

            .people-form-grid .wide {
              grid-column: span 1;
            }
          }
        </style>

        <section class="ungani-card ungani-hero">
          <div class="people-hero-grid">
            <div>
              <span class="ungani-badge gold">${UnganiClientShared.safe(businessPreset.name)}</span>
              <h2 style="font-size:clamp(32px,4vw,52px);line-height:1.02;margin:18px 0 12px;">
                People records that match your business.
              </h2>
              <p>
                Manage staff, clients, suppliers, leads, customers, drivers, agents, technicians, and other contacts using presets for ${UnganiClientShared.safe(businessPreset.name)}.
              </p>

              <div class="ungani-button-row">
                <button class="ungani-btn gold" onclick="openPersonModal()">Add Person</button>
                <button class="ungani-btn green" onclick="loadPeopleRows()">Refresh</button>
                <a class="ungani-btn light" href="my-charts.html">View Charts</a>
              </div>

              ${renderSectionSwitcher()}
            </div>

            <div class="people-preset-box">
              <h3>Business people preset active</h3>
              <p>The people roles on this page now adapt to the business type selected by the client.</p>

              <div class="people-chip-row">
                ${businessPreset.peopleTypes.slice(0, 7).map(function (item) {
                  return `<span class="people-chip">${UnganiClientShared.safe(item)}</span>`;
                }).join("")}
              </div>
            </div>
          </div>
        </section>

        ${renderCategoryTiles()}

        <section class="people-kpi-grid">
          ${peopleKpi("Total People", summary.total, "All people in view", "#2563EB")}
          ${peopleKpi("Active", summary.active, "Active contacts / staff", "#16A34A")}
          ${peopleKpi("Leads / Follow-ups", summary.leads, "People needing follow-up", "#D4A63A")}
          ${peopleKpi("Attention", summary.attention, "Inactive, lost, or blocked", summary.attention > 0 ? "#DC2626" : "#16A34A")}
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>Filters</h3>
              <p class="ungani-small">Search and filter people records.</p>
            </div>

            <button class="ungani-btn dark" onclick="resetPeopleFilters()">Reset Filters</button>
          </div>

          <div class="people-form-grid">
            <div>
              <label for="filterStatus">Status</label>
              <select id="filterStatus" onchange="onPeopleStatusChange();">
                <option value="">All Status</option>
                <option value="active">Active</option>
                <option value="lead">Lead</option>
                <option value="follow-up">Follow-up</option>
                <option value="inactive">Inactive</option>
                <option value="lost">Lost</option>
              </select>
            </div>

            <div>
              <label for="filterSearch">Search</label>
              <input id="filterSearch" placeholder="Search name, phone, email, company, notes..." oninput="onPeopleSearchInput();" />
            </div>
          </div>
        </section>

        <button type="button" class="insights-banner" onclick="openInsightsModal()">
          <span>
            <strong>📊 Insights &amp; Tools</strong>
            <span class="insights-sub">Charts, quick-fill people roles, and the people guide</span>
          </span>
          <span class="insights-cta">Open →</span>
        </button>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>People List</h3>
              <p class="ungani-small">${filteredRows.length} of ${summaryScopeRows.length} people record(s) shown.</p>
            </div>

            <div class="ungani-button-row" style="margin-top:0;">
              <button class="ungani-btn gold" onclick="openPersonModal()">+ Add Person</button>
              <button class="ungani-btn green" onclick="loadPeopleRows()">Refresh</button>
              <button class="ungani-btn dark" onclick="exportPeopleCsv()">Export CSV</button>
            </div>
          </div>

          ${renderPeopleList(filteredRows)}

          ${peopleHasMoreRows() ? `
            <div class="ungani-button-row" style="justify-content:center; margin-top:14px;">
              <button class="ungani-btn dark" id="peopleLoadMoreBtn" onclick="loadMorePeopleRows()">Load More People</button>
            </div>
          ` : ""}
        </section>

        <p class="ungani-small">
          People Version: Step 310B-4 Business-Type People Presets · ungani.com · info@ungani.com
        </p>
      `);

      restorePeopleFilters();

      applyHighlightFromUrl();
    }

    function openInsightsModal() {
      const bodyHtml = `
        <div class="people-chart-grid" style="margin-bottom:18px;">
          <div class="ungani-card ungani-chart-card" style="box-shadow:none;">
            <div class="ungani-chart-head">
              <div>
                <h3>People Roles</h3>
                <p class="ungani-small">Animated chart showing the people roles in this business.</p>
              </div>
            </div>
            ${hasValues(lastTypeRows) ? '<div class="ungani-chart-canvas-wrap"><canvas id="peopleTypeChart"></canvas></div>' : UnganiAnalytics.emptyChart("Add people records to show role breakdown.")}
          </div>

          <div class="ungani-card ungani-chart-card" style="box-shadow:none;">
            <div class="ungani-chart-head">
              <div>
                <h3>People Status</h3>
                <p class="ungani-small">Active contacts, leads, follow-ups, inactive, and attention-needed people.</p>
              </div>
            </div>
            ${hasValues(lastStatusRows) ? '<div class="ungani-chart-canvas-wrap"><canvas id="peopleStatusChart"></canvas></div>' : UnganiAnalytics.emptyChart("Add people records to show status breakdown.")}
          </div>
        </div>

        <section class="people-type-section">
          <div class="ungani-card" style="box-shadow:none;">
            <div class="ungani-section-title">
              <div>
                <h3>People Roles</h3>
                <p class="ungani-small">Quick-fill people roles for ${UnganiClientShared.safe(businessPreset.name)}.</p>
              </div>
            </div>

            <div class="type-list">
              ${businessPreset.peopleTypes.map(function (item) {
                return `<button class="type-pill" onclick="quickPersonType('${UnganiClientShared.attr(item)}')">${UnganiClientShared.safe(item)}</button>`;
              }).join("")}
            </div>
          </div>
        </section>

        <section class="ungani-card" style="box-shadow:none; margin-top:18px;">
          <div class="ungani-section-title">
            <div>
              <h3>People Guide</h3>
              <p class="ungani-small">How to keep people records useful.</p>
            </div>
          </div>

          <div class="ungani-empty" style="text-align:left;">
            <h3>Separate roles clearly</h3>
            <p>Use roles like client, supplier, driver, agent, stylist, technician, or staff so the dashboard understands the business.</p>
          </div>

          <div style="display:grid;gap:10px;margin-top:12px;">
            <div class="ungani-card" style="box-shadow:none;">
              <strong>Example role</strong>
              <p class="ungani-small">${UnganiClientShared.safe(businessPreset.peopleTypes[0] || "Client")}</p>
            </div>

            <div class="ungani-card" style="box-shadow:none;">
              <strong>Follow-ups</strong>
              <p class="ungani-small">Use relationship stage and last follow-up date to avoid losing important people.</p>
            </div>

            <div class="ungani-card" style="box-shadow:none;">
              <strong>Reports</strong>
              <p class="ungani-small">People roles help reports explain clients, staff, suppliers, leads, and active contacts.</p>
            </div>
          </div>
        </section>
      `;

      UnganiClientShared.openModal({
        title: "Insights & Tools",
        bodyHtml: bodyHtml,
        onOpen: function () {
          setTimeout(function () {
            renderPeopleCharts(lastTypeRows, lastStatusRows);
          }, 150);
        }
      });
    }

    async function applyHighlightFromUrl() {
      if (!highlightApplied) {
        const highlightId = new URLSearchParams(window.location.search).get("highlight");

        if (highlightId) {
          let row = peopleRows.find(function (item) { return String(item.id) === String(highlightId); });

          // With pagination, a deep-linked person may not be on the
          // currently loaded page - fetch it directly rather than
          // silently failing to open it.
          if (!row) {
            try {
              const lookup = await currentContext.supabaseClient
                .from("client_people")
                .select("*")
                .eq("id", highlightId)
                .eq("tenant_id", currentContext.tenantId)
                .maybeSingle();

              if (lookup.data) {
                row = lookup.data;
                peopleRows = [row].concat(peopleRows);
              }
            } catch (error) {
              console.warn("Highlight lookup failed:", error.message);
            }
          }

          if (row) {
            highlightApplied = true;
            setTimeout(function () { openPersonModal(highlightId); }, 250);
            return;
          }
        }
      }

      applyUrlActions();
    }

    function applyUrlActions() {
      if (urlActionApplied) return;

      const action = new URLSearchParams(window.location.search).get("action");
      if (action !== "add") return;

      urlActionApplied = true;
      setTimeout(function () { openPersonModal(null, {}); }, 250);
    }

    async function renderPeopleCharts(typeRows, statusRows) {
      try {
        if (hasValues(typeRows)) {
          await UnganiAnalytics.renderHorizontalBarChart("peopleTypeChart", typeRows, "People");
        }

        if (hasValues(statusRows)) {
          await UnganiAnalytics.renderDoughnutStatusChart("peopleStatusChart", statusRows);
        }
      } catch (error) {
        console.warn("People charts warning:", error.message);
      }
    }

    function renderPeopleList(rows) {
      if (!rows || rows.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No people records yet</h3>
            <p>Add your first staff member, client, supplier, lead, customer, or business contact.</p>
          </div>
        `;
      }

      return `
        <div class="people-table-wrap">
          <table class="people-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Type</th>
                <th>Contact</th>
                <th>Relationship / Follow-up</th>
                <th>Status</th>
              </tr>
            </thead>

            <tbody>
              ${rows.map(function (row) {
                const name = getPersonName(row);
                const type = getPersonType(row);
                const status = UnganiClientShared.getValue(row, ["status"], "active");
                const phone = UnganiClientShared.getValue(row, ["phone", "phone_number"], "");
                const email = UnganiClientShared.getValue(row, ["email"], "");
                const company = UnganiClientShared.getValue(row, ["company", "organization"], "");
                const role = UnganiClientShared.getValue(row, ["role_title", "position"], "");
                const relationship = UnganiClientShared.getValue(row, ["relationship_status", "lead_status"], "");
                const followUp = UnganiClientShared.getValue(row, ["last_follow_up_date"], "");

                return `
                  <tr style="--accent:${UnganiClientShared.attr(statusAccent(status))};" onclick="openPersonModal('${UnganiClientShared.attr(row.id)}')">
                    <td>
                      ${UnganiClientShared.safe(name)}
                      <span class="row-sub">${UnganiClientShared.safe(role || company || "No role/company")}</span>
                    </td>
                    <td>${UnganiClientShared.safe(type)}</td>
                    <td>
                      ${UnganiClientShared.safe(phone || "—")}
                      <span class="row-sub">${UnganiClientShared.safe(email || "No email")}</span>
                    </td>
                    <td>
                      ${UnganiClientShared.safe(relationship ? UnganiAnalytics.toTitle(relationship) : "—")}
                      <span class="row-sub">${followUp ? "Follow-up: " + UnganiClientShared.safe(UnganiClientShared.formatDate(followUp)) : "No follow-up set"}</span>
                    </td>
                    <td>${statusBadge(status)}</td>

                `;
              }).join("")}
            </tbody>
          </table>
        </div>

    }

    function peopleKpi(title, value, subtitle, accent) {
      return `
        <div class="people-kpi-card" style="--accent:${UnganiClientShared.attr(accent)};">
          <span>${UnganiClientShared.safe(title)}</span>
          <h3>${UnganiClientShared.safe(value)}</h3>
          <p>${UnganiClientShared.safe(subtitle)}</p>
        </div>
      `;
    }

    function calculatePeopleSummary(rows) {
      let active = 0;
      let leads = 0;
      let attention = 0;

      rows.forEach(function (row) {
        const status = String(UnganiClientShared.getValue(row, ["status"], "active")).toLowerCase();
        const relationship = String(UnganiClientShared.getValue(row, ["relationship_status", "lead_status"], "")).toLowerCase();

        if (status.includes("active") || relationship.includes("active") || relationship.includes("converted")) {
          active++;
        }

        if (
          status.includes("lead") ||
          status.includes("follow") ||
          relationship.includes("new") ||
          relationship.includes("contacted") ||
          relationship.includes("follow")
        ) {
          leads++;
        }

        if (
          status.includes("inactive") ||
          status.includes("lost") ||
          status.includes("blocked") ||
          relationship.includes("lost")
        ) {
          attention++;
        }
      });

      return {
        total: rows.length,
        active,
        leads,
        attention
      };
    }

    function buildTypeRows(rows) {
      const map = {};

      rows.forEach(function (row) {
        const type = UnganiClientShared.getValue(row, ["person_type", "type"], "Contact");
        map[type] = (map[type] || 0) + 1;
      });

      return UnganiAnalytics.mapToRows(map);
    }

    function buildStatusRows(rows) {
      const map = {};

      rows.forEach(function (row) {
        const status = UnganiClientShared.getValue(row, ["status"], "active");
        map[status] = (map[status] || 0) + 1;
      });

      return UnganiAnalytics.mapToRows(map);
    }

    function getPersonType(row) {
      return UnganiClientShared.getValue(row, ["person_type", "type"], "Contact");
    }

    function buildPersonCategories() {
      const knownTypes = businessPreset.peopleTypes || [];

      const categories = [
        { key: "all", label: "All People", accent: "#061C3D", match: function () { return true; } }
      ];

      knownTypes.forEach(function (type, index) {
        categories.push({
          key: "type-" + index,
          label: type,
          accent: TILE_PALETTE[index % TILE_PALETTE.length],
          match: function (row) { return getPersonType(row) === type; }
        });
      });

      categories.push({
        key: "other",
        label: "Other",
        accent: "#64748B",
        match: function (row) { return knownTypes.indexOf(getPersonType(row)) === -1; }
      });

      return categories;
    }

    function getFilteredRows() {
      return peopleRows;
    }

    async function selectPersonCategory(key) {
      activePersonCategory = key;

      const result = await loadPeoplePage(true);

      if (result.error) {
        UnganiClientShared.showToast("Could not load category: " + result.error);
        return;
      }

      renderPeoplePage();
    }

    function renderCategoryTiles() {
      const categories = buildPersonCategories();

      return `
        <section class="category-tiles">
          ${categories.map(function (category) {
            const count = peopleSummaryRows.filter(category.match).length;
            const active = category.key === activePersonCategory ? " active" : "";

            return `
              <button type="button" class="category-tile${active}" style="--tile-accent:${category.accent};" onclick="selectPersonCategory('${category.key}')">
                <span class="tile-count">${count}</span>
                <span class="tile-label">${UnganiClientShared.safe(category.label)}</span>
              </button>
            `;
          }).join("")}
        </section>
      `;
    }

    function getStoredOrInput(inputId, storageKey) {
      const el = document.getElementById(inputId);

      if (el) {
        return String(el.value || "").trim();
      }

      return String(sessionStorage.getItem(storageKey) || "").trim();
    }

    function savePeopleFilters() {
      if (document.getElementById("filterStatus")) sessionStorage.setItem("ungani_people_filter_status", UnganiClientShared.value("filterStatus"));
      if (document.getElementById("filterSearch")) sessionStorage.setItem("ungani_people_filter_search", UnganiClientShared.value("filterSearch"));
    }

    function restorePeopleFilters() {
      if (document.getElementById("filterStatus")) document.getElementById("filterStatus").value = sessionStorage.getItem("ungani_people_filter_status") || "";
      if (document.getElementById("filterSearch")) document.getElementById("filterSearch").value = sessionStorage.getItem("ungani_people_filter_search") || "";
    }

    function resetPeopleFilters() {
      sessionStorage.removeItem("ungani_people_filter_status");
      sessionStorage.removeItem("ungani_people_filter_search");
      activePersonCategory = "all";

      const statusEl = document.getElementById("filterStatus");
      const searchEl = document.getElementById("filterSearch");
      if (statusEl) statusEl.value = "";
      if (searchEl) searchEl.value = "";

      refreshPeopleData();
      UnganiClientShared.showToast("People filters reset ✓");
    }

    function quickPersonType(personType) {
      openPersonModal(null, { personType: personType });
      UnganiClientShared.showToast("Person type selected ✓");
    }

    function openPersonModal(id, presetValues) {
      const row = id ? peopleRows.find(function (item) { return String(item.id) === String(id); }) : null;

      if (id && !row) {
        UnganiClientShared.showToast("Person not found.");
        return;
      }

      editingPersonId = row ? row.id : null;

      const bodyHtml = `
        <form onsubmit="savePerson(event)">
          <div class="people-form-grid">
            <div>
              <label for="personName">Full Name</label>
              <input id="personName" placeholder="Example: John Kamau" required value="${row ? UnganiClientShared.attr(getPersonName(row)) : ""}" />
            </div>

            <div>
              <label for="personType">Person Type</label>
              <select id="personType">
                ${businessPreset.peopleTypes.map(function (item) {
                  return `<option value="${UnganiClientShared.attr(item)}">${UnganiClientShared.safe(item)}</option>`;
                }).join("")}
                ${row && businessPreset.peopleTypes.indexOf(getPersonType(row)) === -1
                  ? `<option value="${UnganiClientShared.attr(getPersonType(row))}">${UnganiClientShared.safe(getPersonType(row))}</option>`
                  : ""}
              </select>
            </div>

            <div>
              <label for="personStatus">Status</label>
              <select id="personStatus">
                <option value="active">Active</option>
                <option value="lead">Lead</option>
                <option value="follow-up">Follow-up</option>
                <option value="inactive">Inactive</option>
                <option value="lost">Lost</option>
              </select>
            </div>

            <div>
              <label for="personPhone">Phone</label>
              <input id="personPhone" placeholder="+254..." value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row, ["phone", "phone_number"], "")) : ""}" />
            </div>

            <div>
              <label for="personEmail">Email</label>
              <input id="personEmail" type="email" placeholder="name@example.com" value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row, ["email"], "")) : ""}" />
            </div>

            <div>
              <label for="personCompany">Company / Organization</label>
              <input id="personCompany" placeholder="Company, client, supplier, school..." value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row, ["company", "organization"], "")) : ""}" />
            </div>

            <div>
              <label for="personRoleTitle">Role / Position</label>
              <input id="personRoleTitle" placeholder="Manager, driver, stylist, buyer, supplier..." value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row, ["role_title", "position"], "")) : ""}" />
            </div>

            <div>
              <label for="personRelationship">Relationship Stage</label>
              <select id="personRelationship">
                <option value="">Select Stage</option>
                <option value="new">New</option>
                <option value="contacted">Contacted</option>
                <option value="follow-up">Follow-up</option>
                <option value="active">Active</option>
                <option value="converted">Converted</option>
                <option value="lost">Lost</option>
              </select>
            </div>

            <div>
              <label for="personFollowUpDate">Last Follow-up Date</label>
              <input id="personFollowUpDate" type="date" value="${row ? UnganiClientShared.attr(String(UnganiClientShared.getValue(row, ["last_follow_up_date"], "")).slice(0, 10)) : ""}" />
            </div>

            <div>
              <label for="personLocation">Location</label>
              <input id="personLocation" placeholder="Mombasa, Nyali, Nairobi, client site..." value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row, ["location"], "")) : ""}" />
            </div>

            <div class="wide">
              <label for="personAssignedWork">Assigned / Related Work</label>
              <input id="personAssignedWork" placeholder="${UnganiClientShared.attr(businessPreset.itemsLabel)} or task related to this person" value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row, ["assigned_work", "properties_assigned"], "")) : ""}" />
            </div>

            ${sectionOptions.length > 1 ? `
              <div>
                <label for="personSection">Section</label>
                <select id="personSection">
                  ${sectionOptions.map(function (label) {
                    return `<option value="${UnganiClientShared.attr(label)}">${UnganiClientShared.safe(label)}</option>`;
                  }).join("")}
                </select>
              </div>
            ` : ""}

            ${(isRealEstate || isHospitality) ? `
              <div>
                <label for="personLinkedItem">${isHospitality ? "Linked Room / Table" : "Linked Unit / Property"}</label>
                <select id="personLinkedItem">
                  <option value="">Not linked</option>
                  ${unitOptions.map(function (item) {
                    const label = UnganiClientShared.getValue(item, ["property_name", "item_name", "name"], "Unit") +
                      (UnganiClientShared.getValue(item, ["property_location"], "") ? " — " + UnganiClientShared.getValue(item, ["property_location"], "") : "");

                    return `<option value="${UnganiClientShared.attr(item.id)}">${UnganiClientShared.safe(label)}</option>`;
                  }).join("")}
                </select>
              </div>

              <div>
                <label for="personLeaseStart">${isHospitality ? "Check-in Date" : "Lease Start Date"}</label>
                <input id="personLeaseStart" type="date" value="${row ? UnganiClientShared.attr(String(UnganiClientShared.getValue(row, ["lease_start_date"], "")).slice(0, 10)) : ""}" />
              </div>

              <div>
                <label for="personLeaseEnd">${isHospitality ? "Checkout Date" : "Lease End Date"}</label>
                <input id="personLeaseEnd" type="date" value="${row ? UnganiClientShared.attr(String(UnganiClientShared.getValue(row, ["lease_end_date"], "")).slice(0, 10)) : ""}" />
              </div>
            ` : ""}

            <div class="wide">
              <label for="personNotes">Notes</label>
              <textarea id="personNotes" rows="5" placeholder="Add contact notes, follow-up details, responsibilities, client needs, supplier info...">${row ? UnganiClientShared.safe(UnganiClientShared.getValue(row, ["notes", "description"], "")) : ""}</textarea>
            </div>
          </div>

          <div class="ungani-button-row" style="margin-top:16px;">
            <button class="ungani-btn gold" type="submit">${row ? "Update Person" : "Save Person"}</button>
            ${row ? `<button class="ungani-btn red" type="button" onclick="deletePerson('${UnganiClientShared.attr(row.id)}')">Delete</button>` : ""}
            <button class="ungani-btn dark" type="button" onclick="UnganiClientShared.closeModal()">Cancel</button>
          </div>
        </form>
      `;

      UnganiClientShared.openModal({
        title: row ? "Edit Person" : "Add Person",
        bodyHtml: bodyHtml,
        onOpen: function () {
          document.getElementById("personType").value = row
            ? getPersonType(row)
            : ((presetValues && presetValues.personType) || businessPreset.peopleTypes[0] || "Contact");

          document.getElementById("personStatus").value = row ? UnganiClientShared.getValue(row, ["status"], "active") : "active";
          document.getElementById("personRelationship").value = row ? UnganiClientShared.getValue(row, ["relationship_status", "lead_status"], "") : "";

          if (isRealEstate || isHospitality) {
            if (document.getElementById("personLinkedItem")) document.getElementById("personLinkedItem").value = row ? UnganiClientShared.getValue(row, ["linked_item_id"], "") : "";
          }

          if (sectionOptions.length > 1 && document.getElementById("personSection")) {
            document.getElementById("personSection").value = row
              ? UnganiClientShared.getValue(row, ["section_label"], "")
              : (currentSectionFilter || sectionOptions[0] || "");
          }
        }
      });
    }

    async function savePerson(event) {
      event.preventDefault();

      const name = UnganiClientShared.value("personName");

      if (!name) {
        UnganiClientShared.showToast("Enter a full name.");
        return;
      }

      const payload = {
        tenant_id: currentContext.tenantId,
        full_name: name,
        person_type: UnganiClientShared.value("personType") || "Contact",
        phone: UnganiClientShared.value("personPhone") || null,
        email: UnganiClientShared.value("personEmail") || null,
        company: UnganiClientShared.value("personCompany") || null,
        role_title: UnganiClientShared.value("personRoleTitle") || null,
        status: UnganiClientShared.value("personStatus") || "active",
        relationship_status: UnganiClientShared.value("personRelationship") || null,
        location: UnganiClientShared.value("personLocation") || null,
        last_follow_up_date: UnganiClientShared.value("personFollowUpDate") || null,
        assigned_work: UnganiClientShared.value("personAssignedWork") || null,
        notes: UnganiClientShared.value("personNotes") || null
      };

      if (isRealEstate || isHospitality) {
        payload.linked_item_id = UnganiClientShared.value("personLinkedItem") || null;
        payload.lease_start_date = UnganiClientShared.value("personLeaseStart") || null;
        payload.lease_end_date = UnganiClientShared.value("personLeaseEnd") || null;
      }

      if (sectionOptions.length > 1) {
        payload.section_label = UnganiClientShared.value("personSection") || null;
      }

      let response;

      try {
        if (editingPersonId) {
          response = await currentContext.supabaseClient
            .from("client_people")
            .update(payload)
            .eq("id", editingPersonId)
            .eq("tenant_id", currentContext.tenantId);
        } else {
          response = await currentContext.supabaseClient
            .from("client_people")
            .insert([payload]);
        }
      } catch (error) {
        UnganiClientShared.showToast("Could not save person: " + (error.message || "Network error. Please check your connection."));
        return;
      }

      if (response.error) {
        UnganiClientShared.showToast("Could not save person: " + response.error.message);
        return;
      }

      UnganiClientShared.showToast(editingPersonId ? "Person updated ✓" : "Person added ✓");
      editingPersonId = null;
      UnganiClientShared.closeModal();
      await loadPeopleRows();
    }

    async function deletePerson(id) {
      if (
        window.UnganiClientShared &&
        typeof UnganiClientShared.ensureCanWrite === "function" &&
        !UnganiClientShared.ensureCanWrite("delete person record")
      ) {
        return;
      }

      const confirmed = confirm("Move this person record to Recently Deleted? You can restore it within 30 days.");

      if (!confirmed) return;

      let response;

      try {
        response = await currentContext.supabaseClient.rpc("soft_delete_ungani_record", {
          p_table_name: "client_people",
          p_record_id: id,
          p_delete_reason: "Deleted from People page"
        });
      } catch (error) {
        UnganiClientShared.showToast("Could not delete person: " + (error.message || "Network error. Please check your connection."));
        return;
      }

      if (response.error) {
        UnganiClientShared.showToast("Could not delete person: " + response.error.message);
        return;
      }

      if (response.data && response.data.ok === false) {
        UnganiClientShared.showToast(response.data.message || "Could not delete person.");
        return;
      }

      UnganiClientShared.showToast("Person moved to Recently Deleted ✓");
      UnganiClientShared.logAuditEvent("record_deleted", { entityType: "client_people", entityId: String(id), description: "Deleted from People page" });
      editingPersonId = null;
      UnganiClientShared.closeModal();
      await loadPeopleRows();
    }

    function getPersonName(row) {
      return UnganiClientShared.getValue(row, ["full_name", "name", "person_name"], "Person");
    }

    function statusBadge(status) {
      const lower = String(status || "").toLowerCase();

      if (lower.includes("active") || lower.includes("converted")) {
        return `<span class="ungani-badge green">${UnganiClientShared.safe(UnganiAnalytics.toTitle(status))}</span>`;
      }

      if (lower.includes("lost") || lower.includes("inactive") || lower.includes("blocked")) {
        return `<span class="ungani-badge red">${UnganiClientShared.safe(UnganiAnalytics.toTitle(status))}</span>`;
      }

      if (lower.includes("follow") || lower.includes("lead")) {
        return `<span class="ungani-badge gold">${UnganiClientShared.safe(UnganiAnalytics.toTitle(status))}</span>`;
      }

      return `<span class="ungani-badge blue">${UnganiClientShared.safe(UnganiAnalytics.toTitle(status || "active"))}</span>`;
    }

    function statusAccent(status) {
      const lower = String(status || "").toLowerCase();

      if (lower.includes("active") || lower.includes("converted")) return "#16A34A";
      if (lower.includes("lost") || lower.includes("inactive") || lower.includes("blocked")) return "#DC2626";
      if (lower.includes("follow") || lower.includes("lead")) return "#D4A63A";

      return "#2563EB";
    }

    function hasValues(rows) {
      return (rows || []).some(function (row) {
        return Number(row.value || 0) > 0;
      });
    }

    function renderSectionSwitcher() {
      if (sectionOptions.length <= 1) return "";

      const pills = [{ label: "All Sections", value: "" }].concat(
        sectionOptions.map(function (label) { return { label: label, value: label }; })
      );

      return `
        <div class="ungani-button-row" style="margin-top:10px;">
          ${pills.map(function (pill) {
            const active = currentSectionFilter === pill.value;
            return `<button class="ungani-btn ${active ? "gold" : "dark"}" type="button" onclick="switchSection('${UnganiClientShared.attr(pill.value)}')">${UnganiClientShared.safe(pill.label)}</button>`;
          }).join("")}
        </div>
      `;
    }

    function switchSection(value) {
      const url = new URL(window.location.href);

      if (value) {
        url.searchParams.set("section", value);
      } else {
        url.searchParams.delete("section");
      }

      window.location.href = url.toString();
    }

    function detectRealEstate(tenant) {
      if (window.UnganiBusinessConfig && typeof UnganiBusinessConfig.resolve === "function") {
        const matched = UnganiBusinessConfig.resolve(tenant);
        if (matched) return matched.key === "real_estate";
      }

      const businessType = String(UnganiClientShared.getValue(tenant, ["business_type", "business_type_key"], "")).toLowerCase();
      const businessTypeKey = String(UnganiClientShared.getValue(tenant, ["business_type_key"], "")).toLowerCase();

      return businessType.includes("real estate") || businessTypeKey.includes("real_estate");
    }

    function detectHospitality(tenant) {
      if (window.UnganiBusinessConfig && typeof UnganiBusinessConfig.resolve === "function") {
        const matched = UnganiBusinessConfig.resolve(tenant);
        if (matched) return matched.key === "hospitality";
      }

      const businessType = String(UnganiClientShared.getValue(tenant, ["business_type", "business_type_key"], "")).toLowerCase();
      const businessTypeKey = String(UnganiClientShared.getValue(tenant, ["business_type_key"], "")).toLowerCase();

      return businessType.includes("hospitality") || businessType.includes("hotel") || businessTypeKey.includes("hospitality");
    }
  </script>
