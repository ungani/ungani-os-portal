<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Admin Records</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin-shared.js"></script>

  <style>
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 24px var(--ungani-shadow);
    }

    .metric-card h3 {
      margin: 0 0 8px;
      color: var(--ungani-muted);
      font-size: 14px;
    }

    .metric-card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
      color: var(--ungani-text);
    }

    .metric-card .note {
      margin-top: 8px;
      color: var(--ungani-muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .metric-card.green { border-left-color: var(--ungani-green); }
    .metric-card.red { border-left-color: var(--ungani-red); }
    .metric-card.orange { border-left-color: var(--ungani-orange); }
    .metric-card.blue { border-left-color: var(--ungani-blue); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 8px 0 6px;
      font-size: 14px;
      color: var(--ungani-text);
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--ungani-border);
      border-radius: 12px;
      background: var(--ungani-card);
      color: var(--ungani-text);
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
    }

    .section-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-title-row h2 {
      margin: 0;
    }

    .row-card {
      background: var(--ungani-bg);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .row-card.open-card { border-left-color: var(--ungani-orange); }
    .row-card.done-card { border-left-color: var(--ungani-green); }
    .row-card.cancelled-card { border-left-color: var(--ungani-red); }
    .row-card.info-card { border-left-color: var(--ungani-blue); }

    .row-title {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 6px;
      color: var(--ungani-text);
    }

    .row-detail {
      color: var(--ungani-muted);
      margin: 5px 0;
      line-height: 1.45;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      background: #061C3D;
      color: #FFFFFF;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      text-transform: capitalize;
    }

    .badge.green { background: var(--ungani-green); }
    .badge.red { background: var(--ungani-red); }
    .badge.orange { background: var(--ungani-orange); }
    .badge.blue { background: var(--ungani-blue); }
    .badge.gold { background: var(--ungani-gold); color: #061C3D; }

    .empty {
      text-align: center;
      padding: 28px;
      background: var(--ungani-bg);
      border: 1px dashed var(--ungani-border);
      border-radius: 18px;
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--ungani-text);
    }

    .empty p {
      margin: 0;
      color: var(--ungani-muted);
    }

    .small-text {
      color: var(--ungani-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 950px) {
      .two-col {
        grid-template-columns: 1fr;
      }
    }

    .category-tiles {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .category-tile {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 5px solid var(--tile-accent, var(--ungani-gold));
      border-radius: 18px;
      padding: 14px 16px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: 0.18s ease;
    }

    .category-tile:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px var(--ungani-shadow);
    }

    .category-tile.active {
      box-shadow: 0 0 0 2px var(--tile-accent, var(--ungani-gold));
    }

    .category-tile .tile-count {
      display: block;
      font-size: 24px;
      font-weight: 900;
      color: var(--ungani-text);
    }

    .category-tile .tile-label {
      display: block;
      font-size: 12.5px;
      font-weight: 700;
      color: var(--ungani-muted);
      margin-top: 4px;
    }

    .ungani-table-wrap {
      overflow-x: auto;
    }

    .ungani-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 640px;
    }

    .ungani-table thead th {
      text-align: left;
      padding: 10px 12px;
      color: var(--ungani-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--ungani-border);
      white-space: nowrap;
    }

    .ungani-table tbody tr {
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .ungani-table tbody tr:hover {
      background: rgba(212, 166, 58, 0.08);
    }

    .ungani-table td {
      padding: 12px;
      border-bottom: 1px solid var(--ungani-border);
      vertical-align: middle;
    }

    .ungani-table td:first-child {
      border-left: 4px solid var(--accent, #64748B);
      font-weight: bold;
      color: var(--ungani-text);
    }

    .ungani-table .row-sub {
      display: block;
      font-weight: normal;
      color: var(--ungani-muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .modal-form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
    }

    .modal-form-grid-full {
      grid-column: 1 / -1;
    }

    .modal-form-grid label {
      margin-top: 0;
    }

    .modal-form-grid p {
      margin: 0;
      color: var(--ungani-muted);
      word-break: break-word;
    }

    .nudge-empty h3 {
      margin: 0 0 6px;
      color: var(--ungani-text);
      font-size: 15px;
    }

    .nudge-empty p {
      margin: 0 auto;
      max-width: 340px;
      font-size: 13px;
    }

    .nudge-icon {
      font-size: 32px;
      display: inline-block;
      margin-bottom: 8px;
      animation: unganiNudgeFloat 6s ease-in-out infinite;
    }

    @keyframes unganiNudgeFloat {
      0%, 12% { opacity: 0.5; transform: translateY(0); }
      22% { opacity: 1; transform: translateY(-6px); }
      32%, 100% { opacity: 0.5; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .nudge-icon {
        animation: none;
        opacity: 0.85;
      }
    }
  </style>
</head>

<body>
  <div id="adminRoot"></div>

  <script>
    let supabaseClient = null;
    let currentAdmin = null;

    let tenants = [];
    let records = [];
    let selectedRecordId = null;

    const pageMainHtml = `
      <section class="ungani-card ungani-hero-card">
        <div style="position: relative; z-index: 1;">
          <h2>Admin Business Records Center</h2>
          <p>
            Review client business records, notes, operational entries, follow-up logs, and general business information across all clients.
          </p>
          <div style="margin-top: 16px;">
            <a class="ungani-btn" href="admin-home.html">Admin Home</a>
            <a class="ungani-btn green" href="admin.html">Main Admin</a>
            <a class="ungani-btn blue" href="admin-reports.html">Reports</a>
            <a class="ungani-btn dark" href="admin-settings.html">Admin Settings</a>
          </div>
        </div>
      </section>

      <section class="category-tiles" id="categoryTiles">
        <div class="empty"><h3>Loading categories...</h3><p>Please wait.</p></div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>Record Filters</h2>
          <button class="ungani-btn green" onclick="loadPageData()">Refresh</button>
        </div>

        <div class="form-grid">
          <div>
            <label for="clientFilter">Client</label>
            <select id="clientFilter" onchange="renderRecordsPage()">
              <option value="">All Clients</option>
            </select>
          </div>

          <div>
            <label for="statusFilter">Status</label>
            <select id="statusFilter" onchange="renderRecordsPage()">
              <option value="">All Statuses</option>
              <option value="open">Open / Active</option>
              <option value="in_progress">In Progress</option>
              <option value="completed">Completed</option>
              <option value="closed">Closed</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>

          <div>
            <label for="dateFrom">Date From</label>
            <input id="dateFrom" type="date" onchange="renderRecordsPage()" />
          </div>

          <div>
            <label for="dateTo">Date To</label>
            <input id="dateTo" type="date" onchange="renderRecordsPage()" />
          </div>

          <div>
            <label for="searchBox">Search</label>
            <input id="searchBox" placeholder="Search business records (any category)..." oninput="renderRecordsPage()" />
          </div>
        </div>

        <div class="button-row">
          <button class="ungani-btn dark" onclick="resetFilters()">Reset Filters</button>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>Client Records Summary</h2>
        </div>

        <div id="clientSummaryBox">
          <div class="empty">
            <h3>Loading client summary...</h3>
            <p>Please wait.</p>
          </div>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>All Client Business Records</h2>
          <p class="small-text" id="recordsCountText">Loading...</p>
        </div>

        <div class="ungani-table-wrap">
          <table class="ungani-table">
            <thead>
              <tr>
                <th>Record</th>
                <th>Client</th>
                <th>Type</th>
                <th>Status</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="recordsListBox">
              <tr><td colspan="5"><div class="empty"><h3>Loading business records...</h3><p>Please wait.</p></div></td></tr>
            </tbody>
          </table>
        </div>
      </section>
    `;

    window.addEventListener("load", function () {
      UnganiAdminShared.renderShell("adminRoot", {
        activeKey: "admin-records",
        pageTitle: "Admin Records",
        pageSubtitle: "View all client business records and operational notes.",
        footerTitle: "Admin Records",
        footerVersion: "Admin Records Version: Step 290 Shared Session Added",
        mainHtml: pageMainHtml
      });

      UnganiAdminShared.requireAdmin({
        onNoSession: function () {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiLoginShell").classList.remove("hidden");
        },
        onBlocked: function (reason) {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiBlockedShell").classList.remove("hidden");
          document.getElementById("unganiBlockedReason").innerText = reason;
        },
        onReady: async function (admin, client) {
          currentAdmin = admin;
          supabaseClient = client;

          UnganiAdminShared.renderSidebar("adminSidebar", {
            activeKey: "admin-records",
            adminName: admin.full_name || "Admin Workspace",
            footerTitle: "Admin Records",
            footerVersion: "Admin Records Version: Step 290 Shared Session Added"
          });

          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiAppShell").classList.remove("hidden");

          await loadPageData();
        }
      });
    });

    function safe(value) {
      return UnganiAdminShared.safe(value);
    }

    function cleanText(value) {
      return UnganiAdminShared.cleanText(value);
    }

    function getField(row, names, fallback = "") {
      for (const name of names) {
        if (row && row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return fallback;
    }

    function getTenantName(row) {
      return getField(row, ["company_name", "business_name", "name"], "Client Business");
    }

    function getTenantNameById(tenantId) {
      const tenant = tenants.find(row => String(row.id) === String(tenantId));
      return tenant ? getTenantName(tenant) : "Unknown Client";
    }

    function getRecordTitle(row) {
      return getField(row, ["record_title", "title", "name", "subject"], "Business Record");
    }

    function getRecordType(row) {
      return String(getField(row, ["record_type", "type", "category"], "general")).toLowerCase();
    }

    function getRecordStatus(row) {
      return String(getField(row, ["status", "record_status"], "open")).toLowerCase();
    }

    function getRecordDescription(row) {
      return getField(row, ["description", "notes", "details", "message"], "");
    }

    function getRecordDate(row) {
      return getField(row, ["record_date", "created_at", "updated_at"], "");
    }

    function getRecordReference(row) {
      return getField(row, ["reference", "record_reference", "tracking_number", "document_number"], "N/A");
    }

    function getRecordLocation(row) {
      return getField(row, ["location", "place", "site"], "N/A");
    }

    function getCreatedDate(row) {
      return getField(row, ["created_at", "updated_at"], "");
    }

    function formatDateTime(value) {
      if (!value) return "N/A";

      const dateObj = new Date(value);

      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function isCompletedStatus(status) {
      return ["completed", "done", "closed", "resolved"].includes(String(status || "").toLowerCase());
    }

    function isCancelledStatus(status) {
      return ["cancelled", "canceled"].includes(String(status || "").toLowerCase());
    }

    function isOpenRecord(row) {
      const status = getRecordStatus(row);
      return !isCompletedStatus(status) && !isCancelledStatus(status);
    }

    function statusBadge(status) {
      const clean = String(status || "open").toLowerCase();

      if (isCompletedStatus(clean)) {
        return `<span class="badge green">${safe(cleanText(clean))}</span>`;
      }

      if (isCancelledStatus(clean)) {
        return `<span class="badge red">${safe(cleanText(clean))}</span>`;
      }

      if (clean === "in_progress") {
        return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
      }

      return `<span class="badge orange">${safe(cleanText(clean))}</span>`;
    }

    function typeBadge(type) {
      const clean = String(type || "general").toLowerCase();

      if (clean === "operation") return `<span class="badge blue">Operation</span>`;
      if (clean === "follow_up") return `<span class="badge gold">Follow-up</span>`;
      if (clean === "client_note") return `<span class="badge green">Client Note</span>`;
      if (clean === "meeting_note") return `<span class="badge blue">Meeting Note</span>`;
      if (clean === "delivery") return `<span class="badge orange">Delivery</span>`;
      if (clean === "issue") return `<span class="badge red">Issue</span>`;

      return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
    }

    async function safeSelect(tableName) {
      try {
        const { data, error } = await supabaseClient
          .from(tableName)
          .select("*")
          .limit(10000);

        if (error) {
          console.log(tableName, error.message);
          return [];
        }

        return data || [];
      } catch (error) {
        console.log(tableName, error.message);
        return [];
      }
    }

    async function loadPageData() {
      UnganiAdminShared.showToast("Loading business records...");

      const [tenantRows, recordRows] = await Promise.all([
        safeSelect("tenants"),
        safeSelect("business_records")
      ]);

      tenants = tenantRows;
      records = recordRows.sort((a, b) => new Date(getRecordDate(b) || 0) - new Date(getRecordDate(a) || 0));

      fillClientFilter();
      renderRecordsPage();

      UnganiAdminShared.showToast("Business records updated ✓");
    }

    function fillClientFilter() {
      const selected = document.getElementById("clientFilter").value;

      const options = tenants
        .map(row => `<option value="${safe(row.id)}">${safe(getTenantName(row))}</option>`)
        .join("");

      document.getElementById("clientFilter").innerHTML = `<option value="">All Clients</option>${options}`;

      if (selected) {
        document.getElementById("clientFilter").value = selected;
      }
    }

    function withinDateRange(row) {
      const from = document.getElementById("dateFrom").value;
      const to = document.getElementById("dateTo").value;

      if (!from && !to) return true;

      const value = getRecordDate(row);

      if (!value) return true;

      const recordDate = String(value).slice(0, 10);

      if (from && recordDate < from) return false;
      if (to && recordDate > to) return false;

      return true;
    }

    let activeRecordCategory = "all";

    const RECORD_CATEGORIES = [
      { key: "all", label: "All", accent: "#D4A63A", match: () => true },
      { key: "operation", label: "Operations", accent: "#2563EB", match: row => getRecordType(row) === "operation" },
      { key: "follow_up", label: "Follow-ups", accent: "#D4A63A", match: row => getRecordType(row) === "follow_up" },
      { key: "client_note", label: "Client Notes", accent: "#15803D", match: row => getRecordType(row) === "client_note" },
      { key: "meeting_note", label: "Meeting Notes", accent: "#2563EB", match: row => getRecordType(row) === "meeting_note" },
      { key: "delivery", label: "Deliveries", accent: "#C77700", match: row => getRecordType(row) === "delivery" },
      { key: "issue", label: "Issues", accent: "#B91C1C", match: row => getRecordType(row) === "issue" },
      { key: "other", label: "Other", accent: "#64748B", match: row => !["operation", "follow_up", "client_note", "meeting_note", "delivery", "issue"].includes(getRecordType(row)) }
    ];

    function baseFilteredRecords() {
      const clientFilter = document.getElementById("clientFilter").value;
      const statusFilter = document.getElementById("statusFilter").value;
      const query = document.getElementById("searchBox").value.toLowerCase().trim();

      let rows = [...records];

      if (clientFilter) {
        rows = rows.filter(row => String(row.tenant_id) === String(clientFilter));
      }

      if (statusFilter) {
        if (statusFilter === "open") {
          rows = rows.filter(isOpenRecord);
        } else if (statusFilter === "completed") {
          rows = rows.filter(row => isCompletedStatus(getRecordStatus(row)));
        } else {
          rows = rows.filter(row => getRecordStatus(row) === statusFilter);
        }
      }

      rows = rows.filter(withinDateRange);

      if (query) {
        rows = rows.filter(row => {
          const haystack = [
            getTenantNameById(row.tenant_id),
            getRecordTitle(row),
            getRecordType(row),
            getRecordStatus(row),
            getRecordDescription(row),
            getRecordReference(row),
            getRecordLocation(row),
            JSON.stringify(row)
          ].join(" ").toLowerCase();

          return haystack.includes(query);
        });
      }

      return rows;
    }

    function filteredRecords() {
      const rows = baseFilteredRecords();
      const category = RECORD_CATEGORIES.find(c => c.key === activeRecordCategory) || RECORD_CATEGORIES[0];

      return rows.filter(category.match);
    }

    function selectRecordCategory(key) {
      activeRecordCategory = key;
      renderRecordsPage();
    }

    function renderCategoryTiles() {
      const rows = baseFilteredRecords();

      document.getElementById("categoryTiles").innerHTML = RECORD_CATEGORIES.map(category => {
        const count = rows.filter(category.match).length;
        const isActive = category.key === activeRecordCategory;

        return `
          <button type="button" class="category-tile${isActive ? " active" : ""}" style="--tile-accent:${category.accent};" onclick="selectRecordCategory('${category.key}')">
            <span class="tile-count">${safe(count)}</span>
            <span class="tile-label">${safe(category.label)}</span>
          </button>
        `;
      }).join("");
    }

    function renderRecordsPage() {
      renderCategoryTiles();
      renderClientSummary();
      renderRecordsList();
    }

    function renderClientSummary() {
      const rows = filteredRecords();
      const clientMap = {};

      tenants.forEach(tenant => {
        clientMap[tenant.id] = {
          id: tenant.id,
          name: getTenantName(tenant),
          total: 0,
          open: 0,
          completed: 0,
          operations: 0,
          followUps: 0,
          issues: 0
        };
      });

      rows.forEach(row => {
        const tenantId = row.tenant_id;

        if (!tenantId || !clientMap[tenantId]) return;

        clientMap[tenantId].total += 1;

        if (isOpenRecord(row)) clientMap[tenantId].open += 1;
        if (isCompletedStatus(getRecordStatus(row))) clientMap[tenantId].completed += 1;
        if (getRecordType(row) === "operation") clientMap[tenantId].operations += 1;
        if (getRecordType(row) === "follow_up") clientMap[tenantId].followUps += 1;
        if (getRecordType(row) === "issue") clientMap[tenantId].issues += 1;
      });

      const summaryRows = Object.values(clientMap)
        .filter(row => row.total > 0)
        .sort((a, b) => b.issues - a.issues || b.open - a.open || b.total - a.total)
        .slice(0, 10);

      if (summaryRows.length === 0) {
        document.getElementById("clientSummaryBox").innerHTML = `
          <div class="empty">
            <h3>No client record summary yet</h3>
            <p>Client record summary will appear after business records are added.</p>
          </div>
        `;
        return;
      }

      document.getElementById("clientSummaryBox").innerHTML = summaryRows.map(row => `
        <div class="row-card ${row.issues > 0 ? "cancelled-card" : row.open > 0 ? "open-card" : "done-card"}">
          <div class="row-title">${safe(row.name)}</div>
          <p class="row-detail"><strong>Total Records:</strong> ${safe(row.total)}</p>
          <p class="row-detail"><strong>Open:</strong> ${safe(row.open)}</p>
          <p class="row-detail"><strong>Completed:</strong> ${safe(row.completed)}</p>
          <p class="row-detail"><strong>Operations:</strong> ${safe(row.operations)}</p>
          <p class="row-detail"><strong>Follow-ups:</strong> ${safe(row.followUps)}</p>
          <p class="row-detail"><strong>Issues:</strong> ${safe(row.issues)}</p>
          ${row.issues > 0 ? `<span class="badge red">Issues found</span>` : row.open > 0 ? `<span class="badge orange">Open records</span>` : `<span class="badge green">Clear</span>`}
        </div>
      `).join("");
    }

    function statusAccent(status) {
      const clean = String(status || "open").toLowerCase();
      if (isCompletedStatus(clean)) return "#15803D";
      if (isCancelledStatus(clean)) return "#B91C1C";
      if (clean === "in_progress") return "#2563EB";
      return "#C77700";
    }

    function emptyStateNudge(icon, title, message) {
      return `
        <div class="empty nudge-empty">
          <div class="nudge-icon" aria-hidden="true">${icon}</div>
          <h3>${safe(title)}</h3>
          <p>${safe(message)}</p>
        </div>
      `;
    }

    let lastRenderedRecords = [];

    function renderRecordsList() {
      const rows = filteredRecords();
      lastRenderedRecords = rows;

      document.getElementById("recordsCountText").innerText = `${rows.length} business record(s) shown`;

      if (rows.length === 0) {
        document.getElementById("recordsListBox").innerHTML =
          '<tr><td colspan="5">' +
          emptyStateNudge("🗂️", "No business records found", "Try changing the category, filters, or wait for clients to add records.") +
          '</td></tr>';
        return;
      }

      document.getElementById("recordsListBox").innerHTML = rows.map((row, index) => `
        <tr style="--accent:${statusAccent(getRecordStatus(row))};" onclick="openRecordModal(${index})">
          <td>${safe(getRecordTitle(row))}<span class="row-sub">${safe(getRecordReference(row))}</span></td>
          <td>${safe(getTenantNameById(row.tenant_id))}</td>
          <td>${typeBadge(getRecordType(row))}</td>
          <td>${statusBadge(getRecordStatus(row))}</td>
          <td>${safe(formatDateTime(getRecordDate(row)))}</td>
        </tr>
      `).join("");
    }

    function openRecordModal(index) {
      const row = lastRenderedRecords[index];

      if (!row) {
        UnganiAdminShared.showToast("Record not found - refresh and try again.");
        return;
      }

      selectedRecordId = row.id;

      const bodyHtml = `
        <div class="modal-form-grid">
          <div>
            <label>Client</label>
            <p>${safe(getTenantNameById(row.tenant_id))}</p>
          </div>
          <div>
            <label>Type</label>
            <p>${typeBadge(getRecordType(row))}</p>
          </div>
          <div>
            <label>Reference</label>
            <p>${safe(getRecordReference(row))}</p>
          </div>
          <div>
            <label>Location</label>
            <p>${safe(getRecordLocation(row))}</p>
          </div>
          <div>
            <label>Date</label>
            <p>${safe(formatDateTime(getRecordDate(row)))}</p>
          </div>
          <div class="modal-form-grid-full">
            <label>Description</label>
            <p>${safe(getRecordDescription(row) || "N/A")}</p>
          </div>
        </div>

        <label for="editStatus">Update Status</label>
        <select id="editStatus">
          <option value="open">Open</option>
          <option value="in_progress">In Progress</option>
          <option value="completed">Completed</option>
          <option value="closed">Closed</option>
          <option value="cancelled">Cancelled</option>
        </select>

        <div class="button-row">
          <button class="ungani-btn green" onclick="saveSelectedRecordStatus()">Save Status</button>
          <button class="ungani-btn blue" onclick="quickUpdateStatus('${safe(row.id)}','in_progress')">Mark In Progress</button>
          <button class="ungani-btn green" onclick="quickUpdateStatus('${safe(row.id)}','completed')">Mark Completed</button>
          <button class="ungani-btn red" onclick="quickUpdateStatus('${safe(row.id)}','closed')">Close Record</button>
        </div>
      `;

      UnganiAdminShared.openModal({
        title: getRecordTitle(row),
        bodyHtml: bodyHtml,
        onOpen: function () {
          const currentStatus = getRecordStatus(row);

          if (isCompletedStatus(currentStatus)) {
            document.getElementById("editStatus").value = "completed";
          } else if (isCancelledStatus(currentStatus)) {
            document.getElementById("editStatus").value = "cancelled";
          } else if (currentStatus === "in_progress") {
            document.getElementById("editStatus").value = "in_progress";
          } else {
            document.getElementById("editStatus").value = "open";
          }
        }
      });
    }

    async function updateRecordStatus(recordId, status) {
      const { error } = await supabaseClient
        .from("business_records")
        .update({
          status,
          updated_at: new Date().toISOString()
        })
        .eq("id", recordId);

      if (error) {
        alert(error.message);
        return false;
      }

      return true;
    }

    async function quickUpdateStatus(recordId, status) {
      const ok = await updateRecordStatus(recordId, status);

      if (!ok) return;

      selectedRecordId = recordId;

      UnganiAdminShared.closeModal();
      UnganiAdminShared.showToast("Business record status updated ✓");
      await loadPageData();
    }

    async function saveSelectedRecordStatus() {
      if (!selectedRecordId) {
        alert("No record selected.");
        return;
      }

      const status = document.getElementById("editStatus").value;
      const ok = await updateRecordStatus(selectedRecordId, status);

      if (!ok) return;

      UnganiAdminShared.closeModal();
      UnganiAdminShared.showToast("Business record status saved ✓");
      await loadPageData();
    }

    function resetFilters() {
      document.getElementById("clientFilter").value = "";
      document.getElementById("statusFilter").value = "";
      document.getElementById("dateFrom").value = "";
      document.getElementById("dateTo").value = "";
      document.getElementById("searchBox").value = "";
      activeRecordCategory = "all";

      renderRecordsPage();

      UnganiAdminShared.showToast("Record filters reset ✓");
    }
  </script>
</body>
</html>
