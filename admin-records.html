<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Admin Records</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin-shared.js"></script>

  <style>
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 6px solid var(--gold);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 24px var(--shadow);
    }

    .metric-card h3 {
      margin: 0 0 8px;
      color: var(--soft-text);
      font-size: 14px;
    }

    .metric-card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
      color: var(--text);
    }

    .metric-card .note {
      margin-top: 8px;
      color: var(--soft-text);
      font-size: 12px;
      line-height: 1.4;
    }

    .metric-card.green { border-left-color: var(--green); }
    .metric-card.red { border-left-color: var(--red); }
    .metric-card.orange { border-left-color: var(--orange); }
    .metric-card.blue { border-left-color: var(--blue); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 8px 0 6px;
      font-size: 14px;
      color: var(--text);
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--input-bg);
      color: var(--text);
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
      background: var(--gold);
      color: #061C3D;
      text-decoration: none;
      display: inline-block;
    }

    .btn.dark {
      background: #061C3D;
      color: #FFFFFF;
    }

    body.dark .btn.dark {
      background: #F5F5F3;
      color: #061C3D;
    }

    .btn.green { background: var(--green); color: #FFFFFF; }
    .btn.red { background: var(--red); color: #FFFFFF; }
    .btn.orange { background: var(--orange); color: #FFFFFF; }
    .btn.blue { background: var(--blue); color: #FFFFFF; }

    .two-col {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
    }

    .section-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-title-row h2 {
      margin: 0;
    }

    .row-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-left: 6px solid var(--gold);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .row-card.open-card { border-left-color: var(--orange); }
    .row-card.done-card { border-left-color: var(--green); }
    .row-card.cancelled-card { border-left-color: var(--red); }
    .row-card.info-card { border-left-color: var(--blue); }

    .row-title {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 6px;
      color: var(--text);
    }

    .row-detail {
      color: var(--soft-text);
      margin: 5px 0;
      line-height: 1.45;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      background: #061C3D;
      color: #FFFFFF;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      text-transform: capitalize;
    }

    .badge.green { background: var(--green); }
    .badge.red { background: var(--red); }
    .badge.orange { background: var(--orange); }
    .badge.blue { background: var(--blue); }
    .badge.gold { background: var(--gold); color: #061C3D; }

    .empty {
      text-align: center;
      padding: 28px;
      background: var(--bg);
      border: 1px dashed var(--border);
      border-radius: 18px;
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--text);
    }

    .empty p {
      margin: 0;
      color: var(--soft-text);
    }

    .small-text {
      color: var(--soft-text);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 950px) {
      .two-col {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="adminRoot"></div>

  <script>
    let supabaseClient = null;
    let currentAdmin = null;

    let tenants = [];
    let records = [];
    let selectedRecordId = null;

    const pageMainHtml = `
      <section class="ungani-card ungani-hero-card">
        <div style="position: relative; z-index: 1;">
          <h2>Admin Business Records Center</h2>
          <p>
            Review client business records, notes, operational entries, follow-up logs, and general business information across all clients.
          </p>
          <div style="margin-top: 16px;">
            <a class="btn" href="admin-home.html">Admin Home</a>
            <a class="btn green" href="admin.html">Main Admin</a>
            <a class="btn blue" href="admin-reports.html">Reports</a>
            <a class="btn dark" href="admin-settings.html">Admin Settings</a>
          </div>
        </div>
      </section>

      <section class="page-grid" id="metricsGrid">
        <div class="metric-card"><h3>Loading</h3><p>...</p><div class="note">Please wait</div></div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>Record Filters</h2>
          <button class="btn green" onclick="loadPageData()">Refresh</button>
        </div>

        <div class="form-grid">
          <div>
            <label for="clientFilter">Client</label>
            <select id="clientFilter" onchange="renderRecordsPage()">
              <option value="">All Clients</option>
            </select>
          </div>

          <div>
            <label for="typeFilter">Record Type</label>
            <select id="typeFilter" onchange="renderRecordsPage()">
              <option value="">All Types</option>
              <option value="general">General</option>
              <option value="operation">Operation</option>
              <option value="follow_up">Follow-up</option>
              <option value="client_note">Client Note</option>
              <option value="meeting_note">Meeting Note</option>
              <option value="delivery">Delivery</option>
              <option value="issue">Issue</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div>
            <label for="statusFilter">Status</label>
            <select id="statusFilter" onchange="renderRecordsPage()">
              <option value="">All Statuses</option>
              <option value="open">Open / Active</option>
              <option value="in_progress">In Progress</option>
              <option value="completed">Completed</option>
              <option value="closed">Closed</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>

          <div>
            <label for="dateFrom">Date From</label>
            <input id="dateFrom" type="date" onchange="renderRecordsPage()" />
          </div>

          <div>
            <label for="dateTo">Date To</label>
            <input id="dateTo" type="date" onchange="renderRecordsPage()" />
          </div>

          <div>
            <label for="searchBox">Search</label>
            <input id="searchBox" placeholder="Search business records..." oninput="renderRecordsPage()" />
          </div>
        </div>

        <div class="button-row">
          <button class="btn dark" onclick="resetFilters()">Reset Filters</button>
        </div>
      </section>

      <section class="two-col">
        <div class="ungani-card">
          <div class="section-title-row">
            <h2>Client Records Summary</h2>
          </div>

          <div id="clientSummaryBox">
            <div class="empty">
              <h3>Loading client summary...</h3>
              <p>Please wait.</p>
            </div>
          </div>
        </div>

        <div class="ungani-card">
          <div class="section-title-row">
            <h2 id="selectedRecordTitle">Selected Record</h2>
          </div>

          <div id="selectedRecordBox">
            <div class="empty">
              <h3>No record selected</h3>
              <p>Select a business record below to view details or update status.</p>
            </div>
          </div>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>All Client Business Records</h2>
          <p class="small-text" id="recordsCountText">Loading...</p>
        </div>

        <div id="recordsListBox">
          <div class="empty">
            <h3>Loading business records...</h3>
            <p>Please wait.</p>
          </div>
        </div>
      </section>
    `;

    window.addEventListener("load", function () {
      UnganiAdminShared.renderShell("adminRoot", {
        activeKey: "admin-records",
        pageTitle: "Admin Records",
        pageSubtitle: "View all client business records and operational notes.",
        footerTitle: "Admin Records",
        footerVersion: "Admin Records Version: Step 290 Shared Session Added",
        mainHtml: pageMainHtml
      });

      UnganiAdminShared.requireAdmin({
        onNoSession: function () {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiLoginShell").classList.remove("hidden");
        },
        onBlocked: function (reason) {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiBlockedShell").classList.remove("hidden");
          document.getElementById("unganiBlockedReason").innerText = reason;
        },
        onReady: async function (admin, client) {
          currentAdmin = admin;
          supabaseClient = client;

          UnganiAdminShared.renderSidebar("adminSidebar", {
            activeKey: "admin-records",
            adminName: admin.full_name || "Admin Workspace",
            footerTitle: "Admin Records",
            footerVersion: "Admin Records Version: Step 290 Shared Session Added"
          });

          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiAppShell").classList.remove("hidden");

          await loadPageData();
        }
      });
    });

    function safe(value) {
      return UnganiAdminShared.safe(value);
    }

    function cleanText(value) {
      return UnganiAdminShared.cleanText(value);
    }

    function getField(row, names, fallback = "") {
      for (const name of names) {
        if (row && row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return fallback;
    }

    function getTenantName(row) {
      return getField(row, ["company_name", "business_name", "name"], "Client Business");
    }

    function getTenantNameById(tenantId) {
      const tenant = tenants.find(row => String(row.id) === String(tenantId));
      return tenant ? getTenantName(tenant) : "Unknown Client";
    }

    function getRecordTitle(row) {
      return getField(row, ["record_title", "title", "name", "subject"], "Business Record");
    }

    function getRecordType(row) {
      return String(getField(row, ["record_type", "type", "category"], "general")).toLowerCase();
    }

    function getRecordStatus(row) {
      return String(getField(row, ["status", "record_status"], "open")).toLowerCase();
    }

    function getRecordDescription(row) {
      return getField(row, ["description", "notes", "details", "message"], "");
    }

    function getRecordDate(row) {
      return getField(row, ["record_date", "created_at", "updated_at"], "");
    }

    function getRecordReference(row) {
      return getField(row, ["reference", "record_reference", "tracking_number", "document_number"], "N/A");
    }

    function getRecordLocation(row) {
      return getField(row, ["location", "place", "site"], "N/A");
    }

    function getCreatedDate(row) {
      return getField(row, ["created_at", "updated_at"], "");
    }

    function formatDateTime(value) {
      if (!value) return "N/A";

      const dateObj = new Date(value);

      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function isCompletedStatus(status) {
      return ["completed", "done", "closed", "resolved"].includes(String(status || "").toLowerCase());
    }

    function isCancelledStatus(status) {
      return ["cancelled", "canceled"].includes(String(status || "").toLowerCase());
    }

    function isOpenRecord(row) {
      const status = getRecordStatus(row);
      return !isCompletedStatus(status) && !isCancelledStatus(status);
    }

    function statusBadge(status) {
      const clean = String(status || "open").toLowerCase();

      if (isCompletedStatus(clean)) {
        return `<span class="badge green">${safe(cleanText(clean))}</span>`;
      }

      if (isCancelledStatus(clean)) {
        return `<span class="badge red">${safe(cleanText(clean))}</span>`;
      }

      if (clean === "in_progress") {
        return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
      }

      return `<span class="badge orange">${safe(cleanText(clean))}</span>`;
    }

    function typeBadge(type) {
      const clean = String(type || "general").toLowerCase();

      if (clean === "operation") return `<span class="badge blue">Operation</span>`;
      if (clean === "follow_up") return `<span class="badge gold">Follow-up</span>`;
      if (clean === "client_note") return `<span class="badge green">Client Note</span>`;
      if (clean === "meeting_note") return `<span class="badge blue">Meeting Note</span>`;
      if (clean === "delivery") return `<span class="badge orange">Delivery</span>`;
      if (clean === "issue") return `<span class="badge red">Issue</span>`;

      return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
    }

    function recordCardClass(row) {
      const status = getRecordStatus(row);

      if (isCompletedStatus(status)) return "done-card";
      if (isCancelledStatus(status)) return "cancelled-card";
      if (status === "in_progress") return "info-card";
      return "open-card";
    }

    async function safeSelect(tableName) {
      try {
        const { data, error } = await supabaseClient
          .from(tableName)
          .select("*")
          .limit(10000);

        if (error) {
          console.log(tableName, error.message);
          return [];
        }

        return data || [];
      } catch (error) {
        console.log(tableName, error.message);
        return [];
      }
    }

    async function loadPageData() {
      UnganiAdminShared.showToast("Loading business records...");

      const [tenantRows, recordRows] = await Promise.all([
        safeSelect("tenants"),
        safeSelect("business_records")
      ]);

      tenants = tenantRows;
      records = recordRows.sort((a, b) => new Date(getRecordDate(b) || 0) - new Date(getRecordDate(a) || 0));

      fillClientFilter();
      renderRecordsPage();

      if (selectedRecordId) {
        renderSelectedRecord(selectedRecordId);
      }

      UnganiAdminShared.showToast("Business records updated ✓");
    }

    function fillClientFilter() {
      const selected = document.getElementById("clientFilter").value;

      const options = tenants
        .map(row => `<option value="${safe(row.id)}">${safe(getTenantName(row))}</option>`)
        .join("");

      document.getElementById("clientFilter").innerHTML = `<option value="">All Clients</option>${options}`;

      if (selected) {
        document.getElementById("clientFilter").value = selected;
      }
    }

    function withinDateRange(row) {
      const from = document.getElementById("dateFrom").value;
      const to = document.getElementById("dateTo").value;

      if (!from && !to) return true;

      const value = getRecordDate(row);

      if (!value) return true;

      const recordDate = String(value).slice(0, 10);

      if (from && recordDate < from) return false;
      if (to && recordDate > to) return false;

      return true;
    }

    function filteredRecords() {
      const clientFilter = document.getElementById("clientFilter").value;
      const typeFilter = document.getElementById("typeFilter").value;
      const statusFilter = document.getElementById("statusFilter").value;
      const query = document.getElementById("searchBox").value.toLowerCase().trim();

      let rows = [...records];

      if (clientFilter) {
        rows = rows.filter(row => String(row.tenant_id) === String(clientFilter));
      }

      if (typeFilter) {
        rows = rows.filter(row => getRecordType(row) === typeFilter);
      }

      if (statusFilter) {
        if (statusFilter === "open") {
          rows = rows.filter(isOpenRecord);
        } else if (statusFilter === "completed") {
          rows = rows.filter(row => isCompletedStatus(getRecordStatus(row)));
        } else {
          rows = rows.filter(row => getRecordStatus(row) === statusFilter);
        }
      }

      rows = rows.filter(withinDateRange);

      if (query) {
        rows = rows.filter(row => {
          const haystack = [
            getTenantNameById(row.tenant_id),
            getRecordTitle(row),
            getRecordType(row),
            getRecordStatus(row),
            getRecordDescription(row),
            getRecordReference(row),
            getRecordLocation(row),
            JSON.stringify(row)
          ].join(" ").toLowerCase();

          return haystack.includes(query);
        });
      }

      return rows;
    }

    function renderRecordsPage() {
      renderMetrics();
      renderClientSummary();
      renderRecordsList();
    }

    function renderMetrics() {
      const rows = filteredRecords();

      const open = rows.filter(isOpenRecord).length;
      const inProgress = rows.filter(row => getRecordStatus(row) === "in_progress").length;
      const completed = rows.filter(row => isCompletedStatus(getRecordStatus(row))).length;
      const cancelled = rows.filter(row => isCancelledStatus(getRecordStatus(row))).length;
      const operations = rows.filter(row => getRecordType(row) === "operation").length;
      const followUps = rows.filter(row => getRecordType(row) === "follow_up").length;
      const issues = rows.filter(row => getRecordType(row) === "issue").length;

      const metrics = [
        { title: "Total Records", value: rows.length, note: "Business records in current view", cls: "blue" },
        { title: "Open / Active", value: open, note: "Records still active or open", cls: open > 0 ? "orange" : "green" },
        { title: "In Progress", value: inProgress, note: "Records currently being handled", cls: "blue" },
        { title: "Completed / Closed", value: completed, note: "Completed business records", cls: "green" },
        { title: "Cancelled", value: cancelled, note: "Cancelled records", cls: cancelled > 0 ? "red" : "green" },
        { title: "Operations", value: operations, note: "Operational records", cls: "blue" },
        { title: "Follow-ups", value: followUps, note: "Follow-up records", cls: "orange" },
        { title: "Issues", value: issues, note: "Issue-related records", cls: issues > 0 ? "red" : "green" }
      ];

      document.getElementById("metricsGrid").innerHTML = metrics.map(item => `
        <div class="metric-card ${safe(item.cls)}">
          <h3>${safe(item.title)}</h3>
          <p>${safe(item.value)}</p>
          <div class="note">${safe(item.note)}</div>
        </div>
      `).join("");
    }

    function renderClientSummary() {
      const rows = filteredRecords();
      const clientMap = {};

      tenants.forEach(tenant => {
        clientMap[tenant.id] = {
          id: tenant.id,
          name: getTenantName(tenant),
          total: 0,
          open: 0,
          completed: 0,
          operations: 0,
          followUps: 0,
          issues: 0
        };
      });

      rows.forEach(row => {
        const tenantId = row.tenant_id;

        if (!tenantId || !clientMap[tenantId]) return;

        clientMap[tenantId].total += 1;

        if (isOpenRecord(row)) clientMap[tenantId].open += 1;
        if (isCompletedStatus(getRecordStatus(row))) clientMap[tenantId].completed += 1;
        if (getRecordType(row) === "operation") clientMap[tenantId].operations += 1;
        if (getRecordType(row) === "follow_up") clientMap[tenantId].followUps += 1;
        if (getRecordType(row) === "issue") clientMap[tenantId].issues += 1;
      });

      const summaryRows = Object.values(clientMap)
        .filter(row => row.total > 0)
        .sort((a, b) => b.issues - a.issues || b.open - a.open || b.total - a.total)
        .slice(0, 10);

      if (summaryRows.length === 0) {
        document.getElementById("clientSummaryBox").innerHTML = `
          <div class="empty">
            <h3>No client record summary yet</h3>
            <p>Client record summary will appear after business records are added.</p>
          </div>
        `;
        return;
      }

      document.getElementById("clientSummaryBox").innerHTML = summaryRows.map(row => `
        <div class="row-card ${row.issues > 0 ? "cancelled-card" : row.open > 0 ? "open-card" : "done-card"}">
          <div class="row-title">${safe(row.name)}</div>
          <p class="row-detail"><strong>Total Records:</strong> ${safe(row.total)}</p>
          <p class="row-detail"><strong>Open:</strong> ${safe(row.open)}</p>
          <p class="row-detail"><strong>Completed:</strong> ${safe(row.completed)}</p>
          <p class="row-detail"><strong>Operations:</strong> ${safe(row.operations)}</p>
          <p class="row-detail"><strong>Follow-ups:</strong> ${safe(row.followUps)}</p>
          <p class="row-detail"><strong>Issues:</strong> ${safe(row.issues)}</p>
          ${row.issues > 0 ? `<span class="badge red">Issues found</span>` : row.open > 0 ? `<span class="badge orange">Open records</span>` : `<span class="badge green">Clear</span>`}
        </div>
      `).join("");
    }

    function renderRecordsList() {
      const rows = filteredRecords();

      document.getElementById("recordsCountText").innerText = `${rows.length} business record(s) shown`;

      if (rows.length === 0) {
        document.getElementById("recordsListBox").innerHTML = `
          <div class="empty">
            <h3>No business records found</h3>
            <p>Try changing the filters or wait for clients to add records.</p>
          </div>
        `;
        return;
      }

      document.getElementById("recordsListBox").innerHTML = rows.map(row => `
        <div class="row-card ${safe(recordCardClass(row))}">
          <div class="row-title">${safe(getRecordTitle(row))}</div>
          <p class="row-detail"><strong>Client:</strong> ${safe(getTenantNameById(row.tenant_id))}</p>
          <p class="row-detail"><strong>Description:</strong> ${safe(getRecordDescription(row) || "N/A")}</p>
          <p class="row-detail"><strong>Reference:</strong> ${safe(getRecordReference(row))}</p>
          <p class="row-detail"><strong>Location:</strong> ${safe(getRecordLocation(row))}</p>
          <p class="row-detail"><strong>Date:</strong> ${safe(formatDateTime(getRecordDate(row)))}</p>

          ${typeBadge(getRecordType(row))}
          ${statusBadge(getRecordStatus(row))}

          <div class="button-row">
            <button class="btn" onclick="renderSelectedRecord('${safe(row.id)}')">Open Details</button>
            <button class="btn blue" onclick="quickUpdateStatus('${safe(row.id)}','in_progress')">In Progress</button>
            <button class="btn green" onclick="quickUpdateStatus('${safe(row.id)}','completed')">Completed</button>
            <button class="btn red" onclick="quickUpdateStatus('${safe(row.id)}','closed')">Close</button>
          </div>
        </div>
      `).join("");
    }

    function renderSelectedRecord(recordId) {
      const row = records.find(item => String(item.id) === String(recordId));

      if (!row) {
        selectedRecordId = null;
        document.getElementById("selectedRecordTitle").innerText = "Selected Record";
        document.getElementById("selectedRecordBox").innerHTML = `
          <div class="empty">
            <h3>Record not found</h3>
            <p>Please refresh the business records list.</p>
          </div>
        `;
        return;
      }

      selectedRecordId = row.id;

      document.getElementById("selectedRecordTitle").innerText = getRecordTitle(row);

      document.getElementById("selectedRecordBox").innerHTML = `
        <div class="row-card ${safe(recordCardClass(row))}">
          <div class="row-title">${safe(getRecordTitle(row))}</div>
          <p class="row-detail"><strong>Client:</strong> ${safe(getTenantNameById(row.tenant_id))}</p>
          <p class="row-detail"><strong>Type:</strong> ${safe(cleanText(getRecordType(row)))}</p>
          <p class="row-detail"><strong>Status:</strong> ${safe(cleanText(getRecordStatus(row)))}</p>
          <p class="row-detail"><strong>Description:</strong> ${safe(getRecordDescription(row) || "N/A")}</p>
          <p class="row-detail"><strong>Reference:</strong> ${safe(getRecordReference(row))}</p>
          <p class="row-detail"><strong>Location:</strong> ${safe(getRecordLocation(row))}</p>
          <p class="row-detail"><strong>Date:</strong> ${safe(formatDateTime(getRecordDate(row)))}</p>

          ${typeBadge(getRecordType(row))}
          ${statusBadge(getRecordStatus(row))}
        </div>

        <label for="editStatus">Update Status</label>
        <select id="editStatus">
          <option value="open">Open</option>
          <option value="in_progress">In Progress</option>
          <option value="completed">Completed</option>
          <option value="closed">Closed</option>
          <option value="cancelled">Cancelled</option>
        </select>

        <div class="button-row">
          <button class="btn green" onclick="saveSelectedRecordStatus()">Save Status</button>
          <button class="btn blue" onclick="quickUpdateStatus('${safe(row.id)}','in_progress')">Mark In Progress</button>
          <button class="btn green" onclick="quickUpdateStatus('${safe(row.id)}','completed')">Mark Completed</button>
          <button class="btn red" onclick="quickUpdateStatus('${safe(row.id)}','closed')">Close Record</button>
        </div>
      `;

      const currentStatus = getRecordStatus(row);

      if (isCompletedStatus(currentStatus)) {
        document.getElementById("editStatus").value = "completed";
      } else if (isCancelledStatus(currentStatus)) {
        document.getElementById("editStatus").value = "cancelled";
      } else if (currentStatus === "in_progress") {
        document.getElementById("editStatus").value = "in_progress";
      } else {
        document.getElementById("editStatus").value = "open";
      }

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function updateRecordStatus(recordId, status) {
      const { error } = await supabaseClient
        .from("business_records")
        .update({
          status,
          updated_at: new Date().toISOString()
        })
        .eq("id", recordId);

      if (error) {
        alert(error.message);
        return false;
      }

      return true;
    }

    async function quickUpdateStatus(recordId, status) {
      const ok = await updateRecordStatus(recordId, status);

      if (!ok) return;

      selectedRecordId = recordId;

      UnganiAdminShared.showToast("Business record status updated ✓");
      await loadPageData();
    }

    async function saveSelectedRecordStatus() {
      if (!selectedRecordId) {
        alert("No record selected.");
        return;
      }

      const status = document.getElementById("editStatus").value;
      const ok = await updateRecordStatus(selectedRecordId, status);

      if (!ok) return;

      UnganiAdminShared.showToast("Business record status saved ✓");
      await loadPageData();
    }

    function resetFilters() {
      document.getElementById("clientFilter").value = "";
      document.getElementById("typeFilter").value = "";
      document.getElementById("statusFilter").value = "";
      document.getElementById("dateFrom").value = "";
      document.getElementById("dateTo").value = "";
      document.getElementById("searchBox").value = "";

      renderRecordsPage();

      UnganiAdminShared.showToast("Record filters reset ✓");
    }
  </script>
</body>
</html>
