<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Admin Items</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin-shared.js"></script>

  <style>
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 6px solid var(--gold);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 24px var(--shadow);
    }

    .metric-card h3 {
      margin: 0 0 8px;
      color: var(--soft-text);
      font-size: 14px;
    }

    .metric-card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
      color: var(--text);
    }

    .metric-card .note {
      margin-top: 8px;
      color: var(--soft-text);
      font-size: 12px;
      line-height: 1.4;
    }

    .metric-card.green { border-left-color: var(--green); }
    .metric-card.red { border-left-color: var(--red); }
    .metric-card.orange { border-left-color: var(--orange); }
    .metric-card.blue { border-left-color: var(--blue); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 8px 0 6px;
      font-size: 14px;
      color: var(--text);
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--input-bg);
      color: var(--text);
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
      background: var(--gold);
      color: #061C3D;
      text-decoration: none;
      display: inline-block;
    }

    .btn.dark {
      background: #061C3D;
      color: #FFFFFF;
    }

    body.dark .btn.dark {
      background: #F5F5F3;
      color: #061C3D;
    }

    .btn.green { background: var(--green); color: #FFFFFF; }
    .btn.red { background: var(--red); color: #FFFFFF; }
    .btn.orange { background: var(--orange); color: #FFFFFF; }
    .btn.blue { background: var(--blue); color: #FFFFFF; }

    .two-col {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
    }

    .section-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-title-row h2 {
      margin: 0;
    }

    .row-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-left: 6px solid var(--gold);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .row-card.active-card { border-left-color: var(--green); }
    .row-card.warning-card { border-left-color: var(--orange); }
    .row-card.bad-card { border-left-color: var(--red); }
    .row-card.info-card { border-left-color: var(--blue); }

    .row-title {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 6px;
      color: var(--text);
    }

    .row-detail {
      color: var(--soft-text);
      margin: 5px 0;
      line-height: 1.45;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      background: #061C3D;
      color: #FFFFFF;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      text-transform: capitalize;
    }

    .badge.green { background: var(--green); }
    .badge.red { background: var(--red); }
    .badge.orange { background: var(--orange); }
    .badge.blue { background: var(--blue); }
    .badge.gold { background: var(--gold); color: #061C3D; }

    .empty {
      text-align: center;
      padding: 28px;
      background: var(--bg);
      border: 1px dashed var(--border);
      border-radius: 18px;
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--text);
    }

    .empty p {
      margin: 0;
      color: var(--soft-text);
    }

    .small-text {
      color: var(--soft-text);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 950px) {
      .two-col {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="adminRoot"></div>

  <script>
    let supabaseClient = null;
    let currentAdmin = null;

    let tenants = [];
    let items = [];
    let selectedItemId = null;

    const pageMainHtml = `
      <section class="ungani-card ungani-hero-card">
        <div style="position: relative; z-index: 1;">
          <h2>Admin Items / Assets / Stock Center</h2>
          <p>
            Review client stock, business items, assets, equipment, quantities, and item status across all businesses.
          </p>
          <div style="margin-top: 16px;">
            <a class="btn" href="admin-home.html">Admin Home</a>
            <a class="btn green" href="admin.html">Main Admin</a>
            <a class="btn blue" href="admin-reports.html">Reports</a>
            <a class="btn dark" href="admin-settings.html">Admin Settings</a>
          </div>
        </div>
      </section>

      <section class="page-grid" id="metricsGrid">
        <div class="metric-card"><h3>Loading</h3><p>...</p><div class="note">Please wait</div></div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>Item Filters</h2>
          <button class="btn green" onclick="loadPageData()">Refresh</button>
        </div>

        <div class="form-grid">
          <div>
            <label for="clientFilter">Client</label>
            <select id="clientFilter" onchange="renderItemsPage()">
              <option value="">All Clients</option>
            </select>
          </div>

          <div>
            <label for="typeFilter">Item Type</label>
            <select id="typeFilter" onchange="renderItemsPage()">
              <option value="">All Types</option>
              <option value="stock">Stock</option>
              <option value="asset">Asset</option>
              <option value="equipment">Equipment</option>
              <option value="vehicle">Vehicle</option>
              <option value="tool">Tool</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div>
            <label for="statusFilter">Status</label>
            <select id="statusFilter" onchange="renderItemsPage()">
              <option value="">All Statuses</option>
              <option value="active">Active / Available</option>
              <option value="in_use">In Use</option>
              <option value="low_stock">Low Stock</option>
              <option value="maintenance">Maintenance</option>
              <option value="damaged">Damaged</option>
              <option value="lost">Lost</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>

          <div>
            <label for="searchBox">Search</label>
            <input id="searchBox" placeholder="Search items, assets, stock..." oninput="renderItemsPage()" />
          </div>
        </div>

        <div class="button-row">
          <button class="btn dark" onclick="resetFilters()">Reset Filters</button>
        </div>
      </section>

      <section class="two-col">
        <div class="ungani-card">
          <div class="section-title-row">
            <h2>Client Item Summary</h2>
          </div>
          <div id="clientSummaryBox">
            <div class="empty">
              <h3>Loading client summary...</h3>
              <p>Please wait.</p>
            </div>
          </div>
        </div>

        <div class="ungani-card">
          <div class="section-title-row">
            <h2 id="selectedItemTitle">Selected Item</h2>
          </div>
          <div id="selectedItemBox">
            <div class="empty">
              <h3>No item selected</h3>
              <p>Select an item below to update its status.</p>
            </div>
          </div>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>All Client Items / Assets / Stock</h2>
          <p class="small-text" id="itemsCountText">Loading...</p>
        </div>

        <div id="itemsListBox">
          <div class="empty">
            <h3>Loading items...</h3>
            <p>Please wait.</p>
          </div>
        </div>
      </section>
    `;

    window.addEventListener("load", function () {
      UnganiAdminShared.renderShell("adminRoot", {
        activeKey: "admin-items",
        pageTitle: "Admin Items",
        pageSubtitle: "View and manage client items, assets, and stock.",
        footerTitle: "Admin Items",
        footerVersion: "Admin Items Version: Step 288 Shared Session Added",
        mainHtml: pageMainHtml
      });

      UnganiAdminShared.requireAdmin({
        onNoSession: function () {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiLoginShell").classList.remove("hidden");
        },
        onBlocked: function (reason) {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiBlockedShell").classList.remove("hidden");
          document.getElementById("unganiBlockedReason").innerText = reason;
        },
        onReady: async function (admin, client) {
          currentAdmin = admin;
          supabaseClient = client;

          UnganiAdminShared.renderSidebar("adminSidebar", {
            activeKey: "admin-items",
            adminName: admin.full_name || "Admin Workspace",
            footerTitle: "Admin Items",
            footerVersion: "Admin Items Version: Step 288 Shared Session Added"
          });

          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiAppShell").classList.remove("hidden");

          await loadPageData();
        }
      });
    });

    function safe(value) {
      return UnganiAdminShared.safe(value);
    }

    function cleanText(value) {
      return UnganiAdminShared.cleanText(value);
    }

    function getField(row, names, fallback = "") {
      for (const name of names) {
        if (row && row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return fallback;
    }

    function getTenantName(row) {
      return getField(row, ["company_name", "business_name", "name"], "Client Business");
    }

    function getTenantNameById(tenantId) {
      const tenant = tenants.find(row => String(row.id) === String(tenantId));
      return tenant ? getTenantName(tenant) : "Unknown Client";
    }

    function getItemName(row) {
      return getField(row, ["item_name", "asset_name", "stock_name", "name", "title"], "Item / Asset");
    }

    function getItemType(row) {
      return String(getField(row, ["item_type", "asset_type", "stock_type", "type", "category"], "other")).toLowerCase();
    }

    function getItemStatus(row) {
      return String(getField(row, ["status", "item_status", "asset_status", "stock_status"], "active")).toLowerCase();
    }

    function getItemQuantity(row) {
      const raw = getField(row, ["quantity", "qty", "stock_quantity", "count"], 1);
      const num = Number(raw);
      return isNaN(num) ? raw : num;
    }

    function getItemLocation(row) {
      return getField(row, ["location", "storage_location", "asset_location", "current_location"], "N/A");
    }

    function getItemValue(row) {
      const raw = getField(row, ["value", "item_value", "asset_value", "cost", "price"], "");
      if (raw === "") return "N/A";

      const num = Number(raw);
      if (isNaN(num)) return raw;

      return "KES " + num.toLocaleString("en-KE", {
        maximumFractionDigits: 2
      });
    }

    function getItemNotes(row) {
      return getField(row, ["notes", "description", "details"], "");
    }

    function getCreatedDate(row) {
      return getField(row, ["created_at", "updated_at"], "");
    }

    function isLowStock(row) {
      const status = getItemStatus(row);
      const quantity = Number(getItemQuantity(row));

      if (status === "low_stock") return true;
      if (!isNaN(quantity) && quantity <= 2 && ["stock", "item", "other"].includes(getItemType(row))) return true;

      return false;
    }

    function isBadStatus(row) {
      const status = getItemStatus(row);
      return ["damaged", "lost", "missing", "broken"].includes(status);
    }

    function isWarningStatus(row) {
      const status = getItemStatus(row);
      return ["maintenance", "repair", "low_stock"].includes(status) || isLowStock(row);
    }

    function isActiveStatus(row) {
      const status = getItemStatus(row);
      return ["active", "available", "in_use", "assigned"].includes(status);
    }

    function statusBadge(status) {
      const clean = String(status || "active").toLowerCase();

      if (["active", "available", "in_use", "assigned"].includes(clean)) {
        return `<span class="badge green">${safe(cleanText(clean))}</span>`;
      }

      if (["maintenance", "repair", "low_stock"].includes(clean)) {
        return `<span class="badge orange">${safe(cleanText(clean))}</span>`;
      }

      if (["damaged", "lost", "missing", "broken"].includes(clean)) {
        return `<span class="badge red">${safe(cleanText(clean))}</span>`;
      }

      return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
    }

    function typeBadge(type) {
      const clean = String(type || "other").toLowerCase();

      if (clean === "stock") return `<span class="badge gold">Stock</span>`;
      if (clean === "asset") return `<span class="badge blue">Asset</span>`;
      if (clean === "equipment") return `<span class="badge blue">Equipment</span>`;
      if (clean === "vehicle") return `<span class="badge green">Vehicle</span>`;
      if (clean === "tool") return `<span class="badge orange">Tool</span>`;

      return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
    }

    function itemCardClass(row) {
      if (isBadStatus(row)) return "bad-card";
      if (isWarningStatus(row)) return "warning-card";
      if (isActiveStatus(row)) return "active-card";
      return "info-card";
    }

    function formatDateTime(value) {
      if (!value) return "N/A";
      const dateObj = new Date(value);
      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    async function safeSelect(tableName) {
      try {
        const { data, error } = await supabaseClient
          .from(tableName)
          .select("*")
          .limit(10000);

        if (error) {
          console.log(tableName, error.message);
          return [];
        }

        return data || [];
      } catch (error) {
        console.log(tableName, error.message);
        return [];
      }
    }

    async function loadPageData() {
      UnganiAdminShared.showToast("Loading items...");

      const [tenantRows, itemRows] = await Promise.all([
        safeSelect("tenants"),
        safeSelect("business_items")
      ]);

      tenants = tenantRows;
      items = itemRows.sort((a, b) => new Date(getCreatedDate(b) || 0) - new Date(getCreatedDate(a) || 0));

      fillClientFilter();
      renderItemsPage();

      if (selectedItemId) {
        renderSelectedItem(selectedItemId);
      }

      UnganiAdminShared.showToast("Items updated ✓");
    }

    function fillClientFilter() {
      const selected = document.getElementById("clientFilter").value;

      const options = tenants
        .map(row => `<option value="${safe(row.id)}">${safe(getTenantName(row))}</option>`)
        .join("");

      document.getElementById("clientFilter").innerHTML = `<option value="">All Clients</option>${options}`;

      if (selected) {
        document.getElementById("clientFilter").value = selected;
      }
    }

    function filteredItems() {
      const clientFilter = document.getElementById("clientFilter").value;
      const typeFilter = document.getElementById("typeFilter").value;
      const statusFilter = document.getElementById("statusFilter").value;
      const query = document.getElementById("searchBox").value.toLowerCase().trim();

      let rows = [...items];

      if (clientFilter) {
        rows = rows.filter(row => String(row.tenant_id) === String(clientFilter));
      }

      if (typeFilter) {
        rows = rows.filter(row => getItemType(row) === typeFilter);
      }

      if (statusFilter) {
        if (statusFilter === "active") {
          rows = rows.filter(row => isActiveStatus(row));
        } else if (statusFilter === "low_stock") {
          rows = rows.filter(row => isLowStock(row));
        } else {
          rows = rows.filter(row => getItemStatus(row) === statusFilter);
        }
      }

      if (query) {
        rows = rows.filter(row => {
          const haystack = [
            getTenantNameById(row.tenant_id),
            getItemName(row),
            getItemType(row),
            getItemStatus(row),
            getItemLocation(row),
            getItemNotes(row),
            JSON.stringify(row)
          ].join(" ").toLowerCase();

          return haystack.includes(query);
        });
      }

      return rows;
    }

    function renderItemsPage() {
      renderMetrics();
      renderClientSummary();
      renderItemsList();
    }

    function renderMetrics() {
      const rows = filteredItems();

      const active = rows.filter(isActiveStatus).length;
      const lowStock = rows.filter(isLowStock).length;
      const maintenance = rows.filter(row => ["maintenance", "repair"].includes(getItemStatus(row))).length;
      const bad = rows.filter(isBadStatus).length;
      const stock = rows.filter(row => getItemType(row) === "stock").length;
      const assets = rows.filter(row => ["asset", "equipment", "vehicle", "tool"].includes(getItemType(row))).length;

      const totalQuantity = rows.reduce((sum, row) => {
        const quantity = Number(getItemQuantity(row));
        return sum + (isNaN(quantity) ? 0 : quantity);
      }, 0);

      const metrics = [
        { title: "Total Records", value: rows.length, note: "Items/assets/stock in current view", cls: "blue" },
        { title: "Active / Available", value: active, note: "Items currently usable", cls: "green" },
        { title: "Low Stock", value: lowStock, note: "Items needing restock review", cls: lowStock > 0 ? "orange" : "green" },
        { title: "Maintenance", value: maintenance, note: "Items under repair or maintenance", cls: maintenance > 0 ? "orange" : "green" },
        { title: "Lost / Damaged", value: bad, note: "Items needing urgent review", cls: bad > 0 ? "red" : "green" },
        { title: "Stock Records", value: stock, note: "Stock/inventory records", cls: "gold" },
        { title: "Asset Records", value: assets, note: "Assets, equipment, vehicles, tools", cls: "blue" },
        { title: "Total Quantity", value: totalQuantity, note: "Sum of numeric quantities", cls: "green" }
      ];

      document.getElementById("metricsGrid").innerHTML = metrics.map(item => `
        <div class="metric-card ${safe(item.cls || "blue")}">
          <h3>${safe(item.title)}</h3>
          <p>${safe(item.value)}</p>
          <div class="note">${safe(item.note)}</div>
        </div>
      `).join("");
    }

    function renderClientSummary() {
      const rows = filteredItems();
      const clientMap = {};

      tenants.forEach(tenant => {
        clientMap[tenant.id] = {
          id: tenant.id,
          name: getTenantName(tenant),
          total: 0,
          active: 0,
          lowStock: 0,
          maintenance: 0,
          bad: 0
        };
      });

      rows.forEach(row => {
        const tenantId = row.tenant_id;

        if (!tenantId || !clientMap[tenantId]) return;

        clientMap[tenantId].total += 1;

        if (isActiveStatus(row)) clientMap[tenantId].active += 1;
        if (isLowStock(row)) clientMap[tenantId].lowStock += 1;
        if (["maintenance", "repair"].includes(getItemStatus(row))) clientMap[tenantId].maintenance += 1;
        if (isBadStatus(row)) clientMap[tenantId].bad += 1;
      });

      const summaryRows = Object.values(clientMap)
        .filter(row => row.total > 0)
        .sort((a, b) => b.bad - a.bad || b.lowStock - a.lowStock || b.total - a.total)
        .slice(0, 10);

      if (summaryRows.length === 0) {
        document.getElementById("clientSummaryBox").innerHTML = `
          <div class="empty">
            <h3>No client item summary yet</h3>
            <p>Client item summary will appear after items/assets are added.</p>
          </div>
        `;
        return;
      }

      document.getElementById("clientSummaryBox").innerHTML = summaryRows.map(row => `
        <div class="row-card ${row.bad > 0 ? "bad-card" : row.lowStock > 0 || row.maintenance > 0 ? "warning-card" : "active-card"}">
          <div class="row-title">${safe(row.name)}</div>
          <p class="row-detail"><strong>Total:</strong> ${safe(row.total)}</p>
          <p class="row-detail"><strong>Active:</strong> ${safe(row.active)}</p>
          <p class="row-detail"><strong>Low Stock:</strong> ${safe(row.lowStock)}</p>
          <p class="row-detail"><strong>Maintenance:</strong> ${safe(row.maintenance)}</p>
          <p class="row-detail"><strong>Lost / Damaged:</strong> ${safe(row.bad)}</p>
          ${row.bad > 0 ? `<span class="badge red">Urgent review</span>` : row.lowStock > 0 || row.maintenance > 0 ? `<span class="badge orange">Needs follow-up</span>` : `<span class="badge green">Clear</span>`}
        </div>
      `).join("");
    }

    function renderItemsList() {
      const rows = filteredItems();

      document.getElementById("itemsCountText").innerText = `${rows.length} item record(s) shown`;

      if (rows.length === 0) {
        document.getElementById("itemsListBox").innerHTML = `
          <div class="empty">
            <h3>No items found</h3>
            <p>Try changing the filters or wait for clients to add items, assets, or stock.</p>
          </div>
        `;
        return;
      }

      document.getElementById("itemsListBox").innerHTML = rows.map(row => {
        const type = getItemType(row);
        const status = getItemStatus(row);

        return `
          <div class="row-card ${safe(itemCardClass(row))}">
            <div class="row-title">${safe(getItemName(row))}</div>
            <p class="row-detail"><strong>Client:</strong> ${safe(getTenantNameById(row.tenant_id))}</p>
            <p class="row-detail"><strong>Quantity:</strong> ${safe(getItemQuantity(row))}</p>
            <p class="row-detail"><strong>Location:</strong> ${safe(getItemLocation(row))}</p>
            <p class="row-detail"><strong>Value:</strong> ${safe(getItemValue(row))}</p>
            <p class="row-detail"><strong>Notes:</strong> ${safe(getItemNotes(row) || "N/A")}</p>
            <p class="row-detail"><strong>Created:</strong> ${safe(formatDateTime(getCreatedDate(row)))}</p>

            ${typeBadge(type)}
            ${statusBadge(status)}
            ${isLowStock(row) ? `<span class="badge orange">Low stock</span>` : ""}

            <div class="button-row">
              <button class="btn" onclick="renderSelectedItem('${safe(row.id)}')">Open Details</button>
              <button class="btn green" onclick="quickUpdateStatus('${safe(row.id)}','active')">Active</button>
              <button class="btn blue" onclick="quickUpdateStatus('${safe(row.id)}','in_use')">In Use</button>
              <button class="btn orange" onclick="quickUpdateStatus('${safe(row.id)}','maintenance')">Maintenance</button>
              <button class="btn red" onclick="quickUpdateStatus('${safe(row.id)}','damaged')">Damaged</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderSelectedItem(itemId) {
      const row = items.find(item => String(item.id) === String(itemId));

      if (!row) {
        selectedItemId = null;
        document.getElementById("selectedItemTitle").innerText = "Selected Item";
        document.getElementById("selectedItemBox").innerHTML = `
          <div class="empty">
            <h3>Item not found</h3>
            <p>Please refresh the items list.</p>
          </div>
        `;
        return;
      }

      selectedItemId = row.id;

      document.getElementById("selectedItemTitle").innerText = getItemName(row);

      document.getElementById("selectedItemBox").innerHTML = `
        <div class="row-card ${safe(itemCardClass(row))}">
          <div class="row-title">${safe(getItemName(row))}</div>
          <p class="row-detail"><strong>Client:</strong> ${safe(getTenantNameById(row.tenant_id))}</p>
          <p class="row-detail"><strong>Type:</strong> ${safe(cleanText(getItemType(row)))}</p>
          <p class="row-detail"><strong>Quantity:</strong> ${safe(getItemQuantity(row))}</p>
          <p class="row-detail"><strong>Location:</strong> ${safe(getItemLocation(row))}</p>
          <p class="row-detail"><strong>Value:</strong> ${safe(getItemValue(row))}</p>
          <p class="row-detail"><strong>Notes:</strong> ${safe(getItemNotes(row) || "N/A")}</p>
          <p class="row-detail"><strong>Created:</strong> ${safe(formatDateTime(getCreatedDate(row)))}</p>

          ${typeBadge(getItemType(row))}
          ${statusBadge(getItemStatus(row))}
          ${isLowStock(row) ? `<span class="badge orange">Low stock</span>` : ""}
        </div>

        <label for="editStatus">Update Status</label>
        <select id="editStatus">
          <option value="active">Active / Available</option>
          <option value="in_use">In Use</option>
          <option value="low_stock">Low Stock</option>
          <option value="maintenance">Maintenance</option>
          <option value="damaged">Damaged</option>
          <option value="lost">Lost</option>
          <option value="inactive">Inactive</option>
        </select>

        <div class="button-row">
          <button class="btn green" onclick="saveSelectedItemStatus()">Save Status</button>
          <button class="btn green" onclick="quickUpdateStatus('${safe(row.id)}','active')">Mark Active</button>
          <button class="btn blue" onclick="quickUpdateStatus('${safe(row.id)}','in_use')">Mark In Use</button>
          <button class="btn orange" onclick="quickUpdateStatus('${safe(row.id)}','maintenance')">Mark Maintenance</button>
          <button class="btn red" onclick="quickUpdateStatus('${safe(row.id)}','damaged')">Mark Damaged</button>
        </div>
      `;

      const currentStatus = getItemStatus(row);

      if (["active", "available"].includes(currentStatus)) {
        document.getElementById("editStatus").value = "active";
      } else if (["in_use", "assigned"].includes(currentStatus)) {
        document.getElementById("editStatus").value = "in_use";
      } else if (["maintenance", "repair"].includes(currentStatus)) {
        document.getElementById("editStatus").value = "maintenance";
      } else if (["damaged", "broken"].includes(currentStatus)) {
        document.getElementById("editStatus").value = "damaged";
      } else if (["lost", "missing"].includes(currentStatus)) {
        document.getElementById("editStatus").value = "lost";
      } else if (currentStatus === "low_stock") {
        document.getElementById("editStatus").value = "low_stock";
      } else {
        document.getElementById("editStatus").value = "inactive";
      }

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function updateItemStatus(itemId, status) {
      const payload = {
        status,
        updated_at: new Date().toISOString()
      };

      const { error } = await supabaseClient
        .from("business_items")
        .update(payload)
        .eq("id", itemId);

      if (error) {
        alert(error.message);
        return false;
      }

      return true;
    }

    async function quickUpdateStatus(itemId, status) {
      const ok = await updateItemStatus(itemId, status);

      if (!ok) return;

      selectedItemId = itemId;

      UnganiAdminShared.showToast("Item status updated ✓");
      await loadPageData();
    }

    async function saveSelectedItemStatus() {
      if (!selectedItemId) {
        alert("No item selected.");
        return;
      }

      const status = document.getElementById("editStatus").value;
      const ok = await updateItemStatus(selectedItemId, status);

      if (!ok) return;

      UnganiAdminShared.showToast("Item status saved ✓");
      await loadPageData();
    }

    function resetFilters() {
      document.getElementById("clientFilter").value = "";
      document.getElementById("typeFilter").value = "";
      document.getElementById("statusFilter").value = "";
      document.getElementById("searchBox").value = "";

      renderItemsPage();

      UnganiAdminShared.showToast("Item filters reset ✓");
    }
  </script>
</body>
</html>
