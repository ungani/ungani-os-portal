<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Admin Items</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="pwa-register.js"></script>
  <script src="admin-shared.js"></script>

  <style>
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 24px var(--ungani-shadow);
    }

    .metric-card h3 {
      margin: 0 0 8px;
      color: var(--ungani-muted);
      font-size: 14px;
    }

    .metric-card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
      color: var(--ungani-text);
    }

    .metric-card .note {
      margin-top: 8px;
      color: var(--ungani-muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .metric-card.green { border-left-color: var(--ungani-green); }
    .metric-card.red { border-left-color: var(--ungani-red); }
    .metric-card.orange { border-left-color: var(--ungani-orange); }
    .metric-card.blue { border-left-color: var(--ungani-blue); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 8px 0 6px;
      font-size: 14px;
      color: var(--ungani-text);
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--ungani-border);
      border-radius: 12px;
      background: var(--ungani-card);
      color: var(--ungani-text);
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
    }

    .section-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-title-row h2 {
      margin: 0;
    }

    .row-card {
      background: var(--ungani-bg);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .row-card.active-card { border-left-color: var(--ungani-green); }
    .row-card.warning-card { border-left-color: var(--ungani-orange); }
    .row-card.bad-card { border-left-color: var(--ungani-red); }
    .row-card.info-card { border-left-color: var(--ungani-blue); }

    .row-title {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 6px;
      color: var(--ungani-text);
    }

    .row-detail {
      color: var(--ungani-muted);
      margin: 5px 0;
      line-height: 1.45;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      background: #061C3D;
      color: #FFFFFF;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      text-transform: capitalize;
    }

    .badge.green { background: var(--ungani-green); }
    .badge.red { background: var(--ungani-red); }
    .badge.orange { background: var(--ungani-orange); }
    .badge.blue { background: var(--ungani-blue); }
    .badge.gold { background: var(--ungani-gold); color: #061C3D; }

    .empty {
      text-align: center;
      padding: 28px;
      background: var(--ungani-bg);
      border: 1px dashed var(--ungani-border);
      border-radius: 18px;
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--ungani-text);
    }

    .empty p {
      margin: 0;
      color: var(--ungani-muted);
    }

    .small-text {
      color: var(--ungani-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 950px) {
      .two-col {
        grid-template-columns: 1fr;
      }
    }

    .category-tiles {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .category-tile {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 5px solid var(--tile-accent, var(--ungani-gold));
      border-radius: 18px;
      padding: 14px 16px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: 0.18s ease;
    }

    .category-tile:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px var(--ungani-shadow);
    }

    .category-tile.active {
      box-shadow: 0 0 0 2px var(--tile-accent, var(--ungani-gold));
    }

    .category-tile .tile-count {
      display: block;
      font-size: 24px;
      font-weight: 900;
      color: var(--ungani-text);
    }

    .category-tile .tile-label {
      display: block;
      font-size: 12.5px;
      font-weight: 700;
      color: var(--ungani-muted);
      margin-top: 4px;
    }

    .ungani-table-wrap {
      overflow-x: auto;
    }

    .ungani-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 640px;
    }

    .ungani-table thead th {
      text-align: left;
      padding: 10px 12px;
      color: var(--ungani-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--ungani-border);
      white-space: nowrap;
    }

    .ungani-table tbody tr {
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .ungani-table tbody tr:hover {
      background: rgba(212, 166, 58, 0.08);
    }

    .ungani-table td {
      padding: 12px;
      border-bottom: 1px solid var(--ungani-border);
      vertical-align: middle;
    }

    .ungani-table td:first-child {
      border-left: 4px solid var(--accent, #64748B);
      font-weight: bold;
      color: var(--ungani-text);
    }

    .ungani-table .row-sub {
      display: block;
      font-weight: normal;
      color: var(--ungani-muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .modal-form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
    }

    .modal-form-grid-full {
      grid-column: 1 / -1;
    }

    .modal-form-grid label {
      margin-top: 0;
    }

    .modal-form-grid p {
      margin: 0;
      color: var(--ungani-muted);
      word-break: break-word;
    }

    .summary-banner {
      display: block;
      width: 100%;
      text-align: left;
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--tile-accent, var(--ungani-green));
      border-radius: 20px;
      padding: 16px 18px;
      margin-bottom: 18px;
      cursor: pointer;
      font-family: inherit;
      transition: 0.18s ease;
    }

    .summary-banner:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px var(--ungani-shadow);
    }

    .summary-banner strong {
      font-size: 20px;
      color: var(--ungani-text);
    }

    .summary-banner .summary-sub {
      display: block;
      margin-top: 3px;
      color: var(--ungani-muted);
      font-size: 13px;
    }

    .summary-banner .summary-cta {
      display: block;
      margin-top: 4px;
      color: var(--ungani-gold);
      font-size: 12px;
      font-weight: 700;
    }

    .mini-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.25);
      overflow: hidden;
      display: flex;
      margin-top: 10px;
    }

    .mini-bar-segment {
      height: 100%;
    }

    .nudge-empty h3 {
      margin: 0 0 6px;
      color: var(--ungani-text);
      font-size: 15px;
    }

    .nudge-empty p {
      margin: 0 auto;
      max-width: 340px;
      font-size: 13px;
    }

    .nudge-icon {
      font-size: 32px;
      display: inline-block;
      margin-bottom: 8px;
      animation: unganiNudgeFloat 6s ease-in-out infinite;
    }

    @keyframes unganiNudgeFloat {
      0%, 12% { opacity: 0.5; transform: translateY(0); }
      22% { opacity: 1; transform: translateY(-6px); }
      32%, 100% { opacity: 0.5; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .nudge-icon {
        animation: none;
        opacity: 0.85;
      }
    }
  </style>
</head>

<body>
  <div id="adminRoot"></div>

  <script>
    let supabaseClient = null;
    let currentAdmin = null;
    let preferredCurrency = "KES"; // Global structural state fallback

    let tenants = [];
    let items = [];
    let selectedItemId = null;

    const pageMainHtml = `
      <section class="ungani-card ungani-hero-card">
        <div style="position: relative; z-index: 1;">
          <h2>Admin Items / Assets / Stock Center</h2>
          <p>
            Review client stock, business items, assets, equipment, quantities, and item status across all businesses.
          </p>
          <div style="margin-top: 16px;">
            <a class="ungani-btn" href="admin-home.html">Admin Home</a>
            <a class="ungani-btn green" href="admin.html">Main Admin</a>
            <a class="ungani-btn blue" href="admin-reports.html">Reports</a>
            <a class="ungani-btn dark" href="admin-settings.html">Admin Settings</a>
          </div>
        </div>
      </section>

      <section class="category-tiles" id="categoryTiles">
        <div class="empty"><h3>Loading categories...</h3><p>Please wait.</p></div>
      </section>

      <button type="button" class="summary-banner" id="clientSummaryBanner" onclick="openClientSummaryModal()">
        <strong>Loading client summary...</strong>
        <span class="summary-sub">Please wait.</span>
      </button>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>Item Filters</h2>
          <button class="ungani-btn green" onclick="loadPageData()">Refresh</button>
        </div>

        <div class="form-grid">
          <div>
            <label for="clientFilter">Client</label>
            <select id="clientFilter" onchange="renderItemsPage()">
              <option value="">All Clients</option>
            </select>
          </div>

          <div>
            <label for="statusFilter">Status</label>
            <select id="statusFilter" onchange="renderItemsPage()">
              <option value="">All Statuses</option>
              <option value="active">Active / Available</option>
              <option value="in_use">In Use</option>
              <option value="low_stock">Low Stock</option>
              <option value="maintenance">Maintenance</option>
              <option value="damaged">Damaged</option>
              <option value="lost">Lost</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>

          <div>
            <label for="searchBox">Search</label>
            <input id="searchBox" placeholder="Search items (any category)..." oninput="renderItemsPage()" />
          </div>
        </div>

        <div class="button-row">
          <button class="ungani-btn dark" onclick="resetFilters()">Reset Filters</button>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>All Client Items / Assets / Stock</h2>
          <p class="small-text" id="itemsCountText">Loading...</p>
        </div>

        <div class="ungani-table-wrap">
          <table class="ungani-table">
            <thead>
              <tr>
                <th>Item</th>
                <th>Client</th>
                <th>Type</th>
                <th>Status</th>
                <th>Qty</th>
                <th>Value</th>
              </tr>
            </thead>
            <tbody id="itemsListBox">
              <tr><td colspan="6"><div class="empty"><h3>Loading items...</h3><p>Please wait.</p></div></td></tr>
            </tbody>
          </table>
        </div>
        <div id="itemsPagination"></div>
      </section>
    `;

    window.addEventListener("load", function () {
      UnganiAdminShared.renderShell("adminRoot", {
        activeKey: "admin-items",
        pageTitle: "Admin Items",
        pageSubtitle: "View and manage client items, assets, and stock.",
        footerTitle: "Admin Items",
        footerVersion: "Admin Items Version: Step 288 Shared Session Added",
        mainHtml: pageMainHtml
      });

      UnganiAdminShared.requireAdmin({
        onNoSession: function () {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiLoginShell").classList.remove("hidden");
        },
        onBlocked: function (reason) {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiBlockedShell").classList.remove("hidden");
          document.getElementById("unganiBlockedReason").innerText = reason;
        },
        onReady: async function (admin, client) {
          currentAdmin = admin;
          supabaseClient = client;

          // Dynamically read account currency preference configuration mapping
          if (admin && admin.preferred_currency) {
            preferredCurrency = admin.preferred_currency;
          }

          UnganiAdminShared.renderSidebar("adminSidebar", {
            activeKey: "admin-items",
            adminName: admin.full_name || "Admin Workspace",
            footerTitle: "Admin Items",
            footerVersion: "Admin Items Version: Step 288 Shared Session Added"
          });

          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiAppShell").classList.remove("hidden");

          await loadPageData();
        }
      });
    });

    function safe(value) {
      return UnganiAdminShared.safe(value);
    }

    function cleanText(value) {
      return UnganiAdminShared.cleanText(value);
    }

    function getField(row, names, fallback = "") {
      for (const name of names) {
        if (row && row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return fallback;
    }

    function getTenantName(row) {
      return getField(row, ["company_name", "business_name", "name"], "Client Business");
    }

    function getTenantNameById(tenantId) {
      const tenant = tenants.find(row => String(row.id) === String(tenantId));
      return tenant ? getTenantName(tenant) : "Unknown Client";
    }

    function getItemName(row) {
      return getField(row, ["item_name", "asset_name", "stock_name", "name", "title"], "Item / Asset");
    }

    function getItemType(row) {
      return String(getField(row, ["item_type", "asset_type", "stock_type", "type", "category"], "other")).toLowerCase();
    }

    function getItemStatus(row) {
      return String(getField(row, ["status", "item_status", "asset_status", "stock_status"], "active")).toLowerCase();
    }

    function getItemQuantity(row) {
      const raw = getField(row, ["quantity", "qty", "stock_quantity", "count"], 1);
      const num = Number(raw);
      return isNaN(num) ? raw : num;
    }

    function getItemLocation(row) {
      return getField(row, ["location", "storage_location", "asset_location", "current_location"], "N/A");
    }

    function getItemValue(row) {
      const raw = getField(row, ["value", "item_value", "asset_value", "cost", "price"], "");
      if (raw === "") return "N/A";

      const num = Number(raw);
      if (isNaN(num)) return raw;

      // Dynamic global mapping substitution pattern
      return preferredCurrency + " " + num.toLocaleString(undefined, {
        maximumFractionDigits: 2
      });
    }

    function getItemNotes(row) {
      return getField(row, ["notes", "description", "details"], "");
    }

    function getCreatedDate(row) {
      return getField(row, ["created_at", "updated_at"], "");
    }

    function isLowStock(row) {
      const status = getItemStatus(row);
      const quantity = Number(getItemQuantity(row));

      if (status === "low_stock") return true;
      if (!isNaN(quantity) && quantity <= 2 && ["stock", "item", "other"].includes(getItemType(row))) return true;

      return false;
    }

    function isBadStatus(row) {
      const status = getItemStatus(row);
      return ["damaged", "lost", "missing", "broken"].includes(status);
    }

    function isWarningStatus(row) {
      const status = getItemStatus(row);
      return ["maintenance", "repair", "low_stock"].includes(status) || isLowStock(row);
    }

    function isActiveStatus(row) {
      const status = getItemStatus(row);
      return ["active", "available", "in_use", "assigned"].includes(status);
    }

    function statusBadge(status) {
      const clean = String(status || "active").toLowerCase();

      if (["active", "available", "in_use", "assigned"].includes(clean)) {
        return `<span class="badge green">${safe(cleanText(clean))}</span>`;
      }

      if (["maintenance", "repair", "low_stock"].includes(clean)) {
        return `<span class="badge orange">${safe(cleanText(clean))}</span>`;
      }

      if (["damaged", "lost", "missing", "broken"].includes(clean)) {
        return `<span class="badge red">${safe(cleanText(clean))}</span>`;
      }

      return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
    }

    function typeBadge(type) {
      const clean = String(type || "other").toLowerCase();

      if (clean === "stock") return `<span class="badge gold">Stock</span>`;
      if (clean === "asset") return `<span class="badge blue">Asset</span>`;
      if (clean === "equipment") return `<span class="badge blue">Equipment</span>`;
      if (clean === "vehicle") return `<span class="badge green">Vehicle</span>`;
      if (clean === "tool") return `<span class="badge orange">Tool</span>`;

      return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
    }

    function formatDateTime(value) {
      if (!value) return "N/A";
      const dateObj = new Date(value);
      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    async function safeSelect(tableName) {
      try {
        const { data, error } = await supabaseClient
          .from(tableName)
          .select("*")
          .limit(10000);

        if (error) {
          console.log(tableName, error.message);
          return [];
        }

        return data || [];
      } catch (error) {
        console.log(tableName, error.message);
        return [];
      }
    }

    async function loadPageData() {
      UnganiAdminShared.showToast("Loading items...");

      const [tenantRows, itemRows] = await Promise.all([
        safeSelect("tenants"),
        safeSelect("business_items")
      ]);

      tenants = tenantRows;
      items = itemRows.sort((a, b) => new Date(getCreatedDate(b) || 0) - new Date(getCreatedDate(a) || 0));

      fillClientFilter();
      renderItemsPage();

      UnganiAdminShared.showToast("Items updated ✓");
    }

    function fillClientFilter() {
      const selected = document.getElementById("clientFilter").value;

      const options = tenants
        .map(row => `<option value="${safe(row.id)}">${safe(getTenantName(row))}</option>`)
        .join("");

      document.getElementById("clientFilter").innerHTML = `<option value="">All Clients</option>${options}`;

      if (selected) {
        document.getElementById("clientFilter").value = selected;
      }
    }

    let activeItemCategory = "all";
    const ITEMS_PAGE_SIZE = 25;
    let itemsCurrentPage = 1;

    function goToItemsPage(page) {
      itemsCurrentPage = page;
      renderItemsList();
    }

    const ITEM_CATEGORIES = [
      { key: "all", label: "All", accent: "#D4A63A", match: () => true },
      { key: "stock", label: "Stock", accent: "#D4A63A", match: row => getItemType(row) === "stock" },
      { key: "asset", label: "Assets", accent: "#2563EB", match: row => getItemType(row) === "asset" },
      { key: "equipment", label: "Equipment", accent: "#2563EB", match: row => getItemType(row) === "equipment" },
      { key: "vehicle", label: "Vehicles", accent: "#15803D", match: row => getItemType(row) === "vehicle" },
      { key: "tool", label: "Tools", accent: "#C77700", match: row => getItemType(row) === "tool" },
      { key: "other", label: "Other", accent: "#64748B", match: row => !["stock", "asset", "equipment", "vehicle", "tool"].includes(getItemType(row)) }
    ];

    function baseFilteredItems() {
      const clientFilter = document.getElementById("clientFilter").value;
      const statusFilter = document.getElementById("statusFilter").value;
      const query = document.getElementById("searchBox").value.toLowerCase().trim();

      let rows = [...items];

      if (clientFilter) {
        rows = rows.filter(row => String(row.tenant_id) === String(clientFilter));
      }

      if (statusFilter) {
        if (statusFilter === "active") {
          rows = rows.filter(row => isActiveStatus(row));
        } else if (statusFilter === "low_stock") {
          rows = rows.filter(row => isLowStock(row));
        } else {
          rows = rows.filter(row => getItemStatus(row) === statusFilter);
        }
      }

      if (query) {
        rows = rows.filter(row => {
          const haystack = [
            getTenantNameById(row.tenant_id),
            getItemName(row),
            getItemType(row),
            getItemStatus(row),
            getItemLocation(row),
            getItemNotes(row),
            JSON.stringify(row)
          ].join(" ").toLowerCase();

          return haystack.includes(query);
        });
      }

      return rows;
    }

    function filteredItems() {
      const rows = baseFilteredItems();
      const category = ITEM_CATEGORIES.find(c => c.key === activeItemCategory) || ITEM_CATEGORIES[0];

      return rows.filter(category.match);
    }

    function selectItemCategory(key) {
      activeItemCategory = key;
      renderItemsPage();
    }

    function renderCategoryTiles() {
      const rows = baseFilteredItems();

      document.getElementById("categoryTiles").innerHTML = ITEM_CATEGORIES.map(category => {
        const count = rows.filter(category.match).length;
        const isActive = category.key === activeItemCategory;

        return `
          <button type="button" class="category-tile${isActive ? " active" : ""}" style="--tile-accent:${category.accent};" onclick="selectItemCategory('${category.key}')">
            <span class="tile-count">${safe(count)}</span>
            <span class="tile-label">${safe(category.label)}</span>
          </button>
        `;
      }).join("");
    }

    function renderItemsPage() {
      itemsCurrentPage = 1;
      renderCategoryTiles();
      renderClientSummary();
      renderItemsList();
    }

    let lastClientSummaryRows = [];

    function computeClientSummaryRows() {
      const rows = filteredItems();
      const clientMap = {};

      tenants.forEach(tenant => {
        clientMap[tenant.id] = {
          id: tenant.id,
          name: getTenantName(tenant),
          total: 0,
          active: 0,
          lowStock: 0,
          maintenance: 0,
          bad: 0
        };
      });

      rows.forEach(row => {
        const tenantId = row.tenant_id;

        if (!tenantId || !clientMap[tenantId]) return;

        clientMap[tenantId].total += 1;

        if (isActiveStatus(row)) clientMap[tenantId].active += 1;
        if (isLowStock(row)) clientMap[tenantId].lowStock += 1;
        if (["maintenance", "repair"].includes(getItemStatus(row))) clientMap[tenantId].maintenance += 1;
        if (isBadStatus(row)) clientMap[tenantId].bad += 1;
      });

      return Object.values(clientMap)
        .filter(row => row.total > 0)
        .sort((a, b) => b.bad - a.bad || b.lowStock - a.lowStock || b.total - a.total);
    }

    function renderClientSummary() {
      const summaryRows = computeClientSummaryRows();
      lastClientSummaryRows = summaryRows;

      const banner = document.getElementById("clientSummaryBanner");
      const totalClients = summaryRows.length;
      const needsAttention = summaryRows.filter(row => row.bad > 0 || row.lowStock > 0 || row.maintenance > 0).length;
      const clean = totalClients - needsAttention;

      if (totalClients === 0) {
        banner.style.setProperty("--tile-accent", "#64748B");
        banner.innerHTML = `
          <strong>No client item summary yet</strong>
          <span class="summary-sub">Client item summary will appear after items/assets are added.</span>
        `;
        return;
      }

      banner.style.setProperty("--tile-accent", needsAttention > 0 ? "#C77700" : "#15803D");
      banner.innerHTML = `
        <strong>${safe(totalClients)} client${totalClients === 1 ? "" : "s"} tracked</strong>
        <span class="summary-sub">${safe(needsAttention)} need${needsAttention === 1 ? "s" : ""} attention</span>
        <div class="mini-bar">
          ${clean > 0 ? `<div class="mini-bar-segment" style="width:${(clean / totalClients) * 100}%;background:#15803D;"></div>` : ""}
          ${needsAttention > 0 ? `<div class="mini-bar-segment" style="width:${(needsAttention / totalClients) * 100}%;background:#C77700;"></div>` : ""}
        </div>
        <span class="summary-cta">Tap for full breakdown →</span>
      `;
    }

    function openClientSummaryModal() {
      const summaryRows = lastClientSummaryRows.slice(0, 10);

      const bodyHtml = summaryRows.length === 0
        ? emptyStateNudge("📊", "No client item summary yet", "Client item summary will appear after items/assets are added.")
        : summaryRows.map(row => `
            <div class="row-card ${row.bad > 0 ? "bad-card" : row.lowStock > 0 || row.maintenance > 0 ? "warning-card" : "active-card"}">
              <div class="row-title">${safe(row.name)}</div>
              <p class="row-detail"><strong>Total:</strong> ${safe(row.total)}</p>
              <p class="row-detail"><strong>Active:</strong> ${safe(row.active)}</p>
              <p class="row-detail"><strong>Low Stock:</strong> ${safe(row.lowStock)}</p>
              <p class="row-detail"><strong>Maintenance:</strong> ${safe(row.maintenance)}</p>
              <p class="row-detail"><strong>Lost / Damaged:</strong> ${safe(row.bad)}</p>
              ${row.bad > 0 ? `<span class="badge red">Urgent review</span>` : row.lowStock > 0 || row.maintenance > 0 ? `<span class="badge orange">Needs follow-up</span>` : `<span class="badge green">Clear</span>`}
            </div>
          `).join("");

      UnganiAdminShared.openModal({
        title: "Client Item Summary",
        bodyHtml: bodyHtml
      });
    }

    function statusAccent(row) {
      if (isBadStatus(row)) return "#B91C1C";
      if (isWarningStatus(row)) return "#C77700";
      if (isActiveStatus(row)) return "#15803D";
      return "#2563EB";
    }

    function emptyStateNudge(icon, title, message) {
      return `
        <div class="empty nudge-empty">
          <div class="nudge-icon" aria-hidden="true">${icon}</div>
          <h3>${safe(title)}</h3>
          <p>${safe(message)}</p>
        </div>
      `;
    }

    let lastRenderedItems = [];

    function renderItemsList() {
      const rows = filteredItems();
      lastRenderedItems = rows;

      document.getElementById("itemsCountText").innerText = `${rows.length} item record(s) shown`;

      const paginationBox = document.getElementById("itemsPagination");

      if (rows.length === 0) {
        document.getElementById("itemsListBox").innerHTML =
          '<tr><td colspan="6">' +
          emptyStateNudge("📦", "No items found", "Try changing the category, filters, or wait for clients to add items, assets, or stock.") +
          '</td></tr>';
        if (paginationBox) paginationBox.innerHTML = "";
        return;
      }

      const totalPages = Math.max(1, Math.ceil(rows.length / ITEMS_PAGE_SIZE));
      itemsCurrentPage = Math.min(Math.max(1, itemsCurrentPage), totalPages);
      const startIdx = (itemsCurrentPage - 1) * ITEMS_PAGE_SIZE;
      const pageRows = rows.slice(startIdx, startIdx + ITEMS_PAGE_SIZE);

      document.getElementById("itemsListBox").innerHTML = pageRows.map((row, i) => {
        const index = startIdx + i;
        return `
          <tr style="--accent:${statusAccent(row)};" onclick="openItemModal(${index})">
            <td>${safe(getItemName(row))}<span class="row-sub">${safe(getItemLocation(row))}</span></td>
            <td>${safe(getTenantNameById(row.tenant_id))}</td>
            <td>${typeBadge(getItemType(row))}</td>
            <td>${statusBadge(getItemStatus(row))}${isLowStock(row) ? ' <span class="badge orange">Low</span>' : ""}</td>
            <td>${safe(getItemQuantity(row))}</td>
            <td>${safe(getItemValue(row))}</td>
          </tr>
        `;
      }).join("");

      if (paginationBox) paginationBox.innerHTML = UnganiAdminShared.buildPaginationHtml(itemsCurrentPage, totalPages, "goToItemsPage");
    }

    function openItemModal(index) {
      const row = lastRenderedItems[index];

      if (!row) {
        UnganiAdminShared.showToast("Item not found - refresh and try again.");
        return;
      }

      selectedItemId = row.id;

      const bodyHtml = `
        <div class="modal-form-grid">
          <div>
            <label>Client</label>
            <p>${safe(getTenantNameById(row.tenant_id))}</p>
          </div>
          <div>
            <label>Type</label>
            <p>${typeBadge(getItemType(row))}</p>
          </div>
          <div>
            <label>Quantity</label>
            <p>${safe(getItemQuantity(row))}</p>
          </div>
          <div>
            <label>Location</label>
            <p>${safe(getItemLocation(row))}</p>
          </div>
          <div>
            <label>Value</label>
            <p>${safe(getItemValue(row))}</p>
          </div>
          <div>
            <label>Created</label>
            <p>${safe(formatDateTime(getCreatedDate(row)))}</p>
          </div>
          <div class="modal-form-grid-full">
            <label>Notes</label>
            <p>${safe(getItemNotes(row) || "N/A")}</p>
          </div>
        </div>

        <label for="editStatus">Update Status</label>
        <select id="editStatus">
          <option value="active">Active / Available</option>
          <option value="in_use">In Use</option>
          <option value="low_stock">Low Stock</option>
          <option value="maintenance">Maintenance</option>
          <option value="damaged">Damaged</option>
          <option value="lost">Lost</option>
          <option value="inactive">Inactive</option>
        </select>

        <div class="button-row">
          <button class="ungani-btn green" onclick="saveSelectedItemStatus()">Save Status</button>
          <button class="ungani-btn green" onclick="quickUpdateStatus('${safe(row.id)}','active')">Mark Active</button>
          <button class="ungani-btn blue" onclick="quickUpdateStatus('${safe(row.id)}','in_use')">Mark In Use</button>
          <button class="ungani-btn orange" onclick="quickUpdateStatus('${safe(row.id)}','maintenance')">Mark Maintenance</button>
          <button class="ungani-btn red" onclick="quickUpdateStatus('${safe(row.id)}','damaged')">Mark Damaged</button>
        </div>
      `;

      UnganiAdminShared.openModal({
        title: getItemName(row),
        bodyHtml: bodyHtml,
        onOpen: function () {
          const currentStatus = getItemStatus(row);

          if (["active", "available"].includes(currentStatus)) {
            document.getElementById("editStatus").value = "active";
          } else if (["in_use", "assigned"].includes(currentStatus)) {
            document.getElementById("editStatus").value = "in_use";
          } else if (["maintenance", "repair"].includes(currentStatus)) {
            document.getElementById("editStatus").value = "maintenance";
          } else if (["damaged", "broken"].includes(currentStatus)) {
            document.getElementById("editStatus").value = "damaged";
          } else if (["lost", "missing"].includes(currentStatus)) {
            document.getElementById("editStatus").value = "lost";
          } else if (currentStatus === "low_stock") {
            document.getElementById("editStatus").value = "low_stock";
          } else {
            document.getElementById("editStatus").value = "inactive";
          }
        }
      });
    }

    async function updateItemStatus(itemId, status) {
      const payload = {
        status,
        updated_at: new Date().toISOString()
      };

      const { error } = await supabaseClient
        .from("business_items")
        .update(payload)
        .eq("id", itemId);

      if (error) {
        alert(error.message);
        return false;
      }

      return true;
    }

    async function quickUpdateStatus(itemId, status) {
      const ok = await updateItemStatus(itemId, status);

      if (!ok) return;

      selectedItemId = itemId;

      UnganiAdminShared.closeModal();
      UnganiAdminShared.showToast("Item status updated ✓");
      await loadPageData();
    }

    async function saveSelectedItemStatus() {
      if (!selectedItemId) {
        alert("No item selected.");
        return;
      }

      const status = document.getElementById("editStatus").value;
      const ok = await updateItemStatus(selectedItemId, status);

      if (!ok) return;

      UnganiAdminShared.closeModal();
      UnganiAdminShared.showToast("Item status saved ✓");
      await loadPageData();
    }

    function resetFilters() {
      document.getElementById("clientFilter").value = "";
      document.getElementById("statusFilter").value = "";
      document.getElementById("searchBox").value = "";
      activeItemCategory = "all";

      renderItemsPage();

      UnganiAdminShared.showToast("Item filters reset ✓");
    }
  </script>
</body>
</html>
