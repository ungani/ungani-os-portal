<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Admin Tasks</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin-shared.js"></script>

  <style>
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 24px var(--ungani-shadow);
    }

    .metric-card h3 {
      margin: 0 0 8px;
      color: var(--ungani-muted);
      font-size: 14px;
    }

    .metric-card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
      color: var(--ungani-text);
    }

    .metric-card .note {
      margin-top: 8px;
      color: var(--ungani-muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .metric-card.green { border-left-color: var(--ungani-green); }
    .metric-card.red { border-left-color: var(--ungani-red); }
    .metric-card.orange { border-left-color: var(--ungani-orange); }
    .metric-card.blue { border-left-color: var(--ungani-blue); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 8px 0 6px;
      font-size: 14px;
      color: var(--ungani-text);
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--ungani-border);
      border-radius: 12px;
      background: var(--ungani-card);
      color: var(--ungani-text);
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
    }

    .section-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-title-row h2 {
      margin: 0;
    }

    .row-card {
      background: var(--ungani-bg);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .row-card.open-card { border-left-color: var(--ungani-orange); }
    .row-card.done-card { border-left-color: var(--ungani-green); }
    .row-card.overdue-card { border-left-color: var(--ungani-red); }
    .row-card.info-card { border-left-color: var(--ungani-blue); }

    .row-title {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 6px;
      color: var(--ungani-text);
    }

    .row-detail {
      color: var(--ungani-muted);
      margin: 5px 0;
      line-height: 1.45;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      background: #061C3D;
      color: #FFFFFF;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      text-transform: capitalize;
    }

    .badge.green { background: var(--ungani-green); }
    .badge.red { background: var(--ungani-red); }
    .badge.orange { background: var(--ungani-orange); }
    .badge.blue { background: var(--ungani-blue); }
    .badge.gold { background: var(--ungani-gold); color: #061C3D; }

    .empty {
      text-align: center;
      padding: 28px;
      background: var(--ungani-bg);
      border: 1px dashed var(--ungani-border);
      border-radius: 18px;
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--ungani-text);
    }

    .empty p {
      margin: 0;
      color: var(--ungani-muted);
    }

    .small-text {
      color: var(--ungani-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 950px) {
      .two-col {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="adminRoot"></div>

  <script>
    let supabaseClient = null;
    let currentAdmin = null;

    let tenants = [];
    let tasks = [];
    let selectedTaskId = null;

    const pageMainHtml = `
      <section class="ungani-card ungani-hero-card">
        <div style="position: relative; z-index: 1;">
          <h2>Admin Tasks Center</h2>
          <p>
            Review client tasks, follow-ups, deadlines, priorities, and task progress across all businesses.
          </p>
          <div style="margin-top: 16px;">
            <a class="ungani-btn" href="admin-home.html">Admin Home</a>
            <a class="ungani-btn green" href="admin.html">Main Admin</a>
            <a class="ungani-btn blue" href="admin-reports.html">Reports</a>
            <a class="ungani-btn dark" href="admin-settings.html">Admin Settings</a>
          </div>
        </div>
      </section>

      <section class="page-grid" id="metricsGrid">
        <div class="metric-card"><h3>Loading</h3><p>...</p><div class="note">Please wait</div></div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>Task Filters</h2>
          <button class="ungani-btn green" onclick="loadPageData()">Refresh</button>
        </div>

        <div class="form-grid">
          <div>
            <label for="clientFilter">Client</label>
            <select id="clientFilter" onchange="renderTasksPage()">
              <option value="">All Clients</option>
            </select>
          </div>

          <div>
            <label for="statusFilter">Status</label>
            <select id="statusFilter" onchange="renderTasksPage()">
              <option value="">All Statuses</option>
              <option value="pending">Pending / Open</option>
              <option value="in_progress">In Progress</option>
              <option value="completed">Completed / Done</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>

          <div>
            <label for="priorityFilter">Priority</label>
            <select id="priorityFilter" onchange="renderTasksPage()">
              <option value="">All Priorities</option>
              <option value="normal">Normal</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
            </select>
          </div>

          <div>
            <label for="dateFrom">Due From</label>
            <input id="dateFrom" type="date" onchange="renderTasksPage()" />
          </div>

          <div>
            <label for="dateTo">Due To</label>
            <input id="dateTo" type="date" onchange="renderTasksPage()" />
          </div>

          <div>
            <label for="searchBox">Search</label>
            <input id="searchBox" placeholder="Search tasks..." oninput="renderTasksPage()" />
          </div>
        </div>

        <div class="button-row">
          <button class="ungani-btn dark" onclick="resetFilters()">Reset Filters</button>
        </div>
      </section>

      <section class="two-col">
        <div class="ungani-card">
          <div class="section-title-row">
            <h2>Client Task Summary</h2>
          </div>
          <div id="clientSummaryBox">
            <div class="empty">
              <h3>Loading client summary...</h3>
              <p>Please wait.</p>
            </div>
          </div>
        </div>

        <div class="ungani-card">
          <div class="section-title-row">
            <h2 id="selectedTaskTitle">Selected Task</h2>
          </div>
          <div id="selectedTaskBox">
            <div class="empty">
              <h3>No task selected</h3>
              <p>Select a task below to update its status.</p>
            </div>
          </div>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>All Client Tasks</h2>
          <p class="small-text" id="tasksCountText">Loading...</p>
        </div>

        <div id="tasksListBox">
          <div class="empty">
            <h3>Loading tasks...</h3>
            <p>Please wait.</p>
          </div>
        </div>
      </section>
    `;

    window.addEventListener("load", function () {
      UnganiAdminShared.renderShell("adminRoot", {
        activeKey: "admin-tasks",
        pageTitle: "Admin Tasks",
        pageSubtitle: "View and manage client tasks and follow-ups.",
        footerTitle: "Admin Tasks",
        footerVersion: "Admin Tasks Version: Step 287 Shared Session Added",
        mainHtml: pageMainHtml
      });

      UnganiAdminShared.requireAdmin({
        onNoSession: function () {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiLoginShell").classList.remove("hidden");
        },
        onBlocked: function (reason) {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiBlockedShell").classList.remove("hidden");
          document.getElementById("unganiBlockedReason").innerText = reason;
        },
        onReady: async function (admin, client) {
          currentAdmin = admin;
          supabaseClient = client;

          UnganiAdminShared.renderSidebar("adminSidebar", {
            activeKey: "admin-tasks",
            adminName: admin.full_name || "Admin Workspace",
            footerTitle: "Admin Tasks",
            footerVersion: "Admin Tasks Version: Step 287 Shared Session Added"
          });

          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiAppShell").classList.remove("hidden");

          await loadPageData();
        }
      });
    });

    function safe(value) {
      return UnganiAdminShared.safe(value);
    }

    function cleanText(value) {
      return UnganiAdminShared.cleanText(value);
    }

    function getField(row, names, fallback = "") {
      for (const name of names) {
        if (row && row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return fallback;
    }

    function getTenantName(row) {
      return getField(row, ["company_name", "business_name", "name"], "Client Business");
    }

    function getTenantNameById(tenantId) {
      const tenant = tenants.find(row => String(row.id) === String(tenantId));
      return tenant ? getTenantName(tenant) : "Unknown Client";
    }

    function getTaskTitle(row) {
      return getField(row, ["task_title", "title", "name"], "Task / Follow-up");
    }

    function getTaskDescription(row) {
      return getField(row, ["task_description", "description", "notes", "details"], "");
    }

    function getTaskStatus(row) {
      return String(getField(row, ["status", "task_status"], "pending")).toLowerCase();
    }

    function getTaskPriority(row) {
      return String(getField(row, ["priority"], "normal")).toLowerCase();
    }

    function getDueDate(row) {
      return getField(row, ["due_date", "task_due_date", "follow_up_date"], "");
    }

    function getTaskOwner(row) {
      return getField(row, ["assigned_to", "owner", "responsible_person", "person_name"], "N/A");
    }

    function getCreatedDate(row) {
      return getField(row, ["created_at", "updated_at"], "");
    }

    function todayDate() {
      return new Date().toISOString().slice(0, 10);
    }

    function dateInDays(days) {
      const dateObj = new Date();
      dateObj.setDate(dateObj.getDate() + days);
      return dateObj.toISOString().slice(0, 10);
    }

    function formatDate(value) {
      if (!value) return "N/A";
      const dateObj = new Date(value);
      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleDateString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function formatDateTime(value) {
      if (!value) return "N/A";
      const dateObj = new Date(value);
      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function isCompletedStatus(status) {
      return ["done", "completed", "closed", "resolved"].includes(String(status || "").toLowerCase());
    }

    function isCancelledStatus(status) {
      return ["cancelled", "canceled"].includes(String(status || "").toLowerCase());
    }

    function isOpenTask(row) {
      const status = getTaskStatus(row);
      return !isCompletedStatus(status) && !isCancelledStatus(status);
    }

    function isOverdueTask(row) {
      const dueDate = getDueDate(row);
      return dueDate && String(dueDate).slice(0, 10) < todayDate() && isOpenTask(row);
    }

    function isDueSoonTask(row) {
      const dueDate = getDueDate(row);
      return dueDate &&
        String(dueDate).slice(0, 10) >= todayDate() &&
        String(dueDate).slice(0, 10) <= dateInDays(7) &&
        isOpenTask(row);
    }

    function statusBadge(status) {
      const clean = String(status || "pending").toLowerCase();

      if (isCompletedStatus(clean)) {
        return `<span class="badge green">${safe(cleanText(clean))}</span>`;
      }

      if (isCancelledStatus(clean)) {
        return `<span class="badge red">${safe(cleanText(clean))}</span>`;
      }

      if (clean === "in_progress") {
        return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
      }

      return `<span class="badge orange">${safe(cleanText(clean))}</span>`;
    }

    function priorityBadge(priority) {
      const clean = String(priority || "normal").toLowerCase();

      if (clean === "urgent" || clean === "high") {
        return `<span class="badge red">${safe(cleanText(clean))}</span>`;
      }

      if (clean === "medium") {
        return `<span class="badge orange">${safe(cleanText(clean))}</span>`;
      }

      return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
    }

    function taskCardClass(row) {
      if (isOverdueTask(row)) return "overdue-card";
      if (isCompletedStatus(getTaskStatus(row))) return "done-card";
      if (isOpenTask(row)) return "open-card";
      return "info-card";
    }

    async function safeSelect(tableName) {
      try {
        const { data, error } = await supabaseClient
          .from(tableName)
          .select("*")
          .limit(10000);

        if (error) {
          console.log(tableName, error.message);
          return [];
        }

        return data || [];
      } catch (error) {
        console.log(tableName, error.message);
        return [];
      }
    }

    async function loadPageData() {
      UnganiAdminShared.showToast("Loading tasks...");

      const [tenantRows, taskRows] = await Promise.all([
        safeSelect("tenants"),
        safeSelect("tasks")
      ]);

      tenants = tenantRows;
      tasks = taskRows.sort((a, b) => new Date(getCreatedDate(b) || 0) - new Date(getCreatedDate(a) || 0));

      fillClientFilter();
      renderTasksPage();

      if (selectedTaskId) {
        renderSelectedTask(selectedTaskId);
      }

      UnganiAdminShared.showToast("Tasks updated ✓");
    }

    function fillClientFilter() {
      const selected = document.getElementById("clientFilter").value;

      const options = tenants
        .map(row => `<option value="${safe(row.id)}">${safe(getTenantName(row))}</option>`)
        .join("");

      document.getElementById("clientFilter").innerHTML = `<option value="">All Clients</option>${options}`;

      if (selected) {
        document.getElementById("clientFilter").value = selected;
      }
    }

    function withinDueDateRange(row) {
      const from = document.getElementById("dateFrom").value;
      const to = document.getElementById("dateTo").value;

      if (!from && !to) return true;

      const dueDate = getDueDate(row);

      if (!dueDate) return true;

      const cleanDate = String(dueDate).slice(0, 10);

      if (from && cleanDate < from) return false;
      if (to && cleanDate > to) return false;

      return true;
    }

    function filteredTasks() {
      const clientFilter = document.getElementById("clientFilter").value;
      const statusFilter = document.getElementById("statusFilter").value;
      const priorityFilter = document.getElementById("priorityFilter").value;
      const query = document.getElementById("searchBox").value.toLowerCase().trim();

      let rows = [...tasks];

      if (clientFilter) {
        rows = rows.filter(row => String(row.tenant_id) === String(clientFilter));
      }

      if (statusFilter) {
        if (statusFilter === "pending") {
          rows = rows.filter(row => {
            const status = getTaskStatus(row);
            return isOpenTask(row) && status !== "in_progress";
          });
        } else if (statusFilter === "completed") {
          rows = rows.filter(row => isCompletedStatus(getTaskStatus(row)));
        } else {
          rows = rows.filter(row => getTaskStatus(row) === statusFilter);
        }
      }

      if (priorityFilter) {
        rows = rows.filter(row => getTaskPriority(row) === priorityFilter);
      }

      rows = rows.filter(withinDueDateRange);

      if (query) {
        rows = rows.filter(row => {
          const haystack = [
            getTenantNameById(row.tenant_id),
            getTaskTitle(row),
            getTaskDescription(row),
            getTaskStatus(row),
            getTaskPriority(row),
            getTaskOwner(row),
            JSON.stringify(row)
          ].join(" ").toLowerCase();

          return haystack.includes(query);
        });
      }

      return rows;
    }

    function renderTasksPage() {
      renderMetrics();
      renderClientSummary();
      renderTasksList();
    }

    function renderMetrics() {
      const rows = filteredTasks();

      const open = rows.filter(isOpenTask).length;
      const overdue = rows.filter(isOverdueTask).length;
      const dueSoon = rows.filter(isDueSoonTask).length;
      const inProgress = rows.filter(row => getTaskStatus(row) === "in_progress").length;
      const completed = rows.filter(row => isCompletedStatus(getTaskStatus(row))).length;
      const highPriority = rows.filter(row => ["high", "urgent"].includes(getTaskPriority(row)) && isOpenTask(row)).length;

      const metrics = [
        { title: "Total Tasks", value: rows.length, note: "Tasks in current view", cls: "blue" },
        { title: "Open Tasks", value: open, note: "Tasks still pending or in progress", cls: open > 0 ? "orange" : "green" },
        { title: "Overdue", value: overdue, note: "Open tasks past due date", cls: overdue > 0 ? "red" : "green" },
        { title: "Due Soon", value: dueSoon, note: "Open tasks due within 7 days", cls: dueSoon > 0 ? "orange" : "green" },
        { title: "In Progress", value: inProgress, note: "Tasks currently being handled", cls: "blue" },
        { title: "Completed", value: completed, note: "Finished tasks", cls: "green" },
        { title: "High / Urgent", value: highPriority, note: "Priority tasks needing attention", cls: highPriority > 0 ? "red" : "green" },
        { title: "Clients With Tasks", value: new Set(rows.map(row => row.tenant_id).filter(Boolean)).size, note: "Unique clients in current task view", cls: "blue" }
      ];

      document.getElementById("metricsGrid").innerHTML = metrics.map(item => `
        <div class="metric-card ${safe(item.cls)}">
          <h3>${safe(item.title)}</h3>
          <p>${safe(item.value)}</p>
          <div class="note">${safe(item.note)}</div>
        </div>
      `).join("");
    }

    function renderClientSummary() {
      const rows = filteredTasks();
      const clientMap = {};

      tenants.forEach(tenant => {
        clientMap[tenant.id] = {
          id: tenant.id,
          name: getTenantName(tenant),
          total: 0,
          open: 0,
          overdue: 0,
          dueSoon: 0,
          completed: 0
        };
      });

      rows.forEach(row => {
        const tenantId = row.tenant_id;

        if (!tenantId || !clientMap[tenantId]) return;

        clientMap[tenantId].total += 1;

        if (isOpenTask(row)) clientMap[tenantId].open += 1;
        if (isOverdueTask(row)) clientMap[tenantId].overdue += 1;
        if (isDueSoonTask(row)) clientMap[tenantId].dueSoon += 1;
        if (isCompletedStatus(getTaskStatus(row))) clientMap[tenantId].completed += 1;
      });

      const summaryRows = Object.values(clientMap)
        .filter(row => row.total > 0)
        .sort((a, b) => b.open - a.open || b.total - a.total)
        .slice(0, 10);

      if (summaryRows.length === 0) {
        document.getElementById("clientSummaryBox").innerHTML = `
          <div class="empty">
            <h3>No client task summary yet</h3>
            <p>Client task summary will appear after tasks are added.</p>
          </div>
        `;
        return;
      }

      document.getElementById("clientSummaryBox").innerHTML = summaryRows.map(row => `
        <div class="row-card ${row.overdue > 0 ? "overdue-card" : row.open > 0 ? "open-card" : "done-card"}">
          <div class="row-title">${safe(row.name)}</div>
          <p class="row-detail"><strong>Total Tasks:</strong> ${safe(row.total)}</p>
          <p class="row-detail"><strong>Open:</strong> ${safe(row.open)}</p>
          <p class="row-detail"><strong>Overdue:</strong> ${safe(row.overdue)}</p>
          <p class="row-detail"><strong>Due Soon:</strong> ${safe(row.dueSoon)}</p>
          <p class="row-detail"><strong>Completed:</strong> ${safe(row.completed)}</p>
          ${row.overdue > 0 ? `<span class="badge red">Needs follow-up</span>` : row.open > 0 ? `<span class="badge orange">Open tasks</span>` : `<span class="badge green">Clear</span>`}
        </div>
      `).join("");
    }

    function renderTasksList() {
      const rows = filteredTasks();

      document.getElementById("tasksCountText").innerText = `${rows.length} task(s) shown`;

      if (rows.length === 0) {
        document.getElementById("tasksListBox").innerHTML = `
          <div class="empty">
            <h3>No tasks found</h3>
            <p>Try changing the filters or wait for clients to add tasks.</p>
          </div>
        `;
        return;
      }

      document.getElementById("tasksListBox").innerHTML = rows.map(row => {
        const status = getTaskStatus(row);
        const priority = getTaskPriority(row);

        return `
          <div class="row-card ${safe(taskCardClass(row))}">
            <div class="row-title">${safe(getTaskTitle(row))}</div>
            <p class="row-detail"><strong>Client:</strong> ${safe(getTenantNameById(row.tenant_id))}</p>
            <p class="row-detail"><strong>Description:</strong> ${safe(getTaskDescription(row) || "N/A")}</p>
            <p class="row-detail"><strong>Assigned / Responsible:</strong> ${safe(getTaskOwner(row))}</p>
            <p class="row-detail"><strong>Due Date:</strong> ${safe(formatDate(getDueDate(row)))}</p>
            <p class="row-detail"><strong>Created:</strong> ${safe(formatDateTime(getCreatedDate(row)))}</p>

            ${statusBadge(status)}
            ${priorityBadge(priority)}
            ${isOverdueTask(row) ? `<span class="badge red">Overdue</span>` : ""}
            ${isDueSoonTask(row) ? `<span class="badge orange">Due Soon</span>` : ""}

            <div class="button-row">
              <button class="ungani-btn" onclick="renderSelectedTask('${safe(row.id)}')">Open Details</button>
              <button class="ungani-btn blue" onclick="quickUpdateStatus('${safe(row.id)}','in_progress')">In Progress</button>
              <button class="ungani-btn green" onclick="quickUpdateStatus('${safe(row.id)}','completed')">Completed</button>
              <button class="ungani-btn red" onclick="quickUpdateStatus('${safe(row.id)}','cancelled')">Cancel</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderSelectedTask(taskId) {
      const row = tasks.find(item => String(item.id) === String(taskId));

      if (!row) {
        selectedTaskId = null;
        document.getElementById("selectedTaskTitle").innerText = "Selected Task";
        document.getElementById("selectedTaskBox").innerHTML = `
          <div class="empty">
            <h3>Task not found</h3>
            <p>Please refresh the task list.</p>
          </div>
        `;
        return;
      }

      selectedTaskId = row.id;

      document.getElementById("selectedTaskTitle").innerText = getTaskTitle(row);

      document.getElementById("selectedTaskBox").innerHTML = `
        <div class="row-card ${safe(taskCardClass(row))}">
          <div class="row-title">${safe(getTaskTitle(row))}</div>
          <p class="row-detail"><strong>Client:</strong> ${safe(getTenantNameById(row.tenant_id))}</p>
          <p class="row-detail"><strong>Description:</strong> ${safe(getTaskDescription(row) || "N/A")}</p>
          <p class="row-detail"><strong>Assigned / Responsible:</strong> ${safe(getTaskOwner(row))}</p>
          <p class="row-detail"><strong>Due Date:</strong> ${safe(formatDate(getDueDate(row)))}</p>
          <p class="row-detail"><strong>Created:</strong> ${safe(formatDateTime(getCreatedDate(row)))}</p>

          ${statusBadge(getTaskStatus(row))}
          ${priorityBadge(getTaskPriority(row))}
          ${isOverdueTask(row) ? `<span class="badge red">Overdue</span>` : ""}
          ${isDueSoonTask(row) ? `<span class="badge orange">Due Soon</span>` : ""}
        </div>

        <label for="editStatus">Update Status</label>
        <select id="editStatus">
          <option value="pending">Pending</option>
          <option value="in_progress">In Progress</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>

        <div class="button-row">
          <button class="ungani-btn gold" onclick="saveSelectedTaskStatus()" id="saveTaskStatusBtn">Save Status</button>
          <button class="ungani-btn blue" onclick="quickUpdateStatus('${safe(row.id)}','in_progress', this)">Mark In Progress</button>
          <button class="ungani-btn green" onclick="quickUpdateStatus('${safe(row.id)}','completed', this)">Mark Completed</button>
          <button class="ungani-btn red" onclick="quickUpdateStatus('${safe(row.id)}','cancelled', this)">Cancel Task</button>
        </div>
      `;

      const currentStatus = getTaskStatus(row);

      if (isCompletedStatus(currentStatus)) {
        document.getElementById("editStatus").value = "completed";
      } else if (isCancelledStatus(currentStatus)) {
        document.getElementById("editStatus").value = "cancelled";
      } else if (currentStatus === "in_progress") {
        document.getElementById("editStatus").value = "in_progress";
      } else {
        document.getElementById("editStatus").value = "pending";
      }

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function updateTaskStatus(taskId, status) {
      const payload = {
        status,
        updated_at: new Date().toISOString()
      };

      const { error } = await supabaseClient
        .from("tasks")
        .update(payload)
        .eq("id", taskId);

      if (error) {
        alert(error.message);
        return false;
      }

      return true;
    }

    async function quickUpdateStatus(taskId, status, buttonEl) {
      await UnganiAdminShared.withButtonLoading(buttonEl, async () => {
        const ok = await updateTaskStatus(taskId, status);

        if (!ok) return;

        selectedTaskId = taskId;

        UnganiAdminShared.showToast("Task status updated ✓");
        await loadPageData();
      });
    }

    async function saveSelectedTaskStatus() {
      if (!selectedTaskId) {
        alert("No task selected.");
        return;
      }

      await UnganiAdminShared.withButtonLoading(document.getElementById("saveTaskStatusBtn"), async () => {
        const status = document.getElementById("editStatus").value;
        const ok = await updateTaskStatus(selectedTaskId, status);

        if (!ok) return;

        UnganiAdminShared.showToast("Task status saved ✓");
        await loadPageData();
      });
    }

    function resetFilters() {
      document.getElementById("clientFilter").value = "";
      document.getElementById("statusFilter").value = "";
      document.getElementById("priorityFilter").value = "";
      document.getElementById("dateFrom").value = "";
      document.getElementById("dateTo").value = "";
      document.getElementById("searchBox").value = "";

      renderTasksPage();

      UnganiAdminShared.showToast("Task filters reset ✓");
    }
  </script>
</body>
</html>
