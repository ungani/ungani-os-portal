<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Admin Tasks</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="pwa-register.js"></script>
  <script src="admin-shared.js"></script>

  <style>
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 24px var(--ungani-shadow);
    }

    .metric-card h3 {
      margin: 0 0 8px;
      color: var(--ungani-muted);
      font-size: 14px;
    }

    .metric-card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
      color: var(--ungani-text);
    }

    .metric-card .note {
      margin-top: 8px;
      color: var(--ungani-muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .metric-card.green { border-left-color: var(--ungani-green); }
    .metric-card.red { border-left-color: var(--ungani-red); }
    .metric-card.orange { border-left-color: var(--ungani-orange); }
    .metric-card.blue { border-left-color: var(--ungani-blue); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 8px 0 6px;
      font-size: 14px;
      color: var(--ungani-text);
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--ungani-border);
      border-radius: 12px;
      background: var(--ungani-card);
      color: var(--ungani-text);
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
    }

    .section-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-title-row h2 {
      margin: 0;
    }

    .row-card {
      background: var(--ungani-bg);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .row-card.open-card { border-left-color: var(--ungani-orange); }
    .row-card.done-card { border-left-color: var(--ungani-green); }
    .row-card.overdue-card { border-left-color: var(--ungani-red); }
    .row-card.info-card { border-left-color: var(--ungani-blue); }

    .row-title {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 6px;
      color: var(--ungani-text);
    }

    .row-detail {
      color: var(--ungani-muted);
      margin: 5px 0;
      line-height: 1.45;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      background: #061C3D;
      color: #FFFFFF;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      text-transform: capitalize;
    }

    .badge.green { background: var(--ungani-green); }
    .badge.red { background: var(--ungani-red); }
    .badge.orange { background: var(--ungani-orange); }
    .badge.blue { background: var(--ungani-blue); }
    .badge.gold { background: var(--ungani-gold); color: #061C3D; }

    .empty {
      text-align: center;
      padding: 28px;
      background: var(--ungani-bg);
      border: 1px dashed var(--ungani-border);
      border-radius: 18px;
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--ungani-text);
    }

    .empty p {
      margin: 0;
      color: var(--ungani-muted);
    }

    .small-text {
      color: var(--ungani-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 950px) {
      .two-col {
        grid-template-columns: 1fr;
      }
    }

    .category-tiles {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .category-tile {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 5px solid var(--tile-accent, var(--ungani-gold));
      border-radius: 18px;
      padding: 14px 16px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: 0.18s ease;
    }

    .category-tile:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px var(--ungani-shadow);
    }

    .category-tile.active {
      box-shadow: 0 0 0 2px var(--tile-accent, var(--ungani-gold));
    }

    .category-tile .tile-count {
      display: block;
      font-size: 22px;
      font-weight: 900;
      color: var(--ungani-text);
    }

    .category-tile .tile-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--ungani-muted);
      margin-top: 4px;
    }

    .ungani-table-wrap {
      overflow-x: auto;
    }

    .ungani-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 680px;
    }

    .ungani-table thead th {
      text-align: left;
      padding: 10px 12px;
      color: var(--ungani-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--ungani-border);
      white-space: nowrap;
    }

    .ungani-table tbody tr {
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .ungani-table tbody tr:hover {
      background: rgba(212, 166, 58, 0.08);
    }

    .ungani-table td {
      padding: 12px;
      border-bottom: 1px solid var(--ungani-border);
      vertical-align: middle;
    }

    .ungani-table td:first-child {
      border-left: 4px solid var(--accent, #64748B);
      font-weight: bold;
      color: var(--ungani-text);
    }

    .ungani-table .row-sub {
      display: block;
      font-weight: normal;
      color: var(--ungani-muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .modal-form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
    }

    .modal-form-grid-full {
      grid-column: 1 / -1;
    }

    .nudge-empty h3 {
      margin: 0 0 6px;
      color: var(--ungani-text);
      font-size: 15px;
    }

    .nudge-empty p {
      margin: 0 auto;
      max-width: 340px;
      font-size: 13px;
    }

    .nudge-icon {
      font-size: 32px;
      display: inline-block;
      margin-bottom: 8px;
      animation: unganiNudgeFloat 6s ease-in-out infinite;
    }

    @keyframes unganiNudgeFloat {
      0%, 12% { opacity: 0.5; transform: translateY(0); }
      22% { opacity: 1; transform: translateY(-6px); }
      32%, 100% { opacity: 0.5; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .nudge-icon {
        animation: none;
        opacity: 0.85;
      }
    }

    .summary-banner {
      display: block;
      width: 100%;
      text-align: left;
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--tile-accent, var(--ungani-green));
      border-radius: 20px;
      padding: 16px 18px;
      margin-bottom: 18px;
      cursor: pointer;
      font-family: inherit;
      transition: 0.18s ease;
    }

    .summary-banner:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px var(--ungani-shadow);
    }

    .summary-banner strong {
      font-size: 20px;
      color: var(--ungani-text);
    }

    .summary-banner .summary-sub {
      display: block;
      margin-top: 3px;
      color: var(--ungani-muted);
      font-size: 13px;
    }

    .summary-banner .summary-cta {
      display: block;
      margin-top: 4px;
      color: var(--ungani-gold);
      font-size: 12px;
      font-weight: 700;
    }

    .mini-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.25);
      overflow: hidden;
      display: flex;
      margin-top: 10px;
    }

    .mini-bar-segment {
      height: 100%;
    }
  </style>
</head>

<body>
  <div id="adminRoot"></div>

  <script>
    let supabaseClient = null;
    let currentAdmin = null;

    let tenants = [];
    let tasks = [];
    let selectedTaskId = null;

    const pageMainHtml = `
      <section class="ungani-card ungani-hero-card">
        <div style="position: relative; z-index: 1;">
          <h2>Admin Tasks Center</h2>
          <p>
            Review client tasks, follow-ups, deadlines, priorities, and task progress across all businesses.
          </p>
          <div style="margin-top: 16px;">
            <a class="ungani-btn" href="admin-home.html">Admin Home</a>
            <a class="ungani-btn green" href="admin.html">Main Admin</a>
            <a class="ungani-btn blue" href="admin-reports.html">Reports</a>
            <a class="ungani-btn dark" href="admin-settings.html">Admin Settings</a>
          </div>
        </div>
      </section>

      <section class="category-tiles" id="categoryTiles"></section>

      <button type="button" class="summary-banner" id="clientSummaryBanner" onclick="openClientSummaryModal()">
        <strong>Loading client summary...</strong>
        <span class="summary-sub">Please wait.</span>
      </button>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>Task Filters</h2>
          <button class="ungani-btn green" onclick="loadPageData()">Refresh</button>
        </div>

        <div class="form-grid">
          <div>
            <label for="clientFilter">Client</label>
            <select id="clientFilter" onchange="renderTasksPage()">
              <option value="">All Clients</option>
            </select>
          </div>

          <div>
            <label for="priorityFilter">Priority</label>
            <select id="priorityFilter" onchange="renderTasksPage()">
              <option value="">All Priorities</option>
              <option value="normal">Normal</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
            </select>
          </div>

          <div>
            <label for="dateFrom">Due From</label>
            <input id="dateFrom" type="date" onchange="renderTasksPage()" />
          </div>

          <div>
            <label for="dateTo">Due To</label>
            <input id="dateTo" type="date" onchange="renderTasksPage()" />
          </div>

          <div>
            <label for="searchBox">Search</label>
            <input id="searchBox" placeholder="Search tasks..." oninput="renderTasksPage()" />
          </div>
        </div>

        <div class="button-row">
          <button class="ungani-btn dark" onclick="resetFilters()">Reset Filters</button>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>All Client Tasks</h2>
          <p class="small-text" id="tasksCountText">Loading...</p>
        </div>

        <div class="ungani-table-wrap" id="tasksListBox">
          <div class="empty">
            <h3>Loading tasks...</h3>
            <p>Please wait.</p>
          </div>
        </div>
        <div id="tasksPagination"></div>
      </section>
    `;

    window.addEventListener("load", function () {
      UnganiAdminShared.renderShell("adminRoot", {
        activeKey: "admin-tasks",
        pageTitle: "Admin Tasks",
        pageSubtitle: "View and manage client tasks and follow-ups.",
        footerTitle: "Admin Tasks",
        footerVersion: "Admin Tasks Version: Step 287 Shared Session Added",
        mainHtml: pageMainHtml
      });

      UnganiAdminShared.requireAdmin({
        onNoSession: function () {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiLoginShell").classList.remove("hidden");
        },
        onBlocked: function (reason) {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiBlockedShell").classList.remove("hidden");
          document.getElementById("unganiBlockedReason").innerText = reason;
        },
        onReady: async function (admin, client) {
          currentAdmin = admin;
          supabaseClient = client;

          UnganiAdminShared.renderSidebar("adminSidebar", {
            activeKey: "admin-tasks",
            adminName: admin.full_name || "Admin Workspace",
            footerTitle: "Admin Tasks",
            footerVersion: "Admin Tasks Version: Step 287 Shared Session Added"
          });

          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiAppShell").classList.remove("hidden");

          await loadPageData();
        }
      });
    });

    function safe(value) {
      return UnganiAdminShared.safe(value);
    }

    function cleanText(value) {
      return UnganiAdminShared.cleanText(value);
    }

    function getField(row, names, fallback = "") {
      for (const name of names) {
        if (row && row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return fallback;
    }

    function getTenantName(row) {
      return getField(row, ["company_name", "business_name", "name"], "Client Business");
    }

    function getTenantNameById(tenantId) {
      const tenant = tenants.find(row => String(row.id) === String(tenantId));
      return tenant ? getTenantName(tenant) : "Unknown Client";
    }

    function getTaskTitle(row) {
      return getField(row, ["task_title", "title", "name"], "Task / Follow-up");
    }

    function getTaskDescription(row) {
      return getField(row, ["task_description", "description", "notes", "details"], "");
    }

    function getTaskStatus(row) {
      return String(getField(row, ["status", "task_status"], "pending")).toLowerCase();
    }

    function getTaskPriority(row) {
      return String(getField(row, ["priority"], "normal")).toLowerCase();
    }

    function getDueDate(row) {
      return getField(row, ["due_date", "task_due_date", "follow_up_date"], "");
    }

    function getTaskOwner(row) {
      return getField(row, ["assigned_to", "owner", "responsible_person", "person_name"], "N/A");
    }

    function getCreatedDate(row) {
      return getField(row, ["created_at", "updated_at"], "");
    }

    function todayDate() {
      return new Date().toISOString().slice(0, 10);
    }

    function dateInDays(days) {
      const dateObj = new Date();
      dateObj.setDate(dateObj.getDate() + days);
      return dateObj.toISOString().slice(0, 10);
    }

    function formatDate(value) {
      if (!value) return "N/A";
      const dateObj = new Date(value);
      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleDateString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function formatDateTime(value) {
      if (!value) return "N/A";
      const dateObj = new Date(value);
      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function isCompletedStatus(status) {
      return ["done", "completed", "closed", "resolved"].includes(String(status || "").toLowerCase());
    }

    function isCancelledStatus(status) {
      return ["cancelled", "canceled"].includes(String(status || "").toLowerCase());
    }

    function isOpenTask(row) {
      const status = getTaskStatus(row);
      return !isCompletedStatus(status) && !isCancelledStatus(status);
    }

    function isOverdueTask(row) {
      const dueDate = getDueDate(row);
      return dueDate && String(dueDate).slice(0, 10) < todayDate() && isOpenTask(row);
    }

    function isDueSoonTask(row) {
      const dueDate = getDueDate(row);
      return dueDate &&
        String(dueDate).slice(0, 10) >= todayDate() &&
        String(dueDate).slice(0, 10) <= dateInDays(7) &&
        isOpenTask(row);
    }

    function statusBadge(status) {
      const clean = String(status || "pending").toLowerCase();

      if (isCompletedStatus(clean)) {
        return `<span class="badge green">${safe(cleanText(clean))}</span>`;
      }

      if (isCancelledStatus(clean)) {
        return `<span class="badge red">${safe(cleanText(clean))}</span>`;
      }

      if (clean === "in_progress") {
        return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
      }

      return `<span class="badge orange">${safe(cleanText(clean))}</span>`;
    }

    function priorityBadge(priority) {
      const clean = String(priority || "normal").toLowerCase();

      if (clean === "urgent" || clean === "high") {
        return `<span class="badge red">${safe(cleanText(clean))}</span>`;
      }

      if (clean === "medium") {
        return `<span class="badge orange">${safe(cleanText(clean))}</span>`;
      }

      return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
    }

    function taskCardClass(row) {
      if (isOverdueTask(row)) return "overdue-card";
      if (isCompletedStatus(getTaskStatus(row))) return "done-card";
      if (isOpenTask(row)) return "open-card";
      return "info-card";
    }

    function taskBucket(row) {
      if (isOverdueTask(row)) return "overdue";
      if (isDueSoonTask(row)) return "duesoon";

      const status = getTaskStatus(row);

      if (status === "in_progress") return "inprogress";
      if (isCompletedStatus(status)) return "completed";
      if (isCancelledStatus(status)) return "cancelled";

      return "pending";
    }

    function statusAccent(row) {
      const bucket = taskBucket(row);

      if (bucket === "overdue") return "#B91C1C";
      if (bucket === "duesoon") return "#C77700";
      if (bucket === "inprogress") return "#2563EB";
      if (bucket === "completed") return "#15803D";
      if (bucket === "cancelled") return "#64748B";

      return "#94A3B8";
    }

    const TASK_CATEGORIES = [
      { key: "all", label: "All Tasks", accent: "#D4A63A", match: () => true },
      { key: "overdue", label: "Overdue", accent: "#B91C1C", match: row => taskBucket(row) === "overdue" },
      { key: "duesoon", label: "Due Soon", accent: "#C77700", match: row => taskBucket(row) === "duesoon" },
      { key: "inprogress", label: "In Progress", accent: "#2563EB", match: row => taskBucket(row) === "inprogress" },
      { key: "pending", label: "Pending", accent: "#94A3B8", match: row => taskBucket(row) === "pending" },
      { key: "completed", label: "Completed", accent: "#15803D", match: row => taskBucket(row) === "completed" },
      { key: "cancelled", label: "Cancelled", accent: "#64748B", match: row => taskBucket(row) === "cancelled" }
    ];

    let activeTaskCategory = "all";
    const TASKS_PAGE_SIZE = 25;
    let tasksCurrentPage = 1;

    function goToTasksPage(page) {
      tasksCurrentPage = page;
      renderTasksList();
    }

    async function safeSelect(tableName) {
      try {
        const { data, error } = await supabaseClient
          .from(tableName)
          .select("*")
          .limit(10000);

        if (error) {
          console.log(tableName, error.message);
          return [];
        }

        return data || [];
      } catch (error) {
        console.log(tableName, error.message);
        return [];
      }
    }

    async function loadPageData() {
      UnganiAdminShared.showToast("Loading tasks...");

      const [tenantRows, taskRows] = await Promise.all([
        safeSelect("tenants"),
        safeSelect("tasks")
      ]);

      tenants = tenantRows;
      tasks = taskRows.sort((a, b) => new Date(getCreatedDate(b) || 0) - new Date(getCreatedDate(a) || 0));

      fillClientFilter();
      renderTasksPage();

      UnganiAdminShared.showToast("Tasks updated ✓");
    }

    function fillClientFilter() {
      const selected = document.getElementById("clientFilter").value;

      const options = tenants
        .map(row => `<option value="${safe(row.id)}">${safe(getTenantName(row))}</option>`)
        .join("");

      document.getElementById("clientFilter").innerHTML = `<option value="">All Clients</option>${options}`;

      if (selected) {
        document.getElementById("clientFilter").value = selected;
      }
    }

    function withinDueDateRange(row) {
      const from = document.getElementById("dateFrom").value;
      const to = document.getElementById("dateTo").value;

      if (!from && !to) return true;

      const dueDate = getDueDate(row);

      if (!dueDate) return true;

      const cleanDate = String(dueDate).slice(0, 10);

      if (from && cleanDate < from) return false;
      if (to && cleanDate > to) return false;

      return true;
    }

    function baseFilteredTasks() {
      const clientFilter = document.getElementById("clientFilter").value;
      const priorityFilter = document.getElementById("priorityFilter").value;
      const query = document.getElementById("searchBox").value.toLowerCase().trim();

      let rows = [...tasks];

      if (clientFilter) {
        rows = rows.filter(row => String(row.tenant_id) === String(clientFilter));
      }

      if (priorityFilter) {
        rows = rows.filter(row => getTaskPriority(row) === priorityFilter);
      }

      rows = rows.filter(withinDueDateRange);

      if (query) {
        rows = rows.filter(row => {
          const haystack = [
            getTenantNameById(row.tenant_id),
            getTaskTitle(row),
            getTaskDescription(row),
            getTaskStatus(row),
            getTaskPriority(row),
            getTaskOwner(row),
            JSON.stringify(row)
          ].join(" ").toLowerCase();

          return haystack.includes(query);
        });
      }

      return rows;
    }

    function filteredTasks() {
      const category = TASK_CATEGORIES.find(item => item.key === activeTaskCategory) || TASK_CATEGORIES[0];
      return baseFilteredTasks().filter(category.match);
    }

    function selectTaskCategory(key) {
      activeTaskCategory = key;
      renderTasksPage();
    }

    function renderCategoryTiles() {
      const base = baseFilteredTasks();

      document.getElementById("categoryTiles").innerHTML = TASK_CATEGORIES.map(category => {
        const count = base.filter(category.match).length;
        const active = category.key === activeTaskCategory ? " active" : "";

        return `
          <button type="button" class="category-tile${active}" style="--tile-accent:${category.accent};" onclick="selectTaskCategory('${category.key}')">
            <span class="tile-count">${safe(count)}</span>
            <span class="tile-label">${safe(category.label)}</span>
          </button>
        `;
      }).join("");
    }

    function renderTasksPage() {
      tasksCurrentPage = 1;
      renderCategoryTiles();
      renderClientSummary();
      renderTasksList();
    }

    let lastClientSummaryRows = [];

    function computeClientSummaryRows() {
      const rows = filteredTasks();
      const clientMap = {};

      tenants.forEach(tenant => {
        clientMap[tenant.id] = {
          id: tenant.id,
          name: getTenantName(tenant),
          total: 0,
          open: 0,
          overdue: 0,
          dueSoon: 0,
          completed: 0
        };
      });

      rows.forEach(row => {
        const tenantId = row.tenant_id;

        if (!tenantId || !clientMap[tenantId]) return;

        clientMap[tenantId].total += 1;

        if (isOpenTask(row)) clientMap[tenantId].open += 1;
        if (isOverdueTask(row)) clientMap[tenantId].overdue += 1;
        if (isDueSoonTask(row)) clientMap[tenantId].dueSoon += 1;
        if (isCompletedStatus(getTaskStatus(row))) clientMap[tenantId].completed += 1;
      });

      return Object.values(clientMap)
        .filter(row => row.total > 0)
        .sort((a, b) => b.overdue - a.overdue || b.open - a.open || b.total - a.total);
    }

    function renderClientSummary() {
      const summaryRows = computeClientSummaryRows();
      lastClientSummaryRows = summaryRows;

      const banner = document.getElementById("clientSummaryBanner");
      const totalClients = summaryRows.length;
      const needsAttention = summaryRows.filter(row => row.overdue > 0 || row.open > 0).length;
      const clean = totalClients - needsAttention;

      if (totalClients === 0) {
        banner.style.setProperty("--tile-accent", "#64748B");
        banner.innerHTML = `
          <strong>No client task summary yet</strong>
          <span class="summary-sub">Client task summary will appear after tasks are added.</span>
        `;
        return;
      }

      banner.style.setProperty("--tile-accent", needsAttention > 0 ? "#C77700" : "#15803D");
      banner.innerHTML = `
        <strong>${safe(totalClients)} client${totalClients === 1 ? "" : "s"} tracked</strong>
        <span class="summary-sub">${safe(needsAttention)} with open or overdue tasks</span>
        <div class="mini-bar">
          ${clean > 0 ? `<div class="mini-bar-segment" style="width:${(clean / totalClients) * 100}%;background:#15803D;"></div>` : ""}
          ${needsAttention > 0 ? `<div class="mini-bar-segment" style="width:${(needsAttention / totalClients) * 100}%;background:#C77700;"></div>` : ""}
        </div>
        <span class="summary-cta">Tap for full breakdown →</span>
      `;
    }

    function openClientSummaryModal() {
      const summaryRows = lastClientSummaryRows.slice(0, 10);

      const bodyHtml = summaryRows.length === 0
        ? emptyStateNudge("✅", "No client task summary yet", "Client task summary will appear after tasks are added.")
        : summaryRows.map(row => `
            <div class="row-card ${row.overdue > 0 ? "overdue-card" : row.open > 0 ? "open-card" : "done-card"}">
              <div class="row-title">${safe(row.name)}</div>
              <p class="row-detail"><strong>Total Tasks:</strong> ${safe(row.total)}</p>
              <p class="row-detail"><strong>Open:</strong> ${safe(row.open)}</p>
              <p class="row-detail"><strong>Overdue:</strong> ${safe(row.overdue)}</p>
              <p class="row-detail"><strong>Due Soon:</strong> ${safe(row.dueSoon)}</p>
              <p class="row-detail"><strong>Completed:</strong> ${safe(row.completed)}</p>
              ${row.overdue > 0 ? `<span class="badge red">Needs follow-up</span>` : row.open > 0 ? `<span class="badge orange">Open tasks</span>` : `<span class="badge green">Clear</span>`}
            </div>
          `).join("");

      UnganiAdminShared.openModal({ title: "Client Task Summary", bodyHtml: bodyHtml });
    }

    function emptyStateNudge(icon, title, message) {
      return `
        <div class="nudge-empty" style="text-align:center; padding: 28px 16px;">
          <span class="nudge-icon">${safe(icon)}</span>
          <h3>${safe(title)}</h3>
          <p>${safe(message)}</p>
        </div>
      `;
    }

    let lastRenderedTasks = [];

    function renderTasksList() {
      const rows = filteredTasks();
      lastRenderedTasks = rows;

      document.getElementById("tasksCountText").innerText = `${rows.length} task(s) shown`;

      const wrap = document.getElementById("tasksListBox");
      const paginationBox = document.getElementById("tasksPagination");

      if (rows.length === 0) {
        wrap.innerHTML = emptyStateNudge("✅", "No tasks found", "Try changing the filters, or wait for clients to add tasks.");
        if (paginationBox) paginationBox.innerHTML = "";
        return;
      }

      const totalPages = Math.max(1, Math.ceil(rows.length / TASKS_PAGE_SIZE));
      tasksCurrentPage = Math.min(Math.max(1, tasksCurrentPage), totalPages);
      const startIdx = (tasksCurrentPage - 1) * TASKS_PAGE_SIZE;
      const pageRows = rows.slice(startIdx, startIdx + TASKS_PAGE_SIZE);

      wrap.innerHTML = `
        <table class="ungani-table">
          <thead>
            <tr>
              <th>Task</th>
              <th>Client</th>
              <th>Assigned / Due</th>
              <th>Priority</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            ${pageRows.map((row, i) => {
              const index = startIdx + i;
              return `
              <tr style="--accent:${statusAccent(row)};" onclick="openTaskModal(${index})">
                <td>
                  ${safe(getTaskTitle(row))}
                  <span class="row-sub">${safe(getTaskDescription(row) || "No description")}</span>
                </td>
                <td>${safe(getTenantNameById(row.tenant_id))}</td>
                <td>
                  ${safe(getTaskOwner(row))}
                  <span class="row-sub">Due ${safe(formatDate(getDueDate(row)))}</span>
                </td>
                <td>${priorityBadge(getTaskPriority(row))}</td>
                <td>
                  ${statusBadge(getTaskStatus(row))}
                  ${isOverdueTask(row) ? `<span class="badge red">Overdue</span>` : ""}
                  ${isDueSoonTask(row) ? `<span class="badge orange">Due Soon</span>` : ""}
                </td>
              </tr>
            `;
            }).join("")}
          </tbody>
        </table>
      `;

      if (paginationBox) paginationBox.innerHTML = UnganiAdminShared.buildPaginationHtml(tasksCurrentPage, totalPages, "goToTasksPage");
    }

    function openTaskModal(index) {
      const row = lastRenderedTasks[index];

      if (!row) return;

      selectedTaskId = row.id;

      const bodyHtml = `
        <div class="row-card ${safe(taskCardClass(row))}" style="margin-bottom: 14px;">
          <div class="row-title">${safe(getTaskTitle(row))}</div>
          <p class="row-detail"><strong>Client:</strong> ${safe(getTenantNameById(row.tenant_id))}</p>
          <p class="row-detail"><strong>Description:</strong> ${safe(getTaskDescription(row) || "N/A")}</p>
          <p class="row-detail"><strong>Assigned / Responsible:</strong> ${safe(getTaskOwner(row))}</p>
          <p class="row-detail"><strong>Due Date:</strong> ${safe(formatDate(getDueDate(row)))}</p>
          <p class="row-detail"><strong>Created:</strong> ${safe(formatDateTime(getCreatedDate(row)))}</p>

          ${statusBadge(getTaskStatus(row))}
          ${priorityBadge(getTaskPriority(row))}
          ${isOverdueTask(row) ? `<span class="badge red">Overdue</span>` : ""}
          ${isDueSoonTask(row) ? `<span class="badge orange">Due Soon</span>` : ""}
        </div>

        <label for="editStatus">Update Status</label>
        <select id="editStatus">
          <option value="pending">Pending</option>
          <option value="in_progress">In Progress</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>

        <div class="button-row">
          <button class="ungani-btn gold" onclick="saveSelectedTaskStatus()" id="saveTaskStatusBtn">Save Status</button>
          <button class="ungani-btn blue" onclick="quickUpdateStatus('${safe(row.id)}','in_progress', this)">Mark In Progress</button>
          <button class="ungani-btn green" onclick="quickUpdateStatus('${safe(row.id)}','completed', this)">Mark Completed</button>
          <button class="ungani-btn red" onclick="quickUpdateStatus('${safe(row.id)}','cancelled', this)">Cancel Task</button>
        </div>
      `;

      UnganiAdminShared.openModal({
        title: getTaskTitle(row),
        bodyHtml: bodyHtml,
        onOpen: function () {
          const currentStatus = getTaskStatus(row);

          if (isCompletedStatus(currentStatus)) {
            document.getElementById("editStatus").value = "completed";
          } else if (isCancelledStatus(currentStatus)) {
            document.getElementById("editStatus").value = "cancelled";
          } else if (currentStatus === "in_progress") {
            document.getElementById("editStatus").value = "in_progress";
          } else {
            document.getElementById("editStatus").value = "pending";
          }
        }
      });
    }

    async function updateTaskStatus(taskId, status) {
      const payload = {
        status,
        updated_at: new Date().toISOString()
      };

      const { error } = await supabaseClient
        .from("tasks")
        .update(payload)
        .eq("id", taskId);

      if (error) {
        alert(error.message);
        return false;
      }

      return true;
    }

    async function quickUpdateStatus(taskId, status, buttonEl) {
      await UnganiAdminShared.withButtonLoading(buttonEl, async () => {
        const ok = await updateTaskStatus(taskId, status);

        if (!ok) return;

        UnganiAdminShared.closeModal();
        UnganiAdminShared.showToast("Task status updated ✓");
        await loadPageData();
      });
    }

    async function saveSelectedTaskStatus() {
      if (!selectedTaskId) {
        alert("No task selected.");
        return;
      }

      await UnganiAdminShared.withButtonLoading(document.getElementById("saveTaskStatusBtn"), async () => {
        const status = document.getElementById("editStatus").value;
        const ok = await updateTaskStatus(selectedTaskId, status);

        if (!ok) return;

        UnganiAdminShared.closeModal();
        UnganiAdminShared.showToast("Task status saved ✓");
        await loadPageData();
      });
    }

    function resetFilters() {
      document.getElementById("clientFilter").value = "";
      document.getElementById("priorityFilter").value = "";
      document.getElementById("dateFrom").value = "";
      document.getElementById("dateTo").value = "";
      document.getElementById("searchBox").value = "";
      activeTaskCategory = "all";

      renderTasksPage();

      UnganiAdminShared.showToast("Task filters reset ✓");
    }
  </script>
</body>
</html>
