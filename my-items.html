<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Properties / Listings</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="pwa-register.js"></script>
  <script src="client-shared.js" onerror="window.__unganiClientSharedFailed = true;"></script>
  <script>
    (function () {
      function showUnganiLoadError() {
        if (typeof UnganiClientShared !== "undefined") return;

        var banner = document.createElement("div");
        banner.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99999;background:#B91C1C;color:#fff;padding:12px 16px;font:14px/1.4 -apple-system,sans-serif;text-align:center;";
        banner.innerHTML = "Some page resources failed to load. Please check your connection. " +
          "<button style=\"margin-left:10px;padding:4px 12px;border:none;border-radius:6px;background:#fff;color:#B91C1C;font-weight:700;cursor:pointer;\" onclick=\"window.location.reload()\">Reload</button>";

        if (document.body) {
          document.body.prepend(banner);
        } else {
          document.addEventListener("DOMContentLoaded", function () {
            document.body.prepend(banner);
          });
        }
      }

      if (window.__unganiClientSharedFailed) {
        showUnganiLoadError();
      } else {
        setTimeout(function () {
          if (typeof UnganiClientShared === "undefined") showUnganiLoadError();
        }, 4000);
      }
    })();
  </script>
  <script src="ungani-business-config.js"></script>
  <script src="nia-assistant.js"></script>
</head>

<body>
  <script>
    let currentContext = null;
    let items = [];
    let currentEditId = null;
    let isRealEstate = false;
    let activeItemCategory = "all";
    let urlActionApplied = false;

    const LISTING_TYPES = ["sale", "rent", "lease", "project", "land", "commercial", "other"];
    const STATUS_OPTIONS = ["available", "reserved", "under negotiation", "sold", "rented", "maintenance", "inactive"];

    const ITEM_CATEGORIES = [
      { key: "all", label: "All", accent: "#061C3D", match: function () { return true; } },
      { key: "sale", label: "Sale", accent: "#D4A63A", match: function (row) { return getListingType(row) === "sale"; } },
      { key: "rent", label: "Rent", accent: "#2563EB", match: function (row) { return getListingType(row) === "rent"; } },
      { key: "lease", label: "Lease", accent: "#7C3AED", match: function (row) { return getListingType(row) === "lease"; } },
      { key: "project", label: "Project", accent: "#16A34A", match: function (row) { return getListingType(row) === "project"; } },
      { key: "land", label: "Land", accent: "#EA580C", match: function (row) { return getListingType(row) === "land"; } },
      { key: "commercial", label: "Commercial", accent: "#0EA5E9", match: function (row) { return getListingType(row) === "commercial"; } },
      { key: "other", label: "Other", accent: "#64748B", match: function (row) { return LISTING_TYPES.indexOf(getListingType(row)) === -1 || getListingType(row) === "other"; } }
    ];

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "items",
        pageTitle: "Properties / Listings",
        pageSubtitle: "Browse, add, and manage properties, listings, projects, and availability.",
        onReady: startItemsPage
      });
    });

    async function startItemsPage(context) {
      currentContext = context;

      isRealEstate = detectRealEstate(context.tenant);

      const titleEl = document.querySelector(".ungani-topbar h2");
      const subEl = document.querySelector(".ungani-topbar p");

      if (titleEl) {
        titleEl.innerText = isRealEstate ? "Properties / Listings" : "Items / Assets / Stock";
      }

      if (subEl) {
        subEl.innerText = isRealEstate
          ? "Visual property grid, listing status, project progress, pricing, agents, and availability."
          : "Manage business items, assets, stock, equipment, and operational resources.";
      }

      await loadItems();
    }

    async function loadItems() {
      currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading properties and listings...");

      let response;

      try {
        response = await currentContext.supabaseClient
          .from("business_items")
          .select("*")
          .eq("tenant_id", currentContext.tenantId)
          .order("created_at", { ascending: false });
      } catch (error) {
        currentContext.contentEl.innerHTML = UnganiClientShared.errorCard("Could not load properties", error.message || "Network error. Please check your connection.");
        return;
      }

      if (response.error) {
        currentContext.contentEl.innerHTML = UnganiClientShared.errorCard("Could not load properties", response.error.message);
        return;
      }

      items = response.data || [];
      renderItemsPage();
    }

    function renderItemsPage() {
      const filtered = filterItems();
      const summary = calculateSummary(filtered);
      const projects = calculateProjects(filtered);

      UnganiClientShared.setContent(`
        <style>
          .property-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 18px;
          }

          .property-card {
            position: relative;
            overflow: hidden;
            padding: 0;
          }

          .property-card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 18px;
            bottom: 18px;
            width: 4px;
            border-radius: 0 999px 999px 0;
            background: var(--accent, #64748B);
            z-index: 2;
          }

          /* .property-card inherits .ungani-card:hover's transform, which combined with
             overflow:hidden here is the exact combo that caused the dashboard flicker bug -
             neutralize it so hover only shows a border/shadow change, never movement. */
          .property-card.property-card:hover {
            transform: none;
          }

          .property-photo {
            position: relative;
            min-height: 190px;
            background:
              radial-gradient(circle at top right, rgba(212,166,58,0.28), transparent 35%),
              linear-gradient(135deg, #061C3D, #082852);
            color: white;
            display: flex;
            align-items: flex-end;
            padding: 18px;
          }

          .property-photo img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
          }

          .property-photo::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 35%, rgba(6,28,61,0.72));
          }

          .property-photo-content {
            position: relative;
            z-index: 2;
          }

          .property-photo-content h3 {
            margin: 0 0 6px;
            color: white;
            font-size: 20px;
          }

          .property-photo-content p {
            margin: 0;
            color: rgba(255,255,255,0.78);
            font-size: 13px;
          }

          .property-card-body {
            padding: 18px;
          }

          .property-price {
            font-size: 24px;
            line-height: 1.05;
            font-weight: 950;
            letter-spacing: -0.04em;
            margin: 0 0 8px;
            color: var(--ungani-text);
          }

          .property-meta-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-top: 14px;
          }

          .property-meta {
            border: 1px solid var(--ungani-border);
            border-radius: 16px;
            padding: 10px;
            background: var(--ungani-soft);
          }

          .property-meta span {
            display: block;
            color: var(--ungani-muted);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 3px;
          }

          .property-meta strong {
            display: block;
            font-size: 14px;
          }

          .progress-track {
            height: 11px;
            border-radius: 999px;
            background: rgba(6,28,61,0.10);
            overflow: hidden;
            margin: 10px 0 7px;
          }

          .progress-bar {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, #D4A63A, #15803D);
          }

          .project-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
          }

          .category-tiles {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 18px;
          }

          .category-tile {
            background: var(--ungani-card);
            border: 1px solid var(--ungani-border);
            border-left: 5px solid var(--tile-accent, var(--ungani-gold));
            border-radius: 18px;
            padding: 14px 16px;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            transition: 0.18s ease;
          }

          .category-tile:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px var(--ungani-shadow);
          }

          .category-tile.active {
            box-shadow: 0 0 0 2px var(--tile-accent, var(--ungani-gold));
          }

          .category-tile .tile-count {
            display: block;
            font-size: 22px;
            font-weight: 900;
            color: var(--ungani-text);
          }

          .category-tile .tile-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--ungani-muted);
            margin-top: 4px;
          }

          .property-card {
            cursor: pointer;
          }

          @media (max-width: 1180px) {
            .property-grid,
            .project-grid {
              grid-template-columns: repeat(2, minmax(0, 1fr));
            }
          }

          @media (max-width: 680px) {
            .property-grid,
            .project-grid,
            .property-meta-grid {
              grid-template-columns: 1fr;
            }

            .property-photo {
              min-height: 165px;
            }

            .property-price {
              font-size: 21px;
            }
          }
        </style>

        <section class="ungani-card ungani-hero">
          <h2>${isRealEstate ? "Property Grid View" : "Items / Assets View"}</h2>
          <p>
            ${isRealEstate
              ? "Browse properties visually with price, status, project, location, assigned agent, and project progress."
              : "Browse business items, assets, stock, equipment, and operational resources."
            }
          </p>

          <div class="ungani-button-row">
            <button class="ungani-btn gold" onclick="openItemModal()">Add Property</button>
            <button class="ungani-btn green" onclick="loadItems()">Refresh</button>
            <a class="ungani-btn dark" href="client.html">Dashboard</a>
          </div>
        </section>

        ${renderCategoryTiles()}

        <section class="ungani-grid">
          ${UnganiClientShared.metricCard(isRealEstate ? "Total Properties" : "Total Items", filtered.length, "Current records shown", "blue")}
          ${UnganiClientShared.metricCard("Available", summary.available, "Ready for sale/rent/use", "green")}
          ${UnganiClientShared.metricCard("Reserved / Negotiation", summary.reservedNegotiation, "Needs follow-up", summary.reservedNegotiation > 0 ? "gold" : "blue")}
          ${UnganiClientShared.metricCard("Sold / Rented", summary.soldRented, "Closed or active rental", "green")}
          ${UnganiClientShared.metricCard("Estimated Value", UnganiClientShared.formatKES(summary.totalValue), "Visible property/listing value", "green")}
          ${UnganiClientShared.metricCard("Projects", projects.length, "Grouped developments", "gold")}
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>Project Progress</h3>
              <p class="ungani-small">Track developments by units sold, available units, and completion progress.</p>
            </div>
          </div>

          ${renderProjectProgress(projects)}
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <h3>Filters</h3>
            <button class="ungani-btn dark" onclick="resetFilters()">Reset Filters</button>
          </div>

          <div class="ungani-form-grid">
            <div>
              <label for="searchBox">Search</label>
              <input id="searchBox" placeholder="Search property, project, location, agent..." oninput="saveFilters(); renderItemsPage();" />
            </div>

            <div>
              <label for="filterStatus">Status</label>
              <select id="filterStatus" onchange="saveFilters(); renderItemsPage();">
                <option value="">All Statuses</option>
                <option value="available">Available</option>
                <option value="reserved">Reserved</option>
                <option value="under negotiation">Under Negotiation</option>
                <option value="sold">Sold</option>
                <option value="rented">Rented</option>
                <option value="maintenance">Maintenance</option>
                <option value="inactive">Inactive</option>
              </select>
            </div>

            <div>
              <label for="filterProject">Project</label>
              <select id="filterProject" onchange="saveFilters(); renderItemsPage();">
                <option value="">All Projects</option>
                ${getProjectOptions()}
              </select>
            </div>
          </div>
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>${isRealEstate ? "Properties / Listings" : "Items / Assets"}</h3>
              <p class="ungani-small">${filtered.length} record(s) shown.</p>
            </div>

            <button class="ungani-btn gold" onclick="openItemModal()">+ Add New</button>
          </div>

          ${renderPropertyGrid(filtered)}
        </section>

        <p class="ungani-small">
          Items / Properties Version: Step 308B Property Grid · ungani.com · info@ungani.com
        </p>
      `);

      restoreFilters();
      applyUrlActions();
    }

    function applyUrlActions() {
      if (urlActionApplied) return;

      const params = new URLSearchParams(window.location.search);
      const highlightId = params.get("highlight");
      const action = params.get("action");

      if (highlightId) {
        const row = items.find(function (item) { return String(item.id) === String(highlightId); });

        if (row) {
          urlActionApplied = true;
          setTimeout(function () { openItemModal(highlightId); }, 250);
          return;
        }
      }

      if (action === "add") {
        urlActionApplied = true;
        setTimeout(function () { openItemModal(null); }, 250);
      }
    }

    function renderProjectProgress(projects) {
      if (projects.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No project data yet</h3>
            <p>Add properties with a project name and unit counts to see development progress here.</p>
          </div>
        `;
      }

      return `
        <div class="project-grid">
          ${projects.map(function (project) {
            const percent = Math.max(0, Math.min(100, Number(project.progress || 0)));

            return `
              <div class="ungani-card" style="box-shadow:none;">
                <div class="ungani-section-title">
                  <div>
                    <h3 style="font-size:18px;">${UnganiClientShared.safe(project.name)}</h3>
                    <p class="ungani-small">${project.count} listing(s)</p>
                  </div>
                  <span class="ungani-badge ${progressColor(percent)}">${percent}%</span>
                </div>

                <div class="progress-track">
                  <div class="progress-bar" style="width:${percent}%;"></div>
                </div>

                <p class="ungani-small">
                  ${UnganiClientShared.safe(project.unitsSold)} / ${UnganiClientShared.safe(project.totalUnits)} units sold
                  · ${UnganiClientShared.safe(project.unitsAvailable)} available
                </p>

                <p class="ungani-small">
                  Estimated project value: <strong>${UnganiClientShared.safe(UnganiClientShared.formatKES(project.value))}</strong>
                </p>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderPropertyGrid(rows) {
      if (rows.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No properties found</h3>
            <p>Add your first property or change the filters.</p>
          </div>
        `;
      }

      return `
        <div class="property-grid">
          ${rows.map(function (row) {
            return renderPropertyCard(row);
          }).join("")}
        </div>
      `;
    }

    function renderPropertyCard(row) {
      const id = row.id;
      const name = getItemName(row);
      const project = UnganiClientShared.getValue(row, ["project_name"], "");
      const location = UnganiClientShared.getValue(row, ["property_location", "location"], "");
      const price = Number(UnganiClientShared.getValue(row, ["property_price", "selling_price", "cost_price"], 0) || 0);
      const status = getStatus(row);
      const listingType = UnganiClientShared.getValue(row, ["listing_type", "item_type", "type"], "property");
      const agent = UnganiClientShared.getValue(row, ["assigned_agent"], "");
      const bedrooms = UnganiClientShared.getValue(row, ["bedrooms"], "");
      const bathrooms = UnganiClientShared.getValue(row, ["bathrooms"], "");
      const size = UnganiClientShared.getValue(row, ["property_size"], "");
      const totalUnits = Number(UnganiClientShared.getValue(row, ["total_units"], 0) || 0);
      const unitsSold = Number(UnganiClientShared.getValue(row, ["units_sold"], 0) || 0);
      const progress = getProgress(row);
      const photo = UnganiClientShared.getValue(row, ["photo_url", "image_url", "thumbnail_url"], "");
      const notes = UnganiClientShared.getValue(row, ["notes", "description"], "");

      return `
        <article class="ungani-card property-card" style="--accent:${UnganiClientShared.attr(statusAccentHex(status))};" onclick="openItemModal('${UnganiClientShared.attr(id)}')">
          <div class="property-photo">
            ${photo ? `<img src="${UnganiClientShared.attr(photo)}" alt="${UnganiClientShared.attr(name)}" onerror="this.style.display='none';" />` : ""}
            <div class="property-photo-content">
              <h3>${UnganiClientShared.safe(name)}</h3>
              <p>${UnganiClientShared.safe(project || location || "Property listing")}</p>
            </div>
          </div>

          <div class="property-card-body">
            <div class="ungani-section-title">
              <div>
                <p class="property-price">${price > 0 ? UnganiClientShared.safe(UnganiClientShared.formatKES(price)) : "Price not set"}</p>
                <p class="ungani-small">${UnganiClientShared.safe(location || "Location not set")}</p>
              </div>

              ${statusBadge(status)}
            </div>

            <div class="property-meta-grid">
              <div class="property-meta">
                <span>Type</span>
                <strong>${UnganiClientShared.safe(toTitle(listingType))}</strong>
              </div>

              <div class="property-meta">
                <span>Agent</span>
                <strong>${UnganiClientShared.safe(agent || "Not assigned")}</strong>
              </div>

              <div class="property-meta">
                <span>Bedrooms</span>
                <strong>${UnganiClientShared.safe(bedrooms || "—")}</strong>
              </div>

              <div class="property-meta">
                <span>Bathrooms</span>
                <strong>${UnganiClientShared.safe(bathrooms || "—")}</strong>
              </div>
            </div>

            ${size ? `<p class="ungani-small" style="margin-top:12px;"><strong>Size:</strong> ${UnganiClientShared.safe(size)}</p>` : ""}
            ${notes ? `<p class="ungani-small"><strong>Notes:</strong> ${UnganiClientShared.safe(shortText(notes, 110))}</p>` : ""}

            ${totalUnits > 0 ? `
              <div style="margin-top:14px;">
                <div class="progress-track">
                  <div class="progress-bar" style="width:${progress}%;"></div>
                </div>
                <p class="ungani-small">${unitsSold} / ${totalUnits} units sold · ${progress}% progress</p>
              </div>
            ` : ""}
          </div>
        </article>
      `;
    }

    function openItemModal(id) {
      const row = id ? items.find(function (item) { return String(item.id) === String(id); }) : null;

      if (id && !row) {
        UnganiClientShared.showToast("Property not found.");
        return;
      }

      currentEditId = row ? row.id : null;

      const bodyHtml = `
        <form id="itemForm" onsubmit="saveItem(event)">
          <div class="ungani-form-grid">
            <div>
              <label for="propertyName">Property / Listing Name</label>
              <input id="propertyName" required placeholder="Example: Clove Garden A12" value="${row ? UnganiClientShared.attr(getItemName(row)) : ""}" />
            </div>

            <div>
              <label for="projectName">Project / Development</label>
              <input id="projectName" placeholder="Example: Clove Garden" value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row, ["project_name"], "")) : ""}" />
            </div>

            <div>
              <label for="propertyLocation">Location</label>
              <input id="propertyLocation" placeholder="Example: Nyali, Mombasa" value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row, ["property_location", "location"], "")) : ""}" />
            </div>

            <div>
              <label for="propertyPrice">Price / Value</label>
              <input id="propertyPrice" type="number" min="0" step="1" placeholder="Amount in Ksh" value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row, ["property_price", "selling_price", "cost_price"], "")) : ""}" />
            </div>

            <div>
              <label for="listingType">Listing Type</label>
              <select id="listingType">
                <option value="sale">Sale</option>
                <option value="rent">Rent</option>
                <option value="lease">Lease</option>
                <option value="project">Project</option>
                <option value="land">Land</option>
                <option value="commercial">Commercial</option>
                <option value="other">Other</option>
                ${row && LISTING_TYPES.indexOf(getListingType(row)) === -1
                  ? `<option value="${UnganiClientShared.attr(getListingType(row))}">${UnganiClientShared.safe(toTitle(getListingType(row)))}</option>`
                  : ""}
              </select>
            </div>

            <div>
              <label for="propertyStatus">Status</label>
              <select id="propertyStatus">
                <option value="available">Available</option>
                <option value="reserved">Reserved</option>
                <option value="under negotiation">Under Negotiation</option>
                <option value="sold">Sold</option>
                <option value="rented">Rented</option>
                <option value="maintenance">Maintenance</option>
                <option value="inactive">Inactive</option>
                ${row && STATUS_OPTIONS.indexOf(getStatus(row).toLowerCase()) === -1
                  ? `<option value="${UnganiClientShared.attr(getStatus(row))}">${UnganiClientShared.safe(toTitle(getStatus(row)))}</option>`
                  : ""}
              </select>
            </div>

            <div>
              <label for="bedrooms">Bedrooms</label>
              <input id="bedrooms" type="number" min="0" step="1" placeholder="Example: 3" value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row, ["bedrooms"], "")) : ""}" />
            </div>

            <div>
              <label for="bathrooms">Bathrooms</label>
              <input id="bathrooms" type="number" min="0" step="1" placeholder="Example: 2" value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row, ["bathrooms"], "")) : ""}" />
            </div>

            <div>
              <label for="propertySize">Property Size</label>
              <input id="propertySize" placeholder="Example: 1,250 sq ft" value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row, ["property_size"], "")) : ""}" />
            </div>

            <div>
              <label for="assignedAgent">Assigned Agent</label>
              <input id="assignedAgent" placeholder="Example: Brian Otieno" value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row, ["assigned_agent"], "")) : ""}" />
            </div>

            <div>
              <label for="photoUrl">Photo URL</label>
              <input id="photoUrl" type="url" placeholder="Optional image link. If empty, placeholder is used." value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row, ["photo_url", "image_url", "thumbnail_url"], "")) : ""}" />
            </div>

            <div>
              <label for="dateListed">Date Listed</label>
              <input id="dateListed" type="date" value="${row ? UnganiClientShared.attr(String(UnganiClientShared.getValue(row, ["date_listed"], "")).slice(0, 10)) : ""}" />
            </div>

            <div>
              <label for="totalUnits">Total Units</label>
              <input id="totalUnits" type="number" min="0" step="1" placeholder="Example: 20" value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row, ["total_units"], "")) : ""}" />
            </div>

            <div>
              <label for="unitsSold">Units Sold</label>
              <input id="unitsSold" type="number" min="0" step="1" placeholder="Example: 8" value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row, ["units_sold"], "")) : ""}" />
            </div>

            <div>
              <label for="unitsAvailable">Units Available</label>
              <input id="unitsAvailable" type="number" min="0" step="1" placeholder="Example: 12" value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row, ["units_available"], "")) : ""}" />
            </div>

            <div>
              <label for="projectProgress">Project Progress %</label>
              <input id="projectProgress" type="number" min="0" max="100" step="1" placeholder="Example: 65" value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row, ["project_progress_percent"], "")) : ""}" />
            </div>

            <div>
              <label for="completionStatus">Completion Status</label>
              <input id="completionStatus" placeholder="Example: Ongoing / Ready / Completed" value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row, ["completion_status"], "")) : ""}" />
            </div>
          </div>

          <label for="notes">Notes</label>
          <textarea id="notes" placeholder="Short property, project, or listing notes...">${row ? UnganiClientShared.safe(UnganiClientShared.getValue(row, ["notes", "description"], "")) : ""}</textarea>

          <div class="ungani-button-row">
            <button class="ungani-btn green" type="submit">${row ? "Update Property" : "Save Property"}</button>
            ${row ? `<button class="ungani-btn gold" type="button" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'available')">Available</button>` : ""}
            ${row ? `<button class="ungani-btn gold" type="button" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'reserved')">Reserved</button>` : ""}
            ${row ? `<button class="ungani-btn gold" type="button" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'sold')">Sold</button>` : ""}
            ${row ? `<button class="ungani-btn red" type="button" onclick="deleteItem('${UnganiClientShared.attr(row.id)}')">Delete</button>` : ""}
            <button class="ungani-btn dark" type="button" onclick="UnganiClientShared.closeModal()">Cancel</button>
          </div>
        </form>
      `;

      UnganiClientShared.openModal({
        title: row ? "Update Property / Listing" : "Add Property / Listing",
        bodyHtml: bodyHtml,
        onOpen: function () {
          document.getElementById("listingType").value = row ? getListingType(row) : "sale";
          document.getElementById("propertyStatus").value = row ? getStatus(row) : "available";
        }
      });
    }

    function calculateSummary(rows) {
      let available = 0;
      let reservedNegotiation = 0;
      let soldRented = 0;
      let totalValue = 0;

      rows.forEach(function (row) {
        const status = getStatus(row).toLowerCase();
        const value = Number(UnganiClientShared.getValue(row, ["property_price", "selling_price", "cost_price"], 0) || 0);

        totalValue += value;

        if (status.includes("available")) available++;
        if (status.includes("reserved") || status.includes("negotiation")) reservedNegotiation++;
        if (status.includes("sold") || status.includes("rented")) soldRented++;
      });

      return { available, reservedNegotiation, soldRented, totalValue };
    }

    function calculateProjects(rows) {
      const map = {};

      rows.forEach(function (row) {
        const project = UnganiClientShared.getValue(row, ["project_name"], "");

        if (!project) return;

        if (!map[project]) {
          map[project] = {
            name: project,
            count: 0,
            totalUnits: 0,
            unitsSold: 0,
            unitsAvailable: 0,
            progressTotal: 0,
            progressCount: 0,
            value: 0
          };
        }

        const item = map[project];

        item.count += 1;
        item.totalUnits += Number(UnganiClientShared.getValue(row, ["total_units"], 0) || 0);
        item.unitsSold += Number(UnganiClientShared.getValue(row, ["units_sold"], 0) || 0);
        item.unitsAvailable += Number(UnganiClientShared.getValue(row, ["units_available"], 0) || 0);
        item.value += Number(UnganiClientShared.getValue(row, ["property_price", "selling_price", "cost_price"], 0) || 0);

        const progress = Number(UnganiClientShared.getValue(row, ["project_progress_percent"], 0) || 0);

        if (progress > 0) {
          item.progressTotal += progress;
          item.progressCount += 1;
        }
      });

      return Object.keys(map).map(function (key) {
        const item = map[key];
        let progress = 0;

        if (item.progressCount > 0) {
          progress = Math.round(item.progressTotal / item.progressCount);
        } else if (item.totalUnits > 0) {
          progress = Math.round((item.unitsSold / item.totalUnits) * 100);
        }

        item.progress = progress;
        return item;
      }).sort(function (a, b) {
        return b.value - a.value;
      });
    }

    function getListingType(row) {
      return String(UnganiClientShared.getValue(row, ["listing_type", "item_type", "type"], "")).toLowerCase();
    }

    function baseFilterItems() {
      const search = document.getElementById("searchBox") ? UnganiClientShared.value("searchBox").toLowerCase() : "";
      const status = document.getElementById("filterStatus") ? UnganiClientShared.value("filterStatus").toLowerCase() : "";
      const project = document.getElementById("filterProject") ? UnganiClientShared.value("filterProject").toLowerCase() : "";

      return items.filter(function (row) {
        const rowStatus = getStatus(row).toLowerCase();
        const rowProject = String(UnganiClientShared.getValue(row, ["project_name"], "")).toLowerCase();
        const haystack = JSON.stringify(row || {}).toLowerCase();

        if (status && rowStatus !== status) return false;
        if (project && rowProject !== project) return false;
        if (search && !haystack.includes(search)) return false;

        return true;
      });
    }

    function filterItems() {
      const category = ITEM_CATEGORIES.find(function (item) { return item.key === activeItemCategory; }) || ITEM_CATEGORIES[0];
      return baseFilterItems().filter(category.match);
    }

    function selectItemCategory(key) {
      activeItemCategory = key;
      renderItemsPage();
    }

    function renderCategoryTiles() {
      const base = baseFilterItems();

      return `
        <section class="category-tiles">
          ${ITEM_CATEGORIES.map(function (category) {
            const count = base.filter(category.match).length;
            const active = category.key === activeItemCategory ? " active" : "";

            return `
              <button type="button" class="category-tile${active}" style="--tile-accent:${category.accent};" onclick="selectItemCategory('${category.key}')">
                <span class="tile-count">${count}</span>
                <span class="tile-label">${UnganiClientShared.safe(category.label)}</span>
              </button>
            `;
          }).join("")}
        </section>
      `;
    }

    async function saveItem(event) {
      event.preventDefault();

      const name = UnganiClientShared.value("propertyName");

      if (!name) {
        alert("Please enter a property/listing name.");
        return;
      }

      const totalUnits = Number(UnganiClientShared.value("totalUnits") || 0);
      const unitsSold = Number(UnganiClientShared.value("unitsSold") || 0);
      let unitsAvailable = Number(UnganiClientShared.value("unitsAvailable") || 0);

      if (!unitsAvailable && totalUnits > 0) {
        unitsAvailable = Math.max(0, totalUnits - unitsSold);
      }

      let progress = Number(UnganiClientShared.value("projectProgress") || 0);

      if (!progress && totalUnits > 0) {
        progress = Math.round((unitsSold / totalUnits) * 100);
      }

      progress = Math.max(0, Math.min(100, progress));

      const status = UnganiClientShared.value("propertyStatus") || "available";
      const listingType = UnganiClientShared.value("listingType") || "sale";

      const payload = {
        business_type_key: UnganiClientShared.getValue(currentContext.tenant, ["business_type_key"], null),
        section_key: isRealEstate ? "properties_listings" : "items_assets_stock",

        item_name: name,
        name: name,
        title: name,
        property_name: name,

        item_type: isRealEstate ? "property" : "item",
        type: isRealEstate ? "property" : "item",
        item_category: listingType,
        category: listingType,

        listing_type: listingType,
        property_location: UnganiClientShared.value("propertyLocation") || null,
        property_price: Number(UnganiClientShared.value("propertyPrice") || 0) || null,

        item_status: status,
        status: status,
        property_status: status,

        bedrooms: Number(UnganiClientShared.value("bedrooms") || 0) || null,
        bathrooms: Number(UnganiClientShared.value("bathrooms") || 0) || null,
        property_size: UnganiClientShared.value("propertySize") || null,
        assigned_agent: UnganiClientShared.value("assignedAgent") || null,
        photo_url: UnganiClientShared.value("photoUrl") || null,

        project_name: UnganiClientShared.value("projectName") || null,
        date_listed: UnganiClientShared.value("dateListed") || null,
        total_units: totalUnits || null,
        units_sold: unitsSold || null,
        units_available: unitsAvailable || null,
        completion_status: UnganiClientShared.value("completionStatus") || null,
        project_progress_percent: progress || null,

        notes: UnganiClientShared.value("notes") || null,
        updated_at: new Date().toISOString()
      };

      let response;

      try {
        if (currentEditId) {
          response = await currentContext.supabaseClient
            .from("business_items")
            .update(payload)
            .eq("id", currentEditId)
            .eq("tenant_id", currentContext.tenantId);
        } else {
          payload.tenant_id = currentContext.tenantId;
          payload.created_at = new Date().toISOString();

          response = await currentContext.supabaseClient
            .from("business_items")
            .insert(payload);
        }
      } catch (error) {
        alert(error.message || "Could not save property. Please check your connection.");
        return;
      }

      if (response.error) {
        alert(response.error.message);
        return;
      }

      currentEditId = null;
      UnganiClientShared.showToast("Property saved ✓");
      UnganiClientShared.closeModal();
      await loadItems();
    }

    async function quickStatus(id, status) {
      let response;

      try {
        response = await currentContext.supabaseClient
          .from("business_items")
          .update({
            property_status: status,
            item_status: status,
            status: status,
            updated_at: new Date().toISOString()
          })
          .eq("id", id)
          .eq("tenant_id", currentContext.tenantId);
      } catch (error) {
        alert(error.message || "Could not update status. Please check your connection.");
        return;
      }

      if (response.error) {
        alert(response.error.message);
        return;
      }

      UnganiClientShared.showToast("Status updated ✓");
      currentEditId = null;
      UnganiClientShared.closeModal();
      await loadItems();
    }

    async function deleteItem(id) {
      if (
        window.UnganiClientShared &&
        typeof UnganiClientShared.ensureCanWrite === "function" &&
        !UnganiClientShared.ensureCanWrite("delete item")
      ) {
        return;
      }

      const label = isRealEstate ? "property/listing" : "item/asset/stock";
      const confirmed = confirm("Move this " + label + " to Recently Deleted? You can restore it within 30 days.");

      if (!confirmed) return;

      let response;

      try {
        response = await currentContext.supabaseClient.rpc("soft_delete_ungani_record", {
          p_table_name: "business_items",
          p_record_id: id,
          p_delete_reason: "Deleted from Items / Properties page"
        });
      } catch (error) {
        alert(error.message || "Could not delete item. Please check your connection.");
        return;
      }

      if (response.error) {
        UnganiClientShared.showToast("Could not delete item: " + response.error.message);
        return;
      }

      if (response.data && response.data.ok === false) {
        UnganiClientShared.showToast(response.data.message || "Could not delete item.");
        return;
      }

      UnganiClientShared.showToast(isRealEstate ? "Property moved to Recently Deleted ✓" : "Item moved to Recently Deleted ✓");
      UnganiClientShared.logAuditEvent("record_deleted", { entityType: "business_items", entityId: String(id), description: "Deleted from Items / Properties page" });

      currentEditId = null;
      UnganiClientShared.closeModal();
      await loadItems();
    }

    function getItemName(row) {
      return UnganiClientShared.getValue(row, ["property_name", "item_name", "name", "title"], "Property");
    }

    function getStatus(row) {
      return UnganiClientShared.getValue(row, ["property_status", "item_status", "status"], "available");
    }

    function getProgress(row) {
      const explicit = Number(UnganiClientShared.getValue(row, ["project_progress_percent"], 0) || 0);

      if (explicit > 0) {
        return Math.max(0, Math.min(100, explicit));
      }

      const total = Number(UnganiClientShared.getValue(row, ["total_units"], 0) || 0);
      const sold = Number(UnganiClientShared.getValue(row, ["units_sold"], 0) || 0);

      if (total <= 0) return 0;

      return Math.max(0, Math.min(100, Math.round((sold / total) * 100)));
    }

    function statusBadge(status) {
      const color = statusColor(status);
      return `<span class="ungani-badge ${UnganiClientShared.attr(color)}">${UnganiClientShared.safe(toTitle(status))}</span>`;
    }

    function statusColor(status) {
      const lower = String(status || "").toLowerCase();

      if (lower.includes("available") || lower.includes("sold") || lower.includes("rented") || lower.includes("completed")) return "green";
      if (lower.includes("reserved") || lower.includes("negotiation") || lower.includes("pending") || lower.includes("review")) return "gold";
      if (lower.includes("maintenance") || lower.includes("inactive") || lower.includes("cancelled") || lower.includes("lost")) return "red";

      return "blue";
    }

    function statusAccentHex(status) {
      const map = { green: "#16A34A", gold: "#D4A63A", red: "#DC2626", blue: "#2563EB" };
      return map[statusColor(status)] || "#64748B";
    }

    function progressColor(percent) {
      const value = Number(percent || 0);

      if (value >= 75) return "green";
      if (value >= 35) return "gold";
      return "red";
    }

    function getProjectOptions() {
      const projects = Array.from(new Set(items.map(function (row) {
        return UnganiClientShared.getValue(row, ["project_name"], "");
      }).filter(Boolean))).sort();

      return projects.map(function (project) {
        return `<option value="${UnganiClientShared.attr(project)}">${UnganiClientShared.safe(project)}</option>`;
      }).join("");
    }

    function restoreFilters() {
      if (document.getElementById("searchBox")) document.getElementById("searchBox").value = sessionStorage.getItem("ungani_items_search") || "";
      if (document.getElementById("filterStatus")) document.getElementById("filterStatus").value = sessionStorage.getItem("ungani_items_status") || "";
      if (document.getElementById("filterProject")) document.getElementById("filterProject").value = sessionStorage.getItem("ungani_items_project") || "";
    }

    function saveFilters() {
      if (document.getElementById("searchBox")) sessionStorage.setItem("ungani_items_search", UnganiClientShared.value("searchBox"));
      if (document.getElementById("filterStatus")) sessionStorage.setItem("ungani_items_status", UnganiClientShared.value("filterStatus"));
      if (document.getElementById("filterProject")) sessionStorage.setItem("ungani_items_project", UnganiClientShared.value("filterProject"));
    }

    function resetFilters() {
      sessionStorage.removeItem("ungani_items_search");
      sessionStorage.removeItem("ungani_items_status");
      sessionStorage.removeItem("ungani_items_project");
      activeItemCategory = "all";
      renderItemsPage();
      UnganiClientShared.showToast("Property filters reset ✓");
    }

    function toTitle(value) {
      return String(value || "")
        .replace(/_/g, " ")
        .replace(/\w\S*/g, function (text) {
          return text.charAt(0).toUpperCase() + text.substr(1).toLowerCase();
        });
    }

    function shortText(value, maxLength) {
      const text = String(value || "");
      const max = Number(maxLength || 100);

      if (text.length <= max) return text;

      return text.slice(0, max) + "...";
    }

    function detectRealEstate(tenant) {
      if (window.UnganiBusinessConfig && typeof UnganiBusinessConfig.resolve === "function") {
        const matched = UnganiBusinessConfig.resolve(tenant);
        if (matched) return matched.key === "real_estate";
      }

      const businessType = String(UnganiClientShared.getValue(tenant, ["business_type", "business_type_key"], "")).toLowerCase();
      const businessTypeKey = String(UnganiClientShared.getValue(tenant, ["business_type_key"], "")).toLowerCase();

      return businessType.includes("real estate") || businessTypeKey.includes("real_estate");
    }
  </script>
