<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Properties / Listings</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="pwa-register.js"></script>
  <script src="client-shared.js" onerror="window.__unganiClientSharedFailed = true;"></script>
  <script>
    (function () {
      function showUnganiLoadError() {
        if (typeof UnganiClientShared !== "undefined") return;

        var banner = document.createElement("div");
        banner.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99999;background:#B91C1C;color:#fff;padding:12px 16px;font:14px/1.4 -apple-system,sans-serif;text-align:center;";
        banner.innerHTML = "Some page resources failed to load. Please check your connection. " +
          "<button style=\"margin-left:10px;padding:4px 12px;border:none;border-radius:6px;background:#fff;color:#B91C1C;font-weight:700;cursor:pointer;\" onclick=\"window.location.reload()\">Reload</button>";

        if (document.body) {
          document.body.prepend(banner);
        } else {
          document.addEventListener("DOMContentLoaded", function () {
            document.body.prepend(banner);
          });
        }
      }

      if (window.__unganiClientSharedFailed) {
        showUnganiLoadError();
      } else {
        setTimeout(function () {
          if (typeof UnganiClientShared === "undefined") showUnganiLoadError();
        }, 4000);
      }
    })();
  </script>
  <script src="ungani-business-config.js"></script>
  <script src="ungani-presets.js"></script>
  <script src="nia-assistant.js"></script>
</head>

<body>
  <script>
    let currentContext = null;
    let businessPreset = null;
    let items = [];
    let currentEditId = null;
    let isRealEstate = false;
    let activeItemCategory = "all";
    let urlActionApplied = false;
    let sectionOptions = [];
    let currentSectionFilter = "";
    let activeItemFieldSet = null;

    // See my-money.html for the full rationale.
    const ITEM_PAGE_SIZE = 50;
    let itemSummaryRows = [];
    let itemPageOffset = 0;
    let itemIsLoadingMore = false;
    let itemSearchDebounceTimer = null;

    const LISTING_TYPES = ["sale", "rent", "lease", "project", "land", "commercial", "other"];

    const ITEM_CATEGORIES = [
      { key: "all", label: "All", accent: "#061C3D", match: function () { return true; } },
      { key: "sale", label: "Sale", accent: "#D4A63A", match: function (row) { return getListingType(row) === "sale"; } },
      { key: "rent", label: "Rent", accent: "#2563EB", match: function (row) { return getListingType(row) === "rent"; } },
      { key: "lease", label: "Lease", accent: "#7C3AED", match: function (row) { return getListingType(row) === "lease"; } },
      { key: "project", label: "Project", accent: "#16A34A", match: function (row) { return getListingType(row) === "project"; } },
      { key: "land", label: "Land", accent: "#EA580C", match: function (row) { return getListingType(row) === "land"; } },
      { key: "commercial", label: "Commercial", accent: "#0EA5E9", match: function (row) { return getListingType(row) === "commercial"; } },
      { key: "other", label: "Other", accent: "#64748B", match: function (row) { return LISTING_TYPES.indexOf(getListingType(row)) === -1 || getListingType(row) === "other"; } }
    ];

    const GENERIC_TILE_PALETTE = ["#061C3D", "#2563EB", "#16A34A", "#D4A63A", "#7C3AED", "#0EA5E9", "#DC2626", "#64748B"];

    // Real Estate keeps its listing-type tiles (Sale/Rent/Lease/...);
    // every other business type gets tiles built from whichever status
    // values are actually present in this tenant's items, since status
    // vocab differs per section (in stock/low stock vs available/in use).
    function getActiveCategories() {
      if (isRealEstate) return ITEM_CATEGORIES;

      const statuses = Array.from(new Set(
        itemSummaryRows.map(function (row) { return getStatus(row).toLowerCase(); }).filter(Boolean)
      ));

      const categories = [{ key: "all", label: "All", accent: GENERIC_TILE_PALETTE[0], match: function () { return true; } }];

      statuses.slice(0, 7).forEach(function (status, index) {
        categories.push({
          key: status,
          label: toTitle(status),
          accent: GENERIC_TILE_PALETTE[(index + 1) % GENERIC_TILE_PALETTE.length],
          match: function (row) { return getStatus(row).toLowerCase() === status; }
        });
      });

      return categories;
    }

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "items",
        pageTitle: "Properties / Listings",
        pageSubtitle: "Browse, add, and manage properties, listings, projects, and availability.",
        onReady: startItemsPage
      });
    });

    async function startItemsPage(context) {
      currentContext = context;

      isRealEstate = detectRealEstate(context.tenant);
      businessPreset = UnganiPresets.getPreset(context.tenant);
      sectionOptions = businessPreset.selectedSectionLabels || [];
      currentSectionFilter = new URLSearchParams(window.location.search).get("section") || "";

      const titleEl = document.querySelector(".ungani-topbar h2");
      const subEl = document.querySelector(".ungani-topbar p");

      if (titleEl) {
        titleEl.innerText = isRealEstate ? "Properties / Listings" : "Items / Assets / Stock";
      }

      if (subEl) {
        subEl.innerText = isRealEstate
          ? "Visual property grid, listing status, project progress, pricing, agents, and availability."
          : "Manage business items, assets, stock, equipment, and operational resources.";
      }

      await loadItems();
    }

    // custom_fields/section_label/name fields added for the "Needs
    // Attention" panel (Phase 3 of the Asset Management module) - it
    // reuses this same all-items summary fetch (already unpaginated,
    // narrow-column, tenant-wide) instead of firing a second query, since
    // custom_fields.expiry_date/warranty_expiry/stock_quantity/reorder_level
    // are the fields that panel actually needs to read.
    // selling_price/cost_price removed - confirmed via a full repo sweep
    // that neither is ever written anywhere (saveItem()'s payload only
    // ever writes property_price; no ITEM_FIELD_SETS entry declares them
    // as a column either) - they only ever existed as JS-side
    // getValue(row, ["property_price","selling_price","cost_price"])
    // read-fallback candidates, never real columns. Same bug class as the
    // documents.type fix earlier, introduced by the same commit (ae27767)
    // across all six list pages' SUMMARY_COLUMNS constants.
    const ITEM_SUMMARY_COLUMNS = "id, status, item_status, property_status, listing_type, item_type, type, " +
      "project_name, total_units, units_sold, units_available, project_progress_percent, " +
      "property_price, item_name, name, title, property_name, " +
      "custom_fields, section_label";

    function applyItemCommonFilters(query) {
      query = query.eq("tenant_id", currentContext.tenantId);

      if (currentSectionFilter) {
        query = query.eq("section_label", currentSectionFilter);
      }

      // Both status and project are exact (case-insensitive) matches in the
      // original client-side logic, not substrings - .ilike() with no "%"
      // wildcards is PostgREST's exact case-insensitive match.
      const filterStatus = document.getElementById("filterStatus") ? UnganiClientShared.value("filterStatus") : "";
      if (filterStatus) {
        query = query.ilike("status", UnganiClientShared.escapePostgrestFilterValue(filterStatus));
      }

      const filterProject = document.getElementById("filterProject") ? UnganiClientShared.value("filterProject") : "";
      if (filterProject) {
        query = query.ilike("project_name", UnganiClientShared.escapePostgrestFilterValue(filterProject));
      }

      const search = document.getElementById("searchBox") ? UnganiClientShared.value("searchBox").trim() : "";
      if (search) {
        query = query.or(UnganiClientShared.buildSearchOrFilter(["name", "property_location", "assigned_agent", "project_name", "notes"], search));
      }

      return query;
    }

    async function loadItemSummaryRows() {
      let response;

      try {
        response = await applyItemCommonFilters(
          currentContext.supabaseClient.from("business_items").select(ITEM_SUMMARY_COLUMNS)
        ).order("created_at", { ascending: false });
      } catch (error) {
        return { error: error.message || "Network error. Please check your connection." };
      }

      if (response.error) {
        return { error: response.error.message };
      }

      itemSummaryRows = response.data || [];
      return { error: null };
    }

    function getItemCategoryFilteredIds() {
      const categories = getActiveCategories();
      const category = categories.find(function (item) { return item.key === activeItemCategory; }) || categories[0];
      return itemSummaryRows.filter(category.match).map(function (row) { return row.id; });
    }

    function itemHasMoreRows() {
      return itemPageOffset < getItemCategoryFilteredIds().length;
    }

    async function exportItemCsv() {
      await UnganiClientShared.exportRecordsToCsv({
        supabaseClient: currentContext.supabaseClient,
        table: "business_items",
        ids: getItemCategoryFilteredIds(),
        filenamePrefix: "items"
      });
    }

    async function loadItemPage(replace) {
      if (replace) {
        itemPageOffset = 0;
      }

      const allIds = getItemCategoryFilteredIds();
      const pageIds = allIds.slice(itemPageOffset, itemPageOffset + ITEM_PAGE_SIZE);

      if (!pageIds.length) {
        if (replace) items = [];
        return { error: null };
      }

      let response;

      try {
        response = await currentContext.supabaseClient
          .from("business_items")
          .select("*")
          .in("id", pageIds)
          .order("created_at", { ascending: false });
      } catch (error) {
        return { error: error.message || "Network error. Please check your connection." };
      }

      if (response.error) {
        return { error: response.error.message };
      }

      const newRows = response.data || [];
      items = replace ? newRows : items.concat(newRows);
      itemPageOffset += pageIds.length;

      return { error: null };
    }

    async function loadItems() {
      currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading properties and listings...");

      const summaryResult = await loadItemSummaryRows();

      if (summaryResult.error) {
        currentContext.contentEl.innerHTML = UnganiClientShared.errorCard("Could not load properties", summaryResult.error);
        return;
      }

      const pageResult = await loadItemPage(true);

      if (pageResult.error) {
        currentContext.contentEl.innerHTML = UnganiClientShared.errorCard("Could not load properties", pageResult.error);
        return;
      }

      renderItemsPage();
    }

    async function refreshItemData() {
      const focusedId = document.activeElement ? document.activeElement.id : null;

      const summaryResult = await loadItemSummaryRows();

      if (summaryResult.error) {
        UnganiClientShared.showToast("Could not update properties: " + summaryResult.error);
        return;
      }

      const pageResult = await loadItemPage(true);

      if (pageResult.error) {
        UnganiClientShared.showToast("Could not update properties: " + pageResult.error);
        return;
      }

      renderItemsPage();

      if (focusedId) {
        const el = document.getElementById(focusedId);
        if (el && typeof el.focus === "function") el.focus();
      }
    }

    async function loadMoreItemRows() {
      if (itemIsLoadingMore) return;
      itemIsLoadingMore = true;

      const btn = document.getElementById("itemLoadMoreBtn");
      if (btn) {
        btn.disabled = true;
        btn.innerText = "Loading...";
      }

      const result = await loadItemPage(false);

      itemIsLoadingMore = false;

      if (result.error) {
        UnganiClientShared.showToast("Could not load more properties: " + result.error);
        return;
      }

      renderItemsPage();
    }

    function onItemSearchInput() {
      saveFilters();

      if (itemSearchDebounceTimer) clearTimeout(itemSearchDebounceTimer);
      itemSearchDebounceTimer = setTimeout(refreshItemData, 350);
    }

    function onItemFilterChange() {
      saveFilters();
      refreshItemData();
    }

    function renderItemsPage() {
      const filtered = filterItems();
      const categories = getActiveCategories();
      const category = categories.find(function (item) { return item.key === activeItemCategory; }) || categories[0];
      const summaryScopeRows = itemSummaryRows.filter(category.match);
      const summary = isRealEstate ? calculateSummary(summaryScopeRows) : calculateGenericSummary(summaryScopeRows);
      const projects = isRealEstate ? calculateProjects(summaryScopeRows) : [];

      UnganiClientShared.setContent(`
        <style>
          .property-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 18px;
          }

          .property-card {
            position: relative;
            overflow: hidden;
            padding: 0;
          }

          .property-card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 18px;
            bottom: 18px;
            width: 4px;
            border-radius: 0 999px 999px 0;
            background: var(--accent, #64748B);
            z-index: 2;
          }

          /* .property-card inherits .ungani-card:hover's transform, which combined with
             overflow:hidden here is the exact combo that caused the dashboard flicker bug -
             neutralize it so hover only shows a border/shadow change, never movement. */
          .property-card.property-card:hover {
            transform: none;
          }

          .property-photo {
            position: relative;
            min-height: 190px;
            background:
              radial-gradient(circle at top right, rgba(212,166,58,0.28), transparent 35%),
              linear-gradient(135deg, #061C3D, #082852);
            color: white;
            display: flex;
            align-items: flex-end;
            padding: 18px;
          }

          .property-photo img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
          }

          .property-photo::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 35%, rgba(6,28,61,0.72));
          }

          .property-photo-content {
            position: relative;
            z-index: 2;
          }

          .property-photo-content h3 {
            margin: 0 0 6px;
            color: white;
            font-size: 20px;
          }

          .property-photo-content p {
            margin: 0;
            color: rgba(255,255,255,0.78);
            font-size: 13px;
          }

          .property-card-body {
            padding: 18px;
          }

          .property-price {
            font-size: 24px;
            line-height: 1.05;
            font-weight: 950;
            letter-spacing: -0.04em;
            margin: 0 0 8px;
            color: var(--ungani-text);
          }

          .property-meta-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-top: 14px;
          }

          .property-meta {
            border: 1px solid var(--ungani-border);
            border-radius: 16px;
            padding: 10px;
            background: var(--ungani-soft);
          }

          .property-meta span {
            display: block;
            color: var(--ungani-muted);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 3px;
          }

          .property-meta strong {
            display: block;
            font-size: 14px;
          }

          .progress-track {
            height: 11px;
            border-radius: 999px;
            background: rgba(6,28,61,0.10);
            overflow: hidden;
            margin: 10px 0 7px;
          }

          .progress-bar {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, #D4A63A, #15803D);
          }

          .project-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
          }

          .category-tiles {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 18px;
          }

          .category-tile {
            background: var(--ungani-card);
            border: 1px solid var(--ungani-border);
            border-left: 5px solid var(--tile-accent, var(--ungani-gold));
            border-radius: 18px;
            padding: 14px 16px;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            transition: 0.18s ease;
          }

          .category-tile:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px var(--ungani-shadow);
          }

          .category-tile.active {
            box-shadow: 0 0 0 2px var(--tile-accent, var(--ungani-gold));
          }

          .category-tile .tile-count {
            display: block;
            font-size: 22px;
            font-weight: 900;
            color: var(--ungani-text);
          }

          .category-tile .tile-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--ungani-muted);
            margin-top: 4px;
          }

          .property-card {
            cursor: pointer;
          }

          .generic-item-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 18px;
          }

          .generic-item-card {
            position: relative;
            cursor: pointer;
            border-left: 4px solid var(--accent, var(--ungani-gold));
          }

          .generic-item-value {
            font-size: 22px;
            line-height: 1.05;
            font-weight: 950;
            letter-spacing: -0.03em;
            margin: 8px 0 4px;
            color: var(--ungani-text);
          }

          .generic-item-meta-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-top: 12px;
          }

          .generic-item-meta {
            border: 1px solid var(--ungani-border);
            border-radius: 16px;
            padding: 10px;
            background: var(--ungani-soft);
          }

          .generic-item-meta span {
            display: block;
            color: var(--ungani-muted);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 3px;
          }

          .generic-item-meta strong {
            display: block;
            font-size: 14px;
          }

          @media (max-width: 1180px) {
            .property-grid,
            .project-grid,
            .generic-item-grid {
              grid-template-columns: repeat(2, minmax(0, 1fr));
            }
          }

          @media (max-width: 680px) {
            .property-grid,
            .project-grid,
            .property-meta-grid,
            .generic-item-grid,
            .generic-item-meta-grid {
              grid-template-columns: 1fr;
            }

            .property-photo {
              min-height: 165px;
            }

            .property-price {
              font-size: 21px;
            }
          }

          .attention-list {
            display: grid;
            gap: 10px;
          }

          .attention-row {
            position: relative;
            display: grid;
            grid-template-columns: 38px minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
            padding: 12px 12px 12px 14px;
            border: 1px solid var(--ungani-border);
            background: var(--ungani-soft);
            border-radius: 16px;
            border-left: 4px solid var(--accent, var(--ungani-muted));
            text-decoration: none;
            color: inherit;
            transition: 0.18s ease;
          }

          .attention-row:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px var(--ungani-shadow);
          }

          .attention-icon {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            background: var(--ungani-card);
          }

          .attention-body strong {
            display: block;
            font-size: 14px;
            color: var(--ungani-text);
          }

          @media (max-width: 560px) {
            .attention-row {
              grid-template-columns: 32px minmax(0, 1fr);
            }

            .attention-row .ungani-badge {
              grid-column: 2;
              justify-self: start;
            }
          }
        </style>

        <section class="ungani-card ungani-hero">
          <h2>${isRealEstate ? "Property Grid View" : "Items / Assets View"}</h2>
          <p>
            ${isRealEstate
              ? "Browse properties visually with price, status, project, location, assigned agent, and project progress."
              : "Browse business items, assets, stock, equipment, and operational resources."
            }
          </p>

          <div class="ungani-button-row">
            <button class="ungani-btn gold" onclick="openItemModal()">${isRealEstate ? "Add Property" : "Add Item"}</button>
            <button class="ungani-btn green" onclick="loadItems()">Refresh</button>
            <a class="ungani-btn dark" href="client.html">Dashboard</a>
          </div>

          ${renderSectionSwitcher()}
        </section>

        ${renderCategoryTiles()}

        <section class="ungani-grid">
          ${isRealEstate ? `
            ${UnganiClientShared.metricCard("Total Properties", summaryScopeRows.length, "Matching current filters", "blue")}
            ${UnganiClientShared.metricCard("Available", summary.available, "Ready for sale/rent/use", "green")}
            ${UnganiClientShared.metricCard("Reserved / Negotiation", summary.reservedNegotiation, "Needs follow-up", summary.reservedNegotiation > 0 ? "gold" : "blue")}
            ${UnganiClientShared.metricCard("Sold / Rented", summary.soldRented, "Closed or active rental", "green")}
            ${UnganiClientShared.metricCard("Estimated Value", UnganiClientShared.formatKES(summary.totalValue), "Visible property/listing value", "green")}
            ${UnganiClientShared.metricCard("Projects", projects.length, "Grouped developments", "gold")}
          ` : `
            ${UnganiClientShared.metricCard("Total Items", summaryScopeRows.length, "Matching current filters", "blue")}
            ${UnganiClientShared.metricCard("In Stock / Available", summary.inStock, "Ready for use", "green")}
            ${UnganiClientShared.metricCard("Low Stock / Attention", summary.lowStock, "Needs follow-up", summary.lowStock > 0 ? "gold" : "blue")}
            ${UnganiClientShared.metricCard("Out of Stock / Retired", summary.outOfStock, "Unavailable", summary.outOfStock > 0 ? "red" : "green")}
            ${UnganiClientShared.metricCard("Estimated Total Value", UnganiClientShared.formatKES(summary.totalValue), "Visible item value", "green")}
          `}
        </section>

        ${renderAttentionPanel(computeAttentionEntries(itemSummaryRows))}

        ${isRealEstate ? `
          <section class="ungani-card">
            <div class="ungani-section-title">
              <div>
                <h3>Project Progress</h3>
                <p class="ungani-small">Track developments by units sold, available units, and completion progress.</p>
              </div>
            </div>

            ${renderProjectProgress(projects)}
          </section>
        ` : ""}

        <section class="ungani-card">
          <div class="ungani-section-title">
            <h3>Filters</h3>
            <button class="ungani-btn dark" onclick="resetFilters()">Reset Filters</button>
          </div>

          <div class="ungani-form-grid">
            <div>
              <label for="searchBox">Search</label>
              <input id="searchBox" placeholder="${isRealEstate ? "Search property, project, location, agent..." : "Search item name, notes..."}" oninput="onItemSearchInput();" />
            </div>

            <div>
              <label for="filterStatus">Status</label>
              <select id="filterStatus" onchange="onItemFilterChange();">
                <option value="">All Statuses</option>
                ${isRealEstate ? `
                  <option value="available">Available</option>
                  <option value="reserved">Reserved</option>
                  <option value="under negotiation">Under Negotiation</option>
                  <option value="sold">Sold</option>
                  <option value="rented">Rented</option>
                  <option value="maintenance">Maintenance</option>
                  <option value="inactive">Inactive</option>
                ` : getActiveCategories().filter(function (category) { return category.key !== "all"; }).map(function (category) {
                  return `<option value="${UnganiClientShared.attr(category.key)}">${UnganiClientShared.safe(category.label)}</option>`;
                }).join("")}
              </select>
            </div>

            ${isRealEstate ? `
              <div>
                <label for="filterProject">Project</label>
                <select id="filterProject" onchange="onItemFilterChange();">
                  <option value="">All Projects</option>
                  ${getProjectOptions()}
                </select>
              </div>
            ` : ""}
          </div>
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>${isRealEstate ? "Properties / Listings" : "Items / Assets"}</h3>
              <p class="ungani-small">${filtered.length} of ${summaryScopeRows.length} record(s) shown.</p>
            </div>

            <div class="ungani-button-row" style="margin-top:0;">

        <p class="ungani-small">
          Items / Properties Version: Step 308B Property Grid · ungani.com · info@ungani.com
        </p>

      restoreFilters();
      applyUrlActions();

    async function applyUrlActions() {
      if (urlActionApplied) return;

      const params = new URLSearchParams(window.location.search);
      const highlightId = params.get("highlight");
      const action = params.get("action");

      if (highlightId) {
        let row = items.find(function (item) { return String(item.id) === String(highlightId); });

        // With pagination, a deep-linked item may not be on the currently
        // loaded page - fetch it directly rather than silently failing to
        // open it.
        if (!row) {
          try {
            const lookup = await currentContext.supabaseClient
              .from("business_items")
              .select("*")
              .eq("id", highlightId)
              .eq("tenant_id", currentContext.tenantId)
              .maybeSingle();

            if (lookup.data) {
              row = lookup.data;
              items = [row].concat(items);
            }
          } catch (error) {
            console.warn("Highlight lookup failed:", error.message);
          }
        }

        if (row) {
          urlActionApplied = true;
          setTimeout(function () { openItemModal(highlightId); }, 250);
          return;
        }
      }

      if (action === "add") {
        urlActionApplied = true;
        setTimeout(function () { openItemModal(null); }, 250);
      }
    }

    function calculateGenericSummary(rows) {
      let inStock = 0;
      let lowStock = 0;
      let outOfStock = 0;
      let totalValue = 0;

      rows.forEach(function (row) {
        const status = getStatus(row).toLowerCase();
        const value = Number(UnganiClientShared.getValue(row, ["property_price", "selling_price", "cost_price"], 0) || 0);

        totalValue += value;

        if (status.includes("out of stock") || status.includes("retired") || status.includes("expired") || status.includes("discontinued")) {
          outOfStock++;
        } else if (status.includes("low stock") || status.includes("maintenance") || status.includes("on hold")) {
          lowStock++;
        } else if (status.includes("available") || status.includes("in stock") || status.includes("in use") || status.includes("cleared")) {
          inStock++;
        }
      });

      return { inStock, lowStock, outOfStock, totalValue };
    }

    // ---- Assets Needing Attention (Phase 3 of the Asset Management module) ----
    // Client-computed, no new schema: reads expiry_date/warranty_expiry/
    // stock_quantity/reorder_level out of custom_fields (already stored by
    // whichever ITEM_FIELD_SETS the item's business type/section uses) plus
    // status text, across ALL of the tenant's items regardless of the
    // currently-selected category tile/filter.

    function daysUntil(dateStr) {
      const target = new Date(dateStr);
      if (isNaN(target.getTime())) return null;

      const now = new Date();
      target.setHours(0, 0, 0, 0);
      now.setHours(0, 0, 0, 0);

      return Math.round((target.getTime() - now.getTime()) / 86400000);
    }

    function computeAttentionEntries(rows) {
      const entries = [];

      rows.forEach(function (row) {
        const name = getItemName(row);
        const href = "my-item-profile.html?id=" + encodeURIComponent(row.id);
        const customFields = row.custom_fields || {};
        const status = getStatus(row).toLowerCase();

        const expiryDays = customFields.expiry_date ? daysUntil(customFields.expiry_date) : null;
        if (expiryDays !== null) {
          if (expiryDays < 0) {
            entries.push({ id: row.id, name: name, href: href, severity: "red", icon: "⛔", label: "Expired", detail: Math.abs(expiryDays) + "d ago", sortKey: expiryDays });
          } else if (expiryDays <= 7) {
            entries.push({ id: row.id, name: name, href: href, severity: "red", icon: "⏰", label: "Expiring soon", detail: expiryDays === 0 ? "today" : "in " + expiryDays + "d", sortKey: expiryDays });
          } else if (expiryDays <= 30) {
            entries.push({ id: row.id, name: name, href: href, severity: "gold", icon: "⏳", label: "Expiring soon", detail: "in " + expiryDays + "d", sortKey: expiryDays });
          }
        }

        const warrantyDays = customFields.warranty_expiry ? daysUntil(customFields.warranty_expiry) : null;
        if (warrantyDays !== null) {
          if (warrantyDays < 0) {
            entries.push({ id: row.id, name: name, href: href, severity: "gold", icon: "🛡️", label: "Warranty expired", detail: Math.abs(warrantyDays) + "d ago", sortKey: 1000 + warrantyDays });
          } else if (warrantyDays <= 30) {
            entries.push({ id: row.id, name: name, href: href, severity: "gold", icon: "🛡️", label: "Warranty expiring", detail: "in " + warrantyDays + "d", sortKey: 1000 + warrantyDays });
          }
        }

        // Universal field (Phase 5) - not tied to any field set, so this
        // check applies regardless of business type, same as the
        // maintenance-status check below.
        const maintenanceDueDays = customFields.next_maintenance_date ? daysUntil(customFields.next_maintenance_date) : null;
        if (maintenanceDueDays !== null) {
          if (maintenanceDueDays < 0) {
            entries.push({ id: row.id, name: name, href: href, severity: "red", icon: "🔧", label: "Maintenance overdue", detail: Math.abs(maintenanceDueDays) + "d ago", sortKey: maintenanceDueDays });
          } else if (maintenanceDueDays <= 7) {
            entries.push({ id: row.id, name: name, href: href, severity: "red", icon: "🔧", label: "Maintenance due", detail: maintenanceDueDays === 0 ? "today" : "in " + maintenanceDueDays + "d", sortKey: maintenanceDueDays });
          } else if (maintenanceDueDays <= 30) {
            entries.push({ id: row.id, name: name, href: href, severity: "gold", icon: "🔧", label: "Maintenance due", detail: "in " + maintenanceDueDays + "d", sortKey: maintenanceDueDays });
          }
        }

        // Prefer the precise numeric check when both fields exist on this
        // item's field set; fall back to status text (e.g. a tenant who
        // manually sets status to "Low Stock" on a field set without
        // stock_quantity/reorder_level) so items on any business type still
        // get flagged, just less precisely.
        const stockQty = Number(customFields.stock_quantity);
        const reorderLevel = Number(customFields.reorder_level);
        const hasNumericStock = customFields.stock_quantity !== undefined && customFields.stock_quantity !== null && customFields.stock_quantity !== "" &&
          customFields.reorder_level !== undefined && customFields.reorder_level !== null && customFields.reorder_level !== "" &&
          !isNaN(stockQty) && !isNaN(reorderLevel);

        if (hasNumericStock) {
          if (stockQty <= 0) {
            entries.push({ id: row.id, name: name, href: href, severity: "red", icon: "📦", label: "Out of stock", detail: "0 left", sortKey: 2000 });
          } else if (stockQty <= reorderLevel) {
            entries.push({ id: row.id, name: name, href: href, severity: "orange", icon: "📦", label: "Low stock", detail: stockQty + " left, reorder at " + reorderLevel, sortKey: 2000 });
          }
        } else if (status.includes("out of stock")) {
          entries.push({ id: row.id, name: name, href: href, severity: "red", icon: "📦", label: "Out of stock", detail: "", sortKey: 2000 });
        } else if (status.includes("low stock")) {
          entries.push({ id: row.id, name: name, href: href, severity: "orange", icon: "📦", label: "Low stock", detail: "", sortKey: 2000 });
        }

        if (status.includes("maintenance")) {
          entries.push({ id: row.id, name: name, href: href, severity: "gold", icon: "🔧", label: "In maintenance", detail: "", sortKey: 3000 });
        }
      });

      const severityRank = { red: 0, orange: 1, gold: 2 };

      entries.sort(function (a, b) {
        const rankDiff = severityRank[a.severity] - severityRank[b.severity];
        if (rankDiff !== 0) return rankDiff;
        return a.sortKey - b.sortKey;
      });

      return entries;
    }

    function attentionAccentHex(severity) {
      const map = { red: "#DC2626", orange: "#C77700", gold: "#D4A63A" };
      return map[severity] || "#64748B";
    }

    function renderAttentionPanel(entries) {

    }

    // Renders one extra form field from a resolved field-set entry.
    // column-backed fields (Real Estate's legacy columns) and
    // custom_fields-backed fields (everything else) render identically -
    // only readExtraFieldValue()'s save target differs.
    function renderExtraFieldHtml(field, row) {
      const fieldId = "itemExtra_" + field.id;
      const rawValue = field.column
        ? (row ? UnganiClientShared.getValue(row, [field.column], "") : "")
        : (row ? UnganiClientShared.getValue(row.custom_fields || {}, [field.id], "") : "");

      if (field.type === "date") {
        const dateVal = rawValue ? String(rawValue).slice(0, 10) : "";
        return `<div><label for="${fieldId}">${UnganiClientShared.safe(field.label)}</label><input id="${fieldId}" type="date" value="${UnganiClientShared.attr(dateVal)}" /></div>`;
      }

      if (field.type === "number") {
        return `<div><label for="${fieldId}">${UnganiClientShared.safe(field.label)}</label><input id="${fieldId}" type="number" step="any" placeholder="${UnganiClientShared.attr(field.placeholder || "")}" value="${UnganiClientShared.attr(rawValue)}" /></div>`;
      }

      if (field.type === "url") {
        return `<div><label for="${fieldId}">${UnganiClientShared.safe(field.label)}</label><input id="${fieldId}" type="url" placeholder="${UnganiClientShared.attr(field.placeholder || "")}" value="${UnganiClientShared.attr(rawValue)}" /></div>`;
      }

      return `<div><label for="${fieldId}">${UnganiClientShared.safe(field.label)}</label><input id="${fieldId}" type="text" placeholder="${UnganiClientShared.attr(field.placeholder || "")}" value="${UnganiClientShared.attr(rawValue)}" /></div>`;
    }

    function renderExtraFieldsHtml(fieldSet, row) {
      return (fieldSet.fields || []).map(function (field) { return renderExtraFieldHtml(field, row); }).join("");
    }

    function readExtraFieldValue(field) {
      const raw = UnganiClientShared.value("itemExtra_" + field.id);

      if (field.type === "number") {
        return raw === "" ? null : Number(raw);
      }

      return raw || null;
    }

    function renderStatusOptionsHtml(fieldSet, row) {

          <div class="ungani-button-row">
            <button class="ungani-btn green" type="submit">${row ? "Update Property" : "Save Property"}</button>
            ${row ? `<button class="ungani-btn gold" type="button" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'available')">Available</button>` : ""}
            ${row ? `<button class="ungani-btn gold" type="button" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'reserved')">Reserved</button>` : ""}
            ${row ? `<button class="ungani-btn gold" type="button" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'sold')">Sold</button>` : ""}
            ${row ? `<button class="ungani-btn red" type="button" onclick="deleteItem('${UnganiClientShared.attr(row.id)}')">Delete</button>` : ""}
            <button class="ungani-btn dark" type="button" onclick="UnganiClientShared.closeModal()">Cancel</button>
          </div>
        </form>
      `;
    }

    function buildGenericItemFormHtml(row, formSectionLabel) {
      const currentItemType = row ? UnganiClientShared.getValue(row, ["item_type", "type"], "") : "";
      const itemTypes = businessPreset.itemTypes || [];

      return `
        <form id="itemForm" onsubmit="saveItem(event)">
          <div class="ungani-form-grid">
            <div>
              <label for="itemNameInput">Item Name</label>
              <input id="itemNameInput" required placeholder="Example: Reefer Unit 2, Amoxicillin 500mg" value="${row ? UnganiClientShared.attr(getItemName(row)) : ""}" />
            </div>

            <div>
              <label for="itemTypeSelect">Item Type</label>
              <select id="itemTypeSelect">
                ${itemTypes.map(function (item) {
                  return `<option value="${UnganiClientShared.attr(item)}">${UnganiClientShared.safe(item)}</option>`;
                }).join("")}
                ${row && itemTypes.indexOf(currentItemType) === -1 && currentItemType
                  ? `<option value="${UnganiClientShared.attr(currentItemType)}">${UnganiClientShared.safe(currentItemType)}</option>`
                  : ""}
              </select>
            </div>

            <div>
              <label for="itemStatusSelect" id="itemStatusSelectLabel">Status</label>
              <select id="itemStatusSelect">${renderStatusOptionsHtml(activeItemFieldSet, row)}</select>
            </div>

            <div>
              <label for="itemValue" id="itemValueLabel">${UnganiClientShared.safe(activeItemFieldSet.valueLabel || "Price / Value")}</label>
              <input id="itemValue" type="number" min="0" step="any" placeholder="Amount in Ksh" value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row, ["property_price", "selling_price", "cost_price"], "")) : ""}" />
            </div>

            ${renderSectionFieldHtml(formSectionLabel)}

            <div id="itemExtraFieldsContainer" class="ungani-form-grid" style="grid-column:1/-1;padding:0;margin:0;">
              ${renderExtraFieldsHtml(activeItemFieldSet, row)}
            </div>
          </div>

          <label for="nextMaintenanceDate">Next Maintenance Due (optional)</label>
          <input id="nextMaintenanceDate" type="date" value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row.custom_fields || {}, ["next_maintenance_date"], "")) : ""}" />

          <label for="itemNotes">Notes</label>
          <textarea id="itemNotes" placeholder="Add notes, specifications, or details...">${row ? UnganiClientShared.safe(UnganiClientShared.getValue(row, ["notes", "description"], "")) : ""}</textarea>

          <div class="ungani-button-row">
            <button class="ungani-btn green" type="submit">${row ? "Update Item" : "Save Item"}</button>
            ${row ? `<button class="ungani-btn red" type="button" onclick="deleteItem('${UnganiClientShared.attr(row.id)}')">Delete</button>` : ""}
            <button class="ungani-btn dark" type="button" onclick="UnganiClientShared.closeModal()">Cancel</button>
          </div>
        </form>
      `;
    }

    function openItemProfile(id) {
      window.location.href = "my-item-profile.html?id=" + encodeURIComponent(id);
    }

    function openItemModal(id) {
      const row = id ? items.find(function (item) { return String(item.id) === String(id); }) : null;

      if (id && !row) {
        UnganiClientShared.showToast(isRealEstate ? "Property not found." : "Item not found.");
        return;
      }

      currentEditId = row ? row.id : null;

      const formSectionLabel = row
        ? UnganiClientShared.getValue(row, ["section_label"], "")
        : (currentSectionFilter || sectionOptions[0] || "");

      activeItemFieldSet = UnganiBusinessConfig.resolveItemFieldSet(currentContext.tenant, formSectionLabel);

      const bodyHtml = isRealEstate
        ? buildRealEstateFormHtml(row, formSectionLabel)
        : buildGenericItemFormHtml(row, formSectionLabel);

      UnganiClientShared.openModal({
        title: row
          ? (isRealEstate ? "Update Property / Listing" : "Update Item")
          : (isRealEstate ? "Add Property / Listing" : "Add Item"),
        bodyHtml: bodyHtml,
        onOpen: function () {
          if (isRealEstate) {
            document.getElementById("listingType").value = row ? getListingType(row) : "sale";
            document.getElementById("propertyStatus").value = row ? getStatus(row) : (activeItemFieldSet.statusOptions[0] || "available");
          } else {
            document.getElementById("itemTypeSelect").value = row ? UnganiClientShared.getValue(row, ["item_type", "type"], "") : (businessPreset.itemTypes[0] || "Item");
            document.getElementById("itemStatusSelect").value = row ? getStatus(row) : (activeItemFieldSet.statusOptions[0] || "available");
          }

          if (sectionOptions.length > 1 && document.getElementById("itemSection")) {
            document.getElementById("itemSection").value = formSectionLabel;
          }
        }
      });
    }

    function calculateSummary(rows) {
      let available = 0;
      let reservedNegotiation = 0;
      let soldRented = 0;
      let totalValue = 0;

      rows.forEach(function (row) {
        const status = getStatus(row).toLowerCase();
        const value = Number(UnganiClientShared.getValue(row, ["property_price", "selling_price", "cost_price"], 0) || 0);

        totalValue += value;

        if (status.includes("available")) available++;
        if (status.includes("reserved") || status.includes("negotiation")) reservedNegotiation++;
        if (status.includes("sold") || status.includes("rented")) soldRented++;
      });

      return { available, reservedNegotiation, soldRented, totalValue };
    }

    function calculateProjects(rows) {
      const map = {};

      rows.forEach(function (row) {
        const project = UnganiClientShared.getValue(row, ["project_name"], "");

        if (!project) return;

        if (!map[project]) {
          map[project] = {
            name: project,
            count: 0,
            totalUnits: 0,
            unitsSold: 0,
            unitsAvailable: 0,
            progressTotal: 0,
            progressCount: 0,
            value: 0
          };
        }

        const item = map[project];

        item.count += 1;
        item.totalUnits += Number(UnganiClientShared.getValue(row, ["total_units"], 0) || 0);
        item.unitsSold += Number(UnganiClientShared.getValue(row, ["units_sold"], 0) || 0);
        item.unitsAvailable += Number(UnganiClientShared.getValue(row, ["units_available"], 0) || 0);
        item.value += Number(UnganiClientShared.getValue(row, ["property_price", "selling_price", "cost_price"], 0) || 0);

        const progress = Number(UnganiClientShared.getValue(row, ["project_progress_percent"], 0) || 0);

        if (progress > 0) {
          item.progressTotal += progress;
          item.progressCount += 1;
        }
      });

      return Object.keys(map).map(function (key) {
        const item = map[key];
        let progress = 0;

        if (item.progressCount > 0) {
          progress = Math.round(item.progressTotal / item.progressCount);
        } else if (item.totalUnits > 0) {
          progress = Math.round((item.unitsSold / item.totalUnits) * 100);
        }

        item.progress = progress;
        return item;
      }).sort(function (a, b) {
        return b.value - a.value;
      });
    }

    function getListingType(row) {
      return String(UnganiClientShared.getValue(row, ["listing_type", "item_type", "type"], "")).toLowerCase();
    }

    function filterItems() {
      return items;
    }

    async function selectItemCategory(key) {
      activeItemCategory = key;

      const result = await loadItemPage(true);

      if (result.error) {
        UnganiClientShared.showToast("Could not load category: " + result.error);
        return;
      }

      renderItemsPage();
    }

    function renderCategoryTiles() {
      return `
        <section class="category-tiles">
          ${getActiveCategories().map(function (category) {
            const count = itemSummaryRows.filter(category.match).length;
            const active = category.key === activeItemCategory ? " active" : "";

            return `
              <button type="button" class="category-tile${active}" style="--tile-accent:${category.accent};" onclick="selectItemCategory('${category.key}')">
                <span class="tile-count">${count}</span>
                <span class="tile-label">${UnganiClientShared.safe(category.label)}</span>
              </button>
            `;
          }).join("")}
        </section>
      `;
    }

    async function saveItem(event) {
      event.preventDefault();

      // Everything here - including payload construction, not just the
      // network call - is wrapped in one try/catch. Before this, an
      // unexpected error anywhere above the network call (e.g. a stale
      // activeItemFieldSet) would throw uncaught out of this onsubmit
      // handler: preventDefault() had already run, so nothing visibly
      // happened - no error, no save, modal just sat there. That's
      // indistinguishable from "the form doesn't let me save" to a user,
      // and invisible in this app's own error reporting.
      try {
        const nameFieldId = isRealEstate ? "propertyName" : "itemNameInput";
        const name = UnganiClientShared.value(nameFieldId);

        if (!name) {
          alert(isRealEstate ? "Please enter a property/listing name." : "Please enter an item name.");
          return;
        }

        if (!activeItemFieldSet) {
          alert("Could not determine which fields apply to this item. Please close this form and try again.");
          return;
        }

        const status = UnganiClientShared.value(isRealEstate ? "propertyStatus" : "itemStatusSelect")
          || (activeItemFieldSet.statusOptions[0] || "available");

        const value = Number(UnganiClientShared.value(isRealEstate ? "propertyPrice" : "itemValue") || 0) || null;

        const payload = {
          business_type_key: UnganiClientShared.getValue(currentContext.tenant, ["business_type_key"], null),
          section_key: isRealEstate ? "properties_listings" : "items_assets_stock",

          item_name: name,
          name: name,
          title: name,
          property_name: name,

          item_status: status,
          status: status,
          property_status: status,

          property_price: value,

          notes: UnganiClientShared.value(isRealEstate ? "notes" : "itemNotes") || null,
          updated_at: new Date().toISOString()
        };

        if (isRealEstate) {
          const listingType = UnganiClientShared.value("listingType") || "sale";
          payload.item_type = "property";
          payload.type = "property";
          payload.item_category = listingType;
          payload.category = listingType;
          payload.listing_type = listingType;
        } else {
          const itemType = UnganiClientShared.value("itemTypeSelect") || (businessPreset.itemTypes[0] || "Item");
          payload.item_type = itemType;
          payload.type = itemType;
          payload.item_category = itemType;
          payload.category = itemType;
        }

        if (sectionOptions.length > 1) {
          payload.section_label = UnganiClientShared.value("itemSection") || null;
        }

        const customFields = {};

        (activeItemFieldSet.fields || []).forEach(function (field) {
          const fieldValue = readExtraFieldValue(field);

          if (field.column) {
            payload[field.column] = fieldValue;
          } else {
            customFields[field.id] = fieldValue;
          }
        });

        // Universal, not tied to any ITEM_FIELD_SETS entry (Phase 5 of the
        // Asset Management module) - "Next Maintenance Due" applies to any
        // business type, same treatment as Notes, so it lives directly in
        // custom_fields rather than requiring every field set to declare it.
        customFields.next_maintenance_date = UnganiClientShared.value("nextMaintenanceDate") || null;

        payload.custom_fields = customFields;

        let response;
        const wasEdit = !!currentEditId;

        if (currentEditId) {
          response = await currentContext.supabaseClient
            .from("business_items")
            .update(payload)
            .eq("id", currentEditId)
            .eq("tenant_id", currentContext.tenantId);
        } else {
          payload.tenant_id = currentContext.tenantId;
          payload.created_at = new Date().toISOString();

          response = await currentContext.supabaseClient
            .from("business_items")
            .insert(payload)
            .select("id");
        }

        if (response.error) {
          alert(response.error.message);
          return;
        }

        // Fire-and-forget, same pattern as the existing "record_deleted" log
        // below - extends audit logging (previously delete-only for this
        // table, matching the app-wide convention) to cover create/update
        // too, so the item's profile page has a real activity timeline.
        const savedId = wasEdit ? currentEditId : (response.data && response.data[0] && response.data[0].id);
        if (savedId) {
          UnganiClientShared.logAuditEvent(wasEdit ? "record_updated" : "record_created", {
            entityType: "business_items",
            entityId: String(savedId),
            description: (wasEdit ? "Updated" : "Created") + " \"" + name + "\" from the Items / Properties page",
            metadata: { status: status }
          });
        }

        currentEditId = null;
        UnganiClientShared.showToast(isRealEstate ? "Property saved ✓" : "Item saved ✓");
        UnganiClientShared.closeModal();
        await loadItems();
      } catch (error) {
        alert((error && error.message) || "Could not save. Please check your connection and try again.");
      }
    }

    async function quickStatus(id, status) {
      let response;

      try {
        response = await currentContext.supabaseClient
          .from("business_items")
          .update({
            property_status: status,
            item_status: status,
            status: status,
            updated_at: new Date().toISOString()
          })
          .eq("id", id)
          .eq("tenant_id", currentContext.tenantId);
      } catch (error) {
        alert(error.message || "Could not update status. Please check your connection.");
        return;
      }

      if (response.error) {
        alert(response.error.message);
        return;
      }

      UnganiClientShared.logAuditEvent("status_changed", {
        entityType: "business_items",
        entityId: String(id),
        description: "Status changed to \"" + toTitle(status) + "\" from the Items / Properties page",
        metadata: { status: status }
      });

      UnganiClientShared.showToast("Status updated ✓");
      currentEditId = null;
      UnganiClientShared.closeModal();
      await loadItems();
    }

    async function deleteItem(id) {
      if (
        window.UnganiClientShared &&
        typeof UnganiClientShared.ensureCanWrite === "function" &&
        !UnganiClientShared.ensureCanWrite("delete item")
      ) {
        return;
      }

      const label = isRealEstate ? "property/listing" : "item/asset/stock";
      const confirmed = confirm("Move this " + label + " to Recently Deleted? You can restore it within 30 days.");

      if (!confirmed) return;

      let response;

      try {
        response = await currentContext.supabaseClient.rpc("soft_delete_ungani_record", {
          p_table_name: "business_items",
          p_record_id: id,
          p_delete_reason: "Deleted from Items / Properties page"
        });
      } catch (error) {
        alert(error.message || "Could not delete item. Please check your connection.");
        return;
      }

      if (response.error) {
        UnganiClientShared.showToast("Could not delete item: " + response.error.message);
        return;
      }

      if (response.data && response.data.ok === false) {
        UnganiClientShared.showToast(response.data.message || "Could not delete item.");
        return;
      }

      UnganiClientShared.showToast(isRealEstate ? "Property moved to Recently Deleted ✓" : "Item moved to Recently Deleted ✓");
      UnganiClientShared.logAuditEvent("record_deleted", { entityType: "business_items", entityId: String(id), description: "Deleted from Items / Properties page" });

      currentEditId = null;
      UnganiClientShared.closeModal();
      await loadItems();
    }

    function getItemName(row) {
      return UnganiClientShared.getValue(row, ["property_name", "item_name", "name", "title"], "Property");
    }

    function getStatus(row) {
      return UnganiClientShared.getValue(row, ["property_status", "item_status", "status"], "available");
    }

    function getProgress(row) {
      const explicit = Number(UnganiClientShared.getValue(row, ["project_progress_percent"], 0) || 0);

      if (explicit > 0) {
        return Math.max(0, Math.min(100, explicit));
      }

      const total = Number(UnganiClientShared.getValue(row, ["total_units"], 0) || 0);
      const sold = Number(UnganiClientShared.getValue(row, ["units_sold"], 0) || 0);

      if (total <= 0) return 0;

      return Math.max(0, Math.min(100, Math.round((sold / total) * 100)));
    }

    function statusBadge(status) {
      const color = statusColor(status);
      return `<span class="ungani-badge ${UnganiClientShared.attr(color)}">${UnganiClientShared.safe(toTitle(status))}</span>`;
    }

    function statusColor(status) {
      const lower = String(status || "").toLowerCase();

      if (lower.includes("available") || lower.includes("sold") || lower.includes("rented") || lower.includes("completed")) return "green";
      if (lower.includes("reserved") || lower.includes("negotiation") || lower.includes("pending") || lower.includes("review")) return "gold";
      if (lower.includes("maintenance") || lower.includes("inactive") || lower.includes("cancelled") || lower.includes("lost")) return "red";

      return "blue";
    }

    function statusAccentHex(status) {
      const map = { green: "#16A34A", gold: "#D4A63A", red: "#DC2626", blue: "#2563EB" };
      return map[statusColor(status)] || "#64748B";
    }

    function progressColor(percent) {
      const value = Number(percent || 0);

      if (value >= 75) return "green";
      if (value >= 35) return "gold";
      return "red";
    }

    function getProjectOptions() {
      const projects = Array.from(new Set(itemSummaryRows.map(function (row) {
        return UnganiClientShared.getValue(row, ["project_name"], "");
      }).filter(Boolean))).sort();

      return projects.map(function (project) {
        return `<option value="${UnganiClientShared.attr(project)}">${UnganiClientShared.safe(project)}</option>`;
      }).join("");
    }

    function restoreFilters() {
      if (document.getElementById("searchBox")) document.getElementById("searchBox").value = sessionStorage.getItem("ungani_items_search") || "";
      if (document.getElementById("filterStatus")) document.getElementById("filterStatus").value = sessionStorage.getItem("ungani_items_status") || "";
      if (document.getElementById("filterProject")) document.getElementById("filterProject").value = sessionStorage.getItem("ungani_items_project") || "";
    }

    function saveFilters() {
      if (document.getElementById("searchBox")) sessionStorage.setItem("ungani_items_search", UnganiClientShared.value("searchBox"));
      if (document.getElementById("filterStatus")) sessionStorage.setItem("ungani_items_status", UnganiClientShared.value("filterStatus"));
      if (document.getElementById("filterProject")) sessionStorage.setItem("ungani_items_project", UnganiClientShared.value("filterProject"));
    }

    function resetFilters() {
      sessionStorage.removeItem("ungani_items_search");
      sessionStorage.removeItem("ungani_items_status");
      sessionStorage.removeItem("ungani_items_project");
      activeItemCategory = "all";

      const searchEl = document.getElementById("searchBox");
      const statusEl = document.getElementById("filterStatus");
      const projectEl = document.getElementById("filterProject");
      if (searchEl) searchEl.value = "";
      if (statusEl) statusEl.value = "";
      if (projectEl) projectEl.value = "";

      refreshItemData();
      UnganiClientShared.showToast("Property filters reset ✓");
    }

    function toTitle(value) {
      return String(value || "")
        .replace(/_/g, " ")
        .replace(/\w\S*/g, function (text) {
          return text.charAt(0).toUpperCase() + text.substr(1).toLowerCase();
        });
    }

    function shortText(value, maxLength) {
      const text = String(value || "");
      const max = Number(maxLength || 100);

      if (text.length <= max) return text;

      return text.slice(0, max) + "...";
    }

    function renderSectionSwitcher() {
      if (sectionOptions.length <= 1) return "";

      const pills = [{ label: "All Sections", value: "" }].concat(
        sectionOptions.map(function (label) { return { label: label, value: label }; })
      );

      return `
        <div class="ungani-button-row" style="margin-top:10px;">
          ${pills.map(function (pill) {
            const active = currentSectionFilter === pill.value;
            return `<button class="ungani-btn ${active ? "gold" : "dark"}" type="button" onclick="switchSection('${UnganiClientShared.attr(pill.value)}')">${UnganiClientShared.safe(pill.label)}</button>`;
          }).join("")}
        </div>
      `;
    }

    function switchSection(value) {
      const url = new URL(window.location.href);

      if (value) {
        url.searchParams.set("section", value);
      } else {
        url.searchParams.delete("section");
      }

      window.location.href = url.toString();
    }

    function detectRealEstate(tenant) {
      if (window.UnganiBusinessConfig && typeof UnganiBusinessConfig.resolve === "function") {
        const matched = UnganiBusinessConfig.resolve(tenant);
        if (matched) return matched.key === "real_estate";
      }

      const businessType = String(UnganiClientShared.getValue(tenant, ["business_type", "business_type_key"], "")).toLowerCase();
      const businessTypeKey = String(UnganiClientShared.getValue(tenant, ["business_type_key"], "")).toLowerCase();

      return businessType.includes("real estate") || businessTypeKey.includes("real_estate");
    }
  </script>
