<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Items / Properties</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-shared.js"></script>
</head>

<body>
  <script>
    let items = [];
    let filteredItems = [];
    let currentEditId = null;
    let currentContext = null;
    let isRealEstate = false;

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "items",
        pageTitle: "Items / Assets / Stock",
        pageSubtitle: "Track business items, assets, stock, equipment, properties, listings, and project units.",
        onReady: loadItemsPage
      });
    });

    async function loadItemsPage(context) {
      currentContext = context;

      const businessType = String(UnganiClientShared.getValue(context.tenant, ["business_type", "business_type_key"], "")).toLowerCase();
      const businessTypeKey = String(UnganiClientShared.getValue(context.tenant, ["business_type_key"], "")).toLowerCase();

      isRealEstate = businessType.includes("real estate") || businessTypeKey.includes("real_estate");

      document.querySelector(".ungani-topbar h2").innerText = isRealEstate ? "Properties / Listings" : "Items / Assets / Stock";
      document.querySelector(".ungani-topbar p").innerText = isRealEstate
        ? "Track properties, apartments, houses, units, projects, pricing, assigned agents, and listing status."
        : "Track business items, assets, stock, equipment, suppliers, quantities, status, and notes.";

      await loadItems();
    }

    async function loadItems() {
      const contentEl = currentContext.contentEl;
      contentEl.innerHTML = UnganiClientShared.loadingCard(isRealEstate ? "Loading properties and listings..." : "Loading items and assets...");

      const response = await currentContext.supabaseClient
        .from("business_items")
        .select("*")
        .eq("tenant_id", currentContext.tenantId)
        .order("created_at", { ascending: false });

      if (response.error) {
        contentEl.innerHTML = UnganiClientShared.errorCard("Could not load records", response.error.message);
        return;
      }

      items = response.data || [];
      renderPage();
    }

    function renderPage() {
      filteredItems = getFilteredItems();

      const title = isRealEstate ? "Properties / Listings" : "Items / Assets / Stock";
      const addLabel = currentEditId ? "Update Record" : (isRealEstate ? "Add Property / Listing" : "Add Item / Asset");

      UnganiClientShared.setContent(`
        <section class="ungani-card ungani-hero">
          <h2>${UnganiClientShared.safe(title)}</h2>
          <p>
            ${isRealEstate
              ? "Use this section to manage property listings, rental units, sale units, project units, prices, agents, and property status."
              : "Use this section to manage items, assets, stock, equipment, quantities, suppliers, prices, and business status."
            }
          </p>

          <div class="ungani-button-row">
            <button class="ungani-btn" onclick="scrollToForm()">${UnganiClientShared.safe(addLabel)}</button>
            <a class="ungani-btn green" href="my-money.html">Money Records</a>
            <a class="ungani-btn dark" href="reports.html">Reports</a>
          </div>
        </section>

        ${renderMetrics()}

        <section class="ungani-card">
          <div class="ungani-section-title">
            <h3>${isRealEstate ? "Filters" : "Filters"}</h3>
            <button class="ungani-btn dark" onclick="resetFilters()">Reset Filters</button>
          </div>

          <div class="ungani-form-grid">
            <div>
              <label for="filterType">${isRealEstate ? "Listing Type" : "Item Type"}</label>
              <select id="filterType" onchange="renderPage()">
                <option value="">All Types</option>
                <option value="sale">Sale</option>
                <option value="rent">Rent</option>
                <option value="project">Project</option>
                <option value="stock">Stock</option>
                <option value="asset">Asset</option>
                <option value="equipment">Equipment</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div>
              <label for="filterStatus">Status</label>
              <select id="filterStatus" onchange="renderPage()">
                <option value="">All Statuses</option>
                <option value="available">Available</option>
                <option value="reserved">Reserved</option>
                <option value="sold">Sold</option>
                <option value="rented">Rented</option>
                <option value="under negotiation">Under Negotiation</option>
                <option value="maintenance">Maintenance</option>
                <option value="inactive">Inactive</option>
              </select>
            </div>

            <div>
              <label for="searchBox">Search</label>
              <input id="searchBox" placeholder="${isRealEstate ? "Search property, project, location, agent..." : "Search item, supplier, category..."}" oninput="renderPage()" />
            </div>
          </div>
        </section>

        <section id="itemFormCard" class="ungani-card">
          <div class="ungani-section-title">
            <h3>${UnganiClientShared.safe(addLabel)}</h3>
            ${currentEditId ? '<button class="ungani-btn dark" onclick="cancelEdit()">Cancel Edit</button>' : ''}
          </div>

          ${renderForm()}
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>${isRealEstate ? "Property / Listing Records" : "Item / Asset Records"}</h3>
              <p class="ungani-small">${filteredItems.length} record(s) shown</p>
            </div>

            <button class="ungani-btn green" onclick="loadItems()">Refresh</button>
          </div>

          ${renderItemsList()}
        </section>

        <p class="ungani-small">
          Items / Properties Version: Step 305C Shared Layout · ungani.com · info@ungani.com
        </p>
      `);

      restoreFilters();
      populateEditFormIfNeeded();
    }

    function renderMetrics() {
      let available = 0;
      let reserved = 0;
      let sold = 0;
      let rented = 0;
      let negotiation = 0;
      let maintenance = 0;
      let totalValue = 0;
      let lowStock = 0;

      items.forEach(function (row) {
        const status = getStatus(row).toLowerCase();
        const quantity = Number(UnganiClientShared.getValue(row, ["quantity_available", "quantity"], 0) || 0);
        const reorderLevel = Number(UnganiClientShared.getValue(row, ["reorder_level"], 0) || 0);
        const price = Number(UnganiClientShared.getValue(row, ["property_price", "selling_price", "cost_price"], 0) || 0);

        totalValue += price;

        if (status.includes("available")) available++;
        if (status.includes("reserved")) reserved++;
        if (status.includes("sold")) sold++;
        if (status.includes("rented")) rented++;
        if (status.includes("negotiation")) negotiation++;
        if (status.includes("maintenance") || status.includes("repair")) maintenance++;

        if (!isRealEstate && reorderLevel > 0 && quantity <= reorderLevel) {
          lowStock++;
        }
      });

      if (isRealEstate) {
        return `
          <section class="ungani-grid">
            ${UnganiClientShared.metricCard("Total Properties", items.length, "All property/listing records", "blue")}
            ${UnganiClientShared.metricCard("Available", available, "Ready for sale or rent", "green")}
            ${UnganiClientShared.metricCard("Reserved", reserved, "Reserved or booked", "orange")}
            ${UnganiClientShared.metricCard("Sold", sold, "Sold property records", "green")}
            ${UnganiClientShared.metricCard("Rented", rented, "Rented units", "blue")}
            ${UnganiClientShared.metricCard("Listed Value", UnganiClientShared.formatKES(totalValue), "Estimated total listing value", "gold")}
          </section>
        `;
      }

      return `
        <section class="ungani-grid">
          ${UnganiClientShared.metricCard("Total Records", items.length, "All item/asset records", "blue")}
          ${UnganiClientShared.metricCard("Available", available, "Available items/assets", "green")}
          ${UnganiClientShared.metricCard("Maintenance", maintenance, "Needs service or repair", maintenance > 0 ? "orange" : "green")}
          ${UnganiClientShared.metricCard("Low Stock", lowStock, "Quantity at or below reorder level", lowStock > 0 ? "red" : "green")}
          ${UnganiClientShared.metricCard("Estimated Value", UnganiClientShared.formatKES(totalValue), "Based on saved prices", "gold")}
        </section>
      `;
    }

    function renderForm() {
      if (isRealEstate) {
        return `
          <form id="itemForm" onsubmit="saveItem(event)">
            <div class="ungani-form-grid">
              <div>
                <label for="propertyName">Property Name</label>
                <input id="propertyName" required placeholder="Example: Clove Garden A12" />
              </div>

              <div>
                <label for="projectName">Project Name</label>
                <input id="projectName" placeholder="Example: Clove Garden" />
              </div>

              <div>
                <label for="propertyLocation">Location</label>
                <input id="propertyLocation" placeholder="Example: Nyali, Mombasa" />
              </div>

              <div>
                <label for="listingType">Type</label>
                <select id="listingType">
                  <option value="sale">Sale</option>
                  <option value="rent">Rent</option>
                  <option value="project">Project</option>
                  <option value="land">Land</option>
                  <option value="commercial">Commercial</option>
                  <option value="other">Other</option>
                </select>
              </div>

              <div>
                <label for="propertyPrice">Price / Value</label>
                <input id="propertyPrice" type="number" min="0" step="1" placeholder="Example: 8500000" />
              </div>

              <div>
                <label for="propertyStatus">Status</label>
                <select id="propertyStatus">
                  <option value="Available">Available</option>
                  <option value="Reserved">Reserved</option>
                  <option value="Sold">Sold</option>
                  <option value="Rented">Rented</option>
                  <option value="Under Negotiation">Under Negotiation</option>
                  <option value="Maintenance">Maintenance</option>
                  <option value="Inactive">Inactive</option>
                </select>
              </div>

              <div>
                <label for="bedrooms">Bedrooms</label>
                <input id="bedrooms" type="number" min="0" step="1" placeholder="Example: 3" />
              </div>

              <div>
                <label for="bathrooms">Bathrooms</label>
                <input id="bathrooms" type="number" min="0" step="0.5" placeholder="Example: 2" />
              </div>

              <div>
                <label for="propertySize">Size</label>
                <input id="propertySize" placeholder="Example: 120 sqm" />
              </div>

              <div>
                <label for="assignedAgent">Assigned Agent</label>
                <input id="assignedAgent" placeholder="Example: Brian Otieno" />
              </div>

              <div>
                <label for="dateListed">Date Listed</label>
                <input id="dateListed" type="date" />
              </div>

              <div>
                <label for="totalUnits">Total Units</label>
                <input id="totalUnits" type="number" min="0" step="1" placeholder="For project records" />
              </div>

              <div>
                <label for="unitsSold">Units Sold</label>
                <input id="unitsSold" type="number" min="0" step="1" placeholder="For project records" />
              </div>

              <div>
                <label for="unitsAvailable">Units Available</label>
                <input id="unitsAvailable" type="number" min="0" step="1" placeholder="For project records" />
              </div>

              <div>
                <label for="completionStatus">Completion Status</label>
                <input id="completionStatus" placeholder="Example: 65% complete / Ongoing" />
              </div>

              <div>
                <label for="projectProgressPercent">Project Progress %</label>
                <input id="projectProgressPercent" type="number" min="0" max="100" step="1" placeholder="Example: 65" />
              </div>
            </div>

            <label for="notes">Notes</label>
            <textarea id="notes" placeholder="Add viewing notes, buyer status, rental notes, project notes, or internal details..."></textarea>

            <div class="ungani-button-row">
              <button class="ungani-btn green" type="submit">${currentEditId ? "Update Property" : "Add Property"}</button>
              ${currentEditId ? '<button class="ungani-btn dark" type="button" onclick="cancelEdit()">Cancel</button>' : ''}
            </div>
          </form>
        `;
      }

      return `
        <form id="itemForm" onsubmit="saveItem(event)">
          <div class="ungani-form-grid">
            <div>
              <label for="itemName">Item / Asset Name</label>
              <input id="itemName" required placeholder="Example: Office Laptop" />
            </div>

            <div>
              <label for="itemType">Type</label>
              <select id="itemType">
                <option value="stock">Stock</option>
                <option value="asset">Asset</option>
                <option value="equipment">Equipment</option>
                <option value="vehicle">Vehicle</option>
                <option value="property">Property</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div>
              <label for="itemCategory">Category</label>
              <input id="itemCategory" placeholder="Example: Electronics, Furniture, Supplies" />
            </div>

            <div>
              <label for="itemStatus">Status</label>
              <select id="itemStatus">
                <option value="Available">Available</option>
                <option value="In Use">In Use</option>
                <option value="Maintenance">Maintenance</option>
                <option value="Out of Stock">Out of Stock</option>
                <option value="Inactive">Inactive</option>
              </select>
            </div>

            <div>
              <label for="quantityAvailable">Quantity</label>
              <input id="quantityAvailable" type="number" min="0" step="1" placeholder="Example: 20" />
            </div>

            <div>
              <label for="unit">Unit</label>
              <input id="unit" placeholder="Example: pcs, kg, boxes" />
            </div>

            <div>
              <label for="reorderLevel">Reorder Level</label>
              <input id="reorderLevel" type="number" min="0" step="1" placeholder="Example: 5" />
            </div>

            <div>
              <label for="supplier">Supplier</label>
              <input id="supplier" placeholder="Supplier name" />
            </div>

            <div>
              <label for="costPrice">Cost Price</label>
              <input id="costPrice" type="number" min="0" step="1" />
            </div>

            <div>
              <label for="sellingPrice">Selling Price / Value</label>
              <input id="sellingPrice" type="number" min="0" step="1" />
            </div>
          </div>

          <label for="notes">Notes</label>
          <textarea id="notes" placeholder="Add item notes, supplier notes, condition, or internal details..."></textarea>

          <div class="ungani-button-row">
            <button class="ungani-btn green" type="submit">${currentEditId ? "Update Item" : "Add Item"}</button>
            ${currentEditId ? '<button class="ungani-btn dark" type="button" onclick="cancelEdit()">Cancel</button>' : ''}
          </div>
        </form>
      `;
    }

    function renderItemsList() {
      if (filteredItems.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>${isRealEstate ? "No properties found" : "No items found"}</h3>
            <p>${isRealEstate ? "Add your first property, unit, or project listing above." : "Add your first item, asset, or stock record above."}</p>
          </div>
        `;
      }

      return filteredItems.map(function (row) {
        return renderItemCard(row);
      }).join("");
    }

    function renderItemCard(row) {
      const title = getTitle(row);
      const status = getStatus(row);
      const type = getType(row);
      const location = UnganiClientShared.getValue(row, ["property_location", "location"], "");
      const project = UnganiClientShared.getValue(row, ["project_name"], "");
      const agent = UnganiClientShared.getValue(row, ["assigned_agent"], "");
      const notes = UnganiClientShared.getValue(row, ["notes", "service_notes", "assignment_notes"], "");
      const price = Number(UnganiClientShared.getValue(row, ["property_price", "selling_price", "cost_price"], 0) || 0);
      const quantity = Number(UnganiClientShared.getValue(row, ["quantity_available", "quantity"], 0) || 0);

      if (isRealEstate) {
        const bedrooms = UnganiClientShared.getValue(row, ["bedrooms"], 0);
        const bathrooms = UnganiClientShared.getValue(row, ["bathrooms"], 0);
        const size = UnganiClientShared.getValue(row, ["property_size"], "");
        const progress = Number(UnganiClientShared.getValue(row, ["project_progress_percent"], 0) || 0);
        const totalUnits = Number(UnganiClientShared.getValue(row, ["total_units"], 0) || 0);
        const unitsSold = Number(UnganiClientShared.getValue(row, ["units_sold"], 0) || 0);
        const unitsAvailable = Number(UnganiClientShared.getValue(row, ["units_available"], 0) || 0);

        return `
          <div class="ungani-card" style="box-shadow:none;">
            <div class="ungani-section-title">
              <div>
                <h3>${UnganiClientShared.safe(title)}</h3>
                <p class="ungani-small">
                  ${project ? "Project: " + UnganiClientShared.safe(project) + " · " : ""}
                  ${location ? UnganiClientShared.safe(location) + " · " : ""}
                  ${UnganiClientShared.safe(type)}
                </p>
              </div>

              <div>
                ${statusBadge(status)}
              </div>
            </div>

            <section class="ungani-grid">
              ${miniDetail("Price / Value", price > 0 ? UnganiClientShared.formatKES(price) : "Not added")}
              ${miniDetail("Bedrooms", bedrooms || "N/A")}
              ${miniDetail("Bathrooms", bathrooms || "N/A")}
              ${miniDetail("Size", size || "N/A")}
              ${miniDetail("Assigned Agent", agent || "N/A")}
              ${miniDetail("Date Listed", UnganiClientShared.formatDate(UnganiClientShared.getValue(row, ["date_listed", "created_at"], "")))}
            </section>

            ${
              totalUnits > 0 || progress > 0
                ? `
                  <div style="margin-top:14px;">
                    <p class="ungani-small" style="margin:0 0 8px;">
                      <strong>Project Progress:</strong>
                      ${progress || 0}% · ${unitsSold} sold · ${unitsAvailable} available · ${totalUnits} total units
                    </p>
                    <div style="width:100%;height:12px;background:var(--ungani-border);border-radius:999px;overflow:hidden;">
                      <div style="width:${Math.max(0, Math.min(100, progress))}%;height:12px;background:var(--ungani-gold);"></div>
                    </div>
                  </div>
                `
                : ""
            }

            ${notes ? `<p class="ungani-small" style="margin-top:12px;">${UnganiClientShared.safe(notes)}</p>` : ""}

            <div class="ungani-button-row">
              <button class="ungani-btn" onclick="editItem('${UnganiClientShared.attr(row.id)}')">Edit</button>
              <button class="ungani-btn green" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'Available')">Available</button>
              <button class="ungani-btn orange" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'Under Negotiation')">Negotiation</button>
              <button class="ungani-btn blue" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'Reserved')">Reserved</button>
              <button class="ungani-btn dark" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'Sold')">Sold</button>
              <button class="ungani-btn red" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'Inactive')">Inactive</button>
            </div>
          </div>
        `;
      }

      return `
        <div class="ungani-card" style="box-shadow:none;">
          <div class="ungani-section-title">
            <div>
              <h3>${UnganiClientShared.safe(title)}</h3>
              <p class="ungani-small">${UnganiClientShared.safe(type)} · Quantity: ${UnganiClientShared.safe(quantity)}</p>
            </div>

            <div>
              ${statusBadge(status)}
            </div>
          </div>

          <section class="ungani-grid">
            ${miniDetail("Category", UnganiClientShared.getValue(row, ["item_category", "category"], "N/A"))}
            ${miniDetail("Quantity", quantity)}
            ${miniDetail("Unit", UnganiClientShared.getValue(row, ["unit"], "N/A"))}
            ${miniDetail("Supplier", UnganiClientShared.getValue(row, ["supplier"], "N/A"))}
            ${miniDetail("Cost Price", UnganiClientShared.formatKES(UnganiClientShared.getValue(row, ["cost_price"], 0)))}
            ${miniDetail("Value / Selling", UnganiClientShared.formatKES(UnganiClientShared.getValue(row, ["selling_price"], 0)))}
          </section>

          ${notes ? `<p class="ungani-small" style="margin-top:12px;">${UnganiClientShared.safe(notes)}</p>` : ""}

          <div class="ungani-button-row">
            <button class="ungani-btn" onclick="editItem('${UnganiClientShared.attr(row.id)}')">Edit</button>
            <button class="ungani-btn green" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'Available')">Available</button>
            <button class="ungani-btn orange" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'Maintenance')">Maintenance</button>
            <button class="ungani-btn red" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'Inactive')">Inactive</button>
          </div>
        </div>
      `;
    }

    function miniDetail(label, value) {
      return `
        <div class="ungani-card" style="margin-bottom:0;box-shadow:none;padding:14px;">
          <p class="ungani-small" style="margin:0 0 5px;">${UnganiClientShared.safe(label)}</p>
          <strong>${UnganiClientShared.safe(value)}</strong>
        </div>
      `;
    }

    function statusBadge(status) {
      const lower = String(status || "").toLowerCase();
      let color = "blue";

      if (lower.includes("available") || lower.includes("sold") || lower.includes("rented")) color = "green";
      if (lower.includes("reserved") || lower.includes("negotiation") || lower.includes("maintenance")) color = "orange";
      if (lower.includes("inactive") || lower.includes("out")) color = "red";

      return `<span class="ungani-badge ${UnganiClientShared.attr(color)}">${UnganiClientShared.safe(status || "Status")}</span>`;
    }

    function getFilteredItems() {
      const filterType = document.getElementById("filterType") ? UnganiClientShared.value("filterType").toLowerCase() : "";
      const filterStatus = document.getElementById("filterStatus") ? UnganiClientShared.value("filterStatus").toLowerCase() : "";
      const query = document.getElementById("searchBox") ? UnganiClientShared.value("searchBox").toLowerCase() : "";

      return items.filter(function (row) {
        const type = getType(row).toLowerCase();
        const status = getStatus(row).toLowerCase();

        const haystack = [
          getTitle(row),
          type,
          status,
          UnganiClientShared.getValue(row, ["project_name"], ""),
          UnganiClientShared.getValue(row, ["property_location"], ""),
          UnganiClientShared.getValue(row, ["assigned_agent"], ""),
          UnganiClientShared.getValue(row, ["supplier"], ""),
          UnganiClientShared.getValue(row, ["notes"], "")
        ].join(" ").toLowerCase();

        if (filterType && !type.includes(filterType)) return false;
        if (filterStatus && !status.includes(filterStatus)) return false;
        if (query && !haystack.includes(query)) return false;

        return true;
      });
    }

    function restoreFilters() {
      const filterType = sessionStorage.getItem("ungani_items_filter_type") || "";
      const filterStatus = sessionStorage.getItem("ungani_items_filter_status") || "";
      const search = sessionStorage.getItem("ungani_items_search") || "";

      if (document.getElementById("filterType")) document.getElementById("filterType").value = filterType;
      if (document.getElementById("filterStatus")) document.getElementById("filterStatus").value = filterStatus;
      if (document.getElementById("searchBox")) document.getElementById("searchBox").value = search;

      ["filterType", "filterStatus", "searchBox"].forEach(function (id) {
        const element = document.getElementById(id);

        if (element) {
          element.addEventListener("change", saveFilters);
          element.addEventListener("input", saveFilters);
        }
      });
    }

    function saveFilters() {
      if (document.getElementById("filterType")) sessionStorage.setItem("ungani_items_filter_type", UnganiClientShared.value("filterType"));
      if (document.getElementById("filterStatus")) sessionStorage.setItem("ungani_items_filter_status", UnganiClientShared.value("filterStatus"));
      if (document.getElementById("searchBox")) sessionStorage.setItem("ungani_items_search", UnganiClientShared.value("searchBox"));
    }

    function resetFilters() {
      sessionStorage.removeItem("ungani_items_filter_type");
      sessionStorage.removeItem("ungani_items_filter_status");
      sessionStorage.removeItem("ungani_items_search");
      renderPage();
      UnganiClientShared.showToast("Filters reset ✓");
    }

    async function saveItem(event) {
      event.preventDefault();

      const payload = buildPayload();

      if (!payload.item_name) {
        alert(isRealEstate ? "Please enter a property name." : "Please enter an item name.");
        return;
      }

      let response;

      if (currentEditId) {
        response = await currentContext.supabaseClient
          .from("business_items")
          .update(payload)
          .eq("id", currentEditId)
          .eq("tenant_id", currentContext.tenantId);
      } else {
        payload.tenant_id = currentContext.tenantId;
        payload.created_by = currentContext.authUser.id;
        payload.created_at = new Date().toISOString();

        response = await currentContext.supabaseClient
          .from("business_items")
          .insert(payload);
      }

      if (response.error) {
        alert(response.error.message);
        return;
      }

      currentEditId = null;
      UnganiClientShared.showToast(isRealEstate ? "Property saved ✓" : "Item saved ✓");
      await loadItems();
    }

    function buildPayload() {
      const now = new Date().toISOString();

      if (isRealEstate) {
        const propertyName = UnganiClientShared.value("propertyName");
        const projectName = UnganiClientShared.value("projectName");
        const listingType = UnganiClientShared.value("listingType") || "sale";
        const propertyStatus = UnganiClientShared.value("propertyStatus") || "Available";

        return {
          item_name: propertyName,
          name: propertyName,
          title: propertyName,
          property_name: propertyName,
          project_name: projectName || null,
          property_location: UnganiClientShared.value("propertyLocation") || null,
          property_price: numberValue("propertyPrice"),
          listing_type: listingType,
          item_type: "property",
          type: "property",
          item_category: listingType,
          category: listingType,
          bedrooms: integerValue("bedrooms"),
          bathrooms: numberValue("bathrooms"),
          property_size: UnganiClientShared.value("propertySize") || null,
          assigned_agent: UnganiClientShared.value("assignedAgent") || null,
          property_status: propertyStatus,
          item_status: propertyStatus,
          status: propertyStatus,
          date_listed: dateOrNull("dateListed"),
          total_units: integerValue("totalUnits"),
          units_sold: integerValue("unitsSold"),
          units_available: integerValue("unitsAvailable"),
          completion_status: UnganiClientShared.value("completionStatus") || null,
          project_progress_percent: numberValue("projectProgressPercent"),
          business_type_key: "real_estate_property_management",
          section_key: "properties_listings",
          notes: UnganiClientShared.value("notes") || null,
          updated_at: now
        };
      }

      const itemName = UnganiClientShared.value("itemName");
      const itemType = UnganiClientShared.value("itemType") || "stock";
      const itemStatus = UnganiClientShared.value("itemStatus") || "Available";
      const itemCategory = UnganiClientShared.value("itemCategory") || itemType;

      return {
        item_name: itemName,
        name: itemName,
        title: itemName,
        item_type: itemType,
        type: itemType,
        item_category: itemCategory,
        category: itemCategory,
        item_status: itemStatus,
        status: itemStatus,
        quantity_available: integerValue("quantityAvailable"),
        quantity: integerValue("quantityAvailable"),
        unit: UnganiClientShared.value("unit") || null,
        reorder_level: integerValue("reorderLevel"),
        supplier: UnganiClientShared.value("supplier") || null,
        cost_price: numberValue("costPrice"),
        selling_price: numberValue("sellingPrice"),
        notes: UnganiClientShared.value("notes") || null,
        updated_at: now
      };
    }

    function populateEditFormIfNeeded() {
      if (!currentEditId) return;

      const row = items.find(function (item) {
        return String(item.id) === String(currentEditId);
      });

      if (!row) return;

      if (isRealEstate) {
        setValue("propertyName", UnganiClientShared.getValue(row, ["property_name", "item_name", "name", "title"], ""));
        setValue("projectName", UnganiClientShared.getValue(row, ["project_name"], ""));
        setValue("propertyLocation", UnganiClientShared.getValue(row, ["property_location"], ""));
        setValue("listingType", UnganiClientShared.getValue(row, ["listing_type", "item_category", "category"], "sale"));
        setValue("propertyPrice", UnganiClientShared.getValue(row, ["property_price"], 0));
        setValue("propertyStatus", UnganiClientShared.getValue(row, ["property_status", "item_status", "status"], "Available"));
        setValue("bedrooms", UnganiClientShared.getValue(row, ["bedrooms"], 0));
        setValue("bathrooms", UnganiClientShared.getValue(row, ["bathrooms"], 0));
        setValue("propertySize", UnganiClientShared.getValue(row, ["property_size"], ""));
        setValue("assignedAgent", UnganiClientShared.getValue(row, ["assigned_agent"], ""));
        setValue("dateListed", String(UnganiClientShared.getValue(row, ["date_listed"], "")).slice(0, 10));
        setValue("totalUnits", UnganiClientShared.getValue(row, ["total_units"], 0));
        setValue("unitsSold", UnganiClientShared.getValue(row, ["units_sold"], 0));
        setValue("unitsAvailable", UnganiClientShared.getValue(row, ["units_available"], 0));
        setValue("completionStatus", UnganiClientShared.getValue(row, ["completion_status"], ""));
        setValue("projectProgressPercent", UnganiClientShared.getValue(row, ["project_progress_percent"], 0));
        setValue("notes", UnganiClientShared.getValue(row, ["notes"], ""));
        return;
      }

      setValue("itemName", UnganiClientShared.getValue(row, ["item_name", "name", "title"], ""));
      setValue("itemType", UnganiClientShared.getValue(row, ["item_type", "type"], "stock"));
      setValue("itemCategory", UnganiClientShared.getValue(row, ["item_category", "category"], ""));
      setValue("itemStatus", UnganiClientShared.getValue(row, ["item_status", "status"], "Available"));
      setValue("quantityAvailable", UnganiClientShared.getValue(row, ["quantity_available", "quantity"], 0));
      setValue("unit", UnganiClientShared.getValue(row, ["unit"], ""));
      setValue("reorderLevel", UnganiClientShared.getValue(row, ["reorder_level"], 0));
      setValue("supplier", UnganiClientShared.getValue(row, ["supplier"], ""));
      setValue("costPrice", UnganiClientShared.getValue(row, ["cost_price"], 0));
      setValue("sellingPrice", UnganiClientShared.getValue(row, ["selling_price"], 0));
      setValue("notes", UnganiClientShared.getValue(row, ["notes"], ""));
    }

    function editItem(id) {
      currentEditId = id;
      renderPage();
      scrollToForm();
    }

    function cancelEdit() {
      currentEditId = null;
      renderPage();
      UnganiClientShared.showToast("Edit cancelled");
    }

    async function quickStatus(id, status) {
      const payload = {
        status: status,
        item_status: status,
        property_status: status,
        updated_at: new Date().toISOString()
      };

      const response = await currentContext.supabaseClient
        .from("business_items")
        .update(payload)
        .eq("id", id)
        .eq("tenant_id", currentContext.tenantId);

      if (response.error) {
        alert(response.error.message);
        return;
      }

      UnganiClientShared.showToast("Status updated ✓");
      await loadItems();
    }

    function scrollToForm() {
      setTimeout(function () {
        const card = document.getElementById("itemFormCard");
        if (card) {
          card.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      }, 100);
    }

    function getTitle(row) {
      return UnganiClientShared.getValue(row, ["property_name", "item_name", "name", "title"], "Untitled Record");
    }

    function getStatus(row) {
      return UnganiClientShared.getValue(row, ["property_status", "item_status", "status"], "Available");
    }

    function getType(row) {
      return UnganiClientShared.getValue(row, ["listing_type", "item_type", "type", "item_category", "category"], "other");
    }

    function setValue(id, value) {
      const element = document.getElementById(id);
      if (element) {
        element.value = value === null || value === undefined ? "" : value;
      }
    }

    function numberValue(id) {
      const value = Number(UnganiClientShared.value(id) || 0);
      return isNaN(value) ? 0 : value;
    }

    function integerValue(id) {
      const value = parseInt(UnganiClientShared.value(id) || "0", 10);
      return isNaN(value) ? 0 : value;
    }

    function dateOrNull(id) {
      const value = UnganiClientShared.value(id);
      return value || null;
    }
  </script>
</body>
</html>
