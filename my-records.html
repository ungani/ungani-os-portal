<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Business Records</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-shared.js"></script>
</head>

<body>
  <script>
    let currentContext = null;
    let records = [];
    let currentEditId = null;
    let isRealEstate = false;

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "records",
        pageTitle: "Business Records",
        pageSubtitle: "Track business activity, updates, leads, viewings, notes, and follow-up records.",
        onReady: startRecordsPage
      });
    });

    async function startRecordsPage(context) {
      currentContext = context;

      const businessType = String(UnganiClientShared.getValue(context.tenant, ["business_type", "business_type_key"], "")).toLowerCase();
      const businessTypeKey = String(UnganiClientShared.getValue(context.tenant, ["business_type_key"], "")).toLowerCase();

      isRealEstate = businessType.includes("real estate") || businessTypeKey.includes("real_estate");

      const titleEl = document.querySelector(".ungani-topbar h2");
      const subEl = document.querySelector(".ungani-topbar p");

      if (titleEl) {
        titleEl.innerText = isRealEstate ? "Leads / Viewings / Property Records" : "Business Records";
      }

      if (subEl) {
        subEl.innerText = isRealEstate
          ? "Track leads, inquiries, viewings, site visits, project updates, sales updates, rental updates, and property activity notes."
          : "Track business activity, updates, notes, follow-ups, and operational records.";
      }

      await loadRecords();
    }

    async function loadRecords() {
      currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading business records...");

      const response = await currentContext.supabaseClient
        .from("business_records")
        .select("*")
        .eq("tenant_id", currentContext.tenantId)
        .order("created_at", { ascending: false });

      if (response.error) {
        currentContext.contentEl.innerHTML = UnganiClientShared.errorCard("Could not load records", response.error.message);
        return;
      }

      records = response.data || [];
      renderRecordsPage();
    }

    function renderRecordsPage() {
      const filtered = filterRecords();
      const summary = calculateSummary();

      UnganiClientShared.setContent(`
        <section class="ungani-card ungani-hero">
          <h2>${isRealEstate ? "Property Activity Records" : "Business Records"}</h2>
          <p>
            ${isRealEstate
              ? "Use this section to capture leads, inquiries, site visits, viewing notes, project updates, sales updates, rental updates, and follow-up status."
              : "Use this section to capture business updates, notes, activity records, and follow-up details."
            }
          </p>

          <div class="ungani-button-row">
            <button class="ungani-btn" onclick="scrollToForm()">${currentEditId ? "Update Record" : "Add Record"}</button>
            <a class="ungani-btn green" href="my-people.html">Agents / Leads</a>
            <a class="ungani-btn dark" href="my-tasks.html">Tasks</a>
          </div>
        </section>

        <section class="ungani-grid">
          ${UnganiClientShared.metricCard("Total Records", records.length, "All saved business records", "blue")}
          ${UnganiClientShared.metricCard("Leads / Inquiries", summary.leads, "Lead and inquiry records", "orange")}
          ${UnganiClientShared.metricCard("Viewings", summary.viewings, "Viewing and site visit records", "green")}
          ${UnganiClientShared.metricCard("Project Updates", summary.projects, "Project/development updates", "gold")}
          ${UnganiClientShared.metricCard("Open / Pending", summary.openPending, "Needs attention or follow-up", summary.openPending > 0 ? "orange" : "green")}
          ${UnganiClientShared.metricCard("Closed", summary.closed, "Completed or closed records", "green")}
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <h3>Filters</h3>
            <button class="ungani-btn dark" onclick="resetFilters()">Reset Filters</button>
          </div>

          <div class="ungani-form-grid">
            <div>
              <label for="filterType">Record Type</label>
              <select id="filterType" onchange="saveFilters(); renderRecordsPage();">
                <option value="">All Types</option>
                <option value="lead">Lead</option>
                <option value="inquiry">Inquiry</option>
                <option value="viewing">Viewing</option>
                <option value="site visit">Site Visit</option>
                <option value="project update">Project Update</option>
                <option value="sales update">Sales Update</option>
                <option value="rental update">Rental Update</option>
                <option value="maintenance">Maintenance</option>
                <option value="follow up">Follow Up</option>
                <option value="meeting">Meeting</option>
                <option value="general">General</option>
              </select>
            </div>

            <div>
              <label for="filterStatus">Status</label>
              <select id="filterStatus" onchange="saveFilters(); renderRecordsPage();">
                <option value="">All Statuses</option>
                <option value="open">Open</option>
                <option value="pending">Pending</option>
                <option value="contacted">Contacted</option>
                <option value="viewing scheduled">Viewing Scheduled</option>
                <option value="under negotiation">Under Negotiation</option>
                <option value="completed">Completed</option>
                <option value="closed">Closed</option>
                <option value="lost">Lost</option>
              </select>
            </div>

            <div>
              <label for="filterAgent">Assigned Agent</label>
              <input id="filterAgent" placeholder="Example: Brian Otieno" oninput="saveFilters(); renderRecordsPage();" />
            </div>

            <div>
              <label for="searchBox">Search</label>
              <input id="searchBox" placeholder="Search property, project, lead, notes..." oninput="saveFilters(); renderRecordsPage();" />
            </div>
          </div>
        </section>

        <section id="recordFormCard" class="ungani-card">
          <div class="ungani-section-title">
            <h3>${currentEditId ? "Update Record" : "Add Record"}</h3>
            ${currentEditId ? '<button class="ungani-btn dark" onclick="cancelEdit()">Cancel Edit</button>' : ""}
          </div>

          ${renderRecordForm()}
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <div>
                <h3>${isRealEstate ? "Property Activity Records" : "Business Records"}</h3>
                <p class="ungani-small">${filtered.length} record(s) shown</p>
              </div>

              <button class="ungani-btn green" onclick="loadRecords()">Refresh</button>
            </div>

            ${renderRecordList(filtered)}
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Records Summary</h3>
            </div>

            ${renderSummaryPanel(filtered)}
          </div>
        </section>

        <p class="ungani-small">
          Records Version: Step 305F Shared Layout · ungani.com · info@ungani.com
        </p>
      `);

      restoreFilters();
      fillEditForm();
    }

    function renderRecordForm() {
      return `
        <form id="recordForm" onsubmit="saveRecord(event)">
          <div class="ungani-form-grid">
            <div>
              <label for="recordTitle">Record Title</label>
              <input id="recordTitle" required placeholder="Example: Clove Garden A12 viewing scheduled" />
            </div>

            <div>
              <label for="recordType">Record Type</label>
              <select id="recordType">
                <option value="lead">Lead</option>
                <option value="inquiry">Inquiry</option>
                <option value="viewing">Viewing</option>
                <option value="site visit">Site Visit</option>
                <option value="project update">Project Update</option>
                <option value="sales update">Sales Update</option>
                <option value="rental update">Rental Update</option>
                <option value="maintenance">Maintenance</option>
                <option value="follow up">Follow Up</option>
                <option value="meeting">Meeting</option>
                <option value="general">General</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div>
              <label for="status">Status</label>
              <select id="status">
                <option value="open">Open</option>
                <option value="pending">Pending</option>
                <option value="contacted">Contacted</option>
                <option value="viewing scheduled">Viewing Scheduled</option>
                <option value="under negotiation">Under Negotiation</option>
                <option value="completed">Completed</option>
                <option value="closed">Closed</option>
                <option value="lost">Lost</option>
              </select>
            </div>

            <div>
              <label for="category">Category</label>
              <input id="category" placeholder="Example: Sales / Rentals / Projects" />
            </div>

            <div>
              <label for="propertyName">Property Name</label>
              <input id="propertyName" placeholder="Example: Clove Garden A12" />
            </div>

            <div>
              <label for="projectName">Project Name</label>
              <input id="projectName" placeholder="Example: Clove Garden" />
            </div>

            <div>
              <label for="propertyOfInterest">Property of Interest</label>
              <input id="propertyOfInterest" placeholder="Example: 3-bedroom apartment" />
            </div>

            <div>
              <label for="assignedAgent">Assigned Agent</label>
              <input id="assignedAgent" placeholder="Example: Brian Otieno" />
            </div>

            <div>
              <label for="leadStatus">Lead Status</label>
              <select id="leadStatus">
                <option value="">Not a lead</option>
                <option value="new">New</option>
                <option value="contacted">Contacted</option>
                <option value="viewing scheduled">Viewing Scheduled</option>
                <option value="follow up">Follow Up</option>
                <option value="under negotiation">Under Negotiation</option>
                <option value="closed">Closed</option>
                <option value="lost">Lost</option>
              </select>
            </div>

            <div>
              <label for="dealStatus">Deal Status</label>
              <select id="dealStatus">
                <option value="">No deal status</option>
                <option value="open">Open</option>
                <option value="pending">Pending</option>
                <option value="reserved">Reserved</option>
                <option value="under negotiation">Under Negotiation</option>
                <option value="closed">Closed</option>
                <option value="sold">Sold</option>
                <option value="rented">Rented</option>
                <option value="lost">Lost</option>
              </select>
            </div>

            <div>
              <label for="viewingDate">Viewing / Site Visit Date</label>
              <input id="viewingDate" type="date" />
            </div>

            <div>
              <label for="lastFollowUpDate">Last Follow-up Date</label>
              <input id="lastFollowUpDate" type="date" />
            </div>

            <div>
              <label for="commissionAmount">Commission Amount</label>
              <input id="commissionAmount" type="number" min="0" step="1" placeholder="If applicable" />
            </div>
          </div>

          <label for="description">Description</label>
          <textarea id="description" placeholder="Add details about the lead, viewing, project update, site visit, or follow-up..."></textarea>

          <label for="notes">Internal Notes</label>
          <textarea id="notes" placeholder="Add internal notes, next steps, or important details..."></textarea>

          <div class="ungani-button-row">
            <button class="ungani-btn green" type="submit">${currentEditId ? "Update Record" : "Add Record"}</button>
            ${currentEditId ? '<button class="ungani-btn dark" type="button" onclick="cancelEdit()">Cancel</button>' : ""}
          </div>
        </form>
      `;
    }

    function renderRecordList(rows) {
      if (rows.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No records found</h3>
            <p>Add your first lead, viewing, project update, or business record above.</p>
          </div>
        `;
      }

      return rows.map(function (row) {
        return renderRecordCard(row);
      }).join("");
    }

    function renderRecordCard(row) {
      const title = UnganiClientShared.getValue(row, ["record_title", "title", "name"], "Business Record");
      const type = UnganiClientShared.getValue(row, ["record_type"], "general");
      const status = UnganiClientShared.getValue(row, ["status"], "open");
      const property = UnganiClientShared.getValue(row, ["property_name"], "");
      const project = UnganiClientShared.getValue(row, ["project_name"], "");
      const agent = UnganiClientShared.getValue(row, ["assigned_agent"], "");
      const leadStatus = UnganiClientShared.getValue(row, ["lead_status"], "");
      const dealStatus = UnganiClientShared.getValue(row, ["deal_status"], "");
      const description = UnganiClientShared.getValue(row, ["description"], "");
      const notes = UnganiClientShared.getValue(row, ["notes"], "");
      const viewingDate = UnganiClientShared.getValue(row, ["viewing_date"], "");
      const followUp = UnganiClientShared.getValue(row, ["last_follow_up_date"], "");
      const commission = Number(UnganiClientShared.getValue(row, ["commission_amount"], 0) || 0);

      return `
        <div class="ungani-card" style="box-shadow:none;">
          <div class="ungani-section-title">
            <div>
              <h3>${UnganiClientShared.safe(title)}</h3>
              <p class="ungani-small">
                ${UnganiClientShared.safe(type)}
                ${property ? " · " + UnganiClientShared.safe(property) : ""}
                ${project ? " · " + UnganiClientShared.safe(project) : ""}
              </p>
            </div>

            <div>
              ${badge(type, "blue")}
              ${badge(status, statusColor(status))}
              ${leadStatus ? badge(leadStatus, "orange") : ""}
              ${dealStatus ? badge(dealStatus, "gold") : ""}
            </div>
          </div>

          <section class="ungani-grid">
            ${miniDetail("Property", property || "N/A")}
            ${miniDetail("Project", project || "N/A")}
            ${miniDetail("Assigned Agent", agent || "N/A")}
            ${miniDetail("Viewing Date", UnganiClientShared.formatDate(viewingDate))}
            ${miniDetail("Last Follow-up", UnganiClientShared.formatDate(followUp))}
            ${miniDetail("Commission", commission > 0 ? UnganiClientShared.formatKES(commission) : "N/A")}
          </section>

          ${description ? `<p class="ungani-small" style="margin-top:12px;"><strong>Description:</strong> ${UnganiClientShared.safe(description)}</p>` : ""}
          ${notes ? `<p class="ungani-small"><strong>Notes:</strong> ${UnganiClientShared.safe(notes)}</p>` : ""}

          <div class="ungani-button-row">
            <button class="ungani-btn" onclick="editRecord('${UnganiClientShared.attr(row.id)}')">Edit</button>
            <button class="ungani-btn orange" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'pending')">Pending</button>
            <button class="ungani-btn blue" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'viewing scheduled')">Viewing Scheduled</button>
            <button class="ungani-btn green" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'completed')">Completed</button>
            <button class="ungani-btn dark" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'closed')">Closed</button>
          </div>
        </div>
      `;
    }

    function renderSummaryPanel(rows) {
      const typeSummary = {};

      rows.forEach(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["record_type"], "general")).toLowerCase();
        typeSummary[type] = (typeSummary[type] || 0) + 1;
      });

      const keys = Object.keys(typeSummary);

      if (keys.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No summary yet</h3>
            <p>Summary will appear when records are added.</p>
          </div>
        `;
      }

      return keys.map(function (key) {
        return `
          <div class="ungani-card" style="box-shadow:none;margin-bottom:10px;">
            <strong>${UnganiClientShared.safe(toTitle(key))}</strong>
            <p class="ungani-small" style="margin:5px 0 0;">${typeSummary[key]} record(s)</p>
          </div>
        `;
      }).join("");
    }

    function calculateSummary() {
      let leads = 0;
      let viewings = 0;
      let projects = 0;
      let openPending = 0;
      let closed = 0;

      records.forEach(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["record_type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "")).toLowerCase();

        if (type.includes("lead") || type.includes("inquiry")) leads++;
        if (type.includes("viewing") || type.includes("site visit")) viewings++;
        if (type.includes("project")) projects++;

        if (status.includes("open") || status.includes("pending") || status.includes("contacted") || status.includes("viewing")) openPending++;
        if (status.includes("closed") || status.includes("completed")) closed++;
      });

      return { leads, viewings, projects, openPending, closed };
    }

    function filterRecords() {
      const filterType = document.getElementById("filterType") ? UnganiClientShared.value("filterType").toLowerCase() : "";
      const filterStatus = document.getElementById("filterStatus") ? UnganiClientShared.value("filterStatus").toLowerCase() : "";
      const filterAgent = document.getElementById("filterAgent") ? UnganiClientShared.value("filterAgent").toLowerCase() : "";
      const query = document.getElementById("searchBox") ? UnganiClientShared.value("searchBox").toLowerCase() : "";

      return records.filter(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["record_type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "")).toLowerCase();
        const agent = String(UnganiClientShared.getValue(row, ["assigned_agent"], "")).toLowerCase();

        const haystack = [
          UnganiClientShared.getValue(row, ["record_title", "title", "name"], ""),
          type,
          status,
          agent,
          UnganiClientShared.getValue(row, ["property_name"], ""),
          UnganiClientShared.getValue(row, ["project_name"], ""),
          UnganiClientShared.getValue(row, ["property_of_interest"], ""),
          UnganiClientShared.getValue(row, ["lead_status"], ""),
          UnganiClientShared.getValue(row, ["deal_status"], ""),
          UnganiClientShared.getValue(row, ["description"], ""),
          UnganiClientShared.getValue(row, ["notes"], "")
        ].join(" ").toLowerCase();

        if (filterType && type !== filterType) return false;
        if (filterStatus && status !== filterStatus) return false;
        if (filterAgent && !agent.includes(filterAgent)) return false;
        if (query && !haystack.includes(query)) return false;

        return true;
      });
    }

    async function saveRecord(event) {
      event.preventDefault();

      const title = UnganiClientShared.value("recordTitle");

      if (!title) {
        alert("Please enter a record title.");
        return;
      }

      const payload = {
        record_title: title,
        title: title,
        name: title,
        record_type: UnganiClientShared.value("recordType") || "general",
        category: UnganiClientShared.value("category") || null,
        status: UnganiClientShared.value("status") || "open",
        property_name: UnganiClientShared.value("propertyName") || null,
        project_name: UnganiClientShared.value("projectName") || null,
        property_of_interest: UnganiClientShared.value("propertyOfInterest") || null,
        assigned_agent: UnganiClientShared.value("assignedAgent") || null,
        lead_status: UnganiClientShared.value("leadStatus") || null,
        deal_status: UnganiClientShared.value("dealStatus") || null,
        viewing_date: UnganiClientShared.value("viewingDate") || null,
        last_follow_up_date: UnganiClientShared.value("lastFollowUpDate") || null,
        commission_amount: numberValue("commissionAmount"),
        description: UnganiClientShared.value("description") || null,
        notes: UnganiClientShared.value("notes") || null,
        updated_at: new Date().toISOString()
      };

      let response;

      if (currentEditId) {
        response = await currentContext.supabaseClient
          .from("business_records")
          .update(payload)
          .eq("id", currentEditId)
          .eq("tenant_id", currentContext.tenantId);
      } else {
        payload.tenant_id = currentContext.tenantId;
        payload.created_by = currentContext.authUser.id;
        payload.created_at = new Date().toISOString();

        response = await currentContext.supabaseClient
          .from("business_records")
          .insert(payload);
      }

      if (response.error) {
        alert(response.error.message);
        return;
      }

      currentEditId = null;
      UnganiClientShared.showToast("Record saved ✓");
      await loadRecords();
    }

    function fillEditForm() {
      if (!currentEditId) return;

      const row = records.find(function (item) {
        return String(item.id) === String(currentEditId);
      });

      if (!row) return;

      setValue("recordTitle", UnganiClientShared.getValue(row, ["record_title", "title", "name"], ""));
      setValue("recordType", UnganiClientShared.getValue(row, ["record_type"], "general"));
      setValue("status", UnganiClientShared.getValue(row, ["status"], "open"));
      setValue("category", UnganiClientShared.getValue(row, ["category"], ""));
      setValue("propertyName", UnganiClientShared.getValue(row, ["property_name"], ""));
      setValue("projectName", UnganiClientShared.getValue(row, ["project_name"], ""));
      setValue("propertyOfInterest", UnganiClientShared.getValue(row, ["property_of_interest"], ""));
      setValue("assignedAgent", UnganiClientShared.getValue(row, ["assigned_agent"], ""));
      setValue("leadStatus", UnganiClientShared.getValue(row, ["lead_status"], ""));
      setValue("dealStatus", UnganiClientShared.getValue(row, ["deal_status"], ""));
      setValue("viewingDate", String(UnganiClientShared.getValue(row, ["viewing_date"], "")).slice(0, 10));
      setValue("lastFollowUpDate", String(UnganiClientShared.getValue(row, ["last_follow_up_date"], "")).slice(0, 10));
      setValue("commissionAmount", UnganiClientShared.getValue(row, ["commission_amount"], 0));
      setValue("description", UnganiClientShared.getValue(row, ["description"], ""));
      setValue("notes", UnganiClientShared.getValue(row, ["notes"], ""));
    }

    function editRecord(id) {
      currentEditId = id;
      renderRecordsPage();
      scrollToForm();
    }

    function cancelEdit() {
      currentEditId = null;
      renderRecordsPage();
      UnganiClientShared.showToast("Edit cancelled");
    }

    async function quickStatus(id, status) {
      const response = await currentContext.supabaseClient
        .from("business_records")
        .update({
          status: status,
          updated_at: new Date().toISOString()
        })
        .eq("id", id)
        .eq("tenant_id", currentContext.tenantId);

      if (response.error) {
        alert(response.error.message);
        return;
      }

      UnganiClientShared.showToast("Status updated ✓");
      await loadRecords();
    }

    function restoreFilters() {
      if (document.getElementById("filterType")) document.getElementById("filterType").value = sessionStorage.getItem("ungani_records_filter_type") || "";
      if (document.getElementById("filterStatus")) document.getElementById("filterStatus").value = sessionStorage.getItem("ungani_records_filter_status") || "";
      if (document.getElementById("filterAgent")) document.getElementById("filterAgent").value = sessionStorage.getItem("ungani_records_filter_agent") || "";
      if (document.getElementById("searchBox")) document.getElementById("searchBox").value = sessionStorage.getItem("ungani_records_search") || "";
    }

    function saveFilters() {
      if (document.getElementById("filterType")) sessionStorage.setItem("ungani_records_filter_type", UnganiClientShared.value("filterType"));
      if (document.getElementById("filterStatus")) sessionStorage.setItem("ungani_records_filter_status", UnganiClientShared.value("filterStatus"));
      if (document.getElementById("filterAgent")) sessionStorage.setItem("ungani_records_filter_agent", UnganiClientShared.value("filterAgent"));
      if (document.getElementById("searchBox")) sessionStorage.setItem("ungani_records_search", UnganiClientShared.value("searchBox"));
    }

    function resetFilters() {
      sessionStorage.removeItem("ungani_records_filter_type");
      sessionStorage.removeItem("ungani_records_filter_status");
      sessionStorage.removeItem("ungani_records_filter_agent");
      sessionStorage.removeItem("ungani_records_search");
      renderRecordsPage();
      UnganiClientShared.showToast("Filters reset ✓");
    }

    function badge(text, color) {
      return `<span class="ungani-badge ${UnganiClientShared.attr(color || "blue")}">${UnganiClientShared.safe(text)}</span>`;
    }

    function statusColor(status) {
      const lower = String(status || "").toLowerCase();

      if (lower.includes("closed") || lower.includes("completed") || lower.includes("sold") || lower.includes("rented")) return "green";
      if (lower.includes("pending") || lower.includes("contacted") || lower.includes("viewing") || lower.includes("negotiation")) return "orange";
      if (lower.includes("lost") || lower.includes("cancelled")) return "red";

      return "blue";
    }

    function miniDetail(label, value) {
      return `
        <div class="ungani-card" style="margin-bottom:0;box-shadow:none;padding:14px;">
          <p class="ungani-small" style="margin:0 0 5px;">${UnganiClientShared.safe(label)}</p>
          <strong>${UnganiClientShared.safe(value)}</strong>
        </div>
      `;
    }

    function toTitle(value) {
      return String(value || "")
        .replace(/_/g, " ")
        .replace(/\w\S*/g, function (text) {
          return text.charAt(0).toUpperCase() + text.substr(1).toLowerCase();
        });
    }

    function setValue(id, value) {
      const element = document.getElementById(id);

      if (element) {
        element.value = value === null || value === undefined ? "" : value;
      }
    }

    function numberValue(id) {
      const value = Number(UnganiClientShared.value(id) || 0);
      return isNaN(value) ? 0 : value;
    }

    function scrollToForm() {
      setTimeout(function () {
        const card = document.getElementById("recordFormCard");

        if (card) {
          card.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      }, 100);
    }
  </script>
</body>
</html>
