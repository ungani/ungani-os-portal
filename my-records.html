<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Business Records</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-shared.js" onerror="window.__unganiClientSharedFailed = true;"></script>
  <script>
    (function () {
      function showUnganiLoadError() {
        if (typeof UnganiClientShared !== "undefined") return;

        var banner = document.createElement("div");
        banner.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99999;background:#B91C1C;color:#fff;padding:12px 16px;font:14px/1.4 -apple-system,sans-serif;text-align:center;";
        banner.innerHTML = "Some page resources failed to load. Please check your connection. " +
          "<button style=\"margin-left:10px;padding:4px 12px;border:none;border-radius:6px;background:#fff;color:#B91C1C;font-weight:700;cursor:pointer;\" onclick=\"window.location.reload()\">Reload</button>";

        if (document.body) {
          document.body.prepend(banner);
        } else {
          document.addEventListener("DOMContentLoaded", function () {
            document.body.prepend(banner);
          });
        }
      }

      if (window.__unganiClientSharedFailed) {
        showUnganiLoadError();
      } else {
        setTimeout(function () {
          if (typeof UnganiClientShared === "undefined") showUnganiLoadError();
        }, 4000);
      }
    })();
  </script>
  <script src="ungani-analytics.js"></script>
  <script src="ungani-presets.js"></script>
</head>

<body>
  <script>
    let currentContext = null;
    let businessPreset = null;
    let recordRows = [];
    let editingRecordId = null;

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "records",
        pageTitle: "Business Records",
        pageSubtitle: "Track updates, notes, issues, client activity, and operational records.",
        onReady: startRecordsPage
      });
    });

    async function startRecordsPage(context) {
      currentContext = context;

      if (window.UnganiAnalytics) {
        UnganiAnalytics.injectChartStyles();
      }

      businessPreset = UnganiPresets.getPreset(context.tenant);

      const titleEl = document.querySelector(".ungani-topbar h2");
      const subEl = document.querySelector(".ungani-topbar p");

      if (titleEl) {
        titleEl.innerText = businessPreset.recordsLabel;
      }

      if (subEl) {
        subEl.innerText = "Operational notes, updates, issues, and activity records for " + businessPreset.name + ".";
      }

      await loadRecordRows();
    }

    async function loadRecordRows() {
      currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading business records...");

      let response;

      try {
        response = await currentContext.supabaseClient
          .from("business_records")
          .select("*")
          .eq("tenant_id", currentContext.tenantId)
          .order("created_at", { ascending: false });
      } catch (error) {
        UnganiClientShared.setContent(
          UnganiClientShared.errorCard("Could not load business records", error.message || "Network error. Please check your connection.")
        );
        return;
      }

      if (response.error) {
        UnganiClientShared.setContent(
          UnganiClientShared.errorCard("Could not load business records", response.error.message)
        );
        return;
      }

      recordRows = response.data || [];
      renderRecordsPage();
    }

    function renderRecordsPage() {
      const filteredRows = getFilteredRows();
      const summary = calculateRecordSummary(filteredRows);
      const typeRows = buildTypeRows(filteredRows);
      const statusRows = buildStatusRows(filteredRows);
      const priorityRows = buildPriorityRows(filteredRows);

      UnganiClientShared.setContent(`
        <style>
          .records-hero-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
            gap: 18px;
            align-items: stretch;
          }

          .records-preset-box {
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.09);
            border-radius: 24px;
            padding: 18px;
          }

          .records-preset-box h3 {
            color: white;
            margin: 0 0 8px;
          }

          .records-preset-box p {
            color: rgba(255,255,255,0.74);
            margin: 0;
            line-height: 1.55;
          }

          .record-chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
          }

          .record-chip {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 8px 11px;
            background: rgba(255,255,255,0.12);
            color: white;
            font-size: 12px;
            font-weight: 850;
          }

          .record-kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 18px;
          }

          .record-kpi-card {
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            background: var(--ungani-card);
            border: 1px solid var(--ungani-border);
            box-shadow: var(--ungani-shadow);
            padding: 20px;
            min-height: 140px;
          }

          .record-kpi-card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 18px;
            bottom: 18px;
            width: 5px;
            border-radius: 0 999px 999px 0;
            background: var(--accent);
          }

          .record-kpi-card span {
            color: var(--ungani-muted);
            font-size: 12px;
            font-weight: 950;
            text-transform: uppercase;
            letter-spacing: 0.055em;
          }

          .record-kpi-card h3 {
            margin: 17px 0 8px;
            font-size: clamp(25px, 3vw, 36px);
            line-height: 1;
            letter-spacing: -0.055em;
          }

          .record-kpi-card p {
            margin: 0;
            color: var(--ungani-muted);
            font-size: 13px;
          }

          .record-form-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
          }

          .record-form-grid .wide {
            grid-column: span 3;
          }

          .record-main-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(320px, 0.52fr);
            gap: 18px;
            align-items: start;
          }

          .record-chart-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
            margin-bottom: 18px;
            align-items: start;
          }

          .record-type-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
          }

          .type-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
          }

          .type-pill {
            border: 1px solid var(--ungani-border);
            background: var(--ungani-soft);
            color: var(--ungani-text);
            border-radius: 999px;
            padding: 8px 11px;
            font-size: 12px;
            font-weight: 850;
            cursor: pointer;
          }

          .type-pill:hover {
            border-color: rgba(212,166,58,0.65);
          }

          .record-list {
            display: grid;
            gap: 12px;
          }

          .record-card {
            border: 1px solid var(--ungani-border);
            border-radius: 22px;
            padding: 16px;
            background: var(--ungani-card);
            box-shadow: var(--ungani-shadow);
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 14px;
            align-items: start;
          }

          .record-card:hover {
            border-color: rgba(212,166,58,0.55);
          }

          .record-title-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
          }

          .record-title-row h3 {
            margin: 0;
            font-size: 18px;
          }

          .record-meta-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
          }

          .record-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
          }

          @media (max-width: 1180px) {
            .records-hero-grid,
            .record-main-grid,
            .record-chart-grid {
              grid-template-columns: 1fr;
            }

            .record-kpi-grid {
              grid-template-columns: repeat(2, minmax(0, 1fr));
            }
          }

          @media (max-width: 720px) {
            .record-kpi-grid,
            .record-form-grid,
            .record-card {
              grid-template-columns: 1fr;
            }

            .record-form-grid .wide {
              grid-column: span 1;
            }

            .record-actions {
              justify-content: flex-start;
            }
          }
        </style>

        <section class="ungani-card ungani-hero">
          <div class="records-hero-grid">
            <div>
              <span class="ungani-badge gold">${UnganiClientShared.safe(businessPreset.name)}</span>
              <h2 style="font-size:clamp(32px,4vw,52px);line-height:1.02;margin:18px 0 12px;">
                Records that match your business operations.
              </h2>
              <p>
                Keep clear activity notes, updates, issue logs, client records, job records, and operational updates using presets for ${UnganiClientShared.safe(businessPreset.name)}.
              </p>

              <div class="ungani-button-row">
                <button class="ungani-btn gold" onclick="scrollToRecordForm()">Add Record</button>
                <button class="ungani-btn green" onclick="loadRecordRows()">Refresh</button>
                <a class="ungani-btn light" href="my-charts.html">View Charts</a>
              </div>
            </div>

            <div class="records-preset-box">
              <h3>Business record preset active</h3>
              <p>The record types on this page now adapt to the business type selected by the client.</p>

              <div class="record-chip-row">
                ${businessPreset.recordTypes.slice(0, 6).map(function (item) {
                  return `<span class="record-chip">${UnganiClientShared.safe(item)}</span>`;
                }).join("")}
              </div>
            </div>
          </div>
        </section>

        <section class="record-kpi-grid">
          ${recordKpi("Total Records", summary.total, "All records in view", "#2563EB")}
          ${recordKpi("Open", summary.open, "Active/open records", "#D4A63A")}
          ${recordKpi("Completed", summary.completed, "Closed or completed", "#16A34A")}
          ${recordKpi("Attention", summary.attention, "Urgent/high/lost/cancelled", summary.attention > 0 ? "#DC2626" : "#16A34A")}
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>Filters</h3>
              <p class="ungani-small">Search and filter this business records view.</p>
            </div>

            <button class="ungani-btn dark" onclick="resetRecordFilters()">Reset Filters</button>
          </div>

          <div class="record-form-grid">
            <div>
              <label for="filterStatus">Status</label>
              <select id="filterStatus" onchange="saveRecordFilters(); renderRecordsPage();">
                <option value="">All Status</option>
                <option value="open">Open</option>
                <option value="in progress">In Progress</option>
                <option value="completed">Completed</option>
                <option value="closed">Closed</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>

            <div>
              <label for="filterPriority">Priority</label>
              <select id="filterPriority" onchange="saveRecordFilters(); renderRecordsPage();">
                <option value="">All Priority</option>
                <option value="low">Low</option>
                <option value="normal">Normal</option>
                <option value="high">High</option>
                <option value="urgent">Urgent</option>
              </select>
            </div>

            <div>
              <label for="filterSearch">Search</label>
              <input id="filterSearch" placeholder="Search title, type, person, item, notes..." oninput="saveRecordFilters(); renderRecordsPage();" />
            </div>
          </div>
        </section>

        <section class="record-chart-grid">
          <div class="ungani-card ungani-chart-card">
            <div class="ungani-chart-head">
              <div>
                <h3>Record Types</h3>
                <p class="ungani-small">Animated chart showing the kinds of records being added.</p>
              </div>
            </div>

            ${hasValues(typeRows) ? '<div class="ungani-chart-canvas-wrap"><canvas id="recordTypeChart"></canvas></div>' : UnganiAnalytics.emptyChart("Add records to show record type breakdown.")}
          </div>

          <div class="ungani-card ungani-chart-card">
            <div class="ungani-chart-head">
              <div>
                <h3>Record Status</h3>
                <p class="ungani-small">Open, in progress, completed, closed, and attention-needed records.</p>
              </div>
            </div>

            ${hasValues(statusRows) ? '<div class="ungani-chart-canvas-wrap"><canvas id="recordStatusChart"></canvas></div>' : UnganiAnalytics.emptyChart("Add records to show status breakdown.")}
          </div>
        </section>

        <section class="record-type-section">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <div>
                <h3>Record Types</h3>
                <p class="ungani-small">Quick-fill record types for ${UnganiClientShared.safe(businessPreset.name)}.</p>
              </div>
            </div>

            <div class="type-list">
              ${businessPreset.recordTypes.map(function (item) {
                return `<button class="type-pill" onclick="quickRecordType('${UnganiClientShared.attr(item)}')">${UnganiClientShared.safe(item)}</button>`;
              }).join("")}
            </div>
          </div>
        </section>

        <section class="record-main-grid">
          <div class="ungani-card" id="recordFormCard">
            <div class="ungani-section-title">
              <div>
                <h3 id="recordFormTitle">${editingRecordId ? "Edit Record" : "Add Record"}</h3>
                <p class="ungani-small">Use business-specific record types so reports and charts make sense.</p>
              </div>

              <button class="ungani-btn dark" onclick="clearRecordForm()">Clear</button>
            </div>

            <form onsubmit="saveRecord(event)">
              <div class="record-form-grid">
                <div class="wide">
                  <label for="recordTitle">Record Title</label>
                  <input id="recordTitle" placeholder="Example: Client update, trip update, viewing note, job update..." required />
                </div>

                <div>
                  <label for="recordType">Record Type</label>
                  <select id="recordType">
                    ${businessPreset.recordTypes.map(function (item) {
                      return `<option value="${UnganiClientShared.attr(item)}">${UnganiClientShared.safe(item)}</option>`;
                    }).join("")}
                  </select>
                </div>

                <div>
                  <label for="recordDate">Record Date</label>
                  <input id="recordDate" type="date" />
                </div>

                <div>
                  <label for="recordStatus">Status</label>
                  <select id="recordStatus">
                    <option value="open">Open</option>
                    <option value="in progress">In Progress</option>
                    <option value="completed">Completed</option>
                    <option value="closed">Closed</option>
                    <option value="cancelled">Cancelled</option>
                  </select>
                </div>

                <div>
                  <label for="recordPriority">Priority</label>
                  <select id="recordPriority">
                    <option value="low">Low</option>
                    <option value="normal" selected>Normal</option>
                    <option value="high">High</option>
                    <option value="urgent">Urgent</option>
                  </select>
                </div>

                <div>
                  <label for="recordRelatedPerson">Related Person</label>
                  <input id="recordRelatedPerson" placeholder="Client, supplier, driver, agent, customer..." />
                </div>

                <div>
                  <label for="recordRelatedItem">Related Item / Work</label>
                  <input id="recordRelatedItem" placeholder="${UnganiClientShared.attr(businessPreset.itemsLabel)}" />
                </div>

                <div class="wide">
                  <label for="recordNotes">Notes</label>
                  <textarea id="recordNotes" rows="5" placeholder="Write the full update, observation, issue, progress note, or client feedback..."></textarea>
                </div>
              </div>

              <div class="ungani-button-row" style="margin-top:16px;">
                <button class="ungani-btn gold" type="submit">${editingRecordId ? "Update Record" : "Save Record"}</button>
                <button class="ungani-btn dark" type="button" onclick="clearRecordForm()">Cancel</button>
              </div>
            </form>
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <div>
                <h3>Record Guide</h3>
                <p class="ungani-small">How to keep updates useful.</p>
              </div>
            </div>

            <div class="ungani-empty" style="text-align:left;">
              <h3>Record the important details</h3>
              <p>Use records for updates that should not be lost in WhatsApp, calls, or memory.</p>
            </div>

            <div style="display:grid;gap:10px;margin-top:12px;">
              <div class="ungani-card" style="box-shadow:none;">
                <strong>Example record</strong>
                <p class="ungani-small">${UnganiClientShared.safe(businessPreset.recordTypes[0] || "Daily Update")}</p>
              </div>

              <div class="ungani-card" style="box-shadow:none;">
                <strong>Best use</strong>
                <p class="ungani-small">Add notes after calls, visits, deliveries, jobs, service work, or client follow-ups.</p>
              </div>

              <div class="ungani-card" style="box-shadow:none;">
                <strong>Reports</strong>
                <p class="ungani-small">Important updates can appear in reports and activity summaries.</p>
              </div>
            </div>
          </div>
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>Record List</h3>
              <p class="ungani-small">${filteredRows.length} record(s) shown.</p>
            </div>

            <button class="ungani-btn green" onclick="loadRecordRows()">Refresh</button>
          </div>

          ${renderRecordList(filteredRows)}
        </section>

        <p class="ungani-small">
          Records Version: Step 310B-3 Business-Type Record Presets · ungani.com · info@ungani.com
        </p>
      `);

      restoreRecordFilters();

      setTimeout(function () {
        renderRecordCharts(typeRows, statusRows, priorityRows);
      }, 150);
    }

    async function renderRecordCharts(typeRows, statusRows, priorityRows) {
      try {
        if (hasValues(typeRows)) {
          await UnganiAnalytics.renderHorizontalBarChart("recordTypeChart", typeRows, "Records");
        }

        if (hasValues(statusRows)) {
          await UnganiAnalytics.renderDoughnutStatusChart("recordStatusChart", statusRows);
        }
      } catch (error) {
        console.warn("Record charts warning:", error.message);
      }
    }

    function renderRecordList(rows) {
      if (!rows || rows.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No business records yet</h3>
            <p>Add your first business update, issue log, client note, or operational record.</p>
          </div>
        `;
      }

      return `
        <div class="record-list">
          ${rows.map(function (row) {
            const title = getRecordTitle(row);
            const type = UnganiClientShared.getValue(row, ["record_type", "type"], "General Record");
            const status = UnganiClientShared.getValue(row, ["status"], "open");
            const priority = UnganiClientShared.getValue(row, ["priority"], "normal");
            const date = UnganiClientShared.getValue(row, ["record_date", "created_at"], "");
            const relatedPerson = UnganiClientShared.getValue(row, ["related_person"], "");
            const relatedItem = UnganiClientShared.getValue(row, ["related_item"], "");
            const notes = UnganiClientShared.getValue(row, ["notes", "description"], "");

            return `
              <div class="record-card">
                <div>
                  <div class="record-title-row">
                    ${statusBadge(status)}
                    ${priorityBadge(priority)}
                    <h3>${UnganiClientShared.safe(title)}</h3>
                  </div>

                  <p class="ungani-small" style="margin:0;">
                    ${UnganiClientShared.safe(notes || "No notes added.")}
                  </p>

                  <div class="record-meta-grid">
                    <span class="ungani-badge gold">${UnganiClientShared.safe(type)}</span>
                    <span class="ungani-badge blue">Date: ${UnganiClientShared.safe(date ? UnganiClientShared.formatDate(date) : "No date")}</span>
                    ${relatedPerson ? `<span class="ungani-badge green">Person: ${UnganiClientShared.safe(relatedPerson)}</span>` : ""}
                    ${relatedItem ? `<span class="ungani-badge blue">Related: ${UnganiClientShared.safe(relatedItem)}</span>` : ""}
                  </div>
                </div>

                <div class="record-actions">
                  ${status.toLowerCase() !== "completed" && status.toLowerCase() !== "closed" ? `<button class="ungani-btn small green" onclick="markRecordCompleted('${UnganiClientShared.attr(row.id)}')">Complete</button>` : ""}
                  <button class="ungani-btn small gold" onclick="editRecord('${UnganiClientShared.attr(row.id)}')">Edit</button>
                  <button class="ungani-btn small red" onclick="deleteRecord('${UnganiClientShared.attr(row.id)}')">Delete</button>
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function recordKpi(title, value, subtitle, accent) {
      return `
        <div class="record-kpi-card" style="--accent:${UnganiClientShared.attr(accent)};">
          <span>${UnganiClientShared.safe(title)}</span>
          <h3>${UnganiClientShared.safe(value)}</h3>
          <p>${UnganiClientShared.safe(subtitle)}</p>
        </div>
      `;
    }

    function calculateRecordSummary(rows) {
      let open = 0;
      let completed = 0;
      let attention = 0;

      rows.forEach(function (row) {
        const status = String(UnganiClientShared.getValue(row, ["status"], "open")).toLowerCase();
        const priority = String(UnganiClientShared.getValue(row, ["priority"], "normal")).toLowerCase();

        if (status.includes("completed") || status.includes("closed") || status.includes("resolved")) {
          completed++;
        } else if (!status.includes("cancelled")) {
          open++;
        }

        if (
          priority.includes("urgent") ||
          priority.includes("high") ||
          status.includes("lost") ||
          status.includes("cancelled") ||
          status.includes("failed")
        ) {
          attention++;
        }
      });

      return {
        total: rows.length,
        open,
        completed,
        attention
      };
    }

    function buildTypeRows(rows) {
      const map = {};

      rows.forEach(function (row) {
        const type = UnganiClientShared.getValue(row, ["record_type", "type"], "General Record");
        map[type] = (map[type] || 0) + 1;
      });

      return UnganiAnalytics.mapToRows(map);
    }

    function buildStatusRows(rows) {
      const map = {};

      rows.forEach(function (row) {
        const status = UnganiClientShared.getValue(row, ["status"], "open");
        map[status] = (map[status] || 0) + 1;
      });

      return UnganiAnalytics.mapToRows(map);
    }

    function buildPriorityRows(rows) {
      const map = {};

      rows.forEach(function (row) {
        const priority = UnganiClientShared.getValue(row, ["priority"], "normal");
        map[priority] = (map[priority] || 0) + 1;
      });

      return UnganiAnalytics.mapToRows(map);
    }

    function getFilteredRows() {
      const filterStatus = getStoredOrInput("filterStatus", "ungani_record_filter_status").toLowerCase();
      const filterPriority = getStoredOrInput("filterPriority", "ungani_record_filter_priority").toLowerCase();
      const search = getStoredOrInput("filterSearch", "ungani_record_filter_search").toLowerCase();

      return recordRows.filter(function (row) {
        const status = String(UnganiClientShared.getValue(row, ["status"], "open")).toLowerCase();
        const priority = String(UnganiClientShared.getValue(row, ["priority"], "normal")).toLowerCase();
        const haystack = JSON.stringify(row || {}).toLowerCase();

        if (filterStatus && !status.includes(filterStatus)) return false;
        if (filterPriority && !priority.includes(filterPriority)) return false;
        if (search && !haystack.includes(search)) return false;

        return true;
      });
    }

    function getStoredOrInput(inputId, storageKey) {
      const el = document.getElementById(inputId);

      if (el) {
        return String(el.value || "").trim();
      }

      return String(sessionStorage.getItem(storageKey) || "").trim();
    }

    function saveRecordFilters() {
      if (document.getElementById("filterStatus")) sessionStorage.setItem("ungani_record_filter_status", UnganiClientShared.value("filterStatus"));
      if (document.getElementById("filterPriority")) sessionStorage.setItem("ungani_record_filter_priority", UnganiClientShared.value("filterPriority"));
      if (document.getElementById("filterSearch")) sessionStorage.setItem("ungani_record_filter_search", UnganiClientShared.value("filterSearch"));
    }

    function restoreRecordFilters() {
      if (document.getElementById("filterStatus")) document.getElementById("filterStatus").value = sessionStorage.getItem("ungani_record_filter_status") || "";
      if (document.getElementById("filterPriority")) document.getElementById("filterPriority").value = sessionStorage.getItem("ungani_record_filter_priority") || "";
      if (document.getElementById("filterSearch")) document.getElementById("filterSearch").value = sessionStorage.getItem("ungani_record_filter_search") || "";
    }

    function resetRecordFilters() {
      sessionStorage.removeItem("ungani_record_filter_status");
      sessionStorage.removeItem("ungani_record_filter_priority");
      sessionStorage.removeItem("ungani_record_filter_search");
      renderRecordsPage();
      UnganiClientShared.showToast("Record filters reset ✓");
    }

    function quickRecordType(recordType) {
      scrollToRecordForm();

      setTimeout(function () {
        const el = document.getElementById("recordType");
        if (el) el.value = recordType;
      }, 150);

      UnganiClientShared.showToast("Record type selected ✓");
    }

    function scrollToRecordForm() {
      const el = document.getElementById("recordFormCard");

      if (el) {
        el.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    async function saveRecord(event) {
      event.preventDefault();

      const title = UnganiClientShared.value("recordTitle");

      if (!title) {
        UnganiClientShared.showToast("Enter a record title.");
        return;
      }

      const payload = {
        tenant_id: currentContext.tenantId,
        record_title: title,
        record_type: UnganiClientShared.value("recordType") || "General Record",
        record_date: UnganiClientShared.value("recordDate") || new Date().toISOString().slice(0, 10),
        status: UnganiClientShared.value("recordStatus") || "open",
        priority: UnganiClientShared.value("recordPriority") || "normal",
        related_person: UnganiClientShared.value("recordRelatedPerson") || null,
        related_item: UnganiClientShared.value("recordRelatedItem") || null,
        notes: UnganiClientShared.value("recordNotes") || null
      };

      let response;

      try {
        if (editingRecordId) {
          response = await currentContext.supabaseClient
            .from("business_records")
            .update(payload)
            .eq("id", editingRecordId)
            .eq("tenant_id", currentContext.tenantId);
        } else {
          response = await currentContext.supabaseClient
            .from("business_records")
            .insert([payload]);
        }
      } catch (error) {
        UnganiClientShared.showToast("Could not save record: " + (error.message || "Network error. Please check your connection."));
        return;
      }

      if (response.error) {
        UnganiClientShared.showToast("Could not save record: " + response.error.message);
        return;
      }

      UnganiClientShared.showToast(editingRecordId ? "Record updated ✓" : "Record added ✓");
      clearRecordForm();
      await loadRecordRows();
    }

    function editRecord(id) {
      const row = recordRows.find(function (item) {
        return String(item.id) === String(id);
      });

      if (!row) {
        UnganiClientShared.showToast("Record not found.");
        return;
      }

      editingRecordId = row.id;

      scrollToRecordForm();

      setTimeout(function () {
        document.getElementById("recordFormTitle").innerText = "Edit Record";
        document.getElementById("recordTitle").value = getRecordTitle(row);
        document.getElementById("recordType").value = UnganiClientShared.getValue(row, ["record_type", "type"], "");
        document.getElementById("recordDate").value = String(UnganiClientShared.getValue(row, ["record_date", "created_at"], "")).slice(0, 10);
        document.getElementById("recordStatus").value = UnganiClientShared.getValue(row, ["status"], "open");
        document.getElementById("recordPriority").value = UnganiClientShared.getValue(row, ["priority"], "normal");
        document.getElementById("recordRelatedPerson").value = UnganiClientShared.getValue(row, ["related_person"], "");
        document.getElementById("recordRelatedItem").value = UnganiClientShared.getValue(row, ["related_item"], "");
        document.getElementById("recordNotes").value = UnganiClientShared.getValue(row, ["notes", "description"], "");
      }, 150);
    }

    async function markRecordCompleted(id) {
      let response;

      try {
        response = await currentContext.supabaseClient
          .from("business_records")
          .update({ status: "completed" })
          .eq("id", id)
          .eq("tenant_id", currentContext.tenantId);
      } catch (error) {
        UnganiClientShared.showToast("Could not update record: " + (error.message || "Network error. Please check your connection."));
        return;
      }

      if (response.error) {
        UnganiClientShared.showToast("Could not update record: " + response.error.message);
        return;
      }

      UnganiClientShared.showToast("Record marked completed ✓");
      await loadRecordRows();
    }

    async function deleteRecord(id) {
      const confirmed = confirm("Move this business record to Recently Deleted? You can restore it within 30 days.");

      if (!confirmed) return;

      let response;

      try {
        response = await currentContext.supabaseClient.rpc("soft_delete_ungani_record", {
          p_table_name: "business_records",
          p_record_id: id,
          p_delete_reason: "Deleted from Business Records page"
        });
      } catch (error) {
        UnganiClientShared.showToast("Could not delete record: " + (error.message || "Network error. Please check your connection."));
        return;
      }

      if (response.error) {
        UnganiClientShared.showToast("Could not delete record: " + response.error.message);
        return;
      }

      if (response.data && response.data.ok === false) {
        UnganiClientShared.showToast(response.data.message || "Could not delete record.");
        return;
      }

      UnganiClientShared.showToast("Record moved to Recently Deleted ✓");
      await loadRecordRows();
    }

    function clearRecordForm() {
      editingRecordId = null;

      const title = document.getElementById("recordFormTitle");
      if (title) title.innerText = "Add Record";

      if (document.getElementById("recordTitle")) document.getElementById("recordTitle").value = "";
      if (document.getElementById("recordType")) document.getElementById("recordType").value = businessPreset.recordTypes[0] || "General Record";
      if (document.getElementById("recordDate")) document.getElementById("recordDate").value = "";
      if (document.getElementById("recordStatus")) document.getElementById("recordStatus").value = "open";
      if (document.getElementById("recordPriority")) document.getElementById("recordPriority").value = "normal";
      if (document.getElementById("recordRelatedPerson")) document.getElementById("recordRelatedPerson").value = "";
      if (document.getElementById("recordRelatedItem")) document.getElementById("recordRelatedItem").value = "";
      if (document.getElementById("recordNotes")) document.getElementById("recordNotes").value = "";
    }

    function getRecordTitle(row) {
      return UnganiClientShared.getValue(row, ["record_title", "title", "name"], "Business Record");
    }

    function statusBadge(status) {
      const lower = String(status || "").toLowerCase();

      if (lower.includes("completed") || lower.includes("closed") || lower.includes("resolved")) {
        return `<span class="ungani-badge green">${UnganiClientShared.safe(UnganiAnalytics.toTitle(status))}</span>`;
      }

      if (lower.includes("cancelled") || lower.includes("lost") || lower.includes("failed")) {
        return `<span class="ungani-badge red">${UnganiClientShared.safe(UnganiAnalytics.toTitle(status))}</span>`;
      }

      if (lower.includes("progress")) {
        return `<span class="ungani-badge blue">In Progress</span>`;
      }

      return `<span class="ungani-badge gold">${UnganiClientShared.safe(UnganiAnalytics.toTitle(status || "open"))}</span>`;
    }

    function priorityBadge(priority) {
      const lower = String(priority || "normal").toLowerCase();

      if (lower.includes("urgent") || lower.includes("high")) {
        return `<span class="ungani-badge red">${UnganiClientShared.safe(UnganiAnalytics.toTitle(priority))}</span>`;
      }

      if (lower.includes("low")) {
        return `<span class="ungani-badge blue">Low</span>`;
      }

      return `<span class="ungani-badge gold">Normal</span>`;
    }

    function hasValues(rows) {
      return (rows || []).some(function (row) {
        return Number(row.value || 0) > 0;
      });
    }
  </script>
</body>
</html>
