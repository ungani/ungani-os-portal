<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Print Report</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-shared.js"></script>

  <style>
    @media print {
      .ungani-sidebar,
      .ungani-topbar .ungani-button-row,
      .no-print,
      #unganiToast {
        display: none !important;
      }

      .ungani-layout {
        display: block !important;
      }

      .ungani-main {
        max-width: none !important;
        padding: 0 !important;
      }

      .ungani-card,
      .ungani-metric {
        box-shadow: none !important;
        page-break-inside: avoid;
      }

      body {
        background: #ffffff !important;
        color: #111827 !important;
      }

      .ungani-card {
        border: 1px solid #E5E7EB !important;
      }

      .ungani-hero {
        background: #061C3D !important;
        color: #ffffff !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      a {
        color: #061C3D !important;
        text-decoration: none !important;
      }
    }
  </style>
</head>

<body>
  <script>
    let currentContext = null;
    let isRealEstate = false;

    let reportData = {
      transactions: [],
      items: [],
      tasks: [],
      records: [],
      documents: [],
      people: [],
      events: [],
      support: []
    };

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "print-report",
        pageTitle: "Print Report",
        pageSubtitle: "Generate a clean printable business operations report.",
        onReady: startPrintReport
      });
    });

    async function startPrintReport(context) {
      currentContext = context;

      const businessType = String(UnganiClientShared.getValue(context.tenant, ["business_type", "business_type_key"], "")).toLowerCase();
      const businessTypeKey = String(UnganiClientShared.getValue(context.tenant, ["business_type_key"], "")).toLowerCase();

      isRealEstate = businessType.includes("real estate") || businessTypeKey.includes("real_estate");

      const titleEl = document.querySelector(".ungani-topbar h2");
      const subEl = document.querySelector(".ungani-topbar p");

      if (titleEl) {
        titleEl.innerText = isRealEstate ? "Printable Property Report" : "Printable Business Report";
      }

      if (subEl) {
        subEl.innerText = isRealEstate
          ? "Print or save a property operations report for properties, money records, leads, agents, tasks, documents, and calendar activities."
          : "Print or save a business operations report for records, money, tasks, documents, items, people, and calendar activities.";
      }

      await loadReportData();
    }

    async function loadReportData() {
      currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Preparing printable report...");

      const responses = await Promise.all([
        safeSelect("transactions"),
        safeSelect("business_items"),
        safeSelect("tasks"),
        safeSelect("business_records"),
        safeSelect("documents"),
        safeSelect("client_people"),
        safeSelect("business_events"),
        safeSelect("support_issues")
      ]);

      reportData.transactions = responses[0];
      reportData.items = responses[1];
      reportData.tasks = responses[2];
      reportData.records = responses[3];
      reportData.documents = responses[4];
      reportData.people = responses[5];
      reportData.events = responses[6];
      reportData.support = responses[7];

      renderPrintReport();
    }

    async function safeSelect(tableName) {
      try {
        const response = await currentContext.supabaseClient
          .from(tableName)
          .select("*")
          .eq("tenant_id", currentContext.tenantId);

        if (response.error) {
          console.warn(tableName, response.error.message);
          return [];
        }

        return response.data || [];
      } catch (error) {
        console.warn(tableName, error.message);
        return [];
      }
    }

    function renderPrintReport() {
      const filtered = getFilteredData();

      const tenantName = UnganiClientShared.getTenantName(currentContext.tenant);
      const businessType = UnganiClientShared.getValue(currentContext.tenant, ["business_type", "business_type_key"], "Business");
      const generatedDate = new Date().toLocaleString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });

      const money = calculateMoney(filtered.transactions);
      const items = calculateItems(filtered.items);
      const people = calculatePeople(filtered.people);
      const tasks = calculateTasks(filtered.tasks);
      const records = calculateRecords(filtered.records);
      const documents = calculateDocuments(filtered.documents);
      const events = calculateEvents(filtered.events);
      const support = calculateSupport(filtered.support);

      UnganiClientShared.setContent(`
        <section class="ungani-card ungani-hero">
          <h2>${isRealEstate ? "Property Operations Report" : "Business Operations Report"}</h2>
          <p>
            ${UnganiClientShared.safe(tenantName)} · ${UnganiClientShared.safe(businessType)} · Generated on ${UnganiClientShared.safe(generatedDate)}
          </p>

          <div class="ungani-button-row no-print">
            <button class="ungani-btn" onclick="window.print()">Print / Save PDF</button>
            <a class="ungani-btn green" href="reports.html">Back to Reports</a>
            <button class="ungani-btn dark" onclick="loadReportData()">Refresh</button>
          </div>
        </section>

        <section class="ungani-card no-print">
          <div class="ungani-section-title">
            <h3>Report Filters</h3>
            <button class="ungani-btn dark" onclick="resetFilters()">Reset Filters</button>
          </div>

          <div class="ungani-form-grid">
            <div>
              <label for="filterFrom">From Date</label>
              <input id="filterFrom" type="date" onchange="saveFilters(); renderPrintReport();" />
            </div>

            <div>
              <label for="filterTo">To Date</label>
              <input id="filterTo" type="date" onchange="saveFilters(); renderPrintReport();" />
            </div>

            <div>
              <label for="searchBox">Search Report</label>
              <input id="searchBox" placeholder="Search property, client, task, document..." oninput="saveFilters(); renderPrintReport();" />
            </div>
          </div>
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <h3>Report Overview</h3>
          </div>

          <section class="ungani-grid">
            ${UnganiClientShared.metricCard(isRealEstate ? "Properties / Listings" : "Items / Assets", filtered.items.length, isRealEstate ? items.available + " available · " + items.sold + " sold · " + items.rented + " rented" : items.available + " available", "blue")}
            ${UnganiClientShared.metricCard("Money Balance", UnganiClientShared.formatKES(money.balance), "Income minus expenses", money.balance >= 0 ? "green" : "red")}
            ${UnganiClientShared.metricCard(isRealEstate ? "Agents / Leads / People" : "People", filtered.people.length, isRealEstate ? people.agents + " agents · " + people.leads + " leads" : people.active + " active", "gold")}
            ${UnganiClientShared.metricCard("Pending Tasks", tasks.pending, tasks.overdue + " overdue", tasks.overdue > 0 ? "red" : "orange")}
            ${UnganiClientShared.metricCard("Documents", filtered.documents.length, documents.driveLinks + " linked", "blue")}
            ${UnganiClientShared.metricCard("Calendar Events", filtered.events.length, events.upcoming + " upcoming", "green")}
          </section>
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <h3>${isRealEstate ? "Property / Listing Summary" : "Items / Assets Summary"}</h3>
            ${summaryLine("Total Records", filtered.items.length)}
            ${summaryLine("Available", items.available)}
            ${summaryLine("Reserved", items.reserved)}
            ${summaryLine("Sold", items.sold)}
            ${summaryLine("Rented", items.rented)}
            ${summaryLine("Maintenance", items.maintenance)}
            ${summaryLine("Estimated Listed Value", UnganiClientShared.formatKES(items.totalValue))}
          </div>

          <div class="ungani-card">
            <h3>Money Summary</h3>
            ${summaryLine("Income", UnganiClientShared.formatKES(money.income))}
            ${summaryLine("Expenses", UnganiClientShared.formatKES(money.expenses))}
            ${summaryLine("Petty Cash", UnganiClientShared.formatKES(money.pettyCash))}
            ${summaryLine("Pending Amount", UnganiClientShared.formatKES(money.pending))}
            ${summaryLine("Estimated Balance", UnganiClientShared.formatKES(money.balance))}
            <p class="ungani-small">This is operational money tracking, not a full accounting or tax report.</p>
          </div>
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <h3>${isRealEstate ? "Agents / Leads / People Summary" : "People Summary"}</h3>
            ${summaryLine("Total People", filtered.people.length)}
            ${summaryLine("Active People", people.active)}
            ${summaryLine("Agents", people.agents)}
            ${summaryLine("Leads", people.leads)}
            ${summaryLine("Buyers / Renters / Tenants", people.buyersRenters)}
            ${summaryLine("Commission This Month", UnganiClientShared.formatKES(people.commission))}
          </div>

          <div class="ungani-card">
            <h3>Tasks & Follow-ups Summary</h3>
            ${summaryLine("Total Tasks", filtered.tasks.length)}
            ${summaryLine("Pending", tasks.pending)}
            ${summaryLine("Completed", tasks.completed)}
            ${summaryLine("Overdue", tasks.overdue)}
            ${summaryLine("High Priority", tasks.highPriority)}
          </div>
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <h3>${isRealEstate ? "Records / Viewings Summary" : "Business Records Summary"}</h3>
            ${summaryLine("Total Records", filtered.records.length)}
            ${summaryLine("Leads / Inquiries", records.leads)}
            ${summaryLine("Viewings / Site Visits", records.viewings)}
            ${summaryLine("Project Updates", records.projects)}
            ${summaryLine("Open / Pending", records.openPending)}
            ${summaryLine("Closed / Completed", records.closed)}
          </div>

          <div class="ungani-card">
            <h3>Documents Summary</h3>
            ${summaryLine("Total Documents", filtered.documents.length)}
            ${summaryLine("Agreements", documents.agreements)}
            ${summaryLine("Receipts / Invoices", documents.receiptsInvoices)}
            ${summaryLine("Drive Links", documents.driveLinks)}
            ${summaryLine("Pending / Review", documents.pending)}
            ${summaryLine("Archived", documents.archived)}
          </div>
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <h3>Calendar Summary</h3>
            ${summaryLine("Total Events", filtered.events.length)}
            ${summaryLine("Today", events.today)}
            ${summaryLine("Upcoming", events.upcoming)}
            ${summaryLine("Overdue", events.overdue)}
            ${summaryLine("Viewings / Site Visits", events.viewings)}
            ${summaryLine("Completed", events.completed)}
          </div>

          <div class="ungani-card">
            <h3>Support Summary</h3>
            ${summaryLine("Open Issues", support.open)}
            ${summaryLine("Resolved Issues", support.resolved)}
            ${summaryLine("Urgent / High Priority", support.urgent)}
            <p class="ungani-small">Support summary shows client issues logged inside UNGANI OS.</p>
          </div>
        </section>

        <section class="ungani-card">
          <h3>${isRealEstate ? "Recent Property / Business Records" : "Recent Business Records"}</h3>
          ${renderRecentRecords(filtered.records)}
        </section>

        <section class="ungani-card">
          <h3>Recent Money Records</h3>
          ${renderRecentMoney(filtered.transactions)}
        </section>

        <section class="ungani-card">
          <h3>Pending Tasks / Follow-ups</h3>
          ${renderPendingTasks(filtered.tasks)}
        </section>

        <section class="ungani-card">
          <h3>Upcoming Calendar Activities</h3>
          ${renderUpcomingEvents(filtered.events)}
        </section>

        <section class="ungani-card">
          <h3>Report Notes</h3>
          <p class="ungani-small">
            This report is generated from the client workspace data inside UNGANI OS. It is designed for operational visibility, follow-up tracking, records review, and business coordination.
          </p>
          <p class="ungani-small">
            UNGANI · ungani.com · info@ungani.com
          </p>
        </section>

        <p class="ungani-small">
          Print Report Version: Step 305K Shared Layout · Generated for ${UnganiClientShared.safe(tenantName)}
        </p>
      `);

      restoreFilters();
    }

    function getFilteredData() {
      const from = document.getElementById("filterFrom") ? UnganiClientShared.value("filterFrom") : "";
      const to = document.getElementById("filterTo") ? UnganiClientShared.value("filterTo") : "";
      const query = document.getElementById("searchBox") ? UnganiClientShared.value("searchBox").toLowerCase() : "";

      return {
        transactions: filterRows(reportData.transactions, from, to, query, ["transaction_date", "created_at"]),
        items: filterRows(reportData.items, from, to, query, ["date_listed", "created_at"]),
        tasks: filterRows(reportData.tasks, from, to, query, ["due_date", "created_at"]),
        records: filterRows(reportData.records, from, to, query, ["record_date", "viewing_date", "created_at"]),
        documents: filterRows(reportData.documents, from, to, query, ["created_at", "updated_at"]),
        people: filterRows(reportData.people, from, to, query, ["last_follow_up_date", "created_at"]),
        events: filterRows(reportData.events, from, to, query, ["event_date", "created_at"]),
        support: filterRows(reportData.support, from, to, query, ["created_at", "updated_at"])
      };
    }

    function filterRows(rows, from, to, query, dateFields) {
      return rows.filter(function (row) {
        const date = getFirstDate(row, dateFields);
        const haystack = JSON.stringify(row || {}).toLowerCase();

        if (from && date && date < from) return false;
        if (to && date && date > to) return false;
        if (query && !haystack.includes(query)) return false;

        return true;
      });
    }

    function getFirstDate(row, fields) {
      for (let i = 0; i < fields.length; i++) {
        const value = UnganiClientShared.getValue(row, [fields[i]], "");

        if (value) {
          return String(value).slice(0, 10);
        }
      }

      return "";
    }

    function calculateMoney(rows) {
      let income = 0;
      let expenses = 0;
      let pettyCash = 0;
      let pending = 0;

      rows.forEach(function (row) {
        const amount = Number(UnganiClientShared.getValue(row, ["amount"], 0) || 0);
        const type = String(UnganiClientShared.getValue(row, ["transaction_type", "type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "completed")).toLowerCase();

        if (type.includes("income") || type.includes("sale") || type.includes("rental")) income += amount;
        else if (type.includes("petty")) {
          pettyCash += amount;
          expenses += amount;
        } else if (type.includes("expense")) {
          expenses += amount;
        }

        if (status.includes("pending")) pending += amount;
      });

      return {
        income,
        expenses,
        pettyCash,
        pending,
        balance: income - expenses
      };
    }

    function calculateItems(rows) {
      let available = 0;
      let reserved = 0;
      let sold = 0;
      let rented = 0;
      let maintenance = 0;
      let totalValue = 0;

      rows.forEach(function (row) {
        const status = String(UnganiClientShared.getValue(row, ["property_status", "item_status", "status"], "")).toLowerCase();
        const value = Number(UnganiClientShared.getValue(row, ["property_price", "selling_price", "cost_price"], 0) || 0);

        totalValue += value;

        if (status.includes("available")) available++;
        if (status.includes("reserved")) reserved++;
        if (status.includes("sold")) sold++;
        if (status.includes("rented")) rented++;
        if (status.includes("maintenance") || status.includes("repair")) maintenance++;
      });

      return { available, reserved, sold, rented, maintenance, totalValue };
    }

    function calculatePeople(rows) {
      let active = 0;
      let agents = 0;
      let leads = 0;
      let buyersRenters = 0;
      let commission = 0;

      rows.forEach(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["person_type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["relationship_status", "status"], "active")).toLowerCase();

        if (!status.includes("inactive")) active++;
        if (type === "agent") agents++;
        if (type === "lead") leads++;
        if (type === "buyer" || type === "renter" || type === "tenant") buyersRenters++;

        commission += Number(UnganiClientShared.getValue(row, ["commission_earned_month"], 0) || 0);
      });

      return { active, agents, leads, buyersRenters, commission };
    }

    function calculateTasks(rows) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      let pending = 0;
      let completed = 0;
      let overdue = 0;
      let highPriority = 0;

      rows.forEach(function (row) {
        const status = String(UnganiClientShared.getValue(row, ["status"], "pending")).toLowerCase();
        const priority = String(UnganiClientShared.getValue(row, ["priority"], "normal")).toLowerCase();
        const dueValue = UnganiClientShared.getValue(row, ["due_date"], "");

        if (status.includes("completed")) completed++;
        if (!status.includes("completed") && !status.includes("cancelled")) pending++;
        if (priority === "high" || priority === "urgent") highPriority++;

        if (dueValue) {
          const dueDate = new Date(dueValue);
          dueDate.setHours(0, 0, 0, 0);

          if (!isNaN(dueDate.getTime()) && dueDate < today && !status.includes("completed") && !status.includes("cancelled")) {
            overdue++;
          }
        }
      });

      return { pending, completed, overdue, highPriority };
    }

    function calculateRecords(rows) {
      let leads = 0;
      let viewings = 0;
      let projects = 0;
      let openPending = 0;
      let closed = 0;

      rows.forEach(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["record_type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "")).toLowerCase();

        if (type.includes("lead") || type.includes("inquiry")) leads++;
        if (type.includes("viewing") || type.includes("site visit")) viewings++;
        if (type.includes("project")) projects++;

        if (status.includes("open") || status.includes("pending") || status.includes("contacted") || status.includes("viewing")) openPending++;
        if (status.includes("closed") || status.includes("completed")) closed++;
      });

      return { leads, viewings, projects, openPending, closed };
    }

    function calculateDocuments(rows) {
      let agreements = 0;
      let receiptsInvoices = 0;
      let driveLinks = 0;
      let pending = 0;
      let archived = 0;

      rows.forEach(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["document_type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "")).toLowerCase();

        if (type.includes("agreement") || type.includes("lease") || type.includes("sale")) agreements++;
        if (type.includes("receipt") || type.includes("invoice")) receiptsInvoices++;

        if (
          UnganiClientShared.getValue(row, ["document_url"], "") ||
          UnganiClientShared.getValue(row, ["drive_url"], "") ||
          UnganiClientShared.getValue(row, ["folder_url"], "")
        ) {
          driveLinks++;
        }

        if (status.includes("pending") || status.includes("review")) pending++;
        if (status.includes("archived")) archived++;
      });

      return { agreements, receiptsInvoices, driveLinks, pending, archived };
    }

    function calculateEvents(rows) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const todayText = today.toISOString().slice(0, 10);

      let todayCount = 0;
      let upcoming = 0;
      let overdue = 0;
      let viewings = 0;
      let completed = 0;

      rows.forEach(function (row) {
        const date = String(UnganiClientShared.getValue(row, ["event_date"], "")).slice(0, 10);
        const type = String(UnganiClientShared.getValue(row, ["event_type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "scheduled")).toLowerCase();

        if (date === todayText) todayCount++;
        if (date >= todayText && !status.includes("cancelled")) upcoming++;
        if (date < todayText && !status.includes("completed") && !status.includes("cancelled")) overdue++;
        if (type.includes("viewing") || type.includes("site visit")) viewings++;
        if (status.includes("completed")) completed++;
      });

      return { today: todayCount, upcoming, overdue, viewings, completed };
    }

    function calculateSupport(rows) {
      let open = 0;
      let resolved = 0;
      let urgent = 0;

      rows.forEach(function (row) {
        const status = String(UnganiClientShared.getValue(row, ["status"], "open")).toLowerCase();
        const priority = String(UnganiClientShared.getValue(row, ["priority"], "normal")).toLowerCase();

        if (status.includes("resolved") || status.includes("closed")) resolved++;
        else open++;

        if (priority.includes("urgent") || priority.includes("high")) urgent++;
      });

      return { open, resolved, urgent };
    }

    function renderRecentRecords(rows) {
      const recent = [...rows].sort(function (a, b) {
        return new Date(UnganiClientShared.getValue(b, ["created_at"], "")) - new Date(UnganiClientShared.getValue(a, ["created_at"], ""));
      }).slice(0, 6);

      if (recent.length === 0) {
        return emptyText("No recent records found.");
      }

      return recent.map(function (row) {
        const title = UnganiClientShared.getValue(row, ["record_title", "title", "name"], "Business Record");
        const type = UnganiClientShared.getValue(row, ["record_type"], "general");
        const status = UnganiClientShared.getValue(row, ["status"], "open");
        const property = UnganiClientShared.getValue(row, ["property_name"], "");
        const date = UnganiClientShared.formatDate(UnganiClientShared.getValue(row, ["created_at", "record_date"], ""));

        return summaryBlock(title, type + " · " + status + (property ? " · " + property : ""), date);
      }).join("");
    }

    function renderRecentMoney(rows) {
      const recent = [...rows].sort(function (a, b) {
        return new Date(UnganiClientShared.getValue(b, ["transaction_date", "created_at"], "")) - new Date(UnganiClientShared.getValue(a, ["transaction_date", "created_at"], ""));
      }).slice(0, 6);

      if (recent.length === 0) {
        return emptyText("No recent money records found.");
      }

      return recent.map(function (row) {
        const category = UnganiClientShared.getValue(row, ["category_name", "category", "category_key"], "Money Record");
        const amount = UnganiClientShared.formatKES(UnganiClientShared.getValue(row, ["amount"], 0));
        const type = UnganiClientShared.getValue(row, ["transaction_type", "type"], "record");
        const date = UnganiClientShared.formatDate(UnganiClientShared.getValue(row, ["transaction_date", "created_at"], ""));

        return summaryBlock(category, type + " · " + amount, date);
      }).join("");
    }

    function renderPendingTasks(rows) {
      const pending = rows.filter(function (row) {
        const status = String(UnganiClientShared.getValue(row, ["status"], "pending")).toLowerCase();
        return !status.includes("completed") && !status.includes("cancelled");
      }).slice(0, 8);

      if (pending.length === 0) {
        return emptyText("No pending tasks found.");
      }

      return pending.map(function (row) {
        const title = UnganiClientShared.getValue(row, ["task_title", "title", "name"], "Task");
        const priority = UnganiClientShared.getValue(row, ["priority"], "normal");
        const due = UnganiClientShared.formatDate(UnganiClientShared.getValue(row, ["due_date"], ""));

        return summaryBlock(title, "Priority: " + priority, "Due: " + due);
      }).join("");
    }

    function renderUpcomingEvents(rows) {
      const todayText = new Date().toISOString().slice(0, 10);

      const upcoming = rows.filter(function (row) {
        const date = String(UnganiClientShared.getValue(row, ["event_date"], "")).slice(0, 10);
        return date >= todayText;
      }).sort(function (a, b) {
        return new Date(UnganiClientShared.getValue(a, ["event_date"], "")) - new Date(UnganiClientShared.getValue(b, ["event_date"], ""));
      }).slice(0, 8);

      if (upcoming.length === 0) {
        return emptyText("No upcoming calendar activities found.");
      }

      return upcoming.map(function (row) {
        const title = UnganiClientShared.getValue(row, ["event_title", "title"], "Calendar Event");
        const type = UnganiClientShared.getValue(row, ["event_type"], "general");
        const date = UnganiClientShared.formatDate(UnganiClientShared.getValue(row, ["event_date"], ""));

        return summaryBlock(title, type, date);
      }).join("");
    }

    function summaryLine(label, value) {
      return `
        <div style="display:flex;justify-content:space-between;gap:14px;border-bottom:1px solid var(--ungani-border);padding:10px 0;">
          <span class="ungani-small">${UnganiClientShared.safe(label)}</span>
          <strong>${UnganiClientShared.safe(value)}</strong>
        </div>
      `;
    }

    function summaryBlock(title, detail, date) {
      return `
        <div class="ungani-card" style="box-shadow:none;margin-bottom:10px;">
          <h3 style="margin:0 0 6px;color:var(--ungani-text);font-size:16px;">${UnganiClientShared.safe(title)}</h3>
          <p class="ungani-small" style="margin:0 0 6px;">${UnganiClientShared.safe(detail)}</p>
          <span class="ungani-badge gold">${UnganiClientShared.safe(date)}</span>
        </div>
      `;
    }

    function emptyText(message) {
      return `
        <div class="ungani-empty">
          <h3>No data</h3>
          <p>${UnganiClientShared.safe(message)}</p>
        </div>
      `;
    }

    function restoreFilters() {
      if (document.getElementById("filterFrom")) document.getElementById("filterFrom").value = sessionStorage.getItem("ungani_print_filter_from") || "";
      if (document.getElementById("filterTo")) document.getElementById("filterTo").value = sessionStorage.getItem("ungani_print_filter_to") || "";
      if (document.getElementById("searchBox")) document.getElementById("searchBox").value = sessionStorage.getItem("ungani_print_search") || "";
    }

    function saveFilters() {
      if (document.getElementById("filterFrom")) sessionStorage.setItem("ungani_print_filter_from", UnganiClientShared.value("filterFrom"));
      if (document.getElementById("filterTo")) sessionStorage.setItem("ungani_print_filter_to", UnganiClientShared.value("filterTo"));
      if (document.getElementById("searchBox")) sessionStorage.setItem("ungani_print_search", UnganiClientShared.value("searchBox"));
    }

    function resetFilters() {
      sessionStorage.removeItem("ungani_print_filter_from");
      sessionStorage.removeItem("ungani_print_filter_to");
      sessionStorage.removeItem("ungani_print_search");
      renderPrintReport();
      UnganiClientShared.showToast("Print report filters reset ✓");
    }
  </script>
</body>
</html>
