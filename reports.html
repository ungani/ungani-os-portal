<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Reports</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-shared.js"></script>
</head>

<body>
  <script>
    let currentContext = null;
    let isRealEstate = false;

    let reportData = {
      transactions: [],
      items: [],
      tasks: [],
      records: [],
      documents: [],
      people: [],
      events: [],
      support: []
    };

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "reports",
        pageTitle: "Reports",
        pageSubtitle: "View business summaries, operations visibility, money records, tasks, documents, calendar activity, and follow-ups.",
        onReady: startReportsPage
      });
    });

    async function startReportsPage(context) {
      currentContext = context;

      const businessType = String(UnganiClientShared.getValue(context.tenant, ["business_type", "business_type_key"], "")).toLowerCase();
      const businessTypeKey = String(UnganiClientShared.getValue(context.tenant, ["business_type_key"], "")).toLowerCase();

      isRealEstate = businessType.includes("real estate") || businessTypeKey.includes("real_estate");

      const titleEl = document.querySelector(".ungani-topbar h2");
      const subEl = document.querySelector(".ungani-topbar p");

      if (titleEl) {
        titleEl.innerText = isRealEstate ? "Property Operations Report" : "Business Report";
      }

      if (subEl) {
        subEl.innerText = isRealEstate
          ? "Review properties, leads, agents, viewings, money records, documents, tasks, calendar activities, and support visibility."
          : "Review business records, money records, documents, tasks, items, calendar activities, and support visibility.";
      }

      await loadReportData();
    }

    async function loadReportData() {
      currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading report data...");

      const responses = await Promise.all([
        safeSelect("transactions"),
        safeSelect("business_items"),
        safeSelect("tasks"),
        safeSelect("business_records"),
        safeSelect("documents"),
        safeSelect("client_people"),
        safeSelect("business_events"),
        safeSelect("support_issues")
      ]);

      reportData.transactions = responses[0];
      reportData.items = responses[1];
      reportData.tasks = responses[2];
      reportData.records = responses[3];
      reportData.documents = responses[4];
      reportData.people = responses[5];
      reportData.events = responses[6];
      reportData.support = responses[7];

      renderReportsPage();
    }

    async function safeSelect(tableName) {
      try {
        const response = await currentContext.supabaseClient
          .from(tableName)
          .select("*")
          .eq("tenant_id", currentContext.tenantId);

        if (response.error) {
          console.warn(tableName, response.error.message);
          return [];
        }

        return response.data || [];
      } catch (error) {
        console.warn(tableName, error.message);
        return [];
      }
    }

    function renderReportsPage() {
      const filtered = getFilteredData();

      const money = calculateMoney(filtered.transactions);
      const items = calculateItems(filtered.items);
      const people = calculatePeople(filtered.people);
      const tasks = calculateTasks(filtered.tasks);
      const docs = calculateDocuments(filtered.documents);
      const events = calculateEvents(filtered.events);
      const records = calculateRecords(filtered.records);
      const support = calculateSupport(filtered.support);

      const tenantName = UnganiClientShared.getTenantName(currentContext.tenant);

      UnganiClientShared.setContent(`
        <section class="ungani-card ungani-hero">
          <h2>${isRealEstate ? "Property Operations Report" : "Business Operations Report"}</h2>
          <p>
            ${isRealEstate
              ? "This report gives a simple view of property listings, money records, leads, agents, viewings, tasks, documents, and follow-ups for " + UnganiClientShared.safe(tenantName) + "."
              : "This report gives a simple view of business records, money records, tasks, documents, items, calendar activities, and support for " + UnganiClientShared.safe(tenantName) + "."
            }
          </p>

          <div class="ungani-button-row">
            <button class="ungani-btn" onclick="window.print()">Print This Page</button>
            <a class="ungani-btn green" href="print-report.html">Open Print Report</a>
            <button class="ungani-btn dark" onclick="loadReportData()">Refresh Report</button>
          </div>
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <h3>Report Filters</h3>
            <button class="ungani-btn dark" onclick="resetFilters()">Reset Filters</button>
          </div>

          <div class="ungani-form-grid">
            <div>
              <label for="filterFrom">From Date</label>
              <input id="filterFrom" type="date" onchange="saveFilters(); renderReportsPage();" />
            </div>

            <div>
              <label for="filterTo">To Date</label>
              <input id="filterTo" type="date" onchange="saveFilters(); renderReportsPage();" />
            </div>

            <div>
              <label for="searchBox">Search Report</label>
              <input id="searchBox" placeholder="Search property, client, agent, task, record..." oninput="saveFilters(); renderReportsPage();" />
            </div>
          </div>
        </section>

        <section class="ungani-grid">
          ${UnganiClientShared.metricCard(isRealEstate ? "Properties / Listings" : "Items / Assets", filtered.items.length, isRealEstate ? items.available + " available · " + items.sold + " sold · " + items.rented + " rented" : items.available + " available · " + items.maintenance + " maintenance", "blue")}
          ${UnganiClientShared.metricCard("Estimated Balance", UnganiClientShared.formatKES(money.balance), "Income minus expenses", money.balance >= 0 ? "green" : "red")}
          ${UnganiClientShared.metricCard(isRealEstate ? "Agents / Leads / People" : "People", filtered.people.length, isRealEstate ? people.agents + " agents · " + people.leads + " leads" : people.active + " active records", "gold")}
          ${UnganiClientShared.metricCard("Pending Tasks", tasks.pending, tasks.overdue + " overdue · " + tasks.completed + " completed", tasks.overdue > 0 ? "red" : "orange")}
          ${UnganiClientShared.metricCard("Documents", filtered.documents.length, docs.driveLinks + " with links · " + docs.pending + " pending/review", "blue")}
          ${UnganiClientShared.metricCard("Calendar", filtered.events.length, events.upcoming + " upcoming · " + events.today + " today", "green")}
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>${isRealEstate ? "Property Summary" : "Items / Assets Summary"}</h3>
              <a class="ungani-btn" href="my-items.html">${isRealEstate ? "Open Properties" : "Open Items"}</a>
            </div>

            ${renderPropertySummary(items)}
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Money Summary</h3>
              <a class="ungani-btn green" href="my-money.html">Open Money</a>
            </div>

            ${renderMoneySummary(money)}
          </div>
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>${isRealEstate ? "Leads / Agents / People Summary" : "People Summary"}</h3>
              <a class="ungani-btn" href="my-people.html">Open People</a>
            </div>

            ${renderPeopleSummary(people)}
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Tasks & Follow-ups</h3>
              <a class="ungani-btn orange" href="my-tasks.html">Open Tasks</a>
            </div>

            ${renderTasksSummary(tasks)}
          </div>
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>${isRealEstate ? "Records / Viewings / Updates" : "Business Records"}</h3>
              <a class="ungani-btn" href="my-records.html">Open Records</a>
            </div>

            ${renderRecordsSummary(records)}
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Documents Summary</h3>
              <a class="ungani-btn green" href="my-documents.html">Open Documents</a>
            </div>

            ${renderDocumentsSummary(docs)}
          </div>
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Calendar Summary</h3>
              <a class="ungani-btn" href="my-calendar.html">Open Calendar</a>
            </div>

            ${renderEventsSummary(events)}
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Support Summary</h3>
              <a class="ungani-btn dark" href="my-support.html">Open Support</a>
            </div>

            ${renderSupportSummary(support)}
          </div>
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <h3>Recent Activity</h3>
            <a class="ungani-btn dark" href="my-activity.html">Open Activity</a>
          </div>

          ${renderRecentActivity(filtered)}
        </section>

        <p class="ungani-small">
          Reports Version: Step 305J Shared Layout · Report generated for ${UnganiClientShared.safe(tenantName)} · ungani.com · info@ungani.com
        </p>
      `);

      restoreFilters();
    }

    function getFilteredData() {
      const from = document.getElementById("filterFrom") ? UnganiClientShared.value("filterFrom") : "";
      const to = document.getElementById("filterTo") ? UnganiClientShared.value("filterTo") : "";
      const query = document.getElementById("searchBox") ? UnganiClientShared.value("searchBox").toLowerCase() : "";

      return {
        transactions: filterRows(reportData.transactions, from, to, query, ["transaction_date", "created_at"]),
        items: filterRows(reportData.items, from, to, query, ["date_listed", "created_at"]),
        tasks: filterRows(reportData.tasks, from, to, query, ["due_date", "created_at"]),
        records: filterRows(reportData.records, from, to, query, ["record_date", "viewing_date", "created_at"]),
        documents: filterRows(reportData.documents, from, to, query, ["created_at", "updated_at"]),
        people: filterRows(reportData.people, from, to, query, ["last_follow_up_date", "created_at"]),
        events: filterRows(reportData.events, from, to, query, ["event_date", "created_at"]),
        support: filterRows(reportData.support, from, to, query, ["created_at", "updated_at"])
      };
    }

    function filterRows(rows, from, to, query, dateFields) {
      return rows.filter(function (row) {
        const date = getFirstDate(row, dateFields);
        const haystack = JSON.stringify(row || {}).toLowerCase();

        if (from && date && date < from) return false;
        if (to && date && date > to) return false;
        if (query && !haystack.includes(query)) return false;

        return true;
      });
    }

    function getFirstDate(row, fields) {
      for (let i = 0; i < fields.length; i++) {
        const value = UnganiClientShared.getValue(row, [fields[i]], "");

        if (value) {
          return String(value).slice(0, 10);
        }
      }

      return "";
    }

    function calculateMoney(rows) {
      let income = 0;
      let expenses = 0;
      let pettyCash = 0;
      let pending = 0;
      let completed = 0;

      rows.forEach(function (row) {
        const amount = Number(UnganiClientShared.getValue(row, ["amount"], 0) || 0);
        const type = String(UnganiClientShared.getValue(row, ["transaction_type", "type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "completed")).toLowerCase();

        if (type.includes("income") || type.includes("sale") || type.includes("rental")) income += amount;
        else if (type.includes("petty")) {
          pettyCash += amount;
          expenses += amount;
        } else if (type.includes("expense")) {
          expenses += amount;
        }

        if (status.includes("pending")) pending += amount;
        if (status.includes("completed")) completed += amount;
      });

      return {
        income,
        expenses,
        pettyCash,
        pending,
        completed,
        balance: income - expenses
      };
    }

    function calculateItems(rows) {
      let available = 0;
      let reserved = 0;
      let sold = 0;
      let rented = 0;
      let maintenance = 0;
      let totalValue = 0;

      rows.forEach(function (row) {
        const status = String(UnganiClientShared.getValue(row, ["property_status", "item_status", "status"], "")).toLowerCase();
        const value = Number(UnganiClientShared.getValue(row, ["property_price", "selling_price", "cost_price"], 0) || 0);

        totalValue += value;

        if (status.includes("available")) available++;
        if (status.includes("reserved")) reserved++;
        if (status.includes("sold")) sold++;
        if (status.includes("rented")) rented++;
        if (status.includes("maintenance") || status.includes("repair")) maintenance++;
      });

      return { available, reserved, sold, rented, maintenance, totalValue };
    }

    function calculatePeople(rows) {
      let active = 0;
      let agents = 0;
      let leads = 0;
      let buyersRenters = 0;
      let commission = 0;

      rows.forEach(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["person_type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["relationship_status", "status"], "active")).toLowerCase();

        if (!status.includes("inactive")) active++;
        if (type === "agent") agents++;
        if (type === "lead") leads++;
        if (type === "buyer" || type === "renter" || type === "tenant") buyersRenters++;

        commission += Number(UnganiClientShared.getValue(row, ["commission_earned_month"], 0) || 0);
      });

      return { active, agents, leads, buyersRenters, commission };
    }

    function calculateTasks(rows) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      let pending = 0;
      let completed = 0;
      let overdue = 0;
      let highPriority = 0;

      rows.forEach(function (row) {
        const status = String(UnganiClientShared.getValue(row, ["status"], "pending")).toLowerCase();
        const priority = String(UnganiClientShared.getValue(row, ["priority"], "normal")).toLowerCase();
        const dueValue = UnganiClientShared.getValue(row, ["due_date"], "");

        if (status.includes("completed")) completed++;
        if (!status.includes("completed") && !status.includes("cancelled")) pending++;
        if (priority === "high" || priority === "urgent") highPriority++;

        if (dueValue) {
          const dueDate = new Date(dueValue);
          dueDate.setHours(0, 0, 0, 0);

          if (!isNaN(dueDate.getTime()) && dueDate < today && !status.includes("completed") && !status.includes("cancelled")) {
            overdue++;
          }
        }
      });

      return { pending, completed, overdue, highPriority };
    }

    function calculateDocuments(rows) {
      let agreements = 0;
      let receiptsInvoices = 0;
      let driveLinks = 0;
      let pending = 0;
      let archived = 0;

      rows.forEach(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["document_type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "")).toLowerCase();

        if (type.includes("agreement") || type.includes("lease") || type.includes("sale")) agreements++;
        if (type.includes("receipt") || type.includes("invoice")) receiptsInvoices++;

        if (
          UnganiClientShared.getValue(row, ["document_url"], "") ||
          UnganiClientShared.getValue(row, ["drive_url"], "") ||
          UnganiClientShared.getValue(row, ["folder_url"], "")
        ) {
          driveLinks++;
        }

        if (status.includes("pending") || status.includes("review")) pending++;
        if (status.includes("archived")) archived++;
      });

      return { agreements, receiptsInvoices, driveLinks, pending, archived };
    }

    function calculateEvents(rows) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const todayText = today.toISOString().slice(0, 10);

      let todayCount = 0;
      let upcoming = 0;
      let overdue = 0;
      let viewings = 0;
      let completed = 0;

      rows.forEach(function (row) {
        const date = String(UnganiClientShared.getValue(row, ["event_date"], "")).slice(0, 10);
        const type = String(UnganiClientShared.getValue(row, ["event_type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "scheduled")).toLowerCase();

        if (date === todayText) todayCount++;
        if (date >= todayText && !status.includes("cancelled")) upcoming++;
        if (date < todayText && !status.includes("completed") && !status.includes("cancelled")) overdue++;
        if (type.includes("viewing") || type.includes("site visit")) viewings++;
        if (status.includes("completed")) completed++;
      });

      return { today: todayCount, upcoming, overdue, viewings, completed };
    }

    function calculateRecords(rows) {
      let leads = 0;
      let viewings = 0;
      let projects = 0;
      let openPending = 0;
      let closed = 0;

      rows.forEach(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["record_type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "")).toLowerCase();

        if (type.includes("lead") || type.includes("inquiry")) leads++;
        if (type.includes("viewing") || type.includes("site visit")) viewings++;
        if (type.includes("project")) projects++;

        if (status.includes("open") || status.includes("pending") || status.includes("contacted") || status.includes("viewing")) openPending++;
        if (status.includes("closed") || status.includes("completed")) closed++;
      });

      return { leads, viewings, projects, openPending, closed };
    }

    function calculateSupport(rows) {
      let open = 0;
      let resolved = 0;
      let urgent = 0;

      rows.forEach(function (row) {
        const status = String(UnganiClientShared.getValue(row, ["status"], "open")).toLowerCase();
        const priority = String(UnganiClientShared.getValue(row, ["priority"], "normal")).toLowerCase();

        if (status.includes("resolved") || status.includes("closed")) resolved++;
        else open++;

        if (priority.includes("urgent") || priority.includes("high")) urgent++;
      });

      return { open, resolved, urgent };
    }

    function renderPropertySummary(summary) {
      return `
        ${miniSummary("Available", summary.available)}
        ${miniSummary("Reserved", summary.reserved)}
        ${miniSummary("Sold", summary.sold)}
        ${miniSummary("Rented", summary.rented)}
        ${miniSummary("Maintenance", summary.maintenance)}
        ${miniSummary("Estimated Listed Value", UnganiClientShared.formatKES(summary.totalValue))}
      `;
    }

    function renderMoneySummary(summary) {
      return `
        ${miniSummary("Income", UnganiClientShared.formatKES(summary.income))}
        ${miniSummary("Expenses", UnganiClientShared.formatKES(summary.expenses))}
        ${miniSummary("Petty Cash", UnganiClientShared.formatKES(summary.pettyCash))}
        ${miniSummary("Pending Amount", UnganiClientShared.formatKES(summary.pending))}
        ${miniSummary("Estimated Balance", UnganiClientShared.formatKES(summary.balance))}
      `;
    }

    function renderPeopleSummary(summary) {
      return `
        ${miniSummary("Active People", summary.active)}
        ${miniSummary("Agents", summary.agents)}
        ${miniSummary("Leads", summary.leads)}
        ${miniSummary("Buyers / Renters / Tenants", summary.buyersRenters)}
        ${miniSummary("Commission This Month", UnganiClientShared.formatKES(summary.commission))}
      `;
    }

    function renderTasksSummary(summary) {
      return `
        ${miniSummary("Pending Tasks", summary.pending)}
        ${miniSummary("Completed Tasks", summary.completed)}
        ${miniSummary("Overdue Tasks", summary.overdue)}
        ${miniSummary("High Priority", summary.highPriority)}
      `;
    }

    function renderRecordsSummary(summary) {
      return `
        ${miniSummary("Leads / Inquiries", summary.leads)}
        ${miniSummary("Viewings / Site Visits", summary.viewings)}
        ${miniSummary("Project Updates", summary.projects)}
        ${miniSummary("Open / Pending", summary.openPending)}
        ${miniSummary("Closed / Completed", summary.closed)}
      `;
    }

    function renderDocumentsSummary(summary) {
      return `
        ${miniSummary("Agreements", summary.agreements)}
        ${miniSummary("Receipts / Invoices", summary.receiptsInvoices)}
        ${miniSummary("Drive Links", summary.driveLinks)}
        ${miniSummary("Pending / Review", summary.pending)}
        ${miniSummary("Archived", summary.archived)}
      `;
    }

    function renderEventsSummary(summary) {
      return `
        ${miniSummary("Today", summary.today)}
        ${miniSummary("Upcoming", summary.upcoming)}
        ${miniSummary("Overdue", summary.overdue)}
        ${miniSummary("Viewings / Site Visits", summary.viewings)}
        ${miniSummary("Completed", summary.completed)}
      `;
    }

    function renderSupportSummary(summary) {
      return `
        ${miniSummary("Open Issues", summary.open)}
        ${miniSummary("Resolved Issues", summary.resolved)}
        ${miniSummary("Urgent / High Priority", summary.urgent)}
      `;
    }

    function miniSummary(label, value) {
      return `
        <div class="ungani-card" style="box-shadow:none;margin-bottom:10px;">
          <p class="ungani-small" style="margin:0 0 5px;">${UnganiClientShared.safe(label)}</p>
          <strong style="font-size:18px;">${UnganiClientShared.safe(value)}</strong>
        </div>
      `;
    }

    function renderRecentActivity(filtered) {
      const activity = [];

      filtered.transactions.slice(0, 5).forEach(function (row) {
        activity.push({
          title: "Money Record",
          detail: UnganiClientShared.getValue(row, ["category_name", "category", "description"], "Money record") + " · " + UnganiClientShared.formatKES(UnganiClientShared.getValue(row, ["amount"], 0)),
          date: UnganiClientShared.getValue(row, ["transaction_date", "created_at"], "")
        });
      });

      filtered.records.slice(0, 5).forEach(function (row) {
        activity.push({
          title: "Business Record",
          detail: UnganiClientShared.getValue(row, ["record_title", "title", "name"], "Business record"),
          date: UnganiClientShared.getValue(row, ["created_at", "record_date"], "")
        });
      });

      filtered.tasks.slice(0, 5).forEach(function (row) {
        activity.push({
          title: "Task / Follow-up",
          detail: UnganiClientShared.getValue(row, ["task_title", "title", "name"], "Task"),
          date: UnganiClientShared.getValue(row, ["due_date", "created_at"], "")
        });
      });

      filtered.events.slice(0, 5).forEach(function (row) {
        activity.push({
          title: "Calendar Event",
          detail: UnganiClientShared.getValue(row, ["event_title", "title"], "Calendar event"),
          date: UnganiClientShared.getValue(row, ["event_date", "created_at"], "")
        });
      });

      activity.sort(function (a, b) {
        return new Date(b.date || 0) - new Date(a.date || 0);
      });

      if (activity.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No recent activity found</h3>
            <p>Recent activity will appear here once records are added.</p>
          </div>
        `;
      }

      return activity.slice(0, 10).map(function (item) {
        return `
          <div class="ungani-card" style="box-shadow:none;margin-bottom:10px;">
            <h3 style="margin:0 0 6px;color:var(--ungani-text);">${UnganiClientShared.safe(item.title)}</h3>
            <p class="ungani-small" style="margin:0 0 6px;">${UnganiClientShared.safe(item.detail)}</p>
            <span class="ungani-badge gold">${UnganiClientShared.safe(UnganiClientShared.formatDate(item.date))}</span>
          </div>
        `;
      }).join("");
    }

    function restoreFilters() {
      if (document.getElementById("filterFrom")) document.getElementById("filterFrom").value = sessionStorage.getItem("ungani_reports_filter_from") || "";
      if (document.getElementById("filterTo")) document.getElementById("filterTo").value = sessionStorage.getItem("ungani_reports_filter_to") || "";
      if (document.getElementById("searchBox")) document.getElementById("searchBox").value = sessionStorage.getItem("ungani_reports_search") || "";
    }

    function saveFilters() {
      if (document.getElementById("filterFrom")) sessionStorage.setItem("ungani_reports_filter_from", UnganiClientShared.value("filterFrom"));
      if (document.getElementById("filterTo")) sessionStorage.setItem("ungani_reports_filter_to", UnganiClientShared.value("filterTo"));
      if (document.getElementById("searchBox")) sessionStorage.setItem("ungani_reports_search", UnganiClientShared.value("searchBox"));
    }

    function resetFilters() {
      sessionStorage.removeItem("ungani_reports_filter_from");
      sessionStorage.removeItem("ungani_reports_filter_to");
      sessionStorage.removeItem("ungani_reports_search");
      renderReportsPage();
      UnganiClientShared.showToast("Report filters reset ✓");
    }
  </script>
</body>
</html>
