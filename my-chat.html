<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Chat with UNGANI</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-shared.js"></script>
</head>

<body>
  <script>
    let currentContext = null;
    let messages = [];
    let refreshTimer = null;

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "chat",
        pageTitle: "Chat with UNGANI",
        pageSubtitle: "Send questions, updates, and support messages directly to UNGANI.",
        onReady: startChatPage
      });
    });

    window.addEventListener("beforeunload", function () {
      if (refreshTimer) {
        clearInterval(refreshTimer);
      }
    });

    async function startChatPage(context) {
      currentContext = context;
      await loadMessages();

      refreshTimer = setInterval(function () {
        loadMessages(true);
      }, 20000);
    }

    async function loadMessages(silent) {
      if (!silent) {
        currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading chat messages...");
      }

      const response = await currentContext.supabaseClient
        .from("admin_client_messages")
        .select("*")
        .eq("tenant_id", currentContext.tenantId)
        .order("created_at", { ascending: true });

      if (response.error) {
        if (!silent) {
          currentContext.contentEl.innerHTML = UnganiClientShared.errorCard("Could not load chat", response.error.message);
        }
        return;
      }

      messages = response.data || [];
      await markAdminMessagesRead();
      renderChatPage();
    }

    async function markAdminMessagesRead() {
      try {
        await currentContext.supabaseClient
          .from("admin_client_messages")
          .update({
            is_read: true,
            updated_at: new Date().toISOString()
          })
          .eq("tenant_id", currentContext.tenantId)
          .neq("sender_role", "client")
          .eq("is_read", false);
      } catch (error) {
        console.warn("Could not mark admin messages as read:", error.message);
      }
    }

    function renderChatPage() {
      const summary = calculateSummary();

      UnganiClientShared.setContent(`
        <section class="ungani-card ungani-hero">
          <h2>Chat with UNGANI</h2>
          <p>
            Use this chat for support questions, setup requests, business workflow questions, and updates that need a response from UNGANI.
          </p>

          <div class="ungani-button-row">
            <button class="ungani-btn" onclick="loadMessages()">Refresh Chat</button>
            <a class="ungani-btn green" href="my-support.html">Create Support Issue</a>
            <a class="ungani-btn dark" href="my-notices.html">Notices</a>
          </div>
        </section>

        <section class="ungani-grid">
          ${UnganiClientShared.metricCard("Total Messages", messages.length, "All chat messages", "blue")}
          ${UnganiClientShared.metricCard("Your Messages", summary.clientMessages, "Sent by your business", "gold")}
          ${UnganiClientShared.metricCard("UNGANI Replies", summary.adminMessages, "Replies from UNGANI", "green")}
          ${UnganiClientShared.metricCard("Unread Replies", summary.unreadAdmin, "Unread UNGANI messages", summary.unreadAdmin > 0 ? "orange" : "green")}
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <div>
                <h3>Conversation</h3>
                <p class="ungani-small">Messages refresh automatically every 20 seconds.</p>
              </div>

              <button class="ungani-btn green" onclick="loadMessages()">Refresh</button>
            </div>

            <div id="chatBox" style="max-height:620px;overflow:auto;padding-right:6px;">
              ${renderMessageList()}
            </div>
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Send Message</h3>
            </div>

            ${renderMessageForm()}

            <div class="ungani-card" style="box-shadow:none;margin-top:16px;">
              <strong>Good uses for chat</strong>
              <p class="ungani-small">Ask setup questions, request help, clarify reports, ask how to organize your workflow, or send quick operational updates.</p>
            </div>

            <div class="ungani-card" style="box-shadow:none;">
              <strong>For serious issues</strong>
              <p class="ungani-small">Use Support Issues when you need a problem tracked with priority and status.</p>
              <a class="ungani-btn" href="my-support.html">Open Support</a>
            </div>
          </div>
        </section>

        <p class="ungani-small">
          Chat Version: Step 307C Shared Layout · ungani.com · info@ungani.com
        </p>
      `);

      scrollChatToBottom();
    }

    function renderMessageForm() {
      return `
        <form id="chatForm" onsubmit="sendMessage(event)">
          <label for="messageType">Message Type</label>
          <select id="messageType">
            <option value="message">General Message</option>
            <option value="question">Question</option>
            <option value="support_request">Support Request</option>
            <option value="setup_request">Setup Request</option>
            <option value="workflow_question">Workflow Question</option>
            <option value="document_question">Document Question</option>
            <option value="report_question">Report Question</option>
            <option value="other">Other</option>
          </select>

          <label for="messageBody">Message</label>
          <textarea id="messageBody" required placeholder="Type your message to UNGANI here..."></textarea>

          <label for="attachmentUrl">Optional Link</label>
          <input id="attachmentUrl" type="url" placeholder="Paste a Google Drive, document, or screenshot link if needed" />

          <div class="ungani-button-row">
            <button class="ungani-btn green" type="submit">Send Message</button>
            <button class="ungani-btn dark" type="button" onclick="clearForm()">Clear</button>
          </div>
        </form>
      `;
    }

    function renderMessageList() {
      if (messages.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No messages yet</h3>
            <p>Send your first message to UNGANI using the form on the right.</p>
          </div>
        `;
      }

      return messages.map(function (row) {
        return renderMessageCard(row);
      }).join("");
    }

    function renderMessageCard(row) {
      const role = String(UnganiClientShared.getValue(row, ["sender_role"], "client")).toLowerCase();
      const isClient = role === "client";
      const type = UnganiClientShared.getValue(row, ["message_type"], "message");
      const body = UnganiClientShared.getValue(row, ["message_body", "message", "body"], "");
      const attachmentUrl = UnganiClientShared.getValue(row, ["attachment_url"], "");
      const created = UnganiClientShared.getValue(row, ["created_at"], "");
      const read = UnganiClientShared.getValue(row, ["is_read"], false);

      const bg = isClient ? "rgba(6,28,61,0.05)" : "rgba(212,166,58,0.14)";
      const border = isClient ? "#061C3D" : "#D4A63A";
      const sender = isClient ? "You" : "UNGANI";

      return `
        <div class="ungani-card" style="box-shadow:none;border-left:5px solid ${border};background:${bg};">
          <div class="ungani-section-title">
            <div>
              <h3>${UnganiClientShared.safe(sender)}</h3>
              <p class="ungani-small">${UnganiClientShared.safe(UnganiClientShared.formatDate(created))}</p>
            </div>

            <div>
              ${badge(type, isClient ? "blue" : "gold")}
              ${isClient ? badge(read ? "read" : "sent", read ? "green" : "orange") : ""}
            </div>
          </div>

          <p style="white-space:pre-wrap;margin-bottom:12px;">${UnganiClientShared.safe(body)}</p>

          ${attachmentUrl ? `
            <a class="ungani-btn green" href="${UnganiClientShared.attr(attachmentUrl)}" target="_blank" rel="noopener">Open Link</a>
          ` : ""}
        </div>
      `;
    }

    function calculateSummary() {
      let clientMessages = 0;
      let adminMessages = 0;
      let unreadAdmin = 0;

      messages.forEach(function (row) {
        const role = String(UnganiClientShared.getValue(row, ["sender_role"], "client")).toLowerCase();
        const read = UnganiClientShared.getValue(row, ["is_read"], false);

        if (role === "client") {
          clientMessages++;
        } else {
          adminMessages++;

          if (!read) {
            unreadAdmin++;
          }
        }
      });

      return { clientMessages, adminMessages, unreadAdmin };
    }

    async function sendMessage(event) {
      event.preventDefault();

      const body = UnganiClientShared.value("messageBody");

      if (!body) {
        alert("Please type a message.");
        return;
      }

      const payload = {
        tenant_id: currentContext.tenantId,
        sender_user_id: currentContext.authUser.id,
        sender_role: "client",
        message_type: UnganiClientShared.value("messageType") || "message",
        message_body: body,
        message: body,
        body: body,
        attachment_url: UnganiClientShared.value("attachmentUrl") || null,
        is_read: false,
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString()
      };

      const response = await currentContext.supabaseClient
        .from("admin_client_messages")
        .insert(payload);

      if (response.error) {
        alert(response.error.message);
        return;
      }

      clearForm();
      UnganiClientShared.showToast("Message sent ✓");
      await loadMessages(true);
    }

    function clearForm() {
      const form = document.getElementById("chatForm");

      if (form) {
        form.reset();
      }
    }

    function scrollChatToBottom() {
      setTimeout(function () {
        const box = document.getElementById("chatBox");

        if (box) {
          box.scrollTop = box.scrollHeight;
        }
      }, 100);
    }

    function badge(text, color) {
      return `<span class="ungani-badge ${UnganiClientShared.attr(color || "blue")}">${UnganiClientShared.safe(text)}</span>`;
    }
  </script>
</body>
</html>
