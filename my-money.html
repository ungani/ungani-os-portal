<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Money Records</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="pwa-register.js"></script>
  <script src="client-shared.js" onerror="window.__unganiClientSharedFailed = true;"></script>
  <script>
    (function () {
      function showUnganiLoadError() {
        if (typeof UnganiClientShared !== "undefined") return;

        var banner = document.createElement("div");
        banner.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99999;background:#B91C1C;color:#fff;padding:12px 16px;font:14px/1.4 -apple-system,sans-serif;text-align:center;";
        banner.innerHTML = "Some page resources failed to load. Please check your connection. " +
          "<button style=\"margin-left:10px;padding:4px 12px;border:none;border-radius:6px;background:#fff;color:#B91C1C;font-weight:700;cursor:pointer;\" onclick=\"window.location.reload()\">Reload</button>";

        if (document.body) {
          document.body.prepend(banner);
        } else {
          document.addEventListener("DOMContentLoaded", function () {
            document.body.prepend(banner);
          });
        }
      }

      if (window.__unganiClientSharedFailed) {
        showUnganiLoadError();
      } else {
        setTimeout(function () {
          if (typeof UnganiClientShared === "undefined") showUnganiLoadError();
        }, 4000);
      }
    })();
  </script>
  <script src="ungani-business-config.js"></script>
  <script src="ungani-analytics.js"></script>
  <script src="ungani-presets.js"></script>
  <script src="nia-assistant.js"></script>
</head>

<body>
  <script>
    let currentContext = null;
    let businessPreset = null;
    let moneyRows = [];
    let categorySuggestions = [];
    let recurringRows = [];
    let editingMoneyId = null;
    let isRealEstate = false;
    let personOptions = [];
    let sectionOptions = [];
    let currentSectionFilter = "";
    let activeMoneyCategory = "all";
    let urlActionApplied = false;

    // Pagination: moneySummaryRows holds every row matching the current
    // tenant/section/status/search scope, but only narrow columns (not
    // select("*")) - light enough to fetch in full even at large row
    // counts. It drives the KPI totals, trend chart, expense breakdown,
    // and category tile counts (all need the WHOLE matching set to be
    // accurate, not just one page). moneyRows is the wide (select *) data
    // for only the current page's ids, fetched via .in("id", pageIds) -
    // this is what actually renders in the table and is what pagination
    // bounds.
    const MONEY_PAGE_SIZE = 50;
    let moneySummaryRows = [];
    let moneyPageOffset = 0;
    let moneyIsLoadingMore = false;
    let moneySearchDebounceTimer = null;

    const MONEY_CATEGORIES = [
      { key: "all", label: "All Records", accent: "#D4A63A", match: function () { return true; } },
      { key: "income", label: "Income", accent: "#16A34A", match: function (row) { return isIncomeRow(row); } },
      { key: "expense", label: "Expenses", accent: "#D4A63A", match: function (row) { return isExpenseRow(row) && !getRowType(row).includes("petty"); } },
      { key: "petty", label: "Petty Cash", accent: "#2563EB", match: function (row) { return getRowType(row).includes("petty"); } }
    ];

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "money",
        pageTitle: "Money Records",
        pageSubtitle: "Track income, expenses, petty cash, and business payments.",
        onReady: startMoneyPage
      });
    });

    async function startMoneyPage(context) {
      currentContext = context;

      if (window.UnganiAnalytics) {
        UnganiAnalytics.injectChartStyles();
      }

      businessPreset = UnganiPresets.getPreset(context.tenant);
      sectionOptions = businessPreset.selectedSectionLabels || [];
      currentSectionFilter = new URLSearchParams(window.location.search).get("section") || "";

      isRealEstate = detectRealEstate(context.tenant);

      const titleEl = document.querySelector(".ungani-topbar h2");
      const subEl = document.querySelector(".ungani-topbar p");

      if (titleEl) {
        titleEl.innerText = "Money Records";
      }

      if (subEl) {
        subEl.innerText = "Income, expenses, petty cash, and payment tracking for " + businessPreset.name + ".";
      }

      await loadMoneyRows();
    }

    // category_key removed - never written anywhere for transactions
    // (neither this page's own saveMoneyRecord() nor client-shared.js's
    // Quick Add flow write it; both only ever write category/category_name).
    // Same bug class as documents.type, introduced by the same commit
    // (ae27767) across all six list pages - this one hadn't been hit live
    // yet, found via a full repo sweep.
    const MONEY_SUMMARY_COLUMNS = "id, amount, transaction_type, type, category_name, category, status, transaction_date, created_at";

    // Applies the filters that scope BOTH the summary fetch and the page
    // fetch: tenant, section, status dropdown, and free-text search. Search
    // is escaped via the shared PostgREST helper since it's the one
    // user-controlled value interpolated into a filter string.
    function applyMoneyCommonFilters(query) {
      query = query.eq("tenant_id", currentContext.tenantId);

      if (currentSectionFilter) {
        query = query.eq("section_label", currentSectionFilter);
      }

      const filterStatus = getStoredOrInput("filterStatus", "ungani_money_filter_status").toLowerCase();
      if (filterStatus) {
        query = query.ilike("status", "%" + UnganiClientShared.escapePostgrestFilterValue(filterStatus) + "%");
      }

      const search = getStoredOrInput("filterSearch", "ungani_money_filter_search").trim();
      if (search) {
        query = query.or(UnganiClientShared.buildSearchOrFilter(["description", "category", "payment_method"], search));
      }

      return query;
    }

    // moneySummaryRows covers every row in the current tenant/section/status/
    // search scope (all categories), fetched with only the narrow columns
    // the KPI totals, trend chart, expense breakdown, and category tile
    // counts actually need - light enough to fetch unbounded even at large
    // row counts, unlike select("*"). Category tile selection then slices
    // this in-memory id list for the current page, and a separate .in("id",
    // pageIds) fetch pulls the full row data for just those ids.
    async function loadMoneySummaryRows() {
      let response;

      try {
        response = await applyMoneyCommonFilters(
          currentContext.supabaseClient.from("transactions").select(MONEY_SUMMARY_COLUMNS)
        ).order("created_at", { ascending: false });
      } catch (error) {
        return { error: error.message || "Network error. Please check your connection." };
      }

      if (response.error) {
        return { error: response.error.message };
      }

      moneySummaryRows = response.data || [];
      return { error: null };
    }

    function getMoneyCategoryFilteredIds() {
      const category = MONEY_CATEGORIES.find(function (item) { return item.key === activeMoneyCategory; }) || MONEY_CATEGORIES[0];
      return moneySummaryRows.filter(category.match).map(function (row) { return row.id; });
    }

    function moneyHasMoreRows() {
      return moneyPageOffset < getMoneyCategoryFilteredIds().length;
    }

    // Same id list the "X of Y record(s) shown" count and pagination
    // already use - matches every active filter (section/status/search)
    // plus the currently-selected category tile, so the export always
    // matches what's actually on screen.
    async function exportMoneyCsv() {
      await UnganiClientShared.exportRecordsToCsv({
        supabaseClient: currentContext.supabaseClient,
        table: "transactions",
        ids: getMoneyCategoryFilteredIds(),
        filenamePrefix: "money-records"
      });
    }

    // Fetches the next MONEY_PAGE_SIZE ids (from the already-loaded id list
    // above) as full rows. replace=true starts over from offset 0; false
    // appends (Load More).
    async function loadMoneyPage(replace) {
      if (replace) {
        moneyPageOffset = 0;
      }

      const allIds = getMoneyCategoryFilteredIds();
      const pageIds = allIds.slice(moneyPageOffset, moneyPageOffset + MONEY_PAGE_SIZE);

      if (!pageIds.length) {
        if (replace) moneyRows = [];
        return { error: null };
      }

      let response;

      try {
        response = await currentContext.supabaseClient
          .from("transactions")
          .select("*")
          .in("id", pageIds)
          .order("created_at", { ascending: false });
      } catch (error) {
        return { error: error.message || "Network error. Please check your connection." };
      }

      if (response.error) {
        return { error: response.error.message };
      }

      const newRows = response.data || [];
      moneyRows = replace ? newRows : moneyRows.concat(newRows);
      moneyPageOffset += pageIds.length;

      return { error: null };
    }

    async function loadMoneyRows() {
      currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading money records...");

      const summaryResult = await loadMoneySummaryRows();

      if (summaryResult.error) {
        UnganiClientShared.setContent(
          UnganiClientShared.errorCard("Could not load money records", summaryResult.error)
        );
        return;
      }

      const pageResult = await loadMoneyPage(true);

      if (pageResult.error) {
        UnganiClientShared.setContent(
          UnganiClientShared.errorCard("Could not load money records", pageResult.error)
        );
        return;
      }

      const loaders = [
        loadCategorySuggestions(),
        loadRecurringRows()
      ];

      if (isRealEstate) {
        loaders.push(loadPersonOptions());
      }

      await Promise.all(loaders);

      renderMoneyPage();
    }

    // Re-runs the summary + first-page fetch (tenant/section unchanged,
    // status/search/category may have) - used whenever a filter changes.
    async function refreshMoneyData() {
      const focusedId = document.activeElement ? document.activeElement.id : null;

      const summaryResult = await loadMoneySummaryRows();

      if (summaryResult.error) {
        UnganiClientShared.showToast("Could not update records: " + summaryResult.error);
        return;
      }

      const pageResult = await loadMoneyPage(true);

      if (pageResult.error) {
        UnganiClientShared.showToast("Could not update records: " + pageResult.error);
        return;
      }

      renderMoneyPage();

      if (focusedId) {
        const el = document.getElementById(focusedId);
        if (el && typeof el.focus === "function") el.focus();
      }
    }

    async function loadMoreMoneyRows() {
      if (moneyIsLoadingMore) return;
      moneyIsLoadingMore = true;

      const btn = document.getElementById("moneyLoadMoreBtn");
      if (btn) {
        btn.disabled = true;
        btn.innerText = "Loading...";
      }

      const result = await loadMoneyPage(false);

      moneyIsLoadingMore = false;

      if (result.error) {
        UnganiClientShared.showToast("Could not load more records: " + result.error);
        return;
      }

      renderMoneyPage();
    }

    function onMoneySearchInput() {
      saveMoneyFilters();

      if (moneySearchDebounceTimer) clearTimeout(moneySearchDebounceTimer);
      moneySearchDebounceTimer = setTimeout(refreshMoneyData, 350);
    }

    function onMoneyStatusChange() {
      saveMoneyFilters();
      refreshMoneyData();
    }

    async function loadPersonOptions() {
      try {
        // "name" removed - client_people has no such column (only
        // full_name); was silently degrading this dropdown to empty for
        // every Real Estate tenant since response.error was never checked
        // here, not a hard crash but a real, found-via-sweep bug.
        const response = await currentContext.supabaseClient
          .from("client_people")
          .select("id, full_name, person_type")
          .eq("tenant_id", currentContext.tenantId)
          .order("full_name", { ascending: true });

        personOptions = (response && response.data) || [];
      } catch (error) {
        console.warn("Person options skipped:", error.message);
        personOptions = [];
      }
    }

    function getPersonLabel(id) {
      const person = personOptions.find(function (row) {
        return String(row.id) === String(id);
      });

      if (!person) return "";

      return UnganiClientShared.getValue(person, ["full_name", "name"], "Person");
    }

    async function loadCategorySuggestions() {
      try {
        const response = await currentContext.supabaseClient.rpc("get_my_ungani_category_suggestions", {
          p_limit: 20
        });

        if (response.error) {
          console.warn("Category suggestions skipped:", response.error.message);
          categorySuggestions = [];
          return;
        }

        categorySuggestions = response.data || [];
      } catch (error) {
        console.warn("Category suggestions skipped:", error.message);
        categorySuggestions = [];
      }
    }

    async function loadRecurringRows() {
      try {
        const response = await currentContext.supabaseClient.rpc("get_my_ungani_recurring_transactions", {
          p_limit: 50
        });

        if (response.error) {
          console.warn("Recurring money skipped:", response.error.message);
          recurringRows = [];
          return;
        }

        recurringRows = response.data || [];
      } catch (error) {
        console.warn("Recurring money skipped:", error.message);
        recurringRows = [];
      }
    }

    let lastTrend = [];
    let lastExpenseBreakdown = [];

    function renderMoneyPage() {
      const filteredRows = getFilteredRows();
      const category = MONEY_CATEGORIES.find(function (item) { return item.key === activeMoneyCategory; }) || MONEY_CATEGORIES[0];
      const summaryScopeRows = moneySummaryRows.filter(category.match);
      const summary = calculateMoneySummary(summaryScopeRows);
      const expenseBreakdown = calculateExpenseBreakdown(summaryScopeRows);
      const trend = calculateIncomeExpenseTrend(summaryScopeRows);

      lastTrend = trend;
      lastExpenseBreakdown = expenseBreakdown;

      UnganiClientShared.setContent(`
        <style>

            grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
            gap: 18px;
            align-items: stretch;
          }

          .money-preset-box {
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.09);
            border-radius: 24px;
            padding: 18px;
          }

          .money-preset-box h3 {
            color: white;
            margin: 0 0 8px;
          }

          .money-preset-box p {
            color: rgba(255,255,255,0.74);
            margin: 0;
            line-height: 1.55;
          }

          .money-chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
          }

          .money-chip {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 8px 11px;
            background: rgba(255,255,255,0.12);
            color: white;
            font-size: 12px;
            font-weight: 850;
          }

          .money-kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 18px;
          }

          .money-kpi-card {

            overflow: hidden;
            border-radius: 24px;

            box-shadow: var(--ungani-shadow);

            min-height: 140px;
          }

          .money-kpi-card::before {
            content: "";

            bottom: 18px;

          }

          .money-kpi-card span {
            color: var(--ungani-muted);

            font-weight: 950;
            text-transform: uppercase;
            letter-spacing: 0.055em;
          }

          .money-kpi-card h3 {
            margin: 17px 0 8px;
            font-size: clamp(25px, 3vw, 36px);
            line-height: 1;
            letter-spacing: -0.055em;
            overflow-wrap: anywhere;
          }

          .money-kpi-card p {
            margin: 0;
            color: var(--ungani-muted);
            font-size: 13px;
          }

          .money-form-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
          }

          .money-form-grid .wide {
            grid-column: span 3;
          }

          .money-main-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(320px, 0.52fr);
            gap: 18px;
            align-items: start;
          }

          .money-chart-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 18px;

          }

          .money-category-section {

            cursor: pointer;
          }

          .category-pill:hover {
            border-color: rgba(212,166,58,0.65);
          }

          .money-table-wrap {
            overflow-x: auto;
          }

          .money-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 860px;
          }

          .money-table th {
            text-align: left;
            color: var(--ungani-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 13px 12px;
            border-bottom: 1px solid var(--ungani-border);
          }

          .money-table td {
            padding: 14px 12px;
            border-bottom: 1px solid var(--ungani-border);
            vertical-align: top;
          }

          .money-table td:first-child {
            border-left: 4px solid var(--accent, #64748B);
          }

            box-shadow: 0 0 0 2px var(--tile-accent, var(--ungani-gold));
          }

            display: block;
            font-size: 22px;
            font-weight: 900;
            color: var(--ungani-text);
          }

          .category-tile .tile-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--ungani-muted);
            margin-top: 4px;
          }

          .money-table tbody tr {
            cursor: pointer;
          }

          .insights-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            width: 100%;
            text-align: left;
            background: var(--ungani-card);
            border: 1px solid var(--ungani-border);
            border-left: 6px solid var(--ungani-gold);
            border-radius: 20px;
            padding: 16px 18px;
            margin-bottom: 18px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.18s ease;
          }

          .insights-banner:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px var(--ungani-shadow);
          }

          .insights-banner strong {
            font-size: 16px;
            color: var(--ungani-text);
          }

          .insights-banner .insights-sub {
            display: block;
            margin-top: 3px;
            color: var(--ungani-muted);
            font-size: 13px;
          }

          .insights-banner .insights-cta {
            color: var(--ungani-gold);
            font-weight: 800;
            font-size: 13px;
            white-space: nowrap;
          }

          @media (max-width: 1180px) {
            .money-hero-grid,
            .money-main-grid,
            .money-chart-grid {
              grid-template-columns: 1fr;
            }

            .money-kpi-grid,
            .money-category-section {
              grid-template-columns: repeat(2, minmax(0, 1fr));
            }
          }

          @media (max-width: 720px) {
            .money-kpi-grid,
            .money-category-section,
            .money-form-grid {
              grid-template-columns: 1fr;
            }

            .money-form-grid .wide {
              grid-column: span 1;
            }
          }
        </style>

        <section class="ungani-card ungani-hero">
          <div class="money-hero-grid">
            <div>
              <span class="ungani-badge gold">${UnganiClientShared.safe(businessPreset.name)}</span>
              <h2 style="font-size:clamp(32px,4vw,52px);line-height:1.02;margin:18px 0 12px;">
                Money records that match your business.
              </h2>
              <p>
                Track income, expenses, petty cash, payment status, and category breakdowns using presets for ${UnganiClientShared.safe(businessPreset.name)}.
              </p>

              <div class="ungani-button-row">
                <button class="ungani-btn gold" onclick="openMoneyModal()">Add Money Record</button>
                <button class="ungani-btn green" onclick="loadMoneyRows()">Refresh</button>
                <a class="ungani-btn light" href="my-charts.html">View Charts</a>
              </div>

              ${renderSectionSwitcher()}
            </div>

            <div class="money-preset-box">
              <h3>Business preset active</h3>
              <p>The category options on this page now adapt to the business type selected by the client.</p>

              <div class="money-chip-row">
                ${businessPreset.incomeCategories.slice(0, 3).map(function (item) {
                  return `<span class="money-chip">${UnganiClientShared.safe(item)}</span>`;
                }).join("")}

                ${businessPreset.expenseCategories.slice(0, 3).map(function (item) {
                  return `<span class="money-chip">${UnganiClientShared.safe(item)}</span>`;
                }).join("")}
              </div>
            </div>
          </div>
        </section>

        ${renderCategoryTiles()}

        <section class="money-kpi-grid">
          ${moneyKpi("Income", UnganiAnalytics.compactMoney(summary.income), summaryScopeRows.filter(isIncomeRow).length + " income record(s)", "#16A34A")}
          ${moneyKpi("Expenses", UnganiAnalytics.compactMoney(summary.expenses), summaryScopeRows.filter(isExpenseRow).length + " expense record(s)", "#D4A63A")}
          ${moneyKpi("Balance", UnganiAnalytics.compactMoney(summary.balance), "Income minus expenses", summary.balance >= 0 ? "#16A34A" : "#DC2626")}
          ${moneyKpi("Pending", UnganiAnalytics.compactMoney(summary.pending), "Pending money records", "#DC2626")}
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>Filters</h3>
              <p class="ungani-small">Search and filter this business money view.</p>
            </div>

            <button class="ungani-btn dark" onclick="resetMoneyFilters()">Reset Filters</button>
          </div>

          <div class="money-form-grid">
            <div>
              <label for="filterStatus">Status</label>
              <select id="filterStatus" onchange="onMoneyStatusChange();">
                <option value="">All Status</option>
                <option value="completed">Completed</option>
                <option value="pending">Pending</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>

            <div>
              <label for="filterSearch">Search</label>
              <input id="filterSearch" placeholder="Search category, notes, payment method..." oninput="onMoneySearchInput();" />
            </div>

    async function applyUrlActions() {
      if (urlActionApplied) return;

      const params = new URLSearchParams(window.location.search);
      const highlightId = params.get("highlight");
      const action = params.get("action");

      if (highlightId) {
        let row = moneyRows.find(function (item) { return String(item.id) === String(highlightId); });

        // With pagination, a deep-linked record (e.g. from a notification)
        // may not be on the currently loaded page - fetch it directly
        // rather than silently failing to open it.
        if (!row) {
          try {
            const lookup = await currentContext.supabaseClient
              .from("transactions")
              .select("*")
              .eq("id", highlightId)
              .eq("tenant_id", currentContext.tenantId)
              .maybeSingle();

            if (lookup.data) {
              row = lookup.data;
              moneyRows = [row].concat(moneyRows);
            }
          } catch (error) {
            console.warn("Highlight lookup failed:", error.message);
          }
        }

        if (row) {
          urlActionApplied = true;
          setTimeout(function () { openMoneyModal(highlightId); }, 250);
          return;
        }
      }

      if (action === "add") {
        urlActionApplied = true;
        const presetType = params.get("type") || "income";
        setTimeout(function () { openMoneyModal(null, { type: presetType }); }, 250);
      }
    }

    async function createRecurringTransaction(event) {
      event.preventDefault();

      if (
        window.UnganiClientShared &&
        typeof UnganiClientShared.ensureCanWrite === "function" &&
        !UnganiClientShared.ensureCanWrite("recurring money")
      ) {
        return;
      }

      const amount = Number(UnganiClientShared.value("recurringAmount") || 0);
      const category = UnganiClientShared.value("recurringCategory");
      const nextDate = UnganiClientShared.value("recurringNextDate") || new Date().toISOString().slice(0, 10);
      const autoCreate = document.getElementById("recurringAutoCreate") ? document.getElementById("recurringAutoCreate").checked : false;

      if (!amount || amount <= 0) {
        UnganiClientShared.showToast("Enter a valid recurring amount.");
        return;
      }

      if (!category) {
        UnganiClientShared.showToast("Choose a recurring category.");
        return;
      }

      try {
        const response = await currentContext.supabaseClient.rpc("create_my_ungani_recurring_transaction", {
          p_transaction_type: UnganiClientShared.value("recurringType") || "expense",
          p_category_name: category,
          p_amount: amount,
          p_frequency: UnganiClientShared.value("recurringFrequency") || "monthly",
          p_next_run_date: nextDate,
          p_payment_method: UnganiClientShared.value("recurringMethod") || null,
          p_notes: UnganiClientShared.value("recurringNotes") || null,
          p_reminder_only: !autoCreate,
          p_auto_create: autoCreate
        });

        if (response.error) {
          UnganiClientShared.showToast("Could not create recurring money: " + response.error.message);
          return;
        }

        const result = response.data || {};

        if (result.ok === false) {
          UnganiClientShared.showToast(result.message || "Could not create recurring money.");
          return;
        }

        UnganiClientShared.showToast(result.message || "Recurring money created ✓");
        clearRecurringForm();
        await loadMoneyRows();
        openInsightsModal();
      } catch (error) {
        UnganiClientShared.showToast("Could not create recurring money: " + error.message);
      }
    }

      let pending = 0;

      rows.forEach(function (row) {
        const amount = Number(UnganiClientShared.getValue(row, ["amount"], 0) || 0);
        const status = String(UnganiClientShared.getValue(row, ["status"], "completed")).toLowerCase();

        if (isIncomeRow(row)) {
          income += amount;
        } else if (isExpenseRow(row)) {
          expenses += amount;
        }

        if (status.includes("pending")) {
          pending += amount;
        }
      });

      return {
        income,
        expenses,
        pending,
        balance: income - expenses
      };
    }

    function calculateIncomeExpenseTrend(rows) {
      if (window.UnganiAnalytics && UnganiAnalytics.calculateIncomeExpenseTrend) {
        return UnganiAnalytics.calculateIncomeExpenseTrend(rows);
      }

      return [];
    }

    function calculateExpenseBreakdown(rows) {
      if (window.UnganiAnalytics && UnganiAnalytics.calculateExpenseBreakdown) {
        return UnganiAnalytics.calculateExpenseBreakdown(rows);
      }

      return [];
    }

    // Status/search/section are already applied server-side (in
    // loadMoneySummaryRows/loadMoneyPage), so moneySummaryRows and moneyRows
    // only need the category slice applied here for tile counts/rendering.
    function getFilteredRows() {
      return moneyRows;
    }

    async function selectMoneyCategory(key) {
      activeMoneyCategory = key;

      const result = await loadMoneyPage(true);

      if (result.error) {
        UnganiClientShared.showToast("Could not load category: " + result.error);
        return;
      }

      renderMoneyPage();
    }

    function renderCategoryTiles() {
      return `
        <section class="category-tiles">
          ${MONEY_CATEGORIES.map(function (category) {
            const count = moneySummaryRows.filter(category.match).length;
            const active = category.key === activeMoneyCategory ? " active" : "";

            return `
              <button type="button" class="category-tile${active}" style="--tile-accent:${category.accent};" onclick="selectMoneyCategory('${category.key}')">
                <span class="tile-count">${count}</span>
                <span class="tile-label">${UnganiClientShared.safe(category.label)}</span>
              </button>
            `;
          }).join("")}
        </section>
      `;
    }

    function getStoredOrInput(inputId, storageKey) {
      const el = document.getElementById(inputId);

      if (el) {
        return String(el.value || "").trim();
      }

      return String(sessionStorage.getItem(storageKey) || "").trim();
    }

    function saveMoneyFilters() {
      if (document.getElementById("filterStatus")) sessionStorage.setItem("ungani_money_filter_status", UnganiClientShared.value("filterStatus"));
      if (document.getElementById("filterSearch")) sessionStorage.setItem("ungani_money_filter_search", UnganiClientShared.value("filterSearch"));
    }

    function restoreMoneyFilters() {
      if (document.getElementById("filterStatus")) document.getElementById("filterStatus").value = sessionStorage.getItem("ungani_money_filter_status") || "";
      if (document.getElementById("filterSearch")) document.getElementById("filterSearch").value = sessionStorage.getItem("ungani_money_filter_search") || "";
    }

    function resetMoneyFilters() {
      sessionStorage.removeItem("ungani_money_filter_status");
      sessionStorage.removeItem("ungani_money_filter_search");
      activeMoneyCategory = "all";

      // Clear the live input values too, not just sessionStorage -
      // applyMoneyCommonFilters() reads the DOM element first, so a term
      // still sitting in the search box would otherwise still be applied
      // to the very refetch this triggers, until the next re-render.
      const statusEl = document.getElementById("filterStatus");
      const searchEl = document.getElementById("filterSearch");
      if (statusEl) statusEl.value = "";
      if (searchEl) searchEl.value = "";

      refreshMoneyData();
      UnganiClientShared.showToast("Money filters reset ✓");
    }

    function updateCategoryOptions() {
      const typeEl = document.getElementById("moneyType");
      const categoryEl = document.getElementById("moneyCategory");

      if (!typeEl || !categoryEl || !businessPreset) return;

      const type = String(typeEl.value || "income").toLowerCase();
      const current = categoryEl.value;

      let categories = businessPreset.incomeCategories;

      if (type.includes("expense") || type.includes("petty")) {
        categories = businessPreset.expenseCategories;
      }

      categoryEl.innerHTML = categories.map(function (item) {
        return `<option value="${UnganiClientShared.attr(item)}">${UnganiClientShared.safe(item)}</option>`;
      }).join("");

      if (current) {
        categoryEl.value = current;
      }
    }

    function quickCategory(type, category) {
      openMoneyModal(null, { type: type === "income" ? "income" : "expense", category: category });
      UnganiClientShared.showToast("Category selected ✓");
    }

    function openMoneyModal(id, presetValues) {
      const row = id ? moneyRows.find(function (item) { return String(item.id) === String(id); }) : null;

      if (id && !row) {
        UnganiClientShared.showToast("Record not found.");
        return;
      }

      editingMoneyId = row ? row.id : null;

      const bodyHtml = `
        <form onsubmit="saveMoneyRecord(event)">
          <div class="money-form-grid">
            <div>
              <label for="moneyType">Type</label>
              <select id="moneyType" onchange="updateCategoryOptions()">
                <option value="income">Income</option>
                <option value="expense">Expense</option>
                <option value="petty_cash">Petty Cash</option>
              </select>
            </div>

            <div>
              <label for="moneyCategory">Category</label>
              <select id="moneyCategory"></select>
            </div>

            <div>
              <label for="moneyAmount">Amount</label>
              <input id="moneyAmount" type="number" step="0.01" min="0" placeholder="Example: 50000" required value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row, ["amount"], "")) : ""}" />
            </div>

            <div>
              <label for="moneyDate">Date</label>
              <input id="moneyDate" type="date" value="${row ? UnganiClientShared.attr(String(UnganiClientShared.getValue(row, ["transaction_date", "created_at"], "")).slice(0, 10)) : ""}" />
            </div>

            <div>
              <label for="moneyMethod">Payment Method</label>
              <select id="moneyMethod">
                <option value="">Select Method</option>
                <option value="M-Pesa">M-Pesa</option>
                <option value="Bank Transfer">Bank Transfer</option>
                <option value="Cash">Cash</option>
                <option value="Card">Card</option>
                <option value="Cheque">Cheque</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <div>
              <label for="moneyStatus">Status</label>
              <select id="moneyStatus">
                <option value="completed">Completed</option>
                <option value="pending">Pending</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>

            ${isRealEstate ? `
              <div>
                <label for="moneyRelatedPerson">Related Tenant / Person</label>
                <select id="moneyRelatedPerson">
                  <option value="">Not linked</option>
                  ${personOptions.map(function (person) {
                    const label = UnganiClientShared.getValue(person, ["full_name", "name"], "Person");
                    return `<option value="${UnganiClientShared.attr(person.id)}">${UnganiClientShared.safe(label)}</option>`;
                  }).join("")}
                </select>
              </div>
            ` : ""}

            ${sectionOptions.length > 1 ? `
              <div>
                <label for="moneySection">Section</label>
                <select id="moneySection">
                  ${sectionOptions.map(function (label) {
                    return `<option value="${UnganiClientShared.attr(label)}">${UnganiClientShared.safe(label)}</option>`;
                  }).join("")}
                </select>
              </div>
            ` : ""}

            <div class="wide">
              <label for="moneyNotes">Notes</label>
              <textarea id="moneyNotes" rows="4" placeholder="Example: Client payment, supplier invoice, fuel expense, service income...">${row ? UnganiClientShared.safe(UnganiClientShared.getValue(row, ["notes", "description"], "")) : ""}</textarea>
            </div>
          </div>

          <div id="moneyWarningBox" class="money-warning-box">
            <strong>Money record warning</strong>
            <p id="moneyWarningText"></p>
          </div>

          <div class="ungani-button-row" style="margin-top:16px;">
            <button class="ungani-btn gold" type="submit">${row ? "Update Record" : "Save Record"}</button>
            ${row ? `<button class="ungani-btn red" type="button" onclick="deleteMoneyRecord('${UnganiClientShared.attr(row.id)}')">Delete</button>` : ""}
            <button class="ungani-btn dark" type="button" onclick="UnganiClientShared.closeModal()">Cancel</button>
          </div>
        </form>
      `;

      UnganiClientShared.openModal({
        title: row ? "Edit Money Record" : "Add Money Record",
        bodyHtml: bodyHtml,
        onOpen: function () {
          document.getElementById("moneyType").value = row ? getRowType(row) : ((presetValues && presetValues.type) || "income");
          updateCategoryOptions();

          document.getElementById("moneyCategory").value = row
            ? UnganiClientShared.getValue(row, ["category_name", "category", "category_key"], "")
            : ((presetValues && presetValues.category) || "");

          document.getElementById("moneyMethod").value = row ? UnganiClientShared.getValue(row, ["payment_method"], "") : "";
          document.getElementById("moneyStatus").value = row ? UnganiClientShared.getValue(row, ["status"], "completed") : "completed";

          if (isRealEstate && document.getElementById("moneyRelatedPerson")) {
            document.getElementById("moneyRelatedPerson").value = row ? UnganiClientShared.getValue(row, ["related_person_id"], "") : "";
          }

          if (sectionOptions.length > 1 && document.getElementById("moneySection")) {
            document.getElementById("moneySection").value = row
              ? UnganiClientShared.getValue(row, ["section_label"], "")
              : (currentSectionFilter || sectionOptions[0] || "");
          }

          hideMoneyWarning();
        }
      });
    }

    async function saveMoneyRecord(event) {
      event.preventDefault();

      hideMoneyWarning();

      if (
        window.UnganiClientShared &&
        typeof UnganiClientShared.ensureCanWrite === "function" &&
        !UnganiClientShared.ensureCanWrite("money record")
      ) {
        return;
      }

      const amount = Number(UnganiClientShared.value("moneyAmount") || 0);
      const category = UnganiClientShared.value("moneyCategory");
      const transactionDate = UnganiClientShared.value("moneyDate") || new Date().toISOString().slice(0, 10);
      const transactionType = UnganiClientShared.value("moneyType") || "income";

      if (!amount || amount <= 0) {
        showMoneyWarning("Enter a valid amount before saving.");
        UnganiClientShared.showToast("Enter a valid amount.");
        return;
      }

      if (!category || category.toLowerCase() === "uncategorized") {
        showMoneyWarning("Please choose a clear category so your reports and charts stay accurate.");
        UnganiClientShared.showToast("Choose a category before saving.");
        return;
      }

      if (!transactionDate) {
        showMoneyWarning("Please select a transaction date before saving.");
        UnganiClientShared.showToast("Choose a date before saving.");
        return;
      }

      const duplicateOk = await confirmDuplicateIfNeeded(amount, category, transactionDate);

      if (!duplicateOk) {
        return;
      }

      const unusualOk = await confirmUnusualAmountIfNeeded(amount, transactionType, category);

      if (!unusualOk) {
        return;
      }

      const broadType = transactionType === "income" ? "income" : "expense";

const payload = {
  tenant_id: currentContext.tenantId,
  type: broadType,
  transaction_type: transactionType,
  category: category,
  amount: amount,
  transaction_date: transactionDate,
  payment_method: UnganiClientShared.value("moneyMethod") || null,
  status: UnganiClientShared.value("moneyStatus") || "completed",
  description: UnganiClientShared.value("moneyNotes") || null,
  updated_at: new Date().toISOString()
};

      if (isRealEstate) {
        payload.related_person_id = UnganiClientShared.value("moneyRelatedPerson") || null;
      }

      if (sectionOptions.length > 1) {
        payload.section_label = UnganiClientShared.value("moneySection") || null;
      }

      let response;

      try {
        if (editingMoneyId) {
          response = await currentContext.supabaseClient
            .from("transactions")
            .update(payload)
            .eq("id", editingMoneyId)
            .eq("tenant_id", currentContext.tenantId);
        } else {
          payload.created_at = new Date().toISOString();

          response = await currentContext.supabaseClient
            .from("transactions")
            .insert([payload]);
        }
      } catch (error) {
        UnganiClientShared.showToast("Could not save record: " + (error.message || "Network error. Please check your connection."));
        return;
      }

      if (response.error) {
        UnganiClientShared.showToast("Could not save record: " + response.error.message);
        return;
      }

      UnganiClientShared.showToast(editingMoneyId ? "Money record updated ✓" : "Money record added ✓");
      editingMoneyId = null;
      UnganiClientShared.closeModal();
      await loadMoneyRows();
    }

    async function confirmDuplicateIfNeeded(amount, category, transactionDate) {
      try {
        const response = await currentContext.supabaseClient.rpc("check_my_ungani_duplicate_transaction", {
          p_amount: amount,
          p_category: category,
          p_transaction_date: transactionDate,
          p_exclude_id: editingMoneyId || null
        });

        if (response.error) {
          console.warn("Duplicate check skipped:", response.error.message);
          return true;
        }

        const result = response.data;

        if (result && result.is_duplicate === true) {
          const message = result.message || "This looks similar to another entry added recently. Please confirm it is not a duplicate.";
          showMoneyWarning(message);

          return confirm(message + "\n\nDo you still want to save this money record?");
        }
      } catch (error) {
        console.warn("Duplicate check skipped:", error.message);
      }

      return true;
    }

    async function confirmUnusualAmountIfNeeded(amount, transactionType, category) {
      try {
        const response = await currentContext.supabaseClient.rpc("check_my_ungani_unusual_transaction_amount", {
          p_amount: amount,
          p_transaction_type: transactionType,
          p_category: category
        });

        if (response.error) {
          console.warn("Unusual amount check skipped:", response.error.message);
          return true;
        }

        const result = response.data;

        if (result && result.is_unusual === true) {
          const message = result.message || "This amount looks unusual compared to past records. Please confirm it is correct.";
          const average = result.average_amount ? "\nAverage amount: KSh " + Number(result.average_amount).toLocaleString("en-KE") : "";
          const highest = result.highest_previous_amount ? "\nHighest previous amount: KSh " + Number(result.highest_previous_amount).toLocaleString("en-KE") : "";
          const entered = result.entered_amount ? "\nEntered amount: KSh " + Number(result.entered_amount).toLocaleString("en-KE") : "";

          showMoneyWarning(message);

          return confirm(message + average + highest + entered + "\n\nDo you still want to save this money record?");
        }
      } catch (error) {
        console.warn("Unusual amount check skipped:", error.message);
      }

      return true;
    }

    function showMoneyWarning(message) {
      const box = document.getElementById("moneyWarningBox");
      const text = document.getElementById("moneyWarningText");

      if (!box || !text) {
        return;
      }

      text.textContent = message || "Please confirm this money record before saving.";
      box.style.display = "block";
    }

    function hideMoneyWarning() {
      const box = document.getElementById("moneyWarningBox");
      const text = document.getElementById("moneyWarningText");

      if (text) {
        text.textContent = "";
      }

      if (box) {
        box.style.display = "none";
      }
    }

    async function deleteMoneyRecord(id) {
      if (
        window.UnganiClientShared &&
        typeof UnganiClientShared.ensureCanWrite === "function" &&
        !UnganiClientShared.ensureCanWrite("delete money record")
      ) {
        return;
      }

      const confirmed = confirm("Move this money record to Recently Deleted? You can restore it within 30 days.");

      if (!confirmed) return;

      try {
        const response = await currentContext.supabaseClient.rpc("soft_delete_ungani_record", {
          p_table_name: "transactions",
          p_record_id: id,
          p_delete_reason: "Deleted from Money Records page"
        });

        if (response.error) {
          UnganiClientShared.showToast("Could not delete record: " + response.error.message);
          return;
        }

        const result = response.data || {};

        if (result.ok === false) {
          UnganiClientShared.showToast(result.message || "Could not delete record.");
          return;
        }

        UnganiClientShared.showToast(result.message || "Money record moved to Recently Deleted ✓");
        UnganiClientShared.logAuditEvent("record_deleted", { entityType: "transactions", entityId: String(id), description: "Deleted from Money Records page" });
        editingMoneyId = null;
        UnganiClientShared.closeModal();
        await loadMoneyRows();
      } catch (error) {
        UnganiClientShared.showToast("Could not delete record: " + error.message);
      }
    }

    function getRowType(row) {
      return String(UnganiClientShared.getValue(row, ["transaction_type", "type"], "income")).toLowerCase();
    }

    function isIncomeRow(row) {
      const type = getRowType(row);

      return (
        type.includes("income") ||
        type.includes("sale") ||
        type.includes("rental") ||
        type.includes("revenue") ||
        type.includes("deposit") ||
        type.includes("payment") ||
        type.includes("fee")
      );
    }

    function isExpenseRow(row) {
      const type = getRowType(row);

      return (
        type.includes("expense") ||
        type.includes("petty") ||
        type.includes("cost") ||
        type.includes("commission") ||
        type.includes("maintenance")
      );
    }

    function typeBadge(type) {
      const lower = String(type || "").toLowerCase();

      if (lower.includes("income") || lower.includes("sale") || lower.includes("payment") || lower.includes("fee")) {
        return `<span class="ungani-badge green">${UnganiClientShared.safe(UnganiAnalytics.toTitle(type))}</span>`;
      }

      if (lower.includes("petty")) {
        return `<span class="ungani-badge gold">Petty Cash</span>`;
      }

      return `<span class="ungani-badge gold">${UnganiClientShared.safe(UnganiAnalytics.toTitle(type))}</span>`;
    }

    function statusBadge(status) {
      const lower = String(status || "").toLowerCase();

      if (lower.includes("completed") || lower.includes("paid") || lower.includes("cleared")) {
        return `<span class="ungani-badge green">${UnganiClientShared.safe(UnganiAnalytics.toTitle(status))}</span>`;
      }

      if (lower.includes("cancelled") || lower.includes("failed")) {
        return `<span class="ungani-badge red">${UnganiClientShared.safe(UnganiAnalytics.toTitle(status))}</span>`;
      }

      return `<span class="ungani-badge gold">${UnganiClientShared.safe(UnganiAnalytics.toTitle(status || "pending"))}</span>`;
    }

    function statusAccent(status) {
      const lower = String(status || "").toLowerCase();

      if (lower.includes("completed") || lower.includes("paid") || lower.includes("cleared")) return "#16A34A";
      if (lower.includes("cancelled") || lower.includes("failed")) return "#DC2626";

      return "#D4A63A";
    }

    function renderSectionSwitcher() {
      if (sectionOptions.length <= 1) return "";

      const pills = [{ label: "All Sections", value: "" }].concat(
        sectionOptions.map(function (label) { return { label: label, value: label }; })
      );

      return `
        <div class="ungani-button-row" style="margin-top:10px;">
          ${pills.map(function (pill) {
            const active = currentSectionFilter === pill.value;
            return `<button class="ungani-btn ${active ? "gold" : "dark"}" type="button" onclick="switchSection('${UnganiClientShared.attr(pill.value)}')">${UnganiClientShared.safe(pill.label)}</button>`;
          }).join("")}
        </div>
      `;
    }

    function switchSection(value) {
      const url = new URL(window.location.href);

      if (value) {
        url.searchParams.set("section", value);
      } else {
        url.searchParams.delete("section");
      }

      window.location.href = url.toString();
    }

    function detectRealEstate(tenant) {
      if (window.UnganiBusinessConfig && typeof UnganiBusinessConfig.resolve === "function") {
        const matched = UnganiBusinessConfig.resolve(tenant);
        if (matched) return matched.key === "real_estate";
      }

      const businessType = String(UnganiClientShared.getValue(tenant, ["business_type", "business_type_key"], "")).toLowerCase();
      const businessTypeKey = String(UnganiClientShared.getValue(tenant, ["business_type_key"], "")).toLowerCase();

      return businessType.includes("real estate") || businessTypeKey.includes("real_estate");
    }
  </script>
</body>
