<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Money Records</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-shared.js" onerror="window.__unganiClientSharedFailed = true;"></script>
  <script>
    (function () {
      function showUnganiLoadError() {
        if (typeof UnganiClientShared !== "undefined") return;

        var banner = document.createElement("div");
        banner.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99999;background:#B91C1C;color:#fff;padding:12px 16px;font:14px/1.4 -apple-system,sans-serif;text-align:center;";
        banner.innerHTML = "Some page resources failed to load. Please check your connection. " +
          "<button style=\"margin-left:10px;padding:4px 12px;border:none;border-radius:6px;background:#fff;color:#B91C1C;font-weight:700;cursor:pointer;\" onclick=\"window.location.reload()\">Reload</button>";

        if (document.body) {
          document.body.prepend(banner);
        } else {
          document.addEventListener("DOMContentLoaded", function () {
            document.body.prepend(banner);
          });
        }
      }

      if (window.__unganiClientSharedFailed) {
        showUnganiLoadError();
      } else {
        setTimeout(function () {
          if (typeof UnganiClientShared === "undefined") showUnganiLoadError();
        }, 4000);
      }
    })();
  </script>
  <script src="ungani-analytics.js"></script>
  <script src="ungani-presets.js"></script>
</head>

<body>
  <script>
    let currentContext = null;
    let businessPreset = null;
    let moneyRows = [];
    let categorySuggestions = [];
    let recurringRows = [];
    let editingMoneyId = null;

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "money",
        pageTitle: "Money Records",
        pageSubtitle: "Track income, expenses, petty cash, and business payments.",
        onReady: startMoneyPage
      });
    });

    async function startMoneyPage(context) {
      currentContext = context;

      if (window.UnganiAnalytics) {
        UnganiAnalytics.injectChartStyles();
      }

      businessPreset = UnganiPresets.getPreset(context.tenant);

      const titleEl = document.querySelector(".ungani-topbar h2");
      const subEl = document.querySelector(".ungani-topbar p");

      if (titleEl) {
        titleEl.innerText = "Money Records";
      }

      if (subEl) {
        subEl.innerText = "Income, expenses, petty cash, and payment tracking for " + businessPreset.name + ".";
      }

      await loadMoneyRows();
    }

    async function loadMoneyRows() {
      currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading money records...");

      let response;

      try {
        response = await currentContext.supabaseClient
          .from("transactions")
          .select("*")
          .eq("tenant_id", currentContext.tenantId)
          .order("created_at", { ascending: false });
      } catch (error) {
        UnganiClientShared.setContent(
          UnganiClientShared.errorCard("Could not load money records", error.message || "Network error. Please check your connection.")
        );
        return;
      }

      if (response.error) {
        UnganiClientShared.setContent(
          UnganiClientShared.errorCard("Could not load money records", response.error.message)
        );
        return;
      }

      moneyRows = response.data || [];

      await Promise.all([
        loadCategorySuggestions(),
        loadRecurringRows()
      ]);

      renderMoneyPage();
    }

    async function loadCategorySuggestions() {
      try {
        const response = await currentContext.supabaseClient.rpc("get_my_ungani_category_suggestions", {
          p_limit: 20
        });

        if (response.error) {
          console.warn("Category suggestions skipped:", response.error.message);
          categorySuggestions = [];
          return;
        }

        categorySuggestions = response.data || [];
      } catch (error) {
        console.warn("Category suggestions skipped:", error.message);
        categorySuggestions = [];
      }
    }

    async function loadRecurringRows() {
      try {
        const response = await currentContext.supabaseClient.rpc("get_my_ungani_recurring_transactions", {
          p_limit: 50
        });

        if (response.error) {
          console.warn("Recurring money skipped:", response.error.message);
          recurringRows = [];
          return;
        }

        recurringRows = response.data || [];
      } catch (error) {
        console.warn("Recurring money skipped:", error.message);
        recurringRows = [];
      }
    }

    function renderMoneyPage() {
      const filteredRows = getFilteredRows();
      const summary = calculateMoneySummary(filteredRows);
      const expenseBreakdown = calculateExpenseBreakdown(filteredRows);
      const trend = calculateIncomeExpenseTrend(filteredRows);

      UnganiClientShared.setContent(`
        <style>
          .money-hero-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
            gap: 18px;
            align-items: stretch;
          }

          .money-preset-box {
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.09);
            border-radius: 24px;
            padding: 18px;
          }

          .money-preset-box h3 {
            color: white;
            margin: 0 0 8px;
          }

          .money-preset-box p {
            color: rgba(255,255,255,0.74);
            margin: 0;
            line-height: 1.55;
          }

          .money-chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
          }

          .money-chip {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 8px 11px;
            background: rgba(255,255,255,0.12);
            color: white;
            font-size: 12px;
            font-weight: 850;
          }

          .money-kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 18px;
          }

          .money-kpi-card {
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            background: var(--ungani-card);
            border: 1px solid var(--ungani-border);
            box-shadow: var(--ungani-shadow);
            padding: 20px;
            min-height: 140px;
          }

          .money-kpi-card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 18px;
            bottom: 18px;
            width: 5px;
            border-radius: 0 999px 999px 0;
            background: var(--accent);
          }

          .money-kpi-card span {
            color: var(--ungani-muted);
            font-size: 12px;
            font-weight: 950;
            text-transform: uppercase;
            letter-spacing: 0.055em;
          }

          .money-kpi-card h3 {
            margin: 17px 0 8px;
            font-size: clamp(25px, 3vw, 36px);
            line-height: 1;
            letter-spacing: -0.055em;
            overflow-wrap: anywhere;
          }

          .money-kpi-card p {
            margin: 0;
            color: var(--ungani-muted);
            font-size: 13px;
          }

          .money-form-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
          }

          .money-form-grid .wide {
            grid-column: span 3;
          }

          .money-main-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(320px, 0.52fr);
            gap: 18px;
            align-items: start;
          }

          .money-chart-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 18px;
            margin-bottom: 18px;
            align-items: start;
          }

          .money-category-section {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
          }

          .category-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
          }

          .category-pill {
            border: 1px solid var(--ungani-border);
            background: var(--ungani-soft);
            color: var(--ungani-text);
            border-radius: 999px;
            padding: 8px 11px;
            font-size: 12px;
            font-weight: 850;
            cursor: pointer;
          }

          .category-pill:hover {
            border-color: rgba(212,166,58,0.65);
          }

          .money-table-wrap {
            overflow-x: auto;
          }

          .money-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 860px;
          }

          .money-table th {
            text-align: left;
            color: var(--ungani-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 13px 12px;
            border-bottom: 1px solid var(--ungani-border);
          }

          .money-table td {
            padding: 14px 12px;
            border-bottom: 1px solid var(--ungani-border);
            vertical-align: top;
          }

          .money-table tr:hover td {
            background: var(--ungani-soft);
          }

          .money-amount {
            font-weight: 950;
            white-space: nowrap;
          }

          .money-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
          }

          .money-warning-box {
            display: none;
            margin-top: 14px;
            padding: 14px 15px;
            border-radius: 18px;
            border: 1px solid rgba(212,166,58,0.45);
            background: rgba(212,166,58,0.12);
            color: var(--ungani-text);
          }

          .money-warning-box strong {
            display: block;
            margin-bottom: 4px;
          }

          .money-warning-box p {
            margin: 0;
            color: var(--ungani-muted);
            font-size: 13px;
            line-height: 1.5;
          }

          @media (max-width: 1180px) {
            .money-hero-grid,
            .money-main-grid,
            .money-chart-grid {
              grid-template-columns: 1fr;
            }

            .money-kpi-grid,
            .money-category-section {
              grid-template-columns: repeat(2, minmax(0, 1fr));
            }
          }

          @media (max-width: 720px) {
            .money-kpi-grid,
            .money-category-section,
            .money-form-grid {
              grid-template-columns: 1fr;
            }

            .money-form-grid .wide {
              grid-column: span 1;
            }
          }
        </style>

        <section class="ungani-card ungani-hero">
          <div class="money-hero-grid">
            <div>
              <span class="ungani-badge gold">${UnganiClientShared.safe(businessPreset.name)}</span>
              <h2 style="font-size:clamp(32px,4vw,52px);line-height:1.02;margin:18px 0 12px;">
                Money records that match your business.
              </h2>
              <p>
                Track income, expenses, petty cash, payment status, and category breakdowns using presets for ${UnganiClientShared.safe(businessPreset.name)}.
              </p>

              <div class="ungani-button-row">
                <button class="ungani-btn gold" onclick="scrollToMoneyForm()">Add Money Record</button>
                <button class="ungani-btn green" onclick="loadMoneyRows()">Refresh</button>
                <a class="ungani-btn light" href="my-charts.html">View Charts</a>
              </div>
            </div>

            <div class="money-preset-box">
              <h3>Business preset active</h3>
              <p>The category options on this page now adapt to the business type selected by the client.</p>

              <div class="money-chip-row">
                ${businessPreset.incomeCategories.slice(0, 3).map(function (item) {
                  return `<span class="money-chip">${UnganiClientShared.safe(item)}</span>`;
                }).join("")}

                ${businessPreset.expenseCategories.slice(0, 3).map(function (item) {
                  return `<span class="money-chip">${UnganiClientShared.safe(item)}</span>`;
                }).join("")}
              </div>
            </div>
          </div>
        </section>

        <section class="money-kpi-grid">
          ${moneyKpi("Income", UnganiAnalytics.compactMoney(summary.income), filteredRows.filter(isIncomeRow).length + " income record(s)", "#16A34A")}
          ${moneyKpi("Expenses", UnganiAnalytics.compactMoney(summary.expenses), filteredRows.filter(isExpenseRow).length + " expense record(s)", "#D4A63A")}
          ${moneyKpi("Balance", UnganiAnalytics.compactMoney(summary.balance), "Income minus expenses", summary.balance >= 0 ? "#16A34A" : "#DC2626")}
          ${moneyKpi("Pending", UnganiAnalytics.compactMoney(summary.pending), "Pending money records", "#DC2626")}
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>Filters</h3>
              <p class="ungani-small">Search and filter this business money view.</p>
            </div>

            <button class="ungani-btn dark" onclick="resetMoneyFilters()">Reset Filters</button>
          </div>

          <div class="money-form-grid">
            <div>
              <label for="filterType">Type</label>
              <select id="filterType" onchange="saveMoneyFilters(); renderMoneyPage();">
                <option value="">All Types</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
                <option value="petty">Petty Cash</option>
              </select>
            </div>

            <div>
              <label for="filterStatus">Status</label>
              <select id="filterStatus" onchange="saveMoneyFilters(); renderMoneyPage();">
                <option value="">All Status</option>
                <option value="completed">Completed</option>
                <option value="pending">Pending</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>

            <div>
              <label for="filterSearch">Search</label>
              <input id="filterSearch" placeholder="Search category, notes, payment method..." oninput="saveMoneyFilters(); renderMoneyPage();" />
            </div>
          </div>
        </section>

        <section class="money-chart-grid">
          <div class="ungani-card ungani-chart-card">
            <div class="ungani-chart-head">
              <div>
                <h3>Income vs Expenses</h3>
                <p class="ungani-small">Animated trend from your money records.</p>
              </div>
              <a class="ungani-btn green" href="my-charts.html">Analytics</a>
            </div>

            ${trend.length ? '<div class="ungani-chart-canvas-wrap"><canvas id="moneyTrendChart"></canvas></div>' : UnganiAnalytics.emptyChart("Add dated income and expense records to show the trend.")}
          </div>

          <div class="ungani-card ungani-chart-card">
            <div class="ungani-chart-head">
              <div>
                <h3>Expense Breakdown</h3>
                <p class="ungani-small">Categories are based on the selected business type.</p>
              </div>
            </div>

            ${expenseBreakdown.length ? '<div class="ungani-chart-canvas-wrap"><canvas id="moneyExpenseChart"></canvas></div>' : UnganiAnalytics.emptyChart("Add expense records to show expense breakdown.")}
          </div>
        </section>

        ${renderCategorySuggestionsPanel()}

        ${renderRecurringMoneyPanel()}

        <section class="money-category-section">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <div>
                <h3>Income Categories</h3>
                <p class="ungani-small">Quick-fill income categories for ${UnganiClientShared.safe(businessPreset.name)}.</p>
              </div>
            </div>

            <div class="category-list">
              ${businessPreset.incomeCategories.map(function (item) {
                return `<button class="category-pill" onclick="quickCategory('income', '${UnganiClientShared.attr(item)}')">${UnganiClientShared.safe(item)}</button>`;
              }).join("")}
            </div>
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <div>
                <h3>Expense Categories</h3>
                <p class="ungani-small">Quick-fill expense categories for ${UnganiClientShared.safe(businessPreset.name)}.</p>
              </div>
            </div>

            <div class="category-list">
              ${businessPreset.expenseCategories.map(function (item) {
                return `<button class="category-pill" onclick="quickCategory('expense', '${UnganiClientShared.attr(item)}')">${UnganiClientShared.safe(item)}</button>`;
              }).join("")}
            </div>
          </div>
        </section>

        <section class="money-main-grid">
          <div class="ungani-card" id="moneyFormCard">
            <div class="ungani-section-title">
              <div>
                <h3 id="moneyFormTitle">${editingMoneyId ? "Edit Money Record" : "Add Money Record"}</h3>
                <p class="ungani-small">Use business-specific categories so reports and charts make sense.</p>
              </div>

              <button class="ungani-btn dark" onclick="clearMoneyForm()">Clear</button>
            </div>

            <form onsubmit="saveMoneyRecord(event)">
              <div class="money-form-grid">
                <div>
                  <label for="moneyType">Type</label>
                  <select id="moneyType" onchange="updateCategoryOptions()">
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                    <option value="petty_cash">Petty Cash</option>
                  </select>
                </div>

                <div>
                  <label for="moneyCategory">Category</label>
                  <select id="moneyCategory"></select>
                </div>

                <div>
                  <label for="moneyAmount">Amount</label>
                  <input id="moneyAmount" type="number" step="0.01" min="0" placeholder="Example: 50000" required />
                </div>

                <div>
                  <label for="moneyDate">Date</label>
                  <input id="moneyDate" type="date" />
                </div>

                <div>
                  <label for="moneyMethod">Payment Method</label>
                  <select id="moneyMethod">
                    <option value="">Select Method</option>
                    <option value="M-Pesa">M-Pesa</option>
                    <option value="Bank Transfer">Bank Transfer</option>
                    <option value="Cash">Cash</option>
                    <option value="Card">Card</option>
                    <option value="Cheque">Cheque</option>
                    <option value="Other">Other</option>
                  </select>
                </div>

                <div>
                  <label for="moneyStatus">Status</label>
                  <select id="moneyStatus">
                    <option value="completed">Completed</option>
                    <option value="pending">Pending</option>
                    <option value="cancelled">Cancelled</option>
                  </select>
                </div>

                <div class="wide">
                  <label for="moneyNotes">Notes</label>
                  <textarea id="moneyNotes" rows="4" placeholder="Example: Client payment, supplier invoice, fuel expense, service income..."></textarea>
                </div>
              </div>

              <div id="moneyWarningBox" class="money-warning-box">
                <strong>Money record warning</strong>
                <p id="moneyWarningText"></p>
              </div>

              <div class="ungani-button-row" style="margin-top:16px;">
                <button class="ungani-btn gold" type="submit">${editingMoneyId ? "Update Record" : "Save Record"}</button>
                <button class="ungani-btn dark" type="button" onclick="clearMoneyForm()">Cancel</button>
              </div>
            </form>
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <div>
                <h3>Money Guide</h3>
                <p class="ungani-small">How to keep records clean.</p>
              </div>
            </div>

            <div class="ungani-empty" style="text-align:left;">
              <h3>Use the correct category</h3>
              <p>For better charts and reports, use the preset categories instead of typing random names.</p>
            </div>

            <div style="display:grid;gap:10px;margin-top:12px;">
              <div class="ungani-card" style="box-shadow:none;">
                <strong>Income example</strong>
                <p class="ungani-small">${UnganiClientShared.safe(businessPreset.incomeCategories[0] || "Sales Income")}</p>
              </div>

              <div class="ungani-card" style="box-shadow:none;">
                <strong>Expense example</strong>
                <p class="ungani-small">${UnganiClientShared.safe(businessPreset.expenseCategories[0] || "Other Expense")}</p>
              </div>

              <div class="ungani-card" style="box-shadow:none;">
                <strong>Reports</strong>
                <p class="ungani-small">These categories will power Dashboard, Charts, Reports, and Print Reports.</p>
              </div>
            </div>
          </div>
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>Money Records</h3>
              <p class="ungani-small">${filteredRows.length} record(s) shown.</p>
            </div>

            <button class="ungani-btn green" onclick="loadMoneyRows()">Refresh</button>
          </div>

          ${renderMoneyTable(filteredRows)}
        </section>

        <p class="ungani-small">
          Money Version: Step 27C Safe Money Delete · ungani.com · info@ungani.com
        </p>
      `);

      restoreMoneyFilters();
      updateCategoryOptions();
      updateRecurringCategoryOptions();

      setTimeout(function () {
        renderMoneyCharts(trend, expenseBreakdown);
      }, 150);
    }

    function renderCategorySuggestionsPanel() {
      if (!categorySuggestions || categorySuggestions.length === 0) {
        return "";
      }

      return `
        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>Smart Category Suggestions</h3>
              <p class="ungani-small">UNGANI found money records that may need cleaner categories.</p>
            </div>

            <button class="ungani-btn green" onclick="loadMoneyRows()">Refresh</button>
          </div>

          <div style="display:grid;gap:12px;">
            ${categorySuggestions.map(function (item) {
              const amount = Number(item.transaction_amount || 0);
              const confidence = Math.round(Number(item.confidence || 0) * 100);

              return `
                <div class="ungani-card" style="box-shadow:none;">
                  <div class="ungani-section-title">
                    <div>
                      <h3 style="font-size:16px;margin-bottom:4px;">
                        ${UnganiClientShared.safe(item.current_category || "Uncategorized")}
                        →
                        ${UnganiClientShared.safe(item.suggested_category || "Suggested Category")}
                      </h3>

                      <p class="ungani-small">
                        ${UnganiClientShared.safe(item.reason || "Suggested based on the record details.")}
                      </p>

                      <p class="ungani-small" style="margin-top:6px;">
                        ${UnganiClientShared.safe(UnganiClientShared.formatDate(item.transaction_date))}
                        · ${UnganiClientShared.safe(item.transaction_type || "transaction")}
                        · ${UnganiClientShared.safe(UnganiAnalytics.moneyFormat(amount))}
                        · Confidence ${UnganiClientShared.safe(confidence + "%")}
                      </p>
                    </div>

                    <span class="ungani-badge gold">Suggestion</span>
                  </div>

                  <div class="ungani-button-row">
                    <button class="ungani-btn small gold" onclick="respondToCategorySuggestion('${UnganiClientShared.attr(item.id)}', 'accept')">
                      Accept
                    </button>

                    <button class="ungani-btn small dark" onclick="respondToCategorySuggestion('${UnganiClientShared.attr(item.id)}', 'reject')">
                      Reject
                    </button>
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        </section>
      `;
    }

    function renderRecurringMoneyPanel() {
      return `
        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>Recurring Money</h3>
              <p class="ungani-small">Create reminders for repeating payments, expenses, income, rent, subscriptions, salaries, and other regular records.</p>
            </div>

            <button class="ungani-btn green" onclick="loadMoneyRows()">Refresh</button>
          </div>

          <div class="money-main-grid">
            <div>
              ${renderRecurringRows()}
            </div>

            <div class="ungani-card" style="box-shadow:none;">
              <div class="ungani-section-title">
                <div>
                  <h3 style="font-size:18px;">Add Recurring Reminder</h3>
                  <p class="ungani-small">This creates a reminder only unless auto-create is selected.</p>
                </div>
              </div>

              <form onsubmit="createRecurringTransaction(event)">
                <div class="money-form-grid">
                  <div>
                    <label for="recurringType">Type</label>
                    <select id="recurringType" onchange="updateRecurringCategoryOptions()">
                      <option value="expense">Expense</option>
                      <option value="income">Income</option>
                      <option value="petty_cash">Petty Cash</option>
                    </select>
                  </div>

                  <div>
                    <label for="recurringCategory">Category</label>
                    <select id="recurringCategory"></select>
                  </div>

                  <div>
                    <label for="recurringAmount">Amount</label>

    function recurringStatusBadge(status) {
      const lower = String(status || "active").toLowerCase();

      if (lower === "active") {
        return `<span class="ungani-badge green">Active</span>`;
      }

      if (lower === "paused") {
        return `<span class="ungani-badge gold">Paused</span>`;
      }

      if (lower === "cancelled") {
        return `<span class="ungani-badge red">Cancelled</span>`;
      }

      if (lower === "completed") {
        return `<span class="ungani-badge blue">Completed</span>`;
      }

      return `<span class="ungani-badge gold">${UnganiClientShared.safe(lower)}</span>`;
    }

    async function createRecurringTransaction(event) {
      event.preventDefault();

      if (
        window.UnganiClientShared &&
        typeof UnganiClientShared.ensureCanWrite === "function" &&
        !UnganiClientShared.ensureCanWrite("recurring money")
      ) {
        return;
      }

      const amount = Number(UnganiClientShared.value("recurringAmount") || 0);
      const category = UnganiClientShared.value("recurringCategory");
      const nextDate = UnganiClientShared.value("recurringNextDate") || new Date().toISOString().slice(0, 10);
      const autoCreate = document.getElementById("recurringAutoCreate") ? document.getElementById("recurringAutoCreate").checked : false;

      if (!amount || amount <= 0) {
        UnganiClientShared.showToast("Enter a valid recurring amount.");
        return;
      }

      if (!category) {
        UnganiClientShared.showToast("Choose a recurring category.");
        return;
      }

      try {
        const response = await currentContext.supabaseClient.rpc("create_my_ungani_recurring_transaction", {
          p_transaction_type: UnganiClientShared.value("recurringType") || "expense",
          p_category_name: category,
          p_amount: amount,
          p_frequency: UnganiClientShared.value("recurringFrequency") || "monthly",
          p_next_run_date: nextDate,
          p_payment_method: UnganiClientShared.value("recurringMethod") || null,
          p_notes: UnganiClientShared.value("recurringNotes") || null,
          p_reminder_only: !autoCreate,
          p_auto_create: autoCreate
        });

        if (response.error) {
          UnganiClientShared.showToast("Could not create recurring money: " + response.error.message);
          return;
        }

        const result = response.data || {};

        if (result.ok === false) {
          UnganiClientShared.showToast(result.message || "Could not create recurring money.");
          return;
        }

        UnganiClientShared.showToast(result.message || "Recurring money created ✓");
        clearRecurringForm();
        await loadMoneyRows();
      } catch (error) {
        UnganiClientShared.showToast("Could not create recurring money: " + error.message);
      }
    }

    function calculateMoneySummary(rows) {
      let income = 0;
      let expenses = 0;
      let pending = 0;

      rows.forEach(function (row) {
        const amount = Number(UnganiClientShared.getValue(row, ["amount"], 0) || 0);
        const status = String(UnganiClientShared.getValue(row, ["status"], "completed")).toLowerCase();

        if (isIncomeRow(row)) {
          income += amount;
        } else if (isExpenseRow(row)) {
          expenses += amount;
        }

        if (status.includes("pending")) {
          pending += amount;
        }
      });

      return {
        income,
        expenses,
        pending,
        balance: income - expenses
      };
    }

    function getFilteredRows() {

      const search = getStoredOrInput("filterSearch", "ungani_money_filter_search").toLowerCase();

      return moneyRows.filter(function (row) {
        const type = getRowType(row).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "completed")).toLowerCase();
        const haystack = JSON.stringify(row || {}).toLowerCase();

        if (filterType && !type.includes(filterType)) return false;
        if (filterStatus && !status.includes(filterStatus)) return false;
        if (search && !haystack.includes(search)) return false;

        return true;
      });
    }

    async function saveMoneyRecord(event) {
      event.preventDefault();

      hideMoneyWarning();

      if (
        window.UnganiClientShared &&
        typeof UnganiClientShared.ensureCanWrite === "function" &&
        !UnganiClientShared.ensureCanWrite("money record")
      ) {
        return;
      }

      const amount = Number(UnganiClientShared.value("moneyAmount") || 0);
      const category = UnganiClientShared.value("moneyCategory");
      const transactionDate = UnganiClientShared.value("moneyDate") || new Date().toISOString().slice(0, 10);
      const transactionType = UnganiClientShared.value("moneyType") || "income";

      if (!amount || amount <= 0) {
        showMoneyWarning("Enter a valid amount before saving.");
        UnganiClientShared.showToast("Enter a valid amount.");
        return;
      }

      if (!category || category.toLowerCase() === "uncategorized") {
        showMoneyWarning("Please choose a clear category so your reports and charts stay accurate.");
        UnganiClientShared.showToast("Choose a category before saving.");
        return;
      }

      if (!transactionDate) {
        showMoneyWarning("Please select a transaction date before saving.");
        UnganiClientShared.showToast("Choose a date before saving.");
        return;
      }

      const duplicateOk = await confirmDuplicateIfNeeded(amount, category, transactionDate);

      if (!duplicateOk) {
        return;
      }

      const unusualOk = await confirmUnusualAmountIfNeeded(amount, transactionType, category);

      if (!unusualOk) {
        return;
      }

      const broadType = transactionType === "income" ? "income" : "expense";

const payload = {
  tenant_id: currentContext.tenantId,
  type: broadType,
  transaction_type: transactionType,
  category: category,
  amount: amount,
  transaction_date: transactionDate,
  payment_method: UnganiClientShared.value("moneyMethod") || null,
  status: UnganiClientShared.value("moneyStatus") || "completed",
  description: UnganiClientShared.value("moneyNotes") || null,
  updated_at: new Date().toISOString()
};

      let response;

      try {
        if (editingMoneyId) {
          response = await currentContext.supabaseClient
            .from("transactions")
            .update(payload)
            .eq("id", editingMoneyId)
            .eq("tenant_id", currentContext.tenantId);
        } else {
          payload.created_at = new Date().toISOString();

          response = await currentContext.supabaseClient
            .from("transactions")
            .insert([payload]);
        }
      } catch (error) {
        UnganiClientShared.showToast("Could not save record: " + (error.message || "Network error. Please check your connection."));
        return;
      }

      if (response.error) {
        UnganiClientShared.showToast("Could not save record: " + response.error.message);
        return;
      }

      UnganiClientShared.showToast(editingMoneyId ? "Money record updated ✓" : "Money record added ✓");
      clearMoneyForm();
      await loadMoneyRows();
    }

    async function confirmDuplicateIfNeeded(amount, category, transactionDate) {
      try {
        const response = await currentContext.supabaseClient.rpc("check_my_ungani_duplicate_transaction", {
          p_amount: amount,
          p_category: category,
          p_transaction_date: transactionDate,
          p_exclude_id: editingMoneyId || null
        });

        if (response.error) {
          console.warn("Duplicate check skipped:", response.error.message);
          return true;
        }

        const result = response.data;

        if (result && result.is_duplicate === true) {
          const message = result.message || "This looks similar to another entry added recently. Please confirm it is not a duplicate.";
          showMoneyWarning(message);

          return confirm(message + "\n\nDo you still want to save this money record?");
        }
      } catch (error) {
        console.warn("Duplicate check skipped:", error.message);
      }

      return true;
    }

    async function confirmUnusualAmountIfNeeded(amount, transactionType, category) {
      try {
        const response = await currentContext.supabaseClient.rpc("check_my_ungani_unusual_transaction_amount", {
          p_amount: amount,
          p_transaction_type: transactionType,
          p_category: category
        });

        if (response.error) {
          console.warn("Unusual amount check skipped:", response.error.message);
          return true;
        }

        const result = response.data;

        if (result && result.is_unusual === true) {
          const message = result.message || "This amount looks unusual compared to past records. Please confirm it is correct.";
          const average = result.average_amount ? "\nAverage amount: KSh " + Number(result.average_amount).toLocaleString("en-KE") : "";
          const highest = result.highest_previous_amount ? "\nHighest previous amount: KSh " + Number(result.highest_previous_amount).toLocaleString("en-KE") : "";
          const entered = result.entered_amount ? "\nEntered amount: KSh " + Number(result.entered_amount).toLocaleString("en-KE") : "";

          showMoneyWarning(message);

          return confirm(message + average + highest + entered + "\n\nDo you still want to save this money record?");
        }
      } catch (error) {
        console.warn("Unusual amount check skipped:", error.message);
      }

      return true;
    }

    async function deleteMoneyRecord(id) {
      if (
        window.UnganiClientShared &&
        typeof UnganiClientShared.ensureCanWrite === "function" &&
        !UnganiClientShared.ensureCanWrite("delete money record")
      ) {
        return;
      }

      const confirmed = confirm("Move this money record to Recently Deleted? You can restore it within 30 days.");

      if (!confirmed) return;

      try {
        const response = await currentContext.supabaseClient.rpc("soft_delete_ungani_record", {
          p_table_name: "transactions",
          p_record_id: id,
          p_delete_reason: "Deleted from Money Records page"
        });

        if (response.error) {
          UnganiClientShared.showToast("Could not delete record: " + response.error.message);
          return;
        }

        const result = response.data || {};

        if (result.ok === false) {
          UnganiClientShared.showToast(result.message || "Could not delete record.");
          return;
        }

        UnganiClientShared.showToast(result.message || "Money record moved to Recently Deleted ✓");
        await loadMoneyRows();
      } catch (error) {
        UnganiClientShared.showToast("Could not delete record: " + error.message);
      }
    }

    function clearMoneyForm() {
      editingMoneyId = null;

      const title = document.getElementById("moneyFormTitle");
      if (title) title.innerText = "Add Money Record";

      if (document.getElementById("moneyType")) document.getElementById("moneyType").value = "income";
      updateCategoryOptions();

      ["moneyAmount", "moneyDate", "moneyMethod", "moneyNotes"].forEach(function (id) {
        const el = document.getElementById(id);
        if (el) el.value = "";
      });

      if (document.getElementById("moneyStatus")) document.getElementById("moneyStatus").value = "completed";

      hideMoneyWarning();
    }

    function getRowType(row) {
      return String(UnganiClientShared.getValue(row, ["transaction_type", "type"], "income")).toLowerCase();
    }

    function isIncomeRow(row) {
      const type = getRowType(row);

      return (
        type.includes("income") ||
        type.includes("sale") ||
        type.includes("rental") ||
        type.includes("revenue") ||
        type.includes("deposit") ||
        type.includes("payment") ||
        type.includes("fee")
      );
    }

    function isExpenseRow(row) {
      const type = getRowType(row);

      return (
        type.includes("expense") ||
        type.includes("petty") ||
        type.includes("cost") ||
        type.includes("commission") ||
        type.includes("maintenance")
      );
    }

    function typeBadge(type) {
      const lower = String(type || "").toLowerCase();

      if (lower.includes("income") || lower.includes("sale") || lower.includes("payment") || lower.includes("fee")) {
        return `<span class="ungani-badge green">${UnganiClientShared.safe(UnganiAnalytics.toTitle(type))}</span>`;
      }

      if (lower.includes("petty")) {
        return `<span class="ungani-badge gold">Petty Cash</span>`;
      }

      return `<span class="ungani-badge gold">${UnganiClientShared.safe(UnganiAnalytics.toTitle(type))}</span>`;
    }

    function statusBadge(status) {
      const lower = String(status || "").toLowerCase();

      if (lower.includes("completed") || lower.includes("paid") || lower.includes("cleared")) {
        return `<span class="ungani-badge green">${UnganiClientShared.safe(UnganiAnalytics.toTitle(status))}</span>`;
      }

      if (lower.includes("cancelled") || lower.includes("failed")) {
        return `<span class="ungani-badge red">${UnganiClientShared.safe(UnganiAnalytics.toTitle(status))}</span>`;
      }

      return `<span class="ungani-badge gold">${UnganiClientShared.safe(UnganiAnalytics.toTitle(status || "pending"))}</span>`;
    }
  </script>
</body>
</html>
