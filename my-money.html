<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Money Records</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-shared.js"></script>
</head>

<body>
  <script>
    let currentContext = null;
    let transactions = [];
    let categories = [];
    let filteredTransactions = [];
    let currentEditId = null;
    let isRealEstate = false;

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "money",
        pageTitle: "Money Records",
        pageSubtitle: "Track income, expenses, petty cash, payments, deposits, commissions, and business money movements.",
        onReady: loadMoneyPage
      });
    });

    async function loadMoneyPage(context) {
      currentContext = context;

      const businessType = String(UnganiClientShared.getValue(context.tenant, ["business_type", "business_type_key"], "")).toLowerCase();
      const businessTypeKey = String(UnganiClientShared.getValue(context.tenant, ["business_type_key"], "")).toLowerCase();

      isRealEstate = businessType.includes("real estate") || businessTypeKey.includes("real_estate");

      document.querySelector(".ungani-topbar h2").innerText = isRealEstate ? "Property Money Records" : "Money Records";
      document.querySelector(".ungani-topbar p").innerText = isRealEstate
        ? "Track property sales, rental income, booking deposits, commissions, maintenance costs, legal fees, marketing, and other property-related money records."
        : "Track income, expenses, petty cash, payments, categories, notes, and business money records.";

      await Promise.all([
        loadCategories(),
        loadTransactions()
      ]);
    }

    async function loadCategories() {
      const businessTypeKey = String(UnganiClientShared.getValue(currentContext.tenant, ["business_type_key"], "")).toLowerCase();
      const businessTypeName = String(UnganiClientShared.getValue(currentContext.tenant, ["business_type"], "")).toLowerCase();

      const realEstateFallback = fallbackCategories();

      const response = await currentContext.supabaseClient
        .from("categories")
        .select("*")
        .order("display_order", { ascending: true });

      if (response.error) {
        categories = realEstateFallback;
        return;
      }

      const all = response.data || [];

      const matched = all.filter(function (row) {
        const rowKey = String(UnganiClientShared.getValue(row, ["business_type_key"], "")).toLowerCase();
        const rowName = String(UnganiClientShared.getValue(row, ["business_type", "business_type_name"], "")).toLowerCase();

        if (isRealEstate) {
          return (
            rowKey.includes("real_estate") ||
            rowKey.includes("real-estate") ||
            rowName.includes("real estate")
          );
        }

        return rowKey === businessTypeKey || rowName === businessTypeName;
      });

      if (isRealEstate) {
        const merged = [...matched];

        realEstateFallback.forEach(function (fallbackRow) {
          const exists = merged.some(function (row) {
            return String(UnganiClientShared.getValue(row, ["category_key"], "")).toLowerCase() === String(fallbackRow.category_key).toLowerCase();
          });

          if (!exists) {
            merged.push(fallbackRow);
          }
        });

        categories = merged;
        return;
      }

      if (matched.length > 0) {
        categories = matched;
      } else {
        categories = fallbackCategories();
      }
    }

    function fallbackCategories() {
      if (isRealEstate) {
        return [
          { category_key: "property_sale", category_name: "Property Sale", transaction_type: "income" },
          { category_key: "rental_income", category_name: "Rental Income", transaction_type: "income" },
          { category_key: "booking_deposit", category_name: "Booking Deposit", transaction_type: "income" },
          { category_key: "agency_service_fee", category_name: "Agency / Service Fee", transaction_type: "income" },

          { category_key: "agent_commission", category_name: "Agent Commission", transaction_type: "expense" },
          { category_key: "marketing_advertising", category_name: "Marketing / Advertising", transaction_type: "expense" },
          { category_key: "legal_documentation_fees", category_name: "Legal / Documentation Fees", transaction_type: "expense" },
          { category_key: "property_maintenance", category_name: "Property Maintenance", transaction_type: "expense" },
          { category_key: "staff_wages", category_name: "Staff Wages", transaction_type: "expense" },
          { category_key: "site_visit_transport", category_name: "Site Visit / Transport Cost", transaction_type: "expense" },
          { category_key: "project_material_cost", category_name: "Project Material Cost", transaction_type: "expense" },
          { category_key: "other_real_estate_cost", category_name: "Other Real Estate Cost", transaction_type: "expense" }
        ];
      }

      return [
        { category_key: "sales_income", category_name: "Sales / Income", transaction_type: "income" },
        { category_key: "service_income", category_name: "Service Income", transaction_type: "income" },
        { category_key: "business_expense", category_name: "Business Expense", transaction_type: "expense" },
        { category_key: "petty_cash", category_name: "Petty Cash", transaction_type: "petty_cash" },
        { category_key: "other", category_name: "Other", transaction_type: "other" }
      ];
    }

    async function loadTransactions() {
      const contentEl = currentContext.contentEl;

      contentEl.innerHTML = UnganiClientShared.loadingCard("Loading money records...");

      const response = await currentContext.supabaseClient
        .from("transactions")
        .select("*")
        .eq("tenant_id", currentContext.tenantId)
        .order("transaction_date", { ascending: false })
        .order("created_at", { ascending: false });

      if (response.error) {
        contentEl.innerHTML = UnganiClientShared.errorCard("Could not load money records", response.error.message);
        return;
      }

      transactions = response.data || [];
      renderPage();
    }

    function renderPage() {
      filteredTransactions = getFilteredTransactions();

      UnganiClientShared.setContent(`
        <section class="ungani-card ungani-hero">
          <h2>${isRealEstate ? "Property Money Tracking" : "Money Tracking"}</h2>
          <p>
            ${isRealEstate
              ? "Track sales income, rental payments, booking deposits, agent commissions, marketing costs, property maintenance, legal fees, and other property business records."
              : "Track business income, expenses, petty cash, payments, suppliers, references, and notes."
            }
          </p>

          <div class="ungani-button-row">
            <button class="ungani-btn" onclick="scrollToForm()">${currentEditId ? "Update Money Record" : "Add Money Record"}</button>
            <a class="ungani-btn green" href="reports.html">View Reports</a>
            <a class="ungani-btn dark" href="my-items.html">${isRealEstate ? "Properties" : "Items / Assets"}</a>
          </div>
        </section>

        ${renderMetrics()}

        <section class="ungani-card">
          <div class="ungani-section-title">
            <h3>Filters</h3>
            <button class="ungani-btn dark" onclick="resetFilters()">Reset Filters</button>
          </div>

          <div class="ungani-form-grid">
            <div>
              <label for="filterType">Record Type</label>
              <select id="filterType" onchange="saveFilters(); renderPage();">
                <option value="">All Types</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
                <option value="petty_cash">Petty Cash</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div>
              <label for="filterStatus">Status</label>
              <select id="filterStatus" onchange="saveFilters(); renderPage();">
                <option value="">All Statuses</option>
                <option value="completed">Completed</option>
                <option value="pending">Pending</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>

            <div>
              <label for="filterFrom">From Date</label>
              <input id="filterFrom" type="date" onchange="saveFilters(); renderPage();" />
            </div>

            <div>
              <label for="filterTo">To Date</label>
              <input id="filterTo" type="date" onchange="saveFilters(); renderPage();" />
            </div>

            <div>
              <label for="searchBox">Search</label>
              <input id="searchBox" placeholder="${isRealEstate ? "Search property, project, agent, category..." : "Search category, description, reference..."}" oninput="saveFilters(); renderPage();" />
            </div>
          </div>
        </section>

        <section id="moneyFormCard" class="ungani-card">
          <div class="ungani-section-title">
            <h3>${currentEditId ? "Update Money Record" : "Add Money Record"}</h3>
            ${currentEditId ? '<button class="ungani-btn dark" onclick="cancelEdit()">Cancel Edit</button>' : ''}
          </div>

          ${renderForm()}
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <div>
                <h3>Money Records</h3>
                <p class="ungani-small">${filteredTransactions.length} record(s) shown</p>
              </div>

              <button class="ungani-btn green" onclick="loadTransactions()">Refresh</button>
            </div>

            ${renderTransactionsList()}
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Category Summary</h3>
            </div>

            ${renderCategorySummary()}
          </div>
        </section>

        <p class="ungani-small">
          Money Version: Step 305D-2 Shared Layout · This is money tracking for operations visibility, not a full accounting replacement · ungani.com · info@ungani.com
        </p>
      `);

      restoreFilters();
      populateCategoryDropdown();
      populateEditFormIfNeeded();
    }

    function renderMetrics() {
      const summary = calculateSummary(transactions);
      const monthSummary = calculateThisMonthSummary();

      return `
        <section class="ungani-grid">
          ${UnganiClientShared.metricCard("Total Records", transactions.length, "All saved money records", "blue")}
          ${UnganiClientShared.metricCard(isRealEstate ? "Revenue This Month" : "Income This Month", UnganiClientShared.formatKES(monthSummary.income), "Income records this month", "green")}
          ${UnganiClientShared.metricCard("Expenses This Month", UnganiClientShared.formatKES(monthSummary.expense), "Expense records this month", monthSummary.expense > 0 ? "orange" : "green")}
          ${UnganiClientShared.metricCard("Estimated Balance", UnganiClientShared.formatKES(summary.balance), "Income minus expenses", summary.balance >= 0 ? "green" : "red")}
          ${UnganiClientShared.metricCard("Pending Amount", UnganiClientShared.formatKES(summary.pending), "Records marked as pending", summary.pending > 0 ? "orange" : "green")}
          ${UnganiClientShared.metricCard("Petty Cash", UnganiClientShared.formatKES(summary.pettyCash), "Petty cash records", "blue")}
        </section>
      `;
    }

    function renderForm() {
      return `
        <form id="moneyForm" onsubmit="saveTransaction(event)">
          <div class="ungani-form-grid">
            <div>
              <label for="transactionType">Record Type</label>
              <select id="transactionType" onchange="populateCategoryDropdown()">
                <option value="income">Income</option>
                <option value="expense">Expense</option>
                <option value="petty_cash">Petty Cash</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div>
              <label for="categorySelect">Category</label>
              <select id="categorySelect">
                <option value="">Select category</option>
              </select>
            </div>

            <div>
              <label for="amount">Amount</label>
              <input id="amount" type="number" min="0" step="1" required placeholder="Example: 50000" />
            </div>

            <div>
              <label for="transactionDate">Date</label>
              <input id="transactionDate" type="date" required />
            </div>

            <div>
              <label for="status">Status</label>
              <select id="status">
                <option value="completed">Completed</option>
                <option value="pending">Pending</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>

            <div>
              <label for="paymentMethod">Payment Method</label>
              <select id="paymentMethod">
                <option value="">Select method</option>
                <option value="cash">Cash</option>
                <option value="mpesa">M-Pesa</option>
                <option value="bank">Bank</option>
                <option value="card">Card</option>
                <option value="cheque">Cheque</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div>
              <label for="paymentReference">Payment Reference</label>
              <input id="paymentReference" placeholder="Receipt, invoice, transaction code..." />
            </div>

            <div>
              <label for="relatedPerson">${isRealEstate ? "Client / Agent / Tenant" : "Related Person"}</label>
              <input id="relatedPerson" placeholder="${isRealEstate ? "Example: Brian Otieno / Tenant A" : "Client, supplier, staff, or contact"}" />
            </div>

            ${
              isRealEstate
                ? `
                  <div>
                    <label for="propertyName">Property Name</label>
                    <input id="propertyName" placeholder="Example: Clove Garden A12" />
                  </div>

                  <div>
                    <label for="projectName">Project Name</label>
                    <input id="projectName" placeholder="Example: Clove Garden" />
                  </div>

                  <div>
                    <label for="agentName">Agent Name</label>
                    <input id="agentName" placeholder="Example: Brian Otieno" />
                  </div>

                  <div>
                    <label for="commissionAmount">Commission Amount</label>
                    <input id="commissionAmount" type="number" min="0" step="1" placeholder="If applicable" />
                  </div>
                `
                : ""
            }
          </div>

          <label for="description">Description / Notes</label>
          <textarea id="description" placeholder="${isRealEstate ? "Example: Booking deposit received for Clove Garden A12" : "Add notes about this money record..."}"></textarea>

          <div class="ungani-button-row">
            <button class="ungani-btn green" type="submit">${currentEditId ? "Update Record" : "Add Record"}</button>
            ${currentEditId ? '<button class="ungani-btn dark" type="button" onclick="cancelEdit()">Cancel</button>' : ''}
          </div>
        </form>
      `;
    }

    function populateCategoryDropdown() {
      const select = document.getElementById("categorySelect");
      const typeEl = document.getElementById("transactionType");

      if (!select || !typeEl) return;

      const selectedType = String(typeEl.value || "income").toLowerCase();

      let matching = categories.filter(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["transaction_type", "category_type", "type"], "")).toLowerCase();

        if (selectedType === "petty_cash") {
          return type === "petty_cash" || type === "expense";
        }

        return type === selectedType;
      });

      if (matching.length === 0 && isRealEstate) {
        matching = fallbackCategories().filter(function (row) {
          const type = String(row.transaction_type || "").toLowerCase();

          if (selectedType === "petty_cash") {
            return type === "petty_cash" || type === "expense";
          }

          return type === selectedType;
        });
      }

      if (matching.length === 0) {
        matching = fallbackCategories();
      }

      select.innerHTML = `<option value="">Select category</option>` + matching.map(function (row) {
        const key = UnganiClientShared.getValue(row, ["category_key", "slug", "name", "category_name"], "");
        const name = UnganiClientShared.getValue(row, ["category_name", "name", "title"], key);

        return `<option value="${UnganiClientShared.attr(key)}">${UnganiClientShared.safe(name)}</option>`;
      }).join("");
    }

    function renderTransactionsList() {
      if (filteredTransactions.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No money records found</h3>
            <p>Add your first money record above.</p>
          </div>
        `;
      }

      return filteredTransactions.map(function (row) {
        return renderTransactionCard(row);
      }).join("");
    }

    function renderTransactionCard(row) {
      const type = getTransactionType(row);
      const amount = Number(UnganiClientShared.getValue(row, ["amount"], 0) || 0);
      const categoryName = UnganiClientShared.getValue(row, ["category_name", "category", "category_key"], "Money Record");
      const status = String(UnganiClientShared.getValue(row, ["status"], "completed")).toLowerCase();
      const description = UnganiClientShared.getValue(row, ["description", "notes"], "");
      const date = UnganiClientShared.getValue(row, ["transaction_date", "created_at"], "");
      const method = UnganiClientShared.getValue(row, ["payment_method"], "");
      const reference = UnganiClientShared.getValue(row, ["payment_reference", "reference_number"], "");
      const relatedPerson = UnganiClientShared.getValue(row, ["related_person"], "");
      const propertyName = UnganiClientShared.getValue(row, ["property_name"], "");
      const projectName = UnganiClientShared.getValue(row, ["project_name"], "");
      const agentName = UnganiClientShared.getValue(row, ["agent_name"], "");
      const commissionAmount = Number(UnganiClientShared.getValue(row, ["commission_amount"], 0) || 0);

      const color = type === "income" ? "green" : type === "expense" ? "orange" : type === "petty_cash" ? "blue" : "gold";

      return `
        <div class="ungani-card" style="box-shadow:none;">
          <div class="ungani-section-title">
            <div>
              <h3>${UnganiClientShared.safe(categoryName)}</h3>
              <p class="ungani-small">
                ${UnganiClientShared.safe(UnganiClientShared.formatDate(date))}
                ${method ? " · " + UnganiClientShared.safe(method) : ""}
                ${reference ? " · Ref: " + UnganiClientShared.safe(reference) : ""}
              </p>
            </div>

            <div style="text-align:right;">
              <strong style="font-size:20px;color:var(--ungani-text);">${UnganiClientShared.safe(UnganiClientShared.formatKES(amount))}</strong><br>
              <span class="ungani-badge ${UnganiClientShared.attr(color)}">${UnganiClientShared.safe(type)}</span>
              <span class="ungani-badge ${status === "completed" ? "green" : status === "pending" ? "orange" : "red"}">${UnganiClientShared.safe(status)}</span>
            </div>
          </div>

          <section class="ungani-grid">
            ${miniDetail(isRealEstate ? "Property" : "Related Record", propertyName || "N/A")}
            ${miniDetail("Project", projectName || "N/A")}
            ${miniDetail(isRealEstate ? "Agent" : "Person", agentName || relatedPerson || "N/A")}
            ${miniDetail("Commission", commissionAmount > 0 ? UnganiClientShared.formatKES(commissionAmount) : "N/A")}
          </section>

          ${description ? `<p class="ungani-small" style="margin-top:12px;">${UnganiClientShared.safe(description)}</p>` : ""}

          <div class="ungani-button-row">
            <button class="ungani-btn" onclick="editTransaction('${UnganiClientShared.attr(row.id)}')">Edit</button>
            <button class="ungani-btn green" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'completed')">Completed</button>
            <button class="ungani-btn orange" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'pending')">Pending</button>
            <button class="ungani-btn red" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'cancelled')">Cancelled</button>
          </div>
        </div>
      `;
    }

    function renderCategorySummary() {
      const summary = {};

      filteredTransactions.forEach(function (row) {
        const category = UnganiClientShared.getValue(row, ["category_name", "category", "category_key"], "Uncategorized");
        const amount = Number(UnganiClientShared.getValue(row, ["amount"], 0) || 0);
        const type = getTransactionType(row);

        if (!summary[category]) {
          summary[category] = {
            count: 0,
            income: 0,
            expense: 0,
            pettyCash: 0,
            other: 0
          };
        }

        summary[category].count++;

        if (type === "income") summary[category].income += amount;
        else if (type === "expense") summary[category].expense += amount;
        else if (type === "petty_cash") summary[category].pettyCash += amount;
        else summary[category].other += amount;
      });

      const keys = Object.keys(summary);

      if (keys.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No category summary yet</h3>
            <p>Summary will appear after money records are added.</p>
          </div>
        `;
      }

      return keys.map(function (key) {
        const row = summary[key];
        const total = row.income + row.expense + row.pettyCash + row.other;

        return `
          <div class="ungani-card" style="box-shadow:none;margin-bottom:10px;">
            <h3 style="margin:0 0 6px;color:var(--ungani-text);">${UnganiClientShared.safe(key)}</h3>
            <p class="ungani-small" style="margin:0 0 8px;">${row.count} record(s) · ${UnganiClientShared.safe(UnganiClientShared.formatKES(total))}</p>
            <span class="ungani-badge green">Income ${UnganiClientShared.safe(UnganiClientShared.formatKES(row.income))}</span>
            <span class="ungani-badge orange">Expense ${UnganiClientShared.safe(UnganiClientShared.formatKES(row.expense))}</span>
          </div>
        `;
      }).join("");
    }

    function miniDetail(label, value) {
      return `
        <div class="ungani-card" style="margin-bottom:0;box-shadow:none;padding:14px;">
          <p class="ungani-small" style="margin:0 0 5px;">${UnganiClientShared.safe(label)}</p>
          <strong>${UnganiClientShared.safe(value)}</strong>
        </div>
      `;
    }

    function calculateSummary(rows) {
      let income = 0;
      let expense = 0;
      let pettyCash = 0;
      let pending = 0;

      rows.forEach(function (row) {
        const amount = Number(UnganiClientShared.getValue(row, ["amount"], 0) || 0);
        const type = getTransactionType(row);
        const status = String(UnganiClientShared.getValue(row, ["status"], "completed")).toLowerCase();

        if (type === "income") income += amount;
        else if (type === "expense") expense += amount;
        else if (type === "petty_cash") {
          pettyCash += amount;
          expense += amount;
        }

        if (status === "pending") {
          pending += amount;
        }
      });

      return {
        income: income,
        expense: expense,
        pettyCash: pettyCash,
        pending: pending,
        balance: income - expense
      };
    }

    function calculateThisMonthSummary() {
      const now = new Date();
      const month = now.getMonth();
      const year = now.getFullYear();

      const rows = transactions.filter(function (row) {
        const value = UnganiClientShared.getValue(row, ["transaction_date", "created_at"], "");
        if (!value) return false;

        const date = new Date(value);
        if (isNaN(date.getTime())) return false;

        return date.getMonth() === month && date.getFullYear() === year;
      });

      return calculateSummary(rows);
    }

    function getFilteredTransactions() {
      const type = document.getElementById("filterType") ? UnganiClientShared.value("filterType").toLowerCase() : "";
      const status = document.getElementById("filterStatus") ? UnganiClientShared.value("filterStatus").toLowerCase() : "";
      const from = document.getElementById("filterFrom") ? UnganiClientShared.value("filterFrom") : "";
      const to = document.getElementById("filterTo") ? UnganiClientShared.value("filterTo") : "";
      const query = document.getElementById("searchBox") ? UnganiClientShared.value("searchBox").toLowerCase() : "";

      return transactions.filter(function (row) {
        const rowType = getTransactionType(row);
        const rowStatus = String(UnganiClientShared.getValue(row, ["status"], "completed")).toLowerCase();
        const rowDate = String(UnganiClientShared.getValue(row, ["transaction_date", "created_at"], "")).slice(0, 10);

        const haystack = [
          rowType,
          rowStatus,
          UnganiClientShared.getValue(row, ["category_name", "category", "category_key"], ""),
          UnganiClientShared.getValue(row, ["description", "notes"], ""),
          UnganiClientShared.getValue(row, ["payment_reference", "reference_number"], ""),
          UnganiClientShared.getValue(row, ["related_person"], ""),
          UnganiClientShared.getValue(row, ["property_name"], ""),
          UnganiClientShared.getValue(row, ["project_name"], ""),
          UnganiClientShared.getValue(row, ["agent_name"], "")
        ].join(" ").toLowerCase();

        if (type && rowType !== type) return false;
        if (status && rowStatus !== status) return false;
        if (from && rowDate < from) return false;
        if (to && rowDate > to) return false;
        if (query && !haystack.includes(query)) return false;

        return true;
      });
    }

    async function saveTransaction(event) {
      event.preventDefault();

      const payload = buildPayload();

      if (!payload.amount || payload.amount <= 0) {
        alert("Please enter a valid amount.");
        return;
      }

      let response;

      if (currentEditId) {
        response = await currentContext.supabaseClient
          .from("transactions")
          .update(payload)
          .eq("id", currentEditId)
          .eq("tenant_id", currentContext.tenantId);
      } else {
        payload.tenant_id = currentContext.tenantId;
        payload.created_by = currentContext.authUser.id;
        payload.created_at = new Date().toISOString();

        response = await currentContext.supabaseClient
          .from("transactions")
          .insert(payload);
      }

      if (response.error) {
        alert(response.error.message);
        return;
      }

      currentEditId = null;
      UnganiClientShared.showToast("Money record saved ✓");
      await loadTransactions();
    }

    function buildPayload() {
      const type = UnganiClientShared.value("transactionType") || "income";
      const categoryKey = UnganiClientShared.value("categorySelect");
      const categoryRow = categories.find(function (row) {
        const key = UnganiClientShared.getValue(row, ["category_key", "slug", "name", "category_name"], "");

        return String(key) === String(categoryKey);
      }) || null;

      const categoryName = categoryRow
        ? UnganiClientShared.getValue(categoryRow, ["category_name", "name", "title"], categoryKey)
        : categoryKey;

      return {
        business_type_key: UnganiClientShared.getValue(currentContext.tenant, ["business_type_key"], null),
        category_id: categoryRow && categoryRow.id ? categoryRow.id : null,
        category_key: categoryKey || null,
        category: categoryName || null,
        category_name: categoryName || null,
        transaction_type: type,
        type: type,
        amount: numberValue("amount"),
        transaction_date: UnganiClientShared.value("transactionDate") || new Date().toISOString().slice(0, 10),
        payment_method: UnganiClientShared.value("paymentMethod") || null,
        payment_reference: UnganiClientShared.value("paymentReference") || null,
        reference_number: UnganiClientShared.value("paymentReference") || null,
        related_person: UnganiClientShared.value("relatedPerson") || null,
        property_name: isRealEstate ? (UnganiClientShared.value("propertyName") || null) : null,
        project_name: isRealEstate ? (UnganiClientShared.value("projectName") || null) : null,
        agent_name: isRealEstate ? (UnganiClientShared.value("agentName") || null) : null,
        commission_amount: isRealEstate ? numberValue("commissionAmount") : 0,
        description: UnganiClientShared.value("description") || null,
        notes: UnganiClientShared.value("description") || null,
        status: UnganiClientShared.value("status") || "completed",
        updated_at: new Date().toISOString()
      };
    }

    function populateEditFormIfNeeded() {
      setDefaultDate();

      if (!currentEditId) return;

      const row = transactions.find(function (item) {
        return String(item.id) === String(currentEditId);
      });

      if (!row) return;

      setValue("transactionType", getTransactionType(row));
      populateCategoryDropdown();

      setValue("categorySelect", UnganiClientShared.getValue(row, ["category_key", "category"], ""));
      setValue("amount", UnganiClientShared.getValue(row, ["amount"], 0));
      setValue("transactionDate", String(UnganiClientShared.getValue(row, ["transaction_date"], "")).slice(0, 10));
      setValue("status", UnganiClientShared.getValue(row, ["status"], "completed"));
      setValue("paymentMethod", UnganiClientShared.getValue(row, ["payment_method"], ""));
      setValue("paymentReference", UnganiClientShared.getValue(row, ["payment_reference", "reference_number"], ""));
      setValue("relatedPerson", UnganiClientShared.getValue(row, ["related_person"], ""));
      setValue("description", UnganiClientShared.getValue(row, ["description", "notes"], ""));

      if (isRealEstate) {
        setValue("propertyName", UnganiClientShared.getValue(row, ["property_name"], ""));
        setValue("projectName", UnganiClientShared.getValue(row, ["project_name"], ""));
        setValue("agentName", UnganiClientShared.getValue(row, ["agent_name"], ""));
        setValue("commissionAmount", UnganiClientShared.getValue(row, ["commission_amount"], 0));
      }
    }

    function setDefaultDate() {
      const dateEl = document.getElementById("transactionDate");

      if (dateEl && !dateEl.value) {
        dateEl.value = new Date().toISOString().slice(0, 10);
      }
    }

    function editTransaction(id) {
      currentEditId = id;
      renderPage();
      scrollToForm();
    }

    function cancelEdit() {
      currentEditId = null;
      renderPage();
      UnganiClientShared.showToast("Edit cancelled");
    }

    async function quickStatus(id, status) {
      const response = await currentContext.supabaseClient
        .from("transactions")
        .update({
          status: status,
          updated_at: new Date().toISOString()
        })
        .eq("id", id)
        .eq("tenant_id", currentContext.tenantId);

      if (response.error) {
        alert(response.error.message);
        return;
      }

      UnganiClientShared.showToast("Status updated ✓");
      await loadTransactions();
    }

    function restoreFilters() {
      const filterType = sessionStorage.getItem("ungani_money_filter_type") || "";
      const filterStatus = sessionStorage.getItem("ungani_money_filter_status") || "";
      const filterFrom = sessionStorage.getItem("ungani_money_filter_from") || "";
      const filterTo = sessionStorage.getItem("ungani_money_filter_to") || "";
      const search = sessionStorage.getItem("ungani_money_search") || "";

      if (document.getElementById("filterType")) document.getElementById("filterType").value = filterType;
      if (document.getElementById("filterStatus")) document.getElementById("filterStatus").value = filterStatus;
      if (document.getElementById("filterFrom")) document.getElementById("filterFrom").value = filterFrom;
      if (document.getElementById("filterTo")) document.getElementById("filterTo").value = filterTo;
      if (document.getElementById("searchBox")) document.getElementById("searchBox").value = search;
    }

    function saveFilters() {
      if (document.getElementById("filterType")) sessionStorage.setItem("ungani_money_filter_type", UnganiClientShared.value("filterType"));
      if (document.getElementById("filterStatus")) sessionStorage.setItem("ungani_money_filter_status", UnganiClientShared.value("filterStatus"));
      if (document.getElementById("filterFrom")) sessionStorage.setItem("ungani_money_filter_from", UnganiClientShared.value("filterFrom"));
      if (document.getElementById("filterTo")) sessionStorage.setItem("ungani_money_filter_to", UnganiClientShared.value("filterTo"));
      if (document.getElementById("searchBox")) sessionStorage.setItem("ungani_money_search", UnganiClientShared.value("searchBox"));
    }

    function resetFilters() {
      sessionStorage.removeItem("ungani_money_filter_type");
      sessionStorage.removeItem("ungani_money_filter_status");
      sessionStorage.removeItem("ungani_money_filter_from");
      sessionStorage.removeItem("ungani_money_filter_to");
      sessionStorage.removeItem("ungani_money_search");
      renderPage();
      UnganiClientShared.showToast("Filters reset ✓");
    }

    function scrollToForm() {
      setTimeout(function () {
        const card = document.getElementById("moneyFormCard");
        if (card) {
          card.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      }, 100);
    }

    function getTransactionType(row) {
      return String(UnganiClientShared.getValue(row, ["transaction_type", "type"], "income")).toLowerCase();
    }

    function numberValue(id) {
      const value = Number(UnganiClientShared.value(id) || 0);
      return isNaN(value) ? 0 : value;
    }

    function setValue(id, value) {
      const element = document.getElementById(id);
      if (element) {
        element.value = value === null || value === undefined ? "" : value;
      }
    }
  </script>
</body>
</html>
