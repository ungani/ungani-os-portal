<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Security & Data</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="pwa-register.js"></script>
  <script src="client-shared.js" onerror="window.__unganiClientSharedFailed = true;"></script>
  <script>
    (function () {
      function showUnganiLoadError() {
        if (typeof UnganiClientShared !== "undefined") return;

        var banner = document.createElement("div");
        banner.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99999;background:#B91C1C;color:#fff;padding:12px 16px;font:14px/1.4 -apple-system,sans-serif;text-align:center;";
        banner.innerHTML = "Some page resources failed to load. Please check your connection. " +
          "<button style=\"margin-left:10px;padding:4px 12px;border:none;border-radius:6px;background:#fff;color:#B91C1C;font-weight:700;cursor:pointer;\" onclick=\"window.location.reload()\">Reload</button>";

        if (document.body) {
          document.body.prepend(banner);
        } else {
          document.addEventListener("DOMContentLoaded", function () {
            document.body.prepend(banner);
          });
        }
      }

      if (window.__unganiClientSharedFailed) {
        showUnganiLoadError();
      } else {
        setTimeout(function () {
          if (typeof UnganiClientShared === "undefined") showUnganiLoadError();
        }, 4000);
      }
    })();
  </script>
</head>

<body>
  <script>
    let currentContext = null;
    let accessStatus = null;
    let auditRows = [];
    let dataVolume = null;

    // 2FA is scoped to owner accounts only (explicit decision - avoids a
    // staff member enabling it and then leaving without disabling it
    // first, which nobody but a Supabase dashboard admin could undo).
    // Defaults to true (shown) until the RPC resolves, and stays true if
    // it errors - worst case a staff account sees an Enable option that
    // client-access-guard.js's MFA check never actually enforces for
    // them anyway (see that guard's own owner-only insertion point), not
    // a security gap either way.
    let mfaIsOwner = true;
    let mfaEnabledFactorId = null;
    let mfaEnrollFactorId = null;
    let mfaEnrollQrCode = "";
    let mfaEnrollSecret = "";

    const ACTIVITY_TABLES = [
      { key: "transactions", label: "Money Records" },
      { key: "tasks", label: "Tasks" },
      { key: "documents", label: "Documents" },
      { key: "client_people", label: "People" },
      { key: "business_records", label: "Business Records" },
      { key: "business_items", label: "Items / Assets" }
    ];

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "security",
        pageTitle: "Security & Data",
        pageSubtitle: "Your account security, recent activity, and data overview.",
        onReady: startSecurityPage
      });
    });

    async function startSecurityPage(context) {
      currentContext = context;

      const [statusResult, auditResult, volumeResult] = await Promise.all([
        loadAccessStatus(),
        loadRecentActivity(),
        loadDataVolume(),
        loadMfaAccess()
      ]);

      renderSecurityPage();

      if (mfaIsOwner) loadMfaStatus();
    }

    async function loadMfaAccess() {
      try {
        const response = await currentContext.supabaseClient.rpc("get_my_ungani_staff_access");
        if (response.error) return;

        mfaIsOwner = !(response.data && response.data.account_type === "staff");
      } catch (error) {
        // leave mfaIsOwner at its default (true) - see comment above
      }
    }

    async function loadAccessStatus() {
      try {
        const response = await currentContext.supabaseClient.rpc("get_my_ungani_access_status");
        if (response.error) {
          console.warn("Access status skipped:", response.error.message);
          accessStatus = null;
          return;
        }
        accessStatus = response.data || null;
      } catch (error) {
        console.warn("Access status skipped:", error.message);
        accessStatus = null;
      }
    }

    async function loadRecentActivity() {
      try {
        const userId = currentContext.authUser ? currentContext.authUser.id : null;
        if (!userId) {
          auditRows = [];
          return;
        }

        const response = await currentContext.supabaseClient
          .from("ungani_audit_log")
          .select("id, action, entity_type, description, ip_address, created_at")
          .eq("actor_user_id", userId)
          .order("created_at", { ascending: false })
          .limit(20);

        if (response.error) {
          console.warn("Recent activity skipped:", response.error.message);
          auditRows = [];
          return;
        }

        auditRows = response.data || [];
      } catch (error) {
        console.warn("Recent activity skipped:", error.message);
        auditRows = [];
      }
    }

    async function loadDataVolume() {
      try {
        const counts = await Promise.all(
          ACTIVITY_TABLES.map(function (table) {
            return currentContext.supabaseClient
              .from(table.key)
              .select("id", { count: "exact", head: true })
              .eq("tenant_id", currentContext.tenantId)
              .then(function (response) {
                return { key: table.key, label: table.label, count: response.count || 0 };
              })
              .catch(function () {
                return { key: table.key, label: table.label, count: null };
              });
          })
        );

        dataVolume = counts;
      } catch (error) {
        console.warn("Data volume skipped:", error.message);
        dataVolume = null;
      }
    }

    function getLastLoginEvent() {
      return auditRows.find(function (row) { return row.action === "login"; }) || null;
    }

    function actionLabel(action) {
      const map = {
        login: "Signed in",
        logout: "Signed out",
        logout_idle_timeout: "Signed out (inactivity)",
        access_denied: "Access denied",
        record_deleted: "Deleted a record",
        role_changed: "Role changed",
        staff_added: "Staff member added",
        staff_permission_changed: "Staff permissions changed",
        staff_disabled: "Staff member disabled",
        tenant_status_changed: "Account status changed",
        tenant_profile_updated: "Business profile updated",
        subscription_updated: "Subscription updated"
      };

      return map[action] || UnganiClientShared.cleanText(action || "Activity");
    }

    function actionAccent(action) {
      if (action === "login") return "#16A34A";
      if (action === "access_denied" || action === "record_deleted") return "#DC2626";
      if (String(action || "").startsWith("logout")) return "#64748B";
      return "#D4A63A";
    }

    // renderSecurityPage() rebuilds the whole page (including #mfaBox,
    // reset to its "Loading..." placeholder) via UnganiClientShared's
    // single setContent() call - a plain re-render after Refresh would
    // otherwise leave the 2FA card stuck on "Loading..." since nothing
    // would re-populate it.
    async function refreshActivity() {
      await loadRecentActivity();
      renderSecurityPage();
      if (mfaIsOwner) loadMfaStatus();
    }

    async function signOutOtherSessions() {
      const confirmed = confirm("This will sign you out on every other device and browser where you're currently logged in. This browser will stay signed in. Continue?");
      if (!confirmed) return;

      const btn = document.getElementById("signOutOthersBtn");
      if (btn) { btn.disabled = true; btn.innerText = "Signing out other sessions..."; }

      try {
        const { error } = await currentContext.supabaseClient.auth.signOut({ scope: "others" });

        if (error) {
          UnganiClientShared.showToast("Could not sign out other sessions: " + error.message);
        } else {
          UnganiClientShared.showToast("Signed out of all other sessions ✓");
        }
      } catch (error) {
        UnganiClientShared.showToast("Could not sign out other sessions: " + error.message);
      } finally {
        if (btn) { btn.disabled = false; btn.innerText = "Sign Out of All Other Devices"; }
      }
    }

    // ---- Two-Factor Authentication (Supabase Auth TOTP MFA) ----
    // Mirrors admin-settings.html's Two-Factor Authentication card
    // exactly (same enroll/verify/disable flow against
    // supabase.auth.mfa.*), adapted to this page's UnganiClientShared
    // conventions (.ungani-btn/.ungani-badge, safe()/showToast()/
    // logAuditEvent()) instead of admin-settings.html's page-local ones.
    async function loadMfaStatus() {
      try {
        const { data, error } = await currentContext.supabaseClient.auth.mfa.listFactors();

        if (error) {
          mfaEnabledFactorId = null;
          renderMfaBox("error");
          return;
        }

        const totpFactors = (data && data.totp) || [];
        const verified = totpFactors.find(function (f) { return f.status === "verified"; });

        mfaEnabledFactorId = verified ? verified.id : null;
        mfaEnrollFactorId = null;

        renderMfaBox(mfaEnabledFactorId ? "enabled" : "disabled");
      } catch (error) {
        mfaEnabledFactorId = null;
        renderMfaBox("error");
      }
    }

    function renderMfaBox(state) {
      const box = document.getElementById("mfaBox");
      if (!box) return;

      if (state === "error") {
        box.innerHTML = `<p class="ungani-small">Could not load two-factor status right now.</p>`;
        return;
      }

      if (state === "enabled") {
        box.innerHTML = `
          <span class="ungani-badge green">Enabled</span>
          <div class="ungani-button-row" style="margin-top:12px;">
            <button class="ungani-btn dark" type="button" onclick="disableMfa()">Disable Two-Factor Authentication</button>
          </div>
        `;
        return;
      }

      if (state === "enroll") {
        box.innerHTML = `
          <div class="ungani-small" style="font-weight:800;color:var(--ungani-text);margin-bottom:4px;">Scan this code with your authenticator app</div>
          <p class="ungani-small">Open Google Authenticator, Authy, or a similar app, then scan the QR code below.</p>
          <div class="mfa-qr-wrap" id="mfaQrWrap"></div>
          <p class="ungani-small">Can't scan it? Enter this code manually:</p>
          <span class="mfa-secret">${UnganiClientShared.safe(mfaEnrollSecret || "")}</span>
          <form onsubmit="submitMfaVerify(event)">
            <label for="mfaCodeInput">Enter the 6-digit code from your app</label>
            <input id="mfaCodeInput" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="123456" required />
            <div id="mfaVerifyMessage" class="ungani-small" style="margin-bottom:8px;"></div>
            <div class="ungani-button-row">
              <button class="ungani-btn gold" type="submit">Verify & Enable</button>
              <button class="ungani-btn dark" type="button" onclick="cancelMfaEnroll()">Cancel</button>
            </div>
          </form>
        `;
        renderMfaQrImage();
        return;
      }

      box.innerHTML = `
        <span class="ungani-badge red">Not Enabled</span>
        <div class="ungani-button-row" style="margin-top:12px;">
          <button class="ungani-btn gold" type="button" onclick="startMfaEnroll()">Enable Two-Factor Authentication</button>
        </div>
      `;
    }

    // Built via DOM property assignment, not string interpolation - see
    // the admin-settings.html fix this mirrors: Supabase's
    // data.totp.qr_code is a data: URI with RAW (unescaped) SVG markup,
    // whose own embedded quotes (xmlns="...") would break a
    // template-literal src="${...}" attribute and leak trailing text
    // like alt="QR code" /> onto the page as visible content.
    function renderMfaQrImage() {
      const wrap = document.getElementById("mfaQrWrap");
      if (!wrap || !mfaEnrollQrCode) return;

      const img = document.createElement("img");
      img.src = mfaEnrollQrCode.startsWith("data:")
        ? mfaEnrollQrCode
        : "data:image/svg+xml;utf-8," + encodeURIComponent(mfaEnrollQrCode);
      img.alt = "QR code";
      wrap.appendChild(img);
    }

    async function startMfaEnroll() {
      try {
        // Clean up any stale unverified factor from an earlier abandoned
        // attempt before starting a fresh one.
        const listResponse = await currentContext.supabaseClient.auth.mfa.listFactors();
        const staleFactors = (listResponse.data && listResponse.data.totp || []).filter(function (f) { return f.status === "unverified"; });

        for (const stale of staleFactors) {
          await currentContext.supabaseClient.auth.mfa.unenroll({ factorId: stale.id });
        }

        const { data, error } = await currentContext.supabaseClient.auth.mfa.enroll({ factorType: "totp" });

        if (error || !data) {
          UnganiClientShared.showToast("Could not start two-factor setup. Please try again.");
          return;
        }

        mfaEnrollFactorId = data.id;
        mfaEnrollQrCode = (data.totp && data.totp.qr_code) || "";
        mfaEnrollSecret = (data.totp && data.totp.secret) || "";

        renderMfaBox("enroll");
      } catch (error) {
        UnganiClientShared.showToast("Could not start two-factor setup. Please try again.");
      }
    }

    async function submitMfaVerify(event) {
      event.preventDefault();

      const code = document.getElementById("mfaCodeInput").value.trim();
      const msgEl = document.getElementById("mfaVerifyMessage");
      if (msgEl) msgEl.innerHTML = "";

      if (!mfaEnrollFactorId || !code) return;

      try {
        const { error } = await currentContext.supabaseClient.auth.mfa.challengeAndVerify({
          factorId: mfaEnrollFactorId,
          code: code
        });

        if (error) {
          if (msgEl) msgEl.innerHTML = `<span style="color:#DC2626;">That code didn't match. Check your app and try again.</span>`;
          return;
        }

        UnganiClientShared.logAuditEvent("mfa_enabled", { entityType: "session" });
        UnganiClientShared.showToast("Two-factor authentication enabled ✓");
        mfaEnrollFactorId = null;
        await loadMfaStatus();
      } catch (error) {
        if (msgEl) msgEl.innerHTML = `<span style="color:#DC2626;">That code didn't match. Check your app and try again.</span>`;
      }
    }

    function cancelMfaEnroll() {
      mfaEnrollFactorId = null;
      renderMfaBox(mfaEnabledFactorId ? "enabled" : "disabled");
    }

    async function disableMfa() {
      if (!mfaEnabledFactorId) return;
      if (!confirm("Turn off two-factor authentication for your account? You will only need your password to sign in after this.")) return;

      try {
        const { error } = await currentContext.supabaseClient.auth.mfa.unenroll({ factorId: mfaEnabledFactorId });

        if (error) {
          UnganiClientShared.showToast("Could not disable two-factor authentication: " + error.message);
          return;
        }

        UnganiClientShared.logAuditEvent("mfa_disabled", { entityType: "session" });
        UnganiClientShared.showToast("Two-factor authentication disabled");
        await loadMfaStatus();
      } catch (error) {
        UnganiClientShared.showToast("Could not disable two-factor authentication: " + error.message);
      }
    }

    function renderSecurityPage() {
      const lastLogin = getLastLoginEvent();
      const lastSignInAt = (currentContext.authUser && currentContext.authUser.last_sign_in_at) || (lastLogin && lastLogin.created_at) || null;
      const driveUrl = currentContext.tenant ? UnganiClientShared.getValue(currentContext.tenant, ["google_drive_folder_url"], "") : "";
      const driveConnectedAt = currentContext.tenant ? UnganiClientShared.getValue(currentContext.tenant, ["drive_connected_at"], "") : "";

      UnganiClientShared.setContent(`
        <style>
          .security-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
            margin-bottom: 18px;
          }

          .security-card h3 {
            margin: 0 0 6px;
            font-size: 15px;
          }

          .security-card .security-value {
            font-size: 22px;
            font-weight: 900;
            color: var(--ungani-text);
            margin: 6px 0;
          }

          .security-card p {
            margin: 0;
            color: var(--ungani-muted);
            font-size: 13px;
            line-height: 1.5;
          }

          .activity-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: flex-start;
            padding: 12px 0;
            border-bottom: 1px solid var(--ungani-border);
          }

          .activity-row:last-child { border-bottom: none; }

          .mfa-qr-wrap {
            display: flex;
            justify-content: center;
            margin: 14px 0;
          }

          .mfa-qr-wrap img {
            width: 200px;
            height: 200px;
            border-radius: 12px;
            background: #FFFFFF;
            padding: 10px;
          }

          .mfa-secret {
            display: block;
            text-align: center;
            font-family: monospace;
            font-size: 15px;
            letter-spacing: 1px;
            background: var(--ungani-bg);
            border: 1px solid var(--ungani-border);
            border-radius: 10px;
            padding: 8px;
            margin: 6px 0 14px;
            word-break: break-all;
            color: var(--ungani-text);
          }

          .activity-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            color: #fff;
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
          }

          .activity-meta {
            color: var(--ungani-muted);
            font-size: 12px;
            margin-top: 4px;
          }

          .volume-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
          }

          .volume-tile {
            background: var(--ungani-card);
            border: 1px solid var(--ungani-border);
            border-radius: 14px;
            padding: 14px;
            text-align: center;
          }

          .volume-tile strong {
            display: block;
            font-size: 24px;
            color: var(--ungani-text);
          }

          .volume-tile span {
            font-size: 12px;
            color: var(--ungani-muted);
          }
        </style>

        <section class="ungani-card ungani-hero-card">
          <div style="position: relative; z-index: 1;">
            <h2>Security & Data</h2>
            <p>Your account status, sign-in history, recent security activity, and connected data at a glance.</p>
          </div>
        </section>

        <section class="security-grid">
          <div class="ungani-card security-card">
            <h3>Account Status</h3>
            <div class="security-value">${UnganiClientShared.safe(UnganiClientShared.cleanText(accessStatus ? (accessStatus.access_level || "unknown") : "unavailable"))}</div>
            <p>
              Package: ${UnganiClientShared.safe(UnganiClientShared.cleanText(accessStatus ? (accessStatus.package_key || "starter") : "-"))}<br/>
              Subscription: ${UnganiClientShared.safe(UnganiClientShared.cleanText(accessStatus ? (accessStatus.subscription_status || "-") : "-"))}<br/>
              Payment: ${UnganiClientShared.safe(UnganiClientShared.cleanText(accessStatus ? (accessStatus.payment_status || "-") : "-"))}
              ${accessStatus && accessStatus.days_left !== null && accessStatus.days_left !== undefined ? `<br/>Trial days left: ${UnganiClientShared.safe(accessStatus.days_left)}` : ""}
            </p>
            <div class="ungani-button-row" style="margin-top:12px;">
              <a class="ungani-btn dark" href="my-account-status.html">Full Account Status</a>
            </div>
          </div>

          <div class="ungani-card security-card">
            <h3>Last Login</h3>
            <div class="security-value">${UnganiClientShared.safe(lastSignInAt ? UnganiClientShared.formatDateTime(lastSignInAt) : "No record yet")}</div>
            <p>
              ${lastLogin && lastLogin.ip_address ? "From IP " + UnganiClientShared.safe(lastLogin.ip_address) : "IP address not available for this sign-in."}
            </p>
            <div class="ungani-button-row" style="margin-top:12px;">
              <button class="ungani-btn dark" id="signOutOthersBtn" onclick="signOutOtherSessions()">Sign Out of All Other Devices</button>
            </div>
          </div>

          <div class="ungani-card security-card">
            <h3>Connected Integrations</h3>
            <div class="security-value">${driveUrl ? "Google Drive: Connected" : "Google Drive: Not Set"}</div>
            <p>
              ${driveUrl
                ? "Linked folder for shared business documents." + (driveConnectedAt ? " Connected " + UnganiClientShared.safe(UnganiClientShared.formatDate(driveConnectedAt)) + "." : "")
                : "No Google Drive folder linked yet. This is set up by UNGANI on request."}
              This is a linked folder reference, not a direct file sync.
            </p>
          </div>
        </section>

        ${mfaIsOwner ? `
        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>Two-Factor Authentication</h3>
              <p class="ungani-small">Add a second step to your login using an authenticator app (Google Authenticator, Authy, or similar). Optional, but recommended.</p>
            </div>
          </div>

          <div id="mfaBox">
            <p class="ungani-small">Loading...</p>
          </div>
        </section>
        ` : ""}

        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>Data Overview</h3>
              <p class="ungani-small">Record counts across your business data. UNGANI does not track raw storage size for linked documents or item photos.</p>
            </div>
          </div>

          <div class="volume-grid">
            ${dataVolume ? dataVolume.map(function (item) {
              return `
                <div class="volume-tile">
                  <strong>${item.count === null ? "—" : UnganiClientShared.safe(item.count)}</strong>
                  <span>${UnganiClientShared.safe(item.label)}</span>
                </div>
              `;
            }).join("") : "<p class=\"ungani-small\">Data overview unavailable right now.</p>"}
          </div>
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>Recent Security Activity</h3>
              <p class="ungani-small">Your own sign-ins, sign-outs, deletions, and permission changes.</p>
            </div>

            <button class="ungani-btn green" onclick="refreshActivity()">Refresh</button>
          </div>

          ${auditRows.length ? auditRows.map(function (row) {
            return `
              <div class="activity-row">
                <div>
                  <span class="activity-badge" style="background:${actionAccent(row.action)};">${UnganiClientShared.safe(actionLabel(row.action))}</span>
                  ${row.description ? `<div class="activity-meta">${UnganiClientShared.safe(row.description)}</div>` : ""}
                </div>
                <div style="text-align:right;">
                  <div>${UnganiClientShared.safe(UnganiClientShared.formatDateTime(row.created_at))}</div>
                  ${row.ip_address ? `<div class="activity-meta">${UnganiClientShared.safe(row.ip_address)}</div>` : ""}
                </div>
              </div>
            `;
          }).join("") : `
            <div class="ungani-empty">
              <h3>No recent activity recorded yet</h3>
              <p>Your sign-ins and security-relevant actions will appear here going forward.</p>
            </div>
          `}
        </section>

        <p class="ungani-small">
          Security & Data Version: v1 · ungani.com · info@ungani.com
        </p>
      `);
    }
  </script>
</body>
</html>
