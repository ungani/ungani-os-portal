<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Admin Support</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin-shared.js"></script>

  <style>
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 6px solid var(--gold);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 24px var(--shadow);
    }

    .metric-card h3 {
      margin: 0 0 8px;
      color: var(--soft-text);
      font-size: 14px;
    }

    .metric-card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
      color: var(--text);
    }

    .metric-card .note {
      margin-top: 8px;
      color: var(--soft-text);
      font-size: 12px;
    }

    .metric-card.green {
      border-left-color: var(--green);
    }

    .metric-card.red {
      border-left-color: var(--red);
    }

    .metric-card.orange {
      border-left-color: var(--orange);
    }

    .metric-card.blue {
      border-left-color: var(--blue);
    }

    .two-col {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .form-grid-full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 8px 0 6px;
      font-size: 14px;
      color: var(--text);
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--input-bg);
      color: var(--text);
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 95px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
      background: var(--gold);
      color: #061C3D;
      text-decoration: none;
      display: inline-block;
    }

    .btn.dark {
      background: #061C3D;
      color: #FFFFFF;
    }

    body.dark .btn.dark {
      background: #F5F5F3;
      color: #061C3D;
    }

    .btn.green {
      background: var(--green);
      color: #FFFFFF;
    }

    .btn.red {
      background: var(--red);
      color: #FFFFFF;
    }

    .btn.orange {
      background: var(--orange);
      color: #FFFFFF;
    }

    .btn.blue {
      background: var(--blue);
      color: #FFFFFF;
    }

    .row-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-left: 6px solid var(--gold);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .row-card.open-card {
      border-left-color: var(--orange);
    }

    .row-card.urgent-card {
      border-left-color: var(--red);
    }

    .row-card.resolved-card {
      border-left-color: var(--green);
    }

    .row-title {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 6px;
      color: var(--text);
    }

    .row-detail {
      color: var(--soft-text);
      margin: 5px 0;
      line-height: 1.45;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      background: #061C3D;
      color: #FFFFFF;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      text-transform: capitalize;
    }

    .badge.green {
      background: var(--green);
    }

    .badge.red {
      background: var(--red);
    }

    .badge.orange {
      background: var(--orange);
    }

    .badge.blue {
      background: var(--blue);
    }

    .badge.gold {
      background: var(--gold);
      color: #061C3D;
    }

    .empty {
      text-align: center;
      padding: 28px;
      background: var(--bg);
      border: 1px dashed var(--border);
      border-radius: 18px;
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--text);
    }

    .empty p {
      margin: 0;
      color: var(--soft-text);
    }

    .section-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-title-row h2 {
      margin: 0;
    }

    .small-text {
      color: var(--soft-text);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 950px) {
      .two-col {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="adminRoot"></div>

  <script>
    let supabaseClient = null;
    let currentAdmin = null;
    let tenants = [];
    let supportIssues = [];
    let selectedIssueId = null;

    const pageMainHtml = `
      <section class="ungani-card ungani-hero-card">
        <div style="position: relative; z-index: 1;">
          <h2>Admin Support Center</h2>
          <p>
            Review client support issues, update progress, reply to clients, and keep internal notes for follow-up.
          </p>
          <div style="margin-top: 16px;">
            <a class="btn" href="admin-home.html">Admin Home</a>
            <a class="btn green" href="admin.html">Main Admin</a>
            <a class="btn blue" href="admin-chat.html">Admin Chat</a>
            <a class="btn dark" href="admin-settings.html">Admin Settings</a>
          </div>
        </div>
      </section>

      <section class="page-grid" id="metricsGrid">
        <div class="metric-card"><h3>Loading</h3><p>...</p><div class="note">Please wait</div></div>
      </section>

      <section class="two-col">
        <div class="ungani-card">
          <div class="section-title-row">
            <h2>Create Support Issue</h2>
          </div>

          <div class="form-grid">
            <div>
              <label for="newTenantId">Client</label>
              <select id="newTenantId">
                <option value="">Loading clients...</option>
              </select>
            </div>

            <div>
              <label for="newPriority">Priority</label>
              <select id="newPriority">
                <option value="normal">Normal</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
                <option value="urgent">Urgent</option>
              </select>
            </div>

            <div>
              <label for="newIssueType">Issue Type</label>
              <select id="newIssueType">
                <option value="system_issue">System Issue</option>
                <option value="client_request">Client Request</option>
                <option value="training">Training</option>
                <option value="billing">Billing</option>
                <option value="documents">Documents</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div>
              <label for="newStatus">Status</label>
              <select id="newStatus">
                <option value="open">Open</option>
                <option value="in_progress">In Progress</option>
                <option value="resolved">Resolved</option>
                <option value="closed">Closed</option>
              </select>
            </div>

            <div class="form-grid-full">
              <label for="newIssueTitle">Issue Title</label>
              <input id="newIssueTitle" placeholder="Example: Client cannot upload document" />
            </div>

            <div class="form-grid-full">
              <label for="newDescription">Description</label>
              <textarea id="newDescription" placeholder="Describe the issue or request..."></textarea>
            </div>
          </div>

          <div class="button-row">
            <button class="btn green" onclick="createSupportIssue()">Create Issue</button>
            <button class="btn dark" onclick="clearNewIssueForm()">Clear Form</button>
          </div>

          <p class="small-text">
            Use this when you want to log an issue on behalf of a client during a call or meeting.
          </p>
        </div>

        <div class="ungani-card">
          <div class="section-title-row">
            <h2 id="selectedIssueTitle">Selected Issue</h2>
          </div>

          <div id="selectedIssueBox">
            <div class="empty">
              <h3>No issue selected</h3>
              <p>Select an issue from the list below to update status, response, or internal notes.</p>
            </div>
          </div>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>All Support Issues</h2>
          <button class="btn" onclick="loadPageData()">Refresh</button>
        </div>

        <div class="form-grid">
          <div>
            <label for="filterClient">Filter Client</label>
            <select id="filterClient" onchange="renderSupportIssues()">
              <option value="">All Clients</option>
            </select>
          </div>

          <div>
            <label for="filterStatus">Filter Status</label>
            <select id="filterStatus" onchange="renderSupportIssues()">
              <option value="">All Statuses</option>
              <option value="open">Open</option>
              <option value="in_progress">In Progress</option>
              <option value="resolved">Resolved</option>
              <option value="closed">Closed</option>
            </select>
          </div>

          <div>
            <label for="filterPriority">Filter Priority</label>
            <select id="filterPriority" onchange="renderSupportIssues()">
              <option value="">All Priorities</option>
              <option value="normal">Normal</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
            </select>
          </div>

          <div>
            <label for="searchBox">Search</label>
            <input id="searchBox" placeholder="Search support issues..." oninput="renderSupportIssues()" />
          </div>
        </div>

        <div id="supportList" style="margin-top: 18px;">
          <div class="empty">
            <h3>Loading support issues...</h3>
            <p>Please wait.</p>
          </div>
        </div>
      </section>
    `;

    window.addEventListener("load", function () {
      UnganiAdminShared.renderShell("adminRoot", {
        activeKey: "admin-support",
        pageTitle: "Admin Support",
        pageSubtitle: "Manage client support issues and follow-ups.",
        footerTitle: "Admin Support",
        footerVersion: "Admin Support Version: Step 281 Shared Session Added",
        mainHtml: pageMainHtml
      });

      UnganiAdminShared.requireAdmin({
        onNoSession: function () {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiLoginShell").classList.remove("hidden");
        },
        onBlocked: function (reason) {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiBlockedShell").classList.remove("hidden");
          document.getElementById("unganiBlockedReason").innerText = reason;
        },
        onReady: async function (admin, client) {
          currentAdmin = admin;
          supabaseClient = client;

          UnganiAdminShared.renderSidebar("adminSidebar", {
            activeKey: "admin-support",
            adminName: admin.full_name || "Admin Workspace",
            footerTitle: "Admin Support",
            footerVersion: "Admin Support Version: Step 281 Shared Session Added"
          });

          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiAppShell").classList.remove("hidden");

          await loadPageData();
        }
      });
    });

    function safe(value) {
      return UnganiAdminShared.safe(value);
    }

    function cleanText(value) {
      return UnganiAdminShared.cleanText(value);
    }

    function getField(row, names, fallback = "") {
      for (const name of names) {
        if (row && row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return fallback;
    }

    function getTenantName(row) {
      return getField(row, ["company_name", "business_name", "name"], "Client Business");
    }

    function getTenantNameById(tenantId) {
      const tenant = tenants.find(row => String(row.id) === String(tenantId));
      return tenant ? getTenantName(tenant) : "Unknown Client";
    }

    function getIssueTitle(row) {
      return getField(row, ["issue_title", "subject", "title"], "Support Issue");
    }

    function getIssueDescription(row) {
      return getField(row, ["description", "message", "issue_description"], "");
    }

    function getIssueStatus(row) {
      return String(getField(row, ["status", "issue_status"], "open")).toLowerCase();
    }

    function getIssuePriority(row) {
      return String(getField(row, ["priority"], "normal")).toLowerCase();
    }

    function formatDateTime(value) {
      if (!value) return "N/A";
      const dateObj = new Date(value);
      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function isOpenStatus(status) {
      return ["open", "new", "pending", "in_progress"].includes(String(status || "").toLowerCase());
    }

    function statusBadge(status) {
      const clean = String(status || "open").toLowerCase();

      if (clean === "resolved" || clean === "closed") {
        return `<span class="badge green">${safe(cleanText(clean))}</span>`;
      }

      if (clean === "in_progress") {
        return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
      }

      return `<span class="badge orange">${safe(cleanText(clean))}</span>`;
    }

    function priorityBadge(priority) {
      const clean = String(priority || "normal").toLowerCase();

      if (clean === "urgent" || clean === "high") {
        return `<span class="badge red">${safe(cleanText(clean))}</span>`;
      }

      if (clean === "medium") {
        return `<span class="badge orange">${safe(cleanText(clean))}</span>`;
      }

      return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
    }

    function cardClass(row) {
      const status = getIssueStatus(row);
      const priority = getIssuePriority(row);

      if (status === "resolved" || status === "closed") return "resolved-card";
      if (priority === "urgent" || priority === "high") return "urgent-card";
      return "open-card";
    }

    async function safeSelect(tableName) {
      try {
        const { data, error } = await supabaseClient
          .from(tableName)
          .select("*")
          .limit(10000);

        if (error) {
          console.log(tableName, error.message);
          return [];
        }

        return data || [];
      } catch (error) {
        console.log(tableName, error.message);
        return [];
      }
    }

    async function loadPageData() {
      UnganiAdminShared.showToast("Loading support issues...");

      const [tenantRows, supportRows] = await Promise.all([
        safeSelect("tenants"),
        safeSelect("support_issues")
      ]);

      tenants = tenantRows;
      supportIssues = supportRows.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));

      fillClientSelects();
      renderMetrics();
      renderSupportIssues();

      if (selectedIssueId) {
        renderSelectedIssue(selectedIssueId);
      }

      UnganiAdminShared.showToast("Support updated ✓");
    }

    function fillClientSelects() {
      const options = tenants
        .map(row => `<option value="${safe(row.id)}">${safe(getTenantName(row))}</option>`)
        .join("");

      document.getElementById("newTenantId").innerHTML = `<option value="">Select Client</option>${options}`;
      document.getElementById("filterClient").innerHTML = `<option value="">All Clients</option>${options}`;
    }

    function renderMetrics() {
      const total = supportIssues.length;
      const open = supportIssues.filter(row => isOpenStatus(getIssueStatus(row))).length;
      const inProgress = supportIssues.filter(row => getIssueStatus(row) === "in_progress").length;
      const resolved = supportIssues.filter(row => ["resolved", "closed"].includes(getIssueStatus(row))).length;
      const urgentHigh = supportIssues.filter(row => ["urgent", "high"].includes(getIssuePriority(row))).length;
      const clientsWithIssues = new Set(supportIssues.map(row => row.tenant_id).filter(Boolean)).size;

      const metrics = [
        { title: "Total Issues", value: total, note: "All support records", cls: "blue" },
        { title: "Open Issues", value: open, note: "Needs admin attention", cls: open > 0 ? "orange" : "green" },
        { title: "In Progress", value: inProgress, note: "Currently being handled", cls: "blue" },
        { title: "Resolved / Closed", value: resolved, note: "Completed support issues", cls: "green" },
        { title: "High / Urgent", value: urgentHigh, note: "Priority issues", cls: urgentHigh > 0 ? "red" : "green" },
        { title: "Clients With Issues", value: clientsWithIssues, note: "Unique clients with support records", cls: "blue" }
      ];

      document.getElementById("metricsGrid").innerHTML = metrics.map(item => `
        <div class="metric-card ${safe(item.cls)}">
          <h3>${safe(item.title)}</h3>
          <p>${safe(item.value)}</p>
          <div class="note">${safe(item.note)}</div>
        </div>
      `).join("");
    }

    function renderSupportIssues() {
      const clientFilter = document.getElementById("filterClient").value;
      const statusFilter = document.getElementById("filterStatus").value;
      const priorityFilter = document.getElementById("filterPriority").value;
      const query = document.getElementById("searchBox").value.toLowerCase().trim();

      let rows = [...supportIssues];

      if (clientFilter) {
        rows = rows.filter(row => String(row.tenant_id) === String(clientFilter));
      }

      if (statusFilter) {
        rows = rows.filter(row => getIssueStatus(row) === statusFilter);
      }

      if (priorityFilter) {
        rows = rows.filter(row => getIssuePriority(row) === priorityFilter);
      }

      if (query) {
        rows = rows.filter(row => {
          const haystack = [
            getIssueTitle(row),
            getIssueDescription(row),
            getTenantNameById(row.tenant_id),
            row.issue_type,
            row.priority,
            row.status,
            row.admin_response,
            row.internal_notes
          ].join(" ").toLowerCase();

          return haystack.includes(query);
        });
      }

      if (rows.length === 0) {
        document.getElementById("supportList").innerHTML = `
          <div class="empty">
            <h3>No support issues found</h3>
            <p>Try changing the filters or create a new support issue.</p>
          </div>
        `;
        return;
      }

      document.getElementById("supportList").innerHTML = rows.map(row => {
        const title = getIssueTitle(row);
        const description = getIssueDescription(row);
        const status = getIssueStatus(row);
        const priority = getIssuePriority(row);

        return `
          <div class="row-card ${safe(cardClass(row))}">
            <div class="row-title">${safe(title)}</div>
            <p class="row-detail"><strong>Client:</strong> ${safe(getTenantNameById(row.tenant_id))}</p>
            <p class="row-detail"><strong>Description:</strong> ${safe(description || "N/A")}</p>
            <p class="row-detail"><strong>Type:</strong> ${safe(cleanText(row.issue_type || "N/A"))}</p>
            <p class="row-detail"><strong>Created:</strong> ${safe(formatDateTime(row.created_at))}</p>
            <p class="row-detail"><strong>Updated:</strong> ${safe(formatDateTime(row.updated_at))}</p>

            ${statusBadge(status)}
            ${priorityBadge(priority)}

            <div class="button-row">
              <button class="btn" onclick="renderSelectedIssue('${safe(row.id)}')">Open Details</button>
              <button class="btn blue" onclick="quickUpdateStatus('${safe(row.id)}','in_progress')">In Progress</button>
              <button class="btn green" onclick="quickUpdateStatus('${safe(row.id)}','resolved')">Resolved</button>
              <button class="btn red" onclick="quickUpdateStatus('${safe(row.id)}','closed')">Closed</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderSelectedIssue(issueId) {
      const row = supportIssues.find(item => String(item.id) === String(issueId));

      if (!row) {
        selectedIssueId = null;
        document.getElementById("selectedIssueBox").innerHTML = `
          <div class="empty">
            <h3>Issue not found</h3>
            <p>Please refresh the support list.</p>
          </div>
        `;
        return;
      }

      selectedIssueId = row.id;

      document.getElementById("selectedIssueTitle").innerText = getIssueTitle(row);

      document.getElementById("selectedIssueBox").innerHTML = `
        <div class="row-card ${safe(cardClass(row))}">
          <div class="row-title">${safe(getIssueTitle(row))}</div>
          <p class="row-detail"><strong>Client:</strong> ${safe(getTenantNameById(row.tenant_id))}</p>
          <p class="row-detail"><strong>Description:</strong> ${safe(getIssueDescription(row) || "N/A")}</p>
          <p class="row-detail"><strong>Created:</strong> ${safe(formatDateTime(row.created_at))}</p>

          ${statusBadge(getIssueStatus(row))}
          ${priorityBadge(getIssuePriority(row))}
        </div>

        <label for="editStatus">Status</label>
        <select id="editStatus">
          <option value="open">Open</option>
          <option value="in_progress">In Progress</option>
          <option value="resolved">Resolved</option>
          <option value="closed">Closed</option>
        </select>

        <label for="editPriority">Priority</label>
        <select id="editPriority">
          <option value="normal">Normal</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
          <option value="urgent">Urgent</option>
        </select>

        <label for="adminResponse">Admin Response</label>
        <textarea id="adminResponse" placeholder="Write the response visible to the client..."></textarea>

        <label for="internalNotes">Internal Notes</label>
        <textarea id="internalNotes" placeholder="Private admin notes..."></textarea>

        <div class="button-row">
          <button class="btn green" onclick="saveSelectedIssue()">Save Update</button>
          <button class="btn blue" onclick="quickUpdateStatus('${safe(row.id)}','in_progress')">Mark In Progress</button>
          <button class="btn green" onclick="quickUpdateStatus('${safe(row.id)}','resolved')">Mark Resolved</button>
          <button class="btn red" onclick="quickUpdateStatus('${safe(row.id)}','closed')">Close Issue</button>
        </div>
      `;

      document.getElementById("editStatus").value = getIssueStatus(row);
      document.getElementById("editPriority").value = getIssuePriority(row);
      document.getElementById("adminResponse").value = row.admin_response || "";
      document.getElementById("internalNotes").value = row.internal_notes || "";

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function createSupportIssue() {
      const tenantId = document.getElementById("newTenantId").value;
      const title = document.getElementById("newIssueTitle").value.trim();
      const description = document.getElementById("newDescription").value.trim();
      const priority = document.getElementById("newPriority").value;
      const issueType = document.getElementById("newIssueType").value;
      const status = document.getElementById("newStatus").value;

      if (!tenantId) {
        alert("Please select a client.");
        return;
      }

      if (!title) {
        alert("Please enter an issue title.");
        return;
      }

      const now = new Date().toISOString();

      const { error } = await supabaseClient
        .from("support_issues")
        .insert({
          tenant_id: tenantId,
          issue_title: title,
          subject: title,
          issue_type: issueType,
          priority,
          status,
          description,
          created_at: now,
          updated_at: now,
          last_updated_by: UnganiAdminShared.getCurrentAdminId()
        });

      if (error) {
        alert(error.message);
        return;
      }

      UnganiAdminShared.showToast("Support issue created ✓");
      clearNewIssueForm();
      await loadPageData();
    }

    function clearNewIssueForm() {
      document.getElementById("newTenantId").value = "";
      document.getElementById("newIssueTitle").value = "";
      document.getElementById("newDescription").value = "";
      document.getElementById("newPriority").value = "normal";
      document.getElementById("newIssueType").value = "system_issue";
      document.getElementById("newStatus").value = "open";
    }

    async function quickUpdateStatus(issueId, status) {
      const now = new Date().toISOString();

      const payload = {
        status,
        updated_at: now,
        last_updated_by: UnganiAdminShared.getCurrentAdminId()
      };

      if (status === "resolved" || status === "closed") {
        payload.resolved_at = now;
      }

      const { error } = await supabaseClient
        .from("support_issues")
        .update(payload)
        .eq("id", issueId);

      if (error) {
        alert(error.message);
        return;
      }

      UnganiAdminShared.showToast("Support status updated ✓");
      selectedIssueId = issueId;
      await loadPageData();
    }

    async function saveSelectedIssue() {
      if (!selectedIssueId) {
        alert("No issue selected.");
        return;
      }

      const status = document.getElementById("editStatus").value;
      const priority = document.getElementById("editPriority").value;
      const adminResponse = document.getElementById("adminResponse").value.trim();
      const internalNotes = document.getElementById("internalNotes").value.trim();
      const now = new Date().toISOString();

      const payload = {
        status,
        priority,
        admin_response: adminResponse || null,
        internal_notes: internalNotes || null,
        updated_at: now,
        last_updated_by: UnganiAdminShared.getCurrentAdminId()
      };

      if (status === "resolved" || status === "closed") {
        payload.resolved_at = now;
      }

      const { error } = await supabaseClient
        .from("support_issues")
        .update(payload)
        .eq("id", selectedIssueId);

      if (error) {
        alert(error.message);
        return;
      }

      UnganiAdminShared.showToast("Support issue saved ✓");
      await loadPageData();
    }
  </script>
</body>
</html>
