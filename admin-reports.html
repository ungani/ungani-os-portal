<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Admin Reports</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin-shared.js"></script>

  <style>
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 6px solid var(--gold);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 24px var(--shadow);
    }

    .metric-card h3 {
      margin: 0 0 8px;
      color: var(--soft-text);
      font-size: 14px;
    }

    .metric-card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
      color: var(--text);
    }

    .metric-card .note {
      margin-top: 8px;
      color: var(--soft-text);
      font-size: 12px;
    }

    .metric-card.green { border-left-color: var(--green); }
    .metric-card.red { border-left-color: var(--red); }
    .metric-card.orange { border-left-color: var(--orange); }
    .metric-card.blue { border-left-color: var(--blue); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 8px 0 6px;
      font-size: 14px;
      color: var(--text);
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--input-bg);
      color: var(--text);
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
      background: var(--gold);
      color: #061C3D;
      text-decoration: none;
      display: inline-block;
    }

    .btn.dark {
      background: #061C3D;
      color: #FFFFFF;
    }

    body.dark .btn.dark {
      background: #F5F5F3;
      color: #061C3D;
    }

    .btn.green { background: var(--green); color: #FFFFFF; }
    .btn.red { background: var(--red); color: #FFFFFF; }
    .btn.orange { background: var(--orange); color: #FFFFFF; }
    .btn.blue { background: var(--blue); color: #FFFFFF; }

    .report-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      margin-bottom: 18px;
      box-shadow: 0 10px 24px var(--shadow);
    }

    .report-section h2 {
      margin: 0 0 12px;
      color: var(--text);
    }

    .report-section h3 {
      margin: 18px 0 8px;
      color: var(--text);
    }

    .report-table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 11px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: var(--bg);
      color: var(--text);
      font-weight: bold;
    }

    td {
      color: var(--soft-text);
    }

    .row-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-left: 6px solid var(--gold);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .row-title {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 6px;
      color: var(--text);
    }

    .row-detail {
      color: var(--soft-text);
      margin: 5px 0;
      line-height: 1.45;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      background: #061C3D;
      color: #FFFFFF;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      text-transform: capitalize;
    }

    .badge.green { background: var(--green); }
    .badge.red { background: var(--red); }
    .badge.orange { background: var(--orange); }
    .badge.blue { background: var(--blue); }
    .badge.gold { background: var(--gold); color: #061C3D; }

    .empty {
      text-align: center;
      padding: 28px;
      background: var(--bg);
      border: 1px dashed var(--border);
      border-radius: 18px;
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--text);
    }

    .empty p {
      margin: 0;
      color: var(--soft-text);
    }

    .small-text {
      color: var(--soft-text);
      font-size: 13px;
      line-height: 1.45;
    }

    .print-header {
      display: none;
    }

    @media print {
      body {
        background: #FFFFFF !important;
        color: #000000 !important;
      }

      .ungani-admin-sidebar,
      .ungani-topbar,
      .no-print,
      .button-row {
        display: none !important;
      }

      .ungani-admin-app {
        display: block !important;
      }

      .ungani-admin-main {
        padding: 0 !important;
      }

      .ungani-card,
      .report-section,
      .metric-card {
        box-shadow: none !important;
        border: 1px solid #DDDDDD !important;
        page-break-inside: avoid;
      }

      .print-header {
        display: block;
        margin-bottom: 18px;
        border-bottom: 2px solid #061C3D;
        padding-bottom: 12px;
      }

      .print-header h1 {
        margin: 0;
        color: #061C3D;
      }

      .print-header p {
        margin: 4px 0;
        color: #333333;
      }
    }
  </style>
</head>

<body>
  <div id="adminRoot"></div>

  <script>
    let supabaseClient = null;
    let currentAdmin = null;

    let dataStore = {
      tenants: [],
      registrations: [],
      users: [],
      documents: [],
      support: [],
      adminMessages: [],
      teamMessages: [],
      events: [],
      transactions: [],
      tasks: [],
      records: [],
      items: [],
      people: [],
      notices: [],
      payments: [],
      upgrades: []
    };

    const pageMainHtml = `
      <section class="ungani-card ungani-hero-card">
        <div style="position: relative; z-index: 1;">
          <h2>Admin Reports Center</h2>
          <p>
            Generate admin reports across clients, documents, Google Drive links, support, money records, tasks, chat, calendar, and operations.
          </p>
          <div style="margin-top: 16px;">
            <a class="btn" href="admin-home.html">Admin Home</a>
            <a class="btn green" href="admin.html">Main Admin</a>
            <a class="btn blue" href="admin-charts.html">Charts</a>
            <a class="btn dark" href="admin-settings.html">Admin Settings</a>
          </div>
        </div>
      </section>

      <section class="page-grid" id="metricsGrid">
        <div class="metric-card"><h3>Loading</h3><p>...</p><div class="note">Please wait</div></div>
      </section>

      <section class="ungani-card no-print">
        <h2>Report Filters</h2>

        <div class="form-grid">
          <div>
            <label for="clientFilter">Client</label>
            <select id="clientFilter" onchange="renderReport()">
              <option value="">All Clients</option>
            </select>
          </div>

          <div>
            <label for="reportFocus">Report Focus</label>
            <select id="reportFocus" onchange="renderReport()">
              <option value="full">Full Admin Report</option>
              <option value="documents">Documents / Google Drive Report</option>
              <option value="support">Support Report</option>
              <option value="money">Money Report</option>
              <option value="tasks">Tasks Report</option>
              <option value="chat">Chat Report</option>
              <option value="calendar">Calendar Report</option>
              <option value="operations">Operations Report</option>
              <option value="clients">Client Usage Report</option>
            </select>
          </div>

          <div>
            <label for="dateFrom">Date From</label>
            <input id="dateFrom" type="date" onchange="renderReport()" />
          </div>

          <div>
            <label for="dateTo">Date To</label>
            <input id="dateTo" type="date" onchange="renderReport()" />
          </div>

          <div>
            <label for="searchBox">Search</label>
            <input id="searchBox" placeholder="Search report data..." oninput="renderReport()" />
          </div>
        </div>

        <div class="button-row">
          <button class="btn green" onclick="loadPageData()">Refresh Data</button>
          <button class="btn blue" onclick="printReport()">Print / Save PDF</button>
          <button class="btn dark" onclick="resetFilters()">Reset Filters</button>
        </div>
      </section>

      <section id="reportOutput">
        <div class="empty">
          <h3>Loading report...</h3>
          <p>Please wait.</p>
        </div>
      </section>
    `;

    window.addEventListener("load", function () {
      UnganiAdminShared.renderShell("adminRoot", {
        activeKey: "admin-reports",
        pageTitle: "Admin Reports",
        pageSubtitle: "Generate reports across all client activity.",
        footerTitle: "Admin Reports",
        footerVersion: "Admin Reports Version: Step 283 Shared Session Added",
        mainHtml: pageMainHtml
      });

      UnganiAdminShared.requireAdmin({
        onNoSession: function () {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiLoginShell").classList.remove("hidden");
        },
        onBlocked: function (reason) {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiBlockedShell").classList.remove("hidden");
          document.getElementById("unganiBlockedReason").innerText = reason;
        },
        onReady: async function (admin, client) {
          currentAdmin = admin;
          supabaseClient = client;

          UnganiAdminShared.renderSidebar("adminSidebar", {
            activeKey: "admin-reports",
            adminName: admin.full_name || "Admin Workspace",
            footerTitle: "Admin Reports",
            footerVersion: "Admin Reports Version: Step 283 Shared Session Added"
          });

          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiAppShell").classList.remove("hidden");

          await loadPageData();
        }
      });
    });

    function safe(value) {
      return UnganiAdminShared.safe(value);
    }

    function cleanText(value) {
      return UnganiAdminShared.cleanText(value);
    }

    function getField(row, names, fallback = "") {
      for (const name of names) {
        if (row && row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return fallback;
    }

    function getTenantName(row) {
      return getField(row, ["company_name", "business_name", "name"], "Client Business");
    }

    function getTenantNameById(tenantId) {
      const tenant = dataStore.tenants.find(row => String(row.id) === String(tenantId));
      return tenant ? getTenantName(tenant) : "Unknown Client";
    }

    function getRecordDate(row) {
      return row.created_at || row.updated_at || row.event_date || row.due_date || row.expiry_date || "";
    }

    function formatDateTime(value) {
      if (!value) return "N/A";
      const dateObj = new Date(value);
      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function formatDate(value) {
      if (!value) return "N/A";
      const dateObj = new Date(value);
      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleDateString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function todayDate() {
      return new Date().toISOString().slice(0, 10);
    }

    function dateInDays(days) {
      const dateObj = new Date();
      dateObj.setDate(dateObj.getDate() + days);
      return dateObj.toISOString().slice(0, 10);
    }

    function isExpiredDocument(row) {
      return row.expiry_date && String(row.expiry_date) < todayDate();
    }

    function isExpiringDocument(row) {
      return row.expiry_date &&
        String(row.expiry_date) >= todayDate() &&
        String(row.expiry_date) <= dateInDays(30);
    }

    function isOpenSupport(row) {
      const status = String(getField(row, ["status", "issue_status"], "open")).toLowerCase();
      return ["open", "new", "pending", "in_progress"].includes(status);
    }

    function isOpenTask(row) {
      const status = String(getField(row, ["status", "task_status"], "pending")).toLowerCase();
      return !["done", "completed", "closed", "cancelled"].includes(status);
    }

    function amountValue(row) {
      const raw = getField(row, ["amount", "total_amount", "value"], 0);
      const num = Number(raw);
      return isNaN(num) ? 0 : num;
    }

    function moneyType(row) {
      return String(getField(row, ["record_type", "transaction_type", "type"], "")).toLowerCase();
    }

    async function safeSelect(tableName) {
      try {
        const { data, error } = await supabaseClient
          .from(tableName)
          .select("*")
          .limit(10000);

        if (error) {
          console.log(tableName, error.message);
          return [];
        }

        return data || [];
      } catch (error) {
        console.log(tableName, error.message);
        return [];
      }
    }

    async function loadPageData() {
      UnganiAdminShared.showToast("Loading admin reports...");

      const [
        tenants,
        registrations,
        users,
        documents,
        support,
        adminMessages,
        teamMessages,
        events,
        transactions,
        tasks,
        records,
        items,
        people,
        notices,
        payments,
        upgrades
      ] = await Promise.all([
        safeSelect("tenants"),
        safeSelect("registrations"),
        safeSelect("users"),
        safeSelect("documents"),
        safeSelect("support_issues"),
        safeSelect("admin_client_messages"),
        safeSelect("team_chat_messages"),
        safeSelect("business_events"),
        safeSelect("transactions"),
        safeSelect("tasks"),
        safeSelect("business_records"),
        safeSelect("business_items"),
        safeSelect("client_people"),
        safeSelect("client_notices"),
        safeSelect("payments"),
        safeSelect("upgrade_requests")
      ]);

      dataStore = {
        tenants,
        registrations,
        users,
        documents,
        support,
        adminMessages: adminMessages.filter(row => row.is_internal !== true),
        teamMessages,
        events,
        transactions,
        tasks,
        records,
        items,
        people,
        notices,
        payments,
        upgrades
      };

      fillClientFilter();
      renderMetrics();
      renderReport();

      UnganiAdminShared.showToast("Admin reports updated ✓");
    }

    function fillClientFilter() {
      const options = dataStore.tenants
        .map(row => `<option value="${safe(row.id)}">${safe(getTenantName(row))}</option>`)
        .join("");

      document.getElementById("clientFilter").innerHTML = `<option value="">All Clients</option>${options}`;
    }

    function withinDateRange(row) {
      const from = document.getElementById("dateFrom").value;
      const to = document.getElementById("dateTo").value;

      if (!from && !to) return true;

      const value = getRecordDate(row);
      if (!value) return true;

      const recordDate = String(value).slice(0, 10);

      if (from && recordDate < from) return false;
      if (to && recordDate > to) return false;

      return true;
    }

    function matchesClient(row) {
      const clientId = document.getElementById("clientFilter").value;
      if (!clientId) return true;

      return String(row.tenant_id || row.id || "") === String(clientId);
    }

    function matchesSearch(row, extraText = "") {
      const query = document.getElementById("searchBox").value.toLowerCase().trim();
      if (!query) return true;

      return `${JSON.stringify(row)} ${extraText}`.toLowerCase().includes(query);
    }

    function filteredRows(key) {
      return (dataStore[key] || []).filter(row => {
        return withinDateRange(row) && matchesSearch(row, getTenantNameById(row.tenant_id));
      }).filter(row => {
        if (key === "tenants") {
          const clientId = document.getElementById("clientFilter").value;
          return !clientId || String(row.id) === String(clientId);
        }

        return matchesClient(row);
      });
    }

    function renderMetrics() {
      const documents = filteredRows("documents");
      const support = filteredRows("support");
      const tasks = filteredRows("tasks");
      const transactions = filteredRows("transactions");
      const adminMessages = filteredRows("adminMessages");
      const events = filteredRows("events");

      const income = transactions
        .filter(row => ["income", "sale", "sales", "revenue", "received"].includes(moneyType(row)))
        .reduce((sum, row) => sum + amountValue(row), 0);

      const expenses = transactions
        .filter(row => ["expense", "expenses", "cost", "paid"].includes(moneyType(row)))
        .reduce((sum, row) => sum + amountValue(row), 0);

      const metrics = [
        { title: "Clients", value: filteredRows("tenants").length, note: "Client businesses in report", cls: "green" },
        { title: "Documents", value: documents.length, note: "Document and Drive records", cls: "blue" },
        { title: "Open Support", value: support.filter(isOpenSupport).length, note: "Support issues needing attention", cls: support.filter(isOpenSupport).length > 0 ? "orange" : "green" },
        { title: "Open Tasks", value: tasks.filter(isOpenTask).length, note: "Client tasks still open", cls: tasks.filter(isOpenTask).length > 0 ? "orange" : "green" },
        { title: "Money Records", value: transactions.length, note: `Income: ${income.toLocaleString()} | Expenses: ${expenses.toLocaleString()}`, cls: "blue" },
        { title: "Chat Messages", value: adminMessages.length, note: "Client-admin messages", cls: "blue" },
        { title: "Calendar Events", value: events.length, note: "Business events", cls: "green" },
        { title: "Expired Documents", value: documents.filter(isExpiredDocument).length, note: "Documents past expiry date", cls: documents.filter(isExpiredDocument).length > 0 ? "red" : "green" }
      ];

      document.getElementById("metricsGrid").innerHTML = metrics.map(item => `
        <div class="metric-card ${safe(item.cls)}">
          <h3>${safe(item.title)}</h3>
          <p>${safe(item.value)}</p>
          <div class="note">${safe(item.note)}</div>
        </div>
      `).join("");
    }

    function renderReport() {
      renderMetrics();

      const focus = document.getElementById("reportFocus").value;
      const sections = [];

      sections.push(renderPrintHeader());
      sections.push(renderExecutiveSummary());

      if (focus === "full" || focus === "clients") sections.push(renderClientsSection());
      if (focus === "full" || focus === "documents") sections.push(renderDocumentsSection());
      if (focus === "full" || focus === "support") sections.push(renderSupportSection());
      if (focus === "full" || focus === "money") sections.push(renderMoneySection());
      if (focus === "full" || focus === "tasks") sections.push(renderTasksSection());
      if (focus === "full" || focus === "chat") sections.push(renderChatSection());
      if (focus === "full" || focus === "calendar") sections.push(renderCalendarSection());
      if (focus === "full" || focus === "operations") {
        sections.push(renderRecordsSection());
        sections.push(renderItemsSection());
        sections.push(renderPeopleSection());
      }

      document.getElementById("reportOutput").innerHTML = sections.join("");
    }

    function renderPrintHeader() {
      const clientId = document.getElementById("clientFilter").value;
      const focus = document.getElementById("reportFocus").value;
      const clientName = clientId ? getTenantNameById(clientId) : "All Clients";

      return `
        <div class="print-header">
          <h1>UNGANI OS Admin Report</h1>
          <p><strong>Client:</strong> ${safe(clientName)}</p>
          <p><strong>Focus:</strong> ${safe(cleanText(focus))}</p>
          <p><strong>Generated:</strong> ${safe(formatDateTime(new Date().toISOString()))}</p>
          <p>ungani.com | info@ungani.com</p>
        </div>
      `;
    }

    function renderExecutiveSummary() {
      const clients = filteredRows("tenants");
      const documents = filteredRows("documents");
      const support = filteredRows("support");
      const tasks = filteredRows("tasks");
      const transactions = filteredRows("transactions");
      const adminMessages = filteredRows("adminMessages");
      const teamMessages = filteredRows("teamMessages");
      const events = filteredRows("events");
      const records = filteredRows("records");
      const items = filteredRows("items");

      const income = transactions
        .filter(row => ["income", "sale", "sales", "revenue", "received"].includes(moneyType(row)))
        .reduce((sum, row) => sum + amountValue(row), 0);

      const expenses = transactions
        .filter(row => ["expense", "expenses", "cost", "paid"].includes(moneyType(row)))
        .reduce((sum, row) => sum + amountValue(row), 0);

      return `
        <section class="report-section">
          <h2>Executive Summary</h2>
          <div class="page-grid">
            ${summaryCard("Clients", clients.length, "Client businesses included")}
            ${summaryCard("Documents", documents.length, `${documents.filter(row => row.google_drive_url).length} Google Drive link(s)`)}
            ${summaryCard("Expiring Docs", documents.filter(isExpiringDocument).length, "Documents expiring within 30 days")}
            ${summaryCard("Expired Docs", documents.filter(isExpiredDocument).length, "Documents past expiry date")}
            ${summaryCard("Open Support", support.filter(isOpenSupport).length, "Support issues needing attention")}
            ${summaryCard("Open Tasks", tasks.filter(isOpenTask).length, "Tasks still open")}
            ${summaryCard("Income", income.toLocaleString(), "Recorded income / sales")}
            ${summaryCard("Expenses", expenses.toLocaleString(), "Recorded expenses")}
            ${summaryCard("Chat Messages", adminMessages.length, "Client-admin messages")}
            ${summaryCard("Team Messages", teamMessages.length, "Internal team chat records")}
            ${summaryCard("Calendar Events", events.length, "Business events")}
            ${summaryCard("Operations Records", records.length + items.length, "Records plus items/assets")}
          </div>
        </section>
      `;
    }

    function summaryCard(title, value, note) {
      return `
        <div class="metric-card blue">
          <h3>${safe(title)}</h3>
          <p>${safe(value)}</p>
          <div class="note">${safe(note)}</div>
        </div>
      `;
    }

    function tableSection(title, columns, rows, rowRenderer, emptyText) {
      if (!rows.length) {
        return `
          <section class="report-section">
            <h2>${safe(title)}</h2>
            <div class="empty">
              <h3>No data found</h3>
              <p>${safe(emptyText || "No records matched the selected filters.")}</p>
            </div>
          </section>
        `;
      }

      return `
        <section class="report-section">
          <h2>${safe(title)}</h2>
          <div class="report-table-wrap">
            <table>
              <thead>
                <tr>
                  ${columns.map(col => `<th>${safe(col)}</th>`).join("")}
                </tr>
              </thead>
              <tbody>
                ${rows.map(rowRenderer).join("")}
              </tbody>
            </table>
          </div>
        </section>
      `;
    }

    function td(value) {
      return `<td>${safe(value || "N/A")}</td>`;
    }

    function renderClientsSection() {
      const rows = filteredRows("tenants");

      return tableSection(
        "Clients",
        ["Business", "Contact", "Email", "Phone", "Status", "Drive Folder", "Created"],
        rows,
        row => `
          <tr>
            ${td(getTenantName(row))}
            ${td(getField(row, ["contact_person", "owner_name"], "N/A"))}
            ${td(getField(row, ["business_email", "email"], "N/A"))}
            ${td(getField(row, ["business_phone", "phone"], "N/A"))}
            ${td(cleanText(getField(row, ["account_status", "status"], "active")))}
            ${td(row.google_drive_folder_url ? "Saved" : "Not Saved")}
            ${td(formatDateTime(row.created_at))}
          </tr>
        `,
        "No client records found."
      );
    }

    function renderDocumentsSection() {
      const rows = filteredRows("documents");

      return tableSection(
        "Documents / Google Drive",
        ["Client", "Document", "Source", "File Type", "Expiry", "Status", "Link"],
        rows,
        row => {
          const status = isExpiredDocument(row) ? "Expired" : isExpiringDocument(row) ? "Expiring Soon" : "Valid";
          const link = getField(row, ["google_drive_url", "document_url", "external_file_url"], "No link");

          return `
            <tr>
              ${td(getTenantNameById(row.tenant_id))}
              ${td(getField(row, ["document_title", "file_name", "title"], "Document"))}
              ${td(cleanText(row.document_source || "manual"))}
              ${td(row.file_type || "N/A")}
              ${td(formatDate(row.expiry_date))}
              ${td(status)}
              ${td(link)}
            </tr>
          `;
        },
        "No document records found."
      );
    }
