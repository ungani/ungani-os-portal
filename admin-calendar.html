<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Admin Calendar</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin-shared.js"></script>

  <style>
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 24px var(--ungani-shadow);
    }

    .metric-card h3 {
      margin: 0 0 8px;
      color: var(--ungani-muted);
      font-size: 14px;
    }

    .metric-card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
      color: var(--ungani-text);
    }

    .metric-card .note {
      margin-top: 8px;
      color: var(--ungani-muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .metric-card.green { border-left-color: var(--ungani-green); }
    .metric-card.red { border-left-color: var(--ungani-red); }
    .metric-card.orange { border-left-color: var(--ungani-orange); }
    .metric-card.blue { border-left-color: var(--ungani-blue); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .form-grid-full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 8px 0 6px;
      font-size: 14px;
      color: var(--ungani-text);
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--ungani-border);
      border-radius: 12px;
      background: var(--ungani-card);
      color: var(--ungani-text);
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
      background: var(--ungani-gold);
      color: #061C3D;
      text-decoration: none;
      display: inline-block;
    }

    .btn.dark {
      background: #061C3D;
      color: #FFFFFF;
    }

    html[data-ungani-theme="dark"] .btn.dark {
      background: #F5F5F3;
      color: #061C3D;
    }

    .btn.green { background: var(--ungani-green); color: #FFFFFF; }
    .btn.red { background: var(--ungani-red); color: #FFFFFF; }
    .btn.orange { background: var(--ungani-orange); color: #FFFFFF; }
    .btn.blue { background: var(--ungani-blue); color: #FFFFFF; }

    .two-col {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
    }

    .section-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-title-row h2 {
      margin: 0;
    }

    .row-card {
      background: var(--ungani-bg);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .row-card.today-card { border-left-color: var(--ungani-gold); }
    .row-card.upcoming-card { border-left-color: var(--ungani-blue); }
    .row-card.done-card { border-left-color: var(--ungani-green); }
    .row-card.cancelled-card { border-left-color: var(--ungani-red); }
    .row-card.overdue-card { border-left-color: var(--ungani-orange); }

    .row-title {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 6px;
      color: var(--ungani-text);
    }

    .row-detail {
      color: var(--ungani-muted);
      margin: 5px 0;
      line-height: 1.45;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      background: #061C3D;
      color: #FFFFFF;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      text-transform: capitalize;
    }

    .badge.green { background: var(--ungani-green); }
    .badge.red { background: var(--ungani-red); }
    .badge.orange { background: var(--ungani-orange); }
    .badge.blue { background: var(--ungani-blue); }
    .badge.gold { background: var(--ungani-gold); color: #061C3D; }

    .empty {
      text-align: center;
      padding: 28px;
      background: var(--ungani-bg);
      border: 1px dashed var(--ungani-border);
      border-radius: 18px;
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--ungani-text);
    }

    .empty p {
      margin: 0;
      color: var(--ungani-muted);
    }

    .small-text {
      color: var(--ungani-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 950px) {
      .two-col {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="adminRoot"></div>

  <script>
    let supabaseClient = null;
    let currentAdmin = null;

    let tenants = [];
    let events = [];
    let selectedEventId = null;

    const pageMainHtml = `
      <section class="ungani-card ungani-hero-card">
        <div style="position: relative; z-index: 1;">
          <h2>Admin Calendar Center</h2>
          <p>
            View and manage client business events, follow-ups, meetings, inspections, visits, and scheduled activities.
          </p>
          <div style="margin-top: 16px;">
            <a class="btn" href="admin-home.html">Admin Home</a>
            <a class="btn green" href="admin.html">Main Admin</a>
            <a class="btn blue" href="admin-reports.html">Reports</a>
            <a class="btn dark" href="admin-settings.html">Admin Settings</a>
          </div>
        </div>
      </section>

      <section class="page-grid" id="metricsGrid">
        <div class="metric-card"><h3>Loading</h3><p>...</p><div class="note">Please wait</div></div>
      </section>

      <section class="two-col">
        <div class="ungani-card">
          <div class="section-title-row">
            <h2>Add Client Event</h2>
          </div>

          <div class="form-grid">
            <div>
              <label for="newTenantId">Client</label>
              <select id="newTenantId">
                <option value="">Loading clients...</option>
              </select>
            </div>

            <div>
              <label for="newEventType">Event Type</label>
              <select id="newEventType">
                <option value="meeting">Meeting</option>
                <option value="follow_up">Follow-up</option>
                <option value="visit">Visit</option>
                <option value="inspection">Inspection</option>
                <option value="delivery">Delivery</option>
                <option value="pickup">Pickup</option>
                <option value="deadline">Deadline</option>
                <option value="training">Training</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div>
              <label for="newEventDate">Event Date</label>
              <input id="newEventDate" type="date" />
            </div>

            <div>
              <label for="newStartTime">Start Time</label>
              <input id="newStartTime" type="time" />
            </div>

            <div>
              <label for="newEndTime">End Time</label>
              <input id="newEndTime" type="time" />
            </div>

            <div>
              <label for="newStatus">Status</label>
              <select id="newStatus">
                <option value="scheduled">Scheduled</option>
                <option value="in_progress">In Progress</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>

            <div class="form-grid-full">
              <label for="newEventTitle">Event Title</label>
              <input id="newEventTitle" placeholder="Example: Client onboarding meeting" />
            </div>

            <div class="form-grid-full">
              <label for="newLocation">Location</label>
              <input id="newLocation" placeholder="Example: Client office / Online / Mombasa" />
            </div>

            <div class="form-grid-full">
              <label for="newDescription">Description</label>
              <textarea id="newDescription" placeholder="Add event notes or follow-up details..."></textarea>
            </div>
          </div>

          <div class="button-row">
            <button class="btn green" onclick="createEvent()">Create Event</button>
            <button class="btn dark" onclick="clearNewEventForm()">Clear Form</button>
          </div>

          <p class="small-text">
            Use this when you want to schedule a client meeting, follow-up, inspection, visit, delivery, or business activity.
          </p>
        </div>

        <div class="ungani-card">
          <div class="section-title-row">
            <h2 id="selectedEventTitle">Selected Event</h2>
          </div>

          <div id="selectedEventBox">
            <div class="empty">
              <h3>No event selected</h3>
              <p>Select an event below to update its status.</p>
            </div>
          </div>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>Calendar Filters</h2>
          <button class="btn green" onclick="loadPageData()">Refresh</button>
        </div>

        <div class="form-grid">
          <div>
            <label for="clientFilter">Client</label>
            <select id="clientFilter" onchange="renderCalendarPage()">
              <option value="">All Clients</option>
            </select>
          </div>

          <div>
            <label for="typeFilter">Event Type</label>
            <select id="typeFilter" onchange="renderCalendarPage()">
              <option value="">All Types</option>
              <option value="meeting">Meeting</option>
              <option value="follow_up">Follow-up</option>
              <option value="visit">Visit</option>
              <option value="inspection">Inspection</option>
              <option value="delivery">Delivery</option>
              <option value="pickup">Pickup</option>
              <option value="deadline">Deadline</option>
              <option value="training">Training</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div>
            <label for="statusFilter">Status</label>
            <select id="statusFilter" onchange="renderCalendarPage()">
              <option value="">All Statuses</option>
              <option value="scheduled">Scheduled</option>
              <option value="in_progress">In Progress</option>
              <option value="completed">Completed</option>
              <option value="cancelled">Cancelled</option>
              <option value="overdue">Overdue</option>
              <option value="today">Today</option>
              <option value="upcoming">Upcoming</option>
            </select>
          </div>

          <div>
            <label for="dateFrom">Date From</label>
            <input id="dateFrom" type="date" onchange="renderCalendarPage()" />
          </div>

          <div>
            <label for="dateTo">Date To</label>
            <input id="dateTo" type="date" onchange="renderCalendarPage()" />
          </div>

          <div>
            <label for="searchBox">Search</label>
            <input id="searchBox" placeholder="Search calendar events..." oninput="renderCalendarPage()" />
          </div>
        </div>

        <div class="button-row">
          <button class="btn dark" onclick="resetFilters()">Reset Filters</button>
        </div>
      </section>

      <section class="two-col">
        <div class="ungani-card">
          <div class="section-title-row">
            <h2>Client Calendar Summary</h2>
          </div>
          <div id="clientSummaryBox">
            <div class="empty">
              <h3>Loading client summary...</h3>
              <p>Please wait.</p>
            </div>
          </div>
        </div>

        <div class="ungani-card">
          <div class="section-title-row">
            <h2>Today / Upcoming Events</h2>
          </div>
          <div id="upcomingBox">
            <div class="empty">
              <h3>Loading upcoming events...</h3>
              <p>Please wait.</p>
            </div>
          </div>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>All Client Calendar Events</h2>
          <p class="small-text" id="eventsCountText">Loading...</p>
        </div>

        <div id="eventsListBox">
          <div class="empty">
            <h3>Loading calendar events...</h3>
            <p>Please wait.</p>
          </div>
        </div>
      </section>
    `;

    window.addEventListener("load", function () {
      UnganiAdminShared.renderShell("adminRoot", {
        activeKey: "admin-calendar",
        pageTitle: "Admin Calendar",
        pageSubtitle: "View and manage client calendar events.",
        footerTitle: "Admin Calendar",
        footerVersion: "Admin Calendar Version: Step 289 Shared Session Added",
        mainHtml: pageMainHtml
      });

      UnganiAdminShared.requireAdmin({
        onNoSession: function () {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiLoginShell").classList.remove("hidden");
        },
        onBlocked: function (reason) {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiBlockedShell").classList.remove("hidden");
          document.getElementById("unganiBlockedReason").innerText = reason;
        },
        onReady: async function (admin, client) {
          currentAdmin = admin;
          supabaseClient = client;

          UnganiAdminShared.renderSidebar("adminSidebar", {
            activeKey: "admin-calendar",
            adminName: admin.full_name || "Admin Workspace",
            footerTitle: "Admin Calendar",
            footerVersion: "Admin Calendar Version: Step 289 Shared Session Added"
          });

          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiAppShell").classList.remove("hidden");

          await loadPageData();
        }
      });
    });

    function safe(value) {
      return UnganiAdminShared.safe(value);
    }

    function cleanText(value) {
      return UnganiAdminShared.cleanText(value);
    }

    function getField(row, names, fallback = "") {
      for (const name of names) {
        if (row && row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return fallback;
    }

    function getTenantName(row) {
      return getField(row, ["company_name", "business_name", "name"], "Client Business");
    }

    function getTenantNameById(tenantId) {
      const tenant = tenants.find(row => String(row.id) === String(tenantId));
      return tenant ? getTenantName(tenant) : "Unknown Client";
    }

    function getEventTitle(row) {
      return getField(row, ["event_title", "title", "name"], "Calendar Event");
    }

    function getEventType(row) {
      return String(getField(row, ["event_type", "type"], "other")).toLowerCase();
    }

    function getEventStatus(row) {
      return String(getField(row, ["status", "event_status"], "scheduled")).toLowerCase();
    }

    function getEventDate(row) {
      return getField(row, ["event_date", "date"], "");
    }

    function getStartTime(row) {
      return getField(row, ["start_time", "event_time"], "");
    }

    function getEndTime(row) {
      return getField(row, ["end_time"], "");
    }

    function getLocation(row) {
      return getField(row, ["location", "venue"], "N/A");
    }

    function getDescription(row) {
      return getField(row, ["description", "notes", "details"], "");
    }

    function todayDate() {
      return new Date().toISOString().slice(0, 10);
    }

    function dateInDays(days) {
      const dateObj = new Date();
      dateObj.setDate(dateObj.getDate() + days);
      return dateObj.toISOString().slice(0, 10);
    }

    function formatDate(value) {
      if (!value) return "N/A";
      const dateObj = new Date(value);
      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleDateString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function formatDateTime(value) {
      if (!value) return "N/A";
      const dateObj = new Date(value);
      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function isCompletedStatus(status) {
      return ["completed", "done", "closed"].includes(String(status || "").toLowerCase());
    }

    function isCancelledStatus(status) {
      return ["cancelled", "canceled"].includes(String(status || "").toLowerCase());
    }

    function isToday(row) {
      return String(getEventDate(row)).slice(0, 10) === todayDate();
    }

    function isUpcoming(row) {
      const eventDate = String(getEventDate(row)).slice(0, 10);
      const status = getEventStatus(row);

      return eventDate > todayDate() && !isCompletedStatus(status) && !isCancelledStatus(status);
    }

    function isOverdue(row) {
      const eventDate = String(getEventDate(row)).slice(0, 10);
      const status = getEventStatus(row);

      return eventDate < todayDate() && !isCompletedStatus(status) && !isCancelledStatus(status);
    }

    function statusBadge(status) {
      const clean = String(status || "scheduled").toLowerCase();

      if (isCompletedStatus(clean)) {
        return `<span class="badge green">${safe(cleanText(clean))}</span>`;
      }

      if (isCancelledStatus(clean)) {
        return `<span class="badge red">${safe(cleanText(clean))}</span>`;
      }

      if (clean === "in_progress") {
        return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
      }

      return `<span class="badge orange">${safe(cleanText(clean))}</span>`;
    }

    function typeBadge(type) {
      const clean = String(type || "other").toLowerCase();

      if (clean === "meeting") return `<span class="badge blue">Meeting</span>`;
      if (clean === "follow_up") return `<span class="badge gold">Follow-up</span>`;
      if (clean === "visit") return `<span class="badge green">Visit</span>`;
      if (clean === "inspection") return `<span class="badge orange">Inspection</span>`;
      if (clean === "deadline") return `<span class="badge red">Deadline</span>`;

      return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
    }

    function eventCardClass(row) {
      if (isCancelledStatus(getEventStatus(row))) return "cancelled-card";
      if (isCompletedStatus(getEventStatus(row))) return "done-card";
      if (isToday(row)) return "today-card";
      if (isOverdue(row)) return "overdue-card";
      return "upcoming-card";
    }

    function timeText(row) {
      const start = getStartTime(row);
      const end = getEndTime(row);

      if (start && end) return `${start} - ${end}`;
      if (start) return start;

      return "N/A";
    }

    async function safeSelect(tableName) {
      try {
        const { data, error } = await supabaseClient
          .from(tableName)
          .select("*")
          .limit(10000);

        if (error) {
          console.log(tableName, error.message);
          return [];
        }

        return data || [];
      } catch (error) {
        console.log(tableName, error.message);
        return [];
      }
    }

    async function loadPageData() {
      UnganiAdminShared.showToast("Loading calendar events...");

      const [tenantRows, eventRows] = await Promise.all([
        safeSelect("tenants"),
        safeSelect("business_events")
      ]);

      tenants = tenantRows;
      events = eventRows.sort((a, b) => {
        const dateA = `${getEventDate(a) || ""} ${getStartTime(a) || ""}`;
        const dateB = `${getEventDate(b) || ""} ${getStartTime(b) || ""}`;
        return new Date(dateB) - new Date(dateA);
      });

      fillClientSelects();
      renderCalendarPage();

      if (selectedEventId) {
        renderSelectedEvent(selectedEventId);
      }

      UnganiAdminShared.showToast("Calendar updated ✓");
    }

    function fillClientSelects() {
      const selectedFilter = document.getElementById("clientFilter").value;
      const selectedNew = document.getElementById("newTenantId").value;

      const options = tenants
        .map(row => `<option value="${safe(row.id)}">${safe(getTenantName(row))}</option>`)
        .join("");

      document.getElementById("clientFilter").innerHTML = `<option value="">All Clients</option>${options}`;
      document.getElementById("newTenantId").innerHTML = `<option value="">Select Client</option>${options}`;

      if (selectedFilter) document.getElementById("clientFilter").value = selectedFilter;
      if (selectedNew) document.getElementById("newTenantId").value = selectedNew;
    }

    function withinDateRange(row) {
      const from = document.getElementById("dateFrom").value;
      const to = document.getElementById("dateTo").value;

      if (!from && !to) return true;

      const eventDate = String(getEventDate(row)).slice(0, 10);

      if (!eventDate) return true;

      if (from && eventDate < from) return false;
      if (to && eventDate > to) return false;

      return true;
    }

    function filteredEvents() {
      const clientFilter = document.getElementById("clientFilter").value;
      const typeFilter = document.getElementById("typeFilter").value;
      const statusFilter = document.getElementById("statusFilter").value;
      const query = document.getElementById("searchBox").value.toLowerCase().trim();

      let rows = [...events];

      if (clientFilter) {
        rows = rows.filter(row => String(row.tenant_id) === String(clientFilter));
      }

      if (typeFilter) {
        rows = rows.filter(row => getEventType(row) === typeFilter);
      }

      if (statusFilter) {
        if (statusFilter === "today") {
          rows = rows.filter(isToday);
        } else if (statusFilter === "upcoming") {
          rows = rows.filter(isUpcoming);
        } else if (statusFilter === "overdue") {
          rows = rows.filter(isOverdue);
        } else {
          rows = rows.filter(row => getEventStatus(row) === statusFilter);
        }
      }

      rows = rows.filter(withinDateRange);

      if (query) {
        rows = rows.filter(row => {
          const haystack = [
            getTenantNameById(row.tenant_id),
            getEventTitle(row),
            getEventType(row),
            getEventStatus(row),
            getLocation(row),
            getDescription(row),
            JSON.stringify(row)
          ].join(" ").toLowerCase();

          return haystack.includes(query);
        });
      }

      return rows;
    }

    function renderCalendarPage() {
      renderMetrics();
      renderClientSummary();
      renderUpcomingEvents();
      renderEventsList();
    }

    function renderMetrics() {
      const rows = filteredEvents();

      const today = rows.filter(isToday).length;
      const upcoming = rows.filter(isUpcoming).length;
      const overdue = rows.filter(isOverdue).length;
      const inProgress = rows.filter(row => getEventStatus(row) === "in_progress").length;
      const completed = rows.filter(row => isCompletedStatus(getEventStatus(row))).length;
      const cancelled = rows.filter(row => isCancelledStatus(getEventStatus(row))).length;

      const metrics = [
        { title: "Total Events", value: rows.length, note: "Events in current view", cls: "blue" },
        { title: "Today", value: today, note: "Events scheduled today", cls: today > 0 ? "orange" : "green" },
        { title: "Upcoming", value: upcoming, note: "Future active events", cls: "blue" },
        { title: "Overdue", value: overdue, note: "Past events not completed/cancelled", cls: overdue > 0 ? "red" : "green" },
        { title: "In Progress", value: inProgress, note: "Events currently in progress", cls: "blue" },
        { title: "Completed", value: completed, note: "Completed events", cls: "green" },
        { title: "Cancelled", value: cancelled, note: "Cancelled events", cls: cancelled > 0 ? "red" : "green" },
        { title: "Clients With Events", value: new Set(rows.map(row => row.tenant_id).filter(Boolean)).size, note: "Unique clients in current view", cls: "green" }
      ];

      document.getElementById("metricsGrid").innerHTML = metrics.map(item => `
        <div class="metric-card ${safe(item.cls)}">
          <h3>${safe(item.title)}</h3>
          <p>${safe(item.value)}</p>
          <div class="note">${safe(item.note)}</div>
        </div>
      `).join("");
    }

    function renderClientSummary() {
      const rows = filteredEvents();
      const clientMap = {};

      tenants.forEach(tenant => {
        clientMap[tenant.id] = {
          id: tenant.id,
          name: getTenantName(tenant),
          total: 0,
          today: 0,
          upcoming: 0,
          overdue: 0,
          completed: 0
        };
      });

      rows.forEach(row => {
        const tenantId = row.tenant_id;

        if (!tenantId || !clientMap[tenantId]) return;

        clientMap[tenantId].total += 1;

        if (isToday(row)) clientMap[tenantId].today += 1;
        if (isUpcoming(row)) clientMap[tenantId].upcoming += 1;
        if (isOverdue(row)) clientMap[tenantId].overdue += 1;
        if (isCompletedStatus(getEventStatus(row))) clientMap[tenantId].completed += 1;
      });

      const summaryRows = Object.values(clientMap)
        .filter(row => row.total > 0)
        .sort((a, b) => b.overdue - a.overdue || b.today - a.today || b.upcoming - a.upcoming || b.total - a.total)
        .slice(0, 10);

      if (summaryRows.length === 0) {
        document.getElementById("clientSummaryBox").innerHTML = `
          <div class="empty">
            <h3>No client calendar summary yet</h3>
            <p>Client calendar summary will appear after events are added.</p>
          </div>
        `;
        return;
      }

      document.getElementById("clientSummaryBox").innerHTML = summaryRows.map(row => `
        <div class="row-card ${row.overdue > 0 ? "overdue-card" : row.today > 0 ? "today-card" : "upcoming-card"}">
          <div class="row-title">${safe(row.name)}</div>
          <p class="row-detail"><strong>Total Events:</strong> ${safe(row.total)}</p>
          <p class="row-detail"><strong>Today:</strong> ${safe(row.today)}</p>
          <p class="row-detail"><strong>Upcoming:</strong> ${safe(row.upcoming)}</p>
          <p class="row-detail"><strong>Overdue:</strong> ${safe(row.overdue)}</p>
          <p class="row-detail"><strong>Completed:</strong> ${safe(row.completed)}</p>
          ${row.overdue > 0 ? `<span class="badge red">Needs follow-up</span>` : row.today > 0 ? `<span class="badge gold">Today</span>` : `<span class="badge green">Clear</span>`}
        </div>
      `).join("");
    }

    function renderUpcomingEvents() {
      const rows = filteredEvents()
        .filter(row => isToday(row) || isUpcoming(row))
        .sort((a, b) => {
          const dateA = `${getEventDate(a) || ""} ${getStartTime(a) || ""}`;
          const dateB = `${getEventDate(b) || ""} ${getStartTime(b) || ""}`;
          return new Date(dateA) - new Date(dateB);
        })
        .slice(0, 8);

      if (rows.length === 0) {
        document.getElementById("upcomingBox").innerHTML = `
          <div class="empty">
            <h3>No upcoming events</h3>
            <p>No today or upcoming events match the current filters.</p>
          </div>
        `;
        return;
      }

      document.getElementById("upcomingBox").innerHTML = rows.map(row => `
        <div class="row-card ${safe(eventCardClass(row))}">
          <div class="row-title">${safe(getEventTitle(row))}</div>
          <p class="row-detail"><strong>Client:</strong> ${safe(getTenantNameById(row.tenant_id))}</p>
          <p class="row-detail"><strong>Date:</strong> ${safe(formatDate(getEventDate(row)))}</p>
          <p class="row-detail"><strong>Time:</strong> ${safe(timeText(row))}</p>
          <p class="row-detail"><strong>Location:</strong> ${safe(getLocation(row))}</p>
          ${typeBadge(getEventType(row))}
          ${statusBadge(getEventStatus(row))}
          ${isToday(row) ? `<span class="badge gold">Today</span>` : ""}
        </div>
      `).join("");
    }

    function renderEventsList() {
      const rows = filteredEvents();

      document.getElementById("eventsCountText").innerText = `${rows.length} event(s) shown`;

      if (rows.length === 0) {
        document.getElementById("eventsListBox").innerHTML = `
          <div class="empty">
            <h3>No calendar events found</h3>
            <p>Try changing the filters or add a new client event.</p>
          </div>
        `;
        return;
      }

      document.getElementById("eventsListBox").innerHTML = rows.map(row => `
        <div class="row-card ${safe(eventCardClass(row))}">
          <div class="row-title">${safe(getEventTitle(row))}</div>
          <p class="row-detail"><strong>Client:</strong> ${safe(getTenantNameById(row.tenant_id))}</p>
          <p class="row-detail"><strong>Date:</strong> ${safe(formatDate(getEventDate(row)))}</p>
          <p class="row-detail"><strong>Time:</strong> ${safe(timeText(row))}</p>
          <p class="row-detail"><strong>Location:</strong> ${safe(getLocation(row))}</p>
          <p class="row-detail"><strong>Description:</strong> ${safe(getDescription(row) || "N/A")}</p>

          ${typeBadge(getEventType(row))}
          ${statusBadge(getEventStatus(row))}
          ${isToday(row) ? `<span class="badge gold">Today</span>` : ""}
          ${isOverdue(row) ? `<span class="badge red">Overdue</span>` : ""}

          <div class="button-row">
            <button class="btn" onclick="renderSelectedEvent('${safe(row.id)}')">Open Details</button>
            <button class="btn blue" onclick="quickUpdateStatus('${safe(row.id)}','in_progress')">In Progress</button>
            <button class="btn green" onclick="quickUpdateStatus('${safe(row.id)}','completed')">Completed</button>
            <button class="btn red" onclick="quickUpdateStatus('${safe(row.id)}','cancelled')">Cancel</button>
          </div>
        </div>
      `).join("");
    }

    function renderSelectedEvent(eventId) {
      const row = events.find(item => String(item.id) === String(eventId));

      if (!row) {
        selectedEventId = null;
        document.getElementById("selectedEventTitle").innerText = "Selected Event";
        document.getElementById("selectedEventBox").innerHTML = `
          <div class="empty">
            <h3>Event not found</h3>
            <p>Please refresh the calendar list.</p>
          </div>
        `;
        return;
      }

      selectedEventId = row.id;

      document.getElementById("selectedEventTitle").innerText = getEventTitle(row);

      document.getElementById("selectedEventBox").innerHTML = `
        <div class="row-card ${safe(eventCardClass(row))}">
          <div class="row-title">${safe(getEventTitle(row))}</div>
          <p class="row-detail"><strong>Client:</strong> ${safe(getTenantNameById(row.tenant_id))}</p>
          <p class="row-detail"><strong>Type:</strong> ${safe(cleanText(getEventType(row)))}</p>
          <p class="row-detail"><strong>Date:</strong> ${safe(formatDate(getEventDate(row)))}</p>
          <p class="row-detail"><strong>Time:</strong> ${safe(timeText(row))}</p>
          <p class="row-detail"><strong>Location:</strong> ${safe(getLocation(row))}</p>
          <p class="row-detail"><strong>Description:</strong> ${safe(getDescription(row) || "N/A")}</p>

          ${typeBadge(getEventType(row))}
          ${statusBadge(getEventStatus(row))}
          ${isToday(row) ? `<span class="badge gold">Today</span>` : ""}
          ${isOverdue(row) ? `<span class="badge red">Overdue</span>` : ""}
        </div>

        <label for="editStatus">Update Status</label>
        <select id="editStatus">
          <option value="scheduled">Scheduled</option>
          <option value="in_progress">In Progress</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>

        <div class="button-row">
          <button class="btn green" onclick="saveSelectedEventStatus()">Save Status</button>
          <button class="btn blue" onclick="quickUpdateStatus('${safe(row.id)}','in_progress')">Mark In Progress</button>
          <button class="btn green" onclick="quickUpdateStatus('${safe(row.id)}','completed')">Mark Completed</button>
          <button class="btn red" onclick="quickUpdateStatus('${safe(row.id)}','cancelled')">Cancel Event</button>
        </div>
      `;

      const currentStatus = getEventStatus(row);

      if (isCompletedStatus(currentStatus)) {
        document.getElementById("editStatus").value = "completed";
      } else if (isCancelledStatus(currentStatus)) {
        document.getElementById("editStatus").value = "cancelled";
      } else if (currentStatus === "in_progress") {
        document.getElementById("editStatus").value = "in_progress";
      } else {
        document.getElementById("editStatus").value = "scheduled";
      }

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function createEvent() {
      const tenantId = document.getElementById("newTenantId").value;
      const title = document.getElementById("newEventTitle").value.trim();
      const eventType = document.getElementById("newEventType").value;
      const eventDate = document.getElementById("newEventDate").value;
      const startTime = document.getElementById("newStartTime").value;
      const endTime = document.getElementById("newEndTime").value;
      const status = document.getElementById("newStatus").value;
      const location = document.getElementById("newLocation").value.trim();
      const description = document.getElementById("newDescription").value.trim();

      if (!tenantId) {
        alert("Please select a client.");
        return;
      }

      if (!title) {
        alert("Please enter an event title.");
        return;
      }

      if (!eventDate) {
        alert("Please select an event date.");
        return;
      }

      const now = new Date().toISOString();

      const { error } = await supabaseClient
        .from("business_events")
        .insert({
          tenant_id: tenantId,
          created_by: UnganiAdminShared.getCurrentAdminId(),
          event_title: title,
          event_type: eventType,
          event_date: eventDate,
          start_time: startTime || null,
          end_time: endTime || null,
          location: location || null,
          description: description || null,
          status,
          created_at: now,
          updated_at: now
        });

      if (error) {
        alert(error.message);
        return;
      }

      UnganiAdminShared.showToast("Calendar event created ✓");
      clearNewEventForm();
      await loadPageData();
    }

    function clearNewEventForm() {
      document.getElementById("newTenantId").value = "";
      document.getElementById("newEventTitle").value = "";
      document.getElementById("newEventType").value = "meeting";
      document.getElementById("newEventDate").value = "";
      document.getElementById("newStartTime").value = "";
      document.getElementById("newEndTime").value = "";
      document.getElementById("newStatus").value = "scheduled";
      document.getElementById("newLocation").value = "";
      document.getElementById("newDescription").value = "";
    }

    async function updateEventStatus(eventId, status) {
      const { error } = await supabaseClient
        .from("business_events")
        .update({
          status,
          updated_at: new Date().toISOString()
        })
        .eq("id", eventId);

      if (error) {
        alert(error.message);
        return false;
      }

      return true;
    }

    async function quickUpdateStatus(eventId, status) {
      const ok = await updateEventStatus(eventId, status);

      if (!ok) return;

      selectedEventId = eventId;

      UnganiAdminShared.showToast("Event status updated ✓");
      await loadPageData();
    }

    async function saveSelectedEventStatus() {
      if (!selectedEventId) {
        alert("No event selected.");
        return;
      }

      const status = document.getElementById("editStatus").value;
      const ok = await updateEventStatus(selectedEventId, status);

      if (!ok) return;

      UnganiAdminShared.showToast("Event status saved ✓");
      await loadPageData();
    }

    function resetFilters() {
      document.getElementById("clientFilter").value = "";
      document.getElementById("typeFilter").value = "";
      document.getElementById("statusFilter").value = "";
      document.getElementById("dateFrom").value = "";
      document.getElementById("dateTo").value = "";
      document.getElementById("searchBox").value = "";

      renderCalendarPage();

      UnganiAdminShared.showToast("Calendar filters reset ✓");
    }
  </script>
</body>
</html>
