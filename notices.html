<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Admin Notices</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="pwa-register.js"></script>
  <script src="admin-shared.js"></script>

  <style>
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 24px var(--ungani-shadow);
    }

    .metric-card h3 {
      margin: 0 0 8px;
      color: var(--ungani-muted);
      font-size: 14px;
    }

    .metric-card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
      color: var(--ungani-text);
    }

    .metric-card .note {
      margin-top: 8px;
      color: var(--ungani-muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .metric-card.green { border-left-color: var(--ungani-green); }
    .metric-card.red { border-left-color: var(--ungani-red); }
    .metric-card.orange { border-left-color: var(--ungani-orange); }
    .metric-card.blue { border-left-color: var(--ungani-blue); }
    .metric-card.gold { border-left-color: var(--ungani-gold); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .form-grid-full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 8px 0 6px;
      font-size: 14px;
      color: var(--ungani-text);
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--ungani-border);
      border-radius: 12px;
      background: var(--ungani-card);
      color: var(--ungani-text);
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
      background: var(--ungani-gold);
      color: var(--ungani-navy);
      text-decoration: none;
      display: inline-block;
    }

    .btn.dark {
      background: var(--ungani-card);
      color: var(--ungani-text);
      border: 1px solid var(--ungani-border);
    }

    .btn.green { background: var(--ungani-green); color: #FFFFFF; }
    .btn.red { background: var(--ungani-red); color: #FFFFFF; }
    .btn.orange { background: var(--ungani-orange); color: #FFFFFF; }
    .btn.blue { background: var(--ungani-blue); color: #FFFFFF; }

    .two-col {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
    }

    .section-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-title-row h2 {
      margin: 0;
    }

    .row-card {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .row-card.active-card { border-left-color: var(--ungani-green); }
    .row-card.warning-card { border-left-color: var(--ungani-orange); }
    .row-card.urgent-card { border-left-color: var(--ungani-red); }
    .row-card.info-card { border-left-color: var(--ungani-blue); }
    .row-card.system-card { border-left-color: var(--ungani-gold); }

    .row-title {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 6px;
      color: var(--ungani-text);
    }

    .row-detail {
      color: var(--ungani-muted);
      margin: 5px 0;
      line-height: 1.45;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      background: var(--ungani-navy);
      color: #FFFFFF;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      text-transform: capitalize;
    }

    .badge.green { background: var(--ungani-green); }
    .badge.red { background: var(--ungani-red); }
    .badge.orange { background: var(--ungani-orange); }
    .badge.blue { background: var(--ungani-blue); }
    .badge.gold { background: var(--ungani-gold); color: var(--ungani-navy); }

    .empty {
      text-align: center;
      padding: 28px;
      background: var(--ungani-card);
      border: 1px dashed var(--ungani-border);
      border-radius: 18px;
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--ungani-text);
    }

    .empty p {
      margin: 0;
      color: var(--ungani-muted);
    }

    .small-text {
      color: var(--ungani-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 950px) {
      .two-col {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="adminRoot"></div>

  <script>
    let supabaseClient = null;
    let currentAdmin = null;

    let tenants = [];
    let clientNotices = [];
    let systemNotices = [];
    let selectedNoticeId = null;
    let selectedNoticeSource = null;

    const pageMainHtml = `
      <section class="ungani-card ungani-hero-card">
        <div style="position: relative; z-index: 1;">
          <h2>Admin Notices Center</h2>
          <p>
            Send and manage business notices, updates, reminders, announcements, and important messages for clients.
          </p>
          <div style="margin-top: 16px;">
            <a class="btn" href="admin-home.html">Admin Home</a>
            <a class="btn green" href="admin.html">Main Admin</a>
            <a class="btn blue" href="support.html">Support</a>
            <a class="btn dark" href="admin-settings.html">Admin Settings</a>
          </div>
        </div>
      </section>

      <section class="page-grid" id="metricsGrid">
        <div class="metric-card"><h3>Loading</h3><p>...</p><div class="note">Please wait</div></div>
      </section>

      <section class="two-col">
        <div class="ungani-card">
          <div class="section-title-row">
            <h2>Send Notice</h2>
          </div>

          <div class="form-grid">
            <div>
              <label for="newTargetType">Send To</label>
              <select id="newTargetType" onchange="handleTargetTypeChange()">
                <option value="one">One Client</option>
                <option value="all">All Clients</option>
                <option value="system">System Notice</option>
              </select>
            </div>

            <div>
              <label for="newTenantId">Client</label>
              <select id="newTenantId">
                <option value="">Loading clients...</option>
              </select>
            </div>

            <div>
              <label for="newNoticeType">Notice Type</label>
              <select id="newNoticeType">
                <option value="general">General</option>
                <option value="update">Update</option>
                <option value="reminder">Reminder</option>
                <option value="maintenance">Maintenance</option>
                <option value="billing">Billing</option>
                <option value="support">Support</option>
                <option value="announcement">Announcement</option>
              </select>
            </div>

            <div>
              <label for="newPriority">Priority</label>
              <select id="newPriority">
                <option value="normal">Normal</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
                <option value="urgent">Urgent</option>
              </select>
            </div>

            <div>
              <label for="newStatus">Status</label>
              <select id="newStatus">
                <option value="active">Active</option>
                <option value="draft">Draft</option>
                <option value="archived">Archived</option>
              </select>
            </div>

            <div class="form-grid-full">
              <label for="newTitle">Notice Title</label>
              <input id="newTitle" placeholder="Example: Your UNGANI OS trial account is active" />
            </div>

            <div class="form-grid-full">
              <label for="newBody">Notice Message</label>
              <textarea id="newBody" placeholder="Write the notice message here..."></textarea>
            </div>
          </div>

          <div class="button-row">
            <button class="btn green" onclick="sendNotice()">Send / Save Notice</button>
            <button class="btn dark" onclick="clearNoticeForm()">Clear Form</button>
          </div>

          <p class="small-text">
            This creates in-app notices. Email notifications are separate and will be added later through a secure backend/email function.
          </p>
        </div>

        <div class="ungani-card">
          <div class="section-title-row">
            <h2 id="selectedNoticeTitle">Selected Notice</h2>
          </div>

          <div id="selectedNoticeBox">
            <div class="empty">
              <h3>No notice selected</h3>
              <p>Select a notice below to view details or update status.</p>
            </div>
          </div>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>Notice Filters</h2>
          <button class="btn green" onclick="loadPageData()">Refresh</button>
        </div>

        <div class="form-grid">
          <div>
            <label for="clientFilter">Client</label>
            <select id="clientFilter" onchange="renderNoticesPage()">
              <option value="">All Clients</option>
            </select>
          </div>

          <div>
            <label for="sourceFilter">Notice Source</label>
            <select id="sourceFilter" onchange="renderNoticesPage()">
              <option value="">All Sources</option>
              <option value="client">Client Notices</option>
              <option value="system">System Notices</option>
            </select>
          </div>

          <div>
            <label for="typeFilter">Notice Type</label>
            <select id="typeFilter" onchange="renderNoticesPage()">
              <option value="">All Types</option>
              <option value="general">General</option>
              <option value="update">Update</option>
              <option value="reminder">Reminder</option>
              <option value="maintenance">Maintenance</option>
              <option value="billing">Billing</option>
              <option value="support">Support</option>
              <option value="announcement">Announcement</option>
            </select>
          </div>

          <div>
            <label for="priorityFilter">Priority</label>
            <select id="priorityFilter" onchange="renderNoticesPage()">
              <option value="">All Priorities</option>
              <option value="normal">Normal</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
            </select>
          </div>

          <div>
            <label for="statusFilter">Status</label>
            <select id="statusFilter" onchange="renderNoticesPage()">
              <option value="">All Statuses</option>
              <option value="active">Active</option>
              <option value="unread">Unread</option>
              <option value="read">Read</option>
              <option value="draft">Draft</option>
              <option value="archived">Archived</option>
            </select>
          </div>

          <div>
            <label for="searchBox">Search</label>
            <input id="searchBox" placeholder="Search notices..." oninput="renderNoticesPage()" />
          </div>
        </div>

        <div class="button-row">
          <button class="btn dark" onclick="resetFilters()">Reset Filters</button>
        </div>
      </section>

      <section class="two-col">
        <div class="ungani-card">
          <div class="section-title-row">
            <h2>Client Notice Summary</h2>
          </div>

          <div id="clientSummaryBox">
            <div class="empty">
              <h3>Loading client summary...</h3>
              <p>Please wait.</p>
            </div>
          </div>
        </div>

        <div class="ungani-card">
          <div class="section-title-row">
            <h2>System Notices</h2>
          </div>

          <div id="systemNoticesBox">
            <div class="empty">
              <h3>Loading system notices...</h3>
              <p>Please wait.</p>
            </div>
          </div>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>All Notices</h2>
          <p class="small-text" id="noticesCountText">Loading...</p>
        </div>

        <div id="noticesListBox">
          <div class="empty">
            <h3>Loading notices...</h3>
            <p>Please wait.</p>
          </div>
        </div>
      </section>
    `;

    window.addEventListener("load", function () {
      UnganiAdminShared.renderShell("adminRoot", {
        activeKey: "notices",
        pageTitle: "Notices",
        pageSubtitle: "Send and manage client and system notices.",
        footerTitle: "Notices",
        footerVersion: "Notices Version: Step 296 Shared Session Added",
        mainHtml: pageMainHtml
      });

      UnganiAdminShared.requireAdmin({
        onNoSession: function () {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiLoginShell").classList.remove("hidden");
        },
        onBlocked: function (reason) {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiBlockedShell").classList.remove("hidden");
          document.getElementById("unganiBlockedReason").innerText = reason;
        },
        onReady: async function (admin, client) {
          currentAdmin = admin;
          supabaseClient = client;

          UnganiAdminShared.renderSidebar("adminSidebar", {
            activeKey: "notices",
            adminName: admin.full_name || "Admin Workspace",
            footerTitle: "Notices",
            footerVersion: "Notices Version: Step 296 Shared Session Added"
          });

          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiAppShell").classList.remove("hidden");

          await loadPageData();
        }
      });
    });

    function safe(value) {
      return UnganiAdminShared.safe(value);
    }

    function cleanText(value) {
      return UnganiAdminShared.cleanText(value);
    }

    function getField(row, names, fallback = "") {
      for (const name of names) {
        if (row && row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return fallback;
    }

    function getTenantName(row) {
      return getField(row, ["business_name", "company_name", "tenant_name"], "Client Business");
    }

    function getTenantNameById(tenantId) {
      if (!tenantId) return "System / All Clients";
      const tenant = tenants.find(row => String(row.id) === String(tenantId));
      return tenant ? getTenantName(tenant) : "Unknown Client";
    }

    function getNoticeTitle(row) {
      return getField(row, ["notice_title", "title", "subject"], "Notice");
    }

    function getNoticeBody(row) {
      return getField(row, ["notice_body", "body", "message", "description", "content"], "");
    }

    function getNoticeType(row) {
      return String(getField(row, ["notice_type", "type", "category"], "general")).toLowerCase();
    }

    function getNoticePriority(row) {
      return String(getField(row, ["priority", "notice_priority"], "normal")).toLowerCase();
    }

    function getNoticeStatus(row) {
      return String(getField(row, ["status", "notice_status"], "active")).toLowerCase();
    }

    function getCreatedDate(row) {
      return getField(row, ["created_at", "updated_at"], "");
    }

    function formatDateTime(value) {
      if (!value) return "N/A";

      const dateObj = new Date(value);

      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function priorityBadge(priority) {
      const clean = String(priority || "normal").toLowerCase();

      if (clean === "urgent") return `<span class="badge red">Urgent</span>`;
      if (clean === "high") return `<span class="badge red">High</span>`;
      if (clean === "medium") return `<span class="badge orange">Medium</span>`;

      return `<span class="badge blue">Normal</span>`;
    }

    function statusBadge(status) {
      const clean = String(status || "active").toLowerCase();

      if (clean === "active" || clean === "unread") {
        return `<span class="badge green">${safe(cleanText(clean))}</span>`;
      }

      if (clean === "read") {
        return `<span class="badge blue">Read</span>`;
      }

      if (clean === "draft") {
        return `<span class="badge orange">Draft</span>`;
      }

      if (clean === "archived") {
        return `<span class="badge red">Archived</span>`;
      }

      return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
    }

    function typeBadge(type) {
      const clean = String(type || "general").toLowerCase();

      if (clean === "announcement") return `<span class="badge gold">Announcement</span>`;
      if (clean === "maintenance") return `<span class="badge orange">Maintenance</span>`;
      if (clean === "billing") return `<span class="badge blue">Billing</span>`;
      if (clean === "support") return `<span class="badge green">Support</span>`;
      if (clean === "reminder") return `<span class="badge orange">Reminder</span>`;
      if (clean === "update") return `<span class="badge blue">Update</span>`;

      return `<span class="badge blue">General</span>`;
    }

    function noticeCardClass(item) {
      const priority = getNoticePriority(item.row);
      const status = getNoticeStatus(item.row);

      if (priority === "urgent" || priority === "high") return "urgent-card";
      if (status === "archived") return "warning-card";
      if (item.source === "system") return "system-card";
      return "active-card";
    }

    async function safeSelect(tableName) {
      try {
        const { data, error } = await supabaseClient
          .from(tableName)
          .select("*")
          .limit(10000);

        if (error) {
          console.log(tableName, error.message);
          return [];
        }

        return data || [];
      } catch (error) {
        console.log(tableName, error.message);
        return [];
      }
    }

    async function loadPageData() {
      UnganiAdminShared.showToast("Loading notices...");

      const [tenantRows, clientNoticeRows, systemNoticeRows] = await Promise.all([
        safeSelect("tenants"),
        safeSelect("client_notices"),
        safeSelect("system_notices")
      ]);

      tenants = tenantRows;
      clientNotices = clientNoticeRows.sort((a, b) => new Date(getCreatedDate(b) || 0) - new Date(getCreatedDate(a) || 0));
      systemNotices = systemNoticeRows.sort((a, b) => new Date(getCreatedDate(b) || 0) - new Date(getCreatedDate(a) || 0));

      fillClientSelects();
      renderNoticesPage();

      if (selectedNoticeId && selectedNoticeSource) {
        renderSelectedNotice(selectedNoticeSource, selectedNoticeId);
      }

      UnganiAdminShared.showToast("Notices updated ✓");
    }

    function fillClientSelects() {
      const selectedClient = document.getElementById("clientFilter").value;
      const selectedNew = document.getElementById("newTenantId").value;

      const options = tenants
        .map(row => `<option value="${safe(row.id)}">${safe(getTenantName(row))}</option>`)
        .join("");

      document.getElementById("clientFilter").innerHTML = `<option value="">All Clients</option>${options}`;
      document.getElementById("newTenantId").innerHTML = `<option value="">Select Client</option>${options}`;

      if (selectedClient) document.getElementById("clientFilter").value = selectedClient;
      if (selectedNew) document.getElementById("newTenantId").value = selectedNew;
    }

    function handleTargetTypeChange() {
      const targetType = document.getElementById("newTargetType").value;
      const clientSelect = document.getElementById("newTenantId");

      clientSelect.disabled = targetType !== "one";

      if (targetType !== "one") {
        clientSelect.value = "";
      }
    }

    function allNoticeRows() {
      const clientRows = clientNotices.map(row => ({
        source: "client",
        row
      }));

      const systemRows = systemNotices.map(row => ({
        source: "system",
        row
      }));

      return [...clientRows, ...systemRows].sort((a, b) => new Date(getCreatedDate(b.row) || 0) - new Date(getCreatedDate(a.row) || 0));
    }

    function filteredNotices() {
      const clientFilter = document.getElementById("clientFilter").value;
      const sourceFilter = document.getElementById("sourceFilter").value;
      const typeFilter = document.getElementById("typeFilter").value;
      const priorityFilter = document.getElementById("priorityFilter").value;
      const statusFilter = document.getElementById("statusFilter").value;
      const query = document.getElementById("searchBox").value.toLowerCase().trim();

      let rows = allNoticeRows();

      if (clientFilter) {
        rows = rows.filter(item => item.source === "client" && String(item.row.tenant_id) === String(clientFilter));
      }

      if (sourceFilter) {
        rows = rows.filter(item => item.source === sourceFilter);
      }

      if (typeFilter) {
        rows = rows.filter(item => getNoticeType(item.row) === typeFilter);
      }

      if (priorityFilter) {
        rows = rows.filter(item => getNoticePriority(item.row) === priorityFilter);
      }

      if (statusFilter) {
        rows = rows.filter(item => getNoticeStatus(item.row) === statusFilter);
      }

      if (query) {
        rows = rows.filter(item => {
          const haystack = [
            item.source,
            getTenantNameById(item.row.tenant_id),
            getNoticeTitle(item.row),
            getNoticeBody(item.row),
            getNoticeType(item.row),
            getNoticePriority(item.row),
            getNoticeStatus(item.row),
            JSON.stringify(item.row)
          ].join(" ").toLowerCase();

          return haystack.includes(query);
        });
      }

      return rows;
    }

    function renderNoticesPage() {
      renderMetrics();
      renderClientSummary();
      renderSystemNotices();
      renderNoticesList();
    }

    function renderMetrics() {
      const rows = filteredNotices();

      const clientRows = rows.filter(item => item.source === "client").length;
      const systemRows = rows.filter(item => item.source === "system").length;
      const active = rows.filter(item => ["active", "unread"].includes(getNoticeStatus(item.row))).length;
      const read = rows.filter(item => getNoticeStatus(item.row) === "read").length;
      const archived = rows.filter(item => getNoticeStatus(item.row) === "archived").length;
      const urgent = rows.filter(item => ["high", "urgent"].includes(getNoticePriority(item.row))).length;
      const uniqueClients = new Set(rows.filter(item => item.source === "client").map(item => item.row.tenant_id).filter(Boolean)).size;

      const metrics = [
        { title: "Total Notices", value: rows.length, note: "Notices in current view", cls: "blue" },
        { title: "Client Notices", value: clientRows, note: "Notices sent to specific clients", cls: "green" },
        { title: "System Notices", value: systemRows, note: "General/system notices", cls: "gold" },
        { title: "Active / Unread", value: active, note: "Notices still active or unread", cls: active > 0 ? "orange" : "green" },
        { title: "Read", value: read, note: "Notices marked as read", cls: "blue" },
        { title: "Archived", value: archived, note: "Archived notices", cls: archived > 0 ? "red" : "green" },
        { title: "High / Urgent", value: urgent, note: "Priority notices needing attention", cls: urgent > 0 ? "red" : "green" },
        { title: "Clients Reached", value: uniqueClients, note: "Unique clients with notices in current view", cls: "green" }
      ];

      document.getElementById("metricsGrid").innerHTML = metrics.map(item => `
        <div class="metric-card ${safe(item.cls)}">
          <h3>${safe(item.title)}</h3>
          <p>${safe(item.value)}</p>
          <div class="note">${safe(item.note)}</div>
        </div>
      `).join("");
    }

    function renderClientSummary() {
      const rows = filteredNotices().filter(item => item.source === "client");
      const clientMap = {};

      tenants.forEach(tenant => {
        clientMap[tenant.id] = {
          id: tenant.id,
          name: getTenantName(tenant),
          total: 0,
          active: 0,
          urgent: 0,
          archived: 0
        };
      });

      rows.forEach(item => {
        const tenantId = item.row.tenant_id;

        if (!tenantId || !clientMap[tenantId]) return;

        clientMap[tenantId].total += 1;

        if (["active", "unread"].includes(getNoticeStatus(item.row))) clientMap[tenantId].active += 1;
        if (["high", "urgent"].includes(getNoticePriority(item.row))) clientMap[tenantId].urgent += 1;
        if (getNoticeStatus(item.row) === "archived") clientMap[tenantId].archived += 1;
      });

      const summaryRows = Object.values(clientMap)
        .filter(row => row.total > 0)
        .sort((a, b) => b.urgent - a.urgent || b.active - a.active || b.total - a.total)
        .slice(0, 12);

      if (summaryRows.length === 0) {
        document.getElementById("clientSummaryBox").innerHTML = `
          <div class="empty">
            <h3>No client notice summary yet</h3>
            <p>Client notices will appear here after they are created.</p>
          </div>
        `;
        return;
      }

      document.getElementById("clientSummaryBox").innerHTML = summaryRows.map(row => `
        <div class="row-card ${row.urgent > 0 ? "urgent-card" : row.active > 0 ? "warning-card" : "active-card"}">
          <div class="row-title">${safe(row.name)}</div>
          <p class="row-detail"><strong>Total Notices:</strong> ${safe(row.total)}</p>
          <p class="row-detail"><strong>Active / Unread:</strong> ${safe(row.active)}</p>
          <p class="row-detail"><strong>High / Urgent:</strong> ${safe(row.urgent)}</p>
          <p class="row-detail"><strong>Archived:</strong> ${safe(row.archived)}</p>
          ${row.urgent > 0 ? `<span class="badge red">Priority notices</span>` : row.active > 0 ? `<span class="badge orange">Active notices</span>` : `<span class="badge green">Clear</span>`}
        </div>
      `).join("");
    }

    function renderSystemNotices() {
      const rows = filteredNotices()
        .filter(item => item.source === "system")
        .slice(0, 10);

      if (rows.length === 0) {
        document.getElementById("systemNoticesBox").innerHTML = `
          <div class="empty">
            <h3>No system notices</h3>
            <p>System notices will appear here after they are created.</p>
          </div>
        `;
        return;
      }

      document.getElementById("systemNoticesBox").innerHTML = rows.map(item => `
        <div class="row-card system-card">
          <div class="row-title">${safe(getNoticeTitle(item.row))}</div>
          <p class="row-detail">${safe(getNoticeBody(item.row) || "N/A")}</p>
          <p class="row-detail"><strong>Created:</strong> ${safe(formatDateTime(getCreatedDate(item.row)))}</p>
          ${typeBadge(getNoticeType(item.row))}
          ${priorityBadge(getNoticePriority(item.row))}
          ${statusBadge(getNoticeStatus(item.row))}
          <div class="button-row">
            <button class="btn" onclick="renderSelectedNotice('system','${safe(item.row.id)}')">Open</button>
          </div>
        </div>
      `).join("");
    }

    function renderNoticesList() {
      const rows = filteredNotices();

      document.getElementById("noticesCountText").innerText = `${rows.length} notice(s) shown`;

      if (rows.length === 0) {
        document.getElementById("noticesListBox").innerHTML = `
          <div class="empty">
            <h3>No notices found</h3>
            <p>Try changing the filters or send a new notice.</p>
          </div>
        `;
        return;
      }

      document.getElementById("noticesListBox").innerHTML = rows.map(item => `
        <div class="row-card ${safe(noticeCardClass(item))}">
          <div class="row-title">${safe(getNoticeTitle(item.row))}</div>
          <p class="row-detail"><strong>Source:</strong> ${safe(item.source === "system" ? "System Notice" : "Client Notice")}</p>
          <p class="row-detail"><strong>Client:</strong> ${safe(getTenantNameById(item.row.tenant_id))}</p>
          <p class="row-detail"><strong>Message:</strong> ${safe(getNoticeBody(item.row) || "N/A")}</p>
          <p class="row-detail"><strong>Created:</strong> ${safe(formatDateTime(getCreatedDate(item.row)))}</p>

          ${typeBadge(getNoticeType(item.row))}
          ${priorityBadge(getNoticePriority(item.row))}
          ${statusBadge(getNoticeStatus(item.row))}

          <div class="button-row">
            <button class="btn" onclick="renderSelectedNotice('${safe(item.source)}','${safe(item.row.id)}')">Open</button>
            <button class="btn green" onclick="updateNoticeStatus('${safe(item.source)}','${safe(item.row.id)}','active')">Active</button>
            <button class="btn blue" onclick="updateNoticeStatus('${safe(item.source)}','${safe(item.row.id)}','read')">Read</button>
            <button class="btn red" onclick="updateNoticeStatus('${safe(item.source)}','${safe(item.row.id)}','archived')">Archive</button>
          </div>
        </div>
      `).join("");
    }

    function renderSelectedNotice(source, noticeId) {
      const sourceRows = source === "system" ? systemNotices : clientNotices;
      const row = sourceRows.find(item => String(item.id) === String(noticeId));

      if (!row) {
        selectedNoticeId = null;
        selectedNoticeSource = null;

        document.getElementById("selectedNoticeTitle").innerText = "Selected Notice";
        document.getElementById("selectedNoticeBox").innerHTML = `
          <div class="empty">
            <h3>Notice not found</h3>
            <p>Please refresh and try again.</p>
          </div>
        `;
        return;
      }

      selectedNoticeId = row.id;
      selectedNoticeSource = source;

      document.getElementById("selectedNoticeTitle").innerText = getNoticeTitle(row);

      document.getElementById("selectedNoticeBox").innerHTML = `
        <div class="row-card ${source === "system" ? "system-card" : "active-card"}">
          <div class="row-title">${safe(getNoticeTitle(row))}</div>
          <p class="row-detail"><strong>Source:</strong> ${safe(source === "system" ? "System Notice" : "Client Notice")}</p>
          <p class="row-detail"><strong>Client:</strong> ${safe(getTenantNameById(row.tenant_id))}</p>
          <p class="row-detail"><strong>Message:</strong> ${safe(getNoticeBody(row) || "N/A")}</p>
          <p class="row-detail"><strong>Created:</strong> ${safe(formatDateTime(getCreatedDate(row)))}</p>
          ${typeBadge(getNoticeType(row))}
          ${priorityBadge(getNoticePriority(row))}
          ${statusBadge(getNoticeStatus(row))}
        </div>

        <label for="editStatus">Update Status</label>
        <select id="editStatus">
          <option value="active">Active</option>
          <option value="unread">Unread</option>
          <option value="read">Read</option>
          <option value="draft">Draft</option>
          <option value="archived">Archived</option>
        </select>

        <div class="button-row">
          <button class="btn green" onclick="saveSelectedNoticeStatus()">Save Status</button>
          <button class="btn blue" onclick="updateNoticeStatus('${safe(source)}','${safe(row.id)}','read')">Mark Read</button>
          <button class="btn green" onclick="updateNoticeStatus('${safe(source)}','${safe(row.id)}','active')">Mark Active</button>
          <button class="btn red" onclick="updateNoticeStatus('${safe(source)}','${safe(row.id)}','archived')">Archive</button>
        </div>
      `;

      document.getElementById("editStatus").value = getNoticeStatus(row);

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function insertClientNotice(tenantId, title, body, type, priority, status) {
      const now = new Date().toISOString();

      const payloads = [
        {
          tenant_id: tenantId,
          notice_title: title,
          notice_body: body,
          notice_type: type,
          priority,
          status,
          created_by: UnganiAdminShared.getCurrentAdminId(),
          created_at: now,
          updated_at: now
        },
        {
          tenant_id: tenantId,
          title,
          message: body,
          type,
          priority,
          status,
          created_by: UnganiAdminShared.getCurrentAdminId(),
          created_at: now,
          updated_at: now
        },
        {
          tenant_id: tenantId,
          title,
          message: body,
          created_at: now
        }
      ];

      for (const payload of payloads) {
        const { error } = await supabaseClient
          .from("client_notices")
          .insert(payload);

        if (!error) return true;

        console.log("client_notices insert attempt failed:", error.message);
      }

      alert("Could not create client notice. The client_notices table may be missing expected columns.");
      return false;
    }

    async function insertSystemNotice(title, body, type, priority, status) {
      const now = new Date().toISOString();

      const payloads = [
        {
          notice_title: title,
          notice_body: body,
          notice_type: type,
          priority,
          status,
          created_by: UnganiAdminShared.getCurrentAdminId(),
          created_at: now,
          updated_at: now
        },
        {
          title,
          message: body,
          type,
          priority,
          status,
          created_by: UnganiAdminShared.getCurrentAdminId(),
          created_at: now,
          updated_at: now
        },
        {
          title,
          message: body,
          created_at: now
        }
      ];

      for (const payload of payloads) {
        const { error } = await supabaseClient
          .from("system_notices")
          .insert(payload);

        if (!error) return true;

        console.log("system_notices insert attempt failed:", error.message);
      }

      alert("Could not create system notice. The system_notices table may be missing expected columns.");
      return false;
    }

    async function sendNotice() {
      const targetType = document.getElementById("newTargetType").value;
      const tenantId = document.getElementById("newTenantId").value;
      const title = document.getElementById("newTitle").value.trim();
      const body = document.getElementById("newBody").value.trim();
      const type = document.getElementById("newNoticeType").value;
      const priority = document.getElementById("newPriority").value;
      const status = document.getElementById("newStatus").value;

      if (!title) {
        alert("Please enter a notice title.");
        return;
      }

      if (!body) {
        alert("Please enter a notice message.");
        return;
      }

      if (targetType === "one" && !tenantId) {
        alert("Please select a client.");
        return;
      }

      if (targetType === "one") {
        const ok = await insertClientNotice(tenantId, title, body, type, priority, status);
        if (!ok) return;
      }

      if (targetType === "all") {
        if (tenants.length === 0) {
          alert("No clients found.");
          return;
        }

        for (const tenant of tenants) {
          const ok = await insertClientNotice(tenant.id, title, body, type, priority, status);
          if (!ok) return;
        }
      }

      if (targetType === "system") {
        const ok = await insertSystemNotice(title, body, type, priority, status);
        if (!ok) return;
      }

      UnganiAdminShared.showToast("Notice saved ✓");
      clearNoticeForm();
      await loadPageData();
    }

    function clearNoticeForm() {
      document.getElementById("newTargetType").value = "one";
      document.getElementById("newTenantId").disabled = false;
      document.getElementById("newTenantId").value = "";
      document.getElementById("newNoticeType").value = "general";
      document.getElementById("newPriority").value = "normal";
      document.getElementById("newStatus").value = "active";
      document.getElementById("newTitle").value = "";
      document.getElementById("newBody").value = "";
    }

    async function updateNoticeStatus(source, noticeId, status) {
      const tableName = source === "system" ? "system_notices" : "client_notices";

      const { error } = await supabaseClient
        .from(tableName)
        .update({
          status,
          updated_at: new Date().toISOString()
        })
        .eq("id", noticeId);

      if (error) {
        const fallback = await supabaseClient
          .from(tableName)
          .update({ status })
          .eq("id", noticeId);

        if (fallback.error) {
          alert(fallback.error.message);
          return;
        }
      }

      selectedNoticeId = noticeId;
      selectedNoticeSource = source;

      UnganiAdminShared.showToast("Notice status updated ✓");
      await loadPageData();
    }

    async function saveSelectedNoticeStatus() {
      if (!selectedNoticeId || !selectedNoticeSource) {
        alert("No notice selected.");
        return;
      }

      const status = document.getElementById("editStatus").value;
      await updateNoticeStatus(selectedNoticeSource, selectedNoticeId, status);
    }

    function resetFilters() {
      document.getElementById("clientFilter").value = "";
      document.getElementById("sourceFilter").value = "";
      document.getElementById("typeFilter").value = "";
      document.getElementById("priorityFilter").value = "";
      document.getElementById("statusFilter").value = "";
      document.getElementById("searchBox").value = "";

      renderNoticesPage();

      UnganiAdminShared.showToast("Notice filters reset ✓");
    }
  </script>
</body>
</html>
