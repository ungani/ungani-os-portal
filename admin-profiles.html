<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Admin Profiles</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin-shared.js"></script>

  <style>
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 24px var(--ungani-shadow);
    }

    .metric-card h3 {
      margin: 0 0 8px;
      color: var(--ungani-muted);
      font-size: 14px;
    }

    .metric-card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
      color: var(--ungani-text);
    }

    .metric-card .note {
      margin-top: 8px;
      color: var(--ungani-muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .metric-card.green { border-left-color: var(--ungani-green); }
    .metric-card.red { border-left-color: var(--ungani-red); }
    .metric-card.orange { border-left-color: var(--ungani-orange); }
    .metric-card.blue { border-left-color: var(--ungani-blue); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .form-grid-full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 8px 0 6px;
      font-size: 14px;
      color: var(--ungani-text);
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--ungani-border);
      border-radius: 12px;
      background: var(--ungani-card);
      color: var(--ungani-text);
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
      background: var(--ungani-gold);
      color: #061C3D;
      text-decoration: none;
      display: inline-block;
    }

    .btn.dark {
      background: #061C3D;
      color: #FFFFFF;
    }

    html[data-ungani-theme="dark"] .btn.dark {
      background: #F5F5F3;
      color: #061C3D;
    }

    .btn.green { background: var(--ungani-green); color: #FFFFFF; }
    .btn.red { background: var(--ungani-red); color: #FFFFFF; }
    .btn.orange { background: var(--ungani-orange); color: #FFFFFF; }
    .btn.blue { background: var(--ungani-blue); color: #FFFFFF; }

    .two-col {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
    }

    .section-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-title-row h2 {
      margin: 0;
    }

    .row-card {
      background: var(--ungani-bg);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .row-card.active-card { border-left-color: var(--ungani-green); }
    .row-card.trial-card { border-left-color: var(--ungani-gold); }
    .row-card.warning-card { border-left-color: var(--ungani-orange); }
    .row-card.bad-card { border-left-color: var(--ungani-red); }
    .row-card.info-card { border-left-color: var(--ungani-blue); }

    .row-title {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 6px;
      color: var(--ungani-text);
    }

    .row-detail {
      color: var(--ungani-muted);
      margin: 5px 0;
      line-height: 1.45;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      background: #061C3D;
      color: #FFFFFF;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      text-transform: capitalize;
    }

    .badge.green { background: var(--ungani-green); }
    .badge.red { background: var(--ungani-red); }
    .badge.orange { background: var(--ungani-orange); }
    .badge.blue { background: var(--ungani-blue); }
    .badge.gold { background: var(--ungani-gold); color: #061C3D; }

    .empty {
      text-align: center;
      padding: 28px;
      background: var(--ungani-bg);
      border: 1px dashed var(--ungani-border);
      border-radius: 18px;
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--ungani-text);
    }

    .empty p {
      margin: 0;
      color: var(--ungani-muted);
    }

    .small-text {
      color: var(--ungani-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .profile-score-wrap {
      background: var(--ungani-bg);
      border: 1px solid var(--ungani-border);
      border-radius: 999px;
      overflow: hidden;
      height: 12px;
      margin: 10px 0;
    }

    .profile-score-bar {
      height: 12px;
      background: var(--ungani-gold);
      width: 0%;
    }

    @media (max-width: 950px) {
      .two-col {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="adminRoot"></div>

  <script>
    let supabaseClient = null;
    let currentAdmin = null;

    let tenants = [];
    let users = [];
    let selectedTenantId = null;

    const pageMainHtml = `
      <section class="ungani-card ungani-hero-card">
        <div style="position: relative; z-index: 1;">
          <h2>Admin Client Profiles</h2>
          <p>
            View, organize, and update client business profiles, account status, contact details, and setup completeness.
          </p>
          <div style="margin-top: 16px;">
            <a class="btn" href="admin-home.html">Admin Home</a>
            <a class="btn green" href="admin.html">Main Admin</a>
            <a class="btn blue" href="users.html">Users</a>
            <a class="btn dark" href="admin-settings.html">Admin Settings</a>
          </div>
        </div>
      </section>

      <section class="page-grid" id="metricsGrid">
        <div class="metric-card"><h3>Loading</h3><p>...</p><div class="note">Please wait</div></div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>Profile Filters</h2>
          <button class="btn green" onclick="loadPageData()">Refresh</button>
        </div>

        <div class="form-grid">
          <div>
            <label for="statusFilter">Account Status</label>
            <select id="statusFilter" onchange="renderProfilesPage()">
              <option value="">All Statuses</option>
              <option value="trial">Trial</option>
              <option value="active">Active</option>
              <option value="suspended">Suspended</option>
              <option value="cancelled">Cancelled</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>

          <div>
            <label for="profileFilter">Profile Completeness</label>
            <select id="profileFilter" onchange="renderProfilesPage()">
              <option value="">All Profiles</option>
              <option value="complete">Complete / Strong</option>
              <option value="incomplete">Incomplete</option>
              <option value="missing_contact">Missing Contact Info</option>
              <option value="missing_location">Missing Location</option>
            </select>
          </div>

          <div>
            <label for="searchBox">Search</label>
            <input id="searchBox" placeholder="Search client profiles..." oninput="renderProfilesPage()" />
          </div>
        </div>

        <div class="button-row">
          <button class="btn dark" onclick="resetFilters()">Reset Filters</button>
        </div>
      </section>

      <section class="two-col">
        <div class="ungani-card">
          <div class="section-title-row">
            <h2>Client Profile Summary</h2>
          </div>
          <div id="summaryBox">
            <div class="empty">
              <h3>Loading summary...</h3>
              <p>Please wait.</p>
            </div>
          </div>
        </div>

        <div class="ungani-card">
          <div class="section-title-row">
            <h2 id="selectedProfileTitle">Selected Client Profile</h2>
          </div>

          <div id="selectedProfileBox">
            <div class="empty">
              <h3>No client selected</h3>
              <p>Select a client profile below to view or update details.</p>
            </div>
          </div>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>All Client Profiles</h2>
          <p class="small-text" id="profilesCountText">Loading...</p>
        </div>

        <div id="profilesListBox">
          <div class="empty">
            <h3>Loading client profiles...</h3>
            <p>Please wait.</p>
          </div>
        </div>
      </section>
    `;

    window.addEventListener("load", function () {
      UnganiAdminShared.renderShell("adminRoot", {
        activeKey: "admin-profiles",
        pageTitle: "Admin Profiles",
        pageSubtitle: "View and update approved client business profiles.",
        footerTitle: "Admin Profiles",
        footerVersion: "Admin Profiles Version: Step 291 Shared Session Added",
        mainHtml: pageMainHtml
      });

      UnganiAdminShared.requireAdmin({
        onNoSession: function () {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiLoginShell").classList.remove("hidden");
        },
        onBlocked: function (reason) {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiBlockedShell").classList.remove("hidden");
          document.getElementById("unganiBlockedReason").innerText = reason;
        },
        onReady: async function (admin, client) {
          currentAdmin = admin;
          supabaseClient = client;

          UnganiAdminShared.renderSidebar("adminSidebar", {
            activeKey: "admin-profiles",
            adminName: admin.full_name || "Admin Workspace",
            footerTitle: "Admin Profiles",
            footerVersion: "Admin Profiles Version: Step 291 Shared Session Added"
          });

          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiAppShell").classList.remove("hidden");

          await loadPageData();
        }
      });
    });

    function safe(value) {
      return UnganiAdminShared.safe(value);
    }

    function cleanText(value) {
      return UnganiAdminShared.cleanText(value);
    }

    function getField(row, names, fallback = "") {
      for (const name of names) {
        if (row && row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return fallback;
    }

    function getTenantName(row) {
      return getField(row, ["business_name", "company_name", "tenant_name"], "Client Business");
    }

    function getTenantStatus(row) {
      return String(getField(row, ["account_status", "status"], "trial")).toLowerCase();
    }

    function getContactPerson(row) {
      return getField(row, ["contact_person", "owner_name", "primary_contact"], "");
    }

    function getBusinessEmail(row) {
      return getField(row, ["business_email", "email", "contact_email"], "");
    }

    function getBusinessPhone(row) {
      return getField(row, ["business_phone", "phone", "contact_phone"], "");
    }

    function getBusinessLocation(row) {
      return getField(row, ["business_location", "location", "address"], "");
    }

    function getBusinessDescription(row) {
      return getField(row, ["business_description", "description"], "");
    }

    function getBusinessNotes(row) {
      return getField(row, ["business_notes", "notes"], "");
    }

    function getCreatedDate(row) {
      return getField(row, ["created_at", "updated_at"], "");
    }

    function getLinkedUsers(tenantId) {
      return users.filter(user => String(user.tenant_id) === String(tenantId));
    }

    function formatDateTime(value) {
      if (!value) return "N/A";

      const dateObj = new Date(value);

      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function statusBadge(status) {
      const clean = String(status || "trial").toLowerCase();

      if (clean === "active") {
        return `<span class="badge green">Active</span>`;
      }

      if (clean === "trial") {
        return `<span class="badge gold">Trial</span>`;
      }

      if (clean === "suspended") {
        return `<span class="badge orange">Suspended</span>`;
      }

      if (clean === "cancelled" || clean === "inactive") {
        return `<span class="badge red">${safe(cleanText(clean))}</span>`;
      }

      return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
    }

    function profileCardClass(row) {
      const status = getTenantStatus(row);

      if (status === "active") return "active-card";
      if (status === "trial") return "trial-card";
      if (status === "suspended") return "warning-card";
      if (status === "cancelled" || status === "inactive") return "bad-card";

      return "info-card";
    }

    function profileScore(row) {
      let score = 0;

      if (getTenantName(row)) score += 15;
      if (getContactPerson(row)) score += 15;
      if (getBusinessEmail(row)) score += 15;
      if (getBusinessPhone(row)) score += 15;
      if (getBusinessLocation(row)) score += 15;
      if (getBusinessDescription(row)) score += 10;
      if (getBusinessNotes(row)) score += 5;
      if (getLinkedUsers(row.id).length > 0) score += 10;

      return Math.min(score, 100);
    }

    function profileScoreBadge(score) {
      if (score >= 80) return `<span class="badge green">Strong profile</span>`;
      if (score >= 50) return `<span class="badge orange">Needs details</span>`;
      return `<span class="badge red">Incomplete</span>`;
    }

    async function safeSelect(tableName) {
      try {
        const { data, error } = await supabaseClient
          .from(tableName)
          .select("*")
          .limit(10000);

        if (error) {
          console.log(tableName, error.message);
          return [];
        }

        return data || [];
      } catch (error) {
        console.log(tableName, error.message);
        return [];
      }
    }

    async function loadPageData() {
      UnganiAdminShared.showToast("Loading client profiles...");

      const [tenantRows, userRows] = await Promise.all([
        safeSelect("tenants"),
        safeSelect("users")
      ]);

      tenants = tenantRows.sort((a, b) => new Date(getCreatedDate(b) || 0) - new Date(getCreatedDate(a) || 0));
      users = userRows;

      renderProfilesPage();

      if (selectedTenantId) {
        renderSelectedProfile(selectedTenantId);
      }

      UnganiAdminShared.showToast("Client profiles updated ✓");
    }

    function filteredTenants() {
      const statusFilter = document.getElementById("statusFilter").value;
      const profileFilter = document.getElementById("profileFilter").value;
      const query = document.getElementById("searchBox").value.toLowerCase().trim();

      let rows = [...tenants];

      if (statusFilter) {
        rows = rows.filter(row => getTenantStatus(row) === statusFilter);
      }

      if (profileFilter === "complete") {
        rows = rows.filter(row => profileScore(row) >= 80);
      }

      if (profileFilter === "incomplete") {
        rows = rows.filter(row => profileScore(row) < 80);
      }

      if (profileFilter === "missing_contact") {
        rows = rows.filter(row => !getBusinessEmail(row) || !getBusinessPhone(row) || !getContactPerson(row));
      }

      if (profileFilter === "missing_location") {
        rows = rows.filter(row => !getBusinessLocation(row));
      }

      if (query) {
        rows = rows.filter(row => {
          const linked = getLinkedUsers(row.id)
            .map(user => [user.full_name, user.email, user.role, user.status].join(" "))
            .join(" ");

          const haystack = [
            getTenantName(row),
            getTenantStatus(row),
            getContactPerson(row),
            getBusinessEmail(row),
            getBusinessPhone(row),
            getBusinessLocation(row),
            getBusinessDescription(row),
            getBusinessNotes(row),
            linked,
            JSON.stringify(row)
          ].join(" ").toLowerCase();

          return haystack.includes(query);
        });
      }

      return rows;
    }

    function renderProfilesPage() {
      renderMetrics();
      renderSummary();
      renderProfilesList();
    }

    function renderMetrics() {
      const rows = filteredTenants();

      const active = rows.filter(row => getTenantStatus(row) === "active").length;
      const trial = rows.filter(row => getTenantStatus(row) === "trial").length;
      const suspended = rows.filter(row => getTenantStatus(row) === "suspended").length;
      const cancelled = rows.filter(row => ["cancelled", "inactive"].includes(getTenantStatus(row))).length;
      const complete = rows.filter(row => profileScore(row) >= 80).length;
      const incomplete = rows.filter(row => profileScore(row) < 80).length;
      const missingContact = rows.filter(row => !getBusinessEmail(row) || !getBusinessPhone(row) || !getContactPerson(row)).length;
      const linkedUsers = rows.reduce((sum, row) => sum + getLinkedUsers(row.id).length, 0);

      const metrics = [
        { title: "Total Clients", value: rows.length, note: "Client profiles in current view", cls: "blue" },
        { title: "Active", value: active, note: "Currently active client accounts", cls: "green" },
        { title: "Trial", value: trial, note: "Trial/testing client accounts", cls: "orange" },
        { title: "Suspended", value: suspended, note: "Accounts currently suspended", cls: suspended > 0 ? "red" : "green" },
        { title: "Cancelled / Inactive", value: cancelled, note: "Closed or inactive accounts", cls: cancelled > 0 ? "red" : "green" },
        { title: "Strong Profiles", value: complete, note: "Profiles with enough business details", cls: "green" },
        { title: "Incomplete Profiles", value: incomplete, note: "Profiles needing more information", cls: incomplete > 0 ? "orange" : "green" },
        { title: "Linked Users", value: linkedUsers, note: "Users connected to these clients", cls: "blue" }
      ];

      document.getElementById("metricsGrid").innerHTML = metrics.map(item => `
        <div class="metric-card ${safe(item.cls)}">
          <h3>${safe(item.title)}</h3>
          <p>${safe(item.value)}</p>
          <div class="note">${safe(item.note)}</div>
        </div>
      `).join("");
    }

    function renderSummary() {
      const rows = filteredTenants();

      if (rows.length === 0) {
        document.getElementById("summaryBox").innerHTML = `
          <div class="empty">
            <h3>No client summary yet</h3>
            <p>No clients match the current filters.</p>
          </div>
        `;
        return;
      }

      const needsAttention = rows
        .map(row => ({
          row,
          score: profileScore(row),
          usersCount: getLinkedUsers(row.id).length
        }))
        .sort((a, b) => a.score - b.score)
        .slice(0, 8);

      document.getElementById("summaryBox").innerHTML = needsAttention.map(item => `
        <div class="row-card ${safe(profileCardClass(item.row))}">
          <div class="row-title">${safe(getTenantName(item.row))}</div>
          <p class="row-detail"><strong>Status:</strong> ${safe(cleanText(getTenantStatus(item.row)))}</p>
          <p class="row-detail"><strong>Profile Score:</strong> ${safe(item.score)}%</p>
          <div class="profile-score-wrap">
            <div class="profile-score-bar" style="width: ${safe(item.score)}%;"></div>
          </div>
          <p class="row-detail"><strong>Linked Users:</strong> ${safe(item.usersCount)}</p>
          ${profileScoreBadge(item.score)}
          ${statusBadge(getTenantStatus(item.row))}
          <div class="button-row">
            <button class="btn" onclick="renderSelectedProfile('${safe(item.row.id)}')">Open Profile</button>
          </div>
        </div>
      `).join("");
    }

    function renderProfilesList() {
      const rows = filteredTenants();

      document.getElementById("profilesCountText").innerText = `${rows.length} client profile(s) shown`;

      if (rows.length === 0) {
        document.getElementById("profilesListBox").innerHTML = `
          <div class="empty">
            <h3>No client profiles found</h3>
            <p>Try changing the filters.</p>
          </div>
        `;
        return;
      }

      document.getElementById("profilesListBox").innerHTML = rows.map(row => {
        const score = profileScore(row);
        const linkedUsers = getLinkedUsers(row.id);

        return `
          <div class="row-card ${safe(profileCardClass(row))}">
            <div class="row-title">${safe(getTenantName(row))}</div>
            <p class="row-detail"><strong>Contact Person:</strong> ${safe(getContactPerson(row) || "N/A")}</p>
            <p class="row-detail"><strong>Email:</strong> ${safe(getBusinessEmail(row) || "N/A")}</p>
            <p class="row-detail"><strong>Phone:</strong> ${safe(getBusinessPhone(row) || "N/A")}</p>
            <p class="row-detail"><strong>Location:</strong> ${safe(getBusinessLocation(row) || "N/A")}</p>
            <p class="row-detail"><strong>Linked Users:</strong> ${safe(linkedUsers.length)}</p>
            <p class="row-detail"><strong>Created:</strong> ${safe(formatDateTime(getCreatedDate(row)))}</p>

            <div class="profile-score-wrap">
              <div class="profile-score-bar" style="width: ${safe(score)}%;"></div>
            </div>

            ${statusBadge(getTenantStatus(row))}
            ${profileScoreBadge(score)}

            <div class="button-row">
              <button class="btn" onclick="renderSelectedProfile('${safe(row.id)}')">Open / Edit Profile</button>
              <button class="btn green" onclick="quickUpdateStatus('${safe(row.id)}','active')">Active</button>
              <button class="btn orange" onclick="quickUpdateStatus('${safe(row.id)}','trial')">Trial</button>
              <button class="btn red" onclick="quickUpdateStatus('${safe(row.id)}','suspended')">Suspend</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderSelectedProfile(tenantId) {
      const row = tenants.find(item => String(item.id) === String(tenantId));

      if (!row) {
        selectedTenantId = null;
        document.getElementById("selectedProfileTitle").innerText = "Selected Client Profile";
        document.getElementById("selectedProfileBox").innerHTML = `
          <div class="empty">
            <h3>Client profile not found</h3>
            <p>Please refresh the client profile list.</p>
          </div>
        `;
        return;
      }

      selectedTenantId = row.id;

      const linkedUsers = getLinkedUsers(row.id);
      const score = profileScore(row);

      document.getElementById("selectedProfileTitle").innerText = getTenantName(row);

      document.getElementById("selectedProfileBox").innerHTML = `
        <div class="row-card ${safe(profileCardClass(row))}">
          <div class="row-title">${safe(getTenantName(row))}</div>
          <p class="row-detail"><strong>Status:</strong> ${safe(cleanText(getTenantStatus(row)))}</p>
          <p class="row-detail"><strong>Profile Score:</strong> ${safe(score)}%</p>
          <p class="row-detail"><strong>Linked Users:</strong> ${safe(linkedUsers.length)}</p>

          <div class="profile-score-wrap">
            <div class="profile-score-bar" style="width: ${safe(score)}%;"></div>
          </div>

          ${statusBadge(getTenantStatus(row))}
          ${profileScoreBadge(score)}
        </div>

        <div class="form-grid">
          <div>
            <label for="editBusinessName">Business Name</label>
            <input id="editBusinessName" value="${safe(getTenantName(row))}" />
          </div>

          <div>
            <label for="editCompanyName">Company Name</label>
            <input id="editCompanyName" value="${safe(getField(row, ["company_name"], getTenantName(row)))}" />
          </div>

          <div>
            <label for="editContactPerson">Contact Person</label>
            <input id="editContactPerson" value="${safe(getContactPerson(row))}" />
          </div>

          <div>
            <label for="editEmail">Business Email</label>
            <input id="editEmail" type="email" value="${safe(getBusinessEmail(row))}" />
          </div>

          <div>
            <label for="editPhone">Business Phone</label>
            <input id="editPhone" value="${safe(getBusinessPhone(row))}" />
          </div>

          <div>
            <label for="editLocation">Business Location</label>
            <input id="editLocation" value="${safe(getBusinessLocation(row))}" />
          </div>

          <div>
            <label for="editStatus">Account Status</label>
            <select id="editStatus">
              <option value="trial">Trial</option>
              <option value="active">Active</option>
              <option value="suspended">Suspended</option>
              <option value="cancelled">Cancelled</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>

          <div>
            <label for="editDriveFolder">Google Drive Folder URL</label>
            <input id="editDriveFolder" value="${safe(getField(row, ["google_drive_folder_url"], ""))}" />
          </div>

          <div class="form-grid-full">
            <label for="editDescription">Business Description</label>
            <textarea id="editDescription">${safe(getBusinessDescription(row))}</textarea>
          </div>

          <div class="form-grid-full">
            <label for="editNotes">Business Notes</label>
            <textarea id="editNotes">${safe(getBusinessNotes(row))}</textarea>
          </div>

          <div class="form-grid-full">
            <label for="editDriveNotes">Shared Drive Notes</label>
            <textarea id="editDriveNotes">${safe(getField(row, ["shared_drive_notes"], ""))}</textarea>
          </div>
        </div>

        <div class="button-row">
          <button class="btn green" onclick="saveSelectedProfile()">Save Profile</button>
          <button class="btn blue" onclick="quickUpdateStatus('${safe(row.id)}','active')">Set Active</button>
          <button class="btn orange" onclick="quickUpdateStatus('${safe(row.id)}','trial')">Set Trial</button>
          <button class="btn red" onclick="quickUpdateStatus('${safe(row.id)}','suspended')">Suspend</button>
          <button class="btn dark" onclick="quickUpdateStatus('${safe(row.id)}','cancelled')">Cancel Account</button>
        </div>

        <div style="margin-top: 18px;">
          <h3>Linked Users</h3>
          ${linkedUsers.length === 0 ? `
            <div class="empty">
              <h3>No linked users</h3>
              <p>This client does not have a linked user record yet.</p>
            </div>
          ` : linkedUsers.map(user => `
            <div class="row-card info-card">
              <div class="row-title">${safe(user.full_name || user.email || "User")}</div>
              <p class="row-detail"><strong>Email:</strong> ${safe(user.email || "N/A")}</p>
              <p class="row-detail"><strong>Role:</strong> ${safe(user.role || "client")}</p>
              <p class="row-detail"><strong>Status:</strong> ${safe(user.status || "active")}</p>
            </div>
          `).join("")}
        </div>
      `;

      document.getElementById("editStatus").value = getTenantStatus(row);

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function updateTenantStatus(tenantId, status) {
      const { error } = await supabaseClient
        .from("tenants")
        .update({
          account_status: status,
          status: status,
          updated_at: new Date().toISOString()
        })
        .eq("id", tenantId);

      if (error) {
        alert(error.message);
        return false;
      }

      return true;
    }

    async function quickUpdateStatus(tenantId, status) {
      const ok = await updateTenantStatus(tenantId, status);

      if (!ok) return;

      selectedTenantId = tenantId;

      UnganiAdminShared.showToast("Client status updated ✓");
      await loadPageData();
    }

    async function saveSelectedProfile() {
      if (!selectedTenantId) {
        alert("No client selected.");
        return;
      }

      const businessName = document.getElementById("editBusinessName").value.trim();
      const companyName = document.getElementById("editCompanyName").value.trim();
      const contactPerson = document.getElementById("editContactPerson").value.trim();
      const email = document.getElementById("editEmail").value.trim();
      const phone = document.getElementById("editPhone").value.trim();
      const location = document.getElementById("editLocation").value.trim();
      const status = document.getElementById("editStatus").value;
      const driveFolder = document.getElementById("editDriveFolder").value.trim();
      const description = document.getElementById("editDescription").value.trim();
      const notes = document.getElementById("editNotes").value.trim();
      const driveNotes = document.getElementById("editDriveNotes").value.trim();

      if (!businessName) {
        alert("Please enter the business name.");
        return;
      }

      const payload = {
        business_name: businessName,
        company_name: companyName || businessName,
        contact_person: contactPerson || null,
        business_email: email || null,
        business_phone: phone || null,
        business_location: location || null,
        business_description: description || null,
        business_notes: notes || null,
        account_status: status,
        status: status,
        google_drive_folder_url: driveFolder || null,
        shared_drive_notes: driveNotes || null,
        updated_at: new Date().toISOString()
      };

      const { error } = await supabaseClient
        .from("tenants")
        .update(payload)
        .eq("id", selectedTenantId);

      if (error) {
        alert(error.message);
        return;
      }

      UnganiAdminShared.showToast("Client profile saved ✓");
      await loadPageData();
    }

    function resetFilters() {
      document.getElementById("statusFilter").value = "";
      document.getElementById("profileFilter").value = "";
      document.getElementById("searchBox").value = "";

      renderProfilesPage();

      UnganiAdminShared.showToast("Profile filters reset ✓");
    }
  </script>
</body>
</html>
