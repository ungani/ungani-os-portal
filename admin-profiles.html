<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Admin Profiles</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="pwa-register.js"></script>
  <script src="admin-shared.js"></script>

  <style>
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 24px var(--ungani-shadow);
    }

    .metric-card h3 {
      margin: 0 0 8px;
      color: var(--ungani-muted);
      font-size: 14px;
    }

    .metric-card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
      color: var(--ungani-text);
    }

    .metric-card .note {
      margin-top: 8px;
      color: var(--ungani-muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .metric-card.green { border-left-color: var(--ungani-green); }
    .metric-card.red { border-left-color: var(--ungani-red); }
    .metric-card.orange { border-left-color: var(--ungani-orange); }
    .metric-card.blue { border-left-color: var(--ungani-blue); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .form-grid-full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 8px 0 6px;
      font-size: 14px;
      color: var(--ungani-text);
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--ungani-border);
      border-radius: 12px;
      background: var(--ungani-card);
      color: var(--ungani-text);
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
    }

    .section-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-title-row h2 {
      margin: 0;
    }

    .row-card {
      background: var(--ungani-bg);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .row-card.active-card { border-left-color: var(--ungani-green); }
    .row-card.trial-card { border-left-color: var(--ungani-gold); }
    .row-card.warning-card { border-left-color: var(--ungani-orange); }
    .row-card.bad-card { border-left-color: var(--ungani-red); }
    .row-card.info-card { border-left-color: var(--ungani-blue); }

    .row-title {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 6px;
      color: var(--ungani-text);
    }

    .row-detail {
      color: var(--ungani-muted);
      margin: 5px 0;
      line-height: 1.45;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      background: #061C3D;
      color: #FFFFFF;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      text-transform: capitalize;
    }

    .badge.green { background: var(--ungani-green); }
    .badge.red { background: var(--ungani-red); }
    .badge.orange { background: var(--ungani-orange); }
    .badge.blue { background: var(--ungani-blue); }
    .badge.gold { background: var(--ungani-gold); color: #061C3D; }

    .empty {
      text-align: center;
      padding: 28px;
      background: var(--ungani-bg);
      border: 1px dashed var(--ungani-border);
      border-radius: 18px;
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--ungani-text);
    }

    .empty p {
      margin: 0;
      color: var(--ungani-muted);
    }

    .small-text {
      color: var(--ungani-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .profile-score-wrap {
      background: var(--ungani-bg);
      border: 1px solid var(--ungani-border);
      border-radius: 999px;
      overflow: hidden;
      height: 12px;
      margin: 10px 0;
    }

    .profile-score-bar {
      height: 12px;
      background: var(--ungani-gold);
      width: 0%;
    }

    @media (max-width: 950px) {
      .two-col {
        grid-template-columns: 1fr;
      }
    }

    .ungani-table-wrap {
      overflow-x: auto;
    }

    .ungani-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 720px;
    }

    .ungani-table thead th {
      text-align: left;
      padding: 10px 12px;
      color: var(--ungani-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--ungani-border);
      white-space: nowrap;
    }

    .ungani-table tbody tr {
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .ungani-table tbody tr:hover {
      background: rgba(212, 166, 58, 0.08);
    }

    .ungani-table td {
      padding: 12px;
      border-bottom: 1px solid var(--ungani-border);
      vertical-align: middle;
    }

    .ungani-table td:first-child {
      border-left: 4px solid var(--accent, #64748B);
      font-weight: bold;
      color: var(--ungani-text);
    }

    .ungani-table .row-sub {
      display: block;
      font-weight: normal;
      color: var(--ungani-muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .ungani-table .row-actions {
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
      justify-content: flex-end;
    }

    .ungani-table .row-actions .ungani-btn {
      padding: 7px 10px;
      font-size: 12px;
    }

    .modal-form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .modal-form-grid-full {
      grid-column: 1 / -1;
    }

    .modal-section-title {
      margin: 22px 0 12px;
      font-size: 15px;
      color: var(--ungani-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .modal-section-title:first-child {
      margin-top: 0;
    }

    .delete-zone {
      margin-top: 22px;
      padding: 16px;
      border: 1px solid rgba(185, 28, 28, 0.35);
      background: rgba(185, 28, 28, 0.06);
      border-radius: 16px;
    }

    .delete-zone h4 {
      margin: 0 0 6px;
      color: var(--ungani-red);
    }

    .delete-zone p {
      margin: 0 0 10px;
      color: var(--ungani-muted);
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div id="adminRoot"></div>

  <script>
    let supabaseClient = null;
    let currentAdmin = null;

    let tenants = [];
    let users = [];
    let selectedTenantId = null;

    const pageMainHtml = `
      <section class="ungani-card ungani-hero-card">
        <div style="position: relative; z-index: 1;">
          <h2>Admin Client Profiles</h2>
          <p>
            View, organize, and update client business profiles, account status, contact details, and setup completeness.
          </p>
          <div style="margin-top: 16px;">
            <a class="ungani-btn" href="admin-home.html">Admin Home</a>
            <a class="ungani-btn green" href="admin.html">Main Admin</a>
            <a class="ungani-btn blue" href="users.html">Users</a>
            <a class="ungani-btn dark" href="admin-settings.html">Admin Settings</a>
          </div>
        </div>
      </section>

      <section class="page-grid" id="metricsGrid">
        <div class="metric-card"><h3>Loading</h3><p>...</p><div class="note">Please wait</div></div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>Profile Filters</h2>
          <button class="ungani-btn green" onclick="loadPageData()">Refresh</button>
        </div>

        <div class="form-grid">
          <div>
            <label for="statusFilter">Account Status</label>
            <select id="statusFilter" onchange="renderProfilesPage()">
              <option value="">All Statuses</option>
              <option value="trial">Trial</option>
              <option value="active">Active</option>
              <option value="suspended">Suspended</option>
              <option value="cancelled">Cancelled</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>

          <div>
            <label for="profileFilter">Profile Completeness</label>
            <select id="profileFilter" onchange="renderProfilesPage()">
              <option value="">All Profiles</option>
              <option value="complete">Complete / Strong</option>
              <option value="incomplete">Incomplete</option>
              <option value="missing_contact">Missing Contact Info</option>
              <option value="missing_location">Missing Location</option>
            </select>
          </div>

          <div>
            <label for="searchBox">Search</label>
            <input id="searchBox" placeholder="Search client profiles..." oninput="renderProfilesPage()" />
          </div>
        </div>

        <div class="button-row">
          <button class="ungani-btn dark" onclick="resetFilters()">Reset Filters</button>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>Needs Attention</h2>
          <p class="small-text">Clients with the lowest profile completeness.</p>
        </div>
        <div id="summaryBox">
          <div class="empty">
            <h3>Loading summary...</h3>
            <p>Please wait.</p>
          </div>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>All Client Profiles</h2>
          <p class="small-text" id="profilesCountText">Loading...</p>
        </div>

        <div id="profilesListBox">
          <div class="empty">
            <h3>Loading client profiles...</h3>
            <p>Please wait.</p>
          </div>
        </div>
      </section>
    `;

    window.addEventListener("load", function () {
      UnganiAdminShared.renderShell("adminRoot", {
        activeKey: "admin-profiles",
        pageTitle: "Admin Profiles",
        pageSubtitle: "View and update approved client business profiles.",
        footerTitle: "Admin Profiles",
        footerVersion: "Admin Profiles Version: Step 291 Shared Session Added",
        mainHtml: pageMainHtml
      });

      UnganiAdminShared.requireAdmin({
        onNoSession: function () {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiLoginShell").classList.remove("hidden");
        },
        onBlocked: function (reason) {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiBlockedShell").classList.remove("hidden");
          document.getElementById("unganiBlockedReason").innerText = reason;
        },
        onReady: async function (admin, client) {
          currentAdmin = admin;
          supabaseClient = client;

          UnganiAdminShared.renderSidebar("adminSidebar", {
            activeKey: "admin-profiles",
            adminName: admin.full_name || "Admin Workspace",
            footerTitle: "Admin Profiles",
            footerVersion: "Admin Profiles Version: Step 291 Shared Session Added"
          });

          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiAppShell").classList.remove("hidden");

          await loadPageData();
        }
      });
    });

    function safe(value) {
      return UnganiAdminShared.safe(value);
    }

    function cleanText(value) {
      return UnganiAdminShared.cleanText(value);
    }

    function getField(row, names, fallback = "") {
      for (const name of names) {
        if (row && row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return fallback;
    }

    function getTenantName(row) {
      return getField(row, ["business_name", "company_name", "tenant_name"], "Client Business");
    }

    function getTenantStatus(row) {
      return String(getField(row, ["account_status", "status"], "trial")).toLowerCase();
    }

    function getContactPerson(row) {
      return getField(row, ["contact_person", "owner_name", "primary_contact"], "");
    }

    function getBusinessEmail(row) {
      return getField(row, ["business_email", "email", "contact_email"], "");
    }

    function getBusinessPhone(row) {
      return getField(row, ["business_phone", "phone", "contact_phone"], "");
    }

    function getBusinessLocation(row) {
      return getField(row, ["business_location", "location", "address"], "");
    }

    function getBusinessDescription(row) {
      return getField(row, ["business_description", "description"], "");
    }

    function getBusinessNotes(row) {
      return getField(row, ["business_notes", "notes"], "");
    }

    function getCreatedDate(row) {
      return getField(row, ["created_at", "updated_at"], "");
    }

    function getLinkedUsers(tenantId) {
      return users.filter(user => String(user.tenant_id) === String(tenantId));
    }

    function formatDateTime(value) {
      if (!value) return "N/A";

      const dateObj = new Date(value);

      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function statusBadge(status) {
      const clean = String(status || "trial").toLowerCase();

      if (clean === "active") {
        return `<span class="badge green">Active</span>`;
      }

      if (clean === "trial") {
        return `<span class="badge gold">Trial</span>`;
      }

      if (clean === "suspended") {
        return `<span class="badge orange">Suspended</span>`;
      }

      if (clean === "cancelled" || clean === "inactive") {
        return `<span class="badge red">${safe(cleanText(clean))}</span>`;
      }

      return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
    }

    function statusAccent(status) {
      const clean = String(status || "trial").toLowerCase();

      if (clean === "active") return "#15803D";
      if (clean === "trial") return "#D4A63A";
      if (clean === "suspended") return "#C77700";
      if (clean === "cancelled" || clean === "inactive") return "#B91C1C";

      return "#2563EB";
    }

    function profileCardClass(row) {
      const status = getTenantStatus(row);

      if (status === "active") return "active-card";
      if (status === "trial") return "trial-card";
      if (status === "suspended") return "warning-card";
      if (status === "cancelled" || status === "inactive") return "bad-card";

      return "info-card";
    }

    function profileScore(row) {
      let score = 0;

      if (getTenantName(row)) score += 15;
      if (getContactPerson(row)) score += 15;
      if (getBusinessEmail(row)) score += 15;
      if (getBusinessPhone(row)) score += 15;
      if (getBusinessLocation(row)) score += 15;
      if (getBusinessDescription(row)) score += 10;
      if (getBusinessNotes(row)) score += 5;
      if (getLinkedUsers(row.id).length > 0) score += 10;

      return Math.min(score, 100);
    }

    function profileScoreBadge(score) {
      if (score >= 80) return `<span class="badge green">Strong profile</span>`;
      if (score >= 50) return `<span class="badge orange">Needs details</span>`;
      return `<span class="badge red">Incomplete</span>`;
    }

    async function safeSelect(tableName) {
      try {
        const { data, error } = await supabaseClient
          .from(tableName)
          .select("*")
          .limit(10000);

        if (error) {
          console.log(tableName, error.message);
          return [];
        }

        return data || [];
      } catch (error) {
        console.log(tableName, error.message);
        return [];
      }
    }

    async function loadPageData() {
      UnganiAdminShared.showToast("Loading client profiles...");

      const [tenantRows, userRows] = await Promise.all([
        safeSelect("tenants"),
        safeSelect("users")
      ]);

      tenants = tenantRows
        .filter(row => !row.deleted_at)
        .sort((a, b) => new Date(getCreatedDate(b) || 0) - new Date(getCreatedDate(a) || 0));
      users = userRows;

      renderProfilesPage();

      UnganiAdminShared.showToast("Client profiles updated ✓");
    }

    function filteredTenants() {
      const statusFilter = document.getElementById("statusFilter").value;
      const profileFilter = document.getElementById("profileFilter").value;
      const query = document.getElementById("searchBox").value.toLowerCase().trim();

      let rows = [...tenants];

      if (statusFilter) {
        rows = rows.filter(row => getTenantStatus(row) === statusFilter);
      }

      if (profileFilter === "complete") {
        rows = rows.filter(row => profileScore(row) >= 80);
      }

      if (profileFilter === "incomplete") {
        rows = rows.filter(row => profileScore(row) < 80);
      }

      if (profileFilter === "missing_contact") {
        rows = rows.filter(row => !getBusinessEmail(row) || !getBusinessPhone(row) || !getContactPerson(row));
      }

      if (profileFilter === "missing_location") {
        rows = rows.filter(row => !getBusinessLocation(row));
      }

      if (query) {
        rows = rows.filter(row => {
          const linked = getLinkedUsers(row.id)
            .map(user => [user.full_name, user.email, user.role, user.status].join(" "))
            .join(" ");

          const haystack = [
            getTenantName(row),
            getTenantStatus(row),
            getContactPerson(row),
            getBusinessEmail(row),
            getBusinessPhone(row),
            getBusinessLocation(row),
            getBusinessDescription(row),
            getBusinessNotes(row),
            linked,
            JSON.stringify(row)
          ].join(" ").toLowerCase();

          return haystack.includes(query);
        });
      }

      return rows;
    }

    function renderProfilesPage() {
      renderMetrics();
      renderSummary();
      renderProfilesList();
    }

    function renderMetrics() {
      const rows = filteredTenants();

      const active = rows.filter(row => getTenantStatus(row) === "active").length;
      const trial = rows.filter(row => getTenantStatus(row) === "trial").length;
      const suspended = rows.filter(row => getTenantStatus(row) === "suspended").length;
      const cancelled = rows.filter(row => ["cancelled", "inactive"].includes(getTenantStatus(row))).length;
      const complete = rows.filter(row => profileScore(row) >= 80).length;
      const incomplete = rows.filter(row => profileScore(row) < 80).length;
      const missingContact = rows.filter(row => !getBusinessEmail(row) || !getBusinessPhone(row) || !getContactPerson(row)).length;
      const linkedUsers = rows.reduce((sum, row) => sum + getLinkedUsers(row.id).length, 0);

      const metrics = [
        { title: "Total Clients", value: rows.length, note: "Client profiles in current view", cls: "blue" },
        { title: "Active", value: active, note: "Currently active client accounts", cls: "green" },
        { title: "Trial", value: trial, note: "Trial/testing client accounts", cls: "orange" },
        { title: "Suspended", value: suspended, note: "Accounts currently suspended", cls: suspended > 0 ? "red" : "green" },
        { title: "Cancelled / Inactive", value: cancelled, note: "Closed or inactive accounts", cls: cancelled > 0 ? "red" : "green" },
        { title: "Strong Profiles", value: complete, note: "Profiles with enough business details", cls: "green" },
        { title: "Incomplete Profiles", value: incomplete, note: "Profiles needing more information", cls: incomplete > 0 ? "orange" : "green" },
        { title: "Linked Users", value: linkedUsers, note: "Users connected to these clients", cls: "blue" }
      ];

      document.getElementById("metricsGrid").innerHTML = metrics.map(item => `
        <div class="metric-card ${safe(item.cls)}">
          <h3>${safe(item.title)}</h3>
          <p>${safe(item.value)}</p>
          <div class="note">${safe(item.note)}</div>
        </div>
      `).join("");
    }

    function renderSummary() {
      const rows = filteredTenants();

      if (rows.length === 0) {
        document.getElementById("summaryBox").innerHTML = `
          <div class="empty">
            <h3>No client summary yet</h3>
            <p>No clients match the current filters.</p>
          </div>
        `;
        return;
      }

      const needsAttention = rows
        .map(row => ({
          row,
          score: profileScore(row),
          usersCount: getLinkedUsers(row.id).length
        }))
        .sort((a, b) => a.score - b.score)
        .slice(0, 8);

      document.getElementById("summaryBox").innerHTML = needsAttention.map(item => `
        <div class="row-card ${safe(profileCardClass(item.row))}">
          <div class="row-title">${safe(getTenantName(item.row))}</div>
          <p class="row-detail"><strong>Status:</strong> ${safe(cleanText(getTenantStatus(item.row)))}</p>
          <p class="row-detail"><strong>Profile Score:</strong> ${safe(item.score)}%</p>
          <div class="profile-score-wrap">
            <div class="profile-score-bar" style="width: ${safe(item.score)}%;"></div>
          </div>
          <p class="row-detail"><strong>Linked Users:</strong> ${safe(item.usersCount)}</p>
          ${profileScoreBadge(item.score)}
          ${statusBadge(getTenantStatus(item.row))}
          <div class="button-row">
            <button class="ungani-btn" onclick="openProfileModal('${safe(item.row.id)}')">Open Profile</button>
          </div>
        </div>
      `).join("");
    }

    function renderProfilesList() {
      const rows = filteredTenants();

      document.getElementById("profilesCountText").innerText = `${rows.length} client profile(s) shown`;

      if (rows.length === 0) {
        document.getElementById("profilesListBox").innerHTML = `
          <div class="empty">
            <h3>No client profiles found</h3>
            <p>Try changing the filters.</p>
          </div>
        `;
        return;
      }

      document.getElementById("profilesListBox").innerHTML = `
        <div class="ungani-table-wrap">
          <table class="ungani-table">
            <thead>
              <tr>
                <th>Business</th>
                <th>Status</th>
                <th>Profile</th>
                <th>Linked Users</th>
                <th>Created</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(row => {
                const score = profileScore(row);
                const linkedUsers = getLinkedUsers(row.id);

                return `
                  <tr style="--accent:${safe(statusAccent(getTenantStatus(row)))};" onclick="openProfileModal('${safe(row.id)}')">
                    <td>
                      ${safe(getTenantName(row))}
                      <span class="row-sub">${safe(getContactPerson(row) || getBusinessEmail(row) || "No contact on file")}</span>
                    </td>
                    <td>${statusBadge(getTenantStatus(row))}</td>
                    <td>${safe(score)}% ${profileScoreBadge(score)}</td>
                    <td>${safe(linkedUsers.length)}</td>
                    <td>${safe(formatDateTime(getCreatedDate(row)))}</td>
                    <td onclick="event.stopPropagation();">
                      <div class="row-actions">
                        <button class="ungani-btn green" onclick="quickUpdateStatus('${safe(row.id)}','active')">Active</button>
                        <button class="ungani-btn orange" onclick="quickUpdateStatus('${safe(row.id)}','trial')">Trial</button>
                        <button class="ungani-btn red" onclick="quickUpdateStatus('${safe(row.id)}','suspended')">Suspend</button>
                      </div>
                    </td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function openProfileModal(tenantId) {
      const row = tenants.find(item => String(item.id) === String(tenantId));

      if (!row) {
        UnganiAdminShared.showToast("Client profile not found - refresh and try again.");
        return;
      }

      selectedTenantId = row.id;

      const linkedUsers = getLinkedUsers(row.id);
      const score = profileScore(row);
      const status = getTenantStatus(row);
      const canDelete = status !== "active";

      UnganiAdminShared.openModal({
        title: getTenantName(row),
        bodyHtml: `
          <div class="row-card ${safe(profileCardClass(row))}" style="margin-bottom:18px;">
            <p class="row-detail"><strong>Profile Score:</strong> ${safe(score)}%</p>
            <div class="profile-score-wrap">
              <div class="profile-score-bar" style="width: ${safe(score)}%;"></div>
            </div>
            <p class="row-detail"><strong>Linked Users:</strong> ${safe(linkedUsers.length)}</p>
            ${statusBadge(status)}
            ${profileScoreBadge(score)}
          </div>

          <div class="modal-section-title">Business Profile</div>
          <div class="modal-form-grid">
            <div>
              <label for="editBusinessName">Business Name</label>
              <input id="editBusinessName" value="${safe(getTenantName(row))}" />
            </div>

            <div>
              <label for="editCompanyName">Company Name</label>
              <input id="editCompanyName" value="${safe(getField(row, ["company_name"], getTenantName(row)))}" />
            </div>

            <div>
              <label for="editContactPerson">Contact Person</label>
              <input id="editContactPerson" value="${safe(getContactPerson(row))}" />
            </div>

            <div>
              <label for="editEmail">Business Email</label>
              <input id="editEmail" type="email" value="${safe(getBusinessEmail(row))}" />
            </div>

            <div>
              <label for="editPhone">Business Phone</label>
              <input id="editPhone" value="${safe(getBusinessPhone(row))}" />
            </div>

            <div>
              <label for="editLocation">Business Location</label>
              <input id="editLocation" value="${safe(getBusinessLocation(row))}" />
            </div>

            <div>
              <label for="editStatus">Account Status</label>
              <select id="editStatus">
                <option value="trial">Trial</option>
                <option value="active">Active</option>
                <option value="suspended">Suspended</option>
                <option value="cancelled">Cancelled</option>
                <option value="inactive">Inactive</option>
              </select>
            </div>

            <div>
              <label for="editDriveFolder">Google Drive Folder URL</label>
              <input id="editDriveFolder" value="${safe(getField(row, ["google_drive_folder_url"], ""))}" />
            </div>

            <div class="modal-form-grid-full">
              <label for="editDescription">Business Description</label>
              <textarea id="editDescription">${safe(getBusinessDescription(row))}</textarea>
            </div>

            <div class="modal-form-grid-full">
              <label for="editNotes">Business Notes</label>
              <textarea id="editNotes">${safe(getBusinessNotes(row))}</textarea>
            </div>

            <div class="modal-form-grid-full">
              <label for="editDriveNotes">Shared Drive Notes</label>
              <textarea id="editDriveNotes">${safe(getField(row, ["shared_drive_notes"], ""))}</textarea>
            </div>
          </div>

          <div class="button-row">
            <button class="ungani-btn green" onclick="saveSelectedProfile()">Save Profile</button>
            <button class="ungani-btn blue" onclick="quickUpdateStatus('${safe(row.id)}','active')">Set Active</button>
            <button class="ungani-btn orange" onclick="quickUpdateStatus('${safe(row.id)}','trial')">Set Trial</button>
            <button class="ungani-btn red" onclick="quickUpdateStatus('${safe(row.id)}','suspended')">Suspend</button>
            <button class="ungani-btn dark" onclick="quickUpdateStatus('${safe(row.id)}','cancelled')">Cancel Account</button>
          </div>

          <div class="modal-section-title">Linked Users</div>
          ${linkedUsers.length === 0 ? `
            <div class="empty">
              <h3>No linked users</h3>
              <p>This client does not have a linked user record yet.</p>
            </div>
          ` : linkedUsers.map(user => `
            <div class="row-card info-card">
              <div class="row-title">${safe(user.full_name || user.email || "User")}</div>
              <p class="row-detail"><strong>Email:</strong> ${safe(user.email || "N/A")}</p>
              <p class="row-detail"><strong>Role:</strong> ${safe(user.role || "client")}</p>
              <p class="row-detail"><strong>Status:</strong> ${safe(user.status || "active")}</p>
            </div>
          `).join("")}

          <div class="delete-zone">
            <h4>Delete This Client</h4>
            <p>
              ${canDelete
                ? "Permanently removes this business from the active client list. This cannot be undone from this screen - the record is soft-deleted and stays recoverable by support for a limited time."
                : "This account is currently Active. Set it to Trial, Suspended, or Cancelled before it can be deleted, so a live paying client can never be removed by accident."}
            </p>
            <button class="ungani-btn red" ${canDelete ? "" : "disabled"} onclick="promptDeleteTenant('${safe(row.id)}')">
              Delete Client
            </button>
          </div>
        `,
        onOpen: function () {
          document.getElementById("editStatus").value = status;
        }
      });
    }

    async function updateTenantStatus(tenantId, status) {
      const { error } = await supabaseClient
        .from("tenants")
        .update({
          account_status: status,
          status: status,
          updated_at: new Date().toISOString()
        })
        .eq("id", tenantId);

      if (error) {
        alert(error.message);
        return false;
      }

      // The update above only changes the display/cosmetic status on the
      // tenants row. Actual client write access is gated separately by
      // ungani_subscriptions.subscription_status/payment_status (read
      // server-side by get_my_ungani_subscription_access, whose sibling
      // get_my_ungani_access_status confirms both fields feed access_allowed
      // together) - without this second step, "Active" here never lifts a
      // trial account out of read-only mode.
      const row = tenants.find(item => String(item.id) === String(tenantId)) || {};
      let currentSub = {};

      try {
        const subResult = await supabaseClient
          .from("ungani_subscriptions")
          .select("*")
          .eq("tenant_id", tenantId)
          .maybeSingle();
        console.log("[quickUpdateStatus] current ungani_subscriptions row:", subResult);
        if (!subResult.error && subResult.data) {
          currentSub = subResult.data;
        }
      } catch (subError) {
        console.warn("Could not load current subscription record:", subError.message);
      }

      // Marking a tenant "Active" is meant to fully unblock them, so
      // payment_status has to move off a blocking value too (trial/pending)
      // - leaving it untouched was the bug: subscription_status flipped to
      // "active" but payment_status stayed "trial", and access_allowed very
      // likely requires both. "waived" is left alone since it already
      // means "don't require payment". Every other button (trial/suspended/
      // cancelled) leaves payment_status exactly as it was - only Active
      // has a defensible reason to touch it.
      const existingPaymentStatus = currentSub.payment_status || row.payment_status || "trial";
      const paymentStatus = status === "active"
        ? (existingPaymentStatus === "waived" ? "waived" : "paid")
        : existingPaymentStatus;

      const rpcParams = {
        p_tenant_id: tenantId,
        p_package_key: currentSub.package_key || row.package_key || "starter",
        p_subscription_status: status,
        p_payment_status: paymentStatus,
        p_trial_end_at: currentSub.trial_end_at || row.trial_end_at || null,
        p_notes: currentSub.notes || null
      };

      console.log("[quickUpdateStatus] calling admin_update_ungani_subscription with:", rpcParams);

      let rpcResult;
      try {
        rpcResult = await supabaseClient.rpc("admin_update_ungani_subscription", rpcParams);
      } catch (rpcThrow) {
        console.error("[quickUpdateStatus] RPC call threw:", rpcThrow);
        alert("Status saved, but subscription access could not be updated (RPC threw): " + rpcThrow.message);
        return false;
      }

      console.log("[quickUpdateStatus] RPC result:", rpcResult);

      if (rpcResult.error) {
        alert("Status saved, but subscription access could not be updated: " + rpcResult.error.message);
        return false;
      }

      UnganiAdminShared.logAuditEvent("tenant_status_changed", {
        entityType: "tenants",
        entityId: String(tenantId),
        tenantId: String(tenantId),
        description: "Tenant status changed to " + status
      });

      // admin_update_ungani_subscription RETURNS the actual row after the
      // write - surfacing it directly means the next test is
      // self-verifying from the UI alone, no console/SQL round-trip
      // needed to know what really landed.
      return rpcResult.data || true;
    }

    async function quickUpdateStatus(tenantId, status) {
      const result = await updateTenantStatus(tenantId, status);

      if (!result) return;

      selectedTenantId = tenantId;

      UnganiAdminShared.closeModal();

      if (result && typeof result === "object") {
        UnganiAdminShared.showToast(
          "Client status updated - subscription_status: " + result.subscription_status +
          ", payment_status: " + result.payment_status
        );
      } else {
        UnganiAdminShared.showToast("Client status updated ✓");
      }

      await loadPageData();
    }

    async function promptDeleteTenant(tenantId) {
      const row = tenants.find(item => String(item.id) === String(tenantId));

      if (!row) {
        UnganiAdminShared.showToast("Client not found - refresh and try again.");
        return;
      }

      const status = getTenantStatus(row);

      if (status === "active") {
        alert("This account is Active. Set it to Trial, Suspended, or Cancelled first, then delete.");
        return;
      }

      const businessName = getTenantName(row);
      const typed = prompt(
        `This permanently removes "${businessName}" from your active client list. This cannot be undone from this screen.\n\nType the exact business name to confirm:\n${businessName}`
      );

      if (typed === null) return;

      if (typed.trim() !== businessName.trim()) {
        alert("The name you typed doesn't match. Deletion cancelled.");
        return;
      }

      const response = await supabaseClient.rpc("delete_ungani_tenant", {
        p_tenant_id: tenantId,
        p_delete_reason: "Deleted from Admin Profiles page"
      });

      if (response.error) {
        alert(response.error.message || "Could not delete this client.");
        return;
      }

      if (response.data && response.data.ok === false) {
        alert(response.data.message || "Could not delete this client.");
        return;
      }

      selectedTenantId = null;
      UnganiAdminShared.closeModal();
      UnganiAdminShared.showToast("Client deleted ✓");
      await loadPageData();
    }

    async function saveSelectedProfile() {
      if (!selectedTenantId) {
        alert("No client selected.");
        return;
      }

      const businessName = document.getElementById("editBusinessName").value.trim();
      const companyName = document.getElementById("editCompanyName").value.trim();
      const contactPerson = document.getElementById("editContactPerson").value.trim();
      const email = document.getElementById("editEmail").value.trim();
      const phone = document.getElementById("editPhone").value.trim();
      const location = document.getElementById("editLocation").value.trim();
      const status = document.getElementById("editStatus").value;
      const driveFolder = document.getElementById("editDriveFolder").value.trim();
      const description = document.getElementById("editDescription").value.trim();
      const notes = document.getElementById("editNotes").value.trim();
      const driveNotes = document.getElementById("editDriveNotes").value.trim();

      if (!businessName) {
        alert("Please enter the business name.");
        return;
      }

      const payload = {
        business_name: businessName,
        company_name: companyName || businessName,
        contact_person: contactPerson || null,
        business_email: email || null,
        business_phone: phone || null,
        business_location: location || null,
        business_description: description || null,
        business_notes: notes || null,
        account_status: status,
        status: status,
        google_drive_folder_url: driveFolder || null,
        shared_drive_notes: driveNotes || null,
        updated_at: new Date().toISOString()
      };

      const { error } = await supabaseClient
        .from("tenants")
        .update(payload)
        .eq("id", selectedTenantId);

      if (error) {
        alert(error.message);
        return;
      }

      UnganiAdminShared.logAuditEvent("tenant_profile_updated", {
        entityType: "tenants",
        entityId: String(selectedTenantId),
        tenantId: String(selectedTenantId),
        description: "Client profile saved",
        metadata: { status: status }
      });

      UnganiAdminShared.closeModal();
      UnganiAdminShared.showToast("Client profile saved ✓");
      await loadPageData();
    }

    function resetFilters() {
      document.getElementById("statusFilter").value = "";
      document.getElementById("profileFilter").value = "";
      document.getElementById("searchBox").value = "";

      renderProfilesPage();

      UnganiAdminShared.showToast("Profile filters reset ✓");
    }
  </script>
</body>
