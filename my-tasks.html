<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Tasks / Follow-ups</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-shared.js"></script>
</head>

<body>
  <script>
    let currentContext = null;
    let tasks = [];
    let currentEditId = null;
    let isRealEstate = false;

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "tasks",
        pageTitle: "Tasks / Follow-ups",
        pageSubtitle: "Manage follow-ups, reminders, responsibilities, viewings, document collection, and business tasks.",
        onReady: startTasksPage
      });
    });

    async function startTasksPage(context) {
      currentContext = context;

      const businessType = String(UnganiClientShared.getValue(context.tenant, ["business_type", "business_type_key"], "")).toLowerCase();
      const businessTypeKey = String(UnganiClientShared.getValue(context.tenant, ["business_type_key"], "")).toLowerCase();

      isRealEstate = businessType.includes("real estate") || businessTypeKey.includes("real_estate");

      const titleEl = document.querySelector(".ungani-topbar h2");
      const subEl = document.querySelector(".ungani-topbar p");

      if (titleEl) {
        titleEl.innerText = isRealEstate ? "Property Tasks / Follow-ups" : "Tasks / Follow-ups";
      }

      if (subEl) {
        subEl.innerText = isRealEstate
          ? "Track property follow-ups, viewing tasks, document collection, rent reminders, project tasks, and agent responsibilities."
          : "Track business follow-ups, responsibilities, reminders, and operational tasks.";
      }

      await loadTasks();
    }

    async function loadTasks() {
      currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading tasks and follow-ups...");

      const response = await currentContext.supabaseClient
        .from("tasks")
        .select("*")
        .eq("tenant_id", currentContext.tenantId)
        .order("due_date", { ascending: true })
        .order("created_at", { ascending: false });

      if (response.error) {
        currentContext.contentEl.innerHTML = UnganiClientShared.errorCard("Could not load tasks", response.error.message);
        return;
      }

      tasks = response.data || [];
      renderTasksPage();
    }

    function renderTasksPage() {
      const filtered = filterTasks();
      const summary = calculateSummary();

      UnganiClientShared.setContent(`
        <section class="ungani-card ungani-hero">
          <h2>${isRealEstate ? "Property Follow-ups & Tasks" : "Tasks & Follow-ups"}</h2>
          <p>
            ${isRealEstate
              ? "Use this section for property viewing follow-ups, client calls, agent tasks, document collection, payment reminders, rent reminders, and project deadlines."
              : "Use this section for business follow-ups, reminders, operational tasks, assignments, and deadlines."
            }
          </p>

          <div class="ungani-button-row">
            <button class="ungani-btn" onclick="scrollToForm()">${currentEditId ? "Update Task" : "Add Task"}</button>
            <a class="ungani-btn green" href="my-calendar.html">Calendar</a>
            <a class="ungani-btn dark" href="my-records.html">Records</a>
          </div>
        </section>

        <section class="ungani-grid">
          ${UnganiClientShared.metricCard("Total Tasks", tasks.length, "All saved tasks", "blue")}
          ${UnganiClientShared.metricCard("Pending", summary.pending, "Tasks still open", summary.pending > 0 ? "orange" : "green")}
          ${UnganiClientShared.metricCard("Due Today", summary.today, "Tasks due today", summary.today > 0 ? "orange" : "green")}
          ${UnganiClientShared.metricCard("Overdue", summary.overdue, "Tasks past due date", summary.overdue > 0 ? "red" : "green")}
          ${UnganiClientShared.metricCard("High Priority", summary.highPriority, "Important tasks", summary.highPriority > 0 ? "red" : "green")}
          ${UnganiClientShared.metricCard("Completed", summary.completed, "Finished tasks", "green")}
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <h3>Filters</h3>
            <button class="ungani-btn dark" onclick="resetFilters()">Reset Filters</button>
          </div>

          <div class="ungani-form-grid">
            <div>
              <label for="filterType">Task Type</label>
              <select id="filterType" onchange="saveFilters(); renderTasksPage();">
                <option value="">All Types</option>
                <option value="follow up">Follow Up</option>
                <option value="viewing">Viewing</option>
                <option value="site visit">Site Visit</option>
                <option value="document collection">Document Collection</option>
                <option value="payment reminder">Payment Reminder</option>
                <option value="rent reminder">Rent Reminder</option>
                <option value="project task">Project Task</option>
                <option value="maintenance">Maintenance</option>
                <option value="client call">Client Call</option>
                <option value="general">General</option>
              </select>
            </div>

            <div>
              <label for="filterStatus">Status</label>
              <select id="filterStatus" onchange="saveFilters(); renderTasksPage();">
                <option value="">All Statuses</option>
                <option value="pending">Pending</option>
                <option value="in progress">In Progress</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>

            <div>
              <label for="filterPriority">Priority</label>
              <select id="filterPriority" onchange="saveFilters(); renderTasksPage();">
                <option value="">All Priorities</option>
                <option value="low">Low</option>
                <option value="normal">Normal</option>
                <option value="high">High</option>
                <option value="urgent">Urgent</option>
              </select>
            </div>

            <div>
              <label for="searchBox">Search</label>
              <input id="searchBox" placeholder="Search task, property, agent, lead..." oninput="saveFilters(); renderTasksPage();" />
            </div>
          </div>
        </section>

        <section id="taskFormCard" class="ungani-card">
          <div class="ungani-section-title">
            <h3>${currentEditId ? "Update Task" : "Add Task"}</h3>
            ${currentEditId ? '<button class="ungani-btn dark" onclick="cancelEdit()">Cancel Edit</button>' : ""}
          </div>

          ${renderTaskForm()}
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <div>
                <h3>${isRealEstate ? "Property Tasks / Follow-ups" : "Task Records"}</h3>
                <p class="ungani-small">${filtered.length} task(s) shown</p>
              </div>

              <button class="ungani-btn green" onclick="loadTasks()">Refresh</button>
            </div>

            ${renderTaskList(filtered)}
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Task Summary</h3>
            </div>

            ${renderSummaryPanel(filtered)}
          </div>
        </section>

        <p class="ungani-small">
          Tasks Version: Step 305G Shared Layout · ungani.com · info@ungani.com
        </p>
      `);

      restoreFilters();
      fillEditForm();
    }

    function renderTaskForm() {
      return `
        <form id="taskForm" onsubmit="saveTask(event)">
          <div class="ungani-form-grid">
            <div>
              <label for="taskTitle">Task Title</label>
              <input id="taskTitle" required placeholder="Example: Follow up with Kevin Demo Buyer" />
            </div>

            <div>
              <label for="taskType">Task Type</label>
              <select id="taskType">
                <option value="follow up">Follow Up</option>
                <option value="viewing">Viewing</option>
                <option value="site visit">Site Visit</option>
                <option value="document collection">Document Collection</option>
                <option value="payment reminder">Payment Reminder</option>
                <option value="rent reminder">Rent Reminder</option>
                <option value="project task">Project Task</option>
                <option value="maintenance">Maintenance</option>
                <option value="client call">Client Call</option>
                <option value="general">General</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div>
              <label for="status">Status</label>
              <select id="status">
                <option value="pending">Pending</option>
                <option value="in progress">In Progress</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>

            <div>
              <label for="priority">Priority</label>
              <select id="priority">
                <option value="normal">Normal</option>
                <option value="low">Low</option>
                <option value="high">High</option>
                <option value="urgent">Urgent</option>
              </select>
            </div>

            <div>
              <label for="dueDate">Due Date</label>
              <input id="dueDate" type="date" />
            </div>

            <div>
              <label for="followUpType">Follow-up Type</label>
              <input id="followUpType" placeholder="Example: Call / WhatsApp / Visit / Email" />
            </div>

            <div>
              <label for="propertyName">Property Name</label>
              <input id="propertyName" placeholder="Example: Clove Garden A12" />
            </div>

            <div>
              <label for="projectName">Project Name</label>
              <input id="projectName" placeholder="Example: Clove Garden" />
            </div>

            <div>
              <label for="leadName">Lead / Client Name</label>
              <input id="leadName" placeholder="Example: Kevin Demo Buyer" />
            </div>

            <div>
              <label for="assignedAgent">${isRealEstate ? "Assigned Agent" : "Assigned Person"}</label>
              <input id="assignedAgent" placeholder="Example: Brian Otieno" />
            </div>

            <div>
              <label for="viewingDate">Viewing / Site Visit Date</label>
              <input id="viewingDate" type="date" />
            </div>
          </div>

          <label for="description">Description</label>
          <textarea id="description" placeholder="${isRealEstate ? "Add details about the viewing, follow-up, document collection, rent reminder, or project task..." : "Add details about this task..."}"></textarea>

          <label for="notes">Internal Notes</label>
          <textarea id="notes" placeholder="Add internal notes, next steps, or important details..."></textarea>

          <div class="ungani-button-row">
            <button class="ungani-btn green" type="submit">${currentEditId ? "Update Task" : "Add Task"}</button>
            ${currentEditId ? '<button class="ungani-btn dark" type="button" onclick="cancelEdit()">Cancel</button>' : ""}
          </div>
        </form>
      `;
    }

    function renderTaskList(rows) {
      if (rows.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No tasks found</h3>
            <p>Add your first task, viewing follow-up, document collection reminder, or project task above.</p>
          </div>
        `;
      }

      return rows.map(function (row) {
        return renderTaskCard(row);
      }).join("");
    }

    function renderTaskCard(row) {
      const title = UnganiClientShared.getValue(row, ["task_title", "title", "name"], "Task");
      const type = UnganiClientShared.getValue(row, ["task_type"], "general");
      const status = UnganiClientShared.getValue(row, ["status"], "pending");
      const priority = UnganiClientShared.getValue(row, ["priority"], "normal");
      const dueDate = UnganiClientShared.getValue(row, ["due_date"], "");
      const property = UnganiClientShared.getValue(row, ["property_name"], "");
      const project = UnganiClientShared.getValue(row, ["project_name"], "");
      const agent = UnganiClientShared.getValue(row, ["assigned_agent"], "");
      const lead = UnganiClientShared.getValue(row, ["lead_name"], "");
      const viewingDate = UnganiClientShared.getValue(row, ["viewing_date"], "");
      const followUpType = UnganiClientShared.getValue(row, ["follow_up_type"], "");
      const description = UnganiClientShared.getValue(row, ["description"], "");
      const notes = UnganiClientShared.getValue(row, ["notes"], "");

      return `
        <div class="ungani-card" style="box-shadow:none;">
          <div class="ungani-section-title">
            <div>
              <h3>${UnganiClientShared.safe(title)}</h3>
              <p class="ungani-small">
                ${UnganiClientShared.safe(type)}
                ${property ? " · " + UnganiClientShared.safe(property) : ""}
                ${lead ? " · " + UnganiClientShared.safe(lead) : ""}
              </p>
            </div>

            <div>
              ${badge(type, "blue")}
              ${badge(status, statusColor(status))}
              ${badge(priority, priorityColor(priority))}
            </div>
          </div>

          <section class="ungani-grid">
            ${miniDetail("Due Date", UnganiClientShared.formatDate(dueDate))}
            ${miniDetail("Property", property || "N/A")}
            ${miniDetail("Project", project || "N/A")}
            ${miniDetail("Lead / Client", lead || "N/A")}
            ${miniDetail(isRealEstate ? "Assigned Agent" : "Assigned Person", agent || "N/A")}
            ${miniDetail("Viewing / Site Visit", UnganiClientShared.formatDate(viewingDate))}
            ${miniDetail("Follow-up Type", followUpType || "N/A")}
          </section>

          ${description ? `<p class="ungani-small" style="margin-top:12px;"><strong>Description:</strong> ${UnganiClientShared.safe(description)}</p>` : ""}
          ${notes ? `<p class="ungani-small"><strong>Notes:</strong> ${UnganiClientShared.safe(notes)}</p>` : ""}

          <div class="ungani-button-row">
            <button class="ungani-btn" onclick="editTask('${UnganiClientShared.attr(row.id)}')">Edit</button>
            <button class="ungani-btn orange" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'in progress')">In Progress</button>
            <button class="ungani-btn green" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'completed')">Completed</button>
            <button class="ungani-btn red" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'cancelled')">Cancelled</button>
          </div>
        </div>
      `;
    }

    function renderSummaryPanel(rows) {
      const typeSummary = {};
      const statusSummary = {};

      rows.forEach(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["task_type"], "general")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "pending")).toLowerCase();

        typeSummary[type] = (typeSummary[type] || 0) + 1;
        statusSummary[status] = (statusSummary[status] || 0) + 1;
      });

      const typeKeys = Object.keys(typeSummary);
      const statusKeys = Object.keys(statusSummary);

      if (typeKeys.length === 0 && statusKeys.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No summary yet</h3>
            <p>Summary will appear when tasks are added.</p>
          </div>
        `;
      }

      let html = `<h3 style="margin-top:0;color:var(--ungani-text);">By Task Type</h3>`;

      html += typeKeys.map(function (key) {
        return `
          <div class="ungani-card" style="box-shadow:none;margin-bottom:10px;">
            <strong>${UnganiClientShared.safe(toTitle(key))}</strong>
            <p class="ungani-small" style="margin:5px 0 0;">${typeSummary[key]} task(s)</p>
          </div>
        `;
      }).join("");

      html += `<h3 style="color:var(--ungani-text);">By Status</h3>`;

      html += statusKeys.map(function (key) {
        return `
          <div class="ungani-card" style="box-shadow:none;margin-bottom:10px;">
            <strong>${UnganiClientShared.safe(toTitle(key))}</strong>
            <p class="ungani-small" style="margin:5px 0 0;">${statusSummary[key]} task(s)</p>
          </div>
        `;
      }).join("");

      return html;
    }

    function calculateSummary() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      let pending = 0;
      let completed = 0;
      let todayCount = 0;
      let overdue = 0;
      let highPriority = 0;

      tasks.forEach(function (row) {
        const status = String(UnganiClientShared.getValue(row, ["status"], "pending")).toLowerCase();
        const priority = String(UnganiClientShared.getValue(row, ["priority"], "normal")).toLowerCase();
        const dueValue = UnganiClientShared.getValue(row, ["due_date"], "");

        if (status === "completed") completed++;
        if (status !== "completed" && status !== "cancelled") pending++;
        if (priority === "high" || priority === "urgent") highPriority++;

        if (dueValue) {
          const dueDate = new Date(dueValue);
          dueDate.setHours(0, 0, 0, 0);

          if (!isNaN(dueDate.getTime())) {
            if (dueDate.getTime() === today.getTime()) todayCount++;
            if (dueDate < today && status !== "completed" && status !== "cancelled") overdue++;
          }
        }
      });

      return {
        pending: pending,
        completed: completed,
        today: todayCount,
        overdue: overdue,
        highPriority: highPriority
      };
    }

    function filterTasks() {
      const filterType = document.getElementById("filterType") ? UnganiClientShared.value("filterType").toLowerCase() : "";
      const filterStatus = document.getElementById("filterStatus") ? UnganiClientShared.value("filterStatus").toLowerCase() : "";
      const filterPriority = document.getElementById("filterPriority") ? UnganiClientShared.value("filterPriority").toLowerCase() : "";
      const query = document.getElementById("searchBox") ? UnganiClientShared.value("searchBox").toLowerCase() : "";

      return tasks.filter(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["task_type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "")).toLowerCase();
        const priority = String(UnganiClientShared.getValue(row, ["priority"], "")).toLowerCase();

        const haystack = [
          UnganiClientShared.getValue(row, ["task_title", "title", "name"], ""),
          type,
          status,
          priority,
          UnganiClientShared.getValue(row, ["property_name"], ""),
          UnganiClientShared.getValue(row, ["project_name"], ""),
          UnganiClientShared.getValue(row, ["assigned_agent"], ""),
          UnganiClientShared.getValue(row, ["lead_name"], ""),
          UnganiClientShared.getValue(row, ["follow_up_type"], ""),
          UnganiClientShared.getValue(row, ["description"], ""),
          UnganiClientShared.getValue(row, ["notes"], "")
        ].join(" ").toLowerCase();

        if (filterType && type !== filterType) return false;
        if (filterStatus && status !== filterStatus) return false;
        if (filterPriority && priority !== filterPriority) return false;
        if (query && !haystack.includes(query)) return false;

        return true;
      });
    }

    async function saveTask(event) {
      event.preventDefault();

      const title = UnganiClientShared.value("taskTitle");

      if (!title) {
        alert("Please enter a task title.");
        return;
      }

      const payload = {
        business_type_key: UnganiClientShared.getValue(currentContext.tenant, ["business_type_key"], null),
        section_key: "tasks_followups",
        task_title: title,
        title: title,
        name: title,
        task_type: UnganiClientShared.value("taskType") || "general",
        status: UnganiClientShared.value("status") || "pending",
        priority: UnganiClientShared.value("priority") || "normal",
        due_date: UnganiClientShared.value("dueDate") || null,
        follow_up_type: UnganiClientShared.value("followUpType") || null,
        property_name: UnganiClientShared.value("propertyName") || null,
        project_name: UnganiClientShared.value("projectName") || null,
        lead_name: UnganiClientShared.value("leadName") || null,
        assigned_agent: UnganiClientShared.value("assignedAgent") || null,
        viewing_date: UnganiClientShared.value("viewingDate") || null,
        description: UnganiClientShared.value("description") || null,
        notes: UnganiClientShared.value("notes") || null,
        updated_at: new Date().toISOString()
      };

      let response;

      if (currentEditId) {
        response = await currentContext.supabaseClient
          .from("tasks")
          .update(payload)
          .eq("id", currentEditId)
          .eq("tenant_id", currentContext.tenantId);
      } else {
        payload.tenant_id = currentContext.tenantId;
        payload.created_by = currentContext.authUser.id;
        payload.created_at = new Date().toISOString();

        response = await currentContext.supabaseClient
          .from("tasks")
          .insert(payload);
      }

      if (response.error) {
        alert(response.error.message);
        return;
      }

      currentEditId = null;
      UnganiClientShared.showToast("Task saved ✓");
      await loadTasks();
    }

    function fillEditForm() {
      if (!currentEditId) return;

      const row = tasks.find(function (item) {
        return String(item.id) === String(currentEditId);
      });

      if (!row) return;

      setValue("taskTitle", UnganiClientShared.getValue(row, ["task_title", "title", "name"], ""));
      setValue("taskType", UnganiClientShared.getValue(row, ["task_type"], "general"));
      setValue("status", UnganiClientShared.getValue(row, ["status"], "pending"));
      setValue("priority", UnganiClientShared.getValue(row, ["priority"], "normal"));
      setValue("dueDate", String(UnganiClientShared.getValue(row, ["due_date"], "")).slice(0, 10));
      setValue("followUpType", UnganiClientShared.getValue(row, ["follow_up_type"], ""));
      setValue("propertyName", UnganiClientShared.getValue(row, ["property_name"], ""));
      setValue("projectName", UnganiClientShared.getValue(row, ["project_name"], ""));
      setValue("leadName", UnganiClientShared.getValue(row, ["lead_name"], ""));
      setValue("assignedAgent", UnganiClientShared.getValue(row, ["assigned_agent"], ""));
      setValue("viewingDate", String(UnganiClientShared.getValue(row, ["viewing_date"], "")).slice(0, 10));
      setValue("description", UnganiClientShared.getValue(row, ["description"], ""));
      setValue("notes", UnganiClientShared.getValue(row, ["notes"], ""));
    }

    function editTask(id) {
      currentEditId = id;
      renderTasksPage();
      scrollToForm();
    }

    function cancelEdit() {
      currentEditId = null;
      renderTasksPage();
      UnganiClientShared.showToast("Edit cancelled");
    }

    async function quickStatus(id, status) {
      const response = await currentContext.supabaseClient
        .from("tasks")
        .update({
          status: status,
          updated_at: new Date().toISOString()
        })
        .eq("id", id)
        .eq("tenant_id", currentContext.tenantId);

      if (response.error) {
        alert(response.error.message);
        return;
      }

      UnganiClientShared.showToast("Status updated ✓");
      await loadTasks();
    }

    function restoreFilters() {
      if (document.getElementById("filterType")) document.getElementById("filterType").value = sessionStorage.getItem("ungani_tasks_filter_type") || "";
      if (document.getElementById("filterStatus")) document.getElementById("filterStatus").value = sessionStorage.getItem("ungani_tasks_filter_status") || "";
      if (document.getElementById("filterPriority")) document.getElementById("filterPriority").value = sessionStorage.getItem("ungani_tasks_filter_priority") || "";
      if (document.getElementById("searchBox")) document.getElementById("searchBox").value = sessionStorage.getItem("ungani_tasks_search") || "";
    }

    function saveFilters() {
      if (document.getElementById("filterType")) sessionStorage.setItem("ungani_tasks_filter_type", UnganiClientShared.value("filterType"));
      if (document.getElementById("filterStatus")) sessionStorage.setItem("ungani_tasks_filter_status", UnganiClientShared.value("filterStatus"));
      if (document.getElementById("filterPriority")) sessionStorage.setItem("ungani_tasks_filter_priority", UnganiClientShared.value("filterPriority"));
      if (document.getElementById("searchBox")) sessionStorage.setItem("ungani_tasks_search", UnganiClientShared.value("searchBox"));
    }

    function resetFilters() {
      sessionStorage.removeItem("ungani_tasks_filter_type");
      sessionStorage.removeItem("ungani_tasks_filter_status");
      sessionStorage.removeItem("ungani_tasks_filter_priority");
      sessionStorage.removeItem("ungani_tasks_search");
      renderTasksPage();
      UnganiClientShared.showToast("Filters reset ✓");
    }

    function badge(text, color) {
      return `<span class="ungani-badge ${UnganiClientShared.attr(color || "blue")}">${UnganiClientShared.safe(text)}</span>`;
    }

    function statusColor(status) {
      const lower = String(status || "").toLowerCase();

      if (lower.includes("completed")) return "green";
      if (lower.includes("progress") || lower.includes("pending")) return "orange";
      if (lower.includes("cancelled")) return "red";

      return "blue";
    }

    function priorityColor(priority) {
      const lower = String(priority || "").toLowerCase();

      if (lower === "urgent" || lower === "high") return "red";
      if (lower === "normal") return "gold";
      if (lower === "low") return "blue";

      return "blue";
    }

    function miniDetail(label, value) {
      return `
        <div class="ungani-card" style="margin-bottom:0;box-shadow:none;padding:14px;">
          <p class="ungani-small" style="margin:0 0 5px;">${UnganiClientShared.safe(label)}</p>
          <strong>${UnganiClientShared.safe(value)}</strong>
        </div>
      `;
    }

    function toTitle(value) {
      return String(value || "")
        .replace(/_/g, " ")
        .replace(/\w\S*/g, function (text) {
          return text.charAt(0).toUpperCase() + text.substr(1).toLowerCase();
        });
    }

    function setValue(id, value) {
      const element = document.getElementById(id);

      if (element) {
        element.value = value === null || value === undefined ? "" : value;
      }
    }

    function scrollToForm() {
      setTimeout(function () {
        const card = document.getElementById("taskFormCard");

        if (card) {
          card.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      }, 100);
    }
  </script>
</body>
</html>
