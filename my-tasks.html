<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Tasks</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-shared.js" onerror="window.__unganiClientSharedFailed = true;"></script>
  <script>
    (function () {
      function showUnganiLoadError() {
        if (typeof UnganiClientShared !== "undefined") return;

        var banner = document.createElement("div");
        banner.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99999;background:#B91C1C;color:#fff;padding:12px 16px;font:14px/1.4 -apple-system,sans-serif;text-align:center;";
        banner.innerHTML = "Some page resources failed to load. Please check your connection. " +
          "<button style=\"margin-left:10px;padding:4px 12px;border:none;border-radius:6px;background:#fff;color:#B91C1C;font-weight:700;cursor:pointer;\" onclick=\"window.location.reload()\">Reload</button>";

        if (document.body) {
          document.body.prepend(banner);
        } else {
          document.addEventListener("DOMContentLoaded", function () {
            document.body.prepend(banner);
          });
        }
      }

      if (window.__unganiClientSharedFailed) {
        showUnganiLoadError();
      } else {
        setTimeout(function () {
          if (typeof UnganiClientShared === "undefined") showUnganiLoadError();
        }, 4000);
      }
    })();
  </script>
  <script src="ungani-business-config.js"></script>
  <script src="ungani-analytics.js"></script>
  <script src="ungani-presets.js"></script>
</head>

<body>
  <script>
    let currentContext = null;
    let businessPreset = null;
    let taskRows = [];
    let editingTaskId = null;
    let highlightApplied = false;
    let sectionOptions = [];
    let currentSectionFilter = "";
    let activeTaskCategory = "all";

    const TILE_PALETTE = ["#D4A63A", "#2563EB", "#16A34A", "#DC2626", "#7C3AED", "#0EA5E9", "#EA580C", "#059669", "#DB2777"];

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "tasks",
        pageTitle: "Tasks",
        pageSubtitle: "Manage tasks, follow-ups, reminders, and work progress.",
        onReady: startTasksPage
      });
    });

    async function startTasksPage(context) {
      currentContext = context;

      if (window.UnganiAnalytics) {
        UnganiAnalytics.injectChartStyles();
      }

      businessPreset = UnganiPresets.getPreset(context.tenant);
      sectionOptions = businessPreset.selectedSectionLabels || [];
      currentSectionFilter = new URLSearchParams(window.location.search).get("section") || "";

      const titleEl = document.querySelector(".ungani-topbar h2");
      const subEl = document.querySelector(".ungani-topbar p");

      if (titleEl) {
        titleEl.innerText = businessPreset.tasksLabel;
      }

      if (subEl) {
        subEl.innerText = "Tasks, follow-ups, reminders, and deadlines for " + businessPreset.name + ".";
      }

      await loadTaskRows();
    }

    async function loadTaskRows() {
      currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading tasks...");

      let response;

      try {
        response = await currentContext.supabaseClient
          .from("tasks")
          .select("*")
          .eq("tenant_id", currentContext.tenantId)
          .order("created_at", { ascending: false });
      } catch (error) {
        UnganiClientShared.setContent(
          UnganiClientShared.errorCard("Could not load tasks", error.message || "Network error. Please check your connection.")
        );
        return;
      }

      if (response.error) {
        UnganiClientShared.setContent(
          UnganiClientShared.errorCard("Could not load tasks", response.error.message)
        );
        return;
      }

      taskRows = response.data || [];
      renderTasksPage();
    }

    function renderTasksPage() {
      const filteredRows = getFilteredRows();
      const summary = calculateTaskSummary(filteredRows);
      const statusRows = buildStatusRows(filteredRows);
      const priorityRows = buildPriorityRows(filteredRows);

      UnganiClientShared.setContent(`
        <style>
          .tasks-hero-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
            gap: 18px;
            align-items: stretch;
          }

          .tasks-preset-box {
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.09);
            border-radius: 24px;
            padding: 18px;
          }

          .tasks-preset-box h3 {
            color: white;
            margin: 0 0 8px;
          }

          .tasks-preset-box p {
            color: rgba(255,255,255,0.74);
            margin: 0;
            line-height: 1.55;
          }

          .task-chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
          }

          .task-chip {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 8px 11px;
            background: rgba(255,255,255,0.12);
            color: white;
            font-size: 12px;
            font-weight: 850;
          }

          .task-kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 18px;
          }

          .task-kpi-card {
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            background: var(--ungani-card);
            border: 1px solid var(--ungani-border);
            box-shadow: var(--ungani-shadow);
            padding: 20px;
            min-height: 140px;
          }

          .task-kpi-card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 18px;
            bottom: 18px;
            width: 5px;
            border-radius: 0 999px 999px 0;
            background: var(--accent);
          }

          .task-kpi-card span {
            color: var(--ungani-muted);
            font-size: 12px;
            font-weight: 950;
            text-transform: uppercase;
            letter-spacing: 0.055em;
          }

          .task-kpi-card h3 {
            margin: 17px 0 8px;
            font-size: clamp(25px, 3vw, 36px);
            line-height: 1;
            letter-spacing: -0.055em;
          }

          .task-kpi-card p {
            margin: 0;
            color: var(--ungani-muted);
            font-size: 13px;
          }

          .task-form-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
          }

          .task-form-grid .wide {
            grid-column: span 3;
          }

          .task-chart-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
            margin-bottom: 18px;
            align-items: start;
          }

          .task-type-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
          }

          .type-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
          }

          .type-pill {
            border: 1px solid var(--ungani-border);
            background: var(--ungani-soft);
            color: var(--ungani-text);
            border-radius: 999px;
            padding: 8px 11px;
            font-size: 12px;
            font-weight: 850;
            cursor: pointer;
          }

          .type-pill:hover {
            border-color: rgba(212,166,58,0.65);
          }

          .category-tiles {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 18px;
          }

          .category-tile {
            background: var(--ungani-card);
            border: 1px solid var(--ungani-border);
            border-left: 5px solid var(--tile-accent, var(--ungani-gold));
            border-radius: 18px;
            padding: 14px 16px;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            transition: 0.18s ease;
          }

          .category-tile:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px var(--ungani-shadow);
          }

          .category-tile.active {
            box-shadow: 0 0 0 2px var(--tile-accent, var(--ungani-gold));
          }

          .category-tile .tile-count {
            display: block;
            font-size: 22px;
            font-weight: 900;
            color: var(--ungani-text);
          }

          .category-tile .tile-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--ungani-muted);
            margin-top: 4px;
          }

          .task-table-wrap {
            overflow-x: auto;
          }

          .task-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 780px;
          }

          .task-table th {
            text-align: left;
            color: var(--ungani-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 13px 12px;
            border-bottom: 1px solid var(--ungani-border);
          }

          .task-table td {
            padding: 14px 12px;
            border-bottom: 1px solid var(--ungani-border);
            vertical-align: top;
          }

          .task-table td:first-child {
            border-left: 4px solid var(--accent, #64748B);
          }

          .task-table tbody tr {
            cursor: pointer;
          }

          .task-table tbody tr:hover td {
            background: var(--ungani-soft);
          }

          .task-table .row-sub {
            display: block;
            color: var(--ungani-muted);
            font-size: 12px;
            margin-top: 2px;
          }

          @media (max-width: 1180px) {
            .tasks-hero-grid,
            .task-chart-grid {
              grid-template-columns: 1fr;
            }

            .task-kpi-grid {
              grid-template-columns: repeat(2, minmax(0, 1fr));
            }
          }

          @media (max-width: 720px) {
            .task-kpi-grid,
            .task-form-grid {
              grid-template-columns: 1fr;
            }

            .task-form-grid .wide {
              grid-column: span 1;
            }
          }
        </style>

        <section class="ungani-card ungani-hero">
          <div class="tasks-hero-grid">
            <div>
              <span class="ungani-badge gold">${UnganiClientShared.safe(businessPreset.name)}</span>
              <h2 style="font-size:clamp(32px,4vw,52px);line-height:1.02;margin:18px 0 12px;">
                Tasks that match your business workflow.
              </h2>
              <p>
                Create follow-ups, reminders, operational tasks, deadlines, and work actions using presets for ${UnganiClientShared.safe(businessPreset.name)}.
              </p>

              <div class="ungani-button-row">
                <button class="ungani-btn gold" onclick="openTaskModal()">Add Task</button>
                <button class="ungani-btn green" onclick="loadTaskRows()">Refresh</button>
                <a class="ungani-btn light" href="my-charts.html">View Charts</a>
              </div>

              ${renderSectionSwitcher()}
            </div>

            <div class="tasks-preset-box">
              <h3>Business task preset active</h3>
              <p>The task types on this page now adapt to the business type selected by the client.</p>

              <div class="task-chip-row">
                ${businessPreset.taskTypes.slice(0, 6).map(function (item) {
                  return `<span class="task-chip">${UnganiClientShared.safe(item)}</span>`;
                }).join("")}
              </div>
            </div>
          </div>
        </section>

        ${renderCategoryTiles()}

        <section class="task-kpi-grid">
          ${taskKpi("Pending", summary.pending, "Tasks not completed", "#D4A63A")}
          ${taskKpi("In Progress", summary.inProgress, "Work currently moving", "#2563EB")}
          ${taskKpi("Completed", summary.completed, "Finished tasks", "#16A34A")}
          ${taskKpi("Overdue", summary.overdue, "Needs attention", summary.overdue > 0 ? "#DC2626" : "#16A34A")}
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>Filters</h3>
              <p class="ungani-small">Search and filter this business task view.</p>
            </div>

            <button class="ungani-btn dark" onclick="resetTaskFilters()">Reset Filters</button>
          </div>

          <div class="task-form-grid">
            <div>
              <label for="filterStatus">Status</label>
              <select id="filterStatus" onchange="saveTaskFilters(); renderTasksPage();">
                <option value="">All Status</option>
                <option value="pending">Pending</option>
                <option value="in progress">In Progress</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>

            <div>
              <label for="filterPriority">Priority</label>
              <select id="filterPriority" onchange="saveTaskFilters(); renderTasksPage();">
                <option value="">All Priority</option>
                <option value="low">Low</option>
                <option value="normal">Normal</option>
                <option value="high">High</option>
                <option value="urgent">Urgent</option>
              </select>
            </div>

            <div>
              <label for="filterSearch">Search</label>
              <input id="filterSearch" placeholder="Search task, type, assigned person..." oninput="saveTaskFilters(); renderTasksPage();" />
            </div>
          </div>
        </section>

        <section class="task-chart-grid">
          <div class="ungani-card ungani-chart-card">
            <div class="ungani-chart-head">
              <div>
                <h3>Task Status</h3>
                <p class="ungani-small">Animated chart showing task progress.</p>
              </div>
            </div>

            ${hasValues(statusRows) ? '<div class="ungani-chart-canvas-wrap"><canvas id="taskStatusChart"></canvas></div>' : UnganiAnalytics.emptyChart("Add tasks to show task status.")}
          </div>

          <div class="ungani-card ungani-chart-card">
            <div class="ungani-chart-head">
              <div>
                <h3>Priority Breakdown</h3>
                <p class="ungani-small">Urgent and high-priority tasks are easy to spot.</p>
              </div>
            </div>

            ${hasValues(priorityRows) ? '<div class="ungani-chart-canvas-wrap"><canvas id="taskPriorityChart"></canvas></div>' : UnganiAnalytics.emptyChart("Add tasks to show priority breakdown.")}
          </div>
        </section>

        <section class="task-type-section">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <div>
                <h3>Task Types</h3>
                <p class="ungani-small">Quick-fill task types for ${UnganiClientShared.safe(businessPreset.name)}.</p>
              </div>
            </div>

            <div class="type-list">
              ${businessPreset.taskTypes.map(function (item) {
                return `<button class="type-pill" onclick="quickTaskType('${UnganiClientShared.attr(item)}')">${UnganiClientShared.safe(item)}</button>`;
              }).join("")}
            </div>
          </div>
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>Task Guide</h3>
              <p class="ungani-small">How to keep work organized.</p>
            </div>
          </div>

          <div class="ungani-empty" style="text-align:left;">
            <h3>Use clear task types</h3>
            <p>Task types help the Dashboard, Charts, Reports, and Activity Feed explain what is happening in the business.</p>
          </div>

          <div style="display:grid;gap:10px;margin-top:12px;">
            <div class="ungani-card" style="box-shadow:none;">
              <strong>Example task</strong>
              <p class="ungani-small">${UnganiClientShared.safe(businessPreset.taskTypes[0] || "Follow-up")}</p>
            </div>

            <div class="ungani-card" style="box-shadow:none;">
              <strong>Priority rule</strong>
              <p class="ungani-small">Use red/urgent only for work that truly needs attention.</p>
            </div>

            <div class="ungani-card" style="box-shadow:none;">
              <strong>Reports</strong>
              <p class="ungani-small">Completed, pending, and overdue tasks appear in client reports.</p>
            </div>
          </div>
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>Task List</h3>
              <p class="ungani-small">${filteredRows.length} task(s) shown.</p>
            </div>

            <div class="ungani-button-row" style="margin-top:0;">
              <button class="ungani-btn gold" onclick="openTaskModal()">+ Add Task</button>
              <button class="ungani-btn green" onclick="loadTaskRows()">Refresh</button>
            </div>
          </div>

          ${renderTaskList(filteredRows)}
        </section>

        <p class="ungani-small">
          Tasks Version: Step 310B-2 Business-Type Task Presets · ungani.com · info@ungani.com
        </p>
      `);

      restoreTaskFilters();

      setTimeout(function () {
        renderTaskCharts(statusRows, priorityRows);
      }, 150);

      applyHighlightFromUrl();
    }

    function applyHighlightFromUrl() {
      if (highlightApplied) return;

      const highlightId = new URLSearchParams(window.location.search).get("highlight");
      if (!highlightId) return;

      const row = taskRows.find(function (item) { return String(item.id) === String(highlightId); });
      if (!row) return;

      highlightApplied = true;

      setTimeout(function () {
        openTaskModal(highlightId);
      }, 250);
    }

    async function renderTaskCharts(statusRows, priorityRows) {
      try {
        if (hasValues(statusRows)) {
          await UnganiAnalytics.renderDoughnutStatusChart("taskStatusChart", statusRows);
        }

        if (hasValues(priorityRows)) {
          await UnganiAnalytics.renderDoughnutStatusChart("taskPriorityChart", priorityRows);
        }
      } catch (error) {
        console.warn("Task charts warning:", error.message);
      }
    }

    function renderTaskList(rows) {
      if (!rows || rows.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No tasks yet</h3>
            <p>Add your first task, follow-up, reminder, or deadline.</p>
          </div>
        `;
      }

      return `
        <div class="task-table-wrap">
          <table class="task-table">
            <thead>
              <tr>
                <th>Task</th>
                <th>Type</th>
                <th>Assigned / Related</th>
                <th>Due Date</th>
                <th>Priority</th>
                <th>Status</th>
              </tr>
            </thead>

            <tbody>
              ${rows.map(function (row) {
                const title = getTaskTitle(row);
                const type = getTaskType(row);
                const priority = UnganiClientShared.getValue(row, ["priority"], "normal");
                const status = UnganiClientShared.getValue(row, ["status"], "pending");
                const due = UnganiClientShared.getValue(row, ["due_date"], "");
                const assigned = UnganiClientShared.getValue(row, ["assigned_to"], "");
                const relatedPerson = UnganiClientShared.getValue(row, ["related_person"], "");
                const relatedItem = UnganiClientShared.getValue(row, ["related_item"], "");
                const sectionLabel = UnganiClientShared.getValue(row, ["section_label"], "");

                return `
                  <tr style="--accent:${UnganiClientShared.attr(statusAccent(status, due))};" onclick="openTaskModal('${UnganiClientShared.attr(row.id)}')">
                    <td>
                      ${UnganiClientShared.safe(title)}
                      <span class="row-sub">${sectionLabel ? UnganiClientShared.safe(sectionLabel) : "No section"}</span>
                    </td>
                    <td>${UnganiClientShared.safe(type)}</td>
                    <td>
                      ${UnganiClientShared.safe(assigned || "Unassigned")}
                      <span class="row-sub">${UnganiClientShared.safe(relatedPerson || relatedItem || "No related person/item")}</span>
                    </td>
                    <td>${UnganiClientShared.safe(due ? UnganiClientShared.formatDate(due) : "No date")}</td>
                    <td>${priorityBadge(priority)}</td>
                    <td>${statusBadge(status, due)}</td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function taskKpi(title, value, subtitle, accent) {
      return `
        <div class="task-kpi-card" style="--accent:${UnganiClientShared.attr(accent)};">
          <span>${UnganiClientShared.safe(title)}</span>
          <h3>${UnganiClientShared.safe(value)}</h3>
          <p>${UnganiClientShared.safe(subtitle)}</p>
        </div>
      `;
    }

    function calculateTaskSummary(rows) {
      const today = new Date().toISOString().slice(0, 10);
      let pending = 0;
      let inProgress = 0;
      let completed = 0;
      let overdue = 0;

      rows.forEach(function (row) {
        const status = String(UnganiClientShared.getValue(row, ["status"], "pending")).toLowerCase();
        const due = String(UnganiClientShared.getValue(row, ["due_date"], "")).slice(0, 10);

        if (status.includes("completed")) {
          completed++;
        } else if (status.includes("progress")) {
          inProgress++;
        } else if (!status.includes("cancelled")) {
          pending++;
        }

        if (due && due < today && !status.includes("completed") && !status.includes("cancelled")) {
          overdue++;
        }
      });

      return { pending, inProgress, completed, overdue };
    }

    function buildStatusRows(rows) {
      const today = new Date().toISOString().slice(0, 10);
      const map = {
        Pending: 0,
        "In Progress": 0,
        Completed: 0,
        Overdue: 0
      };

      rows.forEach(function (row) {
        const status = String(UnganiClientShared.getValue(row, ["status"], "pending")).toLowerCase();
        const due = String(UnganiClientShared.getValue(row, ["due_date"], "")).slice(0, 10);

        if (due && due < today && !status.includes("completed") && !status.includes("cancelled")) {
          map.Overdue += 1;
        }

        if (status.includes("completed")) {
          map.Completed += 1;
        } else if (status.includes("progress")) {
          map["In Progress"] += 1;
        } else if (!status.includes("cancelled")) {
          map.Pending += 1;
        }
      });

      return UnganiAnalytics.mapToRows(map);
    }

    function buildPriorityRows(rows) {
      const map = {};

      rows.forEach(function (row) {
        const priority = UnganiClientShared.getValue(row, ["priority"], "normal");
        map[priority] = (map[priority] || 0) + 1;
      });

      return UnganiAnalytics.mapToRows(map);
    }

    function getTaskType(row) {
      return UnganiClientShared.getValue(row, ["task_type", "type"], "General Task");
    }

    function getBaseFilteredRows() {
      const filterStatus = getStoredOrInput("filterStatus", "ungani_task_filter_status").toLowerCase();
      const filterPriority = getStoredOrInput("filterPriority", "ungani_task_filter_priority").toLowerCase();
      const search = getStoredOrInput("filterSearch", "ungani_task_filter_search").toLowerCase();

      return taskRows.filter(function (row) {
        const status = String(UnganiClientShared.getValue(row, ["status"], "pending")).toLowerCase();
        const priority = String(UnganiClientShared.getValue(row, ["priority"], "normal")).toLowerCase();
        const haystack = JSON.stringify(row || {}).toLowerCase();

        if (currentSectionFilter && UnganiClientShared.getValue(row, ["section_label"], "") !== currentSectionFilter) return false;
        if (filterStatus && !status.includes(filterStatus)) return false;
        if (filterPriority && !priority.includes(filterPriority)) return false;
        if (search && !haystack.includes(search)) return false;

        return true;
      });
    }

    function buildTaskCategories() {
      const knownTypes = businessPreset.taskTypes || [];

      const categories = [
        { key: "all", label: "All Tasks", accent: "#061C3D", match: function () { return true; } }
      ];

      knownTypes.forEach(function (type, index) {
        categories.push({
          key: "type-" + index,
          label: type,
          accent: TILE_PALETTE[index % TILE_PALETTE.length],
          match: function (row) { return getTaskType(row) === type; }
        });
      });

      categories.push({
        key: "other",
        label: "Other",
        accent: "#64748B",
        match: function (row) { return knownTypes.indexOf(getTaskType(row)) === -1; }
      });

      return categories;
    }

    function getFilteredRows() {
      const categories = buildTaskCategories();
      const category = categories.find(function (item) { return item.key === activeTaskCategory; }) || categories[0];
      return getBaseFilteredRows().filter(category.match);
    }

    function selectTaskCategory(key) {
      activeTaskCategory = key;
      renderTasksPage();
    }

    function renderCategoryTiles() {
      const categories = buildTaskCategories();
      const base = getBaseFilteredRows();

      return `
        <section class="category-tiles">
          ${categories.map(function (category) {
            const count = base.filter(category.match).length;
            const active = category.key === activeTaskCategory ? " active" : "";

            return `
              <button type="button" class="category-tile${active}" style="--tile-accent:${category.accent};" onclick="selectTaskCategory('${category.key}')">
                <span class="tile-count">${count}</span>
                <span class="tile-label">${UnganiClientShared.safe(category.label)}</span>
              </button>
            `;
          }).join("")}
        </section>
      `;
    }

    function getStoredOrInput(inputId, storageKey) {
      const el = document.getElementById(inputId);

      if (el) {
        return String(el.value || "").trim();
      }

      return String(sessionStorage.getItem(storageKey) || "").trim();
    }

    function saveTaskFilters() {
      if (document.getElementById("filterStatus")) sessionStorage.setItem("ungani_task_filter_status", UnganiClientShared.value("filterStatus"));
      if (document.getElementById("filterPriority")) sessionStorage.setItem("ungani_task_filter_priority", UnganiClientShared.value("filterPriority"));
      if (document.getElementById("filterSearch")) sessionStorage.setItem("ungani_task_filter_search", UnganiClientShared.value("filterSearch"));
    }

    function restoreTaskFilters() {
      if (document.getElementById("filterStatus")) document.getElementById("filterStatus").value = sessionStorage.getItem("ungani_task_filter_status") || "";
      if (document.getElementById("filterPriority")) document.getElementById("filterPriority").value = sessionStorage.getItem("ungani_task_filter_priority") || "";
      if (document.getElementById("filterSearch")) document.getElementById("filterSearch").value = sessionStorage.getItem("ungani_task_filter_search") || "";
    }

    function resetTaskFilters() {
      sessionStorage.removeItem("ungani_task_filter_status");
      sessionStorage.removeItem("ungani_task_filter_priority");
      sessionStorage.removeItem("ungani_task_filter_search");
      activeTaskCategory = "all";
      renderTasksPage();
      UnganiClientShared.showToast("Task filters reset ✓");
    }

    function quickTaskType(taskType) {
      openTaskModal(null, { taskType: taskType });
      UnganiClientShared.showToast("Task type selected ✓");
    }

    function openTaskModal(id, presetValues) {
      const row = id ? taskRows.find(function (item) { return String(item.id) === String(id); }) : null;

      if (id && !row) {
        UnganiClientShared.showToast("Task not found.");
        return;
      }

      editingTaskId = row ? row.id : null;

      const currentStatus = row ? String(UnganiClientShared.getValue(row, ["status"], "pending")).toLowerCase() : "";
      const showMarkDone = row && currentStatus !== "completed";

      const bodyHtml = `
        <form onsubmit="saveTaskRecord(event)">
          <div class="task-form-grid">
            <div class="wide">
              <label for="taskTitle">Task Title</label>
              <input id="taskTitle" placeholder="Example: Follow up with client, collect document, confirm delivery..." required value="${row ? UnganiClientShared.attr(getTaskTitle(row)) : ""}" />
            </div>

            <div>
              <label for="taskType">Task Type</label>
              <select id="taskType">
                ${businessPreset.taskTypes.map(function (item) {
                  return `<option value="${UnganiClientShared.attr(item)}">${UnganiClientShared.safe(item)}</option>`;
                }).join("")}
                ${row && businessPreset.taskTypes.indexOf(getTaskType(row)) === -1
                  ? `<option value="${UnganiClientShared.attr(getTaskType(row))}">${UnganiClientShared.safe(getTaskType(row))}</option>`
                  : ""}
              </select>
            </div>

            <div>
              <label for="taskPriority">Priority</label>
              <select id="taskPriority">
                <option value="low">Low</option>
                <option value="normal">Normal</option>
                <option value="high">High</option>
                <option value="urgent">Urgent</option>
              </select>
            </div>

            <div>
              <label for="taskStatus">Status</label>
              <select id="taskStatus">
                <option value="pending">Pending</option>
                <option value="in progress">In Progress</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>

            <div>
              <label for="taskDueDate">Due Date</label>
              <input id="taskDueDate" type="date" value="${row ? UnganiClientShared.attr(String(UnganiClientShared.getValue(row, ["due_date"], "")).slice(0, 10)) : ""}" />
            </div>

            ${sectionOptions.length > 1 ? `
              <div>
                <label for="taskSection">Section</label>
                <select id="taskSection">
                  ${sectionOptions.map(function (label) {
                    return `<option value="${UnganiClientShared.attr(label)}">${UnganiClientShared.safe(label)}</option>`;
                  }).join("")}
                </select>
              </div>
            ` : ""}

            <div>
              <label for="taskAssignedTo">Assigned To</label>
              <input id="taskAssignedTo" placeholder="Staff, driver, agent, stylist, manager..." value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row, ["assigned_to"], "")) : ""}" />
            </div>

            <div>
              <label for="taskRelatedPerson">Related Person</label>
              <input id="taskRelatedPerson" placeholder="Client, supplier, customer, lead..." value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row, ["related_person"], "")) : ""}" />
            </div>

            <div>
              <label for="taskRelatedItem">Related Item / Work</label>
              <input id="taskRelatedItem" placeholder="${UnganiClientShared.attr(businessPreset.itemsLabel)}" value="${row ? UnganiClientShared.attr(UnganiClientShared.getValue(row, ["related_item"], "")) : ""}" />
            </div>

            <div class="wide">
              <label for="taskNotes">Notes</label>
              <textarea id="taskNotes" rows="4" placeholder="Add instructions, context, follow-up details, or next steps...">${row ? UnganiClientShared.safe(UnganiClientShared.getValue(row, ["notes", "description"], "")) : ""}</textarea>
            </div>
          </div>

          <div class="ungani-button-row" style="margin-top:16px;">
            <button class="ungani-btn gold" type="submit">${row ? "Update Task" : "Save Task"}</button>
            ${showMarkDone ? `<button class="ungani-btn blue" type="button" onclick="markTaskCompleted('${UnganiClientShared.attr(row.id)}', this)">Done</button>` : ""}
            ${row ? `<button class="ungani-btn red" type="button" onclick="deleteTaskRecord('${UnganiClientShared.attr(row.id)}', this)">Delete</button>` : ""}
            <button class="ungani-btn dark" type="button" onclick="UnganiClientShared.closeModal()">Cancel</button>
          </div>
        </form>
      `;

      UnganiClientShared.openModal({
        title: row ? "Edit Task" : "Add Task",
        bodyHtml: bodyHtml,
        onOpen: function () {
          document.getElementById("taskType").value = row
            ? getTaskType(row)
            : ((presetValues && presetValues.taskType) || businessPreset.taskTypes[0] || "General Task");

          document.getElementById("taskPriority").value = row ? UnganiClientShared.getValue(row, ["priority"], "normal") : "normal";
          document.getElementById("taskStatus").value = row ? UnganiClientShared.getValue(row, ["status"], "pending") : "pending";

          if (sectionOptions.length > 1 && document.getElementById("taskSection")) {
            document.getElementById("taskSection").value = row
              ? UnganiClientShared.getValue(row, ["section_label"], "")
              : (currentSectionFilter || sectionOptions[0] || "");
          }
        }
      });
    }

    async function saveTaskRecord(event) {
      event.preventDefault();

      const title = UnganiClientShared.value("taskTitle");

      if (!title) {
        UnganiClientShared.showToast("Enter a task title.");
        return;
      }

      const submitBtn = event.submitter || event.target.querySelector('button[type="submit"]');

      await UnganiClientShared.withButtonLoading(submitBtn, async () => {
        const payload = {
          tenant_id: currentContext.tenantId,
          task_title: title,
          task_type: UnganiClientShared.value("taskType") || "General Task",
          priority: UnganiClientShared.value("taskPriority") || "normal",
          status: UnganiClientShared.value("taskStatus") || "pending",
          due_date: UnganiClientShared.value("taskDueDate") || null,
          assigned_to: UnganiClientShared.value("taskAssignedTo") || null,
          related_person: UnganiClientShared.value("taskRelatedPerson") || null,
          related_item: UnganiClientShared.value("taskRelatedItem") || null,
          notes: UnganiClientShared.value("taskNotes") || null
        };

        if (sectionOptions.length > 1) {
          payload.section_label = UnganiClientShared.value("taskSection") || null;
        }

        let response;

        try {
          if (editingTaskId) {
            response = await currentContext.supabaseClient
              .from("tasks")
              .update(payload)
              .eq("id", editingTaskId)
              .eq("tenant_id", currentContext.tenantId);
          } else {
            response = await currentContext.supabaseClient
              .from("tasks")
              .insert([payload]);
          }
        } catch (error) {
          UnganiClientShared.showToast("Could not save task: " + (error.message || "Network error. Please check your connection."));
          return;
        }

        if (response.error) {
          UnganiClientShared.showToast("Could not save task: " + response.error.message);
          return;
        }

        UnganiClientShared.showToast(editingTaskId ? "Task updated ✓" : "Task added ✓");
        editingTaskId = null;
        UnganiClientShared.closeModal();
        await loadTaskRows();
      });
    }

    async function markTaskCompleted(id, buttonEl) {
      await UnganiClientShared.withButtonLoading(buttonEl, async () => {
        let response;

        try {
          response = await currentContext.supabaseClient
            .from("tasks")
            .update({ status: "completed" })
            .eq("id", id)
            .eq("tenant_id", currentContext.tenantId);
        } catch (error) {
          UnganiClientShared.showToast("Could not update task: " + (error.message || "Network error. Please check your connection."));
          return;
        }

        if (response.error) {
          UnganiClientShared.showToast("Could not update task: " + response.error.message);
          return;
        }

        UnganiClientShared.showToast("Task marked completed ✓");
        editingTaskId = null;
        UnganiClientShared.closeModal();
        await loadTaskRows();
      });
    }

    async function deleteTaskRecord(id, buttonEl) {
      if (
        window.UnganiClientShared &&
        typeof UnganiClientShared.ensureCanWrite === "function" &&
        !UnganiClientShared.ensureCanWrite("delete task")
      ) {
        return;
      }

      const confirmed = confirm("Move this task to Recently Deleted? You can restore it within 30 days.");

      if (!confirmed) return;

      await UnganiClientShared.withButtonLoading(buttonEl, async () => {
        let response;

        try {
          response = await currentContext.supabaseClient.rpc("soft_delete_ungani_record", {
            p_table_name: "tasks",
            p_record_id: id,
            p_delete_reason: "Deleted from Tasks page"
          });
        } catch (error) {
          UnganiClientShared.showToast("Could not delete task: " + (error.message || "Network error. Please check your connection."));
          return;
        }

        if (response.error) {
          UnganiClientShared.showToast("Could not delete task: " + response.error.message);
          return;
        }

        if (response.data && response.data.ok === false) {
          UnganiClientShared.showToast(response.data.message || "Could not delete task.");
          return;
        }

        UnganiClientShared.showToast("Task moved to Recently Deleted ✓");
        editingTaskId = null;
        UnganiClientShared.closeModal();
        await loadTaskRows();
      });
    }

    function getTaskTitle(row) {
      return UnganiClientShared.getValue(row, ["task_title", "title", "name"], "Task");
    }

    function statusBadge(status, dueDate) {
      const lower = String(status || "").toLowerCase();
      const due = String(dueDate || "").slice(0, 10);
      const today = new Date().toISOString().slice(0, 10);

      if (due && due < today && !lower.includes("completed") && !lower.includes("cancelled")) {
        return `<span class="ungani-badge red">Overdue</span>`;
      }

      if (lower.includes("completed")) {
        return `<span class="ungani-badge green">Completed</span>`;
      }

      if (lower.includes("progress")) {
        return `<span class="ungani-badge blue">In Progress</span>`;
      }

      if (lower.includes("cancelled")) {
        return `<span class="ungani-badge red">Cancelled</span>`;
      }

      return `<span class="ungani-badge gold">Pending</span>`;
    }

    function statusAccent(status, dueDate) {
      const lower = String(status || "").toLowerCase();
      const due = String(dueDate || "").slice(0, 10);
      const today = new Date().toISOString().slice(0, 10);

      if (due && due < today && !lower.includes("completed") && !lower.includes("cancelled")) return "#DC2626";
      if (lower.includes("completed")) return "#16A34A";
      if (lower.includes("progress")) return "#2563EB";
      if (lower.includes("cancelled")) return "#DC2626";

      return "#D4A63A";
    }

    function priorityBadge(priority) {
      const lower = String(priority || "normal").toLowerCase();

      if (lower.includes("urgent") || lower.includes("high")) {
        return `<span class="ungani-badge red">${UnganiClientShared.safe(UnganiAnalytics.toTitle(priority))}</span>`;
      }

      if (lower.includes("low")) {
        return `<span class="ungani-badge blue">Low</span>`;
      }

      return `<span class="ungani-badge gold">Normal</span>`;
    }

    function hasValues(rows) {
      return (rows || []).some(function (row) {
        return Number(row.value || 0) > 0;
      });
    }

    function renderSectionSwitcher() {
      if (sectionOptions.length <= 1) return "";

      const pills = [{ label: "All Sections", value: "" }].concat(
        sectionOptions.map(function (label) { return { label: label, value: label }; })
      );

      return `
        <div class="ungani-button-row" style="margin-top:10px;">
          ${pills.map(function (pill) {
            const active = currentSectionFilter === pill.value;
            return `<button class="ungani-btn ${active ? "gold" : "dark"}" type="button" onclick="switchSection('${UnganiClientShared.attr(pill.value)}')">${UnganiClientShared.safe(pill.label)}</button>`;
          }).join("")}
        </div>
      `;
    }

    function switchSection(value) {
      const url = new URL(window.location.href);

      if (value) {
        url.searchParams.set("section", value);
      } else {
        url.searchParams.delete("section");
      }

      window.location.href = url.toString();
    }
  </script>
</body>
</html>
