<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Admin Documents</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin-shared.js"></script>

  <style>
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 24px var(--ungani-shadow);
    }

    .metric-card h3 {
      margin: 0 0 8px;
      color: var(--ungani-muted);
      font-size: 14px;
    }

    .metric-card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
      color: var(--ungani-text);
    }

    .metric-card .note {
      margin-top: 8px;
      color: var(--ungani-muted);
      font-size: 12px;
    }

    .metric-card.green {
      border-left-color: var(--ungani-green);
    }

    .metric-card.red {
      border-left-color: var(--ungani-red);
    }

    .metric-card.orange {
      border-left-color: var(--ungani-orange);
    }

    .metric-card.blue {
      border-left-color: var(--ungani-blue);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .form-grid-full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 8px 0 6px;
      font-size: 14px;
      color: var(--ungani-text);
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--ungani-border);
      border-radius: 12px;
      background: var(--ungani-card);
      color: var(--ungani-text);
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .row-card {
      background: var(--ungani-bg);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .row-title {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 6px;
      color: var(--ungani-text);
    }

    .row-detail {
      color: var(--ungani-muted);
      margin: 5px 0;
      line-height: 1.45;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      background: #061C3D;
      color: #FFFFFF;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      text-transform: capitalize;
    }

    .badge.green {
      background: var(--ungani-green);
    }

    .badge.red {
      background: var(--ungani-red);
    }

    .badge.orange {
      background: var(--ungani-orange);
    }

    .badge.blue {
      background: var(--ungani-blue);
    }

    .badge.gold {
      background: var(--ungani-gold);
      color: #061C3D;
    }

    .empty {
      text-align: center;
      padding: 28px;
      background: var(--ungani-bg);
      border: 1px dashed var(--ungani-border);
      border-radius: 18px;
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--ungani-text);
    }

    .empty p {
      margin: 0;
      color: var(--ungani-muted);
    }

    .two-col {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
    }

    .section-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-title-row h2 {
      margin: 0;
    }

    .small-text {
      color: var(--ungani-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 950px) {
      .two-col {
        grid-template-columns: 1fr;
      }
    }

    .category-tiles {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .category-tile {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 5px solid var(--tile-accent, var(--ungani-gold));
      border-radius: 18px;
      padding: 14px 16px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: 0.18s ease;
    }

    .category-tile:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px var(--ungani-shadow);
    }

    .category-tile.active {
      box-shadow: 0 0 0 2px var(--tile-accent, var(--ungani-gold));
    }

    .category-tile .tile-count {
      display: block;
      font-size: 26px;
      font-weight: 900;
      color: var(--ungani-text);
    }

    .category-tile .tile-label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--ungani-muted);
      margin-top: 4px;
    }

    .stat-banner {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-green);
      border-radius: 20px;
      padding: 16px 18px;
      margin-bottom: 18px;
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
    }

    .stat-banner strong {
      font-size: 24px;
      color: var(--ungani-text);
    }

    .stat-banner span {
      color: var(--ungani-muted);
      font-size: 13px;
    }

    .ungani-table-wrap {
      overflow-x: auto;
    }

    .ungani-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 680px;
    }

    .ungani-table thead th {
      text-align: left;
      padding: 10px 12px;
      color: var(--ungani-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--ungani-border);
      white-space: nowrap;
    }

    .ungani-table tbody tr {
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .ungani-table tbody tr:hover {
      background: rgba(212, 166, 58, 0.08);
    }

    .ungani-table td {
      padding: 12px;
      border-bottom: 1px solid var(--ungani-border);
      vertical-align: middle;
    }

    .ungani-table td:first-child {
      border-left: 4px solid var(--accent, #64748B);
      font-weight: bold;
      color: var(--ungani-text);
    }

    .ungani-table .row-sub {
      display: block;
      font-weight: normal;
      color: var(--ungani-muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .ungani-table .row-actions {
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
      justify-content: flex-end;
    }

    .ungani-table .row-actions .ungani-btn {
      padding: 7px 10px;
      font-size: 12px;
    }

    .modal-form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
    }

    .modal-form-grid-full {
      grid-column: 1 / -1;
    }

    .nudge-empty h3 {
      margin: 0 0 6px;
      color: var(--ungani-text);
      font-size: 15px;
    }

    .nudge-empty p {
      margin: 0 auto;
      max-width: 340px;
      font-size: 13px;
    }

    .nudge-icon {
      font-size: 32px;
      display: inline-block;
      margin-bottom: 8px;
      animation: unganiNudgeFloat 6s ease-in-out infinite;
    }

    @keyframes unganiNudgeFloat {
      0%, 12% { opacity: 0.5; transform: translateY(0); }
      22% { opacity: 1; transform: translateY(-6px); }
      32%, 100% { opacity: 0.5; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .nudge-icon {
        animation: none;
        opacity: 0.85;
      }
    }
  </style>
</head>

<body>
  <div id="adminRoot"></div>

  <script>
    let supabaseClient = null;
    let currentAdmin = null;
    let tenants = [];
    let documentsData = [];
    let editingDocumentId = null;

    const pageMainHtml = `
      <section class="ungani-card ungani-hero-card">
        <div style="position: relative; z-index: 1;">
          <h2>Admin Documents Center</h2>
          <p>
            View and manage client Google Drive folders, document links, expiry dates, and external file records from one admin page.
          </p>
          <div style="margin-top: 16px;">
            <a class="ungani-btn" href="admin-home.html">Admin Home</a>
            <a class="ungani-btn green" href="admin.html">Main Admin</a>
            <a class="ungani-btn blue" href="admin-reports.html">Reports</a>
          </div>
        </div>
      </section>

      <div class="stat-banner no-print" id="driveConnectedBanner">
        <strong>Loading...</strong>
        <span>Clients with a Google Drive folder connected</span>
      </div>

      <section class="category-tiles" id="categoryTiles">
        <div class="empty"><h3>Loading categories...</h3><p>Please wait.</p></div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>Client Drive Folder</h2>
        </div>

        <label for="driveTenantSelect">Select Client</label>
        <select id="driveTenantSelect" onchange="loadSelectedTenantDrive()">
          <option value="">Loading clients...</option>
        </select>

        <label for="driveFolderUrl">Google Drive Folder URL</label>
        <input id="driveFolderUrl" placeholder="https://drive.google.com/..." />

        <label for="driveNotes">Drive Notes</label>
        <textarea id="driveNotes" placeholder="Optional notes about this client's Drive folder"></textarea>

        <div class="button-row">
          <button class="ungani-btn green" onclick="saveDriveFolder()">Save Drive Folder</button>
          <button class="ungani-btn dark" onclick="openSelectedDriveFolder()">Open Folder</button>
        </div>

        <p class="small-text">
          This saves the main Google Drive folder link to the selected client profile.
        </p>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>All Client Documents</h2>
          <div class="button-row" style="margin-top: 0;">
            <button class="ungani-btn gold" onclick="openDocumentModal(null)">+ Add Document</button>
            <button class="ungani-btn" onclick="loadPageData()">Refresh</button>
          </div>
        </div>

        <div class="form-grid">
          <div>
            <label for="filterClient">Filter Client</label>
            <select id="filterClient" onchange="renderDocuments()">
              <option value="">All Clients</option>
            </select>
          </div>

          <div>
            <label for="filterSource">Filter Source</label>
            <select id="filterSource" onchange="renderDocuments()">
              <option value="">All Sources</option>
              <option value="google_drive">Google Drive</option>
              <option value="external_link">External Link</option>
              <option value="manual">Manual</option>
            </select>
          </div>

          <div>
            <label for="searchBox">Search</label>
            <input id="searchBox" placeholder="Search documents (any category)..." oninput="renderDocuments()" />
          </div>
        </div>

        <div class="ungani-table-wrap" style="margin-top: 18px;">
          <table class="ungani-table">
            <thead>
              <tr>
                <th>Document</th>
                <th>Client</th>
                <th>Source</th>
                <th>Expiry</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="documentsList">
              <tr><td colspan="5"><div class="empty"><h3>Loading documents...</h3><p>Please wait.</p></div></td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>Client Drive Folders</h2>
        </div>

        <div class="ungani-table-wrap">
          <table class="ungani-table">
            <thead>
              <tr>
                <th>Client</th>
                <th>Drive Folder</th>
                <th>Notes</th>
                <th>Connected</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="driveFoldersList">
              <tr><td colspan="5"><div class="empty"><h3>Loading drive folders...</h3><p>Please wait.</p></div></td></tr>
            </tbody>
          </table>
        </div>
      </section>
    `;

    window.addEventListener("load", function () {
      UnganiAdminShared.renderShell("adminRoot", {
        activeKey: "admin-documents",
        pageTitle: "Admin Documents",
        pageSubtitle: "Manage client documents and Google Drive links.",
        footerTitle: "Admin Documents",
        footerVersion: "Admin Documents Version: Step 280 Shared Session Added",
        mainHtml: pageMainHtml
      });

      UnganiAdminShared.requireAdmin({
        onNoSession: function () {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiLoginShell").classList.remove("hidden");
        },
        onBlocked: function (reason) {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiBlockedShell").classList.remove("hidden");
          document.getElementById("unganiBlockedReason").innerText = reason;
        },
        onReady: async function (admin, client) {
          currentAdmin = admin;
          supabaseClient = client;

          UnganiAdminShared.renderSidebar("adminSidebar", {
            activeKey: "admin-documents",
            adminName: admin.full_name || "Admin Workspace",
            footerTitle: "Admin Documents",
            footerVersion: "Admin Documents Version: Step 280 Shared Session Added"
          });

          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiAppShell").classList.remove("hidden");

          await loadPageData();
        }
      });
    });

    function safe(value) {
      return UnganiAdminShared.safe(value);
    }

    function cleanText(value) {
      return UnganiAdminShared.cleanText(value);
    }

    function emptyStateNudge(icon, title, message) {
      return `
        <div class="empty nudge-empty">
          <div class="nudge-icon" aria-hidden="true">${icon}</div>
          <h3>${safe(title)}</h3>
          <p>${safe(message)}</p>
        </div>
      `;
    }

    function todayDate() {
      return new Date().toISOString().slice(0, 10);
    }

    function dateInDays(days) {
      const dateObj = new Date();
      dateObj.setDate(dateObj.getDate() + days);
      return dateObj.toISOString().slice(0, 10);
    }

    function getField(row, names, fallback = "") {
      for (const name of names) {
        if (row && row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return fallback;
    }

    function getTenantName(row) {
      return getField(row, ["company_name", "business_name", "name"], "Client Business");
    }

    function getTenantNameById(tenantId) {
      const tenant = tenants.find(row => String(row.id) === String(tenantId));
      return tenant ? getTenantName(tenant) : "Unknown Client";
    }

    function getDocumentTitle(row) {
      return getField(row, ["document_title", "file_name", "title"], "Untitled Document");
    }

    function getDocumentUrl(row) {
      return getField(row, ["google_drive_url", "document_url", "external_file_url", "file_url"], "");
    }

    function formatDate(value) {
      if (!value) return "N/A";
      const dateObj = new Date(value);
      if (isNaN(dateObj.getTime())) return "N/A";
      return dateObj.toLocaleDateString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function isExpired(row) {
      return row.expiry_date && String(row.expiry_date) < todayDate();
    }

    function isExpiringSoon(row) {
      return row.expiry_date &&
        String(row.expiry_date) >= todayDate() &&
        String(row.expiry_date) <= dateInDays(30);
    }

    function getDocumentStatus(row) {
      if (isExpired(row)) return "expired";
      if (isExpiringSoon(row)) return "expiring";
      return "valid";
    }

    function getDocumentStatusBadge(row) {
      const status = getDocumentStatus(row);

      if (status === "expired") {
        return `<span class="badge red">Expired</span>`;
      }

      if (status === "expiring") {
        return `<span class="badge orange">Expiring Soon</span>`;
      }

      return `<span class="badge green">Valid</span>`;
    }

    async function safeSelect(tableName) {
      try {
        const { data, error } = await supabaseClient
          .from(tableName)
          .select("*")
          .limit(10000);

        if (error) {
          console.log(tableName, error.message);
          return [];
        }

        return data || [];
      } catch (error) {
        console.log(tableName, error.message);
        return [];
      }
    }

    async function loadPageData() {
      UnganiAdminShared.showToast("Loading documents...");

      const [tenantRows, documentRows] = await Promise.all([
        safeSelect("tenants"),
        safeSelect("documents")
      ]);

      tenants = tenantRows;
      documentsData = documentRows.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));

      fillClientSelects();
      renderCategoryTiles();
      renderDriveConnectedBanner();
      renderDocuments();
      renderDriveFolders();

      UnganiAdminShared.showToast("Documents updated ✓");
    }

    function fillClientSelects() {
      const options = tenants
        .map(row => `<option value="${safe(row.id)}">${safe(getTenantName(row))}</option>`)
        .join("");

      document.getElementById("driveTenantSelect").innerHTML = `<option value="">Select Client</option>${options}`;
      document.getElementById("filterClient").innerHTML = `<option value="">All Clients</option>${options}`;
    }

    let activeDocCategory = "all";

    const DOC_CATEGORIES = [
      { key: "all", label: "All Documents", accent: "#D4A63A", match: () => true },
      { key: "valid", label: "Valid", accent: "#15803D", match: row => getDocumentStatus(row) === "valid" },
      { key: "expiring", label: "Expiring Soon", accent: "#C77700", match: row => getDocumentStatus(row) === "expiring" },
      { key: "expired", label: "Expired", accent: "#B91C1C", match: row => getDocumentStatus(row) === "expired" }
    ];

    function baseFilteredDocuments() {
      const clientFilter = document.getElementById("filterClient").value;
      const sourceFilter = document.getElementById("filterSource").value;
      const query = document.getElementById("searchBox").value.toLowerCase().trim();

      let rows = [...documentsData];

      if (clientFilter) {
        rows = rows.filter(row => String(row.tenant_id) === String(clientFilter));
      }

      if (sourceFilter) {
        rows = rows.filter(row => String(row.document_source || "").toLowerCase() === sourceFilter);
      }

      if (query) {
        rows = rows.filter(row => {
          const haystack = [
            getDocumentTitle(row),
            getTenantNameById(row.tenant_id),
            row.document_source,
            row.file_type,
            row.file_size_label,
            row.google_drive_url,
            row.external_file_url,
            row.document_url
          ].join(" ").toLowerCase();

          return haystack.includes(query);
        });
      }

      return rows;
    }

    function filteredDocuments() {
      const rows = baseFilteredDocuments();
      const category = DOC_CATEGORIES.find(c => c.key === activeDocCategory) || DOC_CATEGORIES[0];

      return rows.filter(category.match);
    }

    function selectDocCategory(key) {
      activeDocCategory = key;
      renderDocuments();
    }

    function renderCategoryTiles() {
      const rows = baseFilteredDocuments();

      document.getElementById("categoryTiles").innerHTML = DOC_CATEGORIES.map(category => {
        const count = rows.filter(category.match).length;
        const isActive = category.key === activeDocCategory;

        return `
          <button type="button" class="category-tile${isActive ? " active" : ""}" style="--tile-accent:${category.accent};" onclick="selectDocCategory('${category.key}')">
            <span class="tile-count">${safe(count)}</span>
            <span class="tile-label">${safe(category.label)}</span>
          </button>
        `;
      }).join("");
    }

    function renderDriveConnectedBanner() {
      const clientsWithDrive = tenants.filter(row => row.google_drive_folder_url).length;
      const banner = document.getElementById("driveConnectedBanner");

      banner.innerHTML = `
        <strong>${safe(clientsWithDrive)} of ${safe(tenants.length)}</strong>
        <span>clients have a Google Drive folder connected</span>
      `;
    }

    let lastRenderedDocuments = [];

    function renderDocuments() {
      renderCategoryTiles();

      const rows = filteredDocuments();
      lastRenderedDocuments = rows;

      if (rows.length === 0) {
        document.getElementById("documentsList").innerHTML =
          '<tr><td colspan="5">' +
          emptyStateNudge("🗂️", "No documents found", "Try changing the category, filters, or add a new document link with the button above.") +
          '</td></tr>';
        return;
      }

      const sourceIcon = { google_drive: "📁", external_link: "🔗", manual: "📄" };

      document.getElementById("documentsList").innerHTML = rows.map((row, index) => {
        const title = getDocumentTitle(row);
        const clientName = getTenantNameById(row.tenant_id);
        const source = row.document_source || "manual";
        const status = getDocumentStatus(row);
        const accentMap = { valid: "#15803D", expiring: "#C77700", expired: "#B91C1C" };

        return `
          <tr style="--accent:${accentMap[status]};" onclick="openDocumentModal(${index})">
            <td>${sourceIcon[source] || "📄"} ${safe(title)}<span class="row-sub">${safe(row.file_type || "")}</span></td>
            <td>${safe(clientName)}</td>
            <td>${safe(cleanText(source))}</td>
            <td>${safe(formatDate(row.expiry_date))}</td>
            <td>${getDocumentStatusBadge(row)}</td>
          </tr>
        `;
      }).join("");
    }

    function renderDriveFolders() {
      const rows = tenants.filter(row => row.google_drive_folder_url || row.shared_drive_notes);

      if (rows.length === 0) {
        document.getElementById("driveFoldersList").innerHTML =
          '<tr><td colspan="5">' +
          emptyStateNudge("📁", "No client Drive folders saved yet", "Save a client Google Drive folder above to see it here.") +
          '</td></tr>';
        return;
      }

      document.getElementById("driveFoldersList").innerHTML = rows.map(row => `
        <tr style="--accent:#15803D;" onclick="selectDriveTenant('${safe(row.id)}')">
          <td>${safe(getTenantName(row))}</td>
          <td>${safe(row.google_drive_folder_url || "N/A")}</td>
          <td>${safe(row.shared_drive_notes || "N/A")}</td>
          <td>${safe(formatDate(row.drive_connected_at))}</td>
          <td onclick="event.stopPropagation();">
            ${row.google_drive_folder_url ? `<button class="ungani-btn blue" style="padding:7px 10px;font-size:12px;" onclick="openUrl('${safe(row.google_drive_folder_url)}')">Open</button>` : ""}
          </td>
        </tr>
      `).join("");
    }

    function loadSelectedTenantDrive() {
      const tenantId = document.getElementById("driveTenantSelect").value;
      const tenant = tenants.find(row => String(row.id) === String(tenantId));

      document.getElementById("driveFolderUrl").value = tenant?.google_drive_folder_url || "";
      document.getElementById("driveNotes").value = tenant?.shared_drive_notes || "";
    }

    function selectDriveTenant(tenantId) {
      document.getElementById("driveTenantSelect").value = tenantId;
      loadSelectedTenantDrive();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function openSelectedDriveFolder() {
      const url = document.getElementById("driveFolderUrl").value.trim();

      if (!url) {
        alert("No Drive folder URL saved in the form.");
        return;
      }

      openUrl(url);
    }

    function openUrl(url) {
      if (!url) return;
      window.open(url, "_blank", "noopener,noreferrer");
    }

    async function saveDriveFolder() {
      const tenantId = document.getElementById("driveTenantSelect").value;
      const folderUrl = document.getElementById("driveFolderUrl").value.trim();
      const notes = document.getElementById("driveNotes").value.trim();

      if (!tenantId) {
        alert("Please select a client first.");
        return;
      }

      const { error } = await supabaseClient
        .from("tenants")
        .update({
          google_drive_folder_url: folderUrl || null,
          shared_drive_notes: notes || null,
          drive_connected_at: folderUrl ? new Date().toISOString() : null,
          updated_at: new Date().toISOString()
        })
        .eq("id", tenantId);

      if (error) {
        alert(error.message);
        return;
      }

      UnganiAdminShared.showToast("Drive folder saved ✓");
      await loadPageData();

      document.getElementById("driveTenantSelect").value = tenantId;
      loadSelectedTenantDrive();
    }

    function openDocumentModal(index) {
      const row = index === null || index === undefined ? null : lastRenderedDocuments[index];
      editingDocumentId = row ? row.id : null;

      const bodyHtml = `
        <div class="modal-form-grid">
          <div>
            <label for="documentTenantId">Client</label>
            <select id="documentTenantId">
              <option value="">Select Client</option>
              ${tenants.map(t => `<option value="${safe(t.id)}">${safe(getTenantName(t))}</option>`).join("")}
            </select>
          </div>

          <div>
            <label for="documentTitle">Document Title</label>
            <input id="documentTitle" placeholder="Example: KRA PIN Certificate" value="${row ? safe(getDocumentTitle(row)) : ""}" />
          </div>

          <div>
            <label for="documentSource">Document Source</label>
            <select id="documentSource">
              <option value="google_drive">Google Drive</option>
              <option value="external_link">External Link</option>
              <option value="manual">Manual Record</option>
            </select>
          </div>

          <div>
            <label for="fileType">File Type</label>
            <input id="fileType" placeholder="PDF, Sheet, Image, Folder..." value="${row ? safe(row.file_type || "") : ""}" />
          </div>

          <div>
            <label for="fileSizeLabel">File Size Label</label>
            <input id="fileSizeLabel" placeholder="Example: 2 MB / Unknown" value="${row ? safe(row.file_size_label || "") : ""}" />
          </div>

          <div>
            <label for="expiryDate">Expiry Date</label>
            <input id="expiryDate" type="date" value="${row ? safe(row.expiry_date || "") : ""}" />
          </div>

          <div class="modal-form-grid-full">
            <label for="googleDriveUrl">Google Drive URL</label>
            <input id="googleDriveUrl" placeholder="https://drive.google.com/..." value="${row ? safe(row.google_drive_url || "") : ""}" />
          </div>

          <div class="modal-form-grid-full">
            <label for="externalFileUrl">External File URL</label>
            <input id="externalFileUrl" placeholder="https://..." value="${row ? safe(row.external_file_url || row.document_url || "") : ""}" />
          </div>
        </div>

        <div class="button-row">
          <button class="ungani-btn green" onclick="saveDocument()">Save Document</button>
          ${row && getDocumentUrl(row) ? `<button class="ungani-btn blue" onclick="openUrl('${safe(getDocumentUrl(row))}')">Open Link</button>` : ""}
          ${row ? `<button class="ungani-btn red" onclick="deleteDocument('${safe(row.id)}')">Delete</button>` : ""}
        </div>
      `;

      UnganiAdminShared.openModal({
        title: row ? "Edit Document" : "Add Document",
        bodyHtml: bodyHtml,
        onOpen: function () {
          document.getElementById("documentTenantId").value = row ? (row.tenant_id || "") : "";
          document.getElementById("documentSource").value = row ? (row.document_source || "manual") : "google_drive";
        }
      });
    }

    async function saveDocument() {
      const tenantId = document.getElementById("documentTenantId").value;
      const title = document.getElementById("documentTitle").value.trim();
      const source = document.getElementById("documentSource").value;
      const fileType = document.getElementById("fileType").value.trim();
      const sizeLabel = document.getElementById("fileSizeLabel").value.trim();
      const expiryDate = document.getElementById("expiryDate").value;
      const googleDriveUrl = document.getElementById("googleDriveUrl").value.trim();
      const externalFileUrl = document.getElementById("externalFileUrl").value.trim();

      if (!tenantId) {
        alert("Please select a client.");
        return;
      }

      if (!title) {
        alert("Please enter a document title.");
        return;
      }

      const payload = {
        tenant_id: tenantId,
        document_title: title,
        file_name: title,
        document_source: source,
        file_type: fileType || null,
        file_size_label: sizeLabel || null,
        expiry_date: expiryDate || null,
        google_drive_url: googleDriveUrl || null,
        external_file_url: externalFileUrl || null,
        document_url: googleDriveUrl || externalFileUrl || null,
        updated_at: new Date().toISOString()
      };

      let result;

      if (editingDocumentId) {
        result = await supabaseClient
          .from("documents")
          .update(payload)
          .eq("id", editingDocumentId);
      } else {
        result = await supabaseClient
          .from("documents")
          .insert(payload);
      }

      if (result.error) {
        alert(result.error.message);
        return;
      }

      UnganiAdminShared.showToast(editingDocumentId ? "Document updated ✓" : "Document added ✓");

      editingDocumentId = null;
      UnganiAdminShared.closeModal();
      await loadPageData();
    }

    async function deleteDocument(documentId) {
      const confirmed = confirm("Move this document to Recently Deleted? You can restore it within 30 days.");

      if (!confirmed) return;

      let response;

      try {
        response = await supabaseClient.rpc("soft_delete_ungani_record", {
          p_table_name: "documents",
          p_record_id: documentId,
          p_delete_reason: "Deleted from Admin Documents page"
        });
      } catch (error) {
        alert(error.message || "Could not delete document. Please check your connection.");
        return;
      }

      if (response.error) {
        alert(response.error.message);
        return;
      }

      if (response.data && response.data.ok === false) {
        alert(response.data.message || "Could not delete document.");
        return;
      }

      editingDocumentId = null;
      UnganiAdminShared.closeModal();
      UnganiAdminShared.showToast("Document moved to Recently Deleted ✓");
      await loadPageData();
    }
  </script>
</body>
</html>
