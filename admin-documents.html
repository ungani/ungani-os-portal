<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Admin Documents</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin-shared.js"></script>

  <style>
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 24px var(--ungani-shadow);
    }

    .metric-card h3 {
      margin: 0 0 8px;
      color: var(--ungani-muted);
      font-size: 14px;
    }

    .metric-card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
      color: var(--ungani-text);
    }

    .metric-card .note {
      margin-top: 8px;
      color: var(--ungani-muted);
      font-size: 12px;
    }

    .metric-card.green {
      border-left-color: var(--ungani-green);
    }

    .metric-card.red {
      border-left-color: var(--ungani-red);
    }

    .metric-card.orange {
      border-left-color: var(--ungani-orange);
    }

    .metric-card.blue {
      border-left-color: var(--ungani-blue);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .form-grid-full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 8px 0 6px;
      font-size: 14px;
      color: var(--ungani-text);
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--ungani-border);
      border-radius: 12px;
      background: var(--ungani-card);
      color: var(--ungani-text);
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
      background: var(--ungani-gold);
      color: #061C3D;
      text-decoration: none;
      display: inline-block;
    }

    .btn.dark {
      background: #061C3D;
      color: #FFFFFF;
    }

    html[data-ungani-theme="dark"] .btn.dark {
      background: #F5F5F3;
      color: #061C3D;
    }

    .btn.green {
      background: var(--ungani-green);
      color: #FFFFFF;
    }

    .btn.red {
      background: var(--ungani-red);
      color: #FFFFFF;
    }

    .btn.orange {
      background: var(--ungani-orange);
      color: #FFFFFF;
    }

    .btn.blue {
      background: var(--ungani-blue);
      color: #FFFFFF;
    }

    .row-card {
      background: var(--ungani-bg);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .row-title {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 6px;
      color: var(--ungani-text);
    }

    .row-detail {
      color: var(--ungani-muted);
      margin: 5px 0;
      line-height: 1.45;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      background: #061C3D;
      color: #FFFFFF;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      text-transform: capitalize;
    }

    .badge.green {
      background: var(--ungani-green);
    }

    .badge.red {
      background: var(--ungani-red);
    }

    .badge.orange {
      background: var(--ungani-orange);
    }

    .badge.blue {
      background: var(--ungani-blue);
    }

    .badge.gold {
      background: var(--ungani-gold);
      color: #061C3D;
    }

    .empty {
      text-align: center;
      padding: 28px;
      background: var(--ungani-bg);
      border: 1px dashed var(--ungani-border);
      border-radius: 18px;
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--ungani-text);
    }

    .empty p {
      margin: 0;
      color: var(--ungani-muted);
    }

    .two-col {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
    }

    .section-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-title-row h2 {
      margin: 0;
    }

    .small-text {
      color: var(--ungani-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 950px) {
      .two-col {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="adminRoot"></div>

  <script>
    let supabaseClient = null;
    let currentAdmin = null;
    let tenants = [];
    let documentsData = [];
    let editingDocumentId = null;

    const pageMainHtml = `
      <section class="ungani-card ungani-hero-card">
        <div style="position: relative; z-index: 1;">
          <h2>Admin Documents Center</h2>
          <p>
            View and manage client Google Drive folders, document links, expiry dates, and external file records from one admin page.
          </p>
          <div style="margin-top: 16px;">
            <a class="btn" href="admin-home.html">Admin Home</a>
            <a class="btn green" href="admin.html">Main Admin</a>
            <a class="btn blue" href="admin-reports.html">Reports</a>
          </div>
        </div>
      </section>

      <section class="page-grid" id="metricsGrid">
        <div class="metric-card"><h3>Loading</h3><p>...</p><div class="note">Please wait</div></div>
      </section>

      <section class="two-col">
        <div class="ungani-card">
          <div class="section-title-row">
            <h2>Client Drive Folder</h2>
          </div>

          <label for="driveTenantSelect">Select Client</label>
          <select id="driveTenantSelect" onchange="loadSelectedTenantDrive()">
            <option value="">Loading clients...</option>
          </select>

          <label for="driveFolderUrl">Google Drive Folder URL</label>
          <input id="driveFolderUrl" placeholder="https://drive.google.com/..." />

          <label for="driveNotes">Drive Notes</label>
          <textarea id="driveNotes" placeholder="Optional notes about this client's Drive folder"></textarea>

          <div class="button-row">
            <button class="btn green" onclick="saveDriveFolder()">Save Drive Folder</button>
            <button class="btn dark" onclick="openSelectedDriveFolder()">Open Folder</button>
          </div>

          <p class="small-text">
            This saves the main Google Drive folder link to the selected client profile.
          </p>
        </div>

        <div class="ungani-card">
          <div class="section-title-row">
            <h2 id="documentFormTitle">Add Document Link</h2>
          </div>

          <div class="form-grid">
            <div>
              <label for="documentTenantId">Client</label>
              <select id="documentTenantId">
                <option value="">Loading clients...</option>
              </select>
            </div>

            <div>
              <label for="documentTitle">Document Title</label>
              <input id="documentTitle" placeholder="Example: KRA PIN Certificate" />
            </div>

            <div>
              <label for="documentSource">Document Source</label>
              <select id="documentSource">
                <option value="google_drive">Google Drive</option>
                <option value="external_link">External Link</option>
                <option value="manual">Manual Record</option>
              </select>
            </div>

            <div>
              <label for="fileType">File Type</label>
              <input id="fileType" placeholder="PDF, Sheet, Image, Folder..." />
            </div>

            <div>
              <label for="fileSizeLabel">File Size Label</label>
              <input id="fileSizeLabel" placeholder="Example: 2 MB / Unknown" />
            </div>

            <div>
              <label for="expiryDate">Expiry Date</label>
              <input id="expiryDate" type="date" />
            </div>

            <div class="form-grid-full">
              <label for="googleDriveUrl">Google Drive URL</label>
              <input id="googleDriveUrl" placeholder="https://drive.google.com/..." />
            </div>

            <div class="form-grid-full">
              <label for="externalFileUrl">External File URL</label>
              <input id="externalFileUrl" placeholder="https://..." />
            </div>
          </div>

          <div class="button-row">
            <button class="btn green" onclick="saveDocument()">Save Document</button>
            <button class="btn dark" onclick="resetDocumentForm()">Clear Form</button>
          </div>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>All Client Documents</h2>
          <button class="btn" onclick="loadPageData()">Refresh</button>
        </div>

        <div class="form-grid">
          <div>
            <label for="filterClient">Filter Client</label>
            <select id="filterClient" onchange="renderDocuments()">
              <option value="">All Clients</option>
            </select>
          </div>

          <div>
            <label for="filterSource">Filter Source</label>
            <select id="filterSource" onchange="renderDocuments()">
              <option value="">All Sources</option>
              <option value="google_drive">Google Drive</option>
              <option value="external_link">External Link</option>
              <option value="manual">Manual</option>
            </select>
          </div>

          <div>
            <label for="filterStatus">Filter Status</label>
            <select id="filterStatus" onchange="renderDocuments()">
              <option value="">All Status</option>
              <option value="valid">Valid / No Expiry</option>
              <option value="expiring">Expiring Soon</option>
              <option value="expired">Expired</option>
            </select>
          </div>

          <div>
            <label for="searchBox">Search</label>
            <input id="searchBox" placeholder="Search documents..." oninput="renderDocuments()" />
          </div>
        </div>

        <div id="documentsList" style="margin-top: 18px;">
          <div class="empty">
            <h3>Loading documents...</h3>
            <p>Please wait.</p>
          </div>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>Client Drive Folders</h2>
        </div>

        <div id="driveFoldersList">
          <div class="empty">
            <h3>Loading drive folders...</h3>
            <p>Please wait.</p>
          </div>
        </div>
      </section>
    `;

    window.addEventListener("load", function () {
      UnganiAdminShared.renderShell("adminRoot", {
        activeKey: "admin-documents",
        pageTitle: "Admin Documents",
        pageSubtitle: "Manage client documents and Google Drive links.",
        footerTitle: "Admin Documents",
        footerVersion: "Admin Documents Version: Step 280 Shared Session Added",
        mainHtml: pageMainHtml
      });

      UnganiAdminShared.requireAdmin({
        onNoSession: function () {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiLoginShell").classList.remove("hidden");
        },
        onBlocked: function (reason) {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiBlockedShell").classList.remove("hidden");
          document.getElementById("unganiBlockedReason").innerText = reason;
        },
        onReady: async function (admin, client) {
          currentAdmin = admin;
          supabaseClient = client;

          UnganiAdminShared.renderSidebar("adminSidebar", {
            activeKey: "admin-documents",
            adminName: admin.full_name || "Admin Workspace",
            footerTitle: "Admin Documents",
            footerVersion: "Admin Documents Version: Step 280 Shared Session Added"
          });

          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiAppShell").classList.remove("hidden");

          await loadPageData();
        }
      });
    });

    function safe(value) {
      return UnganiAdminShared.safe(value);
    }

    function cleanText(value) {
      return UnganiAdminShared.cleanText(value);
    }

    function todayDate() {
      return new Date().toISOString().slice(0, 10);
    }

    function dateInDays(days) {
      const dateObj = new Date();
      dateObj.setDate(dateObj.getDate() + days);
      return dateObj.toISOString().slice(0, 10);
    }

    function getField(row, names, fallback = "") {
      for (const name of names) {
        if (row && row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return fallback;
    }

    function getTenantName(row) {
      return getField(row, ["company_name", "business_name", "name"], "Client Business");
    }

    function getTenantNameById(tenantId) {
      const tenant = tenants.find(row => String(row.id) === String(tenantId));
      return tenant ? getTenantName(tenant) : "Unknown Client";
    }

    function getDocumentTitle(row) {
      return getField(row, ["document_title", "file_name", "title"], "Untitled Document");
    }

    function getDocumentUrl(row) {
      return getField(row, ["google_drive_url", "document_url", "external_file_url", "file_url"], "");
    }

    function formatDate(value) {
      if (!value) return "N/A";
      const dateObj = new Date(value);
      if (isNaN(dateObj.getTime())) return "N/A";
      return dateObj.toLocaleDateString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function isExpired(row) {
      return row.expiry_date && String(row.expiry_date) < todayDate();
    }

    function isExpiringSoon(row) {
      return row.expiry_date &&
        String(row.expiry_date) >= todayDate() &&
        String(row.expiry_date) <= dateInDays(30);
    }

    function getDocumentStatus(row) {
      if (isExpired(row)) return "expired";
      if (isExpiringSoon(row)) return "expiring";
      return "valid";
    }

    function getDocumentStatusBadge(row) {
      const status = getDocumentStatus(row);

      if (status === "expired") {
        return `<span class="badge red">Expired</span>`;
      }

      if (status === "expiring") {
        return `<span class="badge orange">Expiring Soon</span>`;
      }

      return `<span class="badge green">Valid</span>`;
    }

    async function safeSelect(tableName) {
      try {
        const { data, error } = await supabaseClient
          .from(tableName)
          .select("*")
          .limit(10000);

        if (error) {
          console.log(tableName, error.message);
          return [];
        }

        return data || [];
      } catch (error) {
        console.log(tableName, error.message);
        return [];
      }
    }

    async function loadPageData() {
      UnganiAdminShared.showToast("Loading documents...");

      const [tenantRows, documentRows] = await Promise.all([
        safeSelect("tenants"),
        safeSelect("documents")
      ]);

      tenants = tenantRows;
      documentsData = documentRows.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));

      fillClientSelects();
      renderMetrics();
      renderDocuments();
      renderDriveFolders();

      UnganiAdminShared.showToast("Documents updated ✓");
    }

    function fillClientSelects() {
      const options = tenants
        .map(row => `<option value="${safe(row.id)}">${safe(getTenantName(row))}</option>`)
        .join("");

      document.getElementById("driveTenantSelect").innerHTML = `<option value="">Select Client</option>${options}`;
      document.getElementById("documentTenantId").innerHTML = `<option value="">Select Client</option>${options}`;
      document.getElementById("filterClient").innerHTML = `<option value="">All Clients</option>${options}`;
    }

    function renderMetrics() {
      const total = documentsData.length;
      const driveDocs = documentsData.filter(row => row.google_drive_url || row.document_source === "google_drive").length;
      const externalDocs = documentsData.filter(row => row.external_file_url || row.document_source === "external_link").length;
      const expiring = documentsData.filter(isExpiringSoon).length;
      const expired = documentsData.filter(isExpired).length;
      const clientsWithDrive = tenants.filter(row => row.google_drive_folder_url).length;

      const metrics = [
        { title: "Total Documents", value: total, note: "All client document records", cls: "blue" },
        { title: "Google Drive Links", value: driveDocs, note: "Documents linked to Google Drive", cls: "green" },
        { title: "External Links", value: externalDocs, note: "External document links", cls: "blue" },
        { title: "Expiring Soon", value: expiring, note: "Expiry within 30 days", cls: expiring > 0 ? "orange" : "green" },
        { title: "Expired", value: expired, note: "Expired document records", cls: expired > 0 ? "red" : "green" },
        { title: "Clients With Drive", value: clientsWithDrive, note: "Clients with Drive folder saved", cls: "green" }
      ];

      document.getElementById("metricsGrid").innerHTML = metrics.map(item => `
        <div class="metric-card ${safe(item.cls)}">
          <h3>${safe(item.title)}</h3>
          <p>${safe(item.value)}</p>
          <div class="note">${safe(item.note)}</div>
        </div>
      `).join("");
    }

    function renderDocuments() {
      const clientFilter = document.getElementById("filterClient").value;
      const sourceFilter = document.getElementById("filterSource").value;
      const statusFilter = document.getElementById("filterStatus").value;
      const query = document.getElementById("searchBox").value.toLowerCase().trim();

      let rows = [...documentsData];

      if (clientFilter) {
        rows = rows.filter(row => String(row.tenant_id) === String(clientFilter));
      }

      if (sourceFilter) {
        rows = rows.filter(row => String(row.document_source || "").toLowerCase() === sourceFilter);
      }

      if (statusFilter) {
        rows = rows.filter(row => getDocumentStatus(row) === statusFilter);
      }

      if (query) {
        rows = rows.filter(row => {
          const haystack = [
            getDocumentTitle(row),
            getTenantNameById(row.tenant_id),
            row.document_source,
            row.file_type,
            row.file_size_label,
            row.google_drive_url,
            row.external_file_url,
            row.document_url
          ].join(" ").toLowerCase();

          return haystack.includes(query);
        });
      }

      if (rows.length === 0) {
        document.getElementById("documentsList").innerHTML = `
          <div class="empty">
            <h3>No documents found</h3>
            <p>Try changing the filters or add a new document link.</p>
          </div>
        `;
        return;
      }

      document.getElementById("documentsList").innerHTML = rows.map(row => {
        const title = getDocumentTitle(row);
        const clientName = getTenantNameById(row.tenant_id);
        const url = getDocumentUrl(row);
        const source = row.document_source || "manual";

        return `
          <div class="row-card">
            <div class="row-title">${safe(title)}</div>
            <p class="row-detail"><strong>Client:</strong> ${safe(clientName)}</p>
            <p class="row-detail"><strong>Source:</strong> ${safe(cleanText(source))}</p>
            <p class="row-detail"><strong>File Type:</strong> ${safe(row.file_type || "N/A")}</p>
            <p class="row-detail"><strong>Size:</strong> ${safe(row.file_size_label || "N/A")}</p>
            <p class="row-detail"><strong>Expiry:</strong> ${safe(formatDate(row.expiry_date))}</p>
            <p class="row-detail"><strong>Link:</strong> ${url ? safe(url) : "No link saved"}</p>

            <span class="badge blue">${safe(cleanText(source))}</span>
            ${getDocumentStatusBadge(row)}

            <div class="button-row">
              ${url ? `<button class="btn blue" onclick="openUrl('${safe(url)}')">Open Link</button>` : ""}
              <button class="btn" onclick="editDocument('${safe(row.id)}')">Edit</button>
              <button class="btn red" onclick="deleteDocument('${safe(row.id)}')">Delete</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderDriveFolders() {
      const rows = tenants.filter(row => row.google_drive_folder_url || row.shared_drive_notes);

      if (rows.length === 0) {
        document.getElementById("driveFoldersList").innerHTML = `
          <div class="empty">
            <h3>No client Drive folders saved yet</h3>
            <p>Save a client Google Drive folder to see it here.</p>
          </div>
        `;
        return;
      }

      document.getElementById("driveFoldersList").innerHTML = rows.map(row => `
        <div class="row-card">
          <div class="row-title">${safe(getTenantName(row))}</div>
          <p class="row-detail"><strong>Drive Folder:</strong> ${safe(row.google_drive_folder_url || "N/A")}</p>
          <p class="row-detail"><strong>Notes:</strong> ${safe(row.shared_drive_notes || "N/A")}</p>
          <p class="row-detail"><strong>Connected:</strong> ${safe(formatDate(row.drive_connected_at))}</p>
          <span class="badge green">Drive Saved</span>
          <div class="button-row">
            ${row.google_drive_folder_url ? `<button class="btn blue" onclick="openUrl('${safe(row.google_drive_folder_url)}')">Open Folder</button>` : ""}
            <button class="btn" onclick="selectDriveTenant('${safe(row.id)}')">Edit Folder</button>
          </div>
        </div>
      `).join("");
    }

    function loadSelectedTenantDrive() {
      const tenantId = document.getElementById("driveTenantSelect").value;
      const tenant = tenants.find(row => String(row.id) === String(tenantId));

      document.getElementById("driveFolderUrl").value = tenant?.google_drive_folder_url || "";
      document.getElementById("driveNotes").value = tenant?.shared_drive_notes || "";
    }

    function selectDriveTenant(tenantId) {
      document.getElementById("driveTenantSelect").value = tenantId;
      loadSelectedTenantDrive();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function openSelectedDriveFolder() {
      const url = document.getElementById("driveFolderUrl").value.trim();

      if (!url) {
        alert("No Drive folder URL saved in the form.");
        return;
      }

      openUrl(url);
    }

    function openUrl(url) {
      if (!url) return;
      window.open(url, "_blank", "noopener,noreferrer");
    }

    async function saveDriveFolder() {
      const tenantId = document.getElementById("driveTenantSelect").value;
      const folderUrl = document.getElementById("driveFolderUrl").value.trim();
      const notes = document.getElementById("driveNotes").value.trim();

      if (!tenantId) {
        alert("Please select a client first.");
        return;
      }

      const { error } = await supabaseClient
        .from("tenants")
        .update({
          google_drive_folder_url: folderUrl || null,
          shared_drive_notes: notes || null,
          drive_connected_at: folderUrl ? new Date().toISOString() : null,
          updated_at: new Date().toISOString()
        })
        .eq("id", tenantId);

      if (error) {
        alert(error.message);
        return;
      }

      UnganiAdminShared.showToast("Drive folder saved ✓");
      await loadPageData();

      document.getElementById("driveTenantSelect").value = tenantId;
      loadSelectedTenantDrive();
    }

    async function saveDocument() {
      const tenantId = document.getElementById("documentTenantId").value;
      const title = document.getElementById("documentTitle").value.trim();
      const source = document.getElementById("documentSource").value;
      const fileType = document.getElementById("fileType").value.trim();
      const sizeLabel = document.getElementById("fileSizeLabel").value.trim();
      const expiryDate = document.getElementById("expiryDate").value;
      const googleDriveUrl = document.getElementById("googleDriveUrl").value.trim();
      const externalFileUrl = document.getElementById("externalFileUrl").value.trim();

      if (!tenantId) {
        alert("Please select a client.");
        return;
      }

      if (!title) {
        alert("Please enter a document title.");
        return;
      }

      const payload = {
        tenant_id: tenantId,
        document_title: title,
        file_name: title,
        document_source: source,
        file_type: fileType || null,
        file_size_label: sizeLabel || null,
        expiry_date: expiryDate || null,
        google_drive_url: googleDriveUrl || null,
        external_file_url: externalFileUrl || null,
        document_url: googleDriveUrl || externalFileUrl || null,
        updated_at: new Date().toISOString()
      };

      let result;

      if (editingDocumentId) {
        result = await supabaseClient
          .from("documents")
          .update(payload)
          .eq("id", editingDocumentId);
      } else {
        result = await supabaseClient
          .from("documents")
          .insert(payload);
      }

      if (result.error) {
        alert(result.error.message);
        return;
      }

      UnganiAdminShared.showToast(editingDocumentId ? "Document updated ✓" : "Document added ✓");

      resetDocumentForm();
      await loadPageData();
    }

    function editDocument(documentId) {
      const row = documentsData.find(item => String(item.id) === String(documentId));

      if (!row) {
        alert("Document not found.");
        return;
      }

      editingDocumentId = row.id;

      document.getElementById("documentFormTitle").innerText = "Edit Document Link";
      document.getElementById("documentTenantId").value = row.tenant_id || "";
      document.getElementById("documentTitle").value = getDocumentTitle(row);
      document.getElementById("documentSource").value = row.document_source || "manual";
      document.getElementById("fileType").value = row.file_type || "";
      document.getElementById("fileSizeLabel").value = row.file_size_label || "";
      document.getElementById("expiryDate").value = row.expiry_date || "";
      document.getElementById("googleDriveUrl").value = row.google_drive_url || "";
      document.getElementById("externalFileUrl").value = row.external_file_url || row.document_url || "";

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function resetDocumentForm() {
      editingDocumentId = null;

      document.getElementById("documentFormTitle").innerText = "Add Document Link";
      document.getElementById("documentTenantId").value = "";
      document.getElementById("documentTitle").value = "";
      document.getElementById("documentSource").value = "google_drive";
      document.getElementById("fileType").value = "";
      document.getElementById("fileSizeLabel").value = "";
      document.getElementById("expiryDate").value = "";
      document.getElementById("googleDriveUrl").value = "";
      document.getElementById("externalFileUrl").value = "";
    }

    async function deleteDocument(documentId) {
      const confirmed = confirm("Move this document to Recently Deleted? You can restore it within 30 days.");

      if (!confirmed) return;

      let response;

      try {
        response = await supabaseClient.rpc("soft_delete_ungani_record", {
          p_table_name: "documents",
          p_record_id: documentId,
          p_delete_reason: "Deleted from Admin Documents page"
        });
      } catch (error) {
        alert(error.message || "Could not delete document. Please check your connection.");
        return;
      }

      if (response.error) {
        alert(response.error.message);
        return;
      }

      if (response.data && response.data.ok === false) {
        alert(response.data.message || "Could not delete document.");
        return;
      }

      UnganiAdminShared.showToast("Document moved to Recently Deleted ✓");
      await loadPageData();
    }
  </script>
</body>
</html>
