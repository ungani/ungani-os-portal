<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Recently Deleted</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-shared.js"></script>
</head>

<body>
  <script>
    let currentContext = null;
    let deletedRows = [];
    let currentFilter = "";

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "recently-deleted",
        pageTitle: "Recently Deleted",
        pageSubtitle: "Restore records that were safely deleted from your workspace.",
        onReady: startRecentlyDeletedPage
      });
    });

    async function startRecentlyDeletedPage(context) {
      currentContext = context;

      const titleEl = document.querySelector(".ungani-topbar h2");
      const subEl = document.querySelector(".ungani-topbar p");

      if (titleEl) {
        titleEl.innerText = "Recently Deleted";
      }

      if (subEl) {
        subEl.innerText = "Restore safely deleted records, including money, tasks, items, documents, people, support, records, and calendar events.";
      }

      await loadRecentlyDeleted();
    }

    async function loadRecentlyDeleted() {
  currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading recently deleted records...");

  try {
    const response = await currentContext.supabaseClient
      .from("ungani_recently_deleted")
      .select("id, tenant_id, source_table, source_record_id, record_title, record_subtitle, delete_reason, deleted_by, deleted_at, status, created_at")
      .eq("tenant_id", currentContext.tenantId)
      .eq("status", "deleted")
      .in("source_table", [
        "tasks",
        "business_items",
        "business_records",
        "documents",
        "support_issues",
        "client_people",
        "business_events",
        "transactions"
      ])
      .order("deleted_at", { ascending: false, nullsFirst: false })
      .order("created_at", { ascending: false });

    if (response.error) {
      UnganiClientShared.setContent(
        UnganiClientShared.errorCard("Could not load Recently Deleted", response.error.message)
      );
      return;
    }

    deletedRows = response.data || [];
    renderRecentlyDeletedPage();
  } catch (error) {
    UnganiClientShared.setContent(
      UnganiClientShared.errorCard("Could not load Recently Deleted", error.message)
    );
  }
}

    function renderRecentlyDeletedPage() {
      const filteredRows = getFilteredDeletedRows();
      const summary = calculateDeletedSummary();

      UnganiClientShared.setContent(`
        <style>
          .deleted-hero-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
            gap: 18px;
            align-items: stretch;
          }

          .deleted-guide-box {
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.09);
            border-radius: 24px;
            padding: 18px;
          }

          .deleted-guide-box h3 {
            color: white;
            margin: 0 0 8px;
          }

          .deleted-guide-box p {
            color: rgba(255,255,255,0.74);
            margin: 0;
            line-height: 1.55;
          }

          .deleted-kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 18px;
          }

          .deleted-kpi-card {
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            background: var(--ungani-card);
            border: 1px solid var(--ungani-border);
            box-shadow: var(--ungani-shadow);
            padding: 20px;
            min-height: 135px;
            cursor: pointer;
            transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
          }

          .deleted-kpi-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--ungani-shadow-hover);
            border-color: rgba(212,166,58,0.55);
          }

          .deleted-kpi-card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 18px;
            bottom: 18px;
            width: 5px;
            border-radius: 0 999px 999px 0;
            background: var(--accent);
          }

          .deleted-kpi-card span {
            color: var(--ungani-muted);
            font-size: 12px;
            font-weight: 950;
            text-transform: uppercase;
            letter-spacing: 0.055em;
          }

          .deleted-kpi-card h3 {
            margin: 17px 0 8px;
            font-size: clamp(25px, 3vw, 36px);
            line-height: 1;
            letter-spacing: -0.055em;
            overflow-wrap: anywhere;
          }

          .deleted-kpi-card p {
            margin: 0;
            color: var(--ungani-muted);
            font-size: 13px;
          }

          .deleted-filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
          }

          .deleted-filter-pill {
            border: 1px solid var(--ungani-border);
            background: var(--ungani-soft);
            color: var(--ungani-text);
            border-radius: 999px;
            padding: 9px 12px;
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
          }

          .deleted-filter-pill.active,
          .deleted-filter-pill:hover {
            border-color: rgba(212,166,58,0.7);
            background: rgba(212,166,58,0.14);
          }

          .deleted-list-grid {
            display: grid;
            gap: 12px;
          }

          .deleted-record-card {
            box-shadow: none;
            cursor: pointer;
            transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
          }

          .deleted-record-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--ungani-shadow-hover);
            border-color: rgba(212,166,58,0.55);
          }

          .deleted-record-main {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 14px;
            align-items: start;
          }

          .deleted-record-title {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 6px;
          }

          .deleted-record-title h3 {
            margin: 0;
            font-size: 17px;
          }

          .deleted-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
          }

          .deleted-meta span {
            border-radius: 999px;
            padding: 7px 10px;
            background: var(--ungani-soft);
            border: 1px solid var(--ungani-border);
            color: var(--ungani-muted);
            font-size: 12px;
            font-weight: 850;
          }

          .deleted-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
          }

          @media (max-width: 1180px) {
            .deleted-hero-grid {
              grid-template-columns: 1fr;
            }

            .deleted-kpi-grid {
              grid-template-columns: repeat(2, minmax(0, 1fr));
            }
          }

          @media (max-width: 720px) {
            .deleted-kpi-grid {
              grid-template-columns: 1fr;
            }

            .deleted-record-main {
              grid-template-columns: 1fr;
            }

            .deleted-actions {
              justify-content: flex-start;
            }
          }
        </style>

        <section class="ungani-card ungani-hero">
          <div class="deleted-hero-grid">
            <div>
              <span class="ungani-badge gold">Safe Delete</span>
              <h2 style="font-size:clamp(32px,4vw,52px);line-height:1.02;margin:18px 0 12px;">
                Restore deleted records before they are needed again.
              </h2>
              <p>
                UNGANI moves records here instead of permanently deleting them. This helps protect client data and reduce accidental loss.
              </p>

              <div class="ungani-button-row">
                <button class="ungani-btn gold" onclick="loadRecentlyDeleted()">Refresh</button>
                <a class="ungani-btn light" href="client.html">Back to Dashboard</a>
              </div>
            </div>

            <div class="deleted-guide-box">
              <h3>What can be restored?</h3>
              <p>Money records, tasks, items/assets, business records, documents, support issues, people/leads, and calendar events.</p>
            </div>
          </div>
        </section>

        <section class="deleted-kpi-grid">
          ${deletedKpi("All Deleted", summary.total, "All safely deleted records", "#D4A63A", "")}
          ${deletedKpi("Money Records", summary.money, "Deleted income / expense records", "#16A34A", "transactions")}
          ${deletedKpi("Work Records", summary.work, "Tasks, records, documents, events", "#061C3D", "work")}
          ${deletedKpi("People & Support", summary.peopleSupport, "People, leads, support issues", "#DC2626", "people_support")}
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>Filters</h3>
              <p class="ungani-small">Choose the deleted record type you want to review.</p>
            </div>

            <button class="ungani-btn dark" onclick="setDeletedFilter('')">Reset</button>
          </div>

          <div class="deleted-filter-row">
            ${filterPill("All", "")}
            ${filterPill("Money", "transactions")}
            ${filterPill("Tasks", "tasks")}
            ${filterPill("Items / Assets", "business_items")}
            ${filterPill("Records", "business_records")}
            ${filterPill("Documents", "documents")}
            ${filterPill("Support", "support_issues")}
            ${filterPill("People", "client_people")}
            ${filterPill("Calendar", "business_events")}
          </div>
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>Deleted Records</h3>
              <p class="ungani-small">${filteredRows.length} record(s) shown.</p>
            </div>

            <button class="ungani-btn green" onclick="loadRecentlyDeleted()">Refresh</button>
          </div>

          ${renderDeletedRows(filteredRows)}
        </section>

        <p class="ungani-small">
          Recently Deleted Version: Step 28D Money Restore View · ungani.com · info@ungani.com
        </p>
      `);
    }

    function calculateDeletedSummary() {
      const summary = {
        total: deletedRows.length,
        money: 0,
        work: 0,
        peopleSupport: 0
      };

      deletedRows.forEach(function (row) {
        const table = normalizeTable(row.source_table);

        if (table === "transactions") {
          summary.money += 1;
        } else if (["tasks", "business_items", "business_records", "documents", "business_events"].includes(table)) {
          summary.work += 1;
        } else if (["client_people", "support_issues"].includes(table)) {
          summary.peopleSupport += 1;
        }
      });

      return summary;
    }

    function deletedKpi(title, value, subtitle, accent, filterValue) {
      return `
        <div class="deleted-kpi-card" style="--accent:${UnganiClientShared.attr(accent)};" onclick="setDeletedFilter('${UnganiClientShared.attr(filterValue)}')">
          <span>${UnganiClientShared.safe(title)}</span>
          <h3>${UnganiClientShared.safe(String(value || 0))}</h3>
          <p>${UnganiClientShared.safe(subtitle)}</p>
        </div>
      `;
    }

    function filterPill(label, value) {
      const active = String(currentFilter || "") === String(value || "");

      return `
        <button class="deleted-filter-pill ${active ? "active" : ""}" onclick="setDeletedFilter('${UnganiClientShared.attr(value)}')">
          ${UnganiClientShared.safe(label)}
        </button>
      `;
    }

    function setDeletedFilter(value) {
      currentFilter = value || "";
      renderRecentlyDeletedPage();
    }

    function getFilteredDeletedRows() {
      if (!currentFilter) {
        return deletedRows;
      }

      if (currentFilter === "work") {
        return deletedRows.filter(function (row) {
          return ["tasks", "business_items", "business_records", "documents", "business_events"].includes(normalizeTable(row.source_table));
        });
      }

      if (currentFilter === "people_support") {
        return deletedRows.filter(function (row) {
          return ["client_people", "support_issues"].includes(normalizeTable(row.source_table));
        });
      }

      return deletedRows.filter(function (row) {
        return normalizeTable(row.source_table) === currentFilter;
      });
    }

    function renderDeletedRows(rows) {
      if (!rows || rows.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No deleted records found</h3>
            <p>Deleted records will appear here after they are moved to Recently Deleted.</p>
          </div>
        `;
      }

      return `
        <div class="deleted-list-grid">
          ${rows.map(function (row) {
            return renderDeletedCard(row);
          }).join("")}
        </div>
      `;
    }

    function renderDeletedCard(row) {
      const table = normalizeTable(row.source_table);
      const typeInfo = getTableInfo(table);
      const title = row.record_title || typeInfo.label;
      const subtitle = row.record_subtitle || "Deleted record";
      const deletedAt = row.deleted_at || row.created_at;
      const reason = row.delete_reason || "No reason provided";
      const href = typeInfo.href;

      return `
        <div class="ungani-card deleted-record-card" onclick="openDeletedSource('${UnganiClientShared.attr(href)}')">
          <div class="deleted-record-main">
            <div>
              <div class="deleted-record-title">
                <span class="ungani-badge ${typeInfo.color}">${UnganiClientShared.safe(typeInfo.icon + " " + typeInfo.label)}</span>
                <h3>${UnganiClientShared.safe(title)}</h3>
              </div>

              <p class="ungani-small">${UnganiClientShared.safe(subtitle)}</p>

              <div class="deleted-meta">
                <span>Deleted: ${UnganiClientShared.safe(UnganiClientShared.formatDate(deletedAt))}</span>
                <span>Reason: ${UnganiClientShared.safe(reason)}</span>
                <span>Source: ${UnganiClientShared.safe(typeInfo.label)}</span>
              </div>
            </div>

            <div class="deleted-actions">
              <button class="ungani-btn small gold" onclick="event.stopPropagation(); restoreDeletedRecord('${UnganiClientShared.attr(row.id)}')">
                Restore
              </button>
              <a class="ungani-btn small dark" href="${UnganiClientShared.attr(href)}" onclick="event.stopPropagation();">
                Open Section
              </a>
            </div>
          </div>
        </div>
      `;
    }

    function getTableInfo(table) {
      const map = {
        transactions: {
          label: "Money Record",
          icon: "💰",
          color: "green",
          href: "my-money.html"
        },
        tasks: {
          label: "Task",
          icon: "✅",
          color: "gold",
          href: "my-tasks.html"
        },
        business_items: {
          label: "Item / Asset",
          icon: "🏷️",
          color: "gold",
          href: "my-items.html"
        },
        business_records: {
          label: "Business Record",
          icon: "📑",
          color: "gold",
          href: "my-records.html"
        },
        documents: {
          label: "Document",
          icon: "📄",
          color: "gold",
          href: "my-documents.html"
        },
        support_issues: {
          label: "Support Issue",
          icon: "🛟",
          color: "red",
          href: "my-support.html"
        },
        client_people: {
          label: "Person / Lead",
          icon: "👥",
          color: "gold",
          href: "my-people.html"
        },
        business_events: {
          label: "Calendar Event",
          icon: "📅",
          color: "gold",
          href: "my-calendar.html"
        }
      };

      return map[table] || {
        label: "Deleted Record",
        icon: "◆",
        color: "gold",
        href: "client.html"
      };
    }

    function normalizeTable(value) {
      return String(value || "").trim().toLowerCase();
    }

    function openDeletedSource(href) {
      if (!href) return;
      window.location.href = href;
    }

    async function restoreDeletedRecord(id) {
      if (
        window.UnganiClientShared &&
        typeof UnganiClientShared.ensureCanWrite === "function" &&
        !UnganiClientShared.ensureCanWrite("restore deleted record")
      ) {
        return;
      }

      const confirmed = confirm("Restore this deleted record?");

      if (!confirmed) return;

      try {
        const response = await currentContext.supabaseClient.rpc("restore_ungani_deleted_record", {
          p_recently_deleted_id: id
        });

        if (response.error) {
          UnganiClientShared.showToast("Could not restore record: " + response.error.message);
          return;
        }

        const result = response.data || {};

        if (result.ok === false) {
          UnganiClientShared.showToast(result.message || "Could not restore record.");
          return;
        }

        UnganiClientShared.showToast(result.message || "Record restored successfully ✓");
        await loadRecentlyDeleted();
      } catch (error) {
        UnganiClientShared.showToast("Could not restore record: " + error.message);
      }
    }
  </script>
</body>
</html>
