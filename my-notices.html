<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Notices</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-shared.js" onerror="window.__unganiClientSharedFailed = true;"></script>
  <script>
    (function () {
      function showUnganiLoadError() {
        if (typeof UnganiClientShared !== "undefined") return;

        var banner = document.createElement("div");
        banner.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99999;background:#B91C1C;color:#fff;padding:12px 16px;font:14px/1.4 -apple-system,sans-serif;text-align:center;";
        banner.innerHTML = "Some page resources failed to load. Please check your connection. " +
          "<button style=\"margin-left:10px;padding:4px 12px;border:none;border-radius:6px;background:#fff;color:#B91C1C;font-weight:700;cursor:pointer;\" onclick=\"window.location.reload()\">Reload</button>";

        if (document.body) {
          document.body.prepend(banner);
        } else {
          document.addEventListener("DOMContentLoaded", function () {
            document.body.prepend(banner);
          });
        }
      }

      if (window.__unganiClientSharedFailed) {
        showUnganiLoadError();
      } else {
        setTimeout(function () {
          if (typeof UnganiClientShared === "undefined") showUnganiLoadError();
        }, 4000);
      }
    })();
  </script>
</head>

<body>
  <script>
    let currentContext = null;
    let notices = [];

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "notices",
        pageTitle: "Notices",
        pageSubtitle: "View UNGANI updates, client notices, system messages, reminders, and important announcements.",
        onReady: startNoticesPage
      });
    });

    async function startNoticesPage(context) {
      currentContext = context;
      await loadNotices();
    }

    async function loadNotices() {
      currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading notices...");

      let clientResponse;
      let systemResponse;

      try {
        clientResponse = await currentContext.supabaseClient
          .from("client_notices")
          .select("*")
          .eq("tenant_id", currentContext.tenantId)
          .order("created_at", { ascending: false });

        systemResponse = await currentContext.supabaseClient
          .from("system_notices")
          .select("*")
          .or("tenant_id.is.null,tenant_id.eq." + currentContext.tenantId)
          .in("status", ["active", "published", "open"])
          .order("created_at", { ascending: false });
      } catch (error) {
        currentContext.contentEl.innerHTML = UnganiClientShared.errorCard("Could not load notices", error.message || "Network error. Please check your connection.");
        return;
      }

      if (clientResponse.error) {
        currentContext.contentEl.innerHTML = UnganiClientShared.errorCard("Could not load client notices", clientResponse.error.message);
        return;
      }

      if (systemResponse.error) {
        console.warn("System notices warning:", systemResponse.error.message);
      }

      const clientNotices = (clientResponse.data || []).map(function (item) {
        item.notice_source = "client";
        return item;
      });

      const systemNotices = (systemResponse.data || []).map(function (item) {
        item.notice_source = "system";
        return item;
      });

      notices = clientNotices.concat(systemNotices).sort(function (a, b) {
        return new Date(UnganiClientShared.getValue(b, ["created_at"], "")) - new Date(UnganiClientShared.getValue(a, ["created_at"], ""));
      });

      renderNoticesPage();
    }

    function renderNoticesPage() {
      const filtered = filterNotices();
      const summary = calculateSummary();

      UnganiClientShared.setContent(`
        <section class="ungani-card ungani-hero">
          <h2>Notices & Updates</h2>
          <p>
            View important updates from UNGANI, system announcements, reminders, client-specific notices, and action items.
          </p>

          <div class="ungani-button-row">
            <button class="ungani-btn" onclick="loadNotices()">Refresh Notices</button>
            <button class="ungani-btn green" onclick="markAllClientNoticesRead()">Mark Client Notices Read</button>
            <a class="ungani-btn dark" href="my-support.html">Support</a>
          </div>
        </section>

        <section class="ungani-grid">
          ${UnganiClientShared.metricCard("Total Notices", notices.length, "All available notices", "blue")}
          ${UnganiClientShared.metricCard("Unread", summary.unread, "Not yet marked as read", summary.unread > 0 ? "orange" : "green")}
          ${UnganiClientShared.metricCard("High / Urgent", summary.highUrgent, "Important notices", summary.highUrgent > 0 ? "red" : "green")}
          ${UnganiClientShared.metricCard("System Notices", summary.system, "General UNGANI notices", "gold")}
          ${UnganiClientShared.metricCard("Client Notices", summary.client, "Notices for this business", "blue")}
          ${UnganiClientShared.metricCard("With Action Links", summary.actionLinks, "Notices with links", "green")}
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <h3>Filters</h3>
            <button class="ungani-btn dark" onclick="resetFilters()">Reset Filters</button>
          </div>

          <div class="ungani-form-grid">
            <div>
              <label for="filterSource">Notice Source</label>
              <select id="filterSource" onchange="saveFilters(); renderNoticesPage();">
                <option value="">All Sources</option>
                <option value="client">Client Notices</option>
                <option value="system">System Notices</option>
              </select>
            </div>

            <div>
              <label for="filterType">Notice Type</label>
              <select id="filterType" onchange="saveFilters(); renderNoticesPage();">
                <option value="">All Types</option>
                <option value="general">General</option>
                <option value="system_update">System Update</option>
                <option value="account">Account</option>
                <option value="billing">Billing</option>
                <option value="support">Support</option>
                <option value="reminder">Reminder</option>
                <option value="demo">Demo</option>
                <option value="announcement">Announcement</option>
              </select>
            </div>

            <div>
              <label for="filterStatus">Status</label>
              <select id="filterStatus" onchange="saveFilters(); renderNoticesPage();">
                <option value="">All Statuses</option>
                <option value="unread">Unread</option>
                <option value="read">Read</option>
                <option value="active">Active</option>
                <option value="published">Published</option>
                <option value="open">Open</option>
              </select>
            </div>

            <div>
              <label for="filterPriority">Priority</label>
              <select id="filterPriority" onchange="saveFilters(); renderNoticesPage();">
                <option value="">All Priorities</option>
                <option value="low">Low</option>
                <option value="normal">Normal</option>
                <option value="high">High</option>
                <option value="urgent">Urgent</option>
              </select>
            </div>

            <div>
              <label for="searchBox">Search</label>
              <input id="searchBox" placeholder="Search title, message, description..." oninput="saveFilters(); renderNoticesPage();" />
            </div>
          </div>
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <div>
                <h3>Notice List</h3>
                <p class="ungani-small">${filtered.length} notice(s) shown</p>
              </div>

              <button class="ungani-btn green" onclick="loadNotices()">Refresh</button>
            </div>

            ${renderNoticeList(filtered)}
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Notice Guidance</h3>
            </div>

            <div class="ungani-card" style="box-shadow:none;margin-bottom:10px;">
              <strong>Client Notices</strong>
              <p class="ungani-small">These are messages or reminders directed to this business account.</p>
            </div>

            <div class="ungani-card" style="box-shadow:none;margin-bottom:10px;">
              <strong>System Notices</strong>
              <p class="ungani-small">These are general UNGANI updates, announcements, or system messages.</p>
            </div>

            <div class="ungani-card" style="box-shadow:none;">
              <strong>Need help?</strong>
              <p class="ungani-small">Use Support or Chat with UNGANI if a notice needs action or explanation.</p>
              <div class="ungani-button-row">
                <a class="ungani-btn" href="my-support.html">Support</a>
                <a class="ungani-btn green" href="my-chat.html">Chat</a>
              </div>
            </div>
          </div>
        </section>

        <p class="ungani-small">
          Notices Version: Step 307B Shared Layout · ungani.com · info@ungani.com
        </p>
      `);

      restoreFilters();
    }

    function renderNoticeList(rows) {
      if (rows.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No notices found</h3>
            <p>Notices, reminders, and updates will appear here.</p>
          </div>
        `;
      }

      return rows.map(function (row) {
        return renderNoticeCard(row);
      }).join("");
    }

    function renderNoticeCard(row) {
      const title = UnganiClientShared.getValue(row, ["notice_title", "title"], "Notice");
      const type = UnganiClientShared.getValue(row, ["notice_type"], "general");
      const status = UnganiClientShared.getValue(row, ["status"], "active");
      const priority = UnganiClientShared.getValue(row, ["priority"], "normal");
      const source = UnganiClientShared.getValue(row, ["notice_source"], "client");
      const message = UnganiClientShared.getValue(row, ["message", "description"], "");
      const description = UnganiClientShared.getValue(row, ["description"], "");
      const actionUrl = UnganiClientShared.getValue(row, ["action_url"], "");
      const created = UnganiClientShared.getValue(row, ["created_at"], "");
      const readAt = UnganiClientShared.getValue(row, ["read_at"], "");

      return `
        <div class="ungani-card" style="box-shadow:none;">
          <div class="ungani-section-title">
            <div>
              <h3>${UnganiClientShared.safe(title)}</h3>
              <p class="ungani-small">
                ${UnganiClientShared.safe(source === "system" ? "System Notice" : "Client Notice")}
                · ${UnganiClientShared.safe(UnganiClientShared.formatDate(created))}
                ${readAt ? " · Read: " + UnganiClientShared.safe(UnganiClientShared.formatDate(readAt)) : ""}
              </p>
            </div>

            <div>
              ${badge(source, source === "system" ? "gold" : "blue")}
              ${badge(type, "blue")}
              ${badge(priority, priorityColor(priority))}
              ${badge(status, statusColor(status))}
            </div>
          </div>

          ${message ? `<p class="ungani-small"><strong>Message:</strong> ${UnganiClientShared.safe(message)}</p>` : ""}
          ${description && description !== message ? `<p class="ungani-small"><strong>Description:</strong> ${UnganiClientShared.safe(description)}</p>` : ""}

          <div class="ungani-button-row">
            ${actionUrl ? `<a class="ungani-btn green" href="${UnganiClientShared.attr(actionUrl)}" target="_blank" rel="noopener">Open Link</a>` : ""}
            ${source === "client" && status !== "read" ? `<button class="ungani-btn" onclick="markRead('${UnganiClientShared.attr(row.id)}')">Mark Read</button>` : ""}
            ${source === "client" && status === "read" ? `<button class="ungani-btn orange" onclick="markUnread('${UnganiClientShared.attr(row.id)}')">Mark Unread</button>` : ""}
          </div>
        </div>
      `;
    }

    function calculateSummary() {
      let unread = 0;
      let highUrgent = 0;
      let system = 0;
      let client = 0;
      let actionLinks = 0;

      notices.forEach(function (row) {
        const status = String(UnganiClientShared.getValue(row, ["status"], "")).toLowerCase();
        const priority = String(UnganiClientShared.getValue(row, ["priority"], "")).toLowerCase();
        const source = String(UnganiClientShared.getValue(row, ["notice_source"], "")).toLowerCase();
        const actionUrl = UnganiClientShared.getValue(row, ["action_url"], "");

        if (status === "unread" || status === "open") unread++;
        if (priority === "high" || priority === "urgent") highUrgent++;
        if (source === "system") system++;
        if (source === "client") client++;
        if (actionUrl) actionLinks++;
      });

      return { unread, highUrgent, system, client, actionLinks };
    }

    function filterNotices() {
      const filterSource = document.getElementById("filterSource") ? UnganiClientShared.value("filterSource").toLowerCase() : "";
      const filterType = document.getElementById("filterType") ? UnganiClientShared.value("filterType").toLowerCase() : "";
      const filterStatus = document.getElementById("filterStatus") ? UnganiClientShared.value("filterStatus").toLowerCase() : "";
      const filterPriority = document.getElementById("filterPriority") ? UnganiClientShared.value("filterPriority").toLowerCase() : "";
      const query = document.getElementById("searchBox") ? UnganiClientShared.value("searchBox").toLowerCase() : "";

      return notices.filter(function (row) {
        const source = String(UnganiClientShared.getValue(row, ["notice_source"], "")).toLowerCase();
        const type = String(UnganiClientShared.getValue(row, ["notice_type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "")).toLowerCase();
        const priority = String(UnganiClientShared.getValue(row, ["priority"], "")).toLowerCase();

        const haystack = [
          UnganiClientShared.getValue(row, ["notice_title", "title"], ""),
          source,
          type,
          status,
          priority,
          UnganiClientShared.getValue(row, ["message"], ""),
          UnganiClientShared.getValue(row, ["description"], "")
        ].join(" ").toLowerCase();

        if (filterSource && source !== filterSource) return false;
        if (filterType && type !== filterType) return false;
        if (filterStatus && status !== filterStatus) return false;
        if (filterPriority && priority !== filterPriority) return false;
        if (query && !haystack.includes(query)) return false;

        return true;
      });
    }

    async function markRead(id) {
      let response;

      try {
        response = await currentContext.supabaseClient
          .from("client_notices")
          .update({
            status: "read",
            read_at: new Date().toISOString(),
            updated_at: new Date().toISOString()
          })
          .eq("id", id)
          .eq("tenant_id", currentContext.tenantId);
      } catch (error) {
        alert(error.message || "Could not update notice. Please check your connection.");
        return;
      }

      if (response.error) {
        alert(response.error.message);
        return;
      }

      UnganiClientShared.showToast("Notice marked as read ✓");
      await loadNotices();
    }

    async function markUnread(id) {
      let response;

      try {
        response = await currentContext.supabaseClient
          .from("client_notices")
          .update({
            status: "unread",
            read_at: null,
            updated_at: new Date().toISOString()
          })
          .eq("id", id)
          .eq("tenant_id", currentContext.tenantId);
      } catch (error) {
        alert(error.message || "Could not update notice. Please check your connection.");
        return;
      }

      if (response.error) {
        alert(response.error.message);
        return;
      }

      UnganiClientShared.showToast("Notice marked as unread ✓");
      await loadNotices();
    }

    async function markAllClientNoticesRead() {
      let response;

      try {
        response = await currentContext.supabaseClient
          .from("client_notices")
          .update({
            status: "read",
            read_at: new Date().toISOString(),
            updated_at: new Date().toISOString()
          })
          .eq("tenant_id", currentContext.tenantId)
          .neq("status", "read");
      } catch (error) {
        alert(error.message || "Could not update notices. Please check your connection.");
        return;
      }

      if (response.error) {
        alert(response.error.message);
        return;
      }

      UnganiClientShared.showToast("Client notices marked as read ✓");
      await loadNotices();
    }

    function restoreFilters() {
      if (document.getElementById("filterSource")) document.getElementById("filterSource").value = sessionStorage.getItem("ungani_notices_filter_source") || "";
      if (document.getElementById("filterType")) document.getElementById("filterType").value = sessionStorage.getItem("ungani_notices_filter_type") || "";
      if (document.getElementById("filterStatus")) document.getElementById("filterStatus").value = sessionStorage.getItem("ungani_notices_filter_status") || "";
      if (document.getElementById("filterPriority")) document.getElementById("filterPriority").value = sessionStorage.getItem("ungani_notices_filter_priority") || "";
      if (document.getElementById("searchBox")) document.getElementById("searchBox").value = sessionStorage.getItem("ungani_notices_search") || "";
    }

    function saveFilters() {
      if (document.getElementById("filterSource")) sessionStorage.setItem("ungani_notices_filter_source", UnganiClientShared.value("filterSource"));
      if (document.getElementById("filterType")) sessionStorage.setItem("ungani_notices_filter_type", UnganiClientShared.value("filterType"));
      if (document.getElementById("filterStatus")) sessionStorage.setItem("ungani_notices_filter_status", UnganiClientShared.value("filterStatus"));
      if (document.getElementById("filterPriority")) sessionStorage.setItem("ungani_notices_filter_priority", UnganiClientShared.value("filterPriority"));
      if (document.getElementById("searchBox")) sessionStorage.setItem("ungani_notices_search", UnganiClientShared.value("searchBox"));
    }

    function resetFilters() {
      sessionStorage.removeItem("ungani_notices_filter_source");
      sessionStorage.removeItem("ungani_notices_filter_type");
      sessionStorage.removeItem("ungani_notices_filter_status");
      sessionStorage.removeItem("ungani_notices_filter_priority");
      sessionStorage.removeItem("ungani_notices_search");
      renderNoticesPage();
      UnganiClientShared.showToast("Notice filters reset ✓");
    }

    function badge(text, color) {
      return `<span class="ungani-badge ${UnganiClientShared.attr(color || "blue")}">${UnganiClientShared.safe(text)}</span>`;
    }

    function statusColor(status) {
      const lower = String(status || "").toLowerCase();

      if (lower.includes("read") || lower.includes("active") || lower.includes("published")) return "green";
      if (lower.includes("unread") || lower.includes("open")) return "orange";
      if (lower.includes("expired") || lower.includes("closed")) return "red";

      return "blue";
    }

    function priorityColor(priority) {
      const lower = String(priority || "").toLowerCase();

      if (lower === "urgent" || lower === "high") return "red";
      if (lower === "normal") return "gold";
      if (lower === "low") return "blue";

      return "blue";
    }
  </script>
</body>
</html>
