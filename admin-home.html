<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI Admin Home</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#F5F5F3; }
    .hidden { display:none; }
    .app { display:flex; min-height:100vh; }
    .sidebar { width:260px; background:#061C3D; color:#fff; padding:20px; }
    .sidebar a { display:block; color:#fff; padding:10px; text-decoration:none; }
    .sidebar a:hover { background:#D4A63A; color:#061C3D; }
    .main { flex:1; padding:20px; }
    .topbar { background:#fff; padding:15px; border-radius:10px; margin-bottom:20px; }
    button { padding:10px 14px; margin:5px; cursor:pointer; }
    .card { background:#fff; padding:15px; border-radius:10px; margin-bottom:15px; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginShell">
  <h2>UNGANI Admin Login</h2>
  <input id="adminEmail" placeholder="Email" />
  <input id="adminPassword" type="password" placeholder="Password" />
  <button onclick="loginAdmin()">Login</button>
  <p id="loginMessage"></p>
</div>

<!-- APP -->
<div id="appShell" class="app hidden">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>UNGANI Admin</h3>

    <a href="admin-home.html">🏠 Home</a>
    <a href="admin.html">🧭 Admin</a>
    <a href="admin-chat.html">💬 Chat</a>
    <a href="admin-documents.html">📁 Documents</a>
    <a href="support.html">🛟 Support</a>
    <a href="admin-reports.html">📊 Reports</a>
    <a href="account.html">⚙️ Account</a>

    <button onclick="logoutAdmin()">Logout</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <h2>Admin Dashboard</h2>
      <button onclick="loadAdminProfile()">Refresh</button>
    </div>

    <div class="card">
      <h3>Welcome</h3>
      <p id="adminInfo">Loading...</p>
    </div>

  </div>
</div>

<script>
const SUPABASE_URL = "https://ctmtjwklltnsmfdtvqhl.supabase.co";
const SUPABASE_KEY = "sb_publishable_jkZaWWep-cObTEv_F_kN6g_Ic85";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentAdminId = null;

/* =========================
   SAFE SESSION CHECK (FIXED)
========================= */
async function checkExistingSession() {
  try {
    const { data, error } = await supabaseClient.auth.getSession();

    if (error) {
      console.log("Session error:", error.message);
      return;
    }

    const session = data?.session;

    if (!session || !session.user) {
      console.log("No session found");
      return;
    }

    currentAdminId = session.user.id;
    await loadAdminProfile();

  } catch (err) {
    console.log("Session check failed:", err.message);
  }
}

/* =========================
   LOGIN
========================= */
async function loginAdmin() {
  const email = document.getElementById("adminEmail").value;
  const password = document.getElementById("adminPassword").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    document.getElementById("loginMessage").innerText = error.message;
    return;
  }

  await checkExistingSession();
}

/* =========================
   LOAD PROFILE (FIXED)
========================= */
async function loadAdminProfile() {
  try {

    if (!currentAdminId) {
      const { data } = await supabaseClient.auth.getSession();
      currentAdminId = data?.session?.user?.id;
    }

    if (!currentAdminId) return;

    const { data, error } = await supabaseClient
      .from("users")
      .select("*")
      .eq("id", currentAdminId)
      .single();

    if (error) {
      console.log(error.message);
      return;
    }

    document.getElementById("loginShell").classList.add("hidden");
    document.getElementById("appShell").classList.remove("hidden");

    document.getElementById("adminInfo").innerText =
      data.full_name + " (" + data.email + ")";

  } catch (err) {
    console.log("Profile error:", err.message);
  }
}

/* =========================
   LOGOUT
========================= */
async function logoutAdmin() {
  await supabaseClient.auth.signOut();
  location.reload();
}

/* =========================
   INIT
========================= */
checkExistingSession();

</script>

</body>
</html>
