<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Overview</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-shared.js" onerror="window.__unganiClientSharedFailed = true;"></script>
  <script>
    (function () {
      function showUnganiLoadError() {
        if (typeof UnganiClientShared !== "undefined") return;

        var banner = document.createElement("div");
        banner.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99999;background:#B91C1C;color:#fff;padding:12px 16px;font:14px/1.4 -apple-system,sans-serif;text-align:center;";
        banner.innerHTML = "Some page resources failed to load. Please check your connection. " +
          "<button style=\"margin-left:10px;padding:4px 12px;border:none;border-radius:6px;background:#fff;color:#B91C1C;font-weight:700;cursor:pointer;\" onclick=\"window.location.reload()\">Reload</button>";

        if (document.body) {
          document.body.prepend(banner);
        } else {
          document.addEventListener("DOMContentLoaded", function () {
            document.body.prepend(banner);
          });
        }
      }

      if (window.__unganiClientSharedFailed) {
        showUnganiLoadError();
      } else {
        setTimeout(function () {
          if (typeof UnganiClientShared === "undefined") showUnganiLoadError();
        }, 4000);
      }
    })();
  </script>
</head>

<body>
  <script>
    let currentContext = null;
    let isRealEstate = false;

    let overviewData = {
      transactions: [],
      items: [],
      people: [],
      records: [],
      tasks: [],
      documents: [],
      events: [],
      support: [],
      chatMessages: [],
      teamMessages: []
    };

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "overview",
        pageTitle: "Overview",
        pageSubtitle: "A simple business summary across money, records, tasks, people, items, documents, calendar, and support.",
        onReady: startOverviewPage
      });
    });

    async function startOverviewPage(context) {
      currentContext = context;

      const businessType = String(UnganiClientShared.getValue(context.tenant, ["business_type", "business_type_key"], "")).toLowerCase();
      const businessTypeKey = String(UnganiClientShared.getValue(context.tenant, ["business_type_key"], "")).toLowerCase();

      isRealEstate = businessType.includes("real estate") || businessTypeKey.includes("real_estate");

      const titleEl = document.querySelector(".ungani-topbar h2");
      const subEl = document.querySelector(".ungani-topbar p");

      if (titleEl) {
        titleEl.innerText = isRealEstate ? "Property Operations Overview" : "Business Overview";
      }

      if (subEl) {
        subEl.innerText = isRealEstate
          ? "A clean summary of properties, money records, agents, leads, records, tasks, documents, calendar activities, and support."
          : "A clean summary of your business money records, people, tasks, items, documents, records, calendar activities, and support.";
      }

      await loadOverviewData();
    }

    async function loadOverviewData() {
      currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading overview...");

      const responses = await Promise.all([
        safeSelect("transactions"),
        safeSelect("business_items"),
        safeSelect("client_people"),
        safeSelect("business_records"),
        safeSelect("tasks"),
        safeSelect("documents"),
        safeSelect("business_events"),
        safeSelect("support_issues"),
        safeSelect("admin_client_messages"),
        safeSelect("team_chat_messages")
      ]);

      overviewData.transactions = responses[0];
      overviewData.items = responses[1];
      overviewData.people = responses[2];
      overviewData.records = responses[3];
      overviewData.tasks = responses[4];
      overviewData.documents = responses[5];
      overviewData.events = responses[6];
      overviewData.support = responses[7];
      overviewData.chatMessages = responses[8];
      overviewData.teamMessages = responses[9];

      renderOverviewPage();
    }

    async function safeSelect(tableName) {
      try {
        const response = await currentContext.supabaseClient
          .from(tableName)
          .select("*")
          .eq("tenant_id", currentContext.tenantId)
          .order("created_at", { ascending: false });

        if (response.error) {
          console.warn(tableName, response.error.message);
          return [];
        }

        return response.data || [];
      } catch (error) {
        console.warn(tableName, error.message);
        return [];
      }
    }

    function renderOverviewPage() {
      const tenantName = UnganiClientShared.getTenantName(currentContext.tenant);

      const money = calculateMoney();
      const items = calculateItems();
      const people = calculatePeople();
      const records = calculateRecords();
      const tasks = calculateTasks();
      const documents = calculateDocuments();
      const events = calculateEvents();
      const support = calculateSupport();
      const messages = calculateMessages();

      UnganiClientShared.setContent(`
        <section class="ungani-card ungani-hero">
          <h2>${isRealEstate ? "Property Operations Overview" : "Business Overview"}</h2>
          <p>
            ${isRealEstate
              ? "This overview helps " + UnganiClientShared.safe(tenantName) + " see properties, leads, agents, viewings, tasks, money records, documents, and follow-ups in one place."
              : "This overview helps " + UnganiClientShared.safe(tenantName) + " see business activity, money records, tasks, documents, people, and support in one place."
            }
          </p>

          <div class="ungani-button-row">
            <button class="ungani-btn" onclick="loadOverviewData()">Refresh Overview</button>
            <a class="ungani-btn green" href="reports.html">Open Reports</a>
            <a class="ungani-btn dark" href="client.html">Dashboard</a>
          </div>
        </section>

        <section class="ungani-grid">
          ${UnganiClientShared.metricCard(isRealEstate ? "Properties / Listings" : "Items / Assets", overviewData.items.length, isRealEstate ? items.available + " available · " + items.sold + " sold · " + items.rented + " rented" : items.available + " available", "blue")}
          ${UnganiClientShared.metricCard("Money Balance", UnganiClientShared.formatKES(money.balance), "Income minus expenses", money.balance >= 0 ? "green" : "red")}
          ${UnganiClientShared.metricCard(isRealEstate ? "Agents / Leads / People" : "People", overviewData.people.length, isRealEstate ? people.agents + " agents · " + people.leads + " leads" : people.active + " active", "gold")}
          ${UnganiClientShared.metricCard("Pending Tasks", tasks.pending, tasks.overdue + " overdue", tasks.overdue > 0 ? "red" : "orange")}
          ${UnganiClientShared.metricCard("Documents", overviewData.documents.length, documents.driveLinks + " with links", "blue")}
          ${UnganiClientShared.metricCard("Upcoming Events", events.upcoming, events.today + " today", "green")}
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>${isRealEstate ? "Property / Listing Snapshot" : "Items / Assets Snapshot"}</h3>
              <a class="ungani-btn" href="my-items.html">${isRealEstate ? "Open Properties" : "Open Items"}</a>
            </div>

            ${summaryLine("Total Records", overviewData.items.length)}
            ${summaryLine("Available", items.available)}
            ${summaryLine("Reserved", items.reserved)}
            ${summaryLine("Sold", items.sold)}
            ${summaryLine("Rented", items.rented)}
            ${summaryLine("Maintenance / Repair", items.maintenance)}
            ${summaryLine("Estimated Value", UnganiClientShared.formatKES(items.totalValue))}
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Money Snapshot</h3>
              <a class="ungani-btn green" href="my-money.html">Open Money</a>
            </div>

            ${summaryLine("Income", UnganiClientShared.formatKES(money.income))}
            ${summaryLine("Expenses", UnganiClientShared.formatKES(money.expenses))}
            ${summaryLine("Petty Cash", UnganiClientShared.formatKES(money.pettyCash))}
            ${summaryLine("Pending Amount", UnganiClientShared.formatKES(money.pending))}
            ${summaryLine("Estimated Balance", UnganiClientShared.formatKES(money.balance))}
            <p class="ungani-small">This is operational money tracking, not full accounting.</p>
          </div>
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>${isRealEstate ? "Agents / Leads / People" : "People Snapshot"}</h3>
              <a class="ungani-btn" href="my-people.html">Open People</a>
            </div>

            ${summaryLine("Total People", overviewData.people.length)}
            ${summaryLine("Active", people.active)}
            ${summaryLine("Agents", people.agents)}
            ${summaryLine("Leads", people.leads)}
            ${summaryLine("Buyers / Renters / Tenants", people.buyersRenters)}
            ${summaryLine("Commission This Month", UnganiClientShared.formatKES(people.commission))}
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Tasks / Follow-ups</h3>
              <a class="ungani-btn orange" href="my-tasks.html">Open Tasks</a>
            </div>

            ${summaryLine("Total Tasks", overviewData.tasks.length)}
            ${summaryLine("Pending", tasks.pending)}
            ${summaryLine("In Progress", tasks.inProgress)}
            ${summaryLine("Completed", tasks.completed)}
            ${summaryLine("Overdue", tasks.overdue)}
            ${summaryLine("High / Urgent Priority", tasks.highPriority)}
          </div>
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>${isRealEstate ? "Records / Leads / Viewings" : "Business Records"}</h3>
              <a class="ungani-btn" href="my-records.html">Open Records</a>
            </div>

            ${summaryLine("Total Records", overviewData.records.length)}
            ${summaryLine("Leads / Inquiries", records.leads)}
            ${summaryLine("Viewings / Site Visits", records.viewings)}
            ${summaryLine("Project Updates", records.projects)}
            ${summaryLine("Open / Pending", records.openPending)}
            ${summaryLine("Closed / Completed", records.closed)}
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Calendar Snapshot</h3>
              <a class="ungani-btn green" href="my-calendar.html">Open Calendar</a>
            </div>

            ${summaryLine("Total Events", overviewData.events.length)}
            ${summaryLine("Today", events.today)}
            ${summaryLine("Upcoming", events.upcoming)}
            ${summaryLine("Overdue", events.overdue)}
            ${summaryLine("Viewings / Site Visits", events.viewings)}
            ${summaryLine("Completed", events.completed)}
          </div>
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Documents Snapshot</h3>
              <a class="ungani-btn" href="my-documents.html">Open Documents</a>
            </div>

            ${summaryLine("Total Documents", overviewData.documents.length)}
            ${summaryLine("Agreements", documents.agreements)}
            ${summaryLine("Receipts / Invoices", documents.receiptsInvoices)}
            ${summaryLine("Drive Links", documents.driveLinks)}
            ${summaryLine("Pending / Review", documents.pending)}
            ${summaryLine("Archived", documents.archived)}
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Support & Messages</h3>
              <a class="ungani-btn dark" href="my-support.html">Open Support</a>
            </div>

            ${summaryLine("Open Support Issues", support.open)}
            ${summaryLine("Resolved Support Issues", support.resolved)}
            ${summaryLine("High / Urgent Support", support.urgent)}
            ${summaryLine("Chat with UNGANI", messages.unganiChat)}
            ${summaryLine("Internal Team Messages", messages.teamChat)}
          </div>
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Today / Upcoming Focus</h3>
              <a class="ungani-btn green" href="my-calendar.html">Open Calendar</a>
            </div>

            ${renderTodayFocus()}
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Quick Actions</h3>
            </div>

            <div class="ungani-button-row">
              <a class="ungani-btn" href="my-items.html">${isRealEstate ? "Add Property" : "Add Item"}</a>
              <a class="ungani-btn green" href="my-money.html">Add Money Record</a>
              <a class="ungani-btn orange" href="my-tasks.html">Add Task</a>
              <a class="ungani-btn dark" href="my-records.html">Add Record</a>
              <a class="ungani-btn" href="my-documents.html">Add Document</a>
              <a class="ungani-btn green" href="my-calendar.html">Add Calendar Event</a>
            </div>
          </div>
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <h3>Recent Activity</h3>
            <a class="ungani-btn dark" href="my-activity.html">Open Activity Feed</a>
          </div>

          ${renderRecentActivity()}
        </section>

        <p class="ungani-small">
          Overview Version: Step 307E Shared Layout · ungani.com · info@ungani.com
        </p>
      `);
    }

    function calculateMoney() {
      let income = 0;
      let expenses = 0;
      let pettyCash = 0;
      let pending = 0;

      overviewData.transactions.forEach(function (row) {
        const amount = Number(UnganiClientShared.getValue(row, ["amount"], 0) || 0);
        const type = String(UnganiClientShared.getValue(row, ["transaction_type", "type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "completed")).toLowerCase();

        if (type.includes("income") || type.includes("sale") || type.includes("rental")) income += amount;
        else if (type.includes("petty")) {
          pettyCash += amount;
          expenses += amount;
        } else if (type.includes("expense")) {
          expenses += amount;
        }

        if (status.includes("pending")) pending += amount;
      });

      return {
        income,
        expenses,
        pettyCash,
        pending,
        balance: income - expenses
      };
    }

    function calculateItems() {
      let available = 0;
      let reserved = 0;
      let sold = 0;
      let rented = 0;
      let maintenance = 0;
      let totalValue = 0;

      overviewData.items.forEach(function (row) {
        const status = String(UnganiClientShared.getValue(row, ["property_status", "item_status", "status"], "")).toLowerCase();
        const value = Number(UnganiClientShared.getValue(row, ["property_price", "selling_price", "cost_price"], 0) || 0);

        totalValue += value;

        if (status.includes("available")) available++;
        if (status.includes("reserved")) reserved++;
        if (status.includes("sold")) sold++;
        if (status.includes("rented")) rented++;
        if (status.includes("maintenance") || status.includes("repair")) maintenance++;
      });

      return { available, reserved, sold, rented, maintenance, totalValue };
    }

    function calculatePeople() {
      let active = 0;
      let agents = 0;
      let leads = 0;
      let buyersRenters = 0;
      let commission = 0;

      overviewData.people.forEach(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["person_type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["relationship_status", "status"], "active")).toLowerCase();

        if (!status.includes("inactive")) active++;
        if (type === "agent") agents++;
        if (type === "lead") leads++;
        if (type === "buyer" || type === "renter" || type === "tenant") buyersRenters++;

        commission += Number(UnganiClientShared.getValue(row, ["commission_earned_month"], 0) || 0);
      });

      return { active, agents, leads, buyersRenters, commission };
    }

    function calculateRecords() {
      let leads = 0;
      let viewings = 0;
      let projects = 0;
      let openPending = 0;
      let closed = 0;

      overviewData.records.forEach(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["record_type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "")).toLowerCase();

        if (type.includes("lead") || type.includes("inquiry")) leads++;
        if (type.includes("viewing") || type.includes("site visit")) viewings++;
        if (type.includes("project")) projects++;

        if (status.includes("open") || status.includes("pending") || status.includes("contacted") || status.includes("viewing") || status.includes("progress")) openPending++;
        if (status.includes("closed") || status.includes("completed") || status.includes("sold") || status.includes("rented")) closed++;
      });

      return { leads, viewings, projects, openPending, closed };
    }

    function calculateTasks() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      let pending = 0;
      let inProgress = 0;
      let completed = 0;
      let overdue = 0;
      let highPriority = 0;

      overviewData.tasks.forEach(function (row) {
        const status = String(UnganiClientShared.getValue(row, ["status"], "pending")).toLowerCase();
        const priority = String(UnganiClientShared.getValue(row, ["priority"], "normal")).toLowerCase();
        const dueValue = UnganiClientShared.getValue(row, ["due_date"], "");

        if (status.includes("completed")) completed++;
        else if (status.includes("progress")) inProgress++;
        else if (!status.includes("cancelled")) pending++;

        if (priority === "high" || priority === "urgent") highPriority++;

        if (dueValue) {
          const dueDate = new Date(dueValue);
          dueDate.setHours(0, 0, 0, 0);

          if (!isNaN(dueDate.getTime()) && dueDate < today && !status.includes("completed") && !status.includes("cancelled")) {
            overdue++;
          }
        }
      });

      return { pending, inProgress, completed, overdue, highPriority };
    }

    function calculateDocuments() {
      let agreements = 0;
      let receiptsInvoices = 0;
      let driveLinks = 0;
      let pending = 0;
      let archived = 0;

      overviewData.documents.forEach(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["document_type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "")).toLowerCase();

        if (type.includes("agreement") || type.includes("lease") || type.includes("sale")) agreements++;
        if (type.includes("receipt") || type.includes("invoice")) receiptsInvoices++;

        if (
          UnganiClientShared.getValue(row, ["document_url"], "") ||
          UnganiClientShared.getValue(row, ["drive_url"], "") ||
          UnganiClientShared.getValue(row, ["folder_url"], "")
        ) {
          driveLinks++;
        }

        if (status.includes("pending") || status.includes("review")) pending++;
        if (status.includes("archived")) archived++;
      });

      return { agreements, receiptsInvoices, driveLinks, pending, archived };
    }

    function calculateEvents() {
      const todayText = new Date().toISOString().slice(0, 10);

      let today = 0;
      let upcoming = 0;
      let overdue = 0;
      let viewings = 0;
      let completed = 0;

      overviewData.events.forEach(function (row) {
        const date = String(UnganiClientShared.getValue(row, ["event_date"], "")).slice(0, 10);
        const type = String(UnganiClientShared.getValue(row, ["event_type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "scheduled")).toLowerCase();

        if (date === todayText) today++;
        if (date >= todayText && !status.includes("cancelled")) upcoming++;
        if (date < todayText && !status.includes("completed") && !status.includes("cancelled")) overdue++;
        if (type.includes("viewing") || type.includes("site visit")) viewings++;
        if (status.includes("completed")) completed++;
      });

      return { today, upcoming, overdue, viewings, completed };
    }

    function calculateSupport() {
      let open = 0;
      let resolved = 0;
      let urgent = 0;

      overviewData.support.forEach(function (row) {
        const status = String(UnganiClientShared.getValue(row, ["status"], "open")).toLowerCase();
        const priority = String(UnganiClientShared.getValue(row, ["priority"], "normal")).toLowerCase();

        if (status.includes("resolved") || status.includes("closed")) resolved++;
        else open++;

        if (priority === "high" || priority === "urgent") urgent++;
      });

      return { open, resolved, urgent };
    }

    function calculateMessages() {
      return {
        unganiChat: overviewData.chatMessages.length,
        teamChat: overviewData.teamMessages.length
      };
    }

    function renderTodayFocus() {
      const todayText = new Date().toISOString().slice(0, 10);

      const todayTasks = overviewData.tasks.filter(function (row) {
        const due = String(UnganiClientShared.getValue(row, ["due_date"], "")).slice(0, 10);
        const status = String(UnganiClientShared.getValue(row, ["status"], "")).toLowerCase();

        return due === todayText && !status.includes("completed") && !status.includes("cancelled");
      });

      const todayEvents = overviewData.events.filter(function (row) {
        const date = String(UnganiClientShared.getValue(row, ["event_date"], "")).slice(0, 10);
        const status = String(UnganiClientShared.getValue(row, ["status"], "")).toLowerCase();

        return date === todayText && !status.includes("cancelled");
      });

      if (todayTasks.length === 0 && todayEvents.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No focus items today</h3>
            <p>Tasks and calendar items due today will appear here.</p>
          </div>
        `;
      }

      let html = "";

      todayTasks.slice(0, 5).forEach(function (row) {
        html += focusBlock(
          "Task",
          UnganiClientShared.getValue(row, ["task_title", "title", "name"], "Task"),
          UnganiClientShared.getValue(row, ["priority"], "normal"),
          "my-tasks.html"
        );
      });

      todayEvents.slice(0, 5).forEach(function (row) {
        html += focusBlock(
          "Calendar",
          UnganiClientShared.getValue(row, ["event_title", "title"], "Calendar Event"),
          UnganiClientShared.getValue(row, ["event_type"], "event"),
          "my-calendar.html"
        );
      });

      return html;
    }

    function renderRecentActivity() {
      const activity = [];

      overviewData.transactions.slice(0, 5).forEach(function (row) {
        activity.push({
          label: "Money Record",
          title: UnganiClientShared.getValue(row, ["category_name", "category", "description"], "Money record"),
          detail: UnganiClientShared.formatKES(UnganiClientShared.getValue(row, ["amount"], 0)),
          date: UnganiClientShared.getValue(row, ["transaction_date", "created_at"], ""),
          link: "my-money.html"
        });
      });

      overviewData.records.slice(0, 5).forEach(function (row) {
        activity.push({
          label: "Business Record",
          title: UnganiClientShared.getValue(row, ["record_title", "title", "name"], "Business record"),
          detail: UnganiClientShared.getValue(row, ["record_type"], "record"),
          date: UnganiClientShared.getValue(row, ["record_date", "created_at"], ""),
          link: "my-records.html"
        });
      });

      overviewData.tasks.slice(0, 5).forEach(function (row) {
        activity.push({
          label: "Task",
          title: UnganiClientShared.getValue(row, ["task_title", "title", "name"], "Task"),
          detail: UnganiClientShared.getValue(row, ["status"], "pending"),
          date: UnganiClientShared.getValue(row, ["due_date", "created_at"], ""),
          link: "my-tasks.html"
        });
      });

      overviewData.events.slice(0, 5).forEach(function (row) {
        activity.push({
          label: "Calendar",
          title: UnganiClientShared.getValue(row, ["event_title", "title"], "Calendar event"),
          detail: UnganiClientShared.getValue(row, ["event_type"], "event"),
          date: UnganiClientShared.getValue(row, ["event_date", "created_at"], ""),
          link: "my-calendar.html"
        });
      });

      overviewData.documents.slice(0, 5).forEach(function (row) {
        activity.push({
          label: "Document",
          title: UnganiClientShared.getValue(row, ["document_title", "title", "file_name"], "Document"),
          detail: UnganiClientShared.getValue(row, ["document_type"], "document"),
          date: UnganiClientShared.getValue(row, ["created_at"], ""),
          link: "my-documents.html"
        });
      });

      activity.sort(function (a, b) {
        return new Date(b.date || 0) - new Date(a.date || 0);
      });

      if (activity.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No recent activity</h3>
            <p>Recent activity will appear here when records are added.</p>
          </div>
        `;
      }

      return activity.slice(0, 10).map(function (item) {
        return `
          <div class="ungani-card" style="box-shadow:none;margin-bottom:10px;">
            <div class="ungani-section-title">
              <div>
                <h3 style="font-size:16px;">${UnganiClientShared.safe(item.title)}</h3>
                <p class="ungani-small">${UnganiClientShared.safe(item.label)} · ${UnganiClientShared.safe(item.detail)}</p>
              </div>
              <span class="ungani-badge gold">${UnganiClientShared.safe(UnganiClientShared.formatDate(item.date))}</span>
            </div>
            <a class="ungani-btn" href="${UnganiClientShared.attr(item.link)}">Open</a>
          </div>
        `;
      }).join("");
    }

    function summaryLine(label, value) {
      return `
        <div style="display:flex;justify-content:space-between;gap:14px;border-bottom:1px solid var(--ungani-border);padding:10px 0;">
          <span class="ungani-small">${UnganiClientShared.safe(label)}</span>
          <strong>${UnganiClientShared.safe(value)}</strong>
        </div>
      `;
    }

    function focusBlock(type, title, detail, link) {
      return `
        <div class="ungani-card" style="box-shadow:none;margin-bottom:10px;">
          <span class="ungani-badge gold">${UnganiClientShared.safe(type)}</span>
          <h3 style="font-size:16px;margin:10px 0 6px;">${UnganiClientShared.safe(title)}</h3>
          <p class="ungani-small">${UnganiClientShared.safe(detail)}</p>
          <a class="ungani-btn" href="${UnganiClientShared.attr(link)}">Open</a>
        </div>
      `;
    }
  </script>
</body>
</html>
