<script>
function getWeekStart(date = new Date()) {
  const current = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const day = current.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  current.setDate(current.getDate() + diff);
  return localDate(current);
}

function renderWeekSchedule(rows) {
  const weekStart = getWeekStart();
  const weekBox = document.getElementById("weekSchedule");

  let html = "";

  for (let i = 0; i < 7; i++) {
    const dateValue = addDays(weekStart, i);

    const dayRows = rows.filter(row =>
      row.event_date === dateValue &&
      row.event_status !== "cancelled"
    );

    const dayName = new Date(dateValue + "T00:00:00").toLocaleDateString("en-KE", {
      weekday: "long"
    });

    html += `
      <div class="day-card">
        <h3>${dayName}</h3>
        <p class="small">${dateValue}</p>
        ${
          dayRows.length === 0
            ? `<p class="small">No scheduled event.</p>`
            : dayRows.map(row => `
                <div class="event-pill">
                  <strong>${formatTime(row.event_time)}</strong><br>
                  ${safe(row.event_title)}<br>
                  <span class="small">${safe(row.event_status)} | ${safe(row.event_type).replaceAll("_", " ")}</span>
                </div>
              `).join("")
        }
      </div>
    `;
  }

  weekBox.innerHTML = html;
}
</script>
