<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Calendar</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-shared.js" onerror="window.__unganiClientSharedFailed = true;"></script>
  <script>
    (function () {
      function showUnganiLoadError() {
        if (typeof UnganiClientShared !== "undefined") return;

        var banner = document.createElement("div");
        banner.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99999;background:#B91C1C;color:#fff;padding:12px 16px;font:14px/1.4 -apple-system,sans-serif;text-align:center;";
        banner.innerHTML = "Some page resources failed to load. Please check your connection. " +
          "<button style=\"margin-left:10px;padding:4px 12px;border:none;border-radius:6px;background:#fff;color:#B91C1C;font-weight:700;cursor:pointer;\" onclick=\"window.location.reload()\">Reload</button>";

        if (document.body) {
          document.body.prepend(banner);
        } else {
          document.addEventListener("DOMContentLoaded", function () {
            document.body.prepend(banner);
          });
        }
      }

      if (window.__unganiClientSharedFailed) {
        showUnganiLoadError();
      } else {
        setTimeout(function () {
          if (typeof UnganiClientShared === "undefined") showUnganiLoadError();
        }, 4000);
      }
    })();
  </script>
  <script src="ungani-business-config.js"></script>
  <script src="ungani-analytics.js"></script>
  <script src="ungani-presets.js"></script>
  <script src="nia-assistant.js"></script>
</head>

<body>
  <script>
    let currentContext = null;
    let businessPreset = null;
    let eventRows = [];
    let editingEventId = null;
    let highlightApplied = false;
    let sectionOptions = [];
    let currentSectionFilter = "";

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "calendar",
        pageTitle: "Calendar",
        pageSubtitle: "Manage appointments, deadlines, meetings, follow-ups, and business activities.",
        onReady: startCalendarPage
      });
    });

    async function startCalendarPage(context) {
      currentContext = context;

      if (window.UnganiAnalytics) {
        UnganiAnalytics.injectChartStyles();
      }

      businessPreset = UnganiPresets.getPreset(context.tenant);
      sectionOptions = businessPreset.selectedSectionLabels || [];
      currentSectionFilter = new URLSearchParams(window.location.search).get("section") || "";

      const titleEl = document.querySelector(".ungani-topbar h2");
      const subEl = document.querySelector(".ungani-topbar p");

      if (titleEl) {
        titleEl.innerText = businessPreset.calendarLabel;
      }

      if (subEl) {
        subEl.innerText = "Appointments, deadlines, meetings, reminders, and activities for " + businessPreset.name + ".";
      }

      await loadEventRows();
    }

    async function loadEventRows() {
      currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading calendar activities...");

      let response;

      try {
        response = await currentContext.supabaseClient
          .from("business_events")
          .select("*")
          .eq("tenant_id", currentContext.tenantId)
          .order("event_date", { ascending: true })
          .order("created_at", { ascending: false });
      } catch (error) {
        UnganiClientShared.setContent(
          UnganiClientShared.errorCard("Could not load calendar activities", error.message || "Network error. Please check your connection.")
        );
        return;
      }

      if (response.error) {
        UnganiClientShared.setContent(
          UnganiClientShared.errorCard("Could not load calendar activities", response.error.message)
        );
        return;
      }

      eventRows = response.data || [];
      renderCalendarPage();
    }

    function renderCalendarPage() {
      const filteredRows = getFilteredRows();
      const summary = calculateCalendarSummary(filteredRows);
      const typeRows = buildTypeRows(filteredRows);
      const statusRows = buildStatusRows(filteredRows);
      const priorityRows = buildPriorityRows(filteredRows);

      UnganiClientShared.setContent(`
        <style>
          .calendar-hero-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
            gap: 18px;
            align-items: stretch;
          }

          .calendar-preset-box {
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.09);
            border-radius: 24px;
            padding: 18px;
          }

          .calendar-preset-box h3 {
            color: white;
            margin: 0 0 8px;
          }

          .calendar-preset-box p {
            color: rgba(255,255,255,0.74);
            margin: 0;
            line-height: 1.55;
          }

          .calendar-chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
          }

          .calendar-chip {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 8px 11px;
            background: rgba(255,255,255,0.12);
            color: white;
            font-size: 12px;
            font-weight: 850;
          }

          .calendar-kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 18px;
          }

          .calendar-kpi-card {
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            background: var(--ungani-card);
            border: 1px solid var(--ungani-border);
            box-shadow: var(--ungani-shadow);
            padding: 20px;
            min-height: 140px;
          }

          .calendar-kpi-card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 18px;
            bottom: 18px;
            width: 5px;
            border-radius: 0 999px 999px 0;
            background: var(--accent);
          }

          .calendar-kpi-card span {
            color: var(--ungani-muted);
            font-size: 12px;
            font-weight: 950;
            text-transform: uppercase;
            letter-spacing: 0.055em;
          }

          .calendar-kpi-card h3 {
            margin: 17px 0 8px;
            font-size: clamp(25px, 3vw, 36px);
            line-height: 1;
            letter-spacing: -0.055em;
          }

          .calendar-kpi-card p {
            margin: 0;
            color: var(--ungani-muted);
            font-size: 13px;
          }

          .calendar-form-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
          }

          .calendar-form-grid .wide {
            grid-column: span 3;
          }

          .calendar-main-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(320px, 0.52fr);
            gap: 18px;
            align-items: start;
          }

          .calendar-chart-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
            margin-bottom: 18px;
            align-items: start;
          }

          .calendar-type-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
          }

          .type-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
          }

          .type-pill {
            border: 1px solid var(--ungani-border);
            background: var(--ungani-soft);
            color: var(--ungani-text);
            border-radius: 999px;
            padding: 8px 11px;
            font-size: 12px;
            font-weight: 850;
            cursor: pointer;
          }

          .type-pill:hover {
            border-color: rgba(212,166,58,0.65);
          }

          .calendar-list {
            display: grid;
            gap: 12px;
          }

          .event-card {
            border: 1px solid var(--ungani-border);
            border-radius: 24px;
            padding: 16px;
            background: var(--ungani-card);
            box-shadow: var(--ungani-shadow);
            display: grid;
            grid-template-columns: 74px minmax(0, 1fr) auto;
            gap: 14px;
            align-items: start;
          }

          .event-card:hover {
            border-color: rgba(212,166,58,0.55);
          }

          @keyframes unganiHighlightPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(212,166,58,0.55); }
            50% { box-shadow: 0 0 0 9px rgba(212,166,58,0); }
          }

          .ungani-highlighted {
            border-color: rgba(212,166,58,0.9) !important;
            animation: unganiHighlightPulse 1.4s ease-out 2;
          }

          .event-date-box {
            border-radius: 20px;
            background: linear-gradient(135deg, #061C3D, #D4A63A);
            color: white;
            text-align: center;
            padding: 12px 8px;
            min-height: 74px;
            display: flex;
            flex-direction: column;
            justify-content: center;
          }

          .event-date-box strong {
            font-size: 24px;
            line-height: 1;
          }

          .event-date-box span {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 900;
            margin-top: 4px;
            color: rgba(255,255,255,0.82);
          }

          .event-title-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
          }

          .event-title-row h3 {
            margin: 0;
            font-size: 18px;
          }

          .event-meta-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
          }

          .event-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
          }

          @media (max-width: 1180px) {
            .calendar-hero-grid,
            .calendar-main-grid,
            .calendar-chart-grid {
              grid-template-columns: 1fr;
            }

            .calendar-kpi-grid {
              grid-template-columns: repeat(2, minmax(0, 1fr));
            }
          }

          @media (max-width: 820px) {
            .event-card {
              grid-template-columns: 1fr;
            }

            .event-actions {
              justify-content: flex-start;
            }

            .event-date-box {
              width: 74px;
            }
          }

          @media (max-width: 720px) {
            .calendar-kpi-grid,
            .calendar-form-grid {
              grid-template-columns: 1fr;
            }

            .calendar-form-grid .wide {
              grid-column: span 1;
            }
          }
        </style>

        <section class="ungani-card ungani-hero">
          <div class="calendar-hero-grid">
            <div>
              <span class="ungani-badge gold">${UnganiClientShared.safe(businessPreset.name)}</span>
              <h2 style="font-size:clamp(32px,4vw,52px);line-height:1.02;margin:18px 0 12px;">
                Calendar activities that match your business.
              </h2>
              <p>
                Plan appointments, deadlines, reminders, trips, deliveries, viewings, restocks, bookings, and follow-ups using presets for ${UnganiClientShared.safe(businessPreset.name)}.
              </p>

              <div class="ungani-button-row">
                <button class="ungani-btn gold" onclick="scrollToEventForm()">Add Calendar Activity</button>
                <button class="ungani-btn green" onclick="loadEventRows()">Refresh</button>
                <a class="ungani-btn light" href="my-charts.html">View Charts</a>
              </div>

              ${renderSectionSwitcher()}
            </div>

            <div class="calendar-preset-box">
              <h3>Business calendar preset active</h3>
              <p>The calendar activity types on this page now adapt to the business type selected by the client.</p>

              <div class="calendar-chip-row">
                ${businessPreset.calendarTypes.slice(0, 7).map(function (item) {
                  return `<span class="calendar-chip">${UnganiClientShared.safe(item)}</span>`;
                }).join("")}
              </div>
            </div>
          </div>
        </section>

        <section class="calendar-kpi-grid">
          ${calendarKpi("Upcoming", summary.upcoming, "Future scheduled activities", "#2563EB")}
          ${calendarKpi("Today", summary.today, "Activities due today", "#D4A63A")}
          ${calendarKpi("Completed", summary.completed, "Finished activities", "#16A34A")}
          ${calendarKpi("Overdue", summary.overdue, "Past activities not completed", summary.overdue > 0 ? "#DC2626" : "#16A34A")}
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>Filters</h3>
              <p class="ungani-small">Search and filter calendar activities.</p>
            </div>

            <button class="ungani-btn dark" onclick="resetCalendarFilters()">Reset Filters</button>
          </div>

          <div class="calendar-form-grid">
            <div>
              <label for="filterType">Activity Type</label>
              <select id="filterType" onchange="saveCalendarFilters(); renderCalendarPage();">
                <option value="">All Types</option>
                ${businessPreset.calendarTypes.map(function (item) {
                  return `<option value="${UnganiClientShared.attr(item)}">${UnganiClientShared.safe(item)}</option>`;
                }).join("")}
              </select>
            </div>

            <div>
              <label for="filterStatus">Status</label>
              <select id="filterStatus" onchange="saveCalendarFilters(); renderCalendarPage();">
                <option value="">All Status</option>
                <option value="scheduled">Scheduled</option>
                <option value="in progress">In Progress</option>
                <option value="completed">Completed</option>
                <option value="no show">No-show</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>

            <div>
              <label for="filterSearch">Search</label>
              <input id="filterSearch" placeholder="Search activity, person, item, location..." oninput="saveCalendarFilters(); renderCalendarPage();" />
            </div>
          </div>
        </section>

        <section class="calendar-chart-grid">
          <div class="ungani-card ungani-chart-card">
            <div class="ungani-chart-head">
              <div>
                <h3>Calendar Activity Types</h3>
                <p class="ungani-small">Animated chart showing the types of activities being planned.</p>
              </div>
            </div>

            ${hasValues(typeRows) ? '<div class="ungani-chart-canvas-wrap"><canvas id="calendarTypeChart"></canvas></div>' : UnganiAnalytics.emptyChart("Add calendar activities to show type breakdown.")}
          </div>

          <div class="ungani-card ungani-chart-card">
            <div class="ungani-chart-head">
              <div>
                <h3>Calendar Status</h3>
                <p class="ungani-small">Scheduled, in progress, completed, cancelled, and overdue activities.</p>
              </div>
            </div>

            ${hasValues(statusRows) ? '<div class="ungani-chart-canvas-wrap"><canvas id="calendarStatusChart"></canvas></div>' : UnganiAnalytics.emptyChart("Add calendar activities to show status breakdown.")}
          </div>
        </section>

        <section class="calendar-type-section">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <div>
                <h3>Calendar Activity Types</h3>
                <p class="ungani-small">Quick-fill calendar activity types for ${UnganiClientShared.safe(businessPreset.name)}.</p>
              </div>
            </div>

            <div class="type-list">
              ${businessPreset.calendarTypes.map(function (item) {
                return `<button class="type-pill" onclick="quickCalendarType('${UnganiClientShared.attr(item)}')">${UnganiClientShared.safe(item)}</button>`;
              }).join("")}
            </div>
          </div>
        </section>

        <section class="calendar-main-grid">
          <div class="ungani-card" id="eventFormCard">
            <div class="ungani-section-title">
              <div>
                <h3 id="eventFormTitle">${editingEventId ? "Edit Calendar Activity" : "Add Calendar Activity"}</h3>
                <p class="ungani-small">Use business-specific calendar types so reports and charts make sense.</p>
              </div>

              <button class="ungani-btn dark" onclick="clearEventForm()">Clear</button>
            </div>

            <form onsubmit="saveEvent(event)">
              <div class="calendar-form-grid">
                <div class="wide">
                  <label for="eventTitle">Activity Title</label>
                  <input id="eventTitle" placeholder="Example: Client meeting, delivery date, viewing, appointment..." required />
                </div>

                <div>
                  <label for="eventType">Activity Type</label>
                  <select id="eventType">
                    ${businessPreset.calendarTypes.map(function (item) {
                      return `<option value="${UnganiClientShared.attr(item)}">${UnganiClientShared.safe(item)}</option>`;
                    }).join("")}
                  </select>
                </div>

                <div>
                  <label for="eventDate">Date</label>
                  <input id="eventDate" type="date" required />
                </div>

                <div>
                  <label for="eventStatus">Status</label>
                  <select id="eventStatus">
                    <option value="scheduled">Scheduled</option>
                    <option value="in progress">In Progress</option>
                    <option value="completed">Completed</option>
                    <option value="no show">No-show</option>
                    <option value="cancelled">Cancelled</option>
                  </select>
                </div>

                <div>
                  <label for="eventStartTime">Start Time</label>
                  <input id="eventStartTime" type="time" />
                </div>

                <div>
                  <label for="eventEndTime">End Time</label>
                  <input id="eventEndTime" type="time" />
                </div>

                <div>
                  <label for="eventPriority">Priority</label>
                  <select id="eventPriority">
                    <option value="low">Low</option>
                    <option value="normal" selected>Normal</option>
                    <option value="high">High</option>
                    <option value="urgent">Urgent</option>
                  </select>
                </div>

                ${sectionOptions.length > 1 ? `
                  <div>
                    <label for="eventSection">Section</label>
                    <select id="eventSection">
                      ${sectionOptions.map(function (label) {
                        const selected = label === currentSectionFilter ? "selected" : "";
                        return `<option value="${UnganiClientShared.attr(label)}" ${selected}>${UnganiClientShared.safe(label)}</option>`;
                      }).join("")}
                    </select>
                  </div>
                ` : ""}

                <div>
                  <label for="eventLocation">Location</label>
                  <input id="eventLocation" placeholder="Office, client site, yard, shop, salon, project site..." />
                </div>

                <div>
                  <label for="eventRelatedPerson">Related Person</label>
                  <input id="eventRelatedPerson" placeholder="Client, staff, supplier, driver, agent..." />
                </div>

                <div>
                  <label for="eventRelatedItem">Related Item / Work</label>
                  <input id="eventRelatedItem" placeholder="${UnganiClientShared.attr(businessPreset.itemsLabel)}" />
                </div>

                <div class="wide">
                  <label for="eventNotes">Notes</label>
                  <textarea id="eventNotes" rows="5" placeholder="Add meeting details, appointment notes, delivery details, reminders, or preparation notes..."></textarea>
                </div>
              </div>

              <div class="ungani-button-row" style="margin-top:16px;">
                <button class="ungani-btn gold" type="submit">${editingEventId ? "Update Activity" : "Save Activity"}</button>
                <button class="ungani-btn dark" type="button" onclick="clearEventForm()">Cancel</button>
              </div>
            </form>
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <div>
                <h3>Calendar Guide</h3>
                <p class="ungani-small">How to keep the business moving.</p>
              </div>
            </div>

            <div class="ungani-empty" style="text-align:left;">
              <h3>Use dates before things become urgent</h3>
              <p>Add delivery dates, appointments, follow-ups, site visits, restock dates, service dates, and payment reminders early.</p>
            </div>

            <div style="display:grid;gap:10px;margin-top:12px;">
              <div class="ungani-card" style="box-shadow:none;">
                <strong>Example activity</strong>
                <p class="ungani-small">${UnganiClientShared.safe(businessPreset.calendarTypes[0] || "Follow-up")}</p>
              </div>

              <div class="ungani-card" style="box-shadow:none;">
                <strong>Priority rule</strong>
                <p class="ungani-small">Use urgent only when the activity truly needs immediate attention.</p>
              </div>

              <div class="ungani-card" style="box-shadow:none;">
                <strong>Reports</strong>
                <p class="ungani-small">Calendar activities appear in Dashboard, Charts, Reports, and Activity summaries.</p>
              </div>
            </div>
          </div>
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <div>
              <h3>Calendar Activity List</h3>
              <p class="ungani-small">${filteredRows.length} calendar activity record(s) shown.</p>
            </div>

            <button class="ungani-btn green" onclick="loadEventRows()">Refresh</button>
          </div>

          ${renderEventList(filteredRows)}
        </section>

        <p class="ungani-small">
          Calendar Version: Step 310B-6 Business-Type Calendar Presets · ungani.com · info@ungani.com
        </p>
      `);

      restoreCalendarFilters();

      setTimeout(function () {
        renderCalendarCharts(typeRows, statusRows, priorityRows);
      }, 150);

      applyHighlightFromUrl();
    }

    function applyHighlightFromUrl() {
      if (highlightApplied) return;

      const highlightId = new URLSearchParams(window.location.search).get("highlight");
      if (!highlightId) return;

      setTimeout(function () {
        const el = document.getElementById("event-" + highlightId);

        if (!el) return;

        highlightApplied = true;
        el.scrollIntoView({ behavior: "smooth", block: "center" });
        el.classList.add("ungani-highlighted");

        setTimeout(function () {
          el.classList.remove("ungani-highlighted");
        }, 3000);
      }, 250);
    }

    async function renderCalendarCharts(typeRows, statusRows, priorityRows) {
      try {
        if (hasValues(typeRows)) {
          await UnganiAnalytics.renderHorizontalBarChart("calendarTypeChart", typeRows, "Activities");
        }

        if (hasValues(statusRows)) {
          await UnganiAnalytics.renderDoughnutStatusChart("calendarStatusChart", statusRows);
        }
      } catch (error) {
        console.warn("Calendar charts warning:", error.message);
      }
    }

    function renderEventList(rows) {
      if (!rows || rows.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No calendar activities yet</h3>
            <p>Add your first appointment, delivery, viewing, meeting, reminder, or follow-up.</p>
          </div>
        `;
      }

      const todayStr = new Date().toISOString().slice(0, 10);

      return `
        <div class="calendar-list">
          ${rows.map(function (row) {
            const title = getEventTitle(row);
            const type = UnganiClientShared.getValue(row, ["event_type", "type"], "Calendar Activity");
            const status = UnganiClientShared.getValue(row, ["status"], "scheduled");
            const priority = UnganiClientShared.getValue(row, ["priority"], "normal");
            const date = UnganiClientShared.getValue(row, ["event_date", "date", "start_date", "created_at"], "");
            const startTime = UnganiClientShared.getValue(row, ["start_time"], "");
            const endTime = UnganiClientShared.getValue(row, ["end_time"], "");
            const location = UnganiClientShared.getValue(row, ["location"], "");
            const relatedPerson = UnganiClientShared.getValue(row, ["related_person"], "");
            const relatedItem = UnganiClientShared.getValue(row, ["related_item"], "");
            const notes = UnganiClientShared.getValue(row, ["notes", "description"], "");
            const sectionLabel = UnganiClientShared.getValue(row, ["section_label"], "");

            return `
              <div class="event-card" id="event-${UnganiClientShared.attr(row.id)}">
                ${eventDateBox(date)}

                <div>
                  <div class="event-title-row">
                    ${statusBadge(status, date)}
                    ${priorityBadge(priority)}
                    ${sectionLabel ? `<span class="ungani-badge blue">${UnganiClientShared.safe(sectionLabel)}</span>` : ""}
                    <h3>${UnganiClientShared.safe(title)}</h3>
                  </div>

                  <p class="ungani-small" style="margin:0;">
                    ${UnganiClientShared.safe(notes || "No notes added.")}
                  </p>

                  <div class="event-meta-grid">
                    <span class="ungani-badge gold">${UnganiClientShared.safe(type)}</span>
                    <span class="ungani-badge blue">${UnganiClientShared.safe(formatTimeRange(startTime, endTime))}</span>
                    ${location ? `<span class="ungani-badge green">Location: ${UnganiClientShared.safe(location)}</span>` : ""}
                    ${relatedPerson ? `<span class="ungani-badge gold">Person: ${UnganiClientShared.safe(relatedPerson)}</span>` : ""}
                    ${relatedItem ? `<span class="ungani-badge blue">Related: ${UnganiClientShared.safe(relatedItem)}</span>` : ""}
                  </div>
                </div>

                <div class="event-actions">
                  ${(function () {
                    const lowerStatus = String(status).toLowerCase();
                    const isUnresolved = !lowerStatus.includes("completed") && !lowerStatus.includes("cancelled") && !lowerStatus.includes("no show");
                    const isPastDue = date && String(date).slice(0, 10) < todayStr;

                    if (isPastDue && isUnresolved) {
                      return `
                        <button class="ungani-btn small green" onclick="markEventOutcome('${UnganiClientShared.attr(row.id)}', 'completed')">✅ Completed</button>
                        <button class="ungani-btn small red" onclick="markEventOutcome('${UnganiClientShared.attr(row.id)}', 'no show')">🚫 No-show</button>
                        <button class="ungani-btn small gold" onclick="rescheduleEvent('${UnganiClientShared.attr(row.id)}')">🔁 Reschedule</button>
                      `;
                    }

                    return isUnresolved ? `<button class="ungani-btn small green" onclick="markEventCompleted('${UnganiClientShared.attr(row.id)}')">Done</button>` : "";
                  })()}
                  <button class="ungani-btn small gold" onclick="editEvent('${UnganiClientShared.attr(row.id)}')">Edit</button>
                  <button class="ungani-btn small red" onclick="deleteEvent('${UnganiClientShared.attr(row.id)}')">Delete</button>
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function eventDateBox(dateValue) {
      const raw = String(dateValue || "");
      const date = raw ? new Date(raw) : null;

      if (!date || isNaN(date.getTime())) {
        return `
          <div class="event-date-box">
            <strong>--</strong>
            <span>No Date</span>
          </div>
        `;
      }

      const day = String(date.getDate()).padStart(2, "0");
      const month = date.toLocaleDateString("en-KE", { month: "short" });

      return `
        <div class="event-date-box">
          <strong>${UnganiClientShared.safe(day)}</strong>
          <span>${UnganiClientShared.safe(month)}</span>
        </div>
      `;
    }

    function calendarKpi(title, value, subtitle, accent) {
      return `
        <div class="calendar-kpi-card" style="--accent:${UnganiClientShared.attr(accent)};">
          <span>${UnganiClientShared.safe(title)}</span>
          <h3>${UnganiClientShared.safe(value)}</h3>
          <p>${UnganiClientShared.safe(subtitle)}</p>
        </div>
      `;
    }

    function calculateCalendarSummary(rows) {
      const today = new Date().toISOString().slice(0, 10);
      let upcoming = 0;
      let todayCount = 0;
      let completed = 0;
      let overdue = 0;
      let noShow = 0;

      rows.forEach(function (row) {
        const status = String(UnganiClientShared.getValue(row, ["status"], "scheduled")).toLowerCase();
        const date = String(UnganiClientShared.getValue(row, ["event_date", "date", "start_date"], "")).slice(0, 10);

        if (status.includes("completed")) {
          completed++;
          return;
        }

        if (status.includes("no show")) {
          noShow++;
          return;
        }

        if (date === today) {
          todayCount++;
        } else if (date && date > today) {
          upcoming++;
        } else if (date && date < today && !status.includes("cancelled")) {
          overdue++;
        }
      });

      return {
        upcoming,
        today: todayCount,
        completed,
        overdue,
        noShow
      };
    }

    function buildTypeRows(rows) {
      const map = {};

      rows.forEach(function (row) {
        const type = UnganiClientShared.getValue(row, ["event_type", "type"], "Calendar Activity");
        map[type] = (map[type] || 0) + 1;
      });

      return UnganiAnalytics.mapToRows(map);
    }

    function buildStatusRows(rows) {
      const map = {};

      rows.forEach(function (row) {
        const status = getSmartStatus(row);
        map[status] = (map[status] || 0) + 1;
      });

      return UnganiAnalytics.mapToRows(map);
    }

    function buildPriorityRows(rows) {
      const map = {};

      rows.forEach(function (row) {
        const priority = UnganiClientShared.getValue(row, ["priority"], "normal");
        map[priority] = (map[priority] || 0) + 1;
      });

      return UnganiAnalytics.mapToRows(map);
    }

    function getSmartStatus(row) {
      const status = String(UnganiClientShared.getValue(row, ["status"], "scheduled")).toLowerCase();
      const date = String(UnganiClientShared.getValue(row, ["event_date", "date", "start_date"], "")).slice(0, 10);
      const today = new Date().toISOString().slice(0, 10);

      if (date && date < today && !status.includes("completed") && !status.includes("cancelled")) {
        return "Overdue";
      }

      return UnganiAnalytics.toTitle(status || "Scheduled");
    }

    function getFilteredRows() {
      const filterType = getStoredOrInput("filterType", "ungani_calendar_filter_type").toLowerCase();
      const filterStatus = getStoredOrInput("filterStatus", "ungani_calendar_filter_status").toLowerCase();
      const search = getStoredOrInput("filterSearch", "ungani_calendar_filter_search").toLowerCase();

      return eventRows.filter(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["event_type", "type"], "calendar activity")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "scheduled")).toLowerCase();
        const haystack = JSON.stringify(row || {}).toLowerCase();

        if (currentSectionFilter && UnganiClientShared.getValue(row, ["section_label"], "") !== currentSectionFilter) return false;
        if (filterType && !type.includes(filterType)) return false;
        if (filterStatus && !status.includes(filterStatus)) return false;
        if (search && !haystack.includes(search)) return false;

        return true;
      });
    }

    function getStoredOrInput(inputId, storageKey) {
      const el = document.getElementById(inputId);

      if (el) {
        return String(el.value || "").trim();
      }

      return String(sessionStorage.getItem(storageKey) || "").trim();
    }

    function saveCalendarFilters() {
      if (document.getElementById("filterType")) sessionStorage.setItem("ungani_calendar_filter_type", UnganiClientShared.value("filterType"));
      if (document.getElementById("filterStatus")) sessionStorage.setItem("ungani_calendar_filter_status", UnganiClientShared.value("filterStatus"));
      if (document.getElementById("filterSearch")) sessionStorage.setItem("ungani_calendar_filter_search", UnganiClientShared.value("filterSearch"));
    }

    function restoreCalendarFilters() {
      if (document.getElementById("filterType")) document.getElementById("filterType").value = sessionStorage.getItem("ungani_calendar_filter_type") || "";
      if (document.getElementById("filterStatus")) document.getElementById("filterStatus").value = sessionStorage.getItem("ungani_calendar_filter_status") || "";
      if (document.getElementById("filterSearch")) document.getElementById("filterSearch").value = sessionStorage.getItem("ungani_calendar_filter_search") || "";
    }

    function resetCalendarFilters() {
      sessionStorage.removeItem("ungani_calendar_filter_type");
      sessionStorage.removeItem("ungani_calendar_filter_status");
      sessionStorage.removeItem("ungani_calendar_filter_search");
      renderCalendarPage();
      UnganiClientShared.showToast("Calendar filters reset ✓");
    }

    function quickCalendarType(eventType) {
      scrollToEventForm();

      setTimeout(function () {
        const el = document.getElementById("eventType");
        if (el) el.value = eventType;
      }, 150);

      UnganiClientShared.showToast("Calendar type selected ✓");
    }

    function scrollToEventForm() {
      const el = document.getElementById("eventFormCard");

      if (el) {
        el.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    async function saveEvent(event) {
      event.preventDefault();

      const title = UnganiClientShared.value("eventTitle");
      const eventDate = UnganiClientShared.value("eventDate");

      if (!title) {
        UnganiClientShared.showToast("Enter an activity title.");
        return;
      }

      if (!eventDate) {
        UnganiClientShared.showToast("Select an activity date.");
        return;
      }

      const payload = {
        tenant_id: currentContext.tenantId,
        event_title: title,
        event_type: UnganiClientShared.value("eventType") || "Calendar Activity",
        event_date: eventDate,
        start_time: UnganiClientShared.value("eventStartTime") || null,
        end_time: UnganiClientShared.value("eventEndTime") || null,
        status: UnganiClientShared.value("eventStatus") || "scheduled",
        priority: UnganiClientShared.value("eventPriority") || "normal",
        location: UnganiClientShared.value("eventLocation") || null,
        related_person: UnganiClientShared.value("eventRelatedPerson") || null,
        related_item: UnganiClientShared.value("eventRelatedItem") || null,
        notes: UnganiClientShared.value("eventNotes") || null
      };

      if (sectionOptions.length > 1) {
        payload.section_label = UnganiClientShared.value("eventSection") || null;
      }

      let response;

      try {
        if (editingEventId) {
          response = await currentContext.supabaseClient
            .from("business_events")
            .update(payload)
            .eq("id", editingEventId)
            .eq("tenant_id", currentContext.tenantId);
        } else {
          response = await currentContext.supabaseClient
            .from("business_events")
            .insert([payload]);
        }
      } catch (error) {
        UnganiClientShared.showToast("Could not save activity: " + (error.message || "Network error. Please check your connection."));
        return;
      }

      if (response.error) {
        UnganiClientShared.showToast("Could not save activity: " + response.error.message);
        return;
      }

      UnganiClientShared.showToast(editingEventId ? "Calendar activity updated ✓" : "Calendar activity added ✓");
      clearEventForm();
      await loadEventRows();
    }

    function editEvent(id) {
      const row = eventRows.find(function (item) {
        return String(item.id) === String(id);
      });

      if (!row) {
        UnganiClientShared.showToast("Calendar activity not found.");
        return;
      }

      editingEventId = row.id;

      scrollToEventForm();

      setTimeout(function () {
        document.getElementById("eventFormTitle").innerText = "Edit Calendar Activity";
        document.getElementById("eventTitle").value = getEventTitle(row);
        document.getElementById("eventType").value = UnganiClientShared.getValue(row, ["event_type", "type"], "");
        document.getElementById("eventDate").value = String(UnganiClientShared.getValue(row, ["event_date", "date", "start_date"], "")).slice(0, 10);
        document.getElementById("eventStartTime").value = String(UnganiClientShared.getValue(row, ["start_time"], "")).slice(0, 5);
        document.getElementById("eventEndTime").value = String(UnganiClientShared.getValue(row, ["end_time"], "")).slice(0, 5);
        document.getElementById("eventStatus").value = UnganiClientShared.getValue(row, ["status"], "scheduled");
        document.getElementById("eventPriority").value = UnganiClientShared.getValue(row, ["priority"], "normal");

        if (sectionOptions.length > 1 && document.getElementById("eventSection")) {
          document.getElementById("eventSection").value = UnganiClientShared.getValue(row, ["section_label"], "");
        }

        document.getElementById("eventLocation").value = UnganiClientShared.getValue(row, ["location"], "");
        document.getElementById("eventRelatedPerson").value = UnganiClientShared.getValue(row, ["related_person"], "");
        document.getElementById("eventRelatedItem").value = UnganiClientShared.getValue(row, ["related_item"], "");
        document.getElementById("eventNotes").value = UnganiClientShared.getValue(row, ["notes", "description"], "");
      }, 150);
    }

    async function markEventCompleted(id) {
      await markEventOutcome(id, "completed");
    }

    async function markEventOutcome(id, outcomeStatus) {
      let response;

      try {
        response = await currentContext.supabaseClient
          .from("business_events")
          .update({ status: outcomeStatus })
          .eq("id", id)
          .eq("tenant_id", currentContext.tenantId);
      } catch (error) {
        UnganiClientShared.showToast("Could not update activity: " + (error.message || "Network error. Please check your connection."));
        return;
      }

      if (response.error) {
        UnganiClientShared.showToast("Could not update activity: " + response.error.message);
        return;
      }

      const outcomeLabel = outcomeStatus === "no show" ? "marked as no-show" : "marked completed ✓";
      UnganiClientShared.showToast("Calendar activity " + outcomeLabel);
      await loadEventRows();
    }

    function rescheduleEvent(id) {
      editEvent(id);

      setTimeout(function () {
        const dateField = document.getElementById("eventDate");
        if (dateField) dateField.focus();
        UnganiClientShared.showToast("Pick a new date and save to reschedule.");
      }, 250);
    }

    async function deleteEvent(id) {
      if (
        window.UnganiClientShared &&
        typeof UnganiClientShared.ensureCanWrite === "function" &&
        !UnganiClientShared.ensureCanWrite("delete calendar activity")
      ) {
        return;
      }

      const confirmed = confirm("Move this calendar activity to Recently Deleted? You can restore it within 30 days.");

      if (!confirmed) return;

      let response;

      try {
        response = await currentContext.supabaseClient.rpc("soft_delete_ungani_record", {
          p_table_name: "business_events",
          p_record_id: id,
          p_delete_reason: "Deleted from Calendar page"
        });
      } catch (error) {
        UnganiClientShared.showToast("Could not delete activity: " + (error.message || "Network error. Please check your connection."));
        return;
      }

      if (response.error) {
        UnganiClientShared.showToast("Could not delete activity: " + response.error.message);
        return;
      }

      if (response.data && response.data.ok === false) {
        UnganiClientShared.showToast(response.data.message || "Could not delete activity.");
        return;
      }

      UnganiClientShared.showToast("Calendar activity moved to Recently Deleted ✓");
      await loadEventRows();
    }

    function clearEventForm() {
      editingEventId = null;

      const title = document.getElementById("eventFormTitle");
      if (title) title.innerText = "Add Calendar Activity";

      if (document.getElementById("eventTitle")) document.getElementById("eventTitle").value = "";
      if (document.getElementById("eventType")) document.getElementById("eventType").value = businessPreset.calendarTypes[0] || "Meeting";
      if (document.getElementById("eventDate")) document.getElementById("eventDate").value = "";
      if (document.getElementById("eventStartTime")) document.getElementById("eventStartTime").value = "";
      if (document.getElementById("eventEndTime")) document.getElementById("eventEndTime").value = "";
      if (document.getElementById("eventStatus")) document.getElementById("eventStatus").value = "scheduled";
      if (document.getElementById("eventPriority")) document.getElementById("eventPriority").value = "normal";
      if (document.getElementById("eventSection")) document.getElementById("eventSection").value = currentSectionFilter || sectionOptions[0] || "";
      if (document.getElementById("eventLocation")) document.getElementById("eventLocation").value = "";
      if (document.getElementById("eventRelatedPerson")) document.getElementById("eventRelatedPerson").value = "";
      if (document.getElementById("eventRelatedItem")) document.getElementById("eventRelatedItem").value = "";
      if (document.getElementById("eventNotes")) document.getElementById("eventNotes").value = "";
    }

    function getEventTitle(row) {
      return UnganiClientShared.getValue(row, ["event_title", "title", "name"], "Calendar Activity");
    }

    function statusBadge(status, dateValue) {
      const lower = String(status || "").toLowerCase();
      const date = String(dateValue || "").slice(0, 10);
      const today = new Date().toISOString().slice(0, 10);

      if (lower.includes("no show") || lower.includes("no-show")) {
        return `<span class="ungani-badge red">No-show</span>`;
      }

      if (date && date < today && !lower.includes("completed") && !lower.includes("cancelled")) {
        return `<span class="ungani-badge red">Overdue</span>`;
      }

      if (lower.includes("completed")) {
        return `<span class="ungani-badge green">Completed</span>`;
      }

      if (lower.includes("progress")) {
        return `<span class="ungani-badge blue">In Progress</span>`;
      }

      if (lower.includes("cancelled")) {
        return `<span class="ungani-badge red">Cancelled</span>`;
      }

      return `<span class="ungani-badge gold">Scheduled</span>`;
    }

    function priorityBadge(priority) {
      const lower = String(priority || "normal").toLowerCase();

      if (lower.includes("urgent") || lower.includes("high")) {
        return `<span class="ungani-badge red">${UnganiClientShared.safe(UnganiAnalytics.toTitle(priority))}</span>`;
      }

      if (lower.includes("low")) {
        return `<span class="ungani-badge blue">Low</span>`;
      }

      return `<span class="ungani-badge gold">Normal</span>`;
    }

    function formatTimeRange(startTime, endTime) {
      const start = String(startTime || "").slice(0, 5);
      const end = String(endTime || "").slice(0, 5);

      if (start && end) return start + " - " + end;
      if (start) return start;
      return "No time set";
    }

    function hasValues(rows) {
      return (rows || []).some(function (row) {
        return Number(row.value || 0) > 0;
      });
    }

    function renderSectionSwitcher() {
      if (sectionOptions.length <= 1) return "";

      const pills = [{ label: "All Sections", value: "" }].concat(
        sectionOptions.map(function (label) { return { label: label, value: label }; })
      );

      return `
        <div class="ungani-button-row" style="margin-top:10px;">
          ${pills.map(function (pill) {
            const active = currentSectionFilter === pill.value;
            return `<button class="ungani-btn ${active ? "gold" : "dark"}" type="button" onclick="switchSection('${UnganiClientShared.attr(pill.value)}')">${UnganiClientShared.safe(pill.label)}</button>`;
          }).join("")}
        </div>
      `;
    }

    function switchSection(value) {
      const url = new URL(window.location.href);

      if (value) {
        url.searchParams.set("section", value);
      } else {
        url.searchParams.delete("section");
      }

      window.location.href = url.toString();
    }
  </script>
</body>
