<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS - Calendar</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-shared.js"></script>
</head>

<body>
  <script>
    let currentContext = null;
    let events = [];
    let currentEditId = null;
    let isRealEstate = false;

    window.addEventListener("load", function () {
      UnganiClientShared.initPage({
        pageKey: "calendar",
        pageTitle: "Calendar",
        pageSubtitle: "Manage business dates, follow-ups, appointments, site visits, deadlines, and reminders.",
        onReady: startCalendarPage
      });
    });

    async function startCalendarPage(context) {
      currentContext = context;

      const businessType = String(UnganiClientShared.getValue(context.tenant, ["business_type", "business_type_key"], "")).toLowerCase();
      const businessTypeKey = String(UnganiClientShared.getValue(context.tenant, ["business_type_key"], "")).toLowerCase();

      isRealEstate = businessType.includes("real estate") || businessTypeKey.includes("real_estate");

      const titleEl = document.querySelector(".ungani-topbar h2");
      const subEl = document.querySelector(".ungani-topbar p");

      if (titleEl) {
        titleEl.innerText = isRealEstate ? "Property Calendar" : "Business Calendar";
      }

      if (subEl) {
        subEl.innerText = isRealEstate
          ? "Schedule property viewings, site visits, client follow-ups, rent reminders, document deadlines, and project dates."
          : "Schedule business meetings, follow-ups, deadlines, reminders, and operational activities.";
      }

      await loadEvents();
    }

    async function loadEvents() {
      currentContext.contentEl.innerHTML = UnganiClientShared.loadingCard("Loading calendar activities...");

      const response = await currentContext.supabaseClient
        .from("business_events")
        .select("*")
        .eq("tenant_id", currentContext.tenantId)
        .order("event_date", { ascending: true })
        .order("start_time", { ascending: true });

      if (response.error) {
        currentContext.contentEl.innerHTML = UnganiClientShared.errorCard("Could not load calendar", response.error.message);
        return;
      }

      events = response.data || [];
      renderCalendarPage();
    }

    function renderCalendarPage() {
      const filtered = filterEvents();
      const summary = calculateSummary();

      UnganiClientShared.setContent(`
        <section class="ungani-card ungani-hero">
          <h2>${isRealEstate ? "Property Calendar & Site Visits" : "Business Calendar"}</h2>
          <p>
            ${isRealEstate
              ? "Use this section to schedule property viewings, site visits, rent reminders, document deadlines, payment reminders, project dates, and agent follow-ups."
              : "Use this section to schedule business meetings, follow-ups, deadlines, reminders, and operational activities."
            }
          </p>

          <div class="ungani-button-row">
            <button class="ungani-btn" onclick="scrollToForm()">${currentEditId ? "Update Calendar Event" : "Add Calendar Event"}</button>
            <a class="ungani-btn green" href="my-tasks.html">Tasks</a>
            <a class="ungani-btn dark" href="my-records.html">Records</a>
          </div>
        </section>

        <section class="ungani-grid">
          ${UnganiClientShared.metricCard("Total Events", events.length, "All calendar activities", "blue")}
          ${UnganiClientShared.metricCard("Today", summary.today, "Activities scheduled today", summary.today > 0 ? "orange" : "green")}
          ${UnganiClientShared.metricCard("Upcoming", summary.upcoming, "Future scheduled activities", "green")}
          ${UnganiClientShared.metricCard("Overdue", summary.overdue, "Past activities not completed", summary.overdue > 0 ? "red" : "green")}
          ${UnganiClientShared.metricCard("Viewings / Site Visits", summary.viewings, "Property-related visits", "gold")}
          ${UnganiClientShared.metricCard("Completed", summary.completed, "Completed activities", "green")}
        </section>

        <section class="ungani-card">
          <div class="ungani-section-title">
            <h3>Filters</h3>
            <button class="ungani-btn dark" onclick="resetFilters()">Reset Filters</button>
          </div>

          <div class="ungani-form-grid">
            <div>
              <label for="filterType">Event Type</label>
              <select id="filterType" onchange="saveFilters(); renderCalendarPage();">
                <option value="">All Types</option>
                <option value="viewing">Viewing</option>
                <option value="site visit">Site Visit</option>
                <option value="follow up">Follow Up</option>
                <option value="rent reminder">Rent Reminder</option>
                <option value="payment reminder">Payment Reminder</option>
                <option value="document deadline">Document Deadline</option>
                <option value="project deadline">Project Deadline</option>
                <option value="maintenance">Maintenance</option>
                <option value="meeting">Meeting</option>
                <option value="general">General</option>
              </select>
            </div>

            <div>
              <label for="filterStatus">Status</label>
              <select id="filterStatus" onchange="saveFilters(); renderCalendarPage();">
                <option value="">All Statuses</option>
                <option value="scheduled">Scheduled</option>
                <option value="pending">Pending</option>
                <option value="completed">Completed</option>
                <option value="postponed">Postponed</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>

            <div>
              <label for="filterFrom">From Date</label>
              <input id="filterFrom" type="date" onchange="saveFilters(); renderCalendarPage();" />
            </div>

            <div>
              <label for="filterTo">To Date</label>
              <input id="filterTo" type="date" onchange="saveFilters(); renderCalendarPage();" />
            </div>

            <div>
              <label for="searchBox">Search</label>
              <input id="searchBox" placeholder="Search event, property, project, agent, client..." oninput="saveFilters(); renderCalendarPage();" />
            </div>
          </div>
        </section>

        <section id="calendarFormCard" class="ungani-card">
          <div class="ungani-section-title">
            <h3>${currentEditId ? "Update Calendar Event" : "Add Calendar Event"}</h3>
            ${currentEditId ? '<button class="ungani-btn dark" onclick="cancelEdit()">Cancel Edit</button>' : ""}
          </div>

          ${renderEventForm()}
        </section>

        <section class="ungani-two-col">
          <div class="ungani-card">
            <div class="ungani-section-title">
              <div>
                <h3>${isRealEstate ? "Property Calendar Activities" : "Calendar Activities"}</h3>
                <p class="ungani-small">${filtered.length} event(s) shown</p>
              </div>

              <button class="ungani-btn green" onclick="loadEvents()">Refresh</button>
            </div>

            ${renderEventList(filtered)}
          </div>

          <div class="ungani-card">
            <div class="ungani-section-title">
              <h3>Calendar Summary</h3>
            </div>

            ${renderSummaryPanel(filtered)}
          </div>
        </section>

        <p class="ungani-small">
          Calendar Version: Step 305H Shared Layout · ungani.com · info@ungani.com
        </p>
      `);

      restoreFilters();
      fillEditForm();
    }

    function renderEventForm() {
      return `
        <form id="calendarForm" onsubmit="saveEvent(event)">
          <div class="ungani-form-grid">
            <div>
              <label for="eventTitle">Event Title</label>
              <input id="eventTitle" required placeholder="Example: Clove Garden A12 viewing with Kevin Demo Buyer" />
            </div>

            <div>
              <label for="eventType">Event Type</label>
              <select id="eventType">
                <option value="viewing">Viewing</option>
                <option value="site visit">Site Visit</option>
                <option value="follow up">Follow Up</option>
                <option value="rent reminder">Rent Reminder</option>
                <option value="payment reminder">Payment Reminder</option>
                <option value="document deadline">Document Deadline</option>
                <option value="project deadline">Project Deadline</option>
                <option value="maintenance">Maintenance</option>
                <option value="meeting">Meeting</option>
                <option value="general">General</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div>
              <label for="eventDate">Event Date</label>
              <input id="eventDate" type="date" required />
            </div>

            <div>
              <label for="startTime">Start Time</label>
              <input id="startTime" type="time" />
            </div>

            <div>
              <label for="endTime">End Time</label>
              <input id="endTime" type="time" />
            </div>

            <div>
              <label for="status">Status</label>
              <select id="status">
                <option value="scheduled">Scheduled</option>
                <option value="pending">Pending</option>
                <option value="completed">Completed</option>
                <option value="postponed">Postponed</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>

            <div>
              <label for="location">Location</label>
              <input id="location" placeholder="Example: Nyali, Mombasa" />
            </div>

            <div>
              <label for="propertyName">Property Name</label>
              <input id="propertyName" placeholder="Example: Clove Garden A12" />
            </div>

            <div>
              <label for="projectName">Project Name</label>
              <input id="projectName" placeholder="Example: Clove Garden" />
            </div>

            <div>
              <label for="assignedAgent">${isRealEstate ? "Assigned Agent" : "Assigned Person"}</label>
              <input id="assignedAgent" placeholder="Example: Brian Otieno" />
            </div>

            <div>
              <label for="clientName">Client / Lead Name</label>
              <input id="clientName" placeholder="Example: Kevin Demo Buyer" />
            </div>
          </div>

          <label for="description">Description</label>
          <textarea id="description" placeholder="${isRealEstate ? "Add viewing notes, site visit details, payment reminder notes, or project deadline details..." : "Add event details or notes..."}"></textarea>

          <label for="notes">Internal Notes</label>
          <textarea id="notes" placeholder="Add internal notes, preparation details, or next steps..."></textarea>

          <div class="ungani-button-row">
            <button class="ungani-btn green" type="submit">${currentEditId ? "Update Event" : "Add Event"}</button>
            ${currentEditId ? '<button class="ungani-btn dark" type="button" onclick="cancelEdit()">Cancel</button>' : ""}
          </div>
        </form>
      `;
    }

    function renderEventList(rows) {
      if (rows.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No calendar events found</h3>
            <p>Add your first viewing, site visit, follow-up, reminder, or business event above.</p>
          </div>
        `;
      }

      return rows.map(function (row) {
        return renderEventCard(row);
      }).join("");
    }

    function renderEventCard(row) {
      const title = UnganiClientShared.getValue(row, ["event_title", "title"], "Calendar Event");
      const type = UnganiClientShared.getValue(row, ["event_type"], "general");
      const date = UnganiClientShared.getValue(row, ["event_date"], "");
      const startTime = UnganiClientShared.getValue(row, ["start_time"], "");
      const endTime = UnganiClientShared.getValue(row, ["end_time"], "");
      const status = UnganiClientShared.getValue(row, ["status"], "scheduled");
      const location = UnganiClientShared.getValue(row, ["location"], "");
      const property = UnganiClientShared.getValue(row, ["property_name"], "");
      const project = UnganiClientShared.getValue(row, ["project_name"], "");
      const agent = UnganiClientShared.getValue(row, ["assigned_agent"], "");
      const client = UnganiClientShared.getValue(row, ["client_name"], "");
      const description = UnganiClientShared.getValue(row, ["description"], "");
      const notes = UnganiClientShared.getValue(row, ["notes"], "");

      return `
        <div class="ungani-card" style="box-shadow:none;">
          <div class="ungani-section-title">
            <div>
              <h3>${UnganiClientShared.safe(title)}</h3>
              <p class="ungani-small">
                ${UnganiClientShared.safe(UnganiClientShared.formatDate(date))}
                ${startTime ? " · " + UnganiClientShared.safe(formatTime(startTime)) : ""}
                ${endTime ? " - " + UnganiClientShared.safe(formatTime(endTime)) : ""}
              </p>
            </div>

            <div>
              ${badge(type, "blue")}
              ${badge(status, statusColor(status))}
            </div>
          </div>

          <section class="ungani-grid">
            ${miniDetail("Date", UnganiClientShared.formatDate(date))}
            ${miniDetail("Time", formatEventTime(startTime, endTime))}
            ${miniDetail("Location", location || "N/A")}
            ${miniDetail("Property", property || "N/A")}
            ${miniDetail("Project", project || "N/A")}
            ${miniDetail(isRealEstate ? "Assigned Agent" : "Assigned Person", agent || "N/A")}
            ${miniDetail("Client / Lead", client || "N/A")}
          </section>

          ${description ? `<p class="ungani-small" style="margin-top:12px;"><strong>Description:</strong> ${UnganiClientShared.safe(description)}</p>` : ""}
          ${notes ? `<p class="ungani-small"><strong>Notes:</strong> ${UnganiClientShared.safe(notes)}</p>` : ""}

          <div class="ungani-button-row">
            <button class="ungani-btn" onclick="editEvent('${UnganiClientShared.attr(row.id)}')">Edit</button>
            <button class="ungani-btn orange" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'postponed')">Postponed</button>
            <button class="ungani-btn green" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'completed')">Completed</button>
            <button class="ungani-btn red" onclick="quickStatus('${UnganiClientShared.attr(row.id)}', 'cancelled')">Cancelled</button>
          </div>
        </div>
      `;
    }

    function renderSummaryPanel(rows) {
      const typeSummary = {};
      const statusSummary = {};

      rows.forEach(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["event_type"], "general")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "scheduled")).toLowerCase();

        typeSummary[type] = (typeSummary[type] || 0) + 1;
        statusSummary[status] = (statusSummary[status] || 0) + 1;
      });

      const typeKeys = Object.keys(typeSummary);
      const statusKeys = Object.keys(statusSummary);

      if (typeKeys.length === 0 && statusKeys.length === 0) {
        return `
          <div class="ungani-empty">
            <h3>No summary yet</h3>
            <p>Summary will appear when calendar events are added.</p>
          </div>
        `;
      }

      let html = `<h3 style="margin-top:0;color:var(--ungani-text);">By Event Type</h3>`;

      html += typeKeys.map(function (key) {
        return `
          <div class="ungani-card" style="box-shadow:none;margin-bottom:10px;">
            <strong>${UnganiClientShared.safe(toTitle(key))}</strong>
            <p class="ungani-small" style="margin:5px 0 0;">${typeSummary[key]} event(s)</p>
          </div>
        `;
      }).join("");

      html += `<h3 style="color:var(--ungani-text);">By Status</h3>`;

      html += statusKeys.map(function (key) {
        return `
          <div class="ungani-card" style="box-shadow:none;margin-bottom:10px;">
            <strong>${UnganiClientShared.safe(toTitle(key))}</strong>
            <p class="ungani-small" style="margin:5px 0 0;">${statusSummary[key]} event(s)</p>
          </div>
        `;
      }).join("");

      return html;
    }

    function calculateSummary() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const todayText = today.toISOString().slice(0, 10);

      let todayCount = 0;
      let upcoming = 0;
      let overdue = 0;
      let viewings = 0;
      let completed = 0;

      events.forEach(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["event_type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "scheduled")).toLowerCase();
        const dateValue = String(UnganiClientShared.getValue(row, ["event_date"], "")).slice(0, 10);

        if (dateValue === todayText) todayCount++;
        if (dateValue >= todayText && status !== "cancelled") upcoming++;
        if (dateValue < todayText && status !== "completed" && status !== "cancelled") overdue++;

        if (type.includes("viewing") || type.includes("site visit")) viewings++;
        if (status === "completed") completed++;
      });

      return {
        today: todayCount,
        upcoming: upcoming,
        overdue: overdue,
        viewings: viewings,
        completed: completed
      };
    }

    function filterEvents() {
      const filterType = document.getElementById("filterType") ? UnganiClientShared.value("filterType").toLowerCase() : "";
      const filterStatus = document.getElementById("filterStatus") ? UnganiClientShared.value("filterStatus").toLowerCase() : "";
      const filterFrom = document.getElementById("filterFrom") ? UnganiClientShared.value("filterFrom") : "";
      const filterTo = document.getElementById("filterTo") ? UnganiClientShared.value("filterTo") : "";
      const query = document.getElementById("searchBox") ? UnganiClientShared.value("searchBox").toLowerCase() : "";

      return events.filter(function (row) {
        const type = String(UnganiClientShared.getValue(row, ["event_type"], "")).toLowerCase();
        const status = String(UnganiClientShared.getValue(row, ["status"], "")).toLowerCase();
        const date = String(UnganiClientShared.getValue(row, ["event_date"], "")).slice(0, 10);

        const haystack = [
          UnganiClientShared.getValue(row, ["event_title", "title"], ""),
          type,
          status,
          date,
          UnganiClientShared.getValue(row, ["location"], ""),
          UnganiClientShared.getValue(row, ["property_name"], ""),
          UnganiClientShared.getValue(row, ["project_name"], ""),
          UnganiClientShared.getValue(row, ["assigned_agent"], ""),
          UnganiClientShared.getValue(row, ["client_name"], ""),
          UnganiClientShared.getValue(row, ["description"], ""),
          UnganiClientShared.getValue(row, ["notes"], "")
        ].join(" ").toLowerCase();

        if (filterType && type !== filterType) return false;
        if (filterStatus && status !== filterStatus) return false;
        if (filterFrom && date < filterFrom) return false;
        if (filterTo && date > filterTo) return false;
        if (query && !haystack.includes(query)) return false;

        return true;
      });
    }

    async function saveEvent(event) {
      event.preventDefault();

      const title = UnganiClientShared.value("eventTitle");

      if (!title) {
        alert("Please enter an event title.");
        return;
      }

      if (!UnganiClientShared.value("eventDate")) {
        alert("Please select an event date.");
        return;
      }

      const payload = {
        business_type_key: UnganiClientShared.getValue(currentContext.tenant, ["business_type_key"], null),
        section_key: "business_calendar",
        event_title: title,
        title: title,
        event_type: UnganiClientShared.value("eventType") || "general",
        event_date: UnganiClientShared.value("eventDate"),
        start_time: UnganiClientShared.value("startTime") || null,
        end_time: UnganiClientShared.value("endTime") || null,
        status: UnganiClientShared.value("status") || "scheduled",
        location: UnganiClientShared.value("location") || null,
        property_name: UnganiClientShared.value("propertyName") || null,
        project_name: UnganiClientShared.value("projectName") || null,
        assigned_agent: UnganiClientShared.value("assignedAgent") || null,
        client_name: UnganiClientShared.value("clientName") || null,
        description: UnganiClientShared.value("description") || null,
        notes: UnganiClientShared.value("notes") || null,
        updated_at: new Date().toISOString()
      };

      let response;

      if (currentEditId) {
        response = await currentContext.supabaseClient
          .from("business_events")
          .update(payload)
          .eq("id", currentEditId)
          .eq("tenant_id", currentContext.tenantId);
      } else {
        payload.tenant_id = currentContext.tenantId;
        payload.created_by = currentContext.authUser.id;
        payload.created_at = new Date().toISOString();

        response = await currentContext.supabaseClient
          .from("business_events")
          .insert(payload);
      }

      if (response.error) {
        alert(response.error.message);
        return;
      }

      currentEditId = null;
      UnganiClientShared.showToast("Calendar event saved ✓");
      await loadEvents();
    }

    function fillEditForm() {
      if (!currentEditId) return;

      const row = events.find(function (item) {
        return String(item.id) === String(currentEditId);
      });

      if (!row) return;

      setValue("eventTitle", UnganiClientShared.getValue(row, ["event_title", "title"], ""));
      setValue("eventType", UnganiClientShared.getValue(row, ["event_type"], "general"));
      setValue("eventDate", String(UnganiClientShared.getValue(row, ["event_date"], "")).slice(0, 10));
      setValue("startTime", String(UnganiClientShared.getValue(row, ["start_time"], "")).slice(0, 5));
      setValue("endTime", String(UnganiClientShared.getValue(row, ["end_time"], "")).slice(0, 5));
      setValue("status", UnganiClientShared.getValue(row, ["status"], "scheduled"));
      setValue("location", UnganiClientShared.getValue(row, ["location"], ""));
      setValue("propertyName", UnganiClientShared.getValue(row, ["property_name"], ""));
      setValue("projectName", UnganiClientShared.getValue(row, ["project_name"], ""));
      setValue("assignedAgent", UnganiClientShared.getValue(row, ["assigned_agent"], ""));
      setValue("clientName", UnganiClientShared.getValue(row, ["client_name"], ""));
      setValue("description", UnganiClientShared.getValue(row, ["description"], ""));
      setValue("notes", UnganiClientShared.getValue(row, ["notes"], ""));
    }

    function editEvent(id) {
      currentEditId = id;
      renderCalendarPage();
      scrollToForm();
    }

    function cancelEdit() {
      currentEditId = null;
      renderCalendarPage();
      UnganiClientShared.showToast("Edit cancelled");
    }

    async function quickStatus(id, status) {
      const response = await currentContext.supabaseClient
        .from("business_events")
        .update({
          status: status,
          updated_at: new Date().toISOString()
        })
        .eq("id", id)
        .eq("tenant_id", currentContext.tenantId);

      if (response.error) {
        alert(response.error.message);
        return;
      }

      UnganiClientShared.showToast("Status updated ✓");
      await loadEvents();
    }

    function restoreFilters() {
      if (document.getElementById("filterType")) document.getElementById("filterType").value = sessionStorage.getItem("ungani_calendar_filter_type") || "";
      if (document.getElementById("filterStatus")) document.getElementById("filterStatus").value = sessionStorage.getItem("ungani_calendar_filter_status") || "";
      if (document.getElementById("filterFrom")) document.getElementById("filterFrom").value = sessionStorage.getItem("ungani_calendar_filter_from") || "";
      if (document.getElementById("filterTo")) document.getElementById("filterTo").value = sessionStorage.getItem("ungani_calendar_filter_to") || "";
      if (document.getElementById("searchBox")) document.getElementById("searchBox").value = sessionStorage.getItem("ungani_calendar_search") || "";
    }

    function saveFilters() {
      if (document.getElementById("filterType")) sessionStorage.setItem("ungani_calendar_filter_type", UnganiClientShared.value("filterType"));
      if (document.getElementById("filterStatus")) sessionStorage.setItem("ungani_calendar_filter_status", UnganiClientShared.value("filterStatus"));
      if (document.getElementById("filterFrom")) sessionStorage.setItem("ungani_calendar_filter_from", UnganiClientShared.value("filterFrom"));
      if (document.getElementById("filterTo")) sessionStorage.setItem("ungani_calendar_filter_to", UnganiClientShared.value("filterTo"));
      if (document.getElementById("searchBox")) sessionStorage.setItem("ungani_calendar_search", UnganiClientShared.value("searchBox"));
    }

    function resetFilters() {
      sessionStorage.removeItem("ungani_calendar_filter_type");
      sessionStorage.removeItem("ungani_calendar_filter_status");
      sessionStorage.removeItem("ungani_calendar_filter_from");
      sessionStorage.removeItem("ungani_calendar_filter_to");
      sessionStorage.removeItem("ungani_calendar_search");
      renderCalendarPage();
      UnganiClientShared.showToast("Filters reset ✓");
    }

    function badge(text, color) {
      return `<span class="ungani-badge ${UnganiClientShared.attr(color || "blue")}">${UnganiClientShared.safe(text)}</span>`;
    }

    function statusColor(status) {
      const lower = String(status || "").toLowerCase();

      if (lower.includes("completed")) return "green";
      if (lower.includes("scheduled") || lower.includes("pending") || lower.includes("postponed")) return "orange";
      if (lower.includes("cancelled")) return "red";

      return "blue";
    }

    function miniDetail(label, value) {
      return `
        <div class="ungani-card" style="margin-bottom:0;box-shadow:none;padding:14px;">
          <p class="ungani-small" style="margin:0 0 5px;">${UnganiClientShared.safe(label)}</p>
          <strong>${UnganiClientShared.safe(value)}</strong>
        </div>
      `;
    }

    function formatTime(value) {
      if (!value) return "";
      return String(value).slice(0, 5);
    }

    function formatEventTime(start, end) {
      if (!start && !end) return "N/A";
      if (start && !end) return formatTime(start);
      if (!start && end) return formatTime(end);
      return formatTime(start) + " - " + formatTime(end);
    }

    function toTitle(value) {
      return String(value || "")
        .replace(/_/g, " ")
        .replace(/\w\S*/g, function (text) {
          return text.charAt(0).toUpperCase() + text.substr(1).toLowerCase();
        });
    }

    function setValue(id, value) {
      const element = document.getElementById(id);

      if (element) {
        element.value = value === null || value === undefined ? "" : value;
      }
    }

    function scrollToForm() {
      setTimeout(function () {
        const card = document.getElementById("calendarFormCard");

        if (card) {
          card.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      }, 100);
    }
  </script>
</body>
</html>
