<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Admin Users</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="pwa-register.js"></script>
  <script src="admin-shared.js"></script>

  <style>
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 24px var(--ungani-shadow);
    }

    .metric-card h3 {
      margin: 0 0 8px;
      color: var(--ungani-muted);
      font-size: 14px;
    }

    .metric-card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
      color: var(--ungani-text);
    }

    .metric-card .note {
      margin-top: 8px;
      color: var(--ungani-muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .metric-card.green { border-left-color: var(--ungani-green); }
    .metric-card.red { border-left-color: var(--ungani-red); }
    .metric-card.orange { border-left-color: var(--ungani-orange); }
    .metric-card.blue { border-left-color: var(--ungani-blue); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .form-grid-full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 8px 0 6px;
      font-size: 14px;
      color: var(--ungani-text);
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--ungani-border);
      border-radius: 12px;
      background: var(--ungani-card);
      color: var(--ungani-text);
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
      background: var(--ungani-gold);
      color: var(--ungani-navy);
      text-decoration: none;
      display: inline-block;
    }

    .btn.dark {
      background: var(--ungani-card);
      color: var(--ungani-text);
      border: 1px solid var(--ungani-border);
    }

    .btn.green { background: var(--ungani-green); color: #FFFFFF; }
    .btn.red { background: var(--ungani-red); color: #FFFFFF; }
    .btn.orange { background: var(--ungani-orange); color: #FFFFFF; }
    .btn.blue { background: var(--ungani-blue); color: #FFFFFF; }

    .two-col {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
    }

    .section-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-title-row h2 {
      margin: 0;
    }

    .row-card {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 6px solid var(--ungani-gold);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .row-card.active-card { border-left-color: var(--ungani-green); }
    .row-card.admin-card { border-left-color: var(--ungani-gold); }
    .row-card.warning-card { border-left-color: var(--ungani-orange); }
    .row-card.bad-card { border-left-color: var(--ungani-red); }
    .row-card.info-card { border-left-color: var(--ungani-blue); }

    .row-title {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 6px;
      color: var(--ungani-text);
    }

    .row-detail {
      color: var(--ungani-muted);
      margin: 5px 0;
      line-height: 1.45;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      background: var(--ungani-navy);
      color: #FFFFFF;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      text-transform: capitalize;
    }

    .badge.green { background: var(--ungani-green); }
    .badge.red { background: var(--ungani-red); }
    .badge.orange { background: var(--ungani-orange); }
    .badge.blue { background: var(--ungani-blue); }
    .badge.gold { background: var(--ungani-gold); color: var(--ungani-navy); }

    .empty {
      text-align: center;
      padding: 28px;
      background: var(--ungani-card);
      border: 1px dashed var(--ungani-border);
      border-radius: 18px;
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--ungani-text);
    }

    .empty p {
      margin: 0;
      color: var(--ungani-muted);
    }

    .small-text {
      color: var(--ungani-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 950px) {
      .two-col {
        grid-template-columns: 1fr;
      }
    }

    .category-tiles {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .category-tile {
      background: var(--ungani-card);
      border: 1px solid var(--ungani-border);
      border-left: 5px solid var(--tile-accent, var(--ungani-gold));
      border-radius: 18px;
      padding: 14px 16px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: 0.18s ease;
    }

    .category-tile:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px var(--ungani-shadow);
    }

    .category-tile.active {
      box-shadow: 0 0 0 2px var(--tile-accent, var(--ungani-gold));
    }

    .category-tile .tile-count {
      display: block;
      font-size: 26px;
      font-weight: 900;
      color: var(--ungani-text);
    }

    .category-tile .tile-label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--ungani-muted);
      margin-top: 4px;
    }

    .ungani-table-wrap {
      overflow-x: auto;
    }

    .ungani-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 720px;
    }

    .ungani-table thead th {
      text-align: left;
      padding: 10px 12px;
      color: var(--ungani-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--ungani-border);
      white-space: nowrap;
    }

    .ungani-table tbody tr {
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .ungani-table tbody tr:hover {
      background: rgba(212, 166, 58, 0.08);
    }

    .ungani-table td {
      padding: 12px;
      border-bottom: 1px solid var(--ungani-border);
      vertical-align: middle;
    }

    .ungani-table td:first-child {
      border-left: 4px solid var(--accent, #64748B);
      font-weight: bold;
      color: var(--ungani-text);
    }

    .ungani-table .row-sub {
      display: block;
      font-weight: normal;
      color: var(--ungani-muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .ungani-table .row-actions {
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
      justify-content: flex-end;
    }

    .ungani-table .row-actions .btn {
      padding: 7px 10px;
      font-size: 12px;
    }

    .modal-form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .modal-section-title {
      font-weight: bold;
      font-size: 15px;
      margin: 18px 0 4px;
      color: var(--ungani-text);
    }

    .modal-section-title:first-child {
      margin-top: 0;
    }
  </style>
</head>

<body>
  <div id="adminRoot"></div>

  <script>
    let supabaseClient = null;
    let currentAdmin = null;

    let tenants = [];
    let users = [];
    let selectedUserId = null;

    const pageMainHtml = `
      <section class="ungani-card ungani-hero-card">
        <div style="position: relative; z-index: 1;">
          <h2>Admin Users Center</h2>
          <p>
            View and manage UNGANI OS user profiles, roles, account status, client links, theme preferences, and language preferences.
          </p>
          <div style="margin-top: 16px;">
            <a class="btn" href="admin-home.html">Admin Home</a>
            <a class="btn green" href="admin.html">Main Admin</a>
            <a class="btn blue" href="admin-profiles.html">Profiles</a>
            <a class="btn dark" href="admin-settings.html">Admin Settings</a>
          </div>
        </div>
      </section>

      <section class="category-tiles" id="categoryTiles">
        <div class="empty"><h3>Loading categories...</h3><p>Please wait.</p></div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>Filters</h2>
          <button class="btn green" onclick="loadPageData()">Refresh</button>
        </div>

        <div class="form-grid">
          <div>
            <label for="clientFilter">Client</label>
            <select id="clientFilter" onchange="renderUsersPage()">
              <option value="">All Clients</option>
            </select>
          </div>

          <div>
            <label for="searchBox">Search</label>
            <input id="searchBox" placeholder="Search users (any category)..." oninput="renderUsersPage()" />
          </div>
        </div>

        <div class="button-row">
          <button class="btn dark" onclick="resetFilters()">Reset Filters</button>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2>Client User Summary</h2>
        </div>
        <div id="clientSummaryBox">
          <div class="empty">
            <h3>Loading client summary...</h3>
            <p>Please wait.</p>
          </div>
        </div>
      </section>

      <section class="ungani-card">
        <div class="section-title-row">
          <h2 id="usersListTitle">All Users</h2>
          <p class="small-text" id="usersCountText">Loading...</p>
        </div>

        <div class="ungani-table-wrap">
          <table class="ungani-table">
            <thead>
              <tr>
                <th>User</th>
                <th>Role</th>
                <th>Status</th>
                <th>Client</th>
                <th>Created</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="usersListBox">
              <tr><td colspan="6"><div class="empty"><h3>Loading users...</h3><p>Please wait.</p></div></td></tr>
            </tbody>
          </table>
        </div>
      </section>
    `;

    window.addEventListener("load", function () {
      UnganiAdminShared.renderShell("adminRoot", {
        activeKey: "users",
        pageTitle: "Users",
        pageSubtitle: "View and manage UNGANI OS user profile records.",
        footerTitle: "Users",
        footerVersion: "Users Version: Step 293 Shared Session Added",
        mainHtml: pageMainHtml
      });

      UnganiAdminShared.requireAdmin({
        onNoSession: function () {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiLoginShell").classList.remove("hidden");
        },
        onBlocked: function (reason) {
          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiBlockedShell").classList.remove("hidden");
          document.getElementById("unganiBlockedReason").innerText = reason;
        },
        onReady: async function (admin, client) {
          currentAdmin = admin;
          supabaseClient = client;

          UnganiAdminShared.renderSidebar("adminSidebar", {
            activeKey: "users",
            adminName: admin.full_name || "Admin Workspace",
            footerTitle: "Users",
            footerVersion: "Users Version: Step 293 Shared Session Added"
          });

          document.getElementById("unganiLoadingShell").classList.add("hidden");
          document.getElementById("unganiAppShell").classList.remove("hidden");

          await loadPageData();
        }
      });
    });

    function safe(value) {
      return UnganiAdminShared.safe(value);
    }

    function cleanText(value) {
      return UnganiAdminShared.cleanText(value);
    }

    function getField(row, names, fallback = "") {
      for (const name of names) {
        if (row && row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return fallback;
    }

    function getTenantName(row) {
      return getField(row, ["business_name", "company_name", "tenant_name"], "Client Business");
    }

    function getTenantNameById(tenantId) {
      if (!tenantId) return "No client linked";
      const tenant = tenants.find(row => String(row.id) === String(tenantId));
      return tenant ? getTenantName(tenant) : "Unknown Client";
    }

    function getUserName(row) {
      return getField(row, ["full_name", "name", "display_name"], row.email || "User");
    }

    function getUserEmail(row) {
      return getField(row, ["email", "user_email"], "N/A");
    }

    function getUserRole(row) {
      return String(getField(row, ["role", "user_role"], "client")).toLowerCase();
    }

    function getUserStatus(row) {
      return String(getField(row, ["status", "user_status"], "active")).toLowerCase();
    }

    function getUserTheme(row) {
      return String(getField(row, ["preferred_theme"], "light")).toLowerCase();
    }

    function getUserLanguage(row) {
      return String(getField(row, ["preferred_language"], "en")).toLowerCase();
    }

    function getCreatedDate(row) {
      return getField(row, ["created_at", "updated_at"], "");
    }

    function formatDateTime(value) {
      if (!value) return "N/A";

      const dateObj = new Date(value);

      if (isNaN(dateObj.getTime())) return "N/A";

      return dateObj.toLocaleString("en-KE", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function isAdminRole(role) {
      return ["admin", "super_admin", "owner"].includes(String(role || "").toLowerCase());
    }

    function roleBadge(role) {
      const clean = String(role || "client").toLowerCase();

      if (clean === "owner") return `<span class="badge gold">Owner</span>`;
      if (clean === "super_admin") return `<span class="badge gold">Super Admin</span>`;
      if (clean === "admin") return `<span class="badge gold">Admin</span>`;
      if (clean === "manager") return `<span class="badge blue">Manager</span>`;
      if (clean === "staff") return `<span class="badge orange">Staff</span>`;

      return `<span class="badge green">Client</span>`;
    }

    function statusBadge(status) {
      const clean = String(status || "active").toLowerCase();

      if (clean === "active") {
        return `<span class="badge green">Active</span>`;
      }

      if (clean === "pending") {
        return `<span class="badge orange">Pending</span>`;
      }

      if (clean === "suspended") {
        return `<span class="badge red">Suspended</span>`;
      }

      if (clean === "inactive") {
        return `<span class="badge blue">Inactive</span>`;
      }

      return `<span class="badge blue">${safe(cleanText(clean))}</span>`;
    }

    async function safeSelect(tableName) {
      try {
        const { data, error } = await supabaseClient
          .from(tableName)
          .select("*")
          .limit(10000);

        if (error) {
          console.log(tableName, error.message);
          return [];
        }

        return data || [];
      } catch (error) {
        console.log(tableName, error.message);
        return [];
      }
    }

    async function loadPageData() {
      UnganiAdminShared.showToast("Loading users...");

      const [tenantRows, userRows] = await Promise.all([
        safeSelect("tenants"),
        safeSelect("users")
      ]);

      tenants = tenantRows;
      users = userRows.sort((a, b) => new Date(getCreatedDate(b) || 0) - new Date(getCreatedDate(a) || 0));

      fillClientFilter();
      renderUsersPage();

      UnganiAdminShared.showToast("Users updated ✓");
    }

    function fillClientFilter() {
      const selectedFilter = document.getElementById("clientFilter").value;

      const options = tenants
        .map(row => `<option value="${safe(row.id)}">${safe(getTenantName(row))}</option>`)
        .join("");

      document.getElementById("clientFilter").innerHTML = `<option value="">All Clients</option><option value="no_client">No Client Linked</option>${options}`;

      if (selectedFilter) {
        document.getElementById("clientFilter").value = selectedFilter;
      }
    }

    let activeRoleCategory = "all";

    const ROLE_CATEGORIES = [
      { key: "all", label: "All Users", accent: "#D4A63A", match: () => true },
      { key: "client", label: "Clients", accent: "#15803D", match: row => getUserRole(row) === "client" },
      { key: "staff", label: "Staff & Managers", accent: "#2563EB", match: row => ["staff", "manager"].includes(getUserRole(row)) },
      { key: "admin", label: "Admins", accent: "#D4A63A", match: row => isAdminRole(getUserRole(row)) },
      { key: "unlinked", label: "Unlinked", accent: "#C77700", match: row => !row.tenant_id }
    ];

    function statusAccent(status) {
      const clean = String(status || "active").toLowerCase();
      if (clean === "active") return "#15803D";
      if (clean === "pending") return "#C77700";
      if (clean === "suspended") return "#B91C1C";
      if (clean === "inactive") return "#2563EB";
      return "#64748B";
    }

    function baseFilteredUsers() {
      const clientFilter = document.getElementById("clientFilter").value;
      const query = document.getElementById("searchBox").value.toLowerCase().trim();

      let rows = [...users];

      if (clientFilter) {
        if (clientFilter === "no_client") {
          rows = rows.filter(row => !row.tenant_id);
        } else {
          rows = rows.filter(row => String(row.tenant_id) === String(clientFilter));
        }
      }

      if (query) {
        rows = rows.filter(row => {
          const haystack = [
            getUserName(row),
            getUserEmail(row),
            getUserRole(row),
            getUserStatus(row),
            getUserTheme(row),
            getUserLanguage(row),
            getTenantNameById(row.tenant_id),
            JSON.stringify(row)
          ].join(" ").toLowerCase();

          return haystack.includes(query);
        });
      }

      return rows;
    }

    function filteredUsers() {
      const rows = baseFilteredUsers();
      const category = ROLE_CATEGORIES.find(c => c.key === activeRoleCategory) || ROLE_CATEGORIES[0];

      return rows.filter(category.match);
    }

    function selectRoleCategory(key) {
      activeRoleCategory = key;
      renderUsersPage();
    }

    function renderCategoryTiles() {
      const rows = baseFilteredUsers();

      document.getElementById("categoryTiles").innerHTML = ROLE_CATEGORIES.map(category => {
        const count = rows.filter(category.match).length;
        const isActive = category.key === activeRoleCategory;

        return `
          <button type="button" class="category-tile${isActive ? " active" : ""}" style="--tile-accent:${category.accent};" onclick="selectRoleCategory('${category.key}')">
            <span class="tile-count">${safe(count)}</span>
            <span class="tile-label">${safe(category.label)}</span>
          </button>
        `;
      }).join("");
    }

    function renderUsersPage() {
      renderCategoryTiles();
      renderClientSummary();
      renderUsersList();
    }

    function renderClientSummary() {
      const rows = filteredUsers();
      const clientMap = {};

      tenants.forEach(tenant => {
        clientMap[tenant.id] = {
          id: tenant.id,
          name: getTenantName(tenant),
          total: 0,
          active: 0,
          suspended: 0,
          admins: 0,
          clientUsers: 0
        };
      });

      rows.forEach(row => {
        const tenantId = row.tenant_id;

        if (!tenantId || !clientMap[tenantId]) return;

        clientMap[tenantId].total += 1;

        if (getUserStatus(row) === "active") clientMap[tenantId].active += 1;
        if (getUserStatus(row) === "suspended") clientMap[tenantId].suspended += 1;
        if (isAdminRole(getUserRole(row))) clientMap[tenantId].admins += 1;
        if (getUserRole(row) === "client") clientMap[tenantId].clientUsers += 1;
      });

      const summaryRows = Object.values(clientMap)
        .filter(row => row.total > 0)
        .sort((a, b) => b.total - a.total)
        .slice(0, 10);

      const unlinked = rows.filter(row => !row.tenant_id).length;

      if (summaryRows.length === 0 && unlinked === 0) {
        document.getElementById("clientSummaryBox").innerHTML = `
          <div class="empty">
            <h3>No client user summary yet</h3>
            <p>User summary will appear after user records are linked to clients.</p>
          </div>
        `;
        return;
      }

      let html = "";

      if (unlinked > 0) {
        html += `
          <div class="row-card warning-card">
            <div class="row-title">Users Without Client Link</div>
            <p class="row-detail"><strong>Total:</strong> ${safe(unlinked)}</p>
            <p class="row-detail">These users are not currently connected to a client business.</p>
            <span class="badge orange">Needs review</span>
          </div>
        `;
      }

      html += summaryRows.map(row => `
        <div class="row-card ${row.suspended > 0 ? "bad-card" : "active-card"}">
          <div class="row-title">${safe(row.name)}</div>
          <p class="row-detail"><strong>Total Users:</strong> ${safe(row.total)}</p>
          <p class="row-detail"><strong>Active:</strong> ${safe(row.active)}</p>
          <p class="row-detail"><strong>Suspended:</strong> ${safe(row.suspended)}</p>
          <p class="row-detail"><strong>Client Users:</strong> ${safe(row.clientUsers)}</p>
          <p class="row-detail"><strong>Admin Roles:</strong> ${safe(row.admins)}</p>
          ${row.suspended > 0 ? `<span class="badge red">Suspended users</span>` : `<span class="badge green">Clear</span>`}
        </div>
      `).join("");

      document.getElementById("clientSummaryBox").innerHTML = html;
    }

    function renderUsersList() {
      const rows = filteredUsers();

      document.getElementById("usersCountText").innerText = `${rows.length} user record(s) shown`;

      if (rows.length === 0) {
        document.getElementById("usersListBox").innerHTML = `
          <tr><td colspan="6">
            <div class="empty">
              <h3>No users found</h3>
              <p>Try changing the category, client filter, or search.</p>
            </div>
          </td></tr>
        `;
        return;
      }

      document.getElementById("usersListBox").innerHTML = rows.map(row => `
        <tr style="--accent:${statusAccent(getUserStatus(row))};" onclick="openUserModal('${safe(row.id)}')">
          <td>
            ${safe(getUserName(row))}
            <span class="row-sub">${safe(getUserEmail(row))}</span>
          </td>
          <td>${roleBadge(getUserRole(row))}</td>
          <td>${statusBadge(getUserStatus(row))}</td>
          <td>${safe(getTenantNameById(row.tenant_id))}</td>
          <td>${safe(formatDateTime(getCreatedDate(row)))}</td>
          <td onclick="event.stopPropagation();">
            <div class="row-actions">
              <button class="btn green" onclick="quickUpdateStatus('${safe(row.id)}','active')">Active</button>
              <button class="btn orange" onclick="quickUpdateStatus('${safe(row.id)}','pending')">Pending</button>
              <button class="btn red" onclick="quickUpdateStatus('${safe(row.id)}','suspended')">Suspend</button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    function openUserModal(userId) {
      const row = users.find(item => String(item.id) === String(userId));

      if (!row) {
        UnganiAdminShared.showToast("User not found - refresh and try again.");
        return;
      }

      selectedUserId = row.id;

      const bodyHtml = `
        <div class="modal-form-grid">
          <div>
            <label for="editFullName">Full Name</label>
            <input id="editFullName" value="${safe(getUserName(row))}" />
          </div>

          <div>
            <label for="editEmail">Email</label>
            <input id="editEmail" value="${safe(getUserEmail(row) === "N/A" ? "" : getUserEmail(row))}" disabled />
          </div>

          <div>
            <label for="editTenantId">Linked Client</label>
            <select id="editTenantId">
              <option value="">No Client Linked</option>
              ${tenants.map(tenant => `<option value="${safe(tenant.id)}">${safe(getTenantName(tenant))}</option>`).join("")}
            </select>
          </div>

          <div>
            <label for="editRole">Role</label>
            <select id="editRole">
              <option value="client">Client</option>
              <option value="staff">Staff</option>
              <option value="manager">Manager</option>
              <option value="admin">Admin</option>
              <option value="super_admin">Super Admin</option>
              <option value="owner">Owner</option>
            </select>
          </div>

          <div>
            <label for="editStatus">Status</label>
            <select id="editStatus">
              <option value="active">Active</option>
              <option value="pending">Pending</option>
              <option value="suspended">Suspended</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>

          <div>
            <label for="editTheme">Preferred Theme</label>
            <select id="editTheme">
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
          </div>

          <div>
            <label for="editLanguage">Preferred Language</label>
            <select id="editLanguage">
              <option value="en">English</option>
              <option value="sw">Swahili</option>
            </select>
          </div>
        </div>

        <div class="button-row">
          <button class="btn green" onclick="saveSelectedUser()">Save User</button>
          <button class="btn green" onclick="quickUpdateStatus('${safe(row.id)}','active')">Set Active</button>
          <button class="btn orange" onclick="quickUpdateStatus('${safe(row.id)}','pending')">Set Pending</button>
          <button class="btn red" onclick="quickUpdateStatus('${safe(row.id)}','suspended')">Suspend</button>
        </div>

        <p class="small-text" style="margin-top: 14px;">
          This page updates the user profile record only. Password reset, login creation, and approval emails need a secure backend/email function.
        </p>
      `;

      UnganiAdminShared.openModal({
        title: getUserName(row),
        bodyHtml: bodyHtml,
        onOpen: function () {
          document.getElementById("editTenantId").value = row.tenant_id || "";
          document.getElementById("editRole").value = getUserRole(row);
          document.getElementById("editStatus").value = getUserStatus(row);
          document.getElementById("editTheme").value = getUserTheme(row);
          document.getElementById("editLanguage").value = getUserLanguage(row);
        }
      });
    }

    async function updateUserStatus(userId, status) {
      const { error } = await supabaseClient
        .from("users")
        .update({
          status: status,
          updated_at: new Date().toISOString()
        })
        .eq("id", userId);

      if (error) {
        alert(error.message);
        return false;
      }

      return true;
    }

    async function quickUpdateStatus(userId, status) {
      const ok = await updateUserStatus(userId, status);

      if (!ok) return;

      selectedUserId = userId;

      UnganiAdminShared.closeModal();
      UnganiAdminShared.showToast("User status updated ✓");
      await loadPageData();
    }

    async function saveSelectedUser() {
      if (!selectedUserId) {
        alert("No user selected.");
        return;
      }

      const fullName = document.getElementById("editFullName").value.trim();
      const tenantId = document.getElementById("editTenantId").value;
      const role = document.getElementById("editRole").value;
      const status = document.getElementById("editStatus").value;
      const theme = document.getElementById("editTheme").value;
      const language = document.getElementById("editLanguage").value;

      if (!fullName) {
        alert("Please enter the user full name.");
        return;
      }

      const originalUser = users.find(item => String(item.id) === String(selectedUserId));
      const originalRole = originalUser ? originalUser.role : null;

      const payload = {
        full_name: fullName,
        tenant_id: tenantId || null,
        role: role,
        status: status,
        preferred_theme: theme,
        preferred_language: language,
        updated_at: new Date().toISOString()
      };

      const { error } = await supabaseClient
        .from("users")
        .update(payload)
        .eq("id", selectedUserId);

      if (error) {
        alert(error.message);
        return;
      }

      if (originalRole !== role) {
        UnganiAdminShared.logAuditEvent("role_changed", {
          entityType: "users",
          entityId: String(selectedUserId),
          tenantId: tenantId || null,
          description: "Role changed from " + (originalRole || "none") + " to " + role,
          metadata: { fromRole: originalRole, toRole: role }
        });
      }

      UnganiAdminShared.closeModal();
      UnganiAdminShared.showToast("User saved ✓");
      await loadPageData();
    }

    function resetFilters() {
      document.getElementById("clientFilter").value = "";
      document.getElementById("searchBox").value = "";
      activeRoleCategory = "all";

      renderUsersPage();

      UnganiAdminShared.showToast("User filters reset ✓");
    }
  </script>
</body>
</html>
