<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UNGANI OS Business Profile</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #061C3D;
      color: #FFFFFF;
    }

    .container {
      max-width: 950px;
      margin: 0 auto;
      padding: 35px 20px;
    }

    .top {
      text-align: center;
      margin-bottom: 25px;
    }

    .gold {
      color: #D4A63A;
    }

    .card {
      background: #FFFFFF;
      color: #061C3D;
      padding: 24px;
      border-radius: 16px;
      margin-bottom: 20px;
      border: 1px solid #E5E7EB;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0 15px;
      border-radius: 8px;
      border: 1px solid #E5E7EB;
      font-size: 15px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 100px;
    }

    button {
      background: #D4A63A;
      color: #061C3D;
      border: none;
      padding: 11px 16px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
      margin-right: 8px;
    }

    .dark-btn {
      background: #061C3D;
      color: #FFFFFF;
    }

    .hidden {
      display: none;
    }

    .danger {
      color: #b00020;
    }

    .success {
      color: green;
      font-weight: bold;
    }

    .small {
      font-size: 13px;
      opacity: 0.85;
    }

    .nav {
      text-align: center;
      margin-bottom: 20px;
      line-height: 2;
    }

    .nav a {
      color: #D4A63A;
      text-decoration: none;
      font-weight: bold;
    }

    .blocked-box {
      border-left: 6px solid #b00020;
    }

    .profile-box {
      background: #F5F5F3;
      border-left: 6px solid #D4A63A;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="top">
      <h1>UNGANI <span class="gold">Business Profile</span></h1>
      <p>Update your business contact details and profile information.</p>
      <p class="small">ungani.com | info@ungani.com</p>
    </div>

    <div class="nav">
      <a href="portal.html">Portal</a> |
      <a href="client.html">Dashboard</a> |
      <a href="my-overview.html">Overview</a> |
      <a href="my-money.html">Money</a> |
      <a href="my-records.html">Records</a> |
      <a href="my-documents.html">Documents</a> |
      <a href="my-tasks.html">Tasks</a> |
      <a href="my-items.html">Items</a> |
      <a href="reports.html">Reports</a> |
      <a href="account.html">Account</a> |
      <a href="my-support.html">Support</a> |
      <a href="my-notices.html">Notices</a>
    </div>

    <div id="loginCard" class="card">
      <h2>Client Login</h2>

      <label>Email</label>
      <input id="clientEmail" placeholder="client@example.com" />

      <label>Password</label>
      <input id="clientPassword" type="password" placeholder="Enter password" />

      <button onclick="loginClient()">Login</button>

      <div id="loginMessage"></div>
    </div>

    <div id="blockedCard" class="card blocked-box hidden">
      <h2 class="danger">Access Blocked</h2>
      <p id="blockedReason"></p>
      <button onclick="logoutClient()">Logout</button>
    </div>

    <div id="profileArea" class="hidden">
      <div class="card profile-box">
        <h2 id="companyName">Business Profile</h2>
        <p id="companyInfo"></p>

        <button onclick="loadProfile()">Refresh Profile</button>
        <button onclick="window.location.href='client.html'">Dashboard</button>
        <button onclick="window.location.href='my-overview.html'">Overview</button>
        <button onclick="logoutClient()" class="dark-btn">Logout</button>
      </div>

      <div class="card">
        <h2>Profile Details</h2>

        <label>Registered Company Name</label>
        <input id="registeredCompanyName" disabled />

        <label>Contact Person</label>
        <input id="contactPerson" placeholder="Main contact person" />

        <label>Business Phone</label>
        <input id="businessPhone" placeholder="Example: +254..." />

        <label>Business Email</label>
        <input id="businessEmail" placeholder="Business email address" />

        <label>Business Location</label>
        <input id="businessLocation" placeholder="Example: Mombasa, Nyali, Nairobi, etc." />

        <label>Business Description</label>
        <textarea id="businessDescription" placeholder="Short description of what the business does"></textarea>

        <label>Business Notes</label>
        <textarea id="businessNotes" placeholder="Any extra notes you want UNGANI to know"></textarea>

        <button onclick="saveProfile()">Save Profile</button>

        <div id="profileMessage"></div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://ctmtjwklltnsmfdtvqhl.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_jkZaWWep-cObTEv_F_kN6g_Ic85BxD9";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUserId = null;
    let currentTenantId = null;

    function showAccessBlocked(reason) {
      document.getElementById("loginCard").classList.add("hidden");
      document.getElementById("profileArea").classList.add("hidden");
      document.getElementById("blockedCard").classList.remove("hidden");
      document.getElementById("blockedReason").innerText = reason;
    }

    async function checkExistingSession() {
      const { data: sessionData } = await supabaseClient.auth.getSession();

      if (sessionData?.session?.user?.id) {
        await loadClientProfile();
      }
    }

    async function loginClient() {
      const email = document.getElementById("clientEmail").value;
      const password = document.getElementById("clientPassword").value;
      const msg = document.getElementById("loginMessage");

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        msg.innerHTML = `<p class="danger">${error.message}</p>`;
        return;
      }

      msg.innerHTML = `<p class="success">Login successful.</p>`;

      await loadClientProfile();
    }

    async function logoutClient() {
      await supabaseClient.auth.signOut();

      document.getElementById("loginCard").classList.remove("hidden");
      document.getElementById("profileArea").classList.add("hidden");
      document.getElementById("blockedCard").classList.add("hidden");
    }

    async function loadClientProfile() {
      const { data: sessionData } = await supabaseClient.auth.getSession();
      currentUserId = sessionData?.session?.user?.id;

      if (!currentUserId) {
        return;
      }

      const { data: userData, error } = await supabaseClient
        .from("users")
        .select(`
          id,
          full_name,
          email,
          status,
          tenant_id,
          tenants(
            id,
            company_name,
            account_status,
            contact_person,
            business_phone,
            business_email,
            business_location,
            business_description,
            business_notes,
            updated_at,
            business_types(name),
            packages(name)
          )
        `)
        .eq("id", currentUserId)
        .maybeSingle();

      if (error) {
        alert(error.message);
        return;
      }

      if (!userData) {
        showAccessBlocked("Your login exists, but your UNGANI client profile has not been connected yet.");
        return;
      }

      if (userData.status !== "active") {
        showAccessBlocked("Your user access is currently not active.");
        return;
      }

      const tenant = userData.tenants;

      if (!tenant) {
        showAccessBlocked("Your account is not connected to a business workspace yet.");
        return;
      }

      if (tenant.account_status === "suspended") {
        showAccessBlocked("This business account is currently suspended.");
        return;
      }

      if (tenant.account_status === "cancelled") {
        showAccessBlocked("This business account has been cancelled.");
        return;
      }

      currentTenantId = userData.tenant_id;

      document.getElementById("loginCard").classList.add("hidden");
      document.getElementById("blockedCard").classList.add("hidden");
      document.getElementById("profileArea").classList.remove("hidden");

      document.getElementById("companyName").innerText = tenant.company_name;

      document.getElementById("companyInfo").innerText =
        `${tenant.business_types?.name || "Business"} | Package: ${tenant.packages?.name || "N/A"} | Status: ${tenant.account_status || "N/A"}`;

      fillProfileForm(tenant);
    }

    async function loadProfile() {
      await loadClientProfile();
    }

    function fillProfileForm(tenant) {
      document.getElementById("registeredCompanyName").value = tenant.company_name || "";
      document.getElementById("contactPerson").value = tenant.contact_person || "";
      document.getElementById("businessPhone").value = tenant.business_phone || "";
      document.getElementById("businessEmail").value = tenant.business_email || "";
      document.getElementById("businessLocation").value = tenant.business_location || "";
      document.getElementById("businessDescription").value = tenant.business_description || "";
      document.getElementById("businessNotes").value = tenant.business_notes || "";
    }

    async function saveProfile() {
      const msg = document.getElementById("profileMessage");

      const updateRecord = {
        contact_person: document.getElementById("contactPerson").value,
        business_phone: document.getElementById("businessPhone").value,
        business_email: document.getElementById("businessEmail").value,
        business_location: document.getElementById("businessLocation").value,
        business_description: document.getElementById("businessDescription").value,
        business_notes: document.getElementById("businessNotes").value,
        updated_at: new Date().toISOString()
      };

      const { error } = await supabaseClient
        .from("tenants")
        .update(updateRecord)
        .eq("id", currentTenantId);

      if (error) {
        msg.innerHTML = `<p class="danger">${error.message}</p>`;
        return;
      }

      msg.innerHTML = `<p class="success">Business profile saved successfully.</p>`;

      await loadProfile();
    }

    checkExistingSession();
  </script>
</body>
</html>
